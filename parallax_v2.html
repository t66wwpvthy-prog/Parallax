<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Parallax V2</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg-deep:#070b10; --bg:#0b1118;
  --surface:#101820; --surface-2:#151f2a; --surface-3:#1d2a36;
  --rule:#26313d; --rule-bright:#3a4655; --rule-faint:#17212b;
  --ink:#e8eef6; --ink-bright:#f8fbff; --ink-mute:#9aa7bb; --ink-faint:#667386; --ink-ghost:#3b4655;
  --gold:#d6aa59; --gold-bright:#f0c773; --gold-deep:#8a6c33; --gold-glow:rgba(214,170,89,.24);
  --teal:#7aa39e; --teal-bright:#a9d5cf; --teal-deep:#4f7773; --teal-glow:rgba(122,163,158,.22);
  --positive:#85b89c; --positive-bright:#a9d3bc;
  --negative:#e07670; --negative-bright:#f0918d;
  --s1:#a9d5cf; --s2:#f0c773; --s3:#9db4e0; --s4:#cda6e0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:'Sora',sans-serif;color:var(--ink);font-size:13px;-webkit-font-smoothing:antialiased;overflow:hidden}
body{background:radial-gradient(1200px 600px at 85% -10%, rgba(108,197,211,.07), transparent 60%),linear-gradient(180deg,#090e14,var(--bg) 45%,#070b10);}
.wrap{height:100vh;display:flex;flex-direction:column;overflow:hidden}

.hdr{display:flex;align-items:center;gap:18px;padding:13px 28px;border-bottom:1px solid var(--rule);background:var(--bg-deep);flex:0 0 auto}
.wordmark{font-size:15px;font-weight:400;letter-spacing:.30em;text-transform:uppercase;background:linear-gradient(180deg,#fff1c9,#e8c47a 45%,#b48740);-webkit-background-clip:text;background-clip:text;color:transparent}
.hdr-tabs{display:flex;margin-left:24px}
.htab{background:none;border:none;border-bottom:1px solid transparent;color:var(--ink-faint);cursor:pointer;font-family:'Sora';font-size:11px;letter-spacing:.22em;text-transform:uppercase;padding:6px 20px;font-weight:400;transition:.2s}
.htab:hover{color:var(--ink-mute)} .htab.on{color:var(--gold);border-bottom-color:var(--gold)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.status{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint)}
.run-btn{padding:9px 22px;background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#06121a;border:none;border-radius:3px;font-family:'Sora';font-weight:700;font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;cursor:pointer;box-shadow:0 6px 18px -8px rgba(214,170,89,.5)}
.run-btn:active{transform:translateY(1px)} .run-btn:disabled{filter:saturate(.3) brightness(.7);cursor:wait}

.page{flex:1 1 auto;min-height:0;display:none;flex-direction:column;padding:0 28px 22px}
.page.on{display:flex}
.eyebrow{font-size:10px;color:var(--ink-mute);letter-spacing:.3em;text-transform:uppercase;font-weight:500;display:flex;align-items:center;gap:12px}
.eyebrow::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--rule-bright),transparent);max-width:320px}

/* SCENARIOS */
.page[data-page="scenarios"]{overflow-y:auto;overflow-x:hidden}
.page[data-page="scenarios"] .eyebrow{position:sticky;top:0;z-index:25;background:var(--bg);padding:20px 0 16px}
.scn-band{position:sticky;top:53px;z-index:20;display:grid;grid-template-columns:148px repeat(3,1fr);background:var(--surface-2);border:1px solid var(--rule);border-radius:4px 4px 0 0;box-shadow:0 10px 22px -16px rgba(0,0,0,.9)}
.scn-band::before{content:'';position:absolute;left:0;right:0;top:-10px;height:10px;background:var(--bg)}
.band-cell{border-right:1px solid var(--rule-faint);padding:12px 14px 11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:136px}
.band-cell:last-child{border-right:none}
.band-cell.base{background:rgba(122,163,158,.05)}
.band-cell.label{align-items:flex-start;justify-content:flex-end}
.band-cell.label span{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);font-weight:500}
.col-name{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-bright);font-weight:600;text-align:center}
.col-name.base-tag{color:var(--teal-bright)}
.circle-wrap{position:relative;width:90px;height:90px}
.circle-val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.circle-val .big{font-size:25px;font-weight:300;line-height:1}
.circle-val .lbl{font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute);margin-top:3px}
.delta{font-size:10px;font-weight:600;letter-spacing:.04em;font-family:'Inter'}
.delta.up{color:var(--positive-bright)} .delta.down{color:var(--negative-bright)} .delta.flat{color:var(--ink-faint)}

.scn-levers{display:grid;grid-template-columns:148px repeat(3,1fr);border-left:1px solid var(--rule);border-right:1px solid var(--rule)}
.lev-name{display:flex;align-items:center;border-right:1px solid var(--rule-faint);border-bottom:1px solid var(--rule-faint);padding:0 12px;min-height:60px;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute);font-weight:500;line-height:1.25}
.lev-cell{display:flex;flex-direction:column;justify-content:center;gap:6px;border-right:1px solid var(--rule-faint);border-bottom:1px solid var(--rule-faint);padding:0 14px;min-height:60px}
.lev-cell.base{background:rgba(122,163,158,.04)}
.scn-levers > :nth-child(4n){border-right:none}
.lev-val{font-family:'Inter';font-size:17px;font-weight:600;color:var(--ink-bright);display:flex;align-items:baseline;gap:6px}
.lev-val.base{color:var(--teal-bright)}
.lev-val .unit{font-size:10px;color:var(--ink-faint);font-weight:500;letter-spacing:.04em}
.lev-slider{-webkit-appearance:none;width:100%;height:14px;background:transparent;cursor:pointer}
.lev-slider::-webkit-slider-runnable-track{height:2px;background:var(--rule-bright);border-radius:2px}
.lev-slider::-webkit-slider-thumb{-webkit-appearance:none;height:11px;width:11px;border-radius:50%;background:var(--gold);margin-top:-4.5px;border:2px solid var(--bg-deep)}
.lev-slider:disabled{opacity:.4;cursor:default}
.lev-slider.base-lock::-webkit-slider-thumb{background:var(--teal)}
.scn-foot{display:grid;grid-template-columns:148px repeat(3,1fr);border:1px solid var(--rule);border-top:none;border-radius:0 0 4px 4px}
.foot-cell{border-right:1px solid var(--rule-faint);padding:11px 14px;font-family:'Inter';font-size:11px;color:var(--ink-mute)}
.foot-cell:last-child{border-right:none}
.foot-cell.base{background:rgba(122,163,158,.05)}
.foot-cell b{color:var(--ink-bright);font-weight:600}

.scn-chart{flex:0 0 auto;height:300px;margin-top:16px;border:1px solid var(--rule);border-radius:4px;background:var(--surface);padding:14px 18px 8px;display:flex;flex-direction:column}
.chart-head{display:flex;align-items:baseline;gap:16px;margin-bottom:6px;flex:0 0 auto}
.chart-title{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-bright);font-weight:500}
.chart-sub{font-size:9.5px;color:var(--ink-mute);letter-spacing:.1em;text-transform:uppercase}
.chart-legend{margin-left:auto;display:flex;gap:16px}
.lg{display:flex;align-items:center;gap:6px;font-size:9.5px;color:var(--ink-mute);letter-spacing:.06em}
.lg .sw{width:14px;height:2.5px;border-radius:2px}
.chart-body{flex:1 1 auto;min-height:0}
.chart-body svg{width:100%;height:100%;display:block}

/* SEQUENCING */
.page[data-page="sequencing"]{padding-top:20px}
.seq-bar{flex:0 0 auto;display:flex;align-items:center;gap:14px;margin:14px 0}
.seq-pick{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--rule);border-radius:3px;padding:8px 14px}
.seq-pick .k{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-mute);font-weight:500}
.seq-pick select{background:var(--surface-2);border:1px solid var(--rule-bright);color:var(--ink-bright);font-family:'Sora';font-size:12px;font-weight:500;letter-spacing:.04em;padding:6px 30px 6px 12px;border-radius:3px;outline:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0 L5 6 L10 0' fill='%239aa6b9'/></svg>");background-repeat:no-repeat;background-position:right 11px center;cursor:pointer}
.seq-legend{margin-left:auto;display:flex;gap:16px}
.seq-chart{flex:1 1 auto;min-height:0;border:1px solid var(--rule);border-radius:4px;background:var(--surface);padding:16px 22px 12px;display:flex;flex-direction:column}
.seq-chart .chart-body{flex:1 1 auto}
.seq-stats{flex:0 0 auto;display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--rule);border-top:none;border-radius:0 0 4px 4px;background:var(--surface-2)}
.seq-stat{padding:11px 18px;border-right:1px solid var(--rule-faint);display:flex;flex-direction:column;gap:3px}
.seq-stat:last-child{border-right:none}
.seq-stat .k{font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);font-weight:500}
.seq-stat .v{font-family:'Inter';font-size:15px;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <header class="hdr">
    <span class="wordmark">Parallax</span>
    <div class="hdr-tabs">
      <button class="htab on" data-page="scenarios">Scenarios</button>
      <button class="htab" data-page="sequencing">Sequencing</button>
    </div>
    <div class="hdr-right">
      <span class="status" id="status">Ready</span>
      <button class="run-btn" id="run-btn">▶ Run</button>
    </div>
  </header>

  <section class="page on" data-page="scenarios">
    <div class="eyebrow"><span>Scenarios · Compare Choices</span></div>
    <div class="scn-band" id="scn-band"></div>
    <div class="scn-levers" id="scn-levers"></div>
    <div class="scn-foot" id="scn-foot"></div>
    <div class="scn-chart">
      <div class="chart-head">
        <span class="chart-title">Portfolio Balance · Today's Dollars</span>
        <span class="chart-sub" id="scn-chart-sub">Each line = one scenario, median engine path</span>
        <div class="chart-legend" id="scn-legend"></div>
      </div>
      <div class="chart-body"><svg id="scn-svg" viewBox="0 0 1000 260" preserveAspectRatio="none"></svg></div>
    </div>
  </section>

  <section class="page" data-page="sequencing">
    <div class="eyebrow"><span>Sequencing · Same Plan, Different Markets</span></div>
    <div class="seq-bar">
      <div class="seq-pick">
        <span class="k">Showing</span>
        <select id="seq-select"></select>
      </div>
      <div class="seq-legend" id="seq-legend"></div>
    </div>
    <div class="seq-chart">
      <div class="chart-head">
        <span class="chart-title">Portfolio Balance Through Real Return Sequences</span>
        <span class="chart-sub">Same plan · each line = retiring into that historical market</span>
      </div>
      <div class="chart-body"><svg id="seq-svg" viewBox="0 0 1000 320" preserveAspectRatio="none"></svg></div>
    </div>
    <div class="seq-stats" id="seq-stats"></div>
  </section>
</div>



<script type="module">
import {
  runSimulation, runHistoricalPath, generateReturnPath,
  RISK_PROFILES, ASSET_KEYS, ASSET_STATS,
  defaultPlan as plan
} from "./engine.js";
/* ╔══════════════════════════════════════════════════════════════╗
   ║  PARALLAX V2 — UI WIRING (calls the engine above)             ║
   ╚══════════════════════════════════════════════════════════════╝ */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];

/* Demo household — HNW, 58yo, retiring at 65. $2.8M total portfolio.
   $140k living + $12k healthcare; $36k SS at 67; $30k/yr savings until retire.
   Spending creates real tension: Cons ~88%, Mod ~91%, Agg ~90% success
   (aggressive line is higher but vol drag pulls success below moderate — the
   honest risk/return trade-off the tool is meant to show). */
plan.household.primary.currentAge    = 58;
plan.household.primary.retirementAge = 65;
plan.household.primary.planEndAge    = 95;
plan.portfolio.accounts.taxable.balance      = 800000;
plan.portfolio.accounts.traditional.balance  = 1600000;
plan.portfolio.accounts.roth.balance         = 400000;
plan.portfolio.accounts.taxable.basisPct     = 0.55;
plan.expenses.living     = 140000;
plan.expenses.healthcare = 12000;
plan.goals.vacation      = 12000;
plan.goals.property      = 5000;
plan.goals.gifts         = 5000;
plan.income.socialSecurity.amount   = 36000;
plan.income.socialSecurity.startAge = 67;
plan.savings.annual      = 30000;
plan.simulation.iterations = 1000;

const COLHEX=['#a9d5cf','#f0c773','#9db4e0'];

/* The three scenario columns. Each holds lever values + its last engine result.
   lever values are the ACTUAL planning values (age, $, etc.), not slider ticks. */
const RISK_LABELS={1:'30 / 70',2:'44 / 56',3:'59 / 41',4:'73 / 27',5:'88 / 12'};
function defaultLevers(){
  return {
    retireAge: plan.household.primary.retirementAge,
    ssAge:     plan.income.socialSecurity.startAge,
    spend:     plan.expenses.living,
    eventAmt:  0, eventAge: 70,
    risk:      plan.portfolio.riskProfile,
    savings:   plan.savings.annual
  };
}
// All three scenarios start identical — same levers, same results.
// The advisor moves levers to show the effect of each decision.
// Allocation is just one of the levers (risk slider), not the column identity.
const scenarios=[
  {name:'Baseline',   base:true, lev:defaultLevers(), res:null},
  {name:'Scenario B', base:false, lev:defaultLevers(), res:null},
  {name:'Scenario C', base:false, lev:defaultLevers(), res:null},
];

/* Map a scenario's levers -> engine override object. */
function leversToOverrides(L){
  const ov={};
  const baseRetire = plan.household.primary.retirementAge;
  const baseSs     = plan.income.socialSecurity.startAge;
  if(L.retireAge !== baseRetire) ov.retireDelay = L.retireAge - baseRetire;
  if(L.ssAge !== baseSs)         ov.ssDelayYears = L.ssAge - baseSs;
  // spend: express as bump fraction vs plan.expenses.living
  const baseSpend = plan.expenses.living;
  if(L.spend !== baseSpend)      ov.spendBump = (L.spend - baseSpend)/baseSpend;
  if(L.eventAmt>0){ ov.lumpSum = L.eventAmt; ov.lumpSumYear = Math.max(0, L.eventAge - plan.household.primary.currentAge); }
  if(L.savings !== plan.savings.annual) ov.savingsBump = (L.savings - plan.savings.annual)/Math.max(1,plan.savings.annual);
  return ov;
}
/* Risk lever changes the profile -> needs a plan clone, not an override. */
function planForScenario(L){
  const p=JSON.parse(JSON.stringify(plan));
  p.portfolio.riskProfile = L.risk;
  return p;
}

/* ── lever display config (label, formatter, slider range→value & back) ── */
const LEVCFG=[
  {key:'retireAge', name:'Retirement Age', min:55,max:72,step:1, fmt:v=>[v,'']},
  {key:'ssAge',     name:'SS Start Age',   min:62,max:70,step:1, fmt:v=>[v,'']},
  {key:'spend',     name:'Annual Spending',min:80000,max:300000,step:5000, fmt:v=>['$'+Math.round(v/1000)+'k','']},
  {key:'eventAmt',  name:'One-Time Event', min:0,max:400000,step:10000, fmt:(v,L)=> v>0?['$'+Math.round(v/1000)+'k','@ '+L.eventAge] : ['—','']},
  {key:'risk',      name:'Allocation',     min:1,max:5,step:1, fmt:v=>[RISK_LABELS[v],'gr/df']},
  {key:'savings',   name:'Savings / yr',   min:0,max:120000,step:5000, fmt:v=>['$'+Math.round(v/1000)+'k','']},
];

let running=false;

/* ── run the engine for all three columns (shared nothing; each its own MC) ── */
function runAll(){
  if(running) return; running=true;
  const btn=$('#run-btn'); btn.disabled=true; $('#status').textContent='Running…';
  setTimeout(()=>{
    try{
      // SHARED PATHS: generate one bundle of return paths and run every scenario
      // through the SAME markets. This is what makes the comparison valid — any
      // difference between columns is the DECISIONS, never sampling noise. With
      // identical levers, two columns now produce identical lines.
      const horizon = plan.household.primary.planEndAge - plan.household.primary.currentAge;
      const iters = plan.simulation.iterations;
      const sharedPaths = [];
      for(let i=0;i<iters;i++) sharedPaths.push(generateReturnPath(horizon));
      scenarios.forEach(s=>{
        const p=planForScenario(s.lev);
        const ov=leversToOverrides(s.lev);
        s.res=runSimulation(p, ov, sharedPaths);
      });
      renderBand(); renderFoot(); drawScenarioChart(); buildSeqSelect(); runSeq();
      $('#status').textContent='Complete';
    }catch(e){ $('#status').textContent='Error'; console.error(e); }
    btn.disabled=false; running=false;
  },20);
}

/* ── render: sticky band of circles ── */
function ring(pct){
  const r=40,c=2*Math.PI*r,off=c*(1-pct/100);
  const col= pct>=85?'#a9d3bc':pct>=70?'#f0c773':'#f0918d';
  return `<svg viewBox="0 0 100 100" width="90" height="90">
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="#26313d" stroke-width="7"/>
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="${col}" stroke-width="7" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 50 50)" style="transition:stroke-dashoffset .6s ease"/></svg>`;
}
function renderBand(){
  const base=scenarios[0].res;
  let h=`<div class="band-cell label"><span>Scenario</span></div>`;
  scenarios.forEach(s=>{
    const sr=s.res?s.res.successRate:0;
    const col= sr>=85?'var(--positive-bright)':sr>=70?'var(--gold-bright)':'var(--negative-bright)';
    let delta;
    if(s.base) delta=`<span class="delta flat">baseline</span>`;
    else{ const d=Math.round(sr-base.successRate);
      delta=`<span class="delta ${d>0?'up':d<0?'down':'flat'}">${d>0?'+':''}${d} pts vs base</span>`; }
    h+=`<div class="band-cell ${s.base?'base':''}">
      <span class="col-name ${s.base?'base-tag':''}">${s.name}</span>
      <div class="circle-wrap">${ring(sr)}
        <div class="circle-val"><span class="big" style="color:${col}">${sr.toFixed(0)}%</span><span class="lbl">Success</span></div></div>
      ${delta}</div>`;
  });
  $('#scn-band').innerHTML=h;
  $('#scn-legend').innerHTML=scenarios.map((s,i)=>`<span class="lg"><span class="sw" style="background:${COLHEX[i]}"></span>${s.name}</span>`).join('');
}

/* ── render: lever grid (built once, values update in place) ── */
function buildLevers(){
  let h='';
  LEVCFG.forEach(cfg=>{
    h+=`<div class="lev-name">${cfg.name}</div>`;
    scenarios.forEach((s,ci)=>{
      const [val,unit]=cfg.fmt(s.lev[cfg.key], s.lev);
      h+=`<div class="lev-cell ${s.base?'base':''}">
        <span class="lev-val ${s.base?'base':''}" id="lv-${ci}-${cfg.key}">${val}${unit?` <span class="unit">${unit}</span>`:''}</span>
        <input class="lev-slider ${s.base?'base-lock':''}" type="range" min="${cfg.min}" max="${cfg.max}" step="${cfg.step}"
               value="${s.lev[cfg.key]}" data-col="${ci}" data-key="${cfg.key}">
      </div>`;
    });
  });
  $('#scn-levers').innerHTML=h;
  // wire sliders
  $$('.lev-slider').forEach(sl=>{
    sl.addEventListener('input',e=>{
      const ci=+e.target.dataset.col, key=e.target.dataset.key;
      scenarios[ci].lev[key]=+e.target.value;
      const cfg=LEVCFG.find(c=>c.key===key);
      const [val,unit]=cfg.fmt(scenarios[ci].lev[key], scenarios[ci].lev);
      $(`#lv-${ci}-${key}`).innerHTML=val+(unit?` <span class="unit">${unit}</span>`:'');
      $('#status').textContent='Adjusted · Run to update';
    });
  });
}
function renderFoot(){
  let h=`<div class="foot-cell" style="color:var(--ink-faint)">Median end</div>`;
  scenarios.forEach(s=>{
    const t=s.res?fmtM(s.res.terminal.p50):'—';
    h+=`<div class="foot-cell ${s.base?'base':''}">&nbsp;<b>${t}</b></div>`;
  });
  $('#scn-foot').innerHTML=h;
}

/* ── chart helpers ── */
function fmtM(v){ if(!isFinite(v)||v<=0) return '$0'; if(v>=1e6) return '$'+(v/1e6).toFixed(1)+'M'; if(v>=1e3) return '$'+Math.round(v/1e3)+'K'; return '$'+Math.round(v); }
function pathFromRows(rows, W, H, maxBal, n){
  // rows: engine sim rows with .balance; build a polyline across plan years
  const pts=[];
  for(let i=0;i<rows.length;i++){
    const x=(i/(n-1))*W;
    const y=H-(Math.max(0,rows[i].balance)/maxBal)*H;
    pts.push(x.toFixed(1)+' '+y.toFixed(1));
  }
  return 'M '+pts.join(' L ');
}
function axes(W,H,ageStart,ageEnd,maxBal){
  let g='';
  for(let i=0;i<=4;i++){const y=H/4*i; g+=`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="#17212b"/>`;}
  // y labels
  for(let i=0;i<=4;i++){const v=maxBal*(1-i/4); g+=`<text x="6" y="${H/4*i+11}" fill="#667386" font-size="10.5" font-family="Inter">${fmtM(v)}</text>`;}
  // x age ticks every ~ (span/5)
  const span=ageEnd-ageStart;
  for(let k=0;k<=5;k++){const a=Math.round(ageStart+span*k/5); const x=W*k/5;
    g+=`<text x="${x}" y="${H-4}" fill="#667386" font-size="11" font-family="Inter" text-anchor="${k===0?'start':k===5?'end':'middle'}">Age ${a}</text>`;}
  return g;
}
function expectedAnnualReturn(riskProfile){
  // Deterministic expected REAL return for an allocation = Σ weightᵢ · meanᵢ
  // (portfolio-centric: the market enters only through the chosen allocation).
  const w=RISK_PROFILES[riskProfile].weights;
  let er=0;
  for(const k of ASSET_KEYS){ const st=ASSET_STATS[k]; if(st && w[k]) er += w[k]*st.mean; }
  return er;
}
function expectedTrajectory(res, riskProfile){
  // Fully deterministic expected path. Return = allocation's expected real return.
  // Cash flow is rebuilt from RESOLVED INPUTS (res.params) — not from any sampled
  // sim — so nothing random touches the line. Same levers ⇒ identical line;
  // change only allocation ⇒ the line fans by exactly the compounding effect of
  // that allocation over the horizon. Dispersion stays in the % circle.
  const P=res.params; if(!P) return [];
  const er=expectedAnnualReturn(riskProfile);
  const taxRate=(P.taxRates && P.taxRates.ordinary!=null) ? P.taxRates.ordinary : 0.22;
  const start=P.accounts.taxable.balance+P.accounts.traditional.balance+P.accounts.roth.balance;
  const H=P.horizonYears, age0=P.currentAge, retAge=P.retirementAge;
  const out=[start]; let bal=start;
  for(let y=0;y<H;y++){
    const age=age0+y;
    const working = age < retAge;
    // income streams (return-independent)
    const ss   = age>=P.ss.startAge ? P.ss.amount : 0;
    const oi   = (P.otherIncome.amount && age>=P.otherIncome.startAge && age<=P.otherIncome.endAge) ? P.otherIncome.amount : 0;
    const pen  = (P.pension.amount && age>=P.pension.startAge)
                 ? P.pension.amount*Math.pow(1+(P.pension.colaReal||0), age-P.pension.startAge) : 0;
    const income = ss+oi+pen;
    // outflows
    const ltc  = age>=P.ltc.onsetAge ? P.ltc.amount : 0;
    const expenses = working ? 0 : (P.expenses.living+P.expenses.housing+P.expenses.debt+P.expenses.healthcare*(P.healthcareMult||1)) + ltc;
    const goals = (P.goals.vacation||0)+(P.goals.property||0)+(P.goals.gifts||0);
    const savings = working ? (P.savingsAnnual||0) : 0;
    // portfolio shortfall (after-tax), grossed up like the engine does
    const gap = Math.max(0, (expenses+goals) - income);
    const draw = gap>0 ? gap/(1-taxRate) : 0;
    bal = bal*(1+er) + savings + (income - (expenses+goals)) ; // net of income vs needs
    // when income < needs, the negative term above already removes the shortfall;
    // tax on the withdrawal is the extra drag:
    bal -= draw*taxRate;
    if(bal<0) bal=0;
    out.push(bal);
  }
  return out;
}
function drawScenarioChart(){
  const svg=$('#scn-svg'),W=1000,H=260;
  if(!scenarios[0].res){svg.innerHTML='';return;}
  const ageStart=plan.household.primary.currentAge, ageEnd=plan.household.primary.planEndAge;
  const traj=scenarios.map(s=>expectedTrajectory(s.res, s.lev.risk));
  const n=traj[0].length;
  let maxBal=0; traj.forEach(t=>t.forEach(v=>{ if(v>maxBal)maxBal=v; }));
  maxBal=maxBal*1.05||1;
  let h=axes(W,H,ageStart,ageEnd,maxBal);
  traj.forEach((t,i)=>{
    const pts=t.map((v,idx)=>((idx/(n-1))*W).toFixed(1)+' '+(H-(Math.max(0,v)/maxBal)*H).toFixed(1));
    h+=`<path d="M ${pts.join(' L ')}" fill="none" stroke="${COLHEX[i]}" stroke-width="${scenarios[i].base?2.6:2}" stroke-linejoin="round" opacity="${scenarios[i].base?1:.92}"/>`;
  });
  svg.innerHTML=h;
  $('#scn-chart-sub').textContent=`Expected path by allocation · decisions only · Age ${ageStart} → ${ageEnd}`;
}

/* ── SEQUENCING tab ── */
const SEQ_YEARS=[1973,1982,2000,1929];
const SEQ_HEX={1973:'#e0918d',1982:'#a9d3bc',2000:'#f0c773',1929:'#9db4e0'};
function buildSeqSelect(){
  const sel=$('#seq-select');
  const cur=sel.value;
  sel.innerHTML=scenarios.map(s=>`<option>${s.name}</option>`).join('');
  if(cur) sel.value=cur;
  sel.onchange=runSeq;
}
function runSeq(){
  const sel=$('#seq-select'); const s=scenarios.find(x=>x.name===sel.value)||scenarios[0];
  const p=planForScenario(s.lev);
  // apply the same lever overrides by baking them into a resolved plan via runHistoricalPath
  // runHistoricalPath(plan, startYear, strategy) returns a single coherent path
  const strat=p.portfolio.withdrawalStrategy||'taxable-first';
  const runs=SEQ_YEARS.map(y=>({year:y, path:runHistoricalPath(p, y, strat)}));
  drawSeqChart(runs);
  renderSeqStats(runs);
  $('#seq-legend').innerHTML=SEQ_YEARS.map(y=>`<span class="lg"><span class="sw" style="background:${SEQ_HEX[y]}"></span>${y}</span>`).join('');
}
function seqRows(run){ return run.path.rows || run.path; }
function drawSeqChart(runs){
  const svg=$('#seq-svg'),W=1000,H=320;
  const ageStart=plan.household.primary.currentAge, ageEnd=plan.household.primary.planEndAge;
  let maxBal=0,n=0;
  runs.forEach(r=>{const rows=seqRows(r); n=Math.max(n,rows.length); rows.forEach(x=>{if(x.balance>maxBal)maxBal=x.balance;});});
  maxBal=maxBal*1.05||1;
  let h=axes(W,H,ageStart,ageEnd,maxBal);
  runs.forEach(r=>{const rows=seqRows(r);
    h+=`<path d="${pathFromRows(rows,W,H,maxBal,n)}" fill="none" stroke="${SEQ_HEX[r.year]}" stroke-width="2.2" stroke-linejoin="round"/>`;});
  svg.innerHTML=h;
}
function renderSeqStats(runs){
  $('#seq-stats').innerHTML=runs.map(r=>{
    const rows=seqRows(r); const last=rows[rows.length-1];
    const failed = rows.some(x=>x.balance<=0);
    let outcome, col;
    if(failed){ const f=rows.find(x=>x.balance<=0); outcome='Depleted @ '+ (f? (plan.household.primary.currentAge+rows.indexOf(f)) : '—'); col='var(--negative-bright)'; }
    else { outcome=fmtM(last.balance); col='var(--positive-bright)'; }
    return `<div class="seq-stat"><span class="k">Retire into ${r.year}</span><span class="v" style="color:${col}">${outcome}</span></div>`;
  }).join('');
}

/* ── tab switch + boot ── */
$$('.htab').forEach(t=>t.onclick=()=>{
  $$('.htab').forEach(x=>x.classList.remove('on'));
  $$('.page').forEach(x=>x.classList.remove('on'));
  t.classList.add('on'); $(`.page[data-page="${t.dataset.page}"]`).classList.add('on');
  if(t.dataset.page==='scenarios') drawScenarioChart();
  if(t.dataset.page==='sequencing') runSeq();
});
$('#run-btn').onclick=runAll;

buildLevers();
runAll();   // first iteration runs immediately so the tool opens populated
</script>
