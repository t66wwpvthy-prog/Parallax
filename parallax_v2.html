<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Parallax V2</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  /* LIGHT REPORT — warm "paper" financial document. Dark slate ink on
     off-white; brass + slate accents. Gold is reserved for emphasis
     (probability rings, the active-tab underline) — never header/body text
     on beige, where its contrast is too weak. Results read as slate
     (strong) / brass (caution) / clay (at-risk). */
  --bg-deep:#e7e1d4; --bg:#f4efe6;
  --surface:#fbf8f1; --surface-2:#ffffff; --surface-3:#f1ece1;
  --rule:#d8d0bf; --rule-bright:#c2b8a2; --rule-faint:#e8e2d5;
  --ink:#23282e; --ink-bright:#11151a; --ink-mute:#5d6671; --ink-faint:#8a93a0; --ink-ghost:#c2c8d0;
  --gold:#9a7322; --gold-bright:#b88c30; --gold-deep:#6f521a; --gold-glow:rgba(154,115,34,.10);
  --teal:#3f6b78; --teal-bright:#557f8c; --teal-deep:#2c4d57; --teal-glow:rgba(63,107,120,.10);
  /* Result language on paper: deep green (strong) / bronze gold (caution,
     via --gold) / deep burgundy (at-risk). Tuned dark enough to read on the
     off-white ground. */
  --positive:#16401f; --positive-bright:#194a2c;
  --negative:#7e2b38; --negative-bright:#8f3340;
  --s1:#9a7322; --s2:#3f6b78; --s3:#7d5a82;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:'Sora',sans-serif;color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;overflow:hidden}
body{background:radial-gradient(1200px 600px at 88% -12%, var(--gold-glow), transparent 60%),linear-gradient(180deg,#f6f2ea,var(--bg) 44%,#ece5d8);}
.wrap{height:100vh;display:flex;flex-direction:column;overflow:hidden}

.hdr{display:flex;align-items:center;gap:18px;padding:13px 28px;border-bottom:1px solid var(--rule);background:var(--bg-deep);flex:0 0 auto}
.wordmark{font-size:15px;font-weight:600;letter-spacing:.30em;text-transform:uppercase;color:var(--ink-bright)}
.hdr-tabs{display:flex;margin-left:24px}
.htab{background:none;border:none;border-bottom:2px solid transparent;color:var(--ink-mute);cursor:pointer;font-family:'Sora';font-size:12px;letter-spacing:.2em;text-transform:uppercase;padding:6px 20px;font-weight:500;transition:color .2s,border-color .2s}
.htab:hover{color:var(--ink)} .htab.on{color:var(--ink-bright);font-weight:600;border-bottom-color:var(--gold)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.status{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute)}
.run-btn{padding:9px 22px;background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#06121a;border:none;border-radius:3px;font-family:'Sora';font-weight:700;font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;cursor:pointer;box-shadow:0 6px 18px -8px rgba(214,170,89,.5)}
.run-btn:active{transform:translateY(1px)} .run-btn:disabled{filter:saturate(.3) brightness(.7);cursor:wait}

.page{flex:1 1 auto;min-height:0;display:none;flex-direction:column;padding:0 28px 22px}
.page.on{display:flex}
.eyebrow{font-size:11.5px;color:var(--ink-mute);letter-spacing:.26em;text-transform:uppercase;font-weight:500;display:flex;align-items:center;gap:12px}
.eyebrow::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--rule-bright),transparent);max-width:320px}

/* SCENARIOS */
.page[data-page="scenarios"]{overflow-y:auto;overflow-x:hidden}
/* Cap the scenarios block so columns don't stretch across a wide monitor.
   ~210px per scenario + the 148px label gutter; centered. */
.scn-scroll,.page[data-page="scenarios"] .cf-toggle,.page[data-page="scenarios"] .cf-drawer{max-width:1180px;width:100%;margin-left:auto;margin-right:auto}
.page[data-page="scenarios"] .eyebrow{position:sticky;top:0;z-index:25;background:var(--bg);padding:20px 0 16px}
.scn-band{position:sticky;top:53px;z-index:20;display:grid;grid-template-columns:148px repeat(3,1fr);background:var(--surface);border:1px solid var(--rule);border-radius:4px 4px 0 0}
.scn-band::before{content:'';position:absolute;left:0;right:0;top:-10px;height:10px;background:var(--bg)}
.band-cell{border-right:1px solid var(--rule-faint);padding:14px 14px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;min-height:172px}
.band-cell:last-child{border-right:none}
.band-cell.base{background:rgba(63,107,120,.05)}
.band-cell.label{align-items:flex-start;justify-content:flex-end}
.band-cell.label span{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mute);font-weight:500}
.col-name{font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-bright);font-weight:600;text-align:center;display:flex;align-items:center;justify-content:center;gap:7px}
.col-name.base-tag{color:var(--teal-bright)}
.col-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
/* Inline rename field — looks like the label until focused, then shows it's
   editable. Sized to content via a generous max so longer names fit. */
.col-rename{font-family:'Sora';font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;color:var(--ink-bright);background:transparent;border:none;border-bottom:1px dashed transparent;text-align:center;width:128px;padding:1px 2px;outline:none}
.col-rename:hover{border-bottom-color:var(--rule-bright)}
.col-rename:focus{border-bottom-color:var(--gold)}
.col-x{background:none;border:none;color:var(--ink-faint);font-size:11px;cursor:pointer;padding:0 2px;line-height:1;opacity:0;transition:opacity .15s,color .15s}
.band-cell:hover .col-x{opacity:1}
.col-x:hover{color:var(--negative-bright)}
.add-scen,.solve-btn{margin-top:8px;background:none;border:1px dashed var(--rule-bright);color:var(--ink-mute);font-family:'Sora';font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;padding:5px 10px;border-radius:4px;cursor:pointer;display:block}
.add-scen:hover,.solve-btn:hover{border-color:var(--gold);color:var(--gold)}
/* Solver inline form (replaces the +Add / Solve buttons when armed). Tight,
   single-column, lives in the band gutter so it doesn't disturb layout. */
.solver-form{margin-top:8px;display:flex;flex-direction:column;gap:6px;font-family:'Sora';font-size:11px;color:var(--ink-mute);letter-spacing:.04em;text-align:left}
.sf-q{display:flex;align-items:baseline;gap:4px}
.sf-in{font-family:'Inter';font-size:13px;font-weight:600;color:var(--ink-bright);background:transparent;border:none;border-bottom:1px dashed var(--rule-bright);padding:0 2px;outline:none;text-align:right;-moz-appearance:textfield;width:40px}
.sf-in::-webkit-outer-spin-button,.sf-in::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.sf-in:focus{border-bottom-color:var(--gold)}
.sf-actions{display:flex;gap:6px;margin-top:4px}
.sf-go,.sf-cancel{font-family:'Sora';font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;padding:5px 9px;border-radius:4px;cursor:pointer;border:1px solid var(--rule-bright);background:none}
.sf-go{color:var(--gold-bright);border-color:var(--gold)}
.sf-go:hover{background:var(--gold);color:#fff}
.sf-cancel{color:var(--ink-faint)}
.sf-cancel:hover{color:var(--ink)}
/* Per-row loading spinner during a solve. Sits in place of the lever value
   until that row resolves; tiny pulse so it reads as work in progress. */
.lev-val.solving{color:var(--ink-faint);font-style:italic;opacity:.7}
.lev-val.solving::after{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);margin-left:6px;animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
/* When a lever value was set by the solver, mark it subtly so the advisor knows
   it came from a solve (not their drag). Underline in brass; removed on edit. */
.lev-val.solved{border-bottom:1px dotted var(--gold);padding-bottom:1px}
.lev-val.solved-capped{color:var(--negative-bright)}
.circle-wrap{position:relative;width:118px;height:118px}
.circle-val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.circle-val .big{font-size:28px;font-weight:400;line-height:1;font-family:'Inter';letter-spacing:-.01em}
.circle-val .lbl{font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-mute);margin-top:3px}

.scn-levers{display:grid;grid-template-columns:148px repeat(3,1fr);border-left:1px solid var(--rule);border-right:1px solid var(--rule)}
.lev-name{display:flex;align-items:center;border-right:1px solid var(--rule-faint);border-bottom:1px solid var(--rule-faint);padding:0 14px;min-height:74px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mute);font-weight:500;line-height:1.3}
.lev-cell{display:flex;flex-direction:column;justify-content:center;gap:10px;border-right:1px solid var(--rule-faint);border-bottom:1px solid var(--rule-faint);padding:0 14px;min-height:74px}
.lev-cell.base{background:rgba(63,107,120,.04)}
.scn-levers .lev-cell.col-last{border-right:none}
.lev-val{font-family:'Inter';font-size:17px;font-weight:600;color:var(--ink-bright);display:flex;align-items:baseline;gap:6px}
.lev-val.base{color:var(--teal-bright)}
.lev-val .unit{font-size:10px;color:var(--ink-faint);font-weight:500;letter-spacing:.04em}
/* Inline pension-amount input: appears when the lever lands on an age that has
   no entered benefit yet. Looks like part of the value display (not an error).
   The "$" prefix sits in the normal value color; the input is borderless and
   inherits the typography so it reads as a natural prompt for a number. */
.lev-val .pen-in{font-family:'Inter';font-size:15px;font-weight:600;color:var(--ink-bright);background:transparent;border:none;border-bottom:1px dashed var(--rule-bright);width:84px;padding:0 2px;outline:none;text-align:right}
.lev-val .pen-in::placeholder{color:var(--ink-faint);font-weight:500}
.lev-val .pen-in:focus{border-bottom-color:var(--gold)}
/* Inline type-in boxes for the dollar/age levers. Same quiet dashed underline
   as the pension box; width tuned per content (dollars wider, age narrow). */
.lev-val .lev-in{font-family:'Inter';font-size:17px;font-weight:600;color:var(--ink-bright);background:transparent;border:none;border-bottom:1px dashed var(--rule-bright);width:78px;padding:0 2px;outline:none;text-align:right}
.lev-val .lev-in:focus{border-bottom-color:var(--gold)}
.lev-val .lev-in.age-in{width:34px;text-align:center}
.lev-slider{-webkit-appearance:none;width:100%;height:14px;background:transparent;cursor:pointer}
.lev-slider::-webkit-slider-runnable-track{height:2px;background:var(--rule-bright);border-radius:2px}
.lev-slider::-webkit-slider-thumb{-webkit-appearance:none;height:11px;width:11px;border-radius:50%;background:var(--gold);margin-top:-4.5px;border:2px solid var(--bg-deep)}
.lev-slider:disabled{opacity:.4;cursor:default}
.lev-slider.base-lock::-webkit-slider-thumb{background:var(--teal)}
.scn-foot{display:grid;grid-template-columns:148px repeat(3,1fr);border:1px solid var(--rule);border-top:none;border-radius:0 0 4px 4px}
.foot-cell{border-right:1px solid var(--rule-faint);padding:12px 14px;font-family:'Inter';font-size:12.5px;color:var(--ink-mute)}
.foot-cell:last-child{border-right:none}
.foot-cell.base{background:rgba(63,107,120,.05)}
.foot-cell b{color:var(--ink-bright);font-weight:600}

/* Shared chart chrome (used by the Sequencing chart). */
.chart-head{display:flex;align-items:baseline;gap:16px;margin-bottom:6px;flex:0 0 auto}
.chart-title{font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-bright);font-weight:600}
.chart-sub{font-size:11px;color:var(--ink-mute);letter-spacing:.06em;text-transform:uppercase}
.lg{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-mute);letter-spacing:.04em}
.lg .sw{width:16px;height:3px;border-radius:2px}
.chart-body{flex:1 1 auto;min-height:0;position:relative}
.chart-body svg{width:100%;height:100%;display:block}

/* SEQUENCING */
.page[data-page="sequencing"]{padding-top:20px;overflow-y:auto}
.seq-bar{flex:0 0 auto;display:flex;align-items:center;gap:14px;margin:14px 0}
.seq-pick{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--rule);border-radius:3px;padding:8px 14px}
.seq-pick .k{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);font-weight:500}
.seq-pick select{background:var(--surface-2);border:1px solid var(--rule-bright);color:var(--ink-bright);font-family:'Sora';font-size:12px;font-weight:500;letter-spacing:.04em;padding:6px 30px 6px 12px;border-radius:3px;outline:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0 L5 6 L10 0' fill='%239aa6b9'/></svg>");background-repeat:no-repeat;background-position:right 11px center;cursor:pointer}
.seq-legend{margin-left:auto;display:flex;gap:16px;flex-wrap:wrap}
.seq-legend .lg{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-mute);font-family:'Sora';letter-spacing:.03em}
.seq-legend .sw{display:inline-block;width:22px;border-top:3px solid;border-radius:2px}
.seq-legend .sw.dash{border-top-style:dashed}
.seq-chips{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-left:6px}
.seq-chip{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--rule);color:var(--ink-mute);font-family:'Sora';font-size:11px;letter-spacing:.03em;padding:6px 11px;border-radius:14px;cursor:pointer;transition:opacity .12s,border-color .12s;opacity:.45}
.seq-chip .cdot{width:9px;height:9px;border-radius:50%;flex:none}
.seq-chip.on{opacity:1;border-color:var(--rule-bright);color:var(--ink-bright)}
.seq-chip:hover{opacity:.85}
.seq-chart{flex:0 0 auto;border:1px solid var(--rule);border-radius:4px;background:var(--surface);padding:16px 22px 12px;display:flex;flex-direction:column}
.seq-chart .chart-body{flex:1 1 auto;min-height:300px}
/* Two path FINGERPRINTS, side by side: forward vs reversed. Each line is a
   direct read of the engine's single-path result — no UI-computed metrics. */
.seq-prints{flex:0 0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;margin-top:16px}
.seq-print{border:1px solid var(--rule);border-radius:6px;background:var(--surface);padding:13px 15px 6px}
.seq-print h4{display:flex;align-items:center;gap:9px;margin:0 0 8px;font-family:'Sora';font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;color:var(--ink-bright)}
.seq-print h4 .dot{display:inline-block;width:20px;border-top:3px solid;border-radius:2px}
.seq-print h4 .dot.dash{border-top-style:dashed}
.seq-print .pr-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--rule-faint);font-size:13px}
.seq-print .pr-row:last-child{border-bottom:none}
.seq-print .pr-k{color:var(--ink-mute);font-family:'Sora'}
.seq-print .pr-v{font-family:'Inter';font-weight:600;color:var(--ink-bright);font-variant-numeric:tabular-nums}
/* Inputs — the HOUSEHOLD SHEET. Not a grid of boxed cards (that read as a tax
   form); an open financial statement. Sections are separated by hairline
   eyebrow rules, fields are boxless (a dashed baseline that lights gold on
   focus — the same edit language as the Scenarios levers), and each money
   section closes with a live running subtotal so the page reads like a real
   statement you'd hand across the desk. */
.page[data-page="inputs"]{padding-top:24px;overflow-y:auto}
/* One-line living recap of the plan's shape — updates as inputs change. */
.inp-recap{max-width:980px;margin:4px 0 26px;font-family:'Inter';font-size:13.5px;color:var(--ink-mute);display:flex;flex-wrap:wrap;align-items:baseline;gap:5px 16px;line-height:1.5}
.inp-recap b{font-weight:600;color:var(--ink-bright)}
.inp-recap .sep{color:var(--ink-ghost)}
/* Sections flow organically down two balanced columns — no card chrome. */
.inp-sheet{column-count:2;column-gap:56px;max-width:980px}
.inp-group{break-inside:avoid;margin-bottom:28px}
.inp-group h3{display:flex;align-items:center;gap:12px;margin:0 0 3px;font-family:'Sora';font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold)}
.inp-group h3::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--rule-bright),transparent)}
.inp-row{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:9px 2px;border-bottom:1px solid var(--rule-faint)}
.inp-row:last-child{border-bottom:none}
.inp-row label{font-size:13.5px;color:var(--ink-mute);font-family:'Sora';font-weight:400}
.inp-row .field{display:flex;align-items:baseline;gap:4px}
.inp-row .pre{color:var(--ink-faint);font-size:13px;font-family:'Inter'}
/* Boxless inputs: transparent, dashed baseline → solid gold on focus. */
.inp-row input,.inp-row select{font-family:'Inter';font-size:16px;font-weight:600;color:var(--ink-bright);background:transparent;border:none;border-bottom:1px dashed var(--rule-bright);border-radius:0;padding:2px 1px;width:116px;text-align:right;outline:none;transition:border-color .15s,background .15s}
.inp-row input:hover,.inp-row select:hover{border-bottom-color:var(--gold)}
.inp-row input:focus,.inp-row select:focus{border-bottom:1px solid var(--gold);background:rgba(154,115,34,.05)}
.inp-row select{text-align:left;width:auto;min-width:150px;font-size:14px;font-weight:500;appearance:none;cursor:pointer;padding-right:20px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0 L5 6 L10 0' fill='%238a93a0'/></svg>");background-repeat:no-repeat;background-position:right 2px center}
/* Section subtotal — the statement's running truth. Slate, not an input. */
.inp-total{display:flex;align-items:baseline;justify-content:space-between;gap:18px;padding:10px 2px 0;margin-top:3px;border-top:1px solid var(--rule)}
.inp-total .t-label{font-family:'Sora';font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.inp-total .t-val{font-family:'Inter';font-size:16px;font-weight:600;color:var(--teal-deep)}
.inp-total .t-val small{font-weight:500;color:var(--ink-mute);font-size:12.5px;margin-left:7px}
/* Quiet "remove this row" affordance for dynamic groups like Pension. Lives in
   the row, muted; turns negative red on hover so the destructive action reads
   clearly only when the advisor reaches for it. */
.inp-row .row-x{margin-left:8px;width:22px;height:22px;border:none;background:transparent;color:var(--ink-faint);font-size:18px;line-height:1;cursor:pointer;border-radius:4px;padding:0}
.inp-row .row-x:hover{color:var(--negative-bright);background:rgba(240,145,141,.08)}

/* Year-by-year cash-flow drawer on the Scenarios page. Three scenarios side
   by side; each scenario's columns are softly tinted in its line color so the
   eye groups them without needing dividers. The Age column is sticky so the
   advisor can scroll into late years and still know which row they're reading. */
.cf-toggle{margin:18px 0 12px;display:flex;justify-content:flex-end}
.cf-toggle button{background:transparent;border:1px solid var(--rule);color:var(--ink-mute);font-family:'Sora';font-size:11px;letter-spacing:.16em;text-transform:uppercase;padding:8px 16px;border-radius:5px;cursor:pointer}
.cf-toggle button:hover{color:var(--gold);border-color:var(--gold)}
.cf-drawer{border:1px solid var(--rule);border-radius:8px;background:var(--surface);overflow:hidden;margin-bottom:18px}
.cf-drawer-head{padding:12px 18px;border-bottom:1px solid var(--rule);font-family:'Sora';font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);display:flex;justify-content:space-between;align-items:center}
.cf-drawer-head .sub{color:var(--ink-faint);font-family:'Sora';font-weight:400;letter-spacing:.04em;text-transform:none;font-size:11px}
.cf-scroll{max-height:460px;overflow:auto}
.cf-empty{padding:26px 18px;color:var(--ink-mute);font-family:'Sora';font-size:13px;text-align:center}
.cf-table{width:100%;border-collapse:collapse;font-family:'Inter';font-size:12px;font-variant-numeric:tabular-nums}
.cf-table thead{position:sticky;top:0;background:var(--surface-2);z-index:2}
.cf-table th,.cf-table td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--rule-faint);white-space:nowrap}
.cf-table th{font-weight:500;color:var(--ink-mute);font-size:10px;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--rule)}
.cf-table th.scen{text-align:center;font-weight:600;letter-spacing:.12em}
.cf-table th.age, .cf-table td.age{position:sticky;left:0;background:var(--surface);text-align:left;color:var(--ink);font-weight:600;z-index:1}
.cf-table thead th.age{background:var(--surface-2)}
.cf-table td.dim{color:var(--ink-faint)}
/* Alternating per-scenario column tint in the cash-flow table — two faint
   washes that cycle regardless of how many scenarios there are. */
.cf-g0{background:rgba(63,107,120,.045)} .cf-g1{background:rgba(154,115,34,.05)}
.cf-table tr.retire td{border-top:1px dashed var(--gold);}
.cf-table tr.retire td.age::after{content:'  retire';color:var(--gold);font-size:10px;font-weight:500;letter-spacing:.1em}

/* ──────────────────────────────────────────────────────────────────────────
   PHONE / TOUCH (iOS-first). The desktop layout is a fixed 100vh, no-scroll,
   multi-column grid — unusable on a phone. Below 760px we: let the whole app
   scroll vertically; stack the header; enlarge sliders and tap targets; and
   keep the three scenario columns column-aligned by letting that block scroll
   horizontally as a unit (band + levers + foot share one min-width so their
   columns stay registered). Charts already scale via SVG viewBox.
   ────────────────────────────────────────────────────────────────────────── */
@media (max-width:760px){
  html,body{overflow:auto;font-size:15px;-webkit-text-size-adjust:100%}
  .wrap{height:auto;min-height:100vh;overflow:visible}

  /* Header wraps; tabs become a scrollable row; Run stays reachable. */
  .hdr{flex-wrap:wrap;gap:10px 14px;padding:12px 16px;position:sticky;top:0;z-index:60}
  .hdr-tabs{margin-left:0;order:3;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .htab{padding:8px 16px;font-size:13px;white-space:nowrap}
  .hdr-right{gap:12px}
  .run-btn{padding:11px 20px;font-size:12px}

  .page{padding:0 14px 28px}
  .page[data-page="scenarios"]{overflow-x:visible}
  .page[data-page="scenarios"] .eyebrow{position:static;padding:16px 0 12px}

  /* Scenario comparison: scroll the band+levers+foot together horizontally so
     the % circles, sliders, and totals stay in the same three columns. */
  .scn-band,.scn-levers,.scn-foot{min-width:620px}
  .scn-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:4px}
  .scn-band{position:static;box-shadow:none}
  .scn-band::before{display:none}

  /* Bigger touch targets on the sliders. */
  .lev-slider{height:30px}
  .lev-slider::-webkit-slider-thumb{height:22px;width:22px;margin-top:-10px;border-width:3px}
  .lev-slider::-webkit-slider-runnable-track{height:3px}
  .lev-val{font-size:18px}

  .chart-head{flex-wrap:wrap;gap:6px 14px}

  /* Inputs: single column. */
  .inp-sheet{column-count:1;max-width:none}
  .inp-recap{max-width:none}
  .inp-row input,.inp-row select{font-size:16px;width:120px} /* 16px avoids iOS zoom-on-focus */

  /* Sequencing: selector + stats stack. */
  .seq-bar{flex-wrap:wrap}
  .seq-legend{margin-left:0;width:100%;flex-wrap:wrap;gap:10px 16px}
  .seq-chart{min-height:340px}
  .seq-stats{grid-template-columns:repeat(2,1fr)}

  /* Cash-flow drawer scrolls both axes on a phone. */
  .cf-scroll{max-height:none}
  .cf-toggle{justify-content:stretch}
  .cf-toggle button{width:100%}
}
</style>

<body>

    <div class="hdr-tabs">

         cash-flow drawer already say. A richer wealth-path visual is planned for
         the Sequencing tab, where sequence-of-returns risk gives it real teeth. -->
    <!-- Cash-flow drawer: expand to see the year-by-year breakdown for each
         scenario (income, withdrawals, ending balance), side-by-side. The
         engine already emits these rows from its typical simulated path —
         this is purely a view of existing truth, no new math. -->

        <span class="chart-sub" id="seq-sub">One plan held fixed · retiring into four real markets · today's dollars</span>
      </div>

<script type="module">
import {
  runSimulation, runHistoricalPath, generateReturnPath, resetSeed,
  defaultPlan as plan
} from "./engine.js";
/* ╔══════════════════════════════════════════════════════════════╗
   ║  PARALLAX V2 — UI WIRING (calls the engine above)             ║
   ╚══════════════════════════════════════════════════════════════╝ */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];

/* Demo household — HNW, 58yo, retiring at 65. $2.8M total portfolio.
   $205k living + $12k healthcare; two-earner SS ($48k + $30k at 67); $30k/yr
   savings until retire. Spend set against realistic SS to keep real tension:
   Baseline (Moderate, ret 65) ~76% — a plan that needs attention. Moving levers
   shows it honestly: retiring 2yr later lifts success markedly; going aggressive
   raises the wealth line but leaves success BELOW the retire-later case (vol
   drag) — the risk/return truth the tool exists to show. */
plan.household.primary.currentAge    = 58;
plan.household.primary.retirementAge = 65;
plan.household.primary.planEndAge    = 95;
plan.portfolio.accounts.taxable.balance      = 800000;
plan.portfolio.accounts.traditional.balance  = 1600000;
plan.portfolio.accounts.roth.balance         = 400000;
plan.portfolio.accounts.taxable.basisPct     = 0.55;
plan.expenses.living     = 205000;
plan.expenses.healthcare = 12000;
plan.goals.vacation      = 12000;
plan.goals.property      = 5000;
plan.goals.gifts         = 5000;
// Two earners: one maxed (~$48k PIA at FRA), spouse a strong earner (~$30k).
// pia = benefit at FRA (67) in today's dollars, straight off the SSA statement.
plan.income.socialSecurity.primary = { pia: 48000, claimAge: 67 };
plan.income.socialSecurity.spouse  = { pia: 30000, claimAge: 67 };
// Demo pension: only the two ages the statement actually quoted. The engine
// pays exactly what's entered for the chosen age and nothing in between —
// no interpolation, no invented numbers (see engine.test.js).
plan.income.pension = { benefitByAge: { 62: 36000, 63: 38160, 64: 40320, 65: 42480 }, startAge: 65, colaPct: 0 };
plan.savings.annual      = 30000;
plan.simulation.iterations = 1000;

// Scenario accent palette. Brass / steel-teal / dusty mauve are the core trio
// (matches --s1/2/3); two more earthy tones extend it when the advisor adds a
// 4th/5th scenario. colorFor() cycles the palette so any count gets a color.
// No green here (reserved for the success language) and no mint.
const SCEN_PALETTE=['#9a7322','#3f6b78','#7d5a82','#6f7a52','#9a5a3f'];
const colorFor=i=>SCEN_PALETTE[i % SCEN_PALETTE.length];
const MAX_SCENARIOS=5;
// Back-compat alias for code that still reads COLHEX by index.
const COLHEX=SCEN_PALETTE;

/* The three scenario columns. Each holds lever values + its last engine result.
   lever values are the ACTUAL planning values (age, $, etc.), not slider ticks. */
const RISK_LABELS={1:'30 / 70',2:'44 / 56',3:'59 / 41',4:'73 / 27',5:'88 / 12'};
function defaultLevers(){
  const L={
    retireAge:  plan.household.primary.retirementAge,
    ssAge:      plan.income.socialSecurity.primary.claimAge,
    spend:      plan.expenses.living,
    eventAmt:   0, eventAge: 70,
    risk:       plan.portfolio.riskProfile,
    savings:    plan.savings.annual,
    // pensionAge tracks retirement by DEFAULT (most people switch on a pension
    // when they retire — no reason to take taxable fixed income while still
    // earning). pensionAuto stays true until the advisor grabs the pension
    // slider, which frees it to hold any quoted age independently.
    pensionAuto: true,
    pensionAge: (plan.income.pension && plan.income.pension.startAge) || 65
  };
  syncPension(L);
  return L;
}
// If pension is still auto-linked, snap its claim age to the retirement age,
// clamped into the household's quoted pension range. No-op once the advisor has
// taken manual control of the pension lever (pensionAuto=false).
function syncPension(L){
  if(!L.pensionAuto) return;
  const a=pensionAges();
  const lo = a.length ? a[0] : 62, hi = a.length ? a[a.length-1] : 65;
  L.pensionAge = Math.max(lo, Math.min(hi, L.retireAge));
}
// ── Scenario persistence (browser localStorage) ──────────────────────────
// We save only the durable parts (name/base/lev) — never res (recomputed on
// Run). Wrapped in try/catch so a corrupt/blocked store never breaks the app.
const SCEN_KEY='parallax.scenarios.v2';
function saveScenarios(){
  try{
    const slim=scenarios.map(s=>({name:s.name, base:!!s.base, lev:s.lev}));
    localStorage.setItem(SCEN_KEY, JSON.stringify(slim));
  }catch(e){/* storage full/blocked — stay in-memory, no crash */}
}
function loadScenarios(){
  try{
    const raw=localStorage.getItem(SCEN_KEY);
    if(!raw) return null;
    const arr=JSON.parse(raw);
    if(!Array.isArray(arr) || !arr.length || !arr[0].base) return null;  // sanity
    // Backfill any lever keys added since the save (forward-compat) so old saves
    // don't break when defaultLevers() grows new fields.
    const proto=defaultLevers();
    return arr.map(s=>({ name:String(s.name||'Scenario'), base:!!s.base,
                         lev:{...proto, ...s.lev}, res:null }));
  }catch(e){ return null; }
}
// Wipe saved state and return to the first-run demo (escape hatch).
function resetScenarios(){
  try{ localStorage.removeItem(SCEN_KEY); }catch(e){}
  scenarios=demoScenarios(); baseSnapshot=defaultLevers();
  buildLevers(); plansDirty=true; runAll();
}
// Add a new scenario (clones the current baseline's levers so it starts as a
// neutral copy the advisor then adjusts). Capped at MAX_SCENARIOS.
function addScenario(){
  if(scenarios.length>=MAX_SCENARIOS) return;
  const baseLev=scenarios.find(s=>s.base)?.lev || defaultLevers();
  const n=scenarios.filter(s=>!s.base).length;
  scenarios.push({ name:`Scenario ${String.fromCharCode(66+n)}`, base:false,
                   lev:JSON.parse(JSON.stringify(baseLev)), res:null });
  saveScenarios(); buildLevers(); plansDirty=true; runAll();
}
// Remove a non-baseline scenario by index.
function removeScenario(ci){
  if(ci<=0 || ci>=scenarios.length || scenarios[ci].base) return;
  scenarios.splice(ci,1);
  saveScenarios(); buildLevers(); plansDirty=true; runAll();
}

// ── Solver ──────────────────────────────────────────────────────────────
// Run the engine for one trial set of levers and return the success %.
// Reuses sharedPaths (the cached return-path bundle) so every trial sees the
// same markets — apples-to-apples, deterministic with our seeded RNG.
function trySuccess(L){
  const p = planForScenario(L);
  const ov = leversToOverrides(L);
  return runSimulation(p, ov, sharedPaths).successRate;
}
// Solve ONE lever: holding all others at `baseLev`, find the value of `key`
// closest to its baseline that achieves >= targetPct. Returns { value,
// reachedPct, capped }. capped=true means even the lever's most-aggressive
// extreme can't reach the target — we return that extreme + the % it hit.
// We detect monotonicity by sampling the two ends rather than hard-coding
// per-lever direction, so future levers don't need special wiring.
function solveLeverFor(baseLev, key, targetPct){
  const cfg = LEVCFG.find(c=>c.key===key);
  if(!cfg) return null;
  const r = levRange(cfg);
  const lo = r.min, hi = r.max, step = r.step;
  if(lo === hi) return { value: lo, reachedPct: trySuccess({...baseLev,[key]:lo}), capped:false };
  const pctAt = v => trySuccess({...baseLev, [key]: v});
  const pctLo = pctAt(lo), pctHi = pctAt(hi);
  const increases = pctHi >= pctLo;                  // success rises with higher value?
  const best      = Math.max(pctLo, pctHi);
  const bestVal   = (pctHi >= pctLo) ? hi : lo;
  if(best < targetPct){ return { value: bestVal, reachedPct: best, capped: true }; }
  // Bisect for the value closest to baseline that meets target. We track the
  // smallest "passing" value on the side of monotonicity.
  let a = lo, b = hi;
  for(let i = 0; i < 9; i++){
    const mid = Math.max(lo, Math.min(hi, Math.round(((a+b)/2) / step) * step));
    if(mid === a || mid === b) break;
    const pct = pctAt(mid);
    const meets = pct >= targetPct;
    // For positive direction (success rises with value): we want SMALLEST value
    // that meets. For inverse: we want LARGEST value that meets.
    if(increases){ if(meets) b = mid; else a = mid; }
    else         { if(meets) a = mid; else b = mid; }
  }
  const value = increases ? b : a;
  return { value, reachedPct: pctAt(value), capped: false };
}
// Orchestrate the "Can I retire earlier?" solve. Creates a new scenario at
// target age + baseline levers, then sequentially fills each non-wish lever
// with its solo answer, updating the UI between solves so the advisor sees
// progress. Each solo answer ignores the others (truth: "this lever ALONE
// would need to be X").
async function runSolveEarlyRetirement(targetAge, targetPct){
  if(solving || scenarios.length >= MAX_SCENARIOS) return;
  solving = true; solverFormOpen = false;
  const baseLev = JSON.parse(JSON.stringify(scenarios.find(s=>s.base)?.lev || defaultLevers()));
  // soloBase = baseline + the wish applied (retire at target age). FROZEN —
  // every lever's solo answer is computed against this same starting point so
  // each result truly is "this lever ALONE could close the gap" (not "given
  // the previous solves"). Without freezing, solves would cascade and order
  // would matter — bad.
  const soloBase = JSON.parse(JSON.stringify(baseLev));
  soloBase.retireAge = targetAge;
  syncPension(soloBase);
  // wishLev = the display state for the new column. Starts identical to
  // soloBase; gets each solo answer filled in as it resolves.
  const wishLev = JSON.parse(JSON.stringify(soloBase));
  const newScen = { name:`Retire at ${targetAge}`, base:false, lev:wishLev, res:null,
                    solving:true, solvedKeys:{} };
  scenarios.push(newScen);
  const ci = scenarios.length - 1;
  // Make sure sharedPaths exists (first run might not have it yet).
  if(!sharedPaths){
    resetSeed();
    const horizon = plan.household.primary.planEndAge - plan.household.primary.currentAge;
    sharedPaths = [];
    for(let i=0;i<plan.simulation.iterations;i++) sharedPaths.push(generateReturnPath(horizon));
  }
  // Render the new column immediately with placeholders.
  buildLevers(); renderBand(); renderFoot();
  // Levers we solve for "Can I retire earlier?" — everything that can plausibly
  // close the gap. Retirement-age is the wish (fixed). One-time event + pension
  // are out of scope for this question.
  const targets = ['spend','savings','ssAge','risk'];
  // Mark each as "solving" in the UI so the rows show the pulse.
  targets.forEach(k => $(`#lv-${ci}-${k}`)?.classList.add('solving'));
  // Solve sequentially. yield to the event loop between levers so the spinner
  // actually paints (otherwise the bisection blocks the main thread).
  for(const k of targets){
    // eslint-disable-next-line no-await-in-loop
    await new Promise(r => setTimeout(r, 16));
    // SOLO: solve against the frozen soloBase (not the mutating wishLev), so
    // each lever's answer is truly "this lever alone, others at baseline."
    const res = solveLeverFor(soloBase, k, targetPct);
    wishLev[k] = res.value;
    newScen.solvedKeys[k] = { reachedPct: res.reachedPct, capped: res.capped };
    const cell = $(`#lv-${ci}-${k}`);
    if(cell){
      const cfg = LEVCFG.find(c=>c.key===k);
      cell.classList.remove('solving');
      cell.classList.add('solved');
      if(res.capped) cell.classList.add('solved-capped');
      cell.innerHTML = renderLevValue(cfg, wishLev);
      // Sync the slider position too.
      const sl = $(`#scn-levers .lev-slider[data-col="${ci}"][data-key="${k}"]`);
      if(sl){ const rng = levRange(cfg); sl.value = Math.max(rng.min, Math.min(rng.max, res.value)); }
    }
  }
  newScen.solving = false;
  saveScenarios();
  plansDirty = true;
  // Final Run computes the new column's actual composed %.
  solving = false;
  runAll();
}

// Scenarios are NAMED, SAVEABLE objects (the household-centric data root). They
// start identical; the advisor moves levers to show each decision's effect, and
// can rename / add / remove them. Both tabs read this shared set.
// The first-run demo set tells a story: B retires 2yr later (security improves),
// C goes aggressive (wealth line jumps, success does NOT — volatility drag).
function demoScenarios(){
  const s=[
    {name:'Baseline',   base:true,  lev:defaultLevers(), res:null},
    {name:'Scenario B', base:false, lev:defaultLevers(), res:null},
    {name:'Scenario C', base:false, lev:defaultLevers(), res:null},
  ];
  s[1].lev.retireAge = 67;
  s[2].lev.risk      = 5;
  return s;
}
let scenarios = loadScenarios() || demoScenarios();
// Solver UI state. solverFormOpen toggles the inline "Solve…" form in the band
// gutter; solving guards against re-entry while a solve is in flight.
let solverFormOpen = false, solving = false;

/* Map a scenario's levers -> engine override object. */
function leversToOverrides(L){
  const ov={};
  const baseRetire = plan.household.primary.retirementAge;
  const baseSs     = plan.income.socialSecurity.primary.claimAge;
  if(L.retireAge !== baseRetire) ov.retireDelay = L.retireAge - baseRetire;
  if(L.ssAge !== baseSs)         ov.ssDelayYears = L.ssAge - baseSs;
  // spend: express as bump fraction vs plan.expenses.living
  const baseSpend = plan.expenses.living;
  if(L.spend !== baseSpend)      ov.spendBump = (L.spend - baseSpend)/baseSpend;
  if(L.eventAmt>0){ ov.lumpSum = L.eventAmt; ov.lumpSumYear = Math.max(0, L.eventAge - plan.household.primary.currentAge); }
  if(L.savings !== plan.savings.annual) ov.savingsBump = (L.savings - plan.savings.annual)/Math.max(1,plan.savings.annual);
  // Pension: always pass the chosen age as an absolute override so the engine
  // looks up the entered benefit for THAT exact age (or pays 0 if no entry).
  ov.pensionStartAge = L.pensionAge;
  return ov;
}
/* Risk lever changes the profile -> needs a plan clone, not an override. */
function planForScenario(L){
  const p=JSON.parse(JSON.stringify(plan));
  p.portfolio.riskProfile = L.risk;
  return p;
}

/* ── Inputs tab: edit the base plan (household data root) ──────────────────
   `plan` is the single source. Scenarios draw their baseline from it; each
   scenario then carries its own adjustment. Editing a base input re-seeds
   every column from the NEW base while PRESERVING each scenario's delta (its
   decision) — so "draw from base, then adjust" holds automatically. */
if(!plan.income.socialSecurity.spouse) plan.income.socialSecurity.spouse={pia:0,claimAge:67};

const RISK_NAMES={1:'Conservative',2:'Mod-Cons',3:'Moderate',4:'Mod-Agg',5:'Aggressive'};
const INPUT_GROUPS=[
  {title:'Household & Plan', fields:[
    {path:'household.primary.currentAge',    label:'Current age',    type:'age'},
    {path:'household.primary.retirementAge', label:'Retirement age', type:'age'},
    {path:'household.primary.planEndAge',    label:'Plan end age',   type:'age'},
  ]},
  {title:'Portfolio', subtotal:'invest', fields:[
    {path:'portfolio.accounts.taxable.balance',     label:'Taxable',            type:'money'},
    {path:'portfolio.accounts.taxable.basisPct',    label:'Taxable cost basis', type:'pct'},
    {path:'portfolio.accounts.traditional.balance', label:'Traditional / IRA',  type:'money'},
    {path:'portfolio.accounts.roth.balance',        label:'Roth',               type:'money'},
    {path:'portfolio.riskProfile',                  label:'Allocation',         type:'risk'},
  ]},
  {title:'Social Security', fields:[
    {path:'income.socialSecurity.primary.pia',      label:'Primary · benefit @ FRA', type:'money'},
    {path:'income.socialSecurity.primary.claimAge', label:'Primary · claim age',     type:'age'},
    {path:'income.socialSecurity.spouse.pia',       label:'Spouse · benefit @ FRA',  type:'money'},
    {path:'income.socialSecurity.spouse.claimAge',  label:'Spouse · claim age',      type:'age'},
  ]},
  {title:'Spending & Goals', subtotal:'spend', fields:[
    {path:'expenses.living',     label:'Annual living',   type:'money'},
    {path:'expenses.healthcare', label:'Healthcare / yr', type:'money'},
    {path:'goals.vacation',      label:'Travel / yr',     type:'money'},
    {path:'goals.property',      label:'Property / yr',   type:'money'},
    {path:'goals.gifts',         label:'Gifts / yr',      type:'money'},
  ]},
  {title:'Savings', fields:[
    {path:'savings.annual', label:'Annual savings (pre-retire)', type:'money'},
  ]},
  // Pension: only the ages the actual statement quotes. Add rows here if the
  // client's plan offers more (e.g. 60, 67). Missing ages pay 0 — by design.
  // Pension is rendered DYNAMICALLY (see renderInputs): one row per age in
  // plan.income.pension.benefitByAge, sorted ascending. New ages added via
  // the Scenarios pension lever appear here automatically on next render —
  // so Inputs stays the running record of every benefit the advisor has
  // entered, in order.
  {title:'Pension', dynamic:'pension'},
];
const getPath=(o,p)=>p.split('.').reduce((a,k)=>a&&a[k],o);
const setPath=(o,p,v)=>{const ks=p.split('.');const last=ks.pop();let t=o;for(const k of ks)t=t[k];t[last]=v;};

// Live comma formatting for money inputs. Reformats on every keystroke and
// preserves the caret's LOGICAL position (after the same number of digits)
// so typing left-to-right feels natural — no caret-jumping-to-end weirdness.
function liveCommas(el){
  const old = el.value;
  const caret = el.selectionStart ?? old.length;
  const digitsBefore = (old.slice(0, caret).match(/\d/g) || []).length;
  const digits = old.replace(/[^0-9]/g, '');
  if(!digits){ el.value = ''; return; }
  const formatted = parseInt(digits, 10).toLocaleString('en-US');
  el.value = formatted;
  let pos = 0, seen = 0;
  while(pos < formatted.length && seen < digitsBefore){
    if(/\d/.test(formatted[pos])) seen++;
    pos++;
  }
  el.setSelectionRange(pos, pos);
}

let baseSnapshot=defaultLevers();   // base lever values; used to preserve deltas
let plansDirty=false;

// Re-seed scenarios from the current base, keeping each scenario's adjustment.
function reseedScenarios(){
  const nb=defaultLevers();
  const LINKED=['retireAge','ssAge','spend','savings','pensionAge'];   // base-linked levers
  scenarios.forEach(s=>{
    Object.keys(nb).forEach(k=>{
      if(s.base){ s.lev[k]=nb[k]; return; }   // baseline always mirrors the base
      if(!LINKED.includes(k)) return;         // allocation / one-time event stay as set
      const cfg=LEVCFG.find(c=>c.key===k);
      let v=nb[k]+(s.lev[k]-baseSnapshot[k]);  // new base + this scenario's delta
      if(cfg){ const r=levRange(cfg); v=Math.max(r.min,Math.min(r.max,v)); }
      s.lev[k]=v;
    });
    syncPension(s.lev);   // auto-linked pension follows the (possibly new) retire age
  });
  baseSnapshot=nb;
}

// Build the Pension group's fields fresh on every render so any new
// age entered via the Scenarios inline input shows up here as its own row.
function pensionFields(){
  const m=(plan.income.pension && plan.income.pension.benefitByAge) || {};
  return Object.keys(m).map(Number).sort((a,b)=>a-b).map(age=>(
    {path:`income.pension.benefitByAge.${age}`, label:`Benefit if claimed @ ${age}`, type:'money'}
  ));
}
function renderInputs(){
  let h='';
  INPUT_GROUPS.forEach(g=>{
    h+=`<div class="inp-group"><h3>${g.title}</h3>`;
    const fields = g.dynamic==='pension' ? pensionFields() : g.fields;
    fields.forEach(f=>{
      const v=getPath(plan,f.path);
      // Dynamic groups (currently Pension) get a small × to remove the row.
      // Static rows don't — those keys are structural and live in the plan
      // schema (current age, balances, etc.); zeroing them is the right
      // way to "remove" a value.
      const xBtn = g.dynamic ? `<button class="row-x" title="Remove this age" data-rmpath="${f.path}">×</button>` : '';
      if(f.type==='risk'){
        const opts=Object.keys(RISK_NAMES).map(k=>
          `<option value="${k}" ${+k===+v?'selected':''}>${RISK_NAMES[k]} · ${RISK_LABELS[k]}</option>`).join('');
        h+=`<div class="inp-row"><label>${f.label}</label><div class="field"><select data-path="${f.path}" data-type="risk">${opts}</select>${xBtn}</div></div>`;
      }else{
        const pre=f.type==='money'?'<span class="pre">$</span>':'';
        const post=f.type==='pct'?'<span class="pre">%</span>':'';
        // Money fields render as text with comma grouping (1,200,000) — number
        // inputs can't show commas. Parsed on change by stripping non-digits.
        // Age/pct stay numeric so the up/down arrows still work.
        if(f.type==='money'){
          const dv=(v||0).toLocaleString('en-US');
          h+=`<div class="inp-row"><label>${f.label}</label><div class="field">${pre}<input type="text" inputmode="numeric" data-path="${f.path}" data-type="money" value="${dv}">${xBtn}</div></div>`;
        }else{
          const dv=f.type==='pct'?Math.round(v*100):v;
          h+=`<div class="inp-row"><label>${f.label}</label><div class="field">${pre}<input type="number" data-path="${f.path}" data-type="${f.type}" value="${dv}" step="1">${post}${xBtn}</div></div>`;
        }
      }
    });
    // Money sections close with a live running subtotal — the statement's truth.
    if(g.subtotal==='invest') h+=`<div class="inp-total"><span class="t-label">Investable total</span><span class="t-val" id="tot-invest"></span></div>`;
    if(g.subtotal==='spend')  h+=`<div class="inp-total"><span class="t-label">Total spending</span><span class="t-val" id="tot-spend"></span></div>`;
    h+=`</div>`;
  });
  $('#inp-grid').innerHTML=h;
  refreshDerived();
  // Row delete (×): delete the last key along the path and re-render. Pension
  // path looks like income.pension.benefitByAge.67 — we strip the trailing
  // "67" off the parent object. Invalidates the cached market bundle since
  // it changes a future cash flow.
  $$('#inp-grid .row-x').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const path=e.target.dataset.rmpath;
      const ks=path.split('.'); const last=ks.pop();
      let t=plan; for(const k of ks){ if(t==null) return; t=t[k]; }
      if(t!=null) delete t[last];
      sharedPaths=null; plansDirty=true;
      renderInputs();
      $('#status').textContent='Plan edited · open Scenarios';
    });
  });
  // Live commas as the user types into any money field on the Inputs page.
  $$('#inp-grid input[data-type="money"]').forEach(el=>{
    el.addEventListener('input', e => liveCommas(e.target));
  });
  $$('#inp-grid input,#inp-grid select').forEach(el=>{
    el.addEventListener('change',e=>{
      const path=e.target.dataset.path, type=e.target.dataset.type;
      // Money fields are text — strip everything but digits before parsing.
      const raw=e.target.value;
      let v;
      if(type==='money')      v=parseFloat(String(raw).replace(/[^0-9.]/g,''));
      else if(type==='risk')  v=+raw;
      else                    v=parseFloat(raw);
      if(!isFinite(v)) return;
      if(type==='pct')   v=Math.max(0,Math.min(100,v))/100;
      if(type==='money'){
        v=Math.max(0,Math.round(v));
        e.target.value=v.toLocaleString('en-US');   // re-format with commas in place
      }
      setPath(plan,path,v);
      reseedScenarios();
      buildLevers();              // Scenarios sliders reflect the new base
      refreshDerived();           // recap line + section subtotals follow the edit
      sharedPaths=null;           // plan changed → re-roll markets next Run
      plansDirty=true;
      $('#status').textContent='Plan edited · open Scenarios';
    });
  });
}

// Derived statement figures — pure aggregation of the raw inputs (NOT engine
// projections): investable total, total spending, and the one-line plan recap.
// These are a VIEW of what's typed, so the sheet reads like a real statement.
function inputTotals(){
  const a=plan.portfolio.accounts;
  const invest=(a.taxable.balance||0)+(a.traditional.balance||0)+(a.roth.balance||0);
  const e=plan.expenses, g=plan.goals;
  const spend=(e.living||0)+(e.healthcare||0)+(g.vacation||0)+(g.property||0)+(g.gifts||0);
  return {invest,spend};
}
function refreshDerived(){
  const t=inputTotals(), p=plan.household.primary, n=v=>'$'+(v||0).toLocaleString('en-US');
  const recap=$('#inp-recap');
  if(recap) recap.innerHTML=
    `Age <b>${p.currentAge}</b> <span class="sep">→</span> retire <b>${p.retirementAge}</b> <span class="sep">→</span> plan to <b>${p.planEndAge}</b>`+
    `<span class="sep">·</span> Investable <b>${n(t.invest)}</b>`+
    `<span class="sep">·</span> Spending <b>${n(t.spend)}/yr</b>`;
  const iv=$('#tot-invest'); if(iv) iv.textContent=n(t.invest);
  const sv=$('#tot-spend');  if(sv) sv.innerHTML=`${n(t.spend)} /yr <small>· ${n(Math.round(t.spend/12))}/mo</small>`;
}

// Pension slider range is PER-HOUSEHOLD: it spans only the ages the advisor has
// actually quoted a benefit for (the keys of benefitByAge). This means the
// slider can never wander onto an age with no number — so it can't silently pay
// $0. Enter a new quote (e.g. age 67) and the slider grows to include it on the
// next render. Falls back to a sane window if nothing is entered yet.
function pensionAges(){
  const m=(plan.income.pension && plan.income.pension.benefitByAge) || {};
  return Object.keys(m).map(Number).filter(n=>!isNaN(n)).sort((a,b)=>a-b);
}
// Effective slider range for a lever. Pension is dynamic; everything else is
// the static min/max declared in LEVCFG.
function levRange(cfg){
  if(cfg.key==='pensionAge'){
    const a=pensionAges();
    if(a.length) return { min:a[0], max:a[a.length-1], step:1 };
    return { min:62, max:65, step:1 };
  }
  return { min:cfg.min, max:cfg.max, step:cfg.step };
}

/* ── lever display config (label, formatter, slider range→value & back) ── */
const LEVCFG=[
  {key:'retireAge', name:'Retirement Age', min:55,max:72,step:1, fmt:v=>[v,'']},
  {key:'ssAge',     name:'SS Start Age',   min:62,max:70,step:1, fmt:v=>[v,'']},
  // All dollar levers render full digits with comma grouping — no abbreviations.
  // The advisor wants to see the exact number they're proposing, not a rounded
  // shorthand. Step values stay round so the slider snaps cleanly.
  // Spending is stored ANNUAL (the engine's unit) but shown/edited MONTHLY —
  // clients know their monthly number off-hand. edit:'monthly' wires the box.
  {key:'spend',     name:'Monthly Spending',min:80000,max:360000,step:1200, edit:'monthly', fmt:v=>['$'+Math.round(v/12).toLocaleString('en-US'),'/mo']},
  // One-time event carries BOTH an amount and an age; edit:'event' renders the
  // two type-in boxes (amount + age) alongside the amount slider.
  {key:'eventAmt',  name:'One-Time Event', min:0,max:500000,step:5000, edit:'event', fmt:(v,L)=>['$'+(v||0).toLocaleString('en-US'),'@ '+L.eventAge]},
  {key:'risk',      name:'Allocation',     min:1,max:5,step:1, fmt:v=>[RISK_LABELS[v],'growth / defensive']},
  {key:'savings',   name:'Savings / yr',   min:0,max:200000,step:1000, edit:'money', fmt:v=>['$'+v.toLocaleString('en-US'),'/yr']},
  // Pension snaps between the ages that actually have entered amounts (62, 65).
  // Label shows the dollar value the engine will pay for that age — if no entry
  // exists for that age, it shows "—" (and the engine pays 0).
  // Pension claim age. Range spans the realistic window; the displayed dollar
  // amount comes from whatever the advisor has entered for that exact age.
  // No entry yet → the value spot becomes an inline input (handled in
  // renderLevValue, not here). This is the truth-source contract surfacing
  // naturally as a UI affordance: "we don't have a number for this age, give
  // us one." Not an error — just the next input.
  {key:'pensionAge', name:'Pension',       min:55,max:70,step:1, fmt:v=>{
    const m=(plan.income.pension && plan.income.pension.benefitByAge) || {};
    const amt=m[v]; return (amt && amt>0) ? ['$'+amt.toLocaleString('en-US'),'@ '+v] : ['__needs__', v];
  }},
];

let running=false;
// Cached market bundle. Generated once, reused across Runs so that hitting Run
// twice with no changes yields the EXACT same numbers (sampling noise was
// causing the % to drift between identical clicks). Invalidated to null
// whenever the plan changes in the Inputs tab.
let sharedPaths=null;

/* ── run the engine for all three columns (shared nothing; each its own MC) ── */
function runAll(){
  if(running) return; running=true;
  const btn=$('#run-btn'); btn.disabled=true; $('#status').textContent='Running…';
  setTimeout(()=>{
    try{
      // SHARED PATHS: one bundle of return paths, reused across scenarios AND
      // across Runs. Within a Run, every column sees the SAME markets (any
      // difference between columns is the DECISION). Across Runs, the bundle
      // is cached so identical inputs give an identical % — no noise drift.
      const horizon = plan.household.primary.planEndAge - plan.household.primary.currentAge;
      const iters = plan.simulation.iterations;
      // Degenerate plan guard: a non-positive horizon (plan-end age at/below
      // current age) can't be simulated. Surface a clear reason and bail
      // WITHOUT nuking the last good results, so the views don't go blank.
      if(!(horizon > 0)){
        $('#status').textContent='Check plan: end age must be after current age';
        btn.disabled=false; running=false; return;
      }
      if(!sharedPaths || sharedPaths.length !== iters || sharedPaths[0].length !== horizon){
        resetSeed();              // fixed seed → identical bundle every load, no % drift
        sharedPaths = [];
        for(let i=0;i<iters;i++) sharedPaths.push(generateReturnPath(horizon));
      }
      // Isolate each scenario: one bad column (e.g. an out-of-range saved lever)
      // must not abort the whole Run and blank every other column + the cash
      // flow drawer. Failed scenarios get res=null and are skipped downstream.
      let failed=0;
      scenarios.forEach(s=>{
        try{
          const p=planForScenario(s.lev);
          const ov=leversToOverrides(s.lev);
          s.res=runSimulation(p, ov, sharedPaths);
        }catch(err){ s.res=null; failed++; console.error('Scenario failed:', s.name, err); }
      });
      renderBand(); renderFoot(); renderCashflow(); buildSeqSelect(); runSeq();
      $('#status').textContent = failed ? `Complete · ${failed} scenario${failed>1?'s':''} could not run` : 'Complete';
    }catch(e){ $('#status').textContent='Error'; console.error(e); }
    btn.disabled=false; running=false;
  },20);
}

/* ── render: sticky band of circles ── */
// Success ring color band: steel-teal (strong) / brass (caution) /
// clay (at risk). No green — matches the Obsidian Brass result tokens.
// Ring band matches the % number: deep green / bronze gold / deep burgundy.
function ringColor(pct){ return pct>=85?'#194a2c':pct>=70?'#9a7322':'#8f3340'; }
function ring(pct){
  // SVG fills its .circle-wrap via viewBox, so the ring size is controlled by
  // CSS (one place). Thin stroke near the edge leaves room for the % number.
  const r=45,c=2*Math.PI*r,off=c*(1-pct/100);
  const col=ringColor(pct);
  return `<svg viewBox="0 0 100 100" width="100%" height="100%">
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="#e2dccd" stroke-width="4"/>
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="${col}" stroke-width="4" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 50 50)" style="transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)"/></svg>`;
}
// The band / levers / foot are CSS grids whose column count must match the
// number of scenarios. One place sets it (label gutter + N equal columns) so
// adding/removing a scenario reflows all three rows together.
function syncGridCols(){
  const tpl=`148px repeat(${scenarios.length},1fr)`;
  ['#scn-band','#scn-levers','#scn-foot'].forEach(sel=>{
    const el=$(sel); if(el) el.style.gridTemplateColumns=tpl;
  });
}
function renderBand(){
  syncGridCols();
  let h=`<div class="band-cell label"><span>Scenario</span></div>`;
  scenarios.forEach((s,ci)=>{
    const sr=s.res?s.res.successRate:0;
    const col= sr>=85?'var(--positive-bright)':sr>=70?'var(--gold-bright)':'var(--negative-bright)';
    // Header: a small identity dot (column color) + the name. Baseline's name is
    // locked (the anchor); other scenarios render an inline editable field so the
    // advisor can label them ("Retire at 62"). A ✕ removes non-baseline columns.
    const dot=`<span class="col-dot" style="background:${colorFor(ci)}"></span>`;
    const nameEl = s.base
      ? `<span class="col-name base-tag">${dot}${s.name}</span>`
      : `<span class="col-name">${dot}<input class="col-rename" data-col="${ci}" value="${s.name.replace(/"/g,'&quot;')}" maxlength="28" aria-label="Scenario name"><button class="col-x" data-col="${ci}" title="Remove scenario">✕</button></span>`;
    h+=`<div class="band-cell ${s.base?'base':''}">
      ${nameEl}
      <div class="circle-wrap">${ring(sr)}
        <div class="circle-val"><span class="big" style="color:${col}">${sr.toFixed(1)}%</span><span class="lbl">Success</span></div></div>
    </div>`;
  });
  // Label gutter cell content: blank scenario "+ Add", solver "✦ Solve…", and
  // when the solver form is open, replace the buttons with the inline form
  // ("retire at AGE with %... [Solve]"). Capped at MAX_SCENARIOS for both adds.
  if(scenarios.length<MAX_SCENARIOS){
    const baseLev = scenarios.find(s=>s.base)?.lev || defaultLevers();
    const defaultTargetAge = Math.max(55, baseLev.retireAge - 3);
    const defaultPct = Math.round((scenarios.find(s=>s.base)?.res?.successRate) || 85);
    let gut;
    if(solverFormOpen){
      gut = `<span>Scenario</span>
        <form class="solver-form" id="solver-form">
          <div class="sf-q">Retire at <input class="sf-in age" id="sf-age" type="number" min="55" max="72" value="${defaultTargetAge}"></div>
          <div class="sf-q">with <input class="sf-in pct" id="sf-pct" type="number" min="50" max="99" value="${defaultPct}">% confidence</div>
          <div class="sf-actions">
            <button type="button" class="sf-cancel" id="sf-cancel">Cancel</button>
            <button type="submit" class="sf-go">Solve →</button>
          </div>
        </form>`;
    } else {
      gut = `<span>Scenario</span>
        <button class="add-scen" title="Add scenario">+ Add</button>
        <button class="solve-btn" title="Solve a life question">✦ Solve…</button>`;
    }
    h=h.replace('<span>Scenario</span>', gut);
  }
  $('#scn-band').innerHTML=h;
}

/* ── render: lever grid (built once, values update in place) ── */
// Format a single lever value into the inner HTML for its display span.
// Special return ['__needs__', age] from a fmt() means "no entered amount for
// this age yet" — render an inline input so the advisor can type one in
// without leaving the lever. Plain numbers/strings render as before.
function renderLevValue(cfg, lev){
  const [val,unit]=cfg.fmt(lev[cfg.key], lev);
  if(val==='__needs__'){
    return `$<input class="pen-in" type="text" inputmode="numeric" data-pen-age="${unit}"> <span class="unit">@ ${unit}</span>`;
  }
  // Type-in boxes for the dollar/age levers. The box edits the same value the
  // slider drives — both stay in sync. data-edit tells the input handler how to
  // interpret the typed number (monthly→annual, plain money, or event age).
  if(cfg.edit==='monthly'){
    const mo=Math.round(lev[cfg.key]/12);
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="monthly" data-key="${cfg.key}" value="${mo.toLocaleString('en-US')}"> <span class="unit">/mo</span>`;
  }
  if(cfg.edit==='money'){
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="money" data-key="${cfg.key}" value="${(lev[cfg.key]||0).toLocaleString('en-US')}"> <span class="unit">${unit}</span>`;
  }
  if(cfg.edit==='event'){
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="eventAmt" data-key="eventAmt" value="${(lev.eventAmt||0).toLocaleString('en-US')}">`
         + ` <span class="unit">@ age</span> `
         + `<input class="lev-in age-in" type="text" inputmode="numeric" data-edit="eventAge" data-key="eventAge" value="${lev.eventAge}">`;
  }
  return `${val}${unit?` <span class="unit">${unit}</span>`:''}`;
}
function buildLevers(){
  syncGridCols();
  let h='';
  LEVCFG.forEach(cfg=>{
    h+=`<div class="lev-name">${cfg.name}</div>`;
    const r=levRange(cfg);
    scenarios.forEach((s,ci)=>{
      const last=ci===scenarios.length-1?'col-last':'';
      h+=`<div class="lev-cell ${s.base?'base':''} ${last}">
        <span class="lev-val ${s.base?'base':''}" id="lv-${ci}-${cfg.key}">${renderLevValue(cfg,s.lev)}</span>
        <input class="lev-slider ${s.base?'base-lock':''}" type="range" min="${r.min}" max="${r.max}" step="${r.step}"
               value="${Math.max(r.min,Math.min(r.max,s.lev[cfg.key]))}" data-col="${ci}" data-key="${cfg.key}">
      </div>`;
    });
  });
  $('#scn-levers').innerHTML=h;
  // wire sliders
  $$('.lev-slider').forEach(sl=>{
    sl.addEventListener('input',e=>{
      const ci=+e.target.dataset.col, key=e.target.dataset.key;
      const L=scenarios[ci].lev;
      L[key]=+e.target.value;
      // Grabbing the pension slider frees it from the retirement-age link.
      if(key==='pensionAge') L.pensionAuto=false;
      // Moving retirement age re-syncs an auto-linked pension and refreshes its
      // slider + value in place.
      if(key==='retireAge' && L.pensionAuto){
        syncPension(L);
        const pcfg=LEVCFG.find(c=>c.key==='pensionAge');
        const psl=$(`#scn-levers .lev-slider[data-col="${ci}"][data-key="pensionAge"]`);
        if(psl) psl.value=L.pensionAge;
        $(`#lv-${ci}-pensionAge`).innerHTML=renderLevValue(pcfg, L);
      }
      const cfg=LEVCFG.find(c=>c.key===key);
      $(`#lv-${ci}-${key}`).innerHTML=renderLevValue(cfg, L);
      $('#status').textContent='Adjusted · Run to update';
    });
    // Persist on drag-end (change), not on every input tick, to avoid thrashing
    // localStorage during a slider drag.
    sl.addEventListener('change', saveScenarios);
  });
}
// Inline pension-amount inputs are inserted dynamically when a slider lands on
// an age with no entered benefit, so a direct per-element listener (re-bound
// only at buildLevers time) would miss them. Delegate from #scn-levers once.
// Typed value writes into the plan's benefit-by-age map for that exact age,
// then every column refreshes (the amount is reference data shared across
// scenarios — the DECISION is the age, not the amount).
// ── Scenario header: rename / add / remove (delegated on #scn-band) ──
$('#scn-band').addEventListener('input', e=>{
  if(e.target.classList && e.target.classList.contains('col-rename')){
    const ci=+e.target.dataset.col;
    if(scenarios[ci]) scenarios[ci].name=e.target.value;   // live; persisted on change
  }
});
$('#scn-band').addEventListener('change', e=>{
  if(e.target.classList && e.target.classList.contains('col-rename')){
    const ci=+e.target.dataset.col;
    let nm=e.target.value.trim();
    if(!nm){ nm=`Scenario ${String.fromCharCode(65+ci)}`; e.target.value=nm; }  // never blank
    if(scenarios[ci]) scenarios[ci].name=nm;
    saveScenarios();
    // Cash-flow header + Sequencing selector read names — refresh those.
    renderCashflow(); buildSeqSelect();
  }
});
$('#scn-band').addEventListener('click', e=>{
  const x=e.target.closest('.col-x');
  if(x){ removeScenario(+x.dataset.col); return; }
  if(e.target.closest('.add-scen')){ addScenario(); return; }
  if(e.target.closest('.solve-btn')){ solverFormOpen = true; renderBand(); return; }
  if(e.target.closest('.sf-cancel')){ solverFormOpen = false; renderBand(); return; }
});
// Solver form submit: read target age + % and kick off the early-retirement solve.
$('#scn-band').addEventListener('submit', e=>{
  const f = e.target.closest('#solver-form');
  if(!f) return;
  e.preventDefault();
  const age = parseInt($('#sf-age')?.value, 10);
  const pct = parseFloat($('#sf-pct')?.value);
  if(!isFinite(age) || age<55 || age>72) return;
  if(!isFinite(pct) || pct<50 || pct>99) return;
  runSolveEarlyRetirement(age, pct);
});
// Live commas while typing into any inline numeric input (pension + lever boxes).
$('#scn-levers').addEventListener('input', e=>{
  const t=e.target;
  if(!t.classList) return;
  if(t.classList.contains('pen-in')) liveCommas(t);
  // Age boxes are 2-digit, no commas; dollar boxes get comma grouping.
  else if(t.classList.contains('lev-in') && !t.classList.contains('age-in')) liveCommas(t);
});
// Type-in lever boxes (monthly spend / savings / one-time event amount+age).
// Writes the value the slider also drives, then refreshes that cell + status.
// On change (blur/enter) we commit; the column re-runs on the next Run.
$('#scn-levers').addEventListener('change', e=>{
  const t=e.target;
  if(!t.classList || !t.classList.contains('lev-in')) return;
  const span=t.closest('[id^="lv-"]'); if(!span) return;
  const ci=+span.id.split('-')[1];
  const L=scenarios[ci].lev;
  const num=parseFloat(String(t.value).replace(/[^0-9.]/g,''));
  const edit=t.dataset.edit;
  const cfg=LEVCFG.find(c=>c.key===t.dataset.key) || LEVCFG.find(c=>c.edit==='event');
  if(edit==='monthly'){
    if(!isFinite(num)||num<0) return;
    L.spend=Math.round(num*12);                 // store annual; engine's unit
  } else if(edit==='money'){
    if(!isFinite(num)||num<0) return;
