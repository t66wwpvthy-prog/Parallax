html, body { width: 1600px; height: 900px; margin: 0; overflow: hidden; }

  // grid + y labels
  [20e6,15e6,10e6,5e6,0].forEach(v=>{const y=sy(v);
    svg+=`<line class="grid" x1="${X0}" y1="${y}" x2="${X1}" y2="${y}"/>`+
         `<text class="y-text" x="64" y="${y+5}">${v===0?'$0':'$'+(v/1e6).toFixed(1)+'M'}</text>`;});
  // x labels (6 ticks, real ages)
  [65,71,77,83,89,94].forEach(a=>{ svg+=`<text class="axis-text" x="${sx(a)-33}" y="450">Age ${a}</text>`; });
  // lines: secondary first, main on top
  const draw=y=>{const m=MK[y],pts=clip(m.series).map(p=>`${sx(p.age).toFixed(1)},${sy(Math.max(0,p.bal)).toFixed(1)}`).join(' ');
    const cls=y===MAIN?'main':'secondary';
    return {line:`<polyline class="series ${cls}" points="${pts}" stroke="${COL[y]}"/>`,
            end:(()=>{const l=clip(m.series);const last=l[l.length-1];return `<circle class="end-dot" cx="${sx(last.age).toFixed(1)}" cy="${sy(Math.max(0,last.bal)).toFixed(1)}" r="3" fill="${COL[y]}"/>`;})()};};
  const drawn=ACTIVE.filter(y=>y!==MAIN).map(draw).concat([draw(MAIN)]);
  svg+=drawn.map(d=>d.line).join('')+drawn.map(d=>d.end).join('');
  document.getElementById('chart').innerHTML=svg;

  // ── metric cards (REAL engine outcomes) ──
  const fmt=v=> v>=1e6 ? '$'+(v/1e6).toFixed(1)+'M' : (v>=1e3? '$'+Math.round(v/1e3)+'K' : '$'+Math.round(v));
  const pct=v=>(v>=0?'+':'')+(v*100).toFixed(1)+'%';
  document.getElementById('cards').innerHTML = ACTIVE.map(y=>{
    const m=MK[y], c=COL[y];
    const rows=[];
    rows.push(`<div class="metric-row"><span>First decade</span><strong class="${m.first10>=0?'success':''}">${pct(m.first10)}</strong></div>`);
    rows.push(`<div class="metric-row"><span>Lowest</span><strong>${fmt(m.minBalance)}</strong></div>`);
    if(m.underwaterYears>0) rows.push(`<div class="metric-row"><span>Duration</span><strong>${m.underwaterYears} yrs</strong></div>`);
    rows.push(m.survived
      ? `<div class="metric-row"><span>Outcome</span><strong class="success">Survived · ${fmt(m.terminal)}</strong></div>`
      : `<div class="metric-row"><span>Outcome</span><strong class="danger">Ran dry · age ${m.depletionAge}</strong></div>`);
    const p = m.survived?100:Math.round((m.depletionAge-65)/(95-65)*100);
    return `<div class="metric-card" style="--card-accent:${c};--card-glow:${c};--p:${p}%">
      <div class="metric-title"><i></i>${y} · ${m.tag.toUpperCase()}</div>
      <div class="metric-rows">${rows.join('')}</div>
      <div class="progress"><span></span></div></div>`;
  }).join('');
})();
</script>
</body>
</html>
