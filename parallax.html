/* ── end engine ── */
/* ╔══════════════════════════════════════════════════════════════╗
   ║  PARALLAX V2 — UI WIRING (calls the engine above)             ║
   ╚══════════════════════════════════════════════════════════════╝ */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
// Escape user-entered text (scenario names) before it lands in innerHTML or an
// attribute value. Names come from a free-text input and persist in
// localStorage, so they're untrusted on reload — without this a name like
// <img src=x onerror=…> would execute. Covers element content AND quoted attrs.
const escHtml=s=>String(s).replace(/[&<>"']/g, c=>(
  {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* Demo household — HNW, 58yo, retiring at 65. $2.8M total portfolio.
   $205k living + $12k healthcare; two-earner SS ($48k + $30k at 67); $30k/yr
   savings until retire. Spend set against realistic SS to keep real tension:
   Baseline (Moderate, ret 65) ~76% — a plan that needs attention. Moving levers
   shows it honestly: retiring 2yr later lifts success markedly; going aggressive
   raises the wealth line but leaves success BELOW the retire-later case (vol
   drag) — the risk/return truth the tool exists to show. */
plan.household.primary.currentAge    = 58;
plan.household.primary.retirementAge = 65;
plan.household.primary.planEndAge    = 95;
plan.portfolio.accounts.taxable.balance      = 800000;
plan.portfolio.accounts.traditional.balance  = 1600000;
plan.portfolio.accounts.roth.balance         = 400000;
plan.portfolio.accounts.taxable.basisPct     = 0.55;
plan.expenses.living     = 205000;
plan.expenses.healthcare = 12000;
plan.goals.vacation      = 12000;
plan.goals.property      = 5000;
plan.goals.gifts         = 5000;
// Two earners: one maxed (~$48k PIA at FRA), spouse a strong earner (~$30k).
// pia = benefit at FRA (67) in today's dollars, straight off the SSA statement.
plan.income.socialSecurity.primary = { pia: 48000, claimAge: 67 };
plan.income.socialSecurity.spouse  = { pia: 30000, claimAge: 67 };
// Demo pension: only the two ages the statement actually quoted. The engine
// pays exactly what's entered for the chosen age and nothing in between —
// no interpolation, no invented numbers (see engine.test.js).
plan.income.pension = { benefitByAge: { 62: 36000, 63: 38160, 64: 40320, 65: 42480 }, startAge: 65, colaPct: 0 };
plan.savings.annual      = 30000;
// Gross working income (pre-retirement, today's dollars). Used ONLY by the
// Snapshot's replacement-ratio gauge — a static diagnostic, not an engine
// input. The engine drives accumulation off savings.annual, never this.
plan.income.workingIncome = 300000;
plan.simulation.iterations = 1000;

// Scenario accent palette. Brass / steel-teal / dusty mauve are the core trio
// (matches --s1/2/3); two more earthy tones extend it when the advisor adds a
// 4th/5th scenario. colorFor() cycles the palette so any count gets a color.
// No green here (reserved for the success language) and no mint.
const SCEN_PALETTE=['#9a7322','#3f6b78','#7d5a82','#6f7a52','#9a5a3f'];
const colorFor=i=>SCEN_PALETTE[i % SCEN_PALETTE.length];
const MAX_SCENARIOS=5;
// Back-compat alias for code that still reads COLHEX by index.
const COLHEX=SCEN_PALETTE;

/* The three scenario columns. Each holds lever values + its last engine result.
   lever values are the ACTUAL planning values (age, $, etc.), not slider ticks. */
const RISK_LABELS={1:'30 / 70',2:'44 / 56',3:'59 / 41',4:'73 / 27',5:'88 / 12'};
function defaultLevers(){
  const L={
    retireAge:  plan.household.primary.retirementAge,
    ssAge:      plan.income.socialSecurity.primary.claimAge,
    spend:      plan.expenses.living,
    eventAmt:   0, eventAge: 70,
    risk:       plan.portfolio.riskProfile,
    savings:    plan.savings.annual,
    // pensionAge tracks retirement by DEFAULT (most people switch on a pension
    // when they retire — no reason to take taxable fixed income while still
    // earning). pensionAuto stays true until the advisor grabs the pension
    // slider, which frees it to hold any quoted age independently.
    pensionAuto: true,
    pensionAge: (plan.income.pension && plan.income.pension.startAge) || 65
  };
  syncPension(L);
  return L;
}
// If pension is still auto-linked, snap its claim age to the retirement age,
// clamped into the household's quoted pension range. No-op once the advisor has
// taken manual control of the pension lever (pensionAuto=false).
function syncPension(L){
  if(!L.pensionAuto) return;
  const a=pensionAges();
  const lo = a.length ? a[0] : 62, hi = a.length ? a[a.length-1] : 65;
  L.pensionAge = Math.max(lo, Math.min(hi, L.retireAge));
}
// ── Scenario persistence (browser localStorage) ──────────────────────────
// We save only the durable parts (name/base/lev) — never res (recomputed on
// Run). Wrapped in try/catch so a corrupt/blocked store never breaks the app.
const SCEN_KEY='parallax.scenarios.v2';
function saveScenarios(){
  try{
    const slim=scenarios.map(s=>({name:s.name, base:!!s.base, lev:s.lev}));
    localStorage.setItem(SCEN_KEY, JSON.stringify(slim));
  }catch(e){/* storage full/blocked — stay in-memory, no crash */}
}
function loadScenarios(){
  try{
    const raw=localStorage.getItem(SCEN_KEY);
    if(!raw) return null;
    const arr=JSON.parse(raw);
    if(!Array.isArray(arr) || !arr.length || !arr[0].base) return null;  // sanity
    // Backfill any lever keys added since the save (forward-compat) so old saves
    // don't break when defaultLevers() grows new fields.
    const proto=defaultLevers();
    return arr.map(s=>({ name:String(s.name||'Scenario'), base:!!s.base,
                         lev:{...proto, ...s.lev}, res:null }));
  }catch(e){ return null; }
}
// Wipe saved state and return to the first-run demo (escape hatch).
function resetScenarios(){
  try{ localStorage.removeItem(SCEN_KEY); }catch(e){}
  scenarios=demoScenarios(); baseSnapshot=defaultLevers();
  buildLevers(); plansDirty=true; runAll();
}
// Add a new scenario (clones the current baseline's levers so it starts as a
// neutral copy the advisor then adjusts). Capped at MAX_SCENARIOS.
function addScenario(){
  if(scenarios.length>=MAX_SCENARIOS) return;
  const baseLev=scenarios.find(s=>s.base)?.lev || defaultLevers();
  const n=scenarios.filter(s=>!s.base).length;
  scenarios.push({ name:`Scenario ${String.fromCharCode(66+n)}`, base:false,
                   lev:JSON.parse(JSON.stringify(baseLev)), res:null });
  saveScenarios(); buildLevers(); plansDirty=true; runAll();
}
// Remove a non-baseline scenario by index.
function removeScenario(ci){
  if(ci<=0 || ci>=scenarios.length || scenarios[ci].base) return;
  scenarios.splice(ci,1);
  saveScenarios(); buildLevers(); plansDirty=true; runAll();
}

// ── Solver ──────────────────────────────────────────────────────────────
// Run the engine for one trial set of levers and return the success %.
// Reuses sharedPaths (the cached return-path bundle) so every trial sees the
// same markets — apples-to-apples, deterministic with our seeded RNG.
function trySuccess(L){
  const p = planForScenario(L);
  const ov = leversToOverrides(L);
  return runSimulation(p, ov, sharedPaths).successRate;
}
// Probability (0–100) of ending with at least `goal` dollars — the legacy score.
function tryLegacyProb(L, goal){
  const p = planForScenario(L);
  const ov = leversToOverrides(L);
  const res = runSimulation(p, ov, sharedPaths);
  const n = res.sims.length || 1;
  return 100 * res.sims.filter(s => s.terminalBalance >= goal).length / n;
}
// Solve ONE lever: holding all others at `baseLev`, find the value of `key`
// closest to its baseline that achieves >= targetPct. Returns { value,
// reachedPct, capped }. capped=true means even the lever's most-aggressive
// extreme can't reach the target — we return that extreme + the % it hit.
//
// Two strategies by range size:
//  • SMALL range (≤12 steps, e.g. Allocation's 5 risk levels, SS age's 9): scan
//    EVERY value. Allocation is NOT monotonic — more equity lifts expected
//    return but adds volatility drag, so success can rise then fall. Bisection
//    (which assumes monotonicity) would silently return a wrong level. An
//    exhaustive scan is correct for any shape and cheap at this count.
//  • LARGE range (spending, savings): bisect. These ARE monotonic in success
//    and have hundreds of steps, so a full scan would be needlessly slow.
// `score(L)` returns the metric to clear (0–100); defaults to plan success %,
// but legacy goals pass a "% chance of leaving ≥ $X" scorer. Everything else
// (closest-to-baseline, scan vs bisection, capped handling) is unchanged.
function solveLeverFor(baseLev, key, targetPct, score = trySuccess, band = null){
  const cfg = LEVCFG.find(c=>c.key===key);
  if(!cfg) return null;
  const r = band || levRange(cfg);
  const lo = r.min, hi = r.max, step = r.step;
  if(lo === hi) return { value: lo, reachedPct: score({...baseLev,[key]:lo}), capped:false };
  const pctAt = v => score({...baseLev, [key]: v});
  const nSteps = Math.round((hi - lo) / step);

  if(nSteps <= 12){
    // Exhaustive scan. Pick the value closest to the lever's current (baseline)
    // setting that meets target; if none meet, return the best-achievable value
    // (capped). Direction-agnostic — works for non-monotonic levers.
    const baseV = baseLev[key];
    let passVal = null, passPct = -1, bestVal = lo, bestPct = -Infinity;
    for(let i = 0; i <= nSteps; i++){
      const v = lo + i * step;
      const pct = pctAt(v);
      if(pct > bestPct){ bestPct = pct; bestVal = v; }
      if(pct >= targetPct &&
         (passVal === null || Math.abs(v - baseV) < Math.abs(passVal - baseV))){
        passVal = v; passPct = pct;
      }
    }
    return passVal !== null
      ? { value: passVal, reachedPct: passPct, capped: false }
      : { value: bestVal, reachedPct: bestPct, capped: true };
  }

  // Large monotonic range → bisection (detect direction from the endpoints).
  const pctLo = pctAt(lo), pctHi = pctAt(hi);
  const increases = pctHi >= pctLo;                  // success rises with higher value?
  const best      = Math.max(pctLo, pctHi);
  const bestVal   = (pctHi >= pctLo) ? hi : lo;
  if(best < targetPct){ return { value: bestVal, reachedPct: best, capped: true }; }
  // Bisect for the value closest to baseline that meets target. We track the
  // smallest "passing" value on the side of monotonicity.
  let a = lo, b = hi;
  for(let i = 0; i < 9; i++){
    const mid = Math.max(lo, Math.min(hi, Math.round(((a+b)/2) / step) * step));
    if(mid === a || mid === b) break;
    const pct = pctAt(mid);
    const meets = pct >= targetPct;
    // For positive direction (success rises with value): we want SMALLEST value
    // that meets. For inverse: we want LARGEST value that meets.
    if(increases){ if(meets) b = mid; else a = mid; }
    else         { if(meets) a = mid; else b = mid; }
  }
  const value = increases ? b : a;
  return { value, reachedPct: pctAt(value), capped: false };
}
// ── Solver (selectable goal · solo per-lever answers) ───────────────────────
// The advisor picks a GOAL the client actually wants (retire early, afford a big
// purchase, gift to family, leave a legacy, or just hit a confidence bar), then
// for every controllable lever we show what it ALONE would need to be to reach
// that goal — holding all else at today's plan. Neutral: no weighting, no
// bundling. The advisor reads each contribution and surmises any blend.
let solverResults = null;  // null=no run yet, else {goal, params, targetPct, soloBase, rows}
let solverSearching = false;

// Levers that get a solo answer. Some goals PIN one (excluded from the list).
// Allocation/risk is intentionally OUT — "take more risk to hit a goal" isn't a
// clean planning recommendation (parked in the idea bank). SS stays, though it's
// a weak % mover for high-spend households (its value is lifetime dollars).
const SOLVE_KEYS = ['retireAge','spend','savings','ssAge','pensionAge'];

// Realistic search band per lever (relative to baseline) so a solo answer can't
// suggest something absurd ($73k/yr savings off a $30k base). Not limiting: if a
// lever can't reach the goal within its band it truthfully reports "best hits X%".
function solveBand(key, baseLev){
  const cfg = LEVCFG.find(c=>c.key===key);
  const r   = levRange(cfg);
  const cur = plan.household.primary.currentAge;
  let min = r.min, max = r.max;
  if(key==='spend'){        min = Math.round(baseLev.spend*0.70/100)*100; max = Math.round(baseLev.spend*1.30/100)*100; }
  else if(key==='savings'){ min = 0; max = Math.max(baseLev.savings*2, baseLev.savings+25000); }
  else if(key==='retireAge'){ min = Math.max(cur+1, baseLev.retireAge-5); max = baseLev.retireAge+5; }
  // ssAge (62–70) and pensionAge (quoted range) are already tight — leave full.
  return { min: Math.max(r.min, min), max: Math.min(r.max, max), step: r.step };
}

// Goal registry. Each goal: how it reads, the param fields it needs, which lever
// (if any) it pins, and (legacy) a custom scorer. `bar` = label for the % box.
const GOALS = {
  confidence: { label:'Reach a confidence level',          bar:'confidence', params:[] },
  retire:     { label:'Retire by an age',                  bar:'confidence', params:['age'],          pin:'retireAge' },
  purchase:   { label:'Afford a big one-time goal',        bar:'confidence', params:['amount','age'] },
  gift:       { label:'Gift / fund education yearly',      bar:'confidence', params:['amount','toAge'] },
  legacy:     { label:'Leave a legacy',                    bar:'chance',     params:['amount'] },
};

// One solved lever → a clean "was → needs to be (delta)" descriptor.

// One solved lever → a clean "was → needs to be (delta)" descriptor.
function soloRowText(key, baseV, newV){
  const cfg = LEVCFG.find(c=>c.key===key);
  const fmt = v => { const [a,u]=cfg.fmt(v, {...defaultLevers(), [key]:v, eventAge:70}); return u && u!=='growth / defensive' ? `${a} ${u}` : a; };
  const from = fmt(baseV), to = fmt(newV);
  let delta = '';
  if(newV === baseV)                 delta = 'no change needed';
  else if(key==='spend')             delta = `${newV<baseV?'−':'+'}${Math.abs(Math.round((newV-baseV)/baseV*100))}%`;
  else if(key==='savings')           delta = `${newV>baseV?'+':'−'}$${Math.abs(Math.round((newV-baseV)/1000))}k/yr`;
  else if(key==='risk')              delta = `${newV>baseV?'+':''}${newV-baseV} level${Math.abs(newV-baseV)>1?'s':''}`;
  else /* ages */                    delta = `${newV>baseV?'+':''}${newV-baseV} yr${Math.abs(newV-baseV)>1?'s':''}`;
  return { name: cfg.name, from, to, delta, unchanged: newV===baseV };
}

// The goal-dependent parameter fields + the % bar, rendered together so the
// whole strip swaps when the goal dropdown changes.
function goalParamsHtml(goalType, baseLev, defPct){
  const g = GOALS[goalType];
  const cur = plan.household.primary.currentAge;
  const money = (id,lbl,val,suf='') => `<label class="sf-field"><span class="sf-lbl">${lbl}</span><span class="sf-box-wrap"><span class="sf-prefix">$</span><input class="sf-box sf-money" id="${id}" type="text" inputmode="numeric" value="${val.toLocaleString('en-US')}">${suf?`<span class="sf-suffix">${suf}</span>`:''}</span></label>`;
  const age = (id,lbl,val,min=55,max=99) => `<label class="sf-field"><span class="sf-lbl">${lbl}</span><span class="sf-box-wrap"><input class="sf-box" id="${id}" type="number" min="${min}" max="${max}" value="${val}"></span></label>`;
  let h = '';
  if(goalType==='retire')    h += age('sf-p-age','By age', baseLev.retireAge, 55, 72);
  if(goalType==='purchase'){ h += money('sf-p-amount','Amount', 300000); h += age('sf-p-age','At age', Math.min(72, baseLev.retireAge+2), cur, 95); }
  if(goalType==='gift'){     h += money('sf-p-amount','Each year', 25000, '/yr'); h += age('sf-p-toage','Through age', 85, cur, 99); }
  if(goalType==='legacy')    h += money('sf-p-amount','At least', 1000000);
  const barLbl = g.bar==='chance' ? 'Chance' : 'Confidence';
  const barDef = g.bar==='chance' ? 85 : defPct;
  h += `<label class="sf-field"><span class="sf-lbl">${barLbl}</span><span class="sf-box-wrap"><input class="sf-box" id="sf-pct" type="number" min="50" max="99" value="${barDef}"><span class="sf-suffix">%</span></span></label>`;
  return h;
}

function renderSolvePanel(){
  const el = $('#solve-panel');
  if(!el) return;
  // The goal-entry FORM takes priority — full-width card so it has room to breathe.
  if(solverFormOpen){
    const baseLev = scenarios.find(s=>s.base)?.lev || defaultLevers();
    const baseSucc = scenarios.find(s=>s.base)?.res?.successRate || 85;
    const defPct = Math.min(95, Math.ceil((baseSucc+1)/5)*5);
    const goalOpts = Object.entries(GOALS).map(([k,g])=>`<option value="${k}"${k==='retire'?' selected':''}>${g.label}</option>`).join('');
    el.innerHTML = `
      <div class="solve-panel solve-form-panel">
        <div class="solve-panel-head">
          <span class="solve-panel-title">What would it take? — solve each lever to a goal</span>
          <button class="solve-clear" id="sf-cancel">✕ Cancel</button>
        </div>
        <form class="sf-form" id="solver-form">
          <label class="sf-field"><span class="sf-lbl">Goal</span>
            <select class="sf-select" id="sf-goal">${goalOpts}</select></label>
          <span id="sf-params" class="sf-params">${goalParamsHtml('retire', baseLev, defPct)}</span>
          <button type="submit" class="sf-go">Solve →</button>
        </form>
      </div>`;
    return;
  }
  if(!solverResults && !solverSearching){ el.innerHTML = ''; return; }
  if(solverSearching){
    el.innerHTML = `<div class="solve-panel"><div class="solve-searching">Solving each lever</div></div>`;
    return;
  }
  const R = solverResults;
  const P = R.params;
  const money = v => '$' + Math.round(v).toLocaleString('en-US');
  // Goal sentence reads the client's wish back, then the bar.
  let goal;
  if(R.goalType==='legacy'){
    goal = `For a <b>${R.targetPct}%</b> chance of leaving at least <b>${money(P.amount)}</b>`;
  } else if(R.goalType==='retire'){
    goal = `To retire by <b>${P.age}</b> at <b>${R.targetPct}%</b> confidence`;
  } else if(R.goalType==='purchase'){
    goal = `To afford <b>${money(P.amount)}</b> at age <b>${P.age}</b> and stay at <b>${R.targetPct}%</b> confidence`;
  } else if(R.goalType==='gift'){
    goal = `To gift <b>${money(P.amount)}/yr</b> through age <b>${P.toAge}</b> and stay at <b>${R.targetPct}%</b> confidence`;
  } else {
    goal = `To reach <b>${R.targetPct}%</b> confidence`;
  }
  goal += `, here's what each lever would need to be on its own:`;
  const allCapped = R.rows.length > 0 && R.rows.every(r => r.capped);
  const rows = R.rows.map((row,i) => {
    const t = soloRowText(row.key, R.soloBase[row.key], row.value);
    const capped = row.capped;
    // "Already meets it" only when NOT capped and no move needed. When capped,
    // the lever can't get there at all — show the best it can do, never "meets it".
    const justMeets = t.unchanged && !capped;
    const move = justMeets
      ? `<span class="solo-to">${t.to}</span><span class="solo-delta">already meets it</span>`
      : t.unchanged   // capped but no useful move exists
        ? `<span class="solo-to">${t.to}</span><span class="solo-delta">no setting reaches it</span>`
        : `<span class="solo-from">${t.from}</span><span class="solo-arrow">→</span><span class="solo-to">${t.to}</span><span class="solo-delta">${t.delta}</span>`;
    return `<div class="solo-row ${capped?'capped':''} ${justMeets?'unchanged':''}">
      <div class="solo-name">${t.name}</div>
      <div class="solo-move">${move}</div>
      <div class="solo-pct ${capped?'capped':''}">${capped ? `best hits ${row.reachedPct.toFixed(0)}%` : `${row.reachedPct.toFixed(0)}% ✓`}</div>
      <button class="solve-load" data-solo-idx="${i}" ${capped||justMeets||!R.canLoad?'disabled':''}>Load</button>
    </div>`;
  }).join('');
  const allCappedNote = allCapped
    ? `<div class="solo-allcapped">No single lever reaches ${R.targetPct}% — combine moves, or ease the goal.</div>` : '';
  el.innerHTML = `
    <div class="solve-panel">
      <div class="solve-panel-head">
        <span class="solve-panel-title">${goal}</span>
        <button class="solve-clear" id="solve-clear-btn">✕ Clear</button>
      </div>
      <div class="solo-list">${rows}</div>
      ${allCappedNote}
    </div>`;
}

// Solve toward a chosen GOAL. Build soloBase = today's plan + the wish applied,
// pick the scorer (success %, or legacy "% chance of ≥ $X"), then for each
// controllable lever find what it ALONE would need within a realistic band —
// holding all else at soloBase. Neutral: no weighting, no bundling. The advisor
// reads each lever's required move and surmises any blend.
async function runSolve(goalType, params){
  if(solving) return;
  solving = true; solverFormOpen = false; solverSearching = true; solverResults = null;
  renderSolvePanel();

  if(!sharedPaths){
    resetSeed();
    const horizon = plan.household.primary.planEndAge - plan.household.primary.currentAge;
    sharedPaths = [];
    for(let i=0; i<plan.simulation.iterations; i++) sharedPaths.push(generateReturnPath(horizon));
  }

  const baseLev  = JSON.parse(JSON.stringify(scenarios.find(s=>s.base)?.lev || defaultLevers()));
  const soloBase = JSON.parse(JSON.stringify(baseLev));
  let pinned = null, score = trySuccess;
  if(goalType==='retire'){        soloBase.retireAge = params.age; pinned = 'retireAge'; }
  else if(goalType==='purchase'){ soloBase.eventAmt = params.amount; soloBase.eventAge = params.age; }
  else if(goalType==='gift'){     soloBase.giftAmt = params.amount; soloBase.giftEndAge = params.toAge; }
  else if(goalType==='legacy'){   score = (L)=>tryLegacyProb(L, params.amount); }
  syncPension(soloBase);

  const keys = SOLVE_KEYS.filter(k => k !== pinned);
  const rows = [];
  for(const k of keys){
    await new Promise(r => setTimeout(r, 0));      // yield so the spinner paints
    const band = solveBand(k, soloBase);
    const res  = solveLeverFor(soloBase, k, params.pct, score, band);
    if(res) rows.push({ key:k, value:res.value, reachedPct:res.reachedPct, capped:res.capped });
  }

  // Gift injects a liability with no column/lever to display, so its solos
  // can't be loaded as a scenario faithfully — read-only. Everything else loads.
  solverResults  = { goalType, params, targetPct: params.pct, soloBase, rows, canLoad: goalType!=='gift' };
  solverSearching = false;
  solving = false;
  renderSolvePanel();
}

// start identical; the advisor moves levers to show each decision's effect, and
// can rename / add / remove them. Both tabs read this shared set.
// The first-run demo set tells a story: B retires 2yr later (security improves),
// C goes aggressive (wealth line jumps, success does NOT — volatility drag).
function demoScenarios(){
  const s=[
    {name:'Baseline',   base:true,  lev:defaultLevers(), res:null},
    {name:'Scenario B', base:false, lev:defaultLevers(), res:null},
    {name:'Scenario C', base:false, lev:defaultLevers(), res:null},
  ];
  s[1].lev.retireAge = 67;
  s[2].lev.risk      = 5;
  return s;
}

let solverFormOpen = false, solving = false;

/* Map a scenario's levers -> engine override object. */
function leversToOverrides(L){
  const ov={};
  const baseRetire = plan.household.primary.retirementAge;
  const baseSs     = plan.income.socialSecurity.primary.claimAge;
  if(L.retireAge !== baseRetire) ov.retireDelay = L.retireAge - baseRetire;
  if(L.ssAge !== baseSs)         ov.ssDelayYears = L.ssAge - baseSs;
  // spend vs plan.expenses.living. The engine takes INCREASES via spendBump and
  // CUTS via spendCut — a negative spendBump is ignored (engine clamps it to 0).
  // So we MUST split by direction or lowering the spend lever silently no-ops.
  const baseSpend = plan.expenses.living;
  const spendFrac = (L.spend - baseSpend)/baseSpend;
  if(spendFrac > 0)      ov.spendBump = spendFrac;
  else if(spendFrac < 0) ov.spendCut  = -spendFrac;   // engine caps the cut at 50%
  if(L.eventAmt>0){ ov.lumpSum = L.eventAmt; ov.lumpSumYear = Math.max(0, L.eventAge - plan.household.primary.currentAge); }
  if(L.savings !== plan.savings.annual) ov.savingsBump = (L.savings - plan.savings.annual)/Math.max(1,plan.savings.annual);
  // Pension: always pass the chosen age as an absolute override so the engine
  // looks up the entered benefit for THAT exact age (or pays 0 if no entry).
  ov.pensionStartAge = L.pensionAge;
  return ov;
}
/* Risk lever changes the profile -> needs a plan clone, not an override.
   A gift/education goal injects a time-limited recurring outflow (a liability
   with start/end age). colaPct = inflation so it stays real-constant — the
   advisor enters today's dollars. No-op for normal scenarios (no giftAmt). */
function planForScenario(L){
  const p=JSON.parse(JSON.stringify(plan));
  p.portfolio.riskProfile = L.risk;
  if(L.giftAmt > 0 && L.giftEndAge){
    p.liabilities = (p.liabilities || []).concat([{
      amount: L.giftAmt,
      startAge: plan.household.primary.currentAge,
      endAge: L.giftEndAge,
      colaPct: LONGRUN_INFLATION * 100
    }]);
  }
  return p;
}

let activeSub = (()=>{ try{ const k=localStorage.getItem(SUB_KEY); return SUB_PAGES[k]?k:'balance-sheet'; }catch{ return 'balance-sheet'; } })();
const getPath=(o,p)=>p.split('.').reduce((a,k)=>a&&a[k],o);
const setPath=(o,p,v)=>{const ks=p.split('.');const last=ks.pop();let t=o;for(const k of ks)t=t[k];t[last]=v;};

// Live comma formatting for money inputs. Reformats on every keystroke and
// preserves the caret's LOGICAL position (after the same number of digits)
// so typing left-to-right feels natural — no caret-jumping-to-end weirdness.
function liveCommas(el){
  const old = el.value;
  const caret = el.selectionStart ?? old.length;
  const digitsBefore = (old.slice(0, caret).match(/\d/g) || []).length;
  const digits = old.replace(/[^0-9]/g, '');
  if(!digits){ el.value = ''; return; }
  const formatted = parseInt(digits, 10).toLocaleString('en-US');
  el.value = formatted;
  let pos = 0, seen = 0;
  while(pos < formatted.length && seen < digitsBefore){
    if(/\d/.test(formatted[pos])) seen++;
    pos++;
  }
  el.setSelectionRange(pos, pos);
}

let baseSnapshot=defaultLevers();   // base lever values; used to preserve deltas
let plansDirty=false;

// Re-seed scenarios from the current base, keeping each scenario's adjustment.
function reseedScenarios(){
  const nb=defaultLevers();
  const LINKED=['retireAge','ssAge','spend','savings','pensionAge'];   // base-linked levers
  scenarios.forEach(s=>{
    Object.keys(nb).forEach(k=>{
      if(s.base){ s.lev[k]=nb[k]; return; }   // baseline always mirrors the base
      if(!LINKED.includes(k)) return;         // allocation / one-time event stay as set
      const cfg=LEVCFG.find(c=>c.key===k);
      let v=nb[k]+(s.lev[k]-baseSnapshot[k]);  // new base + this scenario's delta
      if(cfg){ const r=levRange(cfg); v=Math.max(r.min,Math.min(r.max,v)); }
      s.lev[k]=v;
    });
    syncPension(s.lev);   // auto-linked pension follows the (possibly new) retire age
  });
  baseSnapshot=nb;
}

// Build the Pension group's fields fresh on every render so any new
// age entered via the Scenarios inline input shows up here as its own row.
function pensionFields(){
  const m=(plan.income.pension && plan.income.pension.benefitByAge) || {};
  return Object.keys(m).map(Number).sort((a,b)=>a-b).map(age=>(
    {path:`income.pension.benefitByAge.${age}`, label:`Benefit if claimed @ ${age}`, type:'money'}
  ));
}
/* ── Derived totals (pure aggregation of typed inputs, NOT engine output) ──
   These read the live plan and feed the gutter on each sub-page. The gutter
   is the same shape on every page — a big number + breakdown rows — so the
   eye lands in the same place. Useful information, not descriptions. */
function investableTotal(){
  const a=plan.portfolio.accounts;
  return (a.taxable.balance||0)+(a.traditional.balance||0)+(a.roth.balance||0);
}
// Net worth = assets - liabilities. Real-asset and recurring-liability UI
// surfaces ship empty for now (stubs), so until those are filled the gutter
// shows investable as net worth and zeroes for the empty buckets — never
// invents numbers. When real assets and liabilities land, this fn picks
// them up automatically from the plan.
function realAssetsTotal(){ return (plan.realAssets||[]).reduce((s,a)=>s+(a.value||0),0); }
function liabilitiesPVTotal(){
  // Sum of liabilities' simple present value: amount/yr × years remaining.
  // Honest crude estimate for the side-panel — the engine still does the
  // proper time-erosion math during simulation.
  const p=plan.household.primary;
  return (plan.liabilities||[]).reduce((s,L)=>{
    const yrs = Math.max(0, (L.endAge||p.planEndAge) - Math.max(L.startAge||p.currentAge, p.currentAge));
    return s + (L.amount||0)*yrs;
  },0);
}
function netWorthTotal(){ return investableTotal() + realAssetsTotal() - liabilitiesPVTotal(); }

// Column subtotals — sums the items defined in HYBRID[page].left / .right.
// Dynamic-pension items (Inflows · Guaranteed) are included automatically.
function colSum(page, side){
  const col = HYBRID[page] && HYBRID[page][side];
  if(!col) return 0;
  let s = 0;
  (col.items||[]).forEach(it => { s += (getPath(plan, it.path)||0); });
  if(col.dynamic==='pension'){
    const m=(plan.income.pension&&plan.income.pension.benefitByAge)||{};
    // Pension pays ONE amount — at the chosen start age. Don't sum every age.
    const pStart=(plan.income.pension&&plan.income.pension.startAge);
    s += (pStart && m[pStart]) || 0;
  }
  return s;
}
function hybridTotal(page){ return colSum(page,'left') + colSum(page,'right'); }

const fmtMoney = v => '$'+(v||0).toLocaleString('en-US');

// Page-specific gutter HTML. Same shape on every page — title row + big
// number + a breakdown of the parts. No descriptions; the structure IS the
// description. Net Worth shows assets / liabilities / net; the three hybrid
// pages show the left-column total / right-column total / overall.
function renderGutter(pageKey){
  const sp = SUB_PAGES[pageKey];
  if(pageKey === 'balance-sheet'){
    const assets = investableTotal() + realAssetsTotal();
    const liab   = liabilitiesPVTotal();
    const nw     = assets - liab;
    return `<div class="np-gutter">
      <div class="lbl">Net Worth</div>
      <div class="big-num teal">${fmtMoney(nw)}</div>
      <hr class="gut-rule"/>
      <div class="row"><span>Investable</span><b>${fmtMoney(investableTotal())}</b></div>
      <div class="row"><span>Real assets</span><b>${fmtMoney(realAssetsTotal())}</b></div>
      <div class="row"><span>Liabilities</span><b>${fmtMoney(liab)}</b></div>
    </div>`;
  }
  const def = HYBRID[pageKey];
  const total = hybridTotal(pageKey);
  return `<div class="np-gutter">
    <div class="lbl">${sp.totLabel}</div>
    <div class="big-num teal">${fmtMoney(total)}</div>
    <div class="big-sub">per year · today's dollars</div>
    <hr class="gut-rule"/>
    <div class="row"><span>${def.left.head}</span><b>${fmtMoney(colSum(pageKey,'left'))}</b></div>
    <div class="row"><span>${def.right.head}</span><b>${fmtMoney(colSum(pageKey,'right'))}</b></div>
  </div>`;
}

/* ── Field renderer — one input element, shared by both layouts ──── */
function renderField(f, klass){
  const v = getPath(plan, f.path);
  if(f.type==='risk'){
    const opts = Object.keys(RISK_NAMES).map(k =>
      `<option value="${k}" ${+k===+v?'selected':''}>${RISK_NAMES[k]} · ${RISK_LABELS[k]}</option>`).join('');
    return `<select data-path="${f.path}" data-type="risk">${opts}</select>`;
  }
  if(f.type==='money'){
    const dv = (v||0).toLocaleString('en-US');
    return `<span class="pre">$</span><input type="text" inputmode="numeric" data-path="${f.path}" data-type="money" value="${dv}">`;
  }
  if(f.type==='pct'){
    const dv = Math.round((v||0)*100);
    return `<input type="number" data-path="${f.path}" data-type="pct" value="${dv}" step="1"><span class="pre">%</span>`;
  }
  // age
  return `<input type="number" data-path="${f.path}" data-type="${f.type}" value="${v}" step="1">`;
}

/* ── Statement layout (Balance Sheet) ─────────────────────────────
   Section heads = small caps + thin gold underline. Rows = label, dotted
   leader, boxless input. Subtotal closes a money section in slate. */
function renderStatement(){
  // No per-section wrapper div — every element is a direct child of .bs-sheet
  // so the .bs-head:first-of-type rule applies to the FIRST head on the page.
  let h='';
  BALANCE_SHEET.forEach(sec => {
    h += `<div class="bs-head">${sec.head}</div>`;
    (sec.fields||[]).forEach(f => {
      const rowCls = f.sub ? 'bs-row sub' : 'bs-row';
      h += `<div class="${rowCls}"><label>${f.label}</label><span class="bs-dots"></span><span class="field">${renderField(f)}</span></div>`;
    });
    if(sec.subtotal==='invest'){
      h += `<div class="bs-sub"><span class="bs-sub-l">Investable total</span><span class="bs-sub-d"></span><span class="bs-sub-v">${fmtMoney(investableTotal())}</span></div>`;
    }
    if(sec.add) h += `<div class="bs-add">${sec.add}</div>`;
  });
  return `<div class="np-page">
    ${renderGutter('balance-sheet')}
    <div class="bs-sheet">${h}</div>
  </div>`;
}

/* ── Hybrid layout (Inflows / Outflows / Goals) ───────────────────
   200px gutter (title + description + running total) + two facing columns
   split by a single vertical hairline. Each item: name on the left, boxless
   input on the right, meta line below the name in ink-mute. */
function renderHybrid(pageKey){
  const def = HYBRID[pageKey];
  const colHtml = colDef => {
    let h = `<h4>${colDef.head}</h4>`;
    const items = (colDef.items||[]).slice();
    if(colDef.dynamic==='pension'){
      // ONE summary row — the benefit at the chosen start age. The full
      // benefit-by-age schedule and which age to claim is decided at the
      // Scenario level (the pension slider), not here. Inputs just shows the
      // household's pension as it stands. Editing the amount writes back to
      // the entry for the current start age.
      const pen = plan.income.pension || {};
      const pstart = pen.startAge;
      const ages = Object.keys(pen.benefitByAge||{}).map(Number).sort((a,b)=>a-b);
      const age = (pstart!=null && (pen.benefitByAge||{})[pstart]!=null) ? pstart
                : (ages.length ? ages[0] : null);
      if(age!=null){
        items.push({
          path: `income.pension.benefitByAge.${age}`,
          name: 'Pension',
          type: 'money',
          meta: () => `Begins at age ${age}`,
        });
      }
    }
    items.forEach(it => {
      const xBtn = it.removable ? `<button class="row-x" title="Remove this row" data-rmpath="${it.path}">×</button>` : '';
      h += `<div class="hp-item"><div class="ti"><span class="nm">${it.name}</span><span class="field">${renderField(it)}${xBtn}</span></div>`;
      const m = it.meta ? it.meta() : '';
      if(m) h += `<div class="meta">${m}</div>`;
      h += `</div>`;
    });
    if(colDef.add) h += `<div class="hp-add">${colDef.add}</div>`;
    return `<div class="hp-col">${h}</div>`;
  };
  return `<div class="np-page">
    ${renderGutter(pageKey)}
    <div class="hp-body">
      ${colHtml(def.left)}
      <div class="hp-rule"></div>
      ${colHtml(def.right)}
    </div>
  </div>`;
}

/* ── Snapshot (the diagnosis) ──────────────────────────────────────
   Three diagnostic gauges, each a RELATIONSHIP between numbers already
   entered — not engine projections. These are static rules-of-thumb (like a
   balance-sheet ratio): the income floor, the year-one withdrawal rate, and
   the tax-location mix. The engine still owns the real probability (Scenarios);
   this page is the at-a-glance condition of the household TODAY. Neutrality:
   the same gauges read green when the news is good and red when it isn't —
   the tool has no thesis, it just shows what's there. */
function snapshotMetrics(){
  const a = plan.portfolio.accounts;
  const taxable = a.taxable.balance||0, trad = a.traditional.balance||0, roth = a.roth.balance||0;
  const invest = taxable + trad + roth;
  // Guaranteed-for-life income at retirement: both SS benefits + pension at its
  // chosen start age (today's-dollar values straight off the inputs).
  const ssP = plan.income.socialSecurity.primary.pia||0;
  const ssS = (plan.income.socialSecurity.spouse && plan.income.socialSecurity.spouse.pia)||0;
  const pen = plan.income.pension||{};
  const penAmt = (pen.benefitByAge && pen.startAge!=null) ? (pen.benefitByAge[pen.startAge]||0) : 0;
  const guaranteed = ssP + ssS + penAmt;
  const essentials = (plan.expenses.living||0) + (plan.expenses.healthcare||0);
  const goals = (plan.goals.vacation||0) + (plan.goals.property||0) + (plan.goals.gifts||0);
  const totalSpend = essentials + goals;
  const floorPct = essentials>0 ? guaranteed/essentials : 0;
  const fromPortfolioEssential = Math.max(0, essentials - guaranteed);
  const gap = Math.max(0, totalSpend - guaranteed);
  const wr = invest>0 ? gap/invest : 0;
  // Replacement ratio: retirement income (= funded retirement spending) as a
  // share of gross working income. Anchors the future number to life today.
  const workingIncome = plan.income.workingIncome || 0;
  const replacement = workingIncome>0 ? totalSpend/workingIncome : null;
  return { taxable, trad, roth, invest, guaranteed, essentials, goals, totalSpend,
           floorPct, fromPortfolioEssential, gap, wr, workingIncome, replacement };
}
function renderSnapshot(){
  const m = snapshotMetrics();
  const pct = v => (v*100);
  const pct1 = v => (v*100).toFixed(1)+'%';
  const pct0 = v => Math.round(v*100)+'%';

  // 1 · Income floor — floating stats (no bar: bar implied a grade, this is a fact).
  const floorTone = m.floorPct>=0.9 ? 'teal' : m.floorPct>=0.6 ? 'gold' : 'clay';
  const incomeFloor = `
    <div class="metric">
      <div>
        <div class="m-eye">Income Floor</div>
        <div class="m-hero ${floorTone}">${pct0(m.floorPct)}</div>
        <div class="m-sub">of essential spending is covered for life by guaranteed income</div>
      </div>
      <div class="stat-row">
        <div class="stat-item"><div class="stat-lbl">Guaranteed for life</div><div class="stat-val">${fmtMoney(m.guaranteed)}</div></div>
        <div class="stat-item"><div class="stat-lbl">Drawn from portfolio</div><div class="stat-val">${fmtMoney(m.fromPortfolioEssential)}</div></div>
        <div class="stat-item"><div class="stat-lbl">Essential spending</div><div class="stat-val">${fmtMoney(m.essentials)}</div></div>
      </div>
    </div>`;

  // 2 · Withdrawal rate — neutral metric, no grading. Shown for reference and
  // as a starting point for advisor conversation, not a verdict.
  const withdrawal = `
    <div class="metric">
      <div>
        <div class="m-eye">Withdrawal Rate · Year One</div>
        <div class="m-hero">${pct1(m.wr)}</div>
        <div class="m-sub">of the portfolio drawn the first year of retirement</div>
      </div>
      <div class="stat-row">
        <div class="stat-item"><div class="stat-lbl">Portfolio draws / yr</div><div class="stat-val">${fmtMoney(m.gap)}</div></div>
        <div class="stat-item"><div class="stat-lbl">From invested</div><div class="stat-val">${fmtMoney(m.invest)}</div></div>
        <div class="stat-item"><div class="stat-lbl">Total retirement spend</div><div class="stat-val">${fmtMoney(m.totalSpend)}</div></div>
      </div>
    </div>`;

  // 3 · Tax location — segmented proportion bar. Hero = the tax-deferred share
  // (the future-tax exposure). Labels hidden on slivers too thin to hold text.
  const tP = m.invest>0 ? m.taxable/m.invest : 0;
  const dP = m.invest>0 ? m.trad/m.invest : 0;
  const rP = m.invest>0 ? m.roth/m.invest : 0;
  const segLbl = (p) => pct(p)>=8 ? pct0(p) : '';
  const taxLocation = `
    <div class="metric">
      <div>
        <div class="m-eye">Tax Location</div>
        <div class="m-hero">${pct0(dP)}</div>
        <div class="m-sub">sits in tax-deferred accounts — taxed as income when withdrawn</div>
      </div>
      <div>
        <div class="seg">
          <div class="s-tax" style="width:${(tP*100).toFixed(1)}%">${segLbl(tP)}</div>
          <div class="s-def" style="width:${(dP*100).toFixed(1)}%">${segLbl(dP)}</div>
          <div class="s-roth" style="width:${(rP*100).toFixed(1)}%">${segLbl(rP)}</div>
        </div>
        <div class="seg-legend">
          <span class="k"><span class="sw" style="background:var(--teal)"></span>Taxable<b>${fmtMoney(m.taxable)}</b></span>
          <span class="k"><span class="sw" style="background:var(--gold)"></span>Tax-deferred<b>${fmtMoney(m.trad)}</b></span>
          <span class="k"><span class="sw" style="background:#3c7d59"></span>Tax-free · Roth<b>${fmtMoney(m.roth)}</b></span>
        </div>
      </div>
    </div>`;

  // 4 · Replacement ratio — retirement income as a share of working income.
  // NEUTRAL by design: no safety zones, because a higher ratio isn't worse —
  // it's the upside (live as well or better than today). Reference ticks only:
  // a faint "typical ~75%" heuristic and a solid "100% = working income" line.
  // Scale runs 0–120% so over-100% (spending up in retirement) still shows.
  let replacement;
  if(m.replacement == null){
    replacement = `
      <div class="metric">
        <div>
          <div class="m-eye">Replacement Ratio</div>
          <div class="m-hero">—</div>
          <div class="m-sub">add working income on the Balance Sheet to compare retirement to life today</div>
        </div>
        <div></div>
      </div>`;
  } else {
    // Coverage bar — same language as the income floor. The full track = working
    // income; the teal fill = the share retirement income replaces. No vertical
    // ticks cutting through text. Caps at the track; over-100% (spending more in
    // retirement) shows full + the true % in the hero.
    const fillPct = Math.min(100, m.replacement*100);
    replacement = `
      <div class="metric">
        <div>
          <div class="m-eye">Replacement Ratio</div>
          <div class="m-hero teal">${pct0(m.replacement)}</div>
          <div class="m-sub">of working income, replaced by retirement income</div>
        </div>
        <div>
          <div class="cov"><div class="fill" style="width:${fillPct.toFixed(1)}%">Retirement&nbsp;·&nbsp;${fmtMoney(m.totalSpend)}</div></div>
          <div class="cov-legend">
            <span class="k"><span class="sw" style="background:var(--teal)"></span>Retirement income<b>${fmtMoney(m.totalSpend)}</b></span>
            <span class="k"><span class="sw" style="background:#e3d9c5"></span>Working income<b>${fmtMoney(m.workingIncome)}</b></span>
          </div>
        </div>
      </div>`;
  }

  return `<div class="snap">${incomeFloor}${withdrawal}${taxLocation}${replacement}</div>`;
}

/* ── Sub-page render + wiring ─────────────────────────────────────
   One renderInputs() drives whichever sub-page is active. Re-renders on
   sub-nav click, on field change, and on row delete — same wiring pattern
   as before so live-commas / scenario re-seeding / plansDirty all still
   work without per-layout duplication. */
function renderInputs(){
  // sub-nav active state
  $$('#np-subnav .stab').forEach(b => b.classList.toggle('on', b.dataset.sub===activeSub));
  const layout = SUB_PAGES[activeSub].layout;
  const html = layout==='statement' ? renderStatement()
             : layout==='snapshot'  ? renderSnapshot()
             :                        renderHybrid(activeSub);
  $('#np-content').innerHTML = html;
  // Snapshot is read-only (diagnostic gauges) — no field wiring needed; bail
  // after injecting so the input-binding code below doesn't run on it.
  if(layout==='snapshot') return;

  // Row delete (×): drop the last key along the path, re-render.
  $$('#np-content .row-x').forEach(btn => {
    btn.addEventListener('click', e => {
      const path = e.target.dataset.rmpath;
      const ks = path.split('.'); const last = ks.pop();
      let t = plan; for(const k of ks){ if(t==null) return; t=t[k]; }
      if(t!=null) delete t[last];
      sharedPaths = null; plansDirty = true;
      renderInputs();
      $('#status').textContent='Plan edited · open Scenarios';
    });
  });
  // Live commas while typing into any money field.
  $$('#np-content input[data-type="money"]').forEach(el => {
    el.addEventListener('input', e => liveCommas(e.target));
  });
  // Commit edits on change (blur / enter / select-change).
  $$('#np-content input, #np-content select').forEach(el => {
    el.addEventListener('change', e => {
      const path = e.target.dataset.path, type = e.target.dataset.type;
      const raw = e.target.value;
      let v;
      if(type==='money')      v = parseFloat(String(raw).replace(/[^0-9.]/g,''));
      else if(type==='risk')  v = +raw;
      else                    v = parseFloat(raw);
      if(!isFinite(v)) return;
      if(type==='pct')   v = Math.max(0, Math.min(100, v))/100;
      if(type==='money'){ v = Math.max(0, Math.round(v)); e.target.value = v.toLocaleString('en-US'); }
      setPath(plan, path, v);
      reseedScenarios();
      buildLevers();
      sharedPaths = null;
      plansDirty = true;
      renderInputs();   // re-draw so totals + meta lines reflect the edit
      $('#status').textContent='Plan edited · open Scenarios';
    });
  });
}

// Pension slider range is PER-HOUSEHOLD: it spans only the ages the advisor has
// actually quoted a benefit for (the keys of benefitByAge). This means the
// slider can never wander onto an age with no number — so it can't silently pay
// $0. Enter a new quote (e.g. age 67) and the slider grows to include it on the
// next render. Falls back to a sane window if nothing is entered yet.
function pensionAges(){
  const m=(plan.income.pension && plan.income.pension.benefitByAge) || {};
  return Object.keys(m).map(Number).filter(n=>!isNaN(n)).sort((a,b)=>a-b);
}
// Effective slider range for a lever. Pension is dynamic; everything else is
// the static min/max declared in LEVCFG.
function levRange(cfg){
  if(cfg.key==='pensionAge'){
    const a=pensionAges();
    if(a.length) return { min:a[0], max:a[a.length-1], step:1 };
    return { min:62, max:65, step:1 };
  }
  return { min:cfg.min, max:cfg.max, step:cfg.step };
}

/* ── lever display config (label, formatter, slider range→value & back) ── */
const LEVCFG=[
  {key:'retireAge', name:'Retirement Age', min:55,max:72,step:1, fmt:v=>[v,'']},
  {key:'ssAge',     name:'SS Start Age',   min:62,max:70,step:1, fmt:v=>[v,'']},
  // All dollar levers render full digits with comma grouping — no abbreviations.
  // The advisor wants to see the exact number they're proposing, not a rounded
  // shorthand. Step values stay round so the slider snaps cleanly.
  // Spending is stored ANNUAL (the engine's unit) but shown/edited MONTHLY —
  // clients know their monthly number off-hand. edit:'monthly' wires the box.
  {key:'spend',     name:'Monthly Spending',min:80000,max:360000,step:1200, edit:'monthly', fmt:v=>['$'+Math.round(v/12).toLocaleString('en-US'),'/mo']},
  // One-time event carries BOTH an amount and an age; edit:'event' renders the
  // two type-in boxes (amount + age) alongside the amount slider.
  {key:'eventAmt',  name:'One-Time Event', min:0,max:500000,step:5000, edit:'event', fmt:(v,L)=>['$'+(v||0).toLocaleString('en-US'),'@ '+L.eventAge]},
  {key:'risk',      name:'Allocation',     min:1,max:5,step:1, fmt:v=>[RISK_LABELS[v],'']},
  {key:'savings',   name:'Savings / yr',   min:0,max:200000,step:1000, edit:'money', fmt:v=>['$'+v.toLocaleString('en-US'),'/yr']},
  // Pension snaps between the ages that actually have entered amounts (62, 65).
  // Label shows the dollar value the engine will pay for that age — if no entry
  // exists for that age, it shows "—" (and the engine pays 0).
  // Pension claim age. Range spans the realistic window; the displayed dollar
  // amount comes from whatever the advisor has entered for that exact age.
  // No entry yet → the value spot becomes an inline input (handled in
  // renderLevValue, not here). This is the truth-source contract surfacing
  // naturally as a UI affordance: "we don't have a number for this age, give
  // us one." Not an error — just the next input.
  {key:'pensionAge', name:'Pension',       min:55,max:70,step:1, fmt:v=>{
    const m=(plan.income.pension && plan.income.pension.benefitByAge) || {};
    const amt=m[v]; return (amt && amt>0) ? ['$'+amt.toLocaleString('en-US'),'@ '+v] : ['__needs__', v];
  }},
];

let running=false;
// Cached market bundle. Generated once, reused across Runs so that hitting Run
// twice with no changes yields the EXACT same numbers (sampling noise was
// causing the % to drift between identical clicks). Invalidated to null
// whenever the plan changes in the Inputs tab.
let sharedPaths=null;

/* ── run the engine for all three columns (shared nothing; each its own MC) ── */
function runAll(){
  if(running) return; running=true;
  const btn=$('#run-btn'); btn.disabled=true; $('#status').textContent='Running…';
  setTimeout(()=>{
    try{
      // SHARED PATHS: one bundle of return paths, reused across scenarios AND
      // across Runs. Within a Run, every column sees the SAME markets (any
      // difference between columns is the DECISION). Across Runs, the bundle
      // is cached so identical inputs give an identical % — no noise drift.
      const horizon = plan.household.primary.planEndAge - plan.household.primary.currentAge;
      const iters = plan.simulation.iterations;
      // Degenerate plan guard: a non-positive horizon (plan-end age at/below
      // current age) can't be simulated. Surface a clear reason and bail
      // WITHOUT nuking the last good results, so the views don't go blank.
      if(!(horizon > 0)){
        $('#status').textContent='Check plan: end age must be after current age';
        btn.disabled=false; running=false; return;
      }
      if(!sharedPaths || sharedPaths.length !== iters || sharedPaths[0].length !== horizon){
        resetSeed();              // fixed seed → identical bundle every load, no % drift
        sharedPaths = [];
        for(let i=0;i<iters;i++) sharedPaths.push(generateReturnPath(horizon));
      }
      // Isolate each scenario: one bad column (e.g. an out-of-range saved lever)
      // must not abort the whole Run and blank every other column + the cash
      // flow drawer. Failed scenarios get res=null and are skipped downstream.
      let failed=0;
      scenarios.forEach(s=>{
        try{
          const p=planForScenario(s.lev);
          const ov=leversToOverrides(s.lev);
          s.res=runSimulation(p, ov, sharedPaths);
        }catch(err){ s.res=null; failed++; console.error('Scenario failed:', s.name, err); }
      });
      renderBand(); renderSolvePanel(); renderFoot(); renderCashflow(); buildSeqSelect(); runSeq();
      $('#status').textContent = failed ? `Complete · ${failed} scenario${failed>1?'s':''} could not run` : 'Complete';
    }catch(e){ $('#status').textContent='Error'; console.error(e); }
    btn.disabled=false; running=false;
  },20);
}

/* ── render: sticky band of circles ── */
// Success ring color band: steel-teal (strong) / brass (caution) /
// clay (at risk). No green — matches the Obsidian Brass result tokens.
// Ring band matches the % number: deep green / bronze gold / deep burgundy.
function ringColor(pct){ return pct>=85?'#194a2c':pct>=70?'#9a7322':'#8f3340'; }
function ring(pct){
  // SVG fills its .circle-wrap via viewBox, so the ring size is controlled by
  // CSS (one place). Thin stroke near the edge leaves room for the % number.
  const r=45,c=2*Math.PI*r,off=c*(1-pct/100);
  const col=ringColor(pct);
  return `<svg viewBox="0 0 100 100" width="100%" height="100%">
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="#e2dccd" stroke-width="4"/>
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="${col}" stroke-width="4" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 50 50)" style="transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)"/></svg>`;
}
// The band / levers / foot are CSS grids whose column count must match the
// number of scenarios. One place sets it (label gutter + N equal columns) so
// adding/removing a scenario reflows all three rows together.
function syncGridCols(){
  const tpl=`148px repeat(${scenarios.length},1fr)`;
  ['#scn-band','#scn-levers','#scn-foot'].forEach(sel=>{
    const el=$(sel); if(el) el.style.gridTemplateColumns=tpl;
  });
}
function renderBand(){
  syncGridCols();
  let h=`<div class="band-cell label"><span>Scenario</span></div>`;
  scenarios.forEach((s,ci)=>{
    const sr=s.res?s.res.successRate:0;
    const col= sr>=85?'var(--positive-bright)':sr>=70?'var(--gold-bright)':'var(--negative-bright)';
    // Header: a small identity dot (column color) + the name. Baseline's name is
    // locked (the anchor); other scenarios render an inline editable field so the
    // advisor can label them ("Retire at 62"). A ✕ removes non-baseline columns.
    const dot=`<span class="col-dot" style="background:${colorFor(ci)}"></span>`;
    const nameEl = s.base
      ? `<span class="col-name base-tag">${dot}${escHtml(s.name)}</span>`
      : `<span class="col-name">${dot}<input class="col-rename" data-col="${ci}" value="${escHtml(s.name)}" maxlength="28" aria-label="Scenario name"><button class="col-x" data-col="${ci}" title="Remove scenario">✕</button></span>`;
    h+=`<div class="band-cell ${s.base?'base':''}">
      ${nameEl}
      <div class="circle-wrap">${ring(sr)}
        <div class="circle-val"><span class="big" style="color:${col}">${sr.toFixed(1)}%</span><span class="lbl">Success</span></div></div>
    </div>`;
  });
  // Label gutter: just buttons. The solver FORM renders in the full-width
  // #solve-panel below the band (it needs room — the gutter is only ~148px).
  const addBtn = scenarios.length < MAX_SCENARIOS
    ? `<button class="add-scen" title="Add scenario">+ Add</button>` : '';
  const gut = `<span>Scenario</span>${addBtn}
    <button class="solve-btn" title="Find the least-disruptive path to a goal">✦ Solve…</button>`;
  h=h.replace('<span>Scenario</span>', gut);
  $('#scn-band').innerHTML=h;
}

/* ── render: lever grid (built once, values update in place) ── */
// Format a single lever value into the inner HTML for its display span.
// Special return ['__needs__', age] from a fmt() means "no entered amount for
// this age yet" — render an inline input so the advisor can type one in
// without leaving the lever. Plain numbers/strings render as before.
// Neutral delta-vs-baseline chip — the COMPARISON cue (Scenarios = compare
// choices). No good/bad coloring: later retirement isn't "better," it's a
// trade-off, so the chip stays a muted, opinion-free tone. Empty on the
// baseline column and wherever a lever matches baseline.
function levDelta(cfg, lev){
  const baseLev = scenarios.find(s=>s.base)?.lev;
  if(!baseLev || lev===baseLev) return '';
  const d = (lev[cfg.key]||0) - (baseLev[cfg.key]||0);
  if(!d) return '';
  const sign = d>0 ? '+' : '−', a = Math.abs(d);
  let txt;
  if(cfg.key==='spend')                 txt = `${sign}$${Math.round(a/12).toLocaleString('en-US')}/mo`;
  else if(cfg.key==='savings' || cfg.key==='eventAmt') txt = `${sign}$${a.toLocaleString('en-US')}`;
  else if(cfg.key==='risk')             txt = `${sign}${a} lvl`;
  else /* ages */                       txt = `${sign}${a} yr`;
  return `<span class="lev-delta">${txt}</span>`;
}
// Stepper buttons for the discrete levers (ages / allocation / pension). The
// click handler derives the column from the enclosing #lv-… span, so the
// buttons only carry key + direction. ml:auto pins them right when there's no
// delta chip to do it.
function stepper(cfg, pinRight){
  return `<span class="lev-step"${pinRight?' style="margin-left:auto"':''}>`
       + `<button class="step-btn" data-dir="-1" data-key="${cfg.key}" tabindex="-1">−</button>`
       + `<button class="step-btn" data-dir="1" data-key="${cfg.key}" tabindex="-1">+</button></span>`;
}
function renderLevValue(cfg, lev){
  const [val,unit]=cfg.fmt(lev[cfg.key], lev);
  if(val==='__needs__'){
    return `$<input class="pen-in" type="text" inputmode="numeric" data-pen-age="${unit}"> <span class="unit">@ ${unit}</span>${stepper(cfg,true)}`;
  }
  const d = levDelta(cfg, lev);
  // Type-in boxes for the dollar/age levers. The box edits the same value the
  // slider drives — both stay in sync. data-edit tells the input handler how to
  // interpret the typed number (monthly→annual, plain money, or event age).
  if(cfg.edit==='monthly'){
    const mo=Math.round(lev[cfg.key]/12);
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="monthly" data-key="${cfg.key}" value="${mo.toLocaleString('en-US')}"> <span class="unit">/mo</span>${d}`;
  }
  if(cfg.edit==='money'){
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="money" data-key="${cfg.key}" value="${(lev[cfg.key]||0).toLocaleString('en-US')}"> <span class="unit">${unit}</span>${d}`;
  }
  if(cfg.edit==='event'){
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="eventAmt" data-key="eventAmt" value="${(lev.eventAmt||0).toLocaleString('en-US')}">`
         + ` <span class="unit">@ age</span> `
         + `<input class="lev-in age-in" type="text" inputmode="numeric" data-edit="eventAge" data-key="eventAge" value="${lev.eventAge}">${d}`;
  }
  // Discrete levers (ages / allocation): value + delta + stepper buttons.
  return `${val}${unit?` <span class="unit">${unit}</span>`:''}${d}${stepper(cfg, !d)}`;
}
// A lever is "dollar" (keeps a draggable slider) when it has an edit type;
// the discrete levers (ages / allocation / pension) use steppers + a static bar.
const isDollarLever = cfg => !!cfg.edit;
// Where the value sits inside its range, 0–100% — drives both the slider fill
// and the static bar fill/dot so every bar reads the same way down a row.
function barFillPct(cfg, L){
  const r=levRange(cfg), v=Math.max(r.min,Math.min(r.max,L[cfg.key]||r.min));
  return r.max>r.min ? ((v-r.min)/(r.max-r.min))*100 : 0;
}
// Refresh one cell in place after its value changed: value text + the bar
// (slider position+fill for dollar levers, fill+dot for discrete ones).
function updateCell(ci, cfg){
  const L=scenarios[ci].lev, span=$(`#lv-${ci}-${cfg.key}`); if(!span) return;
  span.innerHTML=renderLevValue(cfg, L);
  const pct=barFillPct(cfg,L), cell=span.parentElement;
  const sl=cell.querySelector('.lev-slider');
  if(sl){ const r=levRange(cfg); sl.value=Math.max(r.min,Math.min(r.max,L[cfg.key])); sl.style.setProperty('--fill',pct+'%'); }
  const fill=cell.querySelector('.lev-fill'); if(fill) fill.style.width=pct+'%';
  const dot=cell.querySelector('.lev-dot');  if(dot)  dot.style.left=pct+'%';
}
// Commit a lever change: editing the baseline shifts every other column's
// delta, so rebuild the whole grid then; otherwise just refresh the one cell.
function commitLever(ci, cfg){
  if(scenarios[ci].base) buildLevers(); else updateCell(ci, cfg);
  $('#status').textContent='Adjusted · Run to update';
  saveScenarios();
}
function buildLevers(){
  syncGridCols();
  let h='';
  LEVCFG.forEach(cfg=>{
    h+=`<div class="lev-name">${cfg.name}</div>`;
    const r=levRange(cfg);
    scenarios.forEach((s,ci)=>{
      const last=ci===scenarios.length-1?'col-last':'';
      const pct=barFillPct(cfg,s.lev);
      // Dollar levers → slider; discrete levers → static fill+dot bar.
      const bar = isDollarLever(cfg)
        ? `<input class="lev-slider ${s.base?'base-lock':''}" type="range" min="${r.min}" max="${r.max}" step="${r.step}"
                 value="${Math.max(r.min,Math.min(r.max,s.lev[cfg.key]))}" data-col="${ci}" data-key="${cfg.key}" style="--fill:${pct}%">`
        : `<div class="lev-bar"><div class="lev-fill" style="width:${pct}%"></div><div class="lev-dot" style="left:${pct}%"></div></div>`;
      h+=`<div class="lev-cell ${s.base?'base':''} ${last}">
        <span class="lev-val ${s.base?'base':''}" id="lv-${ci}-${cfg.key}">${renderLevValue(cfg,s.lev)}</span>
        ${bar}
      </div>`;
    });
  });
  $('#scn-levers').innerHTML=h;
  // Dollar-lever sliders: live value on input (own cell only — drag stays fast),
  // commit on drag-end (persist + refresh deltas if it was the baseline).
  $$('.lev-slider').forEach(sl=>{
    sl.addEventListener('input',e=>{
      const ci=+e.target.dataset.col, cfg=LEVCFG.find(c=>c.key===e.target.dataset.key);
      scenarios[ci].lev[cfg.key]=+e.target.value;
      e.target.style.setProperty('--fill', barFillPct(cfg,scenarios[ci].lev)+'%');
      updateCell(ci, cfg);
      $('#status').textContent='Adjusted · Run to update';
    });
    sl.addEventListener('change',e=>{
      if(scenarios[+e.target.dataset.col].base) buildLevers();
      saveScenarios();
    });
  });
}
// Stepper buttons for the discrete levers (delegated — survives rebuilds).
$('#scn-levers').addEventListener('click', e=>{
  const btn=e.target.closest('.step-btn'); if(!btn) return;
  const span=btn.closest('[id^="lv-"]'); if(!span) return;
  const ci=+span.id.split('-')[1], cfg=LEVCFG.find(c=>c.key===btn.dataset.key);
  const r=levRange(cfg), L=scenarios[ci].lev;
  L[cfg.key]=Math.max(r.min, Math.min(r.max, (L[cfg.key]||r.min) + (+btn.dataset.dir)*r.step));
  // Grabbing the pension age unlinks it; moving retirement age re-syncs an
  // auto-linked pension and refreshes that cell too.
  if(cfg.key==='pensionAge') L.pensionAuto=false;
  if(cfg.key==='retireAge' && L.pensionAuto){ syncPension(L); if(!scenarios[ci].base) updateCell(ci, LEVCFG.find(c=>c.key==='pensionAge')); }
  commitLever(ci, cfg);
});
// Inline pension-amount inputs are inserted dynamically when a slider lands on
// an age with no entered benefit, so a direct per-element listener (re-bound
// only at buildLevers time) would miss them. Delegate from #scn-levers once.
// Typed value writes into the plan's benefit-by-age map for that exact age,
// then every column refreshes (the amount is reference data shared across
// scenarios — the DECISION is the age, not the amount).
// ── Scenario header: rename / add / remove (delegated on #scn-band) ──
$('#scn-band').addEventListener('input', e=>{
  if(e.target.classList && e.target.classList.contains('col-rename')){
    const ci=+e.target.dataset.col;
    if(scenarios[ci]) scenarios[ci].name=e.target.value;   // live; persisted on change
  }
});
$('#scn-band').addEventListener('change', e=>{
  if(e.target.classList && e.target.classList.contains('col-rename')){
    const ci=+e.target.dataset.col;
    let nm=e.target.value.trim();
    if(!nm){ nm=`Scenario ${String.fromCharCode(65+ci)}`; e.target.value=nm; }  // never blank
    if(scenarios[ci]) scenarios[ci].name=nm;
    saveScenarios();
    // Cash-flow header + Sequencing selector read names — refresh those.
    renderCashflow(); buildSeqSelect();
  }
});
$('#scn-band').addEventListener('click', e=>{
  const x=e.target.closest('.col-x');
  if(x){ removeScenario(+x.dataset.col); return; }
  if(e.target.closest('.add-scen')){ addScenario(); return; }

});
// Solver goal form lives in #solve-panel (full-width). Live commas on $ boxes;
// changing the pin dropdown re-renders its value input (age box vs $ box).
$('#solve-panel').addEventListener('input', e=>{
  if(e.target.classList?.contains('sf-money')) liveCommas(e.target);
});
$('#solve-panel').addEventListener('change', e=>{
  if(e.target.id === 'sf-goal'){
    const baseLev = scenarios.find(s=>s.base)?.lev || defaultLevers();
    const baseSucc = scenarios.find(s=>s.base)?.res?.successRate || 85;
    const defPct = Math.min(95, Math.ceil((baseSucc+1)/5)*5);
    const wrap = $('#sf-params');
    if(wrap) wrap.innerHTML = goalParamsHtml(e.target.value, baseLev, defPct);
  }
});
$('#solve-panel').addEventListener('submit', e=>{
  const f = e.target.closest('#solver-form');
  if(!f) return;
  e.preventDefault();
  const pct = parseFloat($('#sf-pct')?.value);
  if(!isFinite(pct) || pct<50 || pct>99) return;
  const goalType = $('#sf-goal')?.value || 'confidence';
  const num = id => parseInt(($(id)?.value||'').replace(/[^0-9]/g,''), 10);
  const params = { pct };

  else if(goalType==='purchase'){ params.amount = num('#sf-p-amount'); params.age = num('#sf-p-age'); if(!isFinite(params.amount)||!isFinite(params.age)) return; }
  else if(goalType==='gift'){     params.amount = num('#sf-p-amount'); params.toAge = num('#sf-p-toage'); if(!isFinite(params.amount)||!isFinite(params.toAge)) return; }
  else if(goalType==='legacy'){   params.amount = num('#sf-p-amount'); if(!isFinite(params.amount)) return; }
  runSolve(goalType, params);
});
// Solver panel: Cancel (form), Clear (results), and per-lever "Load" actions.
document.addEventListener('click', e=>{
  if(e.target.closest('#sf-cancel')){
    solverFormOpen = false; renderSolvePanel(); return;
  }
  if(e.target.closest('#solve-clear-btn')){
    solverResults = null; solverSearching = false; renderSolvePanel(); return;
  }
  const loadBtn = e.target.closest('.solve-load');
  if(loadBtn && solverResults && solverResults.rows){
    if(scenarios.length >= MAX_SCENARIOS) return;
    const idx = +loadBtn.dataset.soloIdx;
    const row = solverResults.rows[idx];
    if(!row) return;
    // Scenario = the pinned soloBase with this one lever set to its solo answer.
    const lev = JSON.parse(JSON.stringify(solverResults.soloBase));
    lev[row.key] = row.value;
    syncPension(lev);
    const cfg = LEVCFG.find(c=>c.key===row.key);
    scenarios.push({ name: `${cfg.name} solve`, base:false, lev, res:null });
    solverResults = null; solverSearching = false;
    saveScenarios(); buildLevers(); renderBand(); renderSolvePanel(); plansDirty=true; runAll();
  }
});
// Live commas while typing into any inline numeric input (pension + lever boxes).
$('#scn-levers').addEventListener('input', e=>{
  const t=e.target;
  if(!t.classList) return;
  if(t.classList.contains('pen-in')) liveCommas(t);
  // Age boxes are 2-digit, no commas; dollar boxes get comma grouping.

// Type-in lever boxes (monthly spend / savings / one-time event amount+age).
// Writes the value the slider also drives, then refreshes that cell + status.
// On change (blur/enter) we commit; the column re-runs on the next Run.
$('#scn-levers').addEventListener('change', e=>{
  const t=e.target;
  if(!t.classList || !t.classList.contains('lev-in')) return;
  const span=t.closest('[id^="lv-"]'); if(!span) return;
  const ci=+span.id.split('-')[1];
  const L=scenarios[ci].lev;
  const num=parseFloat(String(t.value).replace(/[^0-9.]/g,''));
  const edit=t.dataset.edit;
  const cfg=LEVCFG.find(c=>c.key===t.dataset.key) || LEVCFG.find(c=>c.edit==='event');
  if(edit==='monthly'){
    if(!isFinite(num)||num<0) return;

  } else if(edit==='money'){

    L[t.dataset.key]=Math.round(num);
  } else if(edit==='eventAmt'){
    L.eventAmt=isFinite(num)&&num>0?Math.round(num):0;
  } else if(edit==='eventAge'){
    const a=Math.round(num);
    const lo=plan.household.primary.currentAge, hi=plan.household.primary.planEndAge;
    if(isFinite(a)) L.eventAge=Math.max(lo,Math.min(hi,a));

  // Refresh the cell (value + bar) — rebuilds the grid if the baseline moved.
  const dispCfg=LEVCFG.find(c=>c.key===span.id.split('-').slice(2).join('-'));

});
$('#scn-levers').addEventListener('change', e=>{
  if(!e.target.classList || !e.target.classList.contains('pen-in')) return;
  const age=+e.target.dataset.penAge;
  const amt=parseFloat(String(e.target.value).replace(/[^0-9.]/g,''));
  if(!isFinite(amt) || amt<0) return;
  if(!plan.income.pension) plan.income.pension={ benefitByAge:{}, startAge:65, colaPct:0 };
  if(!plan.income.pension.benefitByAge) plan.income.pension.benefitByAge={};
  plan.income.pension.benefitByAge[age]=Math.round(amt);
  buildLevers();
  $('#status').textContent='Adjusted · Run to update';
});
function renderFoot(){
  syncGridCols();
  let h=`<div class="foot-cell" style="color:var(--ink-faint)">Median end</div>`;
  scenarios.forEach(s=>{
    // Match the LINE: this is where the drawn median path actually ends.
    // Full digits w/ commas — no $1.5M shorthand. Whole dollars (no cents).
    const v=s.res?s.res.envelope[s.res.envelope.length-1].p50:null;
    const t=v!=null ? '$'+Math.max(0,Math.round(v)).toLocaleString('en-US') : '—';
    h+=`<div class="foot-cell ${s.base?'base':''}">&nbsp;<b>${t}</b></div>`;
