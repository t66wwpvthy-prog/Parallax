<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Parallax V2</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  /* LIGHT REPORT — warm "paper" financial document. Dark slate ink on
     off-white; brass + slate accents. Gold is reserved for emphasis
     (probability rings, the active-tab underline) — never header/body text
     on beige, where its contrast is too weak. Results read as slate
     (strong) / brass (caution) / clay (at-risk). */
  --bg-deep:#e7e1d4; --bg:#f4efe6;
  --surface:#fbf8f1; --surface-2:#ffffff; --surface-3:#f1ece1;
  --rule:#d8d0bf; --rule-bright:#c2b8a2; --rule-faint:#e8e2d5;
  --ink:#23282e; --ink-bright:#11151a; --ink-mute:#5d6671; --ink-faint:#8a93a0; --ink-ghost:#c2c8d0;
  --gold:#9a7322; --gold-bright:#b88c30; --gold-deep:#6f521a; --gold-glow:rgba(154,115,34,.10);
  --teal:#3f6b78; --teal-bright:#557f8c; --teal-deep:#2c4d57; --teal-glow:rgba(63,107,120,.10);
  /* Result language on paper: deep green (strong) / bronze gold (caution,
     via --gold) / deep burgundy (at-risk). Tuned dark enough to read on the
     off-white ground. */
  --positive:#16401f; --positive-bright:#194a2c;
  /* Snapshot withdrawal gauge: green (safe) → gold (caution) → clay (strained). */
  --clay:#a8593f;
  --negative:#7e2b38; --negative-bright:#8f3340;
  --s1:#9a7322; --s2:#3f6b78; --s3:#7d5a82;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:'Sora',sans-serif;color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;overflow:hidden}
body{background:radial-gradient(1200px 600px at 88% -12%, var(--gold-glow), transparent 60%),linear-gradient(180deg,#f6f2ea,var(--bg) 44%,#ece5d8);}
.wrap{height:100vh;display:flex;flex-direction:column;overflow:hidden}

.hdr{display:flex;align-items:center;gap:18px;padding:13px 28px;border-bottom:1px solid var(--rule);background:var(--bg-deep);flex:0 0 auto}
.wordmark{font-size:15px;font-weight:600;letter-spacing:.30em;text-transform:uppercase;color:var(--ink-bright)}
.hdr-tabs{display:flex;margin-left:24px}
.htab{background:none;border:none;border-bottom:2px solid transparent;color:var(--ink-mute);cursor:pointer;font-family:'Sora';font-size:12px;letter-spacing:.2em;text-transform:uppercase;padding:6px 20px;font-weight:500;transition:color .2s,border-color .2s}
.htab:hover{color:var(--ink)} .htab.on{color:var(--ink-bright);font-weight:600;border-bottom-color:var(--gold)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.status{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute)}
.run-btn{padding:9px 22px;background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#06121a;border:none;border-radius:3px;font-family:'Sora';font-weight:700;font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;cursor:pointer;box-shadow:0 6px 18px -8px rgba(214,170,89,.5)}
.run-btn:active{transform:translateY(1px)} .run-btn:disabled{filter:saturate(.3) brightness(.7);cursor:wait}

.page{flex:1 1 auto;min-height:0;display:none;flex-direction:column;padding:0 28px 22px}
.page.on{display:flex}
.eyebrow{font-size:11.5px;color:var(--ink-mute);letter-spacing:.26em;text-transform:uppercase;font-weight:500;display:flex;align-items:center;gap:12px}
.eyebrow::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--rule-bright),transparent);max-width:320px}

/* SCENARIOS */
.page[data-page="scenarios"]{overflow-y:auto;overflow-x:hidden}
/* Cap the scenarios block so columns don't stretch across a wide monitor.
   ~210px per scenario + the 148px label gutter; centered. */
.scn-scroll,.page[data-page="scenarios"] .cf-toggle,.page[data-page="scenarios"] .cf-drawer{max-width:1180px;width:100%;margin-left:auto;margin-right:auto}
.page[data-page="scenarios"] .eyebrow{position:sticky;top:0;z-index:25;background:var(--bg);padding:20px 0 16px}
.scn-band{position:sticky;top:53px;z-index:20;display:grid;grid-template-columns:148px repeat(3,1fr);background:var(--surface);border:1px solid var(--rule);border-radius:4px 4px 0 0}
.scn-band::before{content:'';position:absolute;left:0;right:0;top:-10px;height:10px;background:var(--bg)}
.band-cell{border-right:1px solid var(--rule-faint);padding:14px 14px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;min-height:172px}
.band-cell:last-child{border-right:none}
.band-cell.base{background:rgba(63,107,120,.05)}
.band-cell.label{align-items:flex-start;justify-content:flex-end}
.band-cell.label span{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mute);font-weight:500}
.col-name{font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-bright);font-weight:600;text-align:center;display:flex;align-items:center;justify-content:center;gap:7px}
.col-name.base-tag{color:var(--teal-bright)}
.col-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
/* Inline rename field — looks like the label until focused, then shows it's
   editable. Sized to content via a generous max so longer names fit. */
.col-rename{font-family:'Sora';font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;color:var(--ink-bright);background:transparent;border:none;border-bottom:1px dashed transparent;text-align:center;width:128px;padding:1px 2px;outline:none}
.col-rename:hover{border-bottom-color:var(--rule-bright)}
.col-rename:focus{border-bottom-color:var(--gold)}
.col-x{background:none;border:none;color:var(--ink-faint);font-size:11px;cursor:pointer;padding:0 2px;line-height:1;opacity:0;transition:opacity .15s,color .15s}
.band-cell:hover .col-x{opacity:1}
.col-x:hover{color:var(--negative-bright)}
.add-scen,.solve-btn{margin-top:8px;background:none;border:1px dashed var(--rule-bright);color:var(--ink-mute);font-family:'Sora';font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;padding:5px 10px;border-radius:4px;cursor:pointer;display:block}
.add-scen:hover,.solve-btn:hover{border-color:var(--gold);color:var(--gold)}
/* Solver goal form — full-width card in #solve-panel (NOT the cramped gutter).
   A row of labeled fields + the Find button, each field with room to breathe. */
.sf-form{display:flex;flex-wrap:wrap;align-items:flex-end;gap:22px}
.sf-field{display:flex;flex-direction:column;gap:7px}
.sf-lbl{font-family:'Sora';font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.sf-box-wrap{display:flex;align-items:baseline;gap:4px}
.sf-prefix,.sf-suffix{font-family:'Inter';font-size:17px;font-weight:600;color:var(--ink-mute)}
/* Same idiom as every other input in the app: dashed underline, transparent,
   gold on focus. Just bigger. */
.sf-box{font-family:'Inter';font-size:19px;font-weight:600;color:var(--ink-bright);background:transparent;border:none;border-bottom:1px dashed var(--rule-bright);padding:2px 3px;outline:none;width:64px;text-align:right;-moz-appearance:textfield}
.sf-box::-webkit-outer-spin-button,.sf-box::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.sf-box:hover{border-bottom-color:var(--gold)}
.sf-box:focus{border-bottom:1px solid var(--gold)}
.sf-money{width:150px}
.sf-go{font-family:'Sora';font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;padding:11px 20px;border-radius:6px;cursor:pointer;border:1px solid var(--gold);background:var(--gold);color:#1a130a;margin-left:auto}
.sf-go:hover{background:var(--gold-bright);border-color:var(--gold-bright)}
/* Per-row loading spinner during a solve. Sits in place of the lever value
   until that row resolves; tiny pulse so it reads as work in progress. */
.lev-val.solving{color:var(--ink-faint);font-style:italic;opacity:.7}
.lev-val.solving::after{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);margin-left:6px;animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
/* When a lever value was set by the solver, mark it subtly so the advisor knows
   it came from a solve (not their drag). Underline in brass; removed on edit. */
.lev-val.solved{border-bottom:1px dotted var(--gold);padding-bottom:1px}
.lev-val.solved-capped{color:var(--negative-bright)}
/* Solver panel (form + solo-answer results) */
.solve-panel{margin:0 0 20px;padding:18px 22px;background:var(--surface);border:1px solid var(--rule);border-radius:6px}
.solve-panel-head{display:flex;align-items:baseline;justify-content:space-between;gap:18px;margin-bottom:14px}
.solve-panel-title{font-family:'Sora';font-size:12.5px;letter-spacing:.02em;color:var(--ink-mute);font-weight:500;line-height:1.5}
.solve-panel-title b{font-family:'Inter';color:var(--ink-bright);font-weight:700}
.solve-clear{font-family:'Sora';font-size:10px;color:var(--ink-faint);background:none;border:none;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:0;white-space:nowrap}
.solve-clear:hover{color:var(--negative)}
.sf-select{font-family:'Inter';font-size:18px;font-weight:600;color:var(--ink-bright);background:transparent;border:none;border-bottom:1px dashed var(--rule-bright);padding:2px 18px 2px 3px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--ink-mute) 50%),linear-gradient(135deg,var(--ink-mute) 50%,transparent 50%);background-position:calc(100% - 9px) 11px,calc(100% - 4px) 11px;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
.sf-select:hover,.sf-select:focus{border-bottom-color:var(--gold)}
.sf-hint{font-family:'Sora';font-size:12px;color:var(--ink-faint);font-style:italic;padding-bottom:3px}
.sf-params{display:contents}
/* Solo-answer rows: one lever per row — name · was→needs · reached% · load */
.solo-list{display:flex;flex-direction:column}
.solo-row{display:grid;grid-template-columns:140px 1fr 150px 64px;align-items:center;gap:18px;padding:13px 0;border-top:1px solid var(--rule-faint)}
.solo-row:first-child{border-top:none}
.solo-name{font-family:'Sora';font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);font-weight:600}
.solo-move{display:flex;align-items:baseline;gap:10px;font-family:'Inter';font-variant-numeric:tabular-nums}
.solo-from{font-size:14px;color:var(--ink-faint)}
.solo-arrow{color:var(--ink-faint);font-size:13px}
.solo-to{font-size:18px;font-weight:700;color:var(--ink-bright)}
.solo-delta{font-family:'Sora';font-size:11px;font-weight:600;color:var(--gold-bright);letter-spacing:.02em}
.solo-row.unchanged .solo-delta{color:var(--positive)}
.solo-pct{font-family:'Sora';font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--positive)}
.solo-pct.capped{color:var(--negative)}
.solo-row.capped .solo-to{color:var(--ink-mute)}
.solve-load{font-family:'Sora';font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:6px 0;border-radius:4px;cursor:pointer;background:none;border:1px solid var(--rule-bright);color:var(--ink-faint)}
.solve-load:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.solve-load:disabled{opacity:.3;cursor:default}
.solo-allcapped{margin-top:14px;font-family:'Sora';font-size:12px;color:var(--negative);font-weight:600;letter-spacing:.02em}
.solve-searching,.solve-empty{font-family:'Sora';font-size:12px;color:var(--ink-mute);font-weight:500}
.solve-searching::after{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);margin-left:8px;animation:pulse 1.1s infinite}
.circle-wrap{position:relative;width:118px;height:118px}
.circle-val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.circle-val .big{font-size:28px;font-weight:400;line-height:1;font-family:'Inter';letter-spacing:-.01em}
.circle-val .lbl{font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-mute);margin-top:3px}

.scn-levers{display:grid;grid-template-columns:148px repeat(3,1fr);border-left:1px solid var(--rule);border-right:1px solid var(--rule)}
.lev-name{display:flex;align-items:center;border-right:1px solid var(--rule-faint);border-bottom:1px solid var(--rule-faint);padding:0 14px;min-height:62px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mute);font-weight:500;line-height:1.3}
.lev-cell{display:flex;flex-direction:column;justify-content:center;gap:7px;border-right:1px solid var(--rule-faint);border-bottom:1px solid var(--rule-faint);padding:0 16px;min-height:62px}
.lev-cell.base{background:rgba(63,107,120,.04)}
.scn-levers .lev-cell.col-last{border-right:none}
.lev-val{font-family:'Inter';font-size:17px;font-weight:600;color:var(--ink-bright);display:flex;align-items:center;gap:6px}
.lev-val.base{color:var(--teal-bright)}
.lev-val .unit{font-size:10px;color:var(--ink-faint);font-weight:500;letter-spacing:.04em}
/* Baseline-delta chip — right-aligned so the deltas form a clean comparison
   column down the right edge of each scenario. Muted/neutral (no good-bad hue). */
.lev-delta{margin-left:auto;font-family:'Sora';font-size:10.5px;font-weight:600;letter-spacing:.02em;color:var(--ink-faint);font-variant-numeric:tabular-nums}
/* Inline pension-amount input: appears when the lever lands on an age that has
   no entered benefit yet. Looks like part of the value display (not an error).
   The "$" prefix sits in the normal value color; the input is borderless and
   inherits the typography so it reads as a natural prompt for a number. */
.lev-val .pen-in{font-family:'Inter';font-size:15px;font-weight:600;color:var(--ink-bright);background:transparent;border:none;border-bottom:1px dashed var(--rule-bright);width:84px;padding:0 2px;outline:none;text-align:right}
.lev-val .pen-in::placeholder{color:var(--ink-faint);font-weight:500}
.lev-val .pen-in:focus{border-bottom-color:var(--gold)}
/* Inline type-in boxes for the dollar/age levers. Same quiet dashed underline
   as the pension box; width tuned per content (dollars wider, age narrow). */
.lev-val .lev-in{font-family:'Inter';font-size:17px;font-weight:600;color:var(--ink-bright);background:transparent;border:none;border-bottom:1px dashed var(--rule-bright);width:78px;padding:0 2px;outline:none;text-align:right}
.lev-val .lev-in:focus{border-bottom-color:var(--gold)}
.lev-val .lev-in.age-in{width:34px;text-align:center}
/* Resting state = clean numbers + deltas (no bar clutter). The slider fades in
   when you hover/focus the cell, so drag-to-explore stays for live demos but the
   grid reads as a comparison table at a glance. Touch (no hover) keeps it shown. */
/* Dollar levers (spend / savings / one-time event) keep a slider, styled as a
   fill-bar: filled to the value via --fill (set per element), small dot thumb. */
.lev-slider{-webkit-appearance:none;width:100%;height:11px;background:transparent;cursor:pointer;margin:3px 0}
.lev-slider::-webkit-slider-runnable-track{height:3px;border-radius:2px;background:linear-gradient(90deg,var(--gold) 0 var(--fill,0%),var(--rule-faint) var(--fill,0%))}
.lev-slider.base-lock::-webkit-slider-runnable-track{background:linear-gradient(90deg,var(--teal) 0 var(--fill,0%),var(--rule-faint) var(--fill,0%))}
.lev-slider::-webkit-slider-thumb{-webkit-appearance:none;height:9px;width:9px;border-radius:50%;background:var(--gold);margin-top:-3px;border:2px solid var(--surface);box-shadow:0 1px 2px rgba(0,0,0,.15)}
.lev-slider.base-lock::-webkit-slider-thumb{background:var(--teal-deep)}
.lev-slider:disabled{opacity:.5;cursor:default}
/* Discrete levers (ages / allocation / pension) get a STATIC position bar +
   stepper buttons — no slider feel. */
.lev-bar{position:relative;height:3px;border-radius:2px;background:var(--rule-faint);margin:6px 0 4px}
.lev-fill{position:absolute;left:0;top:0;height:3px;border-radius:2px;background:var(--gold)}
.lev-cell.base .lev-fill,.rec-card.base .lev-fill{background:var(--teal)}
.lev-bar .lev-dot{position:absolute;top:50%;width:8px;height:8px;border-radius:50%;background:var(--gold);transform:translate(-50%,-50%);box-shadow:0 1px 2px rgba(0,0,0,.15)}
.lev-cell.base .lev-bar .lev-dot{background:var(--teal-deep)}
.lev-step{display:inline-flex;align-items:center;gap:7px;margin-left:auto}
.step-btn{width:20px;height:20px;border-radius:5px;border:1px solid var(--rule-bright);background:var(--surface);color:var(--ink-mute);font-family:'Inter';font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.step-btn:hover{border-color:var(--gold);color:var(--gold)}
.scn-foot{display:grid;grid-template-columns:148px repeat(3,1fr);border:1px solid var(--rule);border-top:none;border-radius:0 0 4px 4px}
.foot-cell{border-right:1px solid var(--rule-faint);padding:12px 14px;font-family:'Inter';font-size:12.5px;color:var(--ink-mute)}
.foot-cell:last-child{border-right:none}
.foot-cell.base{background:rgba(63,107,120,.05)}
.foot-cell b{color:var(--ink-bright);font-weight:600}

/* Shared chart chrome (used by the Sequencing chart). */
.chart-head{display:flex;align-items:baseline;gap:16px;margin-bottom:6px;flex:0 0 auto}
.chart-title{font-size:15px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-bright);font-weight:600}
.chart-sub{font-size:11px;color:var(--ink-mute);letter-spacing:.06em;text-transform:uppercase}
.lg{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-mute);letter-spacing:.04em}
.lg .sw{width:16px;height:3px;border-radius:2px}
.chart-body{flex:1 1 auto;min-height:0;position:relative}
.chart-body svg{width:100%;height:100%;display:block}

/* SEQUENCING */
.page[data-page="sequencing"]{padding-top:20px;overflow-y:auto}
.seq-bar{flex:0 0 auto;display:flex;align-items:center;gap:14px;margin:14px 0}
.seq-pick{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--rule);border-radius:3px;padding:8px 14px}
.seq-pick .k{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);font-weight:500}
.seq-pick select{background:var(--surface-2);border:1px solid var(--rule-bright);color:var(--ink-bright);font-family:'Sora';font-size:12px;font-weight:500;letter-spacing:.04em;padding:6px 30px 6px 12px;border-radius:3px;outline:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0 L5 6 L10 0' fill='%239aa6b9'/></svg>");background-repeat:no-repeat;background-position:right 11px center;cursor:pointer}
.seq-legend{margin-left:auto;display:flex;gap:16px;flex-wrap:wrap}
.seq-legend .lg{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-mute);font-family:'Sora';letter-spacing:.03em}
.seq-legend .sw{display:inline-block;width:22px;border-top:3px solid;border-radius:2px}
.seq-legend .sw.dash{border-top-style:dashed}
.seq-chips{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-left:6px}
.seq-chip{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--rule);color:var(--ink-mute);font-family:'Sora';font-size:11px;letter-spacing:.03em;padding:6px 11px;border-radius:14px;cursor:pointer;transition:opacity .12s,border-color .12s;opacity:.45}
.seq-chip .cdot{width:9px;height:9px;border-radius:50%;flex:none}
.seq-chip.on{opacity:1;border-color:var(--rule-bright);color:var(--ink-bright)}
.seq-chip:hover{opacity:.85}
.seq-chart{flex:0 0 auto;border:1px solid var(--rule);border-radius:4px;background:var(--surface);padding:16px 22px 12px;display:flex;flex-direction:column}
.seq-chart .chart-body{flex:1 1 auto;min-height:300px}
/* Two path FINGERPRINTS, side by side: forward vs reversed. Each line is a
   direct read of the engine's single-path result — no UI-computed metrics. */
.seq-prints{flex:0 0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;margin-top:16px}
.seq-print{border:1px solid var(--rule);border-radius:6px;background:var(--surface);padding:13px 15px 6px}
.seq-print h4{display:flex;align-items:center;gap:9px;margin:0 0 8px;font-family:'Sora';font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;color:var(--ink-bright)}
.seq-print h4 .dot{display:inline-block;width:20px;border-top:3px solid;border-radius:2px}
.seq-print h4 .dot.dash{border-top-style:dashed}
.seq-print .pr-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--rule-faint);font-size:13px}
.seq-print .pr-row:last-child{border-bottom:none}
.seq-print .pr-k{color:var(--ink-mute);font-family:'Sora'}
.seq-print .pr-v{font-family:'Inter';font-weight:600;color:var(--ink-bright);font-variant-numeric:tabular-nums}
/* Damage window: how LONG the bad stretch lasts (short shock vs long grind). */
.seq-print .dw-bar{height:4px;border-radius:3px;background:var(--rule-faint);margin:5px 0 9px;overflow:hidden}
.seq-print .dw-fill{height:100%;border-radius:3px;min-width:2px}
/* Net Worth — the household sheet, split into four sub-pages by a sub-nav
   beneath the main tabs. Balance Sheet uses the STATEMENT layout (leader-dotted
   rows under thin-gold section heads, like a printed financial statement).
   Inflows / Outflows / Goals use the HYBRID layout: a left-gutter identity
   block (title + description + running total) and a two-column facing body
   split by a single vertical hairline. One visual family across the four. */
.page[data-page="net-worth"]{padding-top:24px;overflow-y:auto}

/* Sub-nav under the main tabs. NET WORTH sits left, bold and offset, separated
   from the four sub-tabs by a fine vertical rule. Same gold-underline language
   as the main tabs but smaller and quieter — the sub-nav is subordinate. */
.subnav{display:flex;align-items:stretch;border-bottom:1px solid var(--rule);margin:-6px 0 28px;max-width:1100px}
.subnav-title{font-family:'Sora';font-size:14px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-bright);font-weight:700;padding:14px 32px 14px 0;display:flex;align-items:center;border-right:1px solid var(--rule-bright);margin-right:28px}
.stab{background:none;border:none;border-bottom:1px solid transparent;color:var(--ink-faint);font-family:'Sora';font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;padding:14px 4px 13px 0;margin-right:30px;font-weight:500;cursor:pointer;margin-bottom:-1px;transition:color .15s,border-color .15s}
.stab:hover{color:var(--ink-mute)}
.stab.on{color:var(--ink-bright);font-weight:600;border-bottom-color:var(--gold)}

/* ─── Net Worth page wrapper (shared by all four sub-pages) ───────
   200px left gutter carries the page's summary (big number, breakdowns,
   live totals) — the eye lands in the same place every time. Body to the
   right holds the Statement ledger or the two-column Hybrid body. */
.np-page{display:grid;grid-template-columns:200px 1fr;gap:54px;max-width:1100px;align-items:start}
.np-gutter{position:sticky;top:0}
.np-gutter .lbl{font-family:'Sora';font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:4px}
.np-gutter .big-num{font-family:'Inter';font-size:30px;line-height:1.05;font-weight:600;color:var(--ink-bright);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.np-gutter .big-num.teal{color:var(--teal-deep)}
.np-gutter .big-sub{font-family:'Sora';font-size:11px;color:var(--ink-mute);margin-top:5px;font-weight:500;line-height:1.4}
.np-gutter .gut-rule{border:none;border-top:1px solid var(--rule-faint);margin:20px 0 14px}
.np-gutter .row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;font-size:12.5px;color:var(--ink-mute);font-family:'Sora';font-weight:500}
.np-gutter .row b{font-family:'Inter';font-weight:600;color:var(--ink-bright);font-variant-numeric:tabular-nums}

/* ─── Statement layout (Balance Sheet body) ────────────────────────
   Each section is a small caps header with a gold underline; rows are
   "label … dotted leader … value", values are boxless inputs that go gold
   on focus (same edit language as the Scenarios levers). Subtotals close
   each money section in slate, the statement's running truth. */
.bs-sheet{max-width:none}
.bs-head{font-family:'Sora';font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-bright);font-weight:600;margin:38px 0 6px;padding-bottom:8px;border-bottom:1px solid var(--gold)}
.bs-head:first-of-type{margin-top:4px}
.bs-row{display:flex;align-items:baseline;padding:9px 0;font-size:14px}
.bs-row label{color:var(--ink-bright);font-weight:500;font-family:'Sora'}
.bs-row.sub label{color:var(--ink-mute);font-size:13px;padding-left:18px;font-weight:400}
.bs-dots{flex:1;border-bottom:1px dotted var(--rule-bright);margin:0 12px;transform:translateY(-3px)}
.bs-row .field{display:flex;align-items:baseline;gap:3px}
.bs-row .pre{color:var(--ink-faint);font-size:13px;font-family:'Inter'}
.bs-row input{font-family:'Inter';font-size:14.5px;font-weight:600;color:var(--ink-bright);background:transparent;border:none;border-bottom:1px dashed var(--rule-bright);padding:1px 1px;width:110px;text-align:right;outline:none;font-variant-numeric:tabular-nums;transition:border-color .15s,background .15s}
.bs-row input:hover{border-bottom-color:var(--gold)}
.bs-row input:focus{border-bottom:1px solid var(--gold);background:rgba(154,115,34,.05)}
.bs-row select{font-family:'Sora';font-size:13.5px;font-weight:500;color:var(--ink-bright);background:transparent;border:none;border-bottom:1px dashed var(--rule-bright);padding:1px 18px 1px 1px;outline:none;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0 L5 6 L10 0' fill='%238a93a0'/></svg>");background-repeat:no-repeat;background-position:right 2px center}
.bs-row select:hover,.bs-row select:focus{border-bottom-color:var(--gold)}
.bs-row.sub input{font-size:13px;font-weight:500;color:var(--ink-mute);width:90px}
.bs-sub{display:flex;align-items:baseline;padding:13px 0 4px;border-top:1px solid var(--rule-faint);margin-top:8px}
.bs-sub-l{font-family:'Sora';font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.bs-sub-d{flex:1;border-bottom:1px dotted var(--rule-bright);margin:0 12px;transform:translateY(-3px)}
.bs-sub-v{font-family:'Inter';font-size:14px;color:var(--teal-deep);font-weight:600;font-variant-numeric:tabular-nums}
.bs-add{padding:14px 0 4px;font-size:12.5px;color:var(--gold);font-weight:500;font-style:italic;cursor:pointer}
.bs-row .row-x{margin-left:8px;width:20px;height:20px;border:none;background:transparent;color:var(--ink-faint);font-size:16px;line-height:1;cursor:pointer;border-radius:4px;padding:0}
.bs-row .row-x:hover{color:var(--negative-bright);background:rgba(240,145,141,.08)}

/* ─── Hybrid body (Inflows / Outflows / Goals) ─────────────────────
   Two facing columns split by a single vertical hairline. The gutter
   (containing the page summary + column subtotals) is the shared np-gutter
   one level up. */
.hp-body{display:grid;grid-template-columns:1fr 1px 1fr;gap:0 36px}
.hp-rule{background:var(--rule-bright);width:1px;align-self:stretch}
.hp-col h4{font-family:'Sora';font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-mute);font-weight:600;margin-bottom:18px;padding-bottom:8px;border-bottom:1px solid var(--rule-faint)}
.hp-item{padding:11px 0;border-bottom:1px solid var(--rule-faint)}
.hp-item:last-of-type{border-bottom:none}
.hp-item .ti{display:flex;align-items:baseline;justify-content:space-between;gap:14px}
.hp-item .nm{font-size:14px;color:var(--ink-bright);font-weight:500;flex:1;font-family:'Sora'}
.hp-item .field{display:flex;align-items:baseline;gap:3px}
.hp-item .pre{color:var(--ink-faint);font-size:13px;font-family:'Inter'}
.hp-item input{font-family:'Inter';font-size:14.5px;font-weight:600;color:var(--ink-bright);background:transparent;border:none;border-bottom:1px dashed var(--rule-bright);padding:1px 1px;width:96px;text-align:right;outline:none;font-variant-numeric:tabular-nums;transition:border-color .15s,background .15s}
.hp-item input:hover{border-bottom-color:var(--gold)}
.hp-item input:focus{border-bottom:1px solid var(--gold);background:rgba(154,115,34,.05)}
.hp-item .row-x{margin-left:6px;width:18px;height:18px;border:none;background:transparent;color:var(--ink-faint);font-size:15px;line-height:1;cursor:pointer;border-radius:4px;padding:0}
.hp-item .row-x:hover{color:var(--negative-bright);background:rgba(240,145,141,.08)}
.hp-item .meta{margin-top:3px;font-size:11.5px;color:var(--ink-mute)}
.hp-item .meta b{color:var(--ink);font-weight:500}
.hp-add{margin-top:14px;font-size:12.5px;color:var(--gold);font-weight:500;font-style:italic;cursor:pointer}

/* ─── Snapshot (the diagnosis) ─────────────────────────────────────
   Not ledger rows — a small set of diagnostic GAUGES, each a relationship
   between numbers the client already entered (income floor, withdrawal rate,
   tax location). The visual tells the truth; no advisor-sentence narration.
   Each metric is a band: name + hero number on the left, the picture right. */
.snap{max-width:1100px;display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:start}
.metric{display:flex;flex-direction:column;gap:20px;padding:26px 28px 30px;border:1px solid var(--rule-faint);border-radius:10px}
.m-eye{font-family:'Sora';font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:10px}
.m-hero{font-family:'Inter';font-size:46px;line-height:1;font-weight:700;color:var(--ink-bright);letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.m-hero.teal{color:var(--teal-deep)} .m-hero.gold{color:var(--gold-deep)} .m-hero.clay{color:var(--negative)}
.m-sub{font-family:'Sora';font-size:12.5px;color:var(--ink-mute);margin-top:8px;font-weight:500;line-height:1.45}
/* Floating stat rows — labels above Inter numbers, no bar */
.stat-row{display:flex;gap:22px;flex-wrap:wrap;margin-top:2px}
.stat-item{display:flex;flex-direction:column;gap:5px}
.stat-lbl{font-family:'Sora';font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.stat-val{font-family:'Inter';font-size:16px;font-weight:600;color:var(--ink-bright);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
/* coverage bar (income floor): teal fill = guaranteed, hatched = portfolio-drawn */
.cov{height:40px;border-radius:6px;overflow:hidden;display:flex;background:repeating-linear-gradient(135deg,#efe7d6,#efe7d6 7px,#e8dfcc 7px,#e8dfcc 14px);box-shadow:inset 0 0 0 1px var(--rule)}
.cov .fill{background:linear-gradient(180deg,var(--teal-bright),var(--teal));display:flex;align-items:center;padding-left:14px;color:#fff;font-family:'Inter';font-size:13px;font-weight:600;white-space:nowrap;min-width:0;overflow:hidden}
.cov-legend,.seg-legend{display:flex;flex-wrap:wrap;gap:14px 26px;margin-top:14px;font-family:'Sora';font-size:12px;color:var(--ink-mute);font-weight:500}
.cov-legend .k,.seg-legend .k{display:flex;align-items:center;gap:8px}
.cov-legend .sw,.seg-legend .sw{width:11px;height:11px;border-radius:2px;flex:none}
.cov-legend b,.seg-legend b{font-family:'Inter';color:var(--ink-bright);font-weight:600;margin-left:3px}
/* withdrawal rate zone badge — three labeled zones, active one highlighted.
   No linear bar: a bar implies "how close to danger" which is the wrong frame.
   The coloured hero number already carries the meaning; this just names the zone. */
.wr-zones{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--rule-faint)}
.wr-zone{flex:1;padding:9px 0;text-align:center;font-family:'Sora';font-size:10.5px;letter-spacing:.1em;font-weight:700;text-transform:uppercase;color:var(--ink-faint);background:transparent;transition:background .15s}
.wr-zone.active-teal{background:#2e5e4e;color:#a9d5cf}
.wr-zone.active-gold{background:#4a3a10;color:#f0c773}
.wr-zone.active-clay{background:#4a1f1d;color:#f0918d}
.g-note{margin-top:30px;font-family:'Sora';font-size:12.5px;color:var(--ink-mute);font-weight:500;line-height:1.5}
.g-note b{font-family:'Inter';color:var(--ink-bright);font-weight:600}
/* segmented proportion bar (tax location) */
.seg{height:40px;border-radius:6px;overflow:hidden;display:flex;box-shadow:inset 0 0 0 1px var(--rule)}
.seg div{display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Inter';font-size:13px;font-weight:600;min-width:0;overflow:hidden}
.seg .s-tax{background:linear-gradient(180deg,#6f8a93,var(--teal))}
.seg .s-def{background:linear-gradient(180deg,var(--gold-bright),var(--gold))}
.seg .s-roth{background:linear-gradient(180deg,#4f9d72,#3c7d59)}

/* Year-by-year cash-flow drawer on the Scenarios page. Three scenarios side
   by side; each scenario's columns are softly tinted in its line color so the
   eye groups them without needing dividers. The Age column is sticky so the
   advisor can scroll into late years and still know which row they're reading. */
.cf-toggle{margin:18px 0 12px;display:flex;justify-content:flex-end;flex-shrink:0}
.cf-toggle button{background:transparent;border:1px solid var(--rule);color:var(--ink-mute);font-family:'Sora';font-size:11px;letter-spacing:.16em;text-transform:uppercase;padding:8px 16px;border-radius:5px;cursor:pointer}
.cf-toggle button:hover{color:var(--gold);border-color:var(--gold)}
.cf-drawer{border:1px solid var(--rule);border-radius:8px;background:var(--surface);overflow:hidden;margin-bottom:18px;flex-shrink:0}
.cf-drawer-head{padding:12px 18px;border-bottom:1px solid var(--rule);font-family:'Sora';font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);display:flex;justify-content:space-between;align-items:center}
.cf-drawer-head .sub{color:var(--ink-faint);font-family:'Sora';font-weight:400;letter-spacing:.04em;text-transform:none;font-size:11px}
.cf-scroll{max-height:460px;overflow:auto}
.cf-empty{padding:26px 18px;color:var(--ink-mute);font-family:'Sora';font-size:13px;text-align:center}
.cf-table{width:100%;border-collapse:collapse;font-family:'Inter';font-size:12px;font-variant-numeric:tabular-nums}
.cf-table thead{position:sticky;top:0;background:var(--surface-2);z-index:2}
.cf-table th,.cf-table td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--rule-faint);white-space:nowrap}
.cf-table th{font-weight:500;color:var(--ink-mute);font-size:10px;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--rule)}
.cf-table th.scen{text-align:center;font-weight:600;letter-spacing:.12em}
.cf-table th.age, .cf-table td.age{position:sticky;left:0;background:var(--surface);text-align:left;color:var(--ink);font-weight:600;z-index:1}
.cf-table thead th.age{background:var(--surface-2)}
.cf-table td.dim{color:var(--ink-faint)}
/* Alternating per-scenario column tint in the cash-flow table — two faint
   washes that cycle regardless of how many scenarios there are. */
.cf-g0{background:rgba(63,107,120,.045)} .cf-g1{background:rgba(154,115,34,.05)}
.cf-table tr.retire td{border-top:1px dashed var(--gold);}
.cf-table tr.retire td.age::after{content:'  retire';color:var(--gold);font-size:10px;font-weight:500;letter-spacing:.1em}

/* ──────────────────────────────────────────────────────────────────────────
   PHONE / TOUCH (iOS-first). The desktop layout is a fixed 100vh, no-scroll,
   multi-column grid — unusable on a phone. Below 760px we: let the whole app
   scroll vertically; stack the header; enlarge sliders and tap targets; and
   keep the three scenario columns column-aligned by letting that block scroll
   horizontally as a unit (band + levers + foot share one min-width so their
   columns stay registered). Charts already scale via SVG viewBox.
   ────────────────────────────────────────────────────────────────────────── */
@media (max-width:760px){
  html,body{overflow:auto;font-size:15px;-webkit-text-size-adjust:100%}
  .wrap{height:auto;min-height:100vh;overflow:visible}

  /* Header wraps; tabs become a scrollable row; Run stays reachable. */
  .hdr{flex-wrap:wrap;gap:10px 14px;padding:12px 16px;position:sticky;top:0;z-index:60}
  .hdr-tabs{margin-left:0;order:3;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .htab{padding:8px 16px;font-size:13px;white-space:nowrap}
  .hdr-right{gap:12px}
  .run-btn{padding:11px 20px;font-size:12px}

  .page{padding:0 14px 28px}
  .page[data-page="scenarios"]{overflow-x:visible}
  .page[data-page="scenarios"] .eyebrow{position:static;padding:16px 0 12px}

  /* Scenario comparison: scroll the band+levers+foot together horizontally so
     the % circles, sliders, and totals stay in the same three columns. */
  .scn-band,.scn-levers,.scn-foot{min-width:620px}
  .scn-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:4px}
  .scn-band{position:static;box-shadow:none}
  .scn-band::before{display:none}

  /* Bigger touch targets on the sliders; touch has no hover so keep them shown. */
  .lev-slider{height:30px;opacity:1}
  .lev-slider::-webkit-slider-thumb{height:22px;width:22px;margin-top:-10px;border-width:3px}
  .lev-slider::-webkit-slider-runnable-track{height:3px}
  .lev-val{font-size:18px}

  .chart-head{flex-wrap:wrap;gap:6px 14px}

  /* Inputs: single column. */
  .np-page{grid-template-columns:1fr;gap:18px}
  .np-gutter{position:static}
  .hp-body{grid-template-columns:1fr;gap:18px}
  .hp-rule{display:none}
  .snap{grid-template-columns:1fr}
  .metric{gap:14px;padding:20px 18px 22px}
  .subnav{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
  .stab,.subnav-title{white-space:nowrap}
  .subnav-title{border-right:none;padding-right:12px;margin-right:12px}
  .inp-row input,.inp-row select{font-size:16px;width:120px} /* 16px avoids iOS zoom-on-focus */

  /* Sequencing: selector + stats stack. */
  .seq-bar{flex-wrap:wrap}
  .seq-legend{margin-left:0;width:100%;flex-wrap:wrap;gap:10px 16px}
  .seq-chart{min-height:340px}
  .seq-stats{grid-template-columns:repeat(2,1fr)}

  /* Cash-flow drawer scrolls both axes on a phone. */
  .cf-scroll{max-height:none}
  .cf-toggle{justify-content:stretch}
  .cf-toggle button{width:100%}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="hdr">
    <span class="wordmark">Parallax</span>
    <div class="hdr-tabs">
      <button class="htab on" data-page="net-worth">Household</button>
      <button class="htab" data-page="scenarios">Scenarios</button>
      <button class="htab" data-page="sequencing">Sequencing</button>
    </div>
    <div class="hdr-right">
      <span class="status" id="status">Ready</span>
      <button class="run-btn" id="run-btn">▶ Run</button>
    </div>
  </header>

  <section class="page on" data-page="net-worth">
    <nav class="subnav" id="np-subnav">
      <span class="subnav-title">Household</span>
      <button class="stab on" data-sub="balance-sheet">Net Worth</button>
      <button class="stab" data-sub="inflows">Inflows</button>
      <button class="stab" data-sub="outflows">Outflows</button>
      <button class="stab" data-sub="goals">Goals</button>
      <button class="stab" data-sub="snapshot">Snapshot</button>
    </nav>
    <div id="np-content"></div>
  </section>

  <section class="page" data-page="scenarios">
    <div class="eyebrow"><span>Scenarios</span></div>
    <!-- band + levers + foot share one horizontally-scrollable wrapper so their
         three columns stay registered on narrow (phone) viewports. -->
    <div class="scn-scroll">
      <div class="scn-band" id="scn-band"></div>
      <div id="solve-panel"></div>
      <div class="scn-levers" id="scn-levers"></div>
      <div class="scn-foot" id="scn-foot"></div>
    </div>
    <!-- The Scenarios line chart was removed: it duplicated what the % circles +
         cash-flow drawer already say. A richer wealth-path visual is planned for
         the Sequencing tab, where sequence-of-returns risk gives it real teeth. -->
    <!-- Cash-flow drawer: expand to see the year-by-year breakdown for each
         scenario (income, withdrawals, ending balance), side-by-side. The
         engine already emits these rows from its typical simulated path —
         this is purely a view of existing truth, no new math. -->
    <div class="cf-toggle"><button id="cf-btn">Show year-by-year cash flow ▾</button></div>
    <div class="cf-drawer" id="cf-drawer" style="display:none"></div>
  </section>

  <section class="page" data-page="sequencing">
    <div class="eyebrow"><span>Sequencing</span></div>
    <div class="seq-bar">
      <div class="seq-pick">
        <span class="k">Plan</span>
        <select id="seq-select"></select>
      </div>
      <div class="seq-chips" id="seq-chips"></div>
    </div>
    <div class="seq-chart">
      <div class="chart-head">
        <span class="chart-title">Resilience</span>
        <span class="chart-sub" id="seq-sub">Same plan, real markets</span>
      </div>
      <div class="chart-body"><svg id="seq-svg" viewBox="0 0 1000 320" preserveAspectRatio="none"></svg></div>
    </div>
    <div class="seq-prints" id="seq-prints"></div>
  </section>

</div>



<script type="module">
/* ── engine.js inlined for single-file use ── */
/* ============================================================================
   PARALLAX ENGINE  —  the heart of the model. Treat as SACRED.
   Block-bootstrap Monte Carlo on real (inflation-adjusted) returns, 1928–2025.
   Accounts: taxable / traditional / Roth. Accumulation + pension + LTC.
   Path-consistent: all scenarios can share one return-path bundle.

   RULE: Do not "improve" this casually. It is verified. If you change it,
   the tests in engine.test.js must still pass. Terminal wealth is NOT the
   objective — it is only a ranking/sorting device. The engine reports
   success, depletion, balances over time; the UI decides what to show.
   ============================================================================ */

function fundGap(accounts, gap, taxRates, strategy = 'taxable-first'){
  let remainingNeed = gap;
  const breakdown = { taxable: 0, traditional: 0, roth: 0 };
  const taxBySource = { taxable: 0, traditional: 0 };
  let totalTax = 0;

  const workingBal = {
    taxable:     accounts.taxable.balance,
    traditional: accounts.traditional.balance,
    roth:        accounts.roth.balance
  };
  let workingBasis = accounts.taxable.basis;

  const effRateFor = (type) => {
    if(type === 'taxable'){
      const gainPct = workingBal.taxable > 0
        ? Math.max(0, (workingBal.taxable - workingBasis) / workingBal.taxable)
        : 0;
      return gainPct * taxRates.capitalGains;
    }
    if(type === 'traditional') return taxRates.ordinary;
    return 0;
  };

  const drawFrom = (type, netNeeded) => {
    if(workingBal[type] <= 0.01 || netNeeded <= 0.01) return;
    const rate = effRateFor(type);
    const grossNeeded = rate < 0.999 ? netNeeded / (1 - rate) : netNeeded;
    const withdrawn   = Math.min(grossNeeded, workingBal[type]);
    const tax         = withdrawn * rate;
    breakdown[type]  += withdrawn;
    totalTax         += tax;
    if(type === 'taxable' || type === 'traditional') taxBySource[type] += tax;
    workingBal[type] -= withdrawn;
    remainingNeed    -= (withdrawn - tax);
    if(type === 'taxable' && accounts.taxable.balance > 0){
      const basisPortion = workingBasis / accounts.taxable.balance;
      workingBasis = Math.max(0, workingBasis - withdrawn * basisPortion);
    }
  };

  if(strategy === 'proportional'){
    // Draw from all three proportionally to their current balances.
    // Compute each account's share of total, then draw that share of the need.
    // Overflow from depleted accounts falls through to sequential fallback.
    const total = workingBal.taxable + workingBal.traditional + workingBal.roth;
    if(total > 0.01){
      // For proportional we solve: each account nets its share of the gap.
      // Since each account has a different effective rate, we iterate once:
      // target net from each = gap × (balance / total), gross up by that acct's rate.
      const types = ['taxable', 'traditional', 'roth'];
      types.forEach(type => {
        if(workingBal[type] <= 0.01) return;
        const share = gap * (workingBal[type] / total);
        drawFrom(type, share);
      });
    }
    // Proportional may leave a small residual if accounts were insufficient;
    // fall through to taxable-first for any remainder.
    if(remainingNeed > 0.01){
      for(const type of ['taxable', 'traditional', 'roth']){
        if(remainingNeed <= 0.01) break;
        drawFrom(type, remainingNeed);
      }
    }
  } else {
    // Sequential strategies: taxable-first or traditional-first
    const order = strategy === 'traditional-first'
      ? ['traditional', 'taxable', 'roth']
      : ['taxable', 'traditional', 'roth'];
    for(const type of order){
      if(remainingNeed <= 0.01) break;
      drawFrom(type, remainingNeed);
    }
  }

  return {
    totalWithdrawn: breakdown.taxable + breakdown.traditional + breakdown.roth,
    totalTax,
    breakdown,
    taxBySource,
    shortfall: Math.max(0, remainingNeed)
  };
}

function historicalProxyComponents(row, riskProfile){
  const alloc = HISTORICAL_PROXY_ALLOC[riskProfile] || HISTORICAL_PROXY_ALLOC[3];
  const n = HISTORICAL_NOMINAL_RETURNS[row.y];
  if(!n){
    const fallbackReal = weightedAssetReturn(row, RISK_PROFILES[riskProfile || 3].weights);
    return { nominal:null, inflation:null, real:fallbackReal, source:'fallback' };
  }

  const nominal = alloc.stock * n.stock + alloc.bond * n.bond;
  // Derive inflation/deflation from the same nominal S&P series and the file's
  // real U.S. large-cap series. This keeps the bridge internally reconcilable:
  // real = (1 + nominal) / (1 + inflation) - 1.
  const inflation = (row.usLarge != null && (1 + row.usLarge) !== 0)
    ? ((1 + n.stock) / (1 + row.usLarge)) - 1
    : null;
  const real = inflation != null
    ? ((1 + nominal) / (1 + inflation)) - 1
    : ((row.usLarge != null && row.usBonds != null) ? (alloc.stock * row.usLarge + alloc.bond * row.usBonds) : weightedAssetReturn(row, RISK_PROFILES[riskProfile || 3].weights));
  return { nominal, inflation, real, stockNominal:n.stock, bondNominal:n.bond, source:'Damodaran nominal + derived CPI bridge' };
}

const LONGRUN_INFLATION = 0.025;

// Social Security claim-age math (modern Full Retirement Age = 67, born 1960+).
// pia = Primary Insurance Amount = the benefit at FRA. The actual benefit is the
// pia adjusted for when you actually file (the real SSA schedule):
//   • file LATE  → delayed retirement credits, +8%/yr, capped at age 70.
//   • file EARLY → permanent reduction: 5/9 of 1% per month for the first 36
//     months before FRA, then 5/12 of 1% per month beyond that. (62 = 30% cut.)
const SS_FRA = 67;
function ssAdjust(pia, claimAge){
  const c = Math.max(62, Math.min(70, claimAge));
  if(c >= SS_FRA) return pia * (1 + 0.08 * (c - SS_FRA));
  const monthsEarly = (SS_FRA - c) * 12;
  const first36 = Math.min(monthsEarly, 36);
  const beyond  = Math.max(0, monthsEarly - 36);
  return pia * (1 - (first36 * (5/900) + beyond * (5/1200)));
}

// ─── Per-asset stats (computed across each asset's available years) ─────
function computeAssetStats(data){
  const out = {};
  ASSET_KEYS.forEach(k => {
    const vals = data.map(r => r[k]).filter(v => v !== null && v !== undefined);
    const n = vals.length;
    if(n === 0){ out[k] = {mean:0, stdev:0, cagr:0, n:0, min:0, max:0}; return; }
    const mean = vals.reduce((a,b)=>a+b,0) / n;
    const variance = vals.reduce((a,b)=>a + Math.pow(b-mean,2),0) / Math.max(n-1,1);
    const cagr = Math.pow(vals.reduce((p,v)=>p*(1+v),1), 1/n) - 1;
    out[k] = {
      mean, stdev: Math.sqrt(variance), cagr, n,
      min: Math.min(...vals), max: Math.max(...vals)
    };
  });
  return out;
}

// Seeded RNG (mulberry32). The bootstrap draws are deterministic so identical
// inputs reproduce an identical success % — no sampling drift on page refresh.
// Distribution is unchanged; this only fixes *which* draws come out. Call
// resetSeed() before generating a bundle to reproduce it; pass a fresh seed
// (e.g. Date.now()) only if you deliberately want a new random bundle.
const DEFAULT_SEED = 0x9e3779b9;
let _rngState = DEFAULT_SEED >>> 0;
function resetSeed(seed = DEFAULT_SEED){ _rngState = seed >>> 0; }
function rand(){
  _rngState = (_rngState + 0x6D2B79F5) >>> 0;
  let t = _rngState;
  t = Math.imul(t ^ (t >>> 15), t | 1);
  t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}

function generateReturnPath(horizonYears){
  const path = [];
  const minBlock = 3, maxBlock = 5;
  while(path.length < horizonYears){
    const blockLen = minBlock + Math.floor(rand() * (maxBlock - minBlock + 1));
    const maxStart = RETURN_DATA.length - blockLen;
    const startIdx = Math.floor(rand() * (maxStart + 1));
    for(let i = 0; i < blockLen && path.length < horizonYears; i++){
      path.push(RETURN_DATA[startIdx + i]);
    }
  }
  return path;
}


function weightedAssetReturn(row, weights){
  const sleeves = [
    ASSET_KEYS.filter(k => ASSET_META[k].bucket === 'growth'),
    ASSET_KEYS.filter(k => ASSET_META[k].bucket !== 'growth')
  ];

  let weightedReturn = 0;
  let unresolvedWeight = 0;

  sleeves.forEach(keys => {
    const sleeveTargetWeight = keys.reduce((sum, k) => sum + (weights[k] || 0), 0);
    if(sleeveTargetWeight <= 1e-9) return;

    const availableKeys = keys.filter(k => row[k] !== null && row[k] !== undefined);
    const availableSleeveWeight = availableKeys.reduce((sum, k) => sum + (weights[k] || 0), 0);

    if(availableSleeveWeight <= 1e-9){
      unresolvedWeight += sleeveTargetWeight;
      return;
    }

    availableKeys.forEach(k => {
      const sleeveWeight = (weights[k] || 0) / availableSleeveWeight;
      weightedReturn += sleeveTargetWeight * sleeveWeight * row[k];
    });
  });

  // Fallback for any future dataset row where an entire sleeve is unavailable.
  // This should not trigger with the current 1928–2025 dataset, but prevents a
  // silent zero-return sleeve if future data coverage changes.
  if(unresolvedWeight > 1e-9){
    const availableKeys = ASSET_KEYS.filter(k => row[k] !== null && row[k] !== undefined);
    const availableWeight = availableKeys.reduce((sum, k) => sum + (weights[k] || 0), 0);
    if(availableWeight > 1e-9){
      availableKeys.forEach(k => {
        weightedReturn += unresolvedWeight * ((weights[k] || 0) / availableWeight) * row[k];
      });
    }
  }

  return weightedReturn;
}


function runSimulation(plan, overrides = {}, returnPaths = null){
  const inputs = resolveInputs(plan, overrides);
  const sims = [];
  // When a return-path bundle is supplied it is authoritative: iterate over
  // exactly those paths so identical inputs + identical paths are reproducible.
  // (Silently generating random fill paths for missing indices broke that.)
  const iterations = returnPaths ? returnPaths.length : inputs.iterations;
  for(let s = 0; s < iterations; s++){
    const returnPath = returnPaths
      ? returnPaths[s]
      : generateReturnPath(inputs.horizonYears);
    const sim = runSinglePath(inputs, returnPath);
    sim.simIndex = s;  // anchor for path-coherent cross-strategy comparison
    sim.returnPath = returnPath;  // preserve coherent path for summary resilience / elasticity diagnostics
    sims.push(sim);
  }
  return analyzeResults(sims, inputs);
}


function resolveInputs(plan, ov){
  const profile = RISK_PROFILES[plan.portfolio.riskProfile];
  const horizon = (plan.household.primary.planEndAge + (ov.longevityYears || 0))
                  - plan.household.primary.currentAge;
  const equityShockShare = profile.eq;

  // Social Security — per person. Each benefit is the pia (benefit at FRA, today's
  // dollars) actuarially adjusted for the actual claim age, haircut by any ssCut
  // stress, then mapped onto the PRIMARY's age timeline (the frame the sim runs in)
  // so a spouse of a different age switches on at the right simulation year.
  // ssDelayYears (the SS Start Age lever) is a SIGNED shift to the PRIMARY's claim
  // age; the spouse keeps their own claim age (edited on the input page).
  const ssCfg = plan.income.socialSecurity || {};
  const ssCutMult = 1 - (ov.ssCut || 0);
  const ssDelta = ov.ssDelayYears || 0;
  const pCurAge = plan.household.primary.currentAge;
  const spouseCurAge = (plan.household.spouse && plan.household.spouse.currentAge != null)
                       ? plan.household.spouse.currentAge : pCurAge;
  const ssBenefits = [];
  function addSS(person, isPrimary){
    if(!person || !(person.pia > 0)) return;
    const claim = Math.max(62, Math.min(70, (person.claimAge != null ? person.claimAge : SS_FRA)
                                            + (isPrimary ? ssDelta : 0)));
    const personCurAge = isPrimary ? pCurAge : spouseCurAge;
    ssBenefits.push({
      amount:   ssAdjust(person.pia, claim) * ssCutMult,
      startAge: pCurAge + (claim - personCurAge)   // claim age expressed in the primary's age frame
    });
  }
  addSS(ssCfg.primary, true);
  addSS(ssCfg.spouse, false);

  // Spend cut: proportional reduction across all expense categories.
  // spendCut reduces spending (stress); spendBump raises it (elasticity probe).
  const spendMult = (1 - Math.max(0, Math.min(0.5, ov.spendCut || 0))) * (1 + Math.max(0, ov.spendBump || 0));

  // Initial shock: applied to the equity portion of each account proportionally.
  // Since all accounts share the same risk profile, all receive the same hit.
  // For taxable accounts, the basis remains unchanged on a market drop —
  // basis is the cost paid, not the current value, so a -20% market move
  // doesn't change what the client originally paid in.
  const shockMult = 1 - (ov.initialShock || 0) * equityShockShare;
  const accounts = {
    taxable: {
      balance: plan.portfolio.accounts.taxable.balance * shockMult,
      // Basis as absolute dollars (was stored as percent of original balance).
      // We convert here to make the engine math simpler downstream.
      basis: plan.portfolio.accounts.taxable.balance * plan.portfolio.accounts.taxable.basisPct
    },
    traditional: {
      balance: plan.portfolio.accounts.traditional.balance * shockMult
    },
    roth: {
      balance: plan.portfolio.accounts.roth.balance * shockMult
    }
  };

  // ── Accumulation, pension, and LTC resolution (all no-op at plan defaults) ──
  const curAge        = plan.household.primary.currentAge;
  const retirementAge = Math.max(curAge, (plan.household.primary.retirementAge != null
                          ? plan.household.primary.retirementAge : curAge) + (ov.retireDelay || 0));
  const savingsAnnual = Math.max(0, ((plan.savings && plan.savings.annual) || 0) * (1 + (ov.savingsBump || 0)));
  const pen           = plan.income.pension || {};
  // Chosen collection age. The UI computes this (retirement-linked or custom) and
  // passes it as an absolute override; fall back to the plan's startAge (+ legacy
  // pensionDelay) when no absolute age is supplied.
  const penStartAge   = (ov.pensionStartAge != null ? ov.pensionStartAge
                          : (pen.startAge != null ? pen.startAge : 65) + (ov.pensionDelay || 0));
  // Discrete lookup: use ONLY the amount explicitly entered for this exact age.
  // A missing age means no modeled benefit (0) — we never invent the number.
  // `base` remains a legacy fallback for plans that still carry a single amount.
  const byAge         = pen.benefitByAge || {};
  const penEntered    = (byAge[penStartAge] != null) ? byAge[penStartAge] : pen.base;
  const penBase       = Math.max(0, (penEntered || 0));
  // Pension COLA: advisor enters a NOMINAL annual COLA% (like the SS COLA).
  // Engine is real-dollar, so convert to real drift: real = nominalCOLA − inflation.
  // 0% COLA → −inflation (flat-nominal pension erodes); COLA = inflation → flat real.
  const penColaReal = ((pen.colaPct || 0) / 100) - LONGRUN_INFLATION;
  const pensionAmount = penBase;
  const ltc           = plan.ltc || {};

  return {
    currentAge: plan.household.primary.currentAge,
    retirementAge,
    savingsAnnual,
    horizonYears: horizon,
    accounts,  // structured account container
    portfolio: {
      eq: profile.eq, fi: profile.fi,
      label: profile.label, alloc: profile.alloc,
      weights: profile.weights
    },
    returnAdj: (ov.returnAdj || 0) / 100,
    ss: ssBenefits,   // array of { amount, startAge } in the primary's age frame
    otherIncome:    { ...plan.income.other },
    pension:        { amount: pensionAmount, startAge: penStartAge, colaReal: penColaReal },
    ltc:            { amount: Math.max(0, (ltc.amount || 0) * (1 + (ov.ltcAdj || 0))), onsetAge: (ltc.onsetAge != null ? ltc.onsetAge : 999) },
    expenses: {
      living:     plan.expenses.living     * spendMult,
      housing:    plan.expenses.housing    * spendMult,
      debt:       plan.expenses.debt       * spendMult,
      healthcare: plan.expenses.healthcare * spendMult
    },
    // Recurring liabilities (e.g. a mortgage). NOT scaled by spendMult — a fixed
    // obligation isn't discretionary spending. colaReal mirrors the pension:
    // nominal escalator − inflation, so a 0%-COLA debt erodes in real terms.
    liabilities: (plan.liabilities || []).map(L => ({
      amount:   Math.max(0, L.amount || 0),
      startAge: (L.startAge != null ? L.startAge : 0),
      endAge:   (L.endAge   != null ? L.endAge   : 999),
      colaReal: ((L.colaPct || 0) / 100) - LONGRUN_INFLATION
    })),
    healthcareMult: 1 + (ov.healthcareAdj || 0),
    goals:          { ...plan.goals },
    // Tax rates split: ordinary income (for traditional withdrawals and SS),
    // and long-term capital gains (for taxable account gains).
    // The taxMult override scales both rates proportionally for stress testing.
    taxRates: {
      ordinary:     (plan.taxes.ordinary     * (1 + (ov.taxMult || 0))) / 100,
      capitalGains: (plan.taxes.capitalGains * (1 + (ov.taxMult || 0))) / 100
    },
    // Withdrawal strategy — drives account sequencing in fundGap
    withdrawalStrategy: plan.portfolio.withdrawalStrategy || 'taxable-first',
    // One-time cash shock injected at a specific year (fragility probe).
    lumpSum:     Math.max(0, ov.lumpSum || 0),
    lumpSumYear: (ov.lumpSumYear != null ? ov.lumpSumYear : -1),
    iterations: plan.simulation.iterations
  };
}


function runSinglePath(p, returnPath){
  // Each path gets its own evolving account state — clone from inputs.
  const accounts = {
    taxable:     { balance: p.accounts.taxable.balance, basis: p.accounts.taxable.basis },
    traditional: { balance: p.accounts.traditional.balance },
    roth:        { balance: p.accounts.roth.balance }
  };

  let returnProduct = 1;
  let failed        = false;
  let lifetimeTax   = 0;  // cumulative taxes paid across all years of this path
  const rows = [];

  // Total balance across all accounts — what we report as "portfolio balance".
  const totalBalance = () => accounts.taxable.balance + accounts.traditional.balance + accounts.roth.balance;

  // Path-level risk metrics (against total portfolio balance).
  let minBalance      = totalBalance();
  let peakBalance     = totalBalance();
  let maxDrawdown     = 0;
  let depletionAge    = null;
  let first10Product  = 1;
  let balanceAt10     = 0;

  for(let y = 0; y < p.horizonYears; y++){
    const age = p.currentAge + y;
    const rp  = returnPath[y];
    const r   = ((rp && rp.proxyReturn != null) ? rp.proxyReturn : weightedAssetReturn(rp, p.portfolio.weights)) + p.returnAdj;

    // ── ACCUMULATION PHASE (age < retirementAge) ──────────────────────────
    // Still working: portfolio grows and receives savings; no retirement
    // spending, withdrawals, income, or tax events yet. Contributions land in
    // the traditional (pre-tax) sleeve. No-op at default (retirementAge==currentAge).
    if(age < p.retirementAge){
      returnProduct *= (1 + r);
      if(y < 10) first10Product *= (1 + r);
      const accFactor = Math.abs(r) < 1e-7 ? 12 : r / (Math.pow(1 + r, 1/12) - 1);
      const startBalanceA = totalBalance();
      accounts.taxable.balance     *= (1 + r);
      accounts.roth.balance        *= (1 + r);
      accounts.traditional.balance  = accounts.traditional.balance * (1 + r) + (p.savingsAnnual / 12) * accFactor;
      // One-time capital outlay (e.g. a home purchase) during working years. The
      // engine assumes salary covers recurring costs while working, but a large
      // purchase is funded by liquidating investments — taxable first, then
      // traditional, then Roth. (Simplification: principal only, no cap-gains tax
      // on the sale — small vs the outlay and consistent with the accum model.)
      const lumpA = (p.lumpSum > 0 && y === p.lumpSumYear) ? p.lumpSum : 0;
      if(lumpA > 0){
        let rem = lumpA;
        if(rem > 0 && accounts.taxable.balance > 0){
          const take = Math.min(accounts.taxable.balance, rem);
          accounts.taxable.basis *= (accounts.taxable.balance - take) / accounts.taxable.balance;
          accounts.taxable.balance -= take; rem -= take;
        }
        if(rem > 0){ const take = Math.min(accounts.traditional.balance, rem); accounts.traditional.balance -= take; rem -= take; }
        if(rem > 0){ const take = Math.min(accounts.roth.balance, rem);        accounts.roth.balance        -= take; rem -= take; }
      }
      const endBalanceA = totalBalance();
      if(y === 9) balanceAt10 = endBalanceA;
      if(endBalanceA < minBalance) minBalance = endBalanceA;
      if(endBalanceA > peakBalance) peakBalance = endBalanceA;
      if(peakBalance > 0){ const dd = (peakBalance - endBalanceA) / peakBalance; if(dd > maxDrawdown) maxDrawdown = dd; }
      rows.push({
        year: y+1, age, source: rp.y, returnRate: r, phase: 'accum',
        socialSecurity: 0, otherIncome: 0, pension: 0, withdrawal: 0,
        expenses: 0, goals: 0, liabilities: 0, taxes: 0, savings: p.savingsAnnual,
        startBalance: startBalanceA, wdRate: 0,
        netCashflow: p.savingsAnnual - lumpA,
        balance: endBalanceA, failed: false,
        accountBreakdown: { taxable: 0, traditional: 0, roth: 0 },
        accountBalances: { taxable: accounts.taxable.balance, traditional: accounts.traditional.balance, roth: accounts.roth.balance },
        taxBySource: { ss: 0, oi: 0, traditional: 0, taxable: 0 }
      });
      continue;
    }

    // External income (today's dollars — no COLA). SS is the sum of each
    // person's benefit that has started by this age (primary + spouse).
    let ssInc = 0;
    for(const b of p.ss){ if(age >= b.startAge) ssInc += b.amount; }
    const oiInc = (age >= p.otherIncome.startAge && age <= p.otherIncome.endAge)
                  ? p.otherIncome.amount : 0;
    const penInc = (p.pension && age >= p.pension.startAge)
                   ? p.pension.amount * Math.pow(1 + (p.pension.colaReal || 0), age - p.pension.startAge) : 0;
    const ltcCost = (p.ltc && age >= p.ltc.onsetAge) ? p.ltc.amount : 0;
    const expenses = p.expenses.living + p.expenses.housing + p.expenses.debt
                     + p.expenses.healthcare * p.healthcareMult + ltcCost;
    const goalsY   = p.goals.vacation + p.goals.property + p.goals.gifts;
    // Recurring liabilities active at this age, each eroded in real terms from
    // its OWN start age (a fixed mortgage started years ago is already cheaper).
    const liabCost = p.liabilities.reduce((s, L) =>
      (age >= L.startAge && age <= L.endAge)
        ? s + L.amount * Math.pow(1 + L.colaReal, age - L.startAge)
        : s, 0);

    // Tax on external income: 85% of SS, 100% of OI, 100% of pension, at the ordinary rate.
    const taxOnSS    = ssInc * 0.85 * p.taxRates.ordinary;
    const taxOnOI    = oiInc * p.taxRates.ordinary;
    const taxOnPen   = penInc * p.taxRates.ordinary;
    const taxOnInc   = taxOnSS + taxOnOI + taxOnPen;
    const netInc     = (ssInc + oiInc + penInc) - taxOnInc;

    // One-time cash shock (e.g. medical/family event) lands as extra need.
    const lumpY = (p.lumpSum > 0 && y === p.lumpSumYear) ? p.lumpSum : 0;

    // After-tax gap the portfolio must cover.
    const gap = (expenses + goalsY + liabCost + lumpY) - netInc;

    const startBalance = totalBalance();

    // Compute the withdrawal breakdown without mutating accounts.
    const funding = gap > 0
      ? fundGap(accounts, gap, p.taxRates, p.withdrawalStrategy)
      : { totalWithdrawn: 0, totalTax: 0, breakdown: { taxable: 0, traditional: 0, roth: 0 }, taxBySource: { taxable: 0, traditional: 0 }, shortfall: 0 };

    const withdrawal = funding.totalWithdrawn;
    const totalTax   = taxOnInc + funding.totalTax;
    lifetimeTax     += totalTax;
    const wdRate = (startBalance > 0.01 && withdrawal > 0)
                   ? (withdrawal / startBalance) * 100 : 0;

    returnProduct *= (1 + r);
    if(y < 10) first10Product *= (1 + r);

    // Mid-year withdrawal factor — spreads withdrawals across the year while
    // the balance is earning the annual return. Same formula as the original
    // single-account engine; we just apply it per-account now.
    const factor = Math.abs(r) < 1e-7 ? 12 : r / (Math.pow(1 + r, 1/12) - 1);

    // Capture the START-of-year values for basis math. We need these before
    // we modify the balance, because basis consumption is based on the
    // withdrawal's share of the starting balance — not the ending balance.
    const taxStartBal   = accounts.taxable.balance;
    const taxStartBasis = accounts.taxable.basis;

    // Update each account's balance with mid-year math:
    //   end = start * (1+r) - (withdrawal / 12) * factor
    accounts.taxable.balance     = accounts.taxable.balance     * (1 + r) - (funding.breakdown.taxable     / 12) * factor;
    accounts.traditional.balance = accounts.traditional.balance * (1 + r) - (funding.breakdown.traditional / 12) * factor;
    accounts.roth.balance        = accounts.roth.balance        * (1 + r) - (funding.breakdown.roth        / 12) * factor;

    // Consume basis proportionally to the gross taxable withdrawal. If you
    // pull X dollars from a taxable account with starting balance B and
    // basis P, the dollars carry P/B basis with them: basis_consumed = X * P/B.
    // Basis doesn't earn returns — only the appreciation does — so timing
    // doesn't change this proportion.
    if(funding.breakdown.taxable > 0 && taxStartBal > 0.01){
      const basisFraction = taxStartBasis / taxStartBal;
      const basisConsumed = funding.breakdown.taxable * basisFraction;
      accounts.taxable.basis = Math.max(0, taxStartBasis - basisConsumed);
    }

    // Floor any depleted accounts at zero.
    if(accounts.taxable.balance < 0)     accounts.taxable.balance = 0;
    if(accounts.traditional.balance < 0) accounts.traditional.balance = 0;
    if(accounts.roth.balance < 0)        accounts.roth.balance = 0;

    // Total depletion check — plan failed if no account can cover need.
    if(totalBalance() <= 0.01 || funding.shortfall > 0.01){
      accounts.taxable.balance = 0; accounts.taxable.basis = 0;
      accounts.traditional.balance = 0;
      accounts.roth.balance = 0;
      failed = true;
      if(depletionAge === null) depletionAge = age;
    }

    const endBalance = totalBalance();

    if(y === 9) balanceAt10 = endBalance;

    if(endBalance < minBalance) minBalance = endBalance;
    if(endBalance > peakBalance) peakBalance = endBalance;
    if(peakBalance > 0){
      const dd = (peakBalance - endBalance) / peakBalance;
      if(dd > maxDrawdown) maxDrawdown = dd;
    }

    rows.push({
      year: y+1, age, source: rp.y, returnRate: r,
      nominalReturn: (rp && rp.proxyNominalReturn != null) ? rp.proxyNominalReturn : null,
      inflationRate: (rp && rp.proxyInflationRate != null) ? rp.proxyInflationRate : null,
      realReturnUsed: r,
      socialSecurity: ssInc, otherIncome: oiInc, pension: penInc, withdrawal,
      expenses, goals: goalsY, liabilities: liabCost, taxes: totalTax,
      startBalance, wdRate,
      netCashflow: (ssInc + oiInc + penInc) - (expenses + goalsY + liabCost + totalTax),
      balance: endBalance, failed,
      accountBreakdown: { ...funding.breakdown },
      accountBalances: {
        taxable: accounts.taxable.balance,
        traditional: accounts.traditional.balance,
        roth: accounts.roth.balance
      },
      taxBySource: {
        ss: taxOnSS, oi: taxOnOI,
        traditional: funding.taxBySource.traditional,
        taxable: funding.taxBySource.taxable
      }
    });

    if(failed){
      for(let z = y+1; z < p.horizonYears; z++){
        rows.push({
          year:z+1, age:p.currentAge+z, source:null, returnRate:0,
          socialSecurity:0, otherIncome:0, withdrawal:0,
          expenses:0, goals:0, taxes:0,
          startBalance:0, wdRate:0, netCashflow:0, balance:0, failed:true,
          accountBreakdown: { taxable:0, traditional:0, roth:0 },
          accountBalances:  { taxable:0, traditional:0, roth:0 }
        });
      }
      break;
    }
  }

  const cagr = Math.pow(returnProduct, 1 / p.horizonYears) - 1;
  const first10Years = Math.min(10, p.horizonYears);
  const first10Cagr = first10Years > 0
    ? Math.pow(first10Product, 1 / first10Years) - 1
    : 0;
  return { rows, failed, cagr, terminalBalance: totalBalance(),
           minBalance, maxDrawdown, depletionAge, first10Cagr, balanceAt10,
           lifetimeTax };
}


function analyzeResults(sims, p){
  const ns = sims.length;
  const survived = sims.filter(s => !s.failed).length;

  // Total starting balance across all three accounts — used as the envelope
  // origin point and as the comparison baseline for "above starting" metrics.
  const startingTotal = p.accounts.taxable.balance + p.accounts.traditional.balance + p.accounts.roth.balance;

  // Year-by-year percentile envelope — computed FIRST so we can use it for
  // path centrality selection below. At each year, sort all simulation balances
  // and take percentile cuts. Note: envelope is NOT a coherent path; it's the
  // boundary of outcomes at each year.
  const horizon = p.horizonYears;
  const envelope = [{
    year: 0,
    p10: startingTotal, p25: startingTotal,
    p50: startingTotal, p75: startingTotal,
    p90: startingTotal
  }];
  for(let y = 0; y < horizon; y++){
    const bals = sims.map(s => s.rows[y] ? s.rows[y].balance : 0).sort((a,b)=>a-b);
    envelope.push({
      year: y + 1,
      p10: bals[Math.floor(ns * 0.10)],
      p25: bals[Math.floor(ns * 0.25)],
      p50: bals[Math.floor(ns * 0.50)],
      p75: bals[Math.floor(ns * 0.75)],
      p90: bals[Math.floor(ns * 0.90)]
    });
  }

  // Path selection for Stressed/Favorable: sort by balance at year 10.
  // Stressed = worst early sequence → surfaces the sequence-risk story clients need
  // to understand. Bad early returns during withdrawals are the primary retirement risk.
  // Favorable = best early sequence → shows what good early compounding looks like.
  // Terminal balance is correct for Summary distribution but wrong here — Plan Drivers
  // is specifically about sequence-of-returns risk, not final outcome ranking.
  const bySequence = sims.slice().sort((a, b) => {
    if(a.balanceAt10 !== b.balanceAt10) return a.balanceAt10 - b.balanceAt10;
    return a.terminalBalance - b.terminalBalance;
  });
  const byCagr = sims.slice().sort((a, b) => a.cagr - b.cagr);

  // Centrality score: sum of proportional deviations from year-by-year median.
  // Proportional (rather than absolute) so later high-balance years don't dominate.
  // The most central path is the one that tracks the median envelope closest.
  function centrality(sim){
    let score = 0;
    for(let y = 0; y < sim.rows.length; y++){
      const med = envelope[y + 1].p50;
      if(med > 0.01){
        score += Math.abs(sim.rows[y].balance - med) / med;
      }
    }
    return score;
  }
  const withCent = sims.map(s => ({ sim: s, c: centrality(s) }));
  withCent.sort((a, b) => a.c - b.c);
  const typicalPath = withCent[0].sim;

  const paths = {
    p10: bySequence[Math.floor(ns * 0.10)],
    p25: bySequence[Math.floor(ns * 0.25)],
    p50: typicalPath,
    p75: bySequence[Math.floor(ns * 0.75)],
    p90: bySequence[Math.floor(ns * 0.90)]
  };

  // Terminal balance distribution — independent of path selection sort.
  const terms = sims.map(s => s.terminalBalance).sort((a, b) => a - b);
  const terminal = {
    p10: terms[Math.floor(ns * 0.10)],
    p25: terms[Math.floor(ns * 0.25)],
    p50: terms[Math.floor(ns * 0.50)],
    p75: terms[Math.floor(ns * 0.75)],
    p90: terms[Math.floor(ns * 0.90)]
  };

  // Aggregate risk metrics.
  const failedSims    = sims.filter(s => s.failed);
  const survivorSims  = sims.filter(s => !s.failed);

  // Depletion age — already scoped to failed paths.
  const deplAges = failedSims.map(s => s.depletionAge).filter(a => a !== null).sort((a,b)=>a-b);
  const medianDepletionAge = deplAges.length > 0
    ? deplAges[Math.floor(deplAges.length / 2)]
    : null;

  // Min balance and max drawdown — scoped to SURVIVORS only.
  // Including failed paths makes these metrics collapse to $0 / 100% on stressed
  // plans, which is uninformative (a failed path always hits zero by definition).
  // Among survivors, these answer "of the plans that worked, how close did
  // they come to failure?" — a real sequence-risk signal.
  const sMinBals = survivorSims.map(s => s.minBalance).sort((a,b)=>a-b);
  const medianMinBalanceSurvivors = sMinBals.length > 0
    ? sMinBals[Math.floor(sMinBals.length / 2)]
    : null;

  const sDDs = survivorSims.map(s => s.maxDrawdown).sort((a,b)=>a-b);
  const medianMaxDrawdownSurvivors = sDDs.length > 0
    ? sDDs[Math.floor(sDDs.length / 2)]
    : null;

  // Worst overall drawdown across all paths (not just survivors). Useful even
  // when failures exist because it indicates how steep the worst case got.
  const allDDs = sims.map(s => s.maxDrawdown).sort((a,b)=>a-b);
  const worstMaxDrawdown = allDDs[ns - 1];

  const first10s = sims.map(s => s.first10Cagr).sort((a,b)=>a-b);
  const worstFirst10Cagr = first10s[0];

  // Years underwater — median count of years a path's balance sits below its
  // starting (real) capital. A direct sequence-risk read: how long the plan
  // spends in a hole. Failed-path filler rows (balance 0) count as underwater.
  const uwCounts = sims.map(s => s.rows.filter(r => r.balance < startingTotal - 0.01).length).sort((a,b)=>a-b);
  const medianYearsUnderwater = uwCounts.length ? uwCounts[Math.floor(uwCounts.length / 2)] : 0;

  // Derived probability counts — power the connective-tissue text strip.
  const aboveStartCount   = sims.filter(s => s.terminalBalance > startingTotal).length;
  const doubledCount      = sims.filter(s => s.terminalBalance > 2 * startingTotal).length;
  const bigDrawdownCount  = sims.filter(s => s.maxDrawdown > 0.40).length;

  const taxAmounts = sims.map(s => s.lifetimeTax).sort((a,b) => a - b);
  const medianLifetimeTax = taxAmounts[Math.floor(ns * 0.50)];

  return {
    paths, terminal, envelope,
    sims,
    successRate: (survived / ns) * 100,
    survived, total: ns,
    medianCagr: byCagr[Math.floor(ns * 0.50)].cagr,
    horizonYears: p.horizonYears,
    iterations: ns,
    params: p,
    medianLifetimeTax,
    metrics: {
      medianDepletionAge,
      medianMinBalanceSurvivors,
      medianMaxDrawdownSurvivors,
      medianYearsUnderwater,
      worstMaxDrawdown,
      worstFirst10Cagr,
      aboveStartCount,
      doubledCount,
      bigDrawdownCount
    }
  };
}


function runHistoricalPath(plan, startYear, strategy, transform, overrides){
  // `overrides` flows through the SAME resolveInputs lever mapping the Monte
  // Carlo path uses (retireDelay, ssDelayYears, spendBump, lumpSum, savingsBump,
  // pensionStartAge, …) so a chosen scenario is sequenced faithfully, not just
  // its allocation. Defaults to {} → behavior identical to the original.
  const rawInputs = resolveInputs(plan, overrides || {});
  // Override strategy for this run
  rawInputs.withdrawalStrategy = strategy;

  // Build the path from startYear forward. When we reach the end of the real
  // record (2025) we WRAP back to its start rather than truncate — the same
  // cyclic treatment the block-bootstrap Monte Carlo uses, so a recent
  // retirement year (2000, 2008) still gets a FULL real-return horizon instead
  // of a stub that ends mid-retirement. Every return remains a real historical
  // year; only the calendar contiguity breaks at the wrap (invisible on an
  // age-based axis). The first decade — where sequence risk lives — is always
  // pre-wrap and fully real.
  const startIdx = RETURN_DATA.findIndex(r => r.y === startYear);
  if(startIdx < 0) return null;
  const path = [];
  for(let i = 0; i < rawInputs.horizonYears; i++){
    const row = RETURN_DATA[(startIdx + i) % RETURN_DATA.length];
    const proxy = historicalProxyComponents(row, plan.portfolio.riskProfile);
    path.push({
      ...row,
      proxyReturn: proxy.real,
      proxyNominalReturn: proxy.nominal,
      proxyInflationRate: proxy.inflation,
      proxyStockNominal: proxy.stockNominal,
      proxyBondNominal: proxy.bondNominal
    });
  }
  if(path.length === 0) return null;

  // Optional ORDER transform (e.g. reverse): reorders the SAME real return
  // rows before the single-path runner walks them. The returns are unchanged —
  // only their sequence is. Used by the Sequencing tab to isolate order. When
  // omitted, behavior is byte-identical to the original forward run.
  const ordered = typeof transform === 'function' ? transform(path.slice()) : path;

  // Adjust horizon to actual data available
  const inputs = { ...rawInputs, horizonYears: ordered.length };
  const result = runSinglePath(inputs, ordered);
  result.actualYears  = ordered.length;
  result.requestedYrs = rawInputs.horizonYears;
  result.startYear    = startYear;
  result.endYear      = startYear + ordered.length - 1;
  return result;
}
