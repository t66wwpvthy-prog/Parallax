/* ── chart helpers ── */
function fmtM(v){ if(!isFinite(v)||v<=0) return '$0'; if(v>=1e6) return '$'+(v/1e6).toFixed(1)+'M'; if(v>=1e3) return '$'+Math.round(v/1e3)+'K'; return '$'+Math.round(v); }
// Plot margins inside the viewBox (leaves room for axis labels).
const PADL=78, PADR=14, PADT=12, PADB=30;
// Chart axis colors, matched to the light-theme tokens (--rule-faint / --ink-faint).
const GRID='#e8e2d5', AXIS_INK='#8a93a0';
// Smooth a series of [x,y] points into a path using Catmull-Rom -> bezier.
// Tension kept low so the line stays trackable, not wavy ("toddler-drawn").
// Monotone cubic interpolation (Fritsch–Carlson). Unlike Catmull-Rom it CANNOT
// overshoot the data, so the curve stays smooth without inventing humps/dips
// between points — the difference between a grown-up chart and a wobbly one.
function monoPath(pts){
  const n=pts.length;
  if(n<2) return '';
  if(n===2) return `M ${pts[0][0]} ${pts[0][1]} L ${pts[1][0]} ${pts[1][1]}`;
  const xs=pts.map(p=>p[0]), ys=pts.map(p=>p[1]);
  const dx=[], dy=[], m=[];
  for(let i=0;i<n-1;i++){ dx[i]=xs[i+1]-xs[i]; dy[i]=ys[i+1]-ys[i]; m[i]=dy[i]/(dx[i]||1e-9); }
  const t=new Array(n);
  t[0]=m[0]; t[n-1]=m[n-2];
  for(let i=1;i<n-1;i++) t[i] = (m[i-1]*m[i]<=0) ? 0 : (m[i-1]+m[i])/2;
  for(let i=0;i<n-1;i++){
    if(m[i]===0){ t[i]=0; t[i+1]=0; continue; }
    const a=t[i]/m[i], b=t[i+1]/m[i], s=a*a+b*b;
    if(s>9){ const tau=3/Math.sqrt(s); t[i]=tau*a*m[i]; t[i+1]=tau*b*m[i]; }
  }
  let d=`M ${xs[0].toFixed(1)} ${ys[0].toFixed(1)}`;
  for(let i=0;i<n-1;i++){
    const h=dx[i];
    d+=` C ${(xs[i]+h/3).toFixed(1)} ${(ys[i]+t[i]*h/3).toFixed(1)}, ${(xs[i+1]-h/3).toFixed(1)} ${(ys[i+1]-t[i+1]*h/3).toFixed(1)}, ${xs[i+1].toFixed(1)} ${ys[i+1].toFixed(1)}`;
  }
  return d;
}
// Round a raw max up to a clean axis ceiling whose quarter-steps are round
// numbers (so ticks read $2M/$4M/… not $3.4M/$5.1M…).
function niceCeil(v){
  if(!(v>0)) return 1;
  const step0=v/4, mag=Math.pow(10, Math.floor(Math.log10(step0))), n=step0/mag;
  const niceN = n<=1?1 : n<=2?2 : n<=2.5?2.5 : n<=5?5 : 10;
  return niceN*mag*4;
}
function smoothPath(pts){
  if(pts.length<2) return '';
  if(pts.length===2) return `M ${pts[0][0]} ${pts[0][1]} L ${pts[1][0]} ${pts[1][1]}`;
  let d=`M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||pts[i+1];
    const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
  }
  return d;
}
function axes(W,H,ageStart,ageEnd,maxBal){
  const x0=PADL, x1=W-PADR, y0=PADT, y1=H-PADB;
  let g='';
  // Horizontal gridlines — faint rule color so the grid is legible without
  // competing with the data lines. (Was a dark-theme near-black; fixed for the
  // light "paper" theme.)
  for(let i=0;i<=4;i++){const y=y0+(y1-y0)/4*i; g+=`<line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}" stroke="${GRID}"/>`;}
  // y labels (right-aligned in the left gutter)
  for(let i=0;i<=4;i++){const v=maxBal*(1-i/4); const y=y0+(y1-y0)/4*i;
    g+=`<text x="${x0-12}" y="${y+4}" fill="${AXIS_INK}" font-size="11" font-family="Inter" text-anchor="end">${fmtM(v)}</text>`;}
  // x age ticks
  const span=ageEnd-ageStart;
  for(let k=0;k<=5;k++){const a=Math.round(ageStart+span*k/5); const x=x0+(x1-x0)*k/5;
    g+=`<text x="${x}" y="${H-9}" fill="${AXIS_INK}" font-size="11" font-family="Inter" text-anchor="${k===0?'start':k===5?'end':'middle'}">Age ${a}</text>`;}
  return g;
}
/* ── Cash-flow drawer ────────────────────────────────────────────────────
   Each scenario's res.paths.p50 is the "typical" coherent simulated path —
   the engine picks the sim that tracks the year-by-year median envelope
   most closely. Its .rows array carries year, age, socialSecurity, pension,
   otherIncome, withdrawal, expenses, goals, taxes, balance. We render those
   per scenario side by side. The numbers here are reality-of-one-path
   (coherent), not blended percentiles — that's why this view exists.
   Plumbing only; no engine changes. */
function cfMoney(v){
  if(!isFinite(v)) return '—';
  const n = Math.round(v);
  if(n === 0) return '$0';
  return '$' + Math.abs(n).toLocaleString('en-US');
}
function renderCashflow(){
  const drawer = $('#cf-drawer');
  if(drawer.style.display !== 'block') return;   // only render when open; runAll re-renders if so
  const rowsByScen = scenarios.map(s => (s.res && s.res.paths && s.res.paths.p50) ? s.res.paths.p50.rows : []);
  // No data anywhere (e.g. a failed/degenerate Run) → say so plainly instead of
  // rendering an empty headers-only table that looks like it "didn't load".
  if(!rowsByScen.some(r => r.length)){
    drawer.innerHTML =
      `<div class="cf-drawer-head"><span>Annual Cash Flow</span></div>` +
      `<div class="cf-empty">No cash-flow data yet. Press Run — or check the plan inputs if the status bar shows a warning.</div>`;
    return;
  }
  const gcls = scenarios.map((_,i)=>`cf-g${i%2}`);
  let h = '<table class="cf-table"><thead><tr><th class="age" rowspan="2">Age</th>';
  scenarios.forEach((s,i)=>{
    h += `<th class="scen ${gcls[i]}" colspan="3" style="color:${colorFor(i)}">${escHtml(s.name)}</th>`;
  });
  h += '</tr><tr>';
  scenarios.forEach((s,i)=>{
    h += `<th class="${gcls[i]}">Income</th><th class="${gcls[i]}">Withdraw</th><th class="${gcls[i]}">End Balance</th>`;
  });
  h += '</tr></thead><tbody>';
  const len = Math.max(0, ...rowsByScen.map(r => r.length));
  const curAge = plan.household.primary.currentAge;
  for(let y = 0; y < len; y++){
    const age = curAge + y + 1;
    // Mark the row where any scenario crosses into retirement (for the
    // baseline retirement age — additional markers per scenario would clutter).
    const retireAge = plan.household.primary.retirementAge;
    const isRetire = (age === retireAge);
    h += `<tr class="${isRetire?'retire':''}"><td class="age">${age}</td>`;
    scenarios.forEach((s,i)=>{
      const r = rowsByScen[i][y];
      if(!r){ h += `<td colspan="3" class="dim ${gcls[i]}">—</td>`; return; }
      const inc = (r.socialSecurity || 0) + (r.pension || 0) + (r.otherIncome || 0);
      h += `<td class="${gcls[i]}">${cfMoney(inc)}</td>`;
      h += `<td class="${gcls[i]}">${cfMoney(r.withdrawal || 0)}</td>`;
      h += `<td class="${gcls[i]}">${cfMoney(r.balance || 0)}</td>`;
    });
    h += '</tr>';
  }
  h += '</tbody></table>';
  drawer.innerHTML =
    `<div class="cf-drawer-head"><span>Annual Cash Flow</span><span class="sub">Typical simulated path · today's dollars</span></div>` +
    `<div class="cf-scroll">${h}</div>`;
}

/* ── SEQUENCING tab — same returns, different ORDER ──────────────────────────
   The tab's single job: isolate the ORDER of returns. We take one REAL
   historical return stream and run the SAME plan through it forward vs exactly
   reversed (identical returns, opposite sequence). Any difference is pure
   sequence-of-returns risk. Every number on this tab is a direct read of the
   engine's single-path result; the UI computes no balances or metrics. */
// The Sequencing tab holds ONE plan fixed and runs it through several REAL
// retirement markets — never a reversed/counterfactual timeline. The lesson is
// the truth a client actually faces: retire into a brutal market vs a kind one,
// same plan, and watch the spread. A LIBRARY of real markets the advisor can
// toggle on/off as lines (`on` = shown by default). Euphoric bulls (1982/85) are
// deliberately omitted — a 10-20x winner crushes the scale and hides the
// downside, which is the whole point of a sequence-risk view.
// Distinct but DEEP, desaturated editorial tones — each line identifiable, none
// candy-bright. Default four (slate-blue / teal-green / brass / rust) are picked
// to be maximally distinct from each other on the cream paper.
const SEQ_YEARS=[
  {y:1929, tag:'Great Depression',  c:'#7d4a6b', on:false},  // plum
  {y:1966, tag:'the lost decade',   c:'#3f566b', on:true },  // deep slate blue
  {y:1973, tag:'stagflation',       c:'#357a5e', on:true },  // deep teal-green
  {y:1987, tag:'Black Monday',      c:'#4a6f7a', on:false},  // steel
  {y:1995, tag:'the 90s boom',      c:'#a8742a', on:true },  // antique brass
  {y:2000, tag:'dot-com crash',     c:'#99513f', on:true },  // deep rust
  {y:2008, tag:'financial crisis',  c:'#8c4a5a', on:false},  // claret
  {y:2009, tag:'the recovery bull', c:'#4f9d72', on:false},  // fresh green
];

function buildSeqSelect(){
  const sel=$('#seq-select'), cur=sel.value;
  sel.innerHTML=scenarios.map(s=>`<option>${escHtml(s.name)}</option>`).join('');
  if(cur && scenarios.some(s=>s.name===cur)) sel.value=cur;
  sel.onchange=runSeq;
  buildSeqChips();
}
// Market chips double as the selector AND the legend: lit = shown as a line.
function buildSeqChips(){
  const box=$('#seq-chips'); if(!box) return;
  box.innerHTML=SEQ_YEARS.map((m,i)=>
    `<button class="seq-chip${m.on?' on':''}" data-i="${i}"><span class="cdot" style="background:${m.c}"></span>${m.y} · ${m.tag}</button>`).join('');
  box.querySelectorAll('.seq-chip').forEach(btn=>btn.onclick=()=>{
    const m=SEQ_YEARS[+btn.dataset.i];
    if(m.on && SEQ_YEARS.filter(x=>x.on).length<=1) return;   // keep at least one line
    m.on=!m.on; buildSeqChips(); runSeq();
  });
}
// Build a "retire-now" clone: the household standing at its retirement age with
// the plan's MEDIAN projected balance (read from the engine envelope, not
// invented). Every real market then runs from this ONE shared starting point, so
// the only thing differing between lines is the market — not the entry balance.
function retireNowClone(p, ov, curAge, retAge, accumYears, envelope){
  // `envelope` is the chosen scenario's already-computed envelope, passed in
  // from runSeq. Reusing it (a) keeps the sequencing entry balance IDENTICAL to
  // the Scenarios tab — both read the same shared-path run — and (b) avoids
  // re-running a full Monte Carlo on every chip toggle. Fall back to a
  // shared-path run only if the scenario hasn't been computed yet.
  const env = envelope || (runSimulation(p, ov, sharedPaths) || {}).envelope;
  const accs=p.portfolio.accounts;
  const tot=accs.taxable.balance+accs.traditional.balance+accs.roth.balance;
  const entry=(env && env[accumYears] && env[accumYears].p50!=null) ? env[accumYears].p50 : tot;
  const rp=JSON.parse(JSON.stringify(p));
  const ra=rp.portfolio.accounts;
  if(tot>0){ const f=entry/tot; ra.taxable.balance*=f; ra.traditional.balance*=f; ra.roth.balance*=f; }
  else { ra.taxable.balance=entry; }
  rp.household.primary.currentAge=retAge;          // standing at retirement → no accumulation phase
  rp.household.primary.retirementAge=retAge;
  if(rp.household.spouse && rp.household.spouse.currentAge!=null)
    rp.household.spouse.currentAge += (retAge-curAge);
  return rp;
}
function runSeq(){
  const sel=$('#seq-select'); const s=scenarios.find(x=>x.name===sel.value)||scenarios[0];
  // Sequence the chosen scenario FAITHFULLY: allocation via the plan clone, every
  // other lever via the same overrides mapping the Scenarios tab uses.
  const p=planForScenario(s.lev);
  const ov=leversToOverrides(s.lev);
  const strat=p.portfolio.withdrawalStrategy||'taxable-first';
  const curAge=plan.household.primary.currentAge;
  const retAge=(s.lev.retireAge!=null?s.lev.retireAge:p.household.primary.retirementAge);
  const accumYears=Math.max(0, retAge-curAge);
  const rp=retireNowClone(p, ov, curAge, retAge, accumYears, s.res && s.res.envelope);
  const ov2={...ov, retireDelay:0};                // retirement age is baked into the clone now
  const runs=SEQ_YEARS.filter(m=>m.on)
                      .map(m=>({m, res:runHistoricalPath(rp, m.y, strat, undefined, ov2)}))
                      .filter(r=>r.res && r.res.rows.length);
  if(!runs.length){ $('#seq-svg').innerHTML=''; $('#seq-prints').innerHTML=''; return; }
  drawSeqChart(runs, retAge);
  renderPrints(runs);
  const n=runs.length;
  $('#seq-sub').textContent='Same plan, real markets';
}
function drawSeqChart(runs, retAge){
  const svg=$('#seq-svg'),W=1000,H=320;
  // All lines share the retirement-entry balance (same plan), then diverge purely
  // by the market they retired into. Full width = the retirement years.
  const entry=runs[0].res.rows[0].startBalance||0;
  const series=res=>[entry, ...res.rows.map(x=>x.balance)];
  const all=runs.map(r=>series(r.res));
  const n=Math.max(...all.map(a=>a.length));
  const ageStart=retAge, ageEnd=retAge+n-1;
  // Decision-zone cap: for sequence risk the readable region is the entry balance
  // DOWN to zero (will the money last?). A kind market can compound well above
  // that and flatten the downside into an unreadable band. So cap the axis a bit
  // above the entry balance; any line that climbs past it rises off the top
  // (clipped) with its true ending still in its card. When nothing exceeds the
  // ceiling (e.g. all-stress markets) we use the real max, so no space is wasted.
  // Decision-zone ceiling (entry → 0 is the readable region for sequence risk).
  // Fit everything when it stays under ~2.2x entry; only a true runaway gets
  // capped — and then values are CLAMPED to the ceiling so the line rides the top
  // cleanly instead of fragmenting in and out of view. Axis rounded to nice ticks.
  const realMax=Math.max(...all.map(a=>Math.max(...a)));
  const ceiling=entry>0 ? entry*2.2 : realMax;
  const maxBal=niceCeil(Math.min(realMax, ceiling));
  const x0=PADL, x1=W-PADR, y0=PADT, y1=H-PADB;
  const X=idx=> x0+(x1-x0)*(idx/(Math.max(1,n-1)));
  const Y=v => y1-(Math.min(Math.max(0,v),maxBal)/maxBal)*(y1-y0);
  let h=axes(W,H,ageStart,ageEnd,maxBal);
  h+=`<defs><clipPath id="seqclip"><rect x="${x0}" y="${y0-2}" width="${x1-x0}" height="${y1-y0+2}"/></clipPath></defs><g clip-path="url(#seqclip)">`;
  // Per line: a paper-colored HALO underneath, then the colored line on top. The
  // halo knocks out the lines below at every crossing, so the crowded middle
  // reads cleanly and the top line is unambiguous. Monotone curve = no overshoot.
  // A depleted line STOPS at $0 (no crawl along the floor) — the ✕ marks the end.
  const ends=[];
  runs.forEach((r,i)=>{
    const full=all[i];
    const dep=r.res.depletionAge!=null;
    let ei=full.length-1;
    if(dep){ const k=full.findIndex((v,idx)=>idx>0 && v<=0.01); if(k>0) ei=k; }
    const col=r.m.c;
    const d=monoPath(full.slice(0,ei+1).map((v,k)=>[X(k),Y(v)]));
    h+=`<path d="${d}" fill="none" stroke="var(--surface)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>`;
    h+=`<path d="${d}" fill="none" stroke="${col}" stroke-width="0.9" stroke-linejoin="round" stroke-linecap="round"/>`;
    ends.push({c:col, y:r.m.y, dep, px:X(ei), py:Y(full[ei])});
  });
  // Shared launch node — one plan, all markets start here, then diverge.
  h+=`<circle cx="${X(0).toFixed(1)}" cy="${Y(entry).toFixed(1)}" r="2.2" fill="var(--surface)" stroke="${AXIS_INK}" stroke-width="1.1"/>`;
  h+=`</g>`;
  // Endpoint treatment (outside the clip so labels are never cut): a ✕ where a
  // line runs dry, a dot where it survives — each tagged with its market year so
  // the eye never has to leave the chart for the legend.
  // Markers first: ✕ where a line runs dry, a dot where it survives.
  ends.forEach(e=>{
    if(e.dep){
      const s=2.8;
      h+=`<path d="M ${(e.px-s).toFixed(1)} ${(e.py-s).toFixed(1)} L ${(e.px+s).toFixed(1)} ${(e.py+s).toFixed(1)} M ${(e.px-s).toFixed(1)} ${(e.py+s).toFixed(1)} L ${(e.px+s).toFixed(1)} ${(e.py-s).toFixed(1)}" stroke="${e.c}" stroke-width="1.4" stroke-linecap="round"/>`;
    } else {
      h+=`<circle cx="${e.px.toFixed(1)}" cy="${e.py.toFixed(1)}" r="2.2" fill="${e.c}" stroke="var(--surface)" stroke-width="1.1"/>`;
    }
  });
  // No year labels on the lines — the chip row above the chart and the fingerprint
  // cards below already say which color is which market. Adding a year on each
  // line just adds visual noise that has to be de-collided every redraw.
  svg.innerHTML=h;
}
// Path fingerprint — facts read straight off the engine result. One card per real
// market: the first-decade return (the sequence-risk cause), the lowest the
// portfolio fell, and the outcome. No invented composite "score".
function renderPrints(runs){
  const firstDecade=r=>{
    const rr=r.rows.filter(x=>x.source!=null).slice(0,10);
    if(!rr.length) return 0;
    const prod=rr.reduce((a,x)=>a*(1+x.returnRate),1);
    return Math.pow(prod,1/rr.length)-1;
  };
  const lowest=r=>{ const b=r.rows.map(x=>x.balance); return b.length?Math.min(...b):0; };
  // Damage window — the longest run of years the market's cumulative return sat
  // BELOW its retirement-day level (lost real ground). A short, V-shaped shock
  // ('08–09) recovers in a couple of years; a long grind ('66/'73 — a decade of
  // flat-real + inflation) stays underwater far longer and does more damage to a
  // withdrawing portfolio. Pure VIEW of the path's per-year returns, no new math.
  const damageWindow=r=>{
    const rr=r.rows.filter(x=>x.source!=null);
    let g=1, cur=0, max=0;
    for(const x of rr){ g*=(1+x.returnRate); if(g<1){ cur++; if(cur>max) max=cur; } else cur=0; }
    return max;
  };
  const pct=v=>(v>=0?'+':'')+(v*100).toFixed(1)+'%';
  const outcome=r=> r.depletionAge!=null
    ? {t:`Ran dry @ ${r.depletionAge}`, c:'var(--negative-bright)'}
    : {t:`Survived · ${fmtM(r.terminalBalance)}`, c:'var(--positive-bright)'};
  const card=(m,res)=>{
    const o=outcome(res);
    const dwYrs=damageWindow(res);
    // Only when there IS a drawdown — a good market never goes underwater, so the
    // row would just read "—". Show it where it tells a story; omit it otherwise.
    const dwBlock = dwYrs ? `
      <div class="pr-row" style="border-bottom:none"><span class="pr-k">Duration</span><span class="pr-v">${dwYrs} yr${dwYrs>1?'s':''}</span></div>
      <div class="dw-bar"><div class="dw-fill" style="width:${Math.min(100,dwYrs/12*100).toFixed(0)}%;background:#34465c"></div></div>` : '';
    return `<div class="seq-print">
      <h4><span class="dot" style="border-color:${m.c}"></span>${m.y} · ${m.tag}</h4>
      <div class="pr-row"><span class="pr-k">First decade</span><span class="pr-v">${pct(firstDecade(res))}</span></div>
      <div class="pr-row"><span class="pr-k">Lowest</span><span class="pr-v">${fmtM(lowest(res))}</span></div>
      ${dwBlock}
      <div class="pr-row"><span class="pr-k">Outcome</span><span class="pr-v" style="color:${o.c}">${o.t}</span></div>
    </div>`;
  };
  $('#seq-prints').innerHTML=runs.map(r=>card(r.m, r.res)).join('');
}

/* ── tab switch + boot ── */
$$('.htab').forEach(t=>t.onclick=()=>{
  $$('.htab').forEach(x=>x.classList.remove('on'));
  $$('.page').forEach(x=>x.classList.remove('on'));
  t.classList.add('on'); $(`.page[data-page="${t.dataset.page}"]`).classList.add('on');
  // Returning to Scenarios after a base-plan edit re-runs the engine so the
  // columns reflect the new source; otherwise just redraw.
  if(t.dataset.page==='scenarios'){ if(plansDirty){ plansDirty=false; runAll(); } }
  if(t.dataset.page==='sequencing') runSeq();
  if(t.dataset.page==='net-worth') renderInputs();
});
// Net Worth sub-nav: switch the active sub-page, persist, re-render.
$$('#np-subnav .stab').forEach(b => b.onclick = () => {
  activeSub = b.dataset.sub;
  try { localStorage.setItem(SUB_KEY, activeSub); } catch {}
  renderInputs();
});
$('#run-btn').onclick=runAll;
// Cash-flow drawer toggle. We render on open (and every Run while open).
$('#cf-btn').onclick=()=>{
  const d=$('#cf-drawer');
  const open = d.style.display === 'block';
  d.style.display = open ? 'none' : 'block';
  $('#cf-btn').textContent = open ? 'Show year-by-year cash flow ▾' : 'Hide cash flow ▴';
  if(!open) renderCashflow();
};

buildLevers();
renderSolvePanel();
renderInputs();
runAll();   // first iteration runs immediately so the tool opens populated
</script>
