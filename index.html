/* ── Init (bindings; runs after every render) ─────────────────── */

function initGoalsChapters() {
  const wrap = document.getElementById('gl-chapters');
  if (!wrap) return;
  const $id = (id) => document.getElementById(id);
  const bands = glcBands();
  const LO = bands[0].lo, HI = bands[2].hi, SPAN = Math.max(1, HI - LO);
  const d = glcDraft;

  /* ════ Composer ════ */

  const draftYears = () => Math.max(1, d.end - d.start + 1);
  const draftTotal = () => d.cadence === 'once' ? d.amount : d.amount * draftYears();
  const draftBands = () => d.cadence === 'once'
    ? [d.age < bands[0].lo ? 0 : d.age > bands[2].hi ? 2
       : bands.findIndex(b => d.age >= b.lo && d.age <= b.hi)]
    : bands.filter(b => Math.min(d.end, b.hi) >= Math.max(d.start, b.lo)).map(b => b.i);

  const bindCatChips = () => {
    wrap.querySelectorAll('.glc-cchip').forEach(el => el.onclick = () => { d.cat = el.dataset.cat; sync(); });
  };

  const sync = () => {
    // category chips (re-render both mounts, they carry per-cat inline styles)
    const ac = $id('glc-a-cats'), bc = $id('glc-b-cats');
    if (ac) ac.innerHTML = glcCatChipsHTML(d.cat, 30);
    if (bc) bc.innerHTML = glcCatChipsHTML(d.cat, 34);
    bindCatChips();
    // names + amounts (never clobber the focused field)
    const amtStr = d.amount > 0 ? d.amount.toLocaleString('en-US') : '';
    [['glc-a-name', d.name], ['glc-b-name', d.name]].forEach(([id, v]) => {
      const el = $id(id); if (el && document.activeElement !== el) el.value = v;
    });
    const aAmt = $id('glc-a-amount');
    if (aAmt && document.activeElement !== aAmt) aAmt.value = amtStr;
    const bAmt = $id('glc-b-amount'); if (bAmt) bAmt.textContent = amtStr || '0';
    // cadence segments (both composers)
    wrap.querySelectorAll('.glc-seg').forEach(el =>
      el.classList.toggle('glc-seg--on', el.dataset.cad === d.cadence));
    // A slider
    const h1 = $id('glc-a-h1'), h2 = $id('glc-a-h2'), fill = $id('glc-a-fill'), wl = $id('glc-a-when');
    if (h1) {
      if (d.cadence === 'once') {
        const p = (d.age - LO) / SPAN * 100;
        h1.style.left = p + '%'; h2.style.display = 'none';
        fill.style.left = p + '%'; fill.style.width = '0%';
        wl.textContent = 'Age ' + d.age;
      } else {
        const ps = (d.start - LO) / SPAN * 100, pe = (d.end - LO) / SPAN * 100;
        h1.style.left = ps + '%'; h2.style.display = 'block'; h2.style.left = pe + '%';
        fill.style.left = ps + '%'; fill.style.width = (pe - ps) + '%';
        wl.textContent = 'Ages ' + d.start + ' \u2013 ' + d.end;
      }
    }
    // totals
    const totalTxt = GLC_PROD.compact(draftTotal());
    const at = $id('glc-a-total'); if (at) at.textContent = totalTxt;
    const bt = $id('glc-b-total'); if (bt) bt.textContent = totalTxt;
    // A preview strip
    const pn = $id('glc-a-prev-name'); if (pn) pn.textContent = d.name.trim() || 'New goal';
    const ps2 = $id('glc-a-prev-sub');
    if (ps2) ps2.textContent = d.amount > 0
      ? (d.cadence === 'once'
          ? GLC_PROD.money(d.amount) + ' \u00b7 one-time \u00b7 age ' + d.age
          : GLC_PROD.money(d.amount) + ' /yr \u00b7 ages ' + d.start + '\u2013' + d.end)
      : (d.cadence === 'once' ? 'price later \u00b7 one-time \u00b7 age ' + d.age
                              : 'price later \u00b7 ages ' + d.start + '\u2013' + d.end);
    const ob = draftBands();
    const pc = $id('glc-a-prev-chapters');
    if (pc) pc.textContent = 'lands in Chapter' + (ob.length > 1 ? 's ' : ' ') +
      ob.map(i => bands[i].roman).join(' \u00b7 ');
    // B band chips / age stepper
    wrap.querySelectorAll('.glc-bband').forEach(el => {
      const on = el.dataset.bband === 'all'
        ? (d.cadence === 'yr' && d.start === LO && d.end === HI)
        : (d.cadence === 'yr' && ob.includes(+el.dataset.bband));
      el.classList.toggle('glc-bband--on', on);
    });
    const bandRow = $id('glc-b-bands'), ageRow = $id('glc-b-age-row');
    if (bandRow) bandRow.style.display = d.cadence === 'once' ? 'none' : 'flex';
    if (ageRow)  ageRow.style.display  = d.cadence === 'once' ? 'flex' : 'none';
    const ba = $id('glc-b-age'); if (ba) ba.textContent = d.age;
    // presets
    wrap.querySelectorAll('.glc-preset').forEach(el =>
      el.classList.toggle('glc-preset--on', +el.dataset.v === d.amount));
  };

  // mode switch
  wrap.querySelectorAll('.glc-csw').forEach(el => el.onclick = () => {
    glcMode = el.dataset.mode;
    wrap.querySelectorAll('.glc-csw').forEach(s => s.classList.toggle('glc-csw--on', s === el));
    const a = $id('glc-composer-a'), b = $id('glc-composer-b');
    if (a) a.style.display = glcMode === 'A' ? 'block' : 'none';
    if (b) b.style.display = glcMode === 'B' ? 'block' : 'none';
    sync();
  });

  // name / amount inputs
  ['glc-a-name', 'glc-b-name'].forEach(id => {
    const el = $id(id); if (!el) return;
    el.addEventListener('input', () => { d.name = el.value; sync(); });
  });
  const aAmt = $id('glc-a-amount');
  if (aAmt) {
    aAmt.addEventListener('input', () => {
      d.amount = parseInt(aAmt.value.replace(/[^0-9]/g, ''), 10) || 0; sync();
    });
    aAmt.addEventListener('blur', () => {
      aAmt.value = d.amount > 0 ? d.amount.toLocaleString('en-US') : '';
    });
  }
  // cadence segments
  wrap.querySelectorAll('.glc-seg').forEach(el => el.onclick = () => { d.cadence = el.dataset.cad; sync(); });
  // B amount stepper + presets
  const bMinus = $id('glc-b-minus'); if (bMinus) bMinus.onclick = () => { d.amount = Math.max(0, d.amount - 1000); sync(); };
  const bPlus  = $id('glc-b-plus');  if (bPlus)  bPlus.onclick  = () => { d.amount += 1000; sync(); };
  wrap.querySelectorAll('.glc-preset').forEach(el => el.onclick = () => { d.amount = +el.dataset.v; sync(); });
  // B band chips + age stepper
  wrap.querySelectorAll('.glc-bband').forEach(el => el.onclick = () => {
    d.cadence = 'yr';
    if (el.dataset.bband === 'all') { d.start = LO; d.end = HI; }
    else { const b = bands[+el.dataset.bband]; d.start = b.lo; d.end = b.hi; }
    sync();
  });
  const bAgeM = $id('glc-b-age-minus'); if (bAgeM) bAgeM.onclick = () => { d.age = Math.max(LO, d.age - 1); sync(); };
  const bAgeP = $id('glc-b-age-plus');  if (bAgeP) bAgeP.onclick = () => { d.age = Math.min(HI, d.age + 1); sync(); };

  // A range track
  const track = $id('glc-a-track');
  if (track) {
    const ageAt = x => {
      const r = track.getBoundingClientRect();
      const p = Math.max(0, Math.min(1, (x - r.left) / r.width));
      return Math.round(LO + p * SPAN);
    };
    let dragging = null;
    const move = e => {
      if (!dragging) return;
      const a = ageAt(e.clientX);
      if (d.cadence === 'once') d.age = a;
      else if (dragging === 'h1') d.start = Math.min(a, d.end);
      else d.end = Math.max(a, d.start);
      sync();
    };
    const up = () => { dragging = null; window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    const grab = which => e => { e.preventDefault(); dragging = which; window.addEventListener('pointermove', move); window.addEventListener('pointerup', up); };
    $id('glc-a-h1').addEventListener('pointerdown', grab('h1'));
    $id('glc-a-h2').addEventListener('pointerdown', grab('h2'));
    track.addEventListener('pointerdown', e => {
      if (e.target.classList.contains('glc-h')) return;
      const a = ageAt(e.clientX);
      if (d.cadence === 'once') d.age = a;
      else if (Math.abs(a - d.start) <= Math.abs(a - d.end)) d.start = Math.min(a, d.end);
      else d.end = Math.max(a, d.start);
      sync();
    });
  }

  // Add goal — one flat record; chapter rows derive on re-render
  const addGoal = () => {
    const goals = GLC_PROD.goals();
    const name  = d.name.trim() || 'New goal';
    const amt   = Math.max(0, Math.round(d.amount) || 0);
    const g = d.cadence === 'once'
      ? { name, amount: amt, area: d.cat, startAge: d.age,  endAge: d.age }
      : { name, amount: amt, area: d.cat, startAge: d.start, endAge: d.end };
    goals.push(g);
    glcFlashGi = goals.length - 1;
    glcRefocus = true;
    d.name = '';
    GLC_PROD.commit();
  };
  const aAdd = $id('glc-a-add'); if (aAdd) aAdd.onclick = addGoal;
  const bAdd = $id('glc-b-add'); if (bAdd) bAdd.onclick = addGoal;

  sync();
  if (glcRefocus) {
    glcRefocus = false;
    const el = $id(glcMode === 'A' ? 'glc-a-name' : 'glc-b-name');
    if (el) el.focus();
  }

  /* ════ Rows: hover isolation + inline editor ════ */

  // Hover isolates the hovered GOAL — all its slices across chapters stay
  // lit, every other goal's rows dim (per-goal, not per-category: rows of
  // the same flat goal highlight together).
  wrap.querySelectorAll('.glc-row').forEach(row => {
    row.addEventListener('mouseenter', () => {
      const gi = row.dataset.gi;
      wrap.querySelectorAll('.glc-row').forEach(o =>
        o.classList.toggle('glc-row--dim', o.dataset.gi !== gi));
    });
    row.addEventListener('mouseleave', () => {
      wrap.querySelectorAll('.glc-row').forEach(o => o.classList.remove('glc-row--dim'));
    });
  });

  let open = null;   // { row, gi, band, ed:{amt,cad,start,end,age}, dirty }

  const listBounds = row => {
    const l = row.closest('.glc-list');
    return { lo: +l.dataset.lo, hi: +l.dataset.hi };
  };

  // Live DOM recompute while editing (plan is written only on close)
  const liveRecompute = () => {
    if (!open) return;
    const gi = open.gi;
    wrap.querySelectorAll('.glc-row[data-gi="' + gi + '"]').forEach(r => {
      const isOpen = r === open.row;
      const once = (isOpen ? open.ed.cad : r.dataset.cad) === 'once';
      const years = isOpen
        ? (once ? 1 : Math.max(1, open.ed.end - open.ed.start + 1))
        : +r.dataset.years;
      const t = once ? open.ed.amt : open.ed.amt * years;
      r.dataset.liveTotal = String(t);
      const totEl = r.querySelector('.glc-row-total');
      if (totEl) totEl.textContent = open.ed.amt > 0 ? GLC_PROD.compact(t) : '\u2014';
      if (!isOpen) {
        const sub = r.querySelector('.glc-sub');
        if (sub) {
          const spanTxt = sub.textContent.split('\u00b7').slice(1).join('\u00b7').trim();
          sub.textContent = (open.ed.amt > 0 ? GLC_PROD.money(open.ed.amt) + ' /yr' : 'Price later') +
            (spanTxt ? ' \u00b7 ' + spanTxt : '');
        }
        // Collapse cue: switching this goal to one-time will consolidate it
        // into a single chapter on commit — dim its sibling slices meanwhile.
        r.classList.toggle('glc-row--dim', open.ed.cad === 'once');
      }
    });
    // chapter totals + lifetime percentages from row data
    const totals = [0, 0, 0];
    wrap.querySelectorAll('.glc-row').forEach(r => {
      const t = r.dataset.gi === String(gi)
        ? +(r.dataset.liveTotal || r.dataset.total)
        : +r.dataset.total;
      totals[+r.dataset.band] += t;
    });
    const lifetime = totals[0] + totals[1] + totals[2];
    wrap.querySelectorAll('.glc-total').forEach(el =>
      el.textContent = GLC_PROD.compact(totals[+el.dataset.band]));
    wrap.querySelectorAll('.glc-pct').forEach(el =>
      el.textContent = (lifetime ? Math.round(totals[+el.dataset.band] / lifetime * 100) : 0) +
        '% of lifetime goal spending');
  };

  const edLayout = () => {
    if (!open) return;
    const { lo, hi } = listBounds(open.row);
    const span = Math.max(1, hi - lo);
    const ed = open.row.querySelector('.glc-ed'); if (!ed) return;
    ed.querySelectorAll('.glc-ed-cad').forEach(el =>
      el.classList.toggle('glc-ed-cad--on', el.dataset.cad === open.ed.cad));
    const h1 = ed.querySelector('.glc-ed-h1'), h2 = ed.querySelector('.glc-ed-h2');
    const fill = ed.querySelector('.glc-ed-fill'), lbl = ed.querySelector('.glc-ed-when');
    if (open.ed.cad === 'once') {
      const a = open.ed.age;
      const p = (Math.max(lo, Math.min(hi, a)) - lo) / span * 100;
      h1.style.left = p + '%'; h2.style.display = 'none';
      fill.style.left = p + '%'; fill.style.width = '0%';
      lbl.textContent = 'age ' + a;
    } else {
      const s = open.ed.start, e = open.ed.end;
      const ps = (Math.max(lo, Math.min(hi, s)) - lo) / span * 100;
      const pe = (Math.max(lo, Math.min(hi, e)) - lo) / span * 100;
      h1.style.left = ps + '%'; h2.style.display = 'block'; h2.style.left = pe + '%';
      fill.style.left = ps + '%'; fill.style.width = Math.max(0, pe - ps) + '%';
      const n = e - s + 1;
      lbl.textContent = (s <= lo && e >= hi)
        ? 'ages ' + lo + '\u2013' + hi + ' \u00b7 all ' + n + ' years'
        : 'ages ' + s + '\u2013' + e + ' \u00b7 ' + n + ' years';
    }
  };

  /* Write the closed editor's draft back into the flat store.
     Amount + cadence apply to the whole goal; age edits move the goal's
     real edges where the slice edge IS the goal edge, and split the goal
     when an interior slice was narrowed. */
  const applyEdit = () => {
    const goals = GLC_PROD.goals();
    const g = goals[open.gi]; if (!g) return;
    const ed = open.ed;
    const amt = Math.max(0, Math.round(ed.amt) || 0);
    const band = bands[open.band];
    const wasOnce = +g.startAge === +g.endAge;

    if (ed.cad === 'once') {
      g.amount = amt; g.startAge = ed.age; g.endAge = ed.age;
    } else if (wasOnce) {
      g.amount = amt; g.startAge = ed.start; g.endAge = ed.end;
    } else {
      const sa = +g.startAge, ea = +g.endAge;
      const effLo = open.band === 0 ? -Infinity : band.lo;
      const effHi = open.band === 2 ?  Infinity : band.hi;
      const sliceLo = Math.max(sa, effLo), sliceHi = Math.min(ea, effHi);
      const segs = [];
      if (sa <= sliceLo - 1) segs.push([sa, sliceLo - 1]);
      segs.push([ed.start, ed.end]);
      if (ea >= sliceHi + 1) segs.push([sliceHi + 1, ea]);
      const merged = [];
      segs.forEach(sg => {
        const last = merged[merged.length - 1];
        if (last && last[1] + 1 >= sg[0]) last[1] = Math.max(last[1], sg[1]);
        else merged.push([sg[0], sg[1]]);
      });
      g.amount = amt; g.startAge = merged[0][0]; g.endAge = merged[0][1];
      for (let k = 1; k < merged.length; k++) {
        goals.splice(open.gi + k, 0,
          { name: g.name, amount: amt, area: g.area || null, startAge: merged[k][0], endAge: merged[k][1] });
      }
    }
    GLC_PROD.commit();   // full re-render; editor is gone with it
  };

  const closeEditor = (commit = true) => {
    if (!open) return;
    if (open.dirty) {
      if (commit) { applyEdit(); open = null; return; }
      // Cancel after live edits: the DOM has draft totals/subs/percentages
      // baked in — re-render from the (unchanged) store restores everything.
      open = null;
      GLC_PROD.rerender();
      return;
    }
    const ed = open.row.querySelector('.glc-ed'); if (ed) ed.remove();
    const sub = open.row.querySelector('.glc-sub'); if (sub) sub.style.display = '';
    open.row.classList.remove('glc-row--open');
    open = null;
  };

  const openEditor = row => {
    if (open && open.row === row) { closeEditor(); return; }
    closeEditor();
    const { lo, hi } = listBounds(row);
    const cad = row.dataset.cad;
    open = {
      row, gi: +row.dataset.gi, band: +row.dataset.band, dirty: false,
      ed: {
        amt: +row.dataset.amt, cad,
        start: +row.dataset.start, end: +row.dataset.end,
        age: +row.dataset.start,
      },
    };
    row.classList.add('glc-row--open');
    const sub = row.querySelector('.glc-sub');
    if (sub) sub.style.display = 'none';
    const amtVal = open.ed.amt > 0 ? open.ed.amt.toLocaleString('en-US') : '';
    row.querySelector('.glc-row-main').insertAdjacentHTML('beforeend', `
      <div class="glc-ed">
        <div class="glc-ed-row1">
          <div class="glc-ed-amt-wrap"><span class="glc-ed-dollar">$</span><input class="glc-ed-amt" value="${amtVal}" placeholder="price later"></div>
          <div class="glc-ed-cads">
            <span class="glc-ed-cad" data-cad="yr">/yr</span>
            <span class="glc-ed-cad" data-cad="once">one-time</span>
          </div>
          <span class="glc-ed-remove" title="Remove this goal from this chapter">REMOVE</span>
        </div>
        <div class="glc-ed-slider">
          <div class="glc-ed-track">
            <div class="glc-ed-rail"></div>
            <div class="glc-ed-fill"></div>
            <div class="glc-ed-h glc-ed-h1"></div>
            <div class="glc-ed-h glc-ed-h2"></div>
          </div>
          <div class="glc-ed-when"></div>
        </div>
      </div>`);
    const ed = row.querySelector('.glc-ed');
    ed.addEventListener('pointerdown', e => e.stopPropagation());
    ed.addEventListener('click', e => e.stopPropagation());

    const amtIn = ed.querySelector('.glc-ed-amt');
    amtIn.addEventListener('input', () => {
      if (!open) return;
      open.ed.amt = parseInt(amtIn.value.replace(/[^0-9]/g, ''), 10) || 0;
      open.dirty = true; liveRecompute();
    });
    // blur can fire AFTER a commit re-render detached this editor — guard.
    amtIn.addEventListener('blur', () => {
      if (!open) return;
      amtIn.value = open.ed.amt > 0 ? open.ed.amt.toLocaleString('en-US') : '';
    });
    // Enter commits, Escape cancels — bound on the editor container so it
    // works from any focused child, not only the amount input.
    ed.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); closeEditor(); }
      if (e.key === 'Escape') { e.preventDefault(); closeEditor(false); }
    });

    ed.querySelectorAll('.glc-ed-cad').forEach(el => el.addEventListener('click', () => {
      if (!open || open.ed.cad === el.dataset.cad) return;
      open.ed.cad = el.dataset.cad;
      if (el.dataset.cad === 'once') {
        // land the pin inside this chapter's band
        open.ed.age = Math.max(lo, Math.min(hi, open.ed.age || open.ed.start || lo));
      }
      if (el.dataset.cad === 'yr') {
        // converting a one-time (or a collapsed span) to recurring defaults
        // to this chapter's full band — a real span, never start===end
        if (!open.ed.start || !open.ed.end || open.ed.start === open.ed.end) {
          open.ed.start = lo; open.ed.end = hi;
        }
      }
      open.dirty = true; edLayout(); liveRecompute();
    }));

    ed.querySelector('.glc-ed-remove').addEventListener('click', () => {
      if (!open) return;
      const goals = GLC_PROD.goals();
      const g = goals[open.gi];
      if (!g) { open = null; GLC_PROD.commit(); return; }
      // Per-chapter removal: subtract ONLY this chapter's slice from the goal's
      // span (mirrors applyEdit's segment math). A one-time goal, or a recurring
      // goal that lives entirely inside this one chapter, is deleted outright;
      // otherwise the goal is trimmed to the remaining chapter(s) — and split in
      // two if the removed slice was interior (e.g. remove Ch. II from an I–III goal).
      const wasOnce = +g.startAge === +g.endAge;
      if (wasOnce) {
        goals.splice(open.gi, 1);
      } else {
        const sa = +g.startAge, ea = +g.endAge;
        const band = bands[open.band];
        const effLo = open.band === 0 ? -Infinity : band.lo;
        const effHi = open.band === 2 ?  Infinity : band.hi;
        const sliceLo = Math.max(sa, effLo), sliceHi = Math.min(ea, effHi);
        const segs = [];
        if (sa <= sliceLo - 1) segs.push([sa, sliceLo - 1]);   // remainder before this slice
        if (ea >= sliceHi + 1) segs.push([sliceHi + 1, ea]);   // remainder after this slice
        if (segs.length === 0) {
          goals.splice(open.gi, 1);                             // goal lived only in this chapter
        } else {
          g.startAge = segs[0][0]; g.endAge = segs[0][1];
          for (let k = 1; k < segs.length; k++) {
            goals.splice(open.gi + k, 0,
              { name: g.name, amount: g.amount, area: g.area || null, startAge: segs[k][0], endAge: segs[k][1] });
          }
        }
      }
      open = null;
      GLC_PROD.commit();
    });

    // band-clamped slider
    const trackEl = ed.querySelector('.glc-ed-track');
    const span = Math.max(1, hi - lo);
    const ageAt = x => {
      const r = trackEl.getBoundingClientRect();
      const p = Math.max(0, Math.min(1, (x - r.left) / r.width));
      return Math.round(lo + p * span);
    };
    let drag = null;
    const move = e => {
      if (!drag || !open) return;
      const a = ageAt(e.clientX);
      if (open.ed.cad === 'once') open.ed.age = a;
      else if (drag === 'h1') open.ed.start = Math.min(a, open.ed.end);
      else open.ed.end = Math.max(a, open.ed.start);
      open.dirty = true; edLayout(); liveRecompute();
    };
    const up = () => { drag = null; window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    const grab = which => e => { e.preventDefault(); e.stopPropagation(); drag = which; window.addEventListener('pointermove', move); window.addEventListener('pointerup', up); };
    ed.querySelector('.glc-ed-h1').addEventListener('pointerdown', grab('h1'));
    ed.querySelector('.glc-ed-h2').addEventListener('pointerdown', grab('h2'));
    trackEl.addEventListener('pointerdown', e => {
      if (!open || e.target.classList.contains('glc-ed-h')) return;
      e.preventDefault();   // keep focus inside the editor so Escape still cancels
      const a = ageAt(e.clientX);
      if (open.ed.cad === 'once') open.ed.age = a;
      else if (Math.abs(a - open.ed.start) <= Math.abs(a - open.ed.end)) open.ed.start = Math.min(a, open.ed.end);
      else open.ed.end = Math.max(a, open.ed.start);
      open.dirty = true; edLayout(); liveRecompute();
    });

    edLayout();
    amtIn.focus();
  };

  // One document-level handler (rebound each render so re-renders never stack listeners)
  if (glcDocDown) document.removeEventListener('pointerdown', glcDocDown);
  glcDocDown = e => {
    const w = document.getElementById('gl-chapters');
    if (!w) { document.removeEventListener('pointerdown', glcDocDown); glcDocDown = null; return; }
    if (!e.target.closest) return;
    if (e.target.closest('.glc-ed')) return;
    const row = e.target.closest('.glc-row');
    if (row && w.contains(row)) { openEditor(row); return; }
    closeEditor();
  };
  document.addEventListener('pointerdown', glcDocDown);
}

/* ── Sub-page render + wiring ─────────────────────────────────────
   One renderInputs() drives whichever sub-page is active. Re-renders on
   sub-nav click, on field change, and on row delete — same wiring pattern
   as before so live-commas / scenario re-seeding / plansDirty all still
   work without per-layout duplication. */
function renderInputs(){
  // sub-nav active state
  $$('#np-subnav .stab').forEach(b => b.classList.toggle('on', b.dataset.sub===activeSub));
  const layout = SUB_PAGES[activeSub].layout;
  const np = $('#np-content');
  // Snapshot is its own diagnostic page again — embedding it on the Net Worth
  // page made that page too busy to read.
  const html = layout==='snapshot'  ? `<div class="np-snapshot-page">${renderSnapshot()}</div>`
             : layout==='goals'     ? renderGoalsChapters()  // Life Chapters view
             :                        renderHybrid(activeSub);
  np.innerHTML = html;
  if(layout==='goals') initGoalsChapters();
}
// ── Net Worth input bindings — delegated on the stable #np-content ────────────
// Input listeners are set once here so re-renders via renderInputs() (which
// replaces #np-content children) never accumulate orphaned listeners.

// ── All Net Worth interactions — delegated on the stable #np-content ─────────
$('#np-content').addEventListener('click', e => {
  // (The old Map / Net-Worth toggle was retired with the Household editor.)
  // Row delete (×)
  const rx = e.target.closest('.row-x');
  if(rx){
    const path = rx.dataset.rmpath;
    const ks = path.split('.'); const last = ks.pop();
    let t = plan; for(const k of ks){ if(t==null) return; t=t[k]; }
    // Array rows splice (no holes); object keys delete.
    if(Array.isArray(t)) t.splice(+last, 1);
    else if(t!=null) delete t[last];
    reseedScenarios(); buildLevers();
    sharedPaths = null; plansDirty = true;
    renderInputs();
    $('#status').textContent='Plan edited · open Scenarios';
    return;
  }
  // "+ add …" — push a default row onto the backing array, then re-render.
  const adder = e.target.closest('[data-add]');
  if(adder){
    const kind = adder.dataset.add;
    const k = ROW_KINDS[kind];
    if(k){
      const arr = getPath(plan, k.arr);
      if(Array.isArray(arr)) arr.push(k.mk());
      else setPath(plan, k.arr, [k.mk()]);
      commitPlanEdit();
    }
    return;
  }
  // Account type chip
  const chip = e.target.closest('.acct-chip');
  if(chip){
    acctSel = { label: chip.dataset.label, bucket: chip.dataset.bucket };
    $$('#np-content .acct-chip').forEach(c => c.classList.toggle('sel', c === chip));
    const btn = $('#np-content .acct-add');
    if(btn){ btn.disabled = false; btn.textContent = 'Add ' + acctSel.label; }
    return;
  }
  if(e.target.closest('.acct-add')){
    if(!acctSel) return;
    const amtEl = $('#np-content .acct-amt');
    const bal = parseFloat(String(amtEl ? amtEl.value : '').replace(/[^0-9.]/g, ''));
    if(!isFinite(bal) || bal <= 0){
      if(amtEl){ amtEl.focus(); amtEl.style.outline='2px solid var(--negative)'; setTimeout(()=>amtEl.style.outline='',1500); }
      return;
    }
    if(!plan.portfolio.extraAccounts) plan.portfolio.extraAccounts = [];
    plan.portfolio.extraAccounts.push({ type: acctSel.label, bucket: acctSel.bucket, balance: Math.round(bal) });
    acctSel = null;
    commitPlanEdit();
    return;
  }
  const rm = e.target.closest('.acct-x');
  if(rm){
    const i = +rm.dataset.acctidx;
    if(plan.portfolio.extraAccounts) plan.portfolio.extraAccounts.splice(i, 1);
    commitPlanEdit();
  }
});
// Live commas on money fields.
$('#np-content').addEventListener('input', e => {
  if(e.target.dataset.type === 'money' || e.target.dataset.type === 'monthlyMoney') liveCommas(e.target);
});
$('#np-content').addEventListener('change', e => {
  // Field edits (data-path bindings)
  const path = e.target.dataset.path, type = e.target.dataset.type;
  if(path){
    const raw = e.target.value;
    if(type==='text' || type==='strategy'){            // free-text row labels or select values
      setPath(plan, path, raw);
      reseedScenarios(); buildLevers(); sharedPaths=null; plansDirty=true; renderInputs();
      $('#status').textContent='Plan edited · open Scenarios';
      return;
    }
    let v;
    if(type==='money' || type==='monthlyMoney') v = parseFloat(String(raw).replace(/[^0-9.]/g,''));
    else if(type==='risk')  v = +raw;
    else                    v = parseFloat(raw);
    // Blanking a goal amount returns the goal to unpriced ($0 is engine-inert).
    if(!isFinite(v)){
      if(type==='money' && String(raw).trim()==='' && /^goals\.\d+\.amount$/.test(path)) v=0;
      else return;
    }
    if(type==='pct')   v = Math.max(0, Math.min(100, v))/100;
    if(type==='gpct')  v = Math.max(-20, Math.min(20, v))/100;   // signed growth %/yr
    if(type==='money'){ v = Math.max(0, Math.round(v)); e.target.value = v.toLocaleString('en-US'); }
    if(type==='monthlyMoney'){
      const monthly = Math.max(0, Math.round(v));
      v = monthly * 12;
      e.target.value = monthly.toLocaleString('en-US');
    }
    if(type==='num') v = Math.max(1, Math.round(v));
    setPath(plan, path, v);
    // A one-time goal edits a single "at age": mirror it into endAge so the
    // engine's window is exactly that year.
    if(e.target.dataset.sync) setPath(plan, e.target.dataset.sync, v);
    reseedScenarios();
    buildLevers();
    sharedPaths = null;
    plansDirty = true;
    renderInputs();
    $('#status').textContent='Plan edited · open Scenarios';
    return;
  }
  // Extra-account balance edit
  const bal = e.target.closest('.acct-bal');
  if(!bal) return;
  const i = +bal.dataset.acctidx;
  const v = Math.max(0, Math.round(parseFloat(String(bal.value).replace(/[^0-9.]/g, '')) || 0));
  if(plan.portfolio.extraAccounts && plan.portfolio.extraAccounts[i]){
    plan.portfolio.extraAccounts[i].balance = v;
    commitPlanEdit();
  }
});

  if(type==='monthlyMoney'){ const m = Math.max(0, Math.round(v)); v = m*12; e.target.value = m.toLocaleString('en-US'); }
  if(type==='num')  v = Math.max(1, Math.round(v));

  if(type==='birthYear'){

  if(/^properties\.[01]\./.test(path)){

    while(plan.properties.length <= idx){
      plan.properties.push({ name: plan.properties.length === 0 ? 'Primary home' : 'Other property',
        value: 0, purchasePrice: 0, mortgage: { balance: 0, rate: 0, termYears: 0 } });

// Pension slider range is PER-HOUSEHOLD: it spans only the ages the advisor has
// actually quoted a benefit for (the keys of benefitByAge). This means the
// slider can never wander onto an age with no number — so it can't silently pay
// $0. Enter a new quote (e.g. age 67) and the slider grows to include it on the
// next render. Falls back to a sane window if nothing is entered yet.
function pensionAges(){
  const m=(plan.income.pension && plan.income.pension.benefitByAge) || {};
  return Object.keys(m).map(Number).filter(n=>!isNaN(n)).sort((a,b)=>a-b);
}
// Effective slider range for a lever. Pension is dynamic; everything else is
// the static min/max declared in LEVCFG.
function levRange(cfg){
  if(cfg.key==='pensionAge'){
    const a=pensionAges();
    if(a.length) return { min:a[0], max:a[a.length-1], step:1 };
    return { min:62, max:65, step:1 };
  }
  // Sale lever: min = currentAge−1 (the "Keep" / off state), max = plan end.
  if(cfg.key==='sellAge'){
    const c=plan.household.primary.currentAge, e=plan.household.primary.planEndAge;
    return { min:c-1, max:e, step:1 };
  }
  return { min:cfg.min, max:cfg.max, step:cfg.step };
}

/* ── lever display config (label, formatter, slider range→value & back) ── */
const LEVCFG=[
  {key:'retireAge', name:'Retirement Age', min:55,max:72,step:1, fmt:v=>[v,'']},
  {key:'ssAge',     name:'SS Start Age',   min:62,max:70,step:1, fmt:v=>[v,'']},
  // All dollar levers render full digits with comma grouping — no abbreviations.
  // The advisor wants to see the exact number they're proposing, not a rounded
  // shorthand. Step values stay round so the slider snaps cleanly.
  // Spending is stored ANNUAL (the engine's unit) but shown/edited MONTHLY —
  // clients know their monthly number off-hand. edit:'monthly' wires the box.
  {key:'spend',     name:'Lifestyle Spending',min:80000,max:360000,step:1200, edit:'monthly', fmt:v=>['$'+Math.round(v/12).toLocaleString('en-US'),'/mo']},
  // One-time event carries BOTH an amount and an age; edit:'event' renders the
  // two type-in boxes (amount + age) alongside the amount slider.
  {key:'eventAmt',  name:'One-Time Event', min:0,max:500000,step:5000, edit:'event', fmt:(v,L)=>['$'+(v||0).toLocaleString('en-US'),'@ '+L.eventAge]},
  {key:'risk',      name:'Allocation',     min:1,max:5,step:1, fmt:v=>[RISK_LABELS[v],'']},
  {key:'savings',   name:'Savings / yr',   min:0,max:200000,step:1000, edit:'money', fmt:v=>['$'+v.toLocaleString('en-US'),'/yr']},
  // Pension snaps between the ages that actually have entered amounts (62, 65).
  // Label shows the dollar value the engine will pay for that age — if no entry
  // exists for that age, it shows "—" (and the engine pays 0).
  // Pension claim age. Range spans the realistic window; the displayed dollar
  // amount comes from whatever the advisor has entered for that exact age.
  // No entry yet → the value spot becomes an inline input (handled in
  // renderLevValue, not here). This is the truth-source contract surfacing
  // naturally as a UI affordance: "we don't have a number for this age, give
  // us one." Not an error — just the next input.
  {key:'pensionAge', name:'Pension',       min:55,max:70,step:1, fmt:v=>{
    const m=(plan.income.pension && plan.income.pension.benefitByAge) || {};

// discrete stepper: "Keep" (off) → a sale age. Net proceeds (value − mortgage −

let running=false;
const PATH_KEY='parallax.pathReplay.v1';
const DEFAULT_PATH_SEED=20260609;
let pathReplay = (()=> {
  try{
    const saved = JSON.parse(localStorage.getItem(PATH_KEY)||'{}');
    return {
      mode: ['typical','stressed','favorable','failed','lowest-survivor','choose'].includes(saved.mode) ? saved.mode : 'typical',
      index: Math.max(0, parseInt(saved.index,10) || 0),
      seed: Math.max(1, parseInt(saved.seed,10) || DEFAULT_PATH_SEED)
    };
  }catch{
    return { mode:'typical', index:0, seed:DEFAULT_PATH_SEED };
  }
})();
function savePathReplay(){
  try{ localStorage.setItem(PATH_KEY, JSON.stringify(pathReplay)); }catch{}
}
// Cached market bundle. Generated once, reused across Runs so that hitting Run
// twice with no changes yields the EXACT same numbers (sampling noise was
// causing the % to drift between identical clicks). Invalidated to null
// whenever the plan changes in the Inputs tab.
let sharedPaths=null;

/* ── run the engine for all three columns (shared nothing; each its own MC) ── */
// ONE seeded bundle of return paths, shared by every surface that compares
// runs (scenario columns, the goals page's per-goal cost runs). Identical
// markets across runs make any difference a pure decision-effect, and the
// fixed seed keeps an unchanged plan at an identical % between Runs.
function ensureSharedPaths(){
  const horizon = plan.household.primary.planEndAge - plan.household.primary.currentAge;
  if(!(horizon > 0)) return null;
  const iters = plan.simulation.iterations;
  if(!sharedPaths || sharedPaths.length !== iters || sharedPaths[0].length !== horizon){
    resetSeed(pathReplay.seed);
    sharedPaths = [];
    for(let i=0;i<iters;i++) sharedPaths.push(generateReturnPath(horizon));
  }
  return sharedPaths;
}
/* ── Historical Stress (Focus rail) ───────────────────────────────────────
   Five canonical sequence-of-returns eras (design handoff → Focus → Historical
   Stress). Each scenario is sequenced through an era the SAME way the
   Sequencing tab does it: stand the household at its retirement age with the
   median projected balance (retireNowClone), then replay the real historical
   series from that start year (the engine WRAPS past 2025 so recent eras still
   get a full retirement horizon). `y` is the real start year fed to the engine;
   `year` is the display label — the late-70s high-inflation shock is shown as
   the decade "1970s" but sequenced from a concrete 1977 start. */
const STRESS_ERAS = [
  { y: 1966, year: '1966',  name: 'Stagflation' },
  { y: 1973, year: '1973',  name: 'Oil shock' },
  { y: 2000, year: '2000',  name: 'Dot-com' },
  { y: 2008, year: '2008',  name: 'Global Financial Crisis' },
  { y: 1977, year: '1970s', name: 'High inflation' },
];
// Pass vs Marginal for ONE historical sequence — fully engine-derived (Engine
// Truth: the card never invents an outcome). Pass = the plan funded the entire
// horizon (never depleted) AND cleared the sequence-risk window with non-negative
// real growth across the first retirement decade, where sequence risk lives.
// A depletion or a negative first decade reads as Marginal; the design has no
// "Fail" tier, so Marginal is the most severe state the card shows.
function eraPasses(h){
  if(!h || h.failed) return false;
  if(h.first10Supports === false) return false;
  return true;
}
// Sequence one scenario (plan clone + overrides) through every era. Reuses the
// scenario's freshly-computed envelope so the retirement entry balance matches
// the Scenarios / Sequencing tabs exactly (one shared-path truth, not a re-roll).
function computeHistoricalStress(s, p, ov){
  const curAge     = plan.household.primary.currentAge;
  const retAge     = (s.lev.retireAge != null) ? s.lev.retireAge : p.household.primary.retirementAge;
  const accumYears = Math.max(0, retAge - curAge);
  const rp    = retireNowClone(p, ov, curAge, retAge, accumYears, s.res && s.res.envelope);
  // Guard: ensure rp has a valid risk profile so resolveInputs doesn't throw on
  // RISK_PROFILES[undefined].eq. A stale localStorage save can carry an invalid
  // risk lever; fall back to the base plan's profile (or Moderate = 3).
  if (!RISK_PROFILES[rp.portfolio.riskProfile]) {
    rp.portfolio.riskProfile = (p.portfolio.riskProfile in RISK_PROFILES)
      ? p.portfolio.riskProfile : 3;
  }
  const strat = normalizePlaybackStrategy(p.portfolio.withdrawalStrategy);
  const ov2   = { ...ov, retireDelay: 0 };   // retirement age is baked into the clone
  // Wrap each era individually: a single failing era must not blank the whole card.
  // null entries are filtered out; if any eras succeed the card renders those rows.
  const results = STRESS_ERAS.map(e => {
    try {
      const h = runHistoricalPath(rp, e.y, strat, undefined, ov2);
      return { year: e.year, name: e.name, pass: eraPasses(h) };
    } catch (_) {
      return null;
    }
  }).filter(Boolean);
  return results;
}
function runAll(){
  if(running) return; running=true;
  const btn=$('#run-btn'); btn.disabled=true; $('#status').textContent='Running…';
  setTimeout(()=>{
    try{
      // SHARED PATHS: one bundle of return paths, reused across scenarios AND
      // across Runs. Within a Run, every column sees the SAME markets (any
      // difference between columns is the DECISION). Across Runs, the bundle
      // is cached so identical inputs give an identical % — no noise drift.
      const horizon = plan.household.primary.planEndAge - plan.household.primary.currentAge;
      const iters = plan.simulation.iterations;
      // Degenerate plan guard: a non-positive horizon (plan-end age at/below
      // current age) can't be simulated. Surface a clear reason and bail
      // WITHOUT nuking the last good results, so the views don't go blank.
      if(!(horizon > 0)){
        $('#status').textContent='Check plan: end age must be after current age';
        btn.disabled=false; running=false; return;
      }
      ensureSharedPaths();
      // Isolate each scenario: one bad column (e.g. an out-of-range saved lever)
      // must not abort the whole Run and blank every other column + the cash
      // flow drawer. Failed scenarios get res=null and are skipped downstream.
      let failed=0;
      const baseTaxYear = new Date().getFullYear();
      scenarios.forEach(s=>{
        try{
          const p=planForScenario(s.lev);
          const ov=leversToOverrides(s.lev);
          s.res=runSimulation(p, ov, sharedPaths);
          // Sidecar: real 1040 on median path only — compare vs engine shortcut; no UI yet.
          try{
            s.res.typicalPathFederalTax = attachTypicalPathFederalTax(s.res, {
              baseTaxYear,
              scenarioId: s.name,
            });
          }catch(taxErr){
            s.res.typicalPathFederalTax = null;
            console.warn('Federal tax attach failed:', s.name, taxErr);
          }
          // Historical Stress (Focus rail): engine-derived per-scenario eras.
          // Isolated so a stress hiccup never blanks the scenario's main result.
          try{ s.res.stress = computeHistoricalStress(s, p, ov); }
          catch(stressErr){ s.res.stress = []; console.warn('Historical stress failed:', s.name, stressErr); }
        }catch(err){ s.res=null; failed++; console.error('Scenario failed:', s.name, err); }
      });
      renderSolvePanel(); buildSeqSelect(); runSeq();
      if(window.ScenariosUI) window.ScenariosUI.sync();   // one authoritative Scenarios renderer
      $('#status').textContent = failed ? `Complete · ${failed} scenario${failed>1?'s':''} could not run` : 'Complete';
    }catch(e){ $('#status').textContent='Error'; console.error(e); }
    btn.disabled=false; running=false;
  },20);
}

// The old success-ring band helpers (cssToken / ringColor / ring(pct)) were
// removed with renderBand and the cf-mode sidebar. The ScenariosUI view layer
// draws its own rings (size + probability-tone passed in) — see ring() there.
// The band / levers / foot are CSS grids whose column count must match the
// number of scenarios. One place sets it (label gutter + N equal columns) so
// adding/removing a scenario reflows all three rows together.
function syncGridCols(){
  const tpl=`292px repeat(${scenarios.length},minmax(0,1fr))`;
  ['#scn-band','#scn-levers','#scn-goals','#scn-tax','#scn-foot'].forEach(sel=>{
    const el=$(sel); if(el) el.style.gridTemplateColumns=tpl;

// REMOVED renderBand (the old success-ring band). The Compare and Focus views in
// the ScenariosUI view layer render the per-scenario success ring, median, and
// Δ-vs-baseline directly from engine results (s.res.successRate / envelope).

/* ── render: lever grid (built once, values update in place) ── */
// Format a single lever value into the inner HTML for its display span.
// Neutral delta-vs-baseline chip — the COMPARISON cue (Scenarios = compare
// choices). No good/bad coloring: later retirement isn't "better," it's a
// trade-off, so the chip stays a muted, opinion-free tone. Empty on the
// baseline column and wherever a lever matches baseline.
function levDelta(cfg, lev){
  const baseLev = scenarios.find(s=>s.base)?.lev;
  if(!baseLev || lev===baseLev) return '';
  // The sale lever's "delta" isn't a year count (Keep→age 72 isn't "+8 yr"); the
  // value text ("Keep" vs "age 72") already reads the difference. Skip the pill.
  if(cfg.key==='sellAge') return '';
  const d = (lev[cfg.key]||0) - (baseLev[cfg.key]||0);
  if(!d) return '';
  const sign = d>0 ? '+' : '−', a = Math.abs(d);
  let txt;
  if(cfg.key==='spend')                 txt = `${sign}$${Math.round(a/12).toLocaleString('en-US')}/mo`;
  else if(cfg.key==='savings' || cfg.key==='eventAmt') txt = `${sign}$${a.toLocaleString('en-US')}`;
  else if(cfg.key==='risk')             txt = `${sign}${a} lvl`;
  else /* ages */                       txt = `${sign}${a} yr`;
  return `<span class="lev-delta">${txt}</span>`;
}
// Stepper buttons for the discrete levers (ages / allocation). The
// click handler derives the column from the enclosing #lv-… span, so the
// buttons only carry key + direction. ml:auto pins them right when there's no
// delta chip to do it.
function stepper(cfg, pinRight){
  return `<span class="lev-step"${pinRight?' style="margin-left:auto"':''}>`
       + `<button class="step-btn" data-dir="-1" data-key="${cfg.key}" tabindex="-1">−</button>`
       + `<button class="step-btn" data-dir="1" data-key="${cfg.key}" tabindex="-1">+</button></span>`;
}
function renderLevValue(cfg, lev){
  const [val,unit]=cfg.fmt(lev[cfg.key], lev);
  if(val==='__needs__'){
    return `$<input class="pen-in" type="text" inputmode="numeric" data-pen-age="${unit}"> <span class="unit">@ ${unit}</span>${stepper(cfg,true)}`;
  }
  const d = levDelta(cfg, lev);
  // Type-in boxes for the dollar/age levers. The box edits the same value the
  // slider drives — both stay in sync. data-edit tells the input handler how to
  // interpret the typed number (monthly→annual, plain money, or event age).
  if(cfg.edit==='monthly'){
    const mo=Math.round(lev[cfg.key]/12);
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="monthly" data-key="${cfg.key}" value="${mo.toLocaleString('en-US')}"> <span class="unit">/mo</span>${d}`;
  }
  if(cfg.edit==='money'){
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="money" data-key="${cfg.key}" value="${(lev[cfg.key]||0).toLocaleString('en-US')}"> <span class="unit">${unit}</span>${d}`;
  }
  if(cfg.edit==='event'){
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="eventAmt" data-key="eventAmt" value="${(lev.eventAmt||0).toLocaleString('en-US')}">`
         + ` <span class="unit">@ age</span> `
         + `<input class="lev-in age-in" type="text" inputmode="numeric" data-edit="eventAge" data-key="eventAge" value="${lev.eventAge}">${d}`;
  }
  // Discrete levers (ages / allocation): value + delta + stepper buttons.
  return `${val}${unit?` <span class="unit">${unit}</span>`:''}${d}${stepper(cfg, !d)}`;
}
// A lever is "dollar" (keeps a draggable slider) when it has an edit type;
// the discrete levers (ages / allocation / pension) use steppers + a static bar.
const isDollarLever = cfg => !!cfg.edit;
// Where the value sits inside its range, 0–100% — drives both the slider fill
// and the static bar fill/dot so every bar reads the same way down a row.
function barFillPct(cfg, L){
  const r=levRange(cfg), v=Math.max(r.min,Math.min(r.max,L[cfg.key]||r.min));
  return r.max>r.min ? ((v-r.min)/(r.max-r.min))*100 : 0;
}
// Refresh one cell in place after its value changed: value text + the bar
// (slider position+fill for dollar levers, fill+dot for discrete ones).
function updateCell(ci, cfg){
  const L=scenarios[ci].lev, span=$(`#lv-${ci}-${cfg.key}`); if(!span) return;
  span.innerHTML=renderLevValue(cfg, L);
  const pct=barFillPct(cfg,L), cell=span.parentElement;
  const sl=cell.querySelector('.lev-slider');
  if(sl){ const r=levRange(cfg); sl.value=Math.max(r.min,Math.min(r.max,L[cfg.key])); sl.style.setProperty('--fill',pct+'%'); }
}
// Commit a lever change: editing the baseline shifts every other column's
// delta, so rebuild the whole grid then; otherwise just refresh the one cell.
function commitLever(ci, cfg){
  if(scenarios[ci].base) buildLevers(); else updateCell(ci, cfg);
  $('#status').textContent='Adjusted · Run to update';
  saveScenarios();
}
// Small line-icons for the lever rail, keyed by lever. Inline SVG (currentColor)
// so they tint with the rail's muted ink. Purely decorative — labels still carry
// the meaning. Matched to lever key with a name-based fallback.
function levIcon(cfg){
  const k=cfg.key||'', n=(cfg.name||'').toLowerCase();
  const I={
    retireAge:'<circle cx="8" cy="4.6" r="2.6"/><path d="M2.5 14c0-3 2.5-5 5.5-5s5.5 2 5.5 5"/>',
    ssAge:'<path d="M8 1.5l5 2v4c0 3.2-2.2 5.6-5 6.5C5.2 13.1 3 10.7 3 7.5v-4z"/>',
    spend:'<rect x="2" y="3.5" width="12" height="9" rx="1.4"/><path d="M2 6.5h12"/>',
    event:'<circle cx="8" cy="8" r="6"/><path d="M8 4.5V8l2.5 1.6"/>',
    risk:'<circle cx="8" cy="8" r="6"/><path d="M8 8l3.2-2.2"/><circle cx="8" cy="8" r="1.1" fill="currentColor" stroke="none"/>',
    savings:'<path d="M2.5 6.5L8 2.5l5.5 4"/><path d="M3.5 6.5v7h9v-7"/><path d="M6.5 13.5v-3h3v3"/>',
    pension:'<path d="M2.5 6L8 2.5 13.5 6"/><path d="M3.5 13.5h9"/><path d="M5 6.5v6M8 6.5v6M11 6.5v6"/>',
  };
  let p=I[k];
  if(!p){ if(/spend|lifestyle/.test(n))p=I.spend; else if(/sav/.test(n))p=I.savings;
    else if(/pension/.test(n))p=I.pension; else if(/alloc/.test(n))p=I.risk;
    else if(/event|once|one-?time/.test(n))p=I.event; else if(/ss|social/.test(n))p=I.ssAge;
    else p=I.retireAge; }
  return `<span class="lev-ic" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">${p}</svg></span>`;
}
function buildLevers(){
  // PRESERVED richer lever editor. Unmounted in the current Scenarios redesign
  // (the Focus steppers are the live editor). Still invoked by Household/base-plan
  // edits and the solver; guarded so it cleanly no-ops while #scn-levers is absent,
  // and rebuilds the full slider/type-in grid the moment that markup is restored.
  if(!$('#scn-levers')) return;
  syncGridCols();
  let h='';
  LEVCFG.forEach((cfg,ri)=>{
    const rowCls = ri % 2 ? ' row-alt' : '';
    h+=`<div class="lev-name${rowCls}">${levIcon(cfg)}<span>${escHtml(cfg.name)}</span></div>`;
    const r=levRange(cfg);
    scenarios.forEach((s,ci)=>{

      const pct=barFillPct(cfg,s.lev);
      const bar = isDollarLever(cfg)
        ? `<input class="lev-slider ${s.base?'base-lock':''}" type="range" min="${r.min}" max="${r.max}" step="${r.step}"
                 value="${Math.max(r.min,Math.min(r.max,s.lev[cfg.key]))}" data-col="${ci}" data-key="${cfg.key}" style="--fill:${pct}%">`
        : '';
      h+=`<div class="lev-cell${rowCls} ${s.base?'base':''} ${last}">
        <span class="lev-val ${s.base?'base':''}" id="lv-${ci}-${cfg.key}">${renderLevValue(cfg,s.lev)}</span>

// Goals section — READ-ONLY mirror of the base-plan goals across every column.
// Goals live in the base plan (single source of truth); each scenario carries
// the same set, so the value is identical down each row. That sameness IS the
// truth — the goal is funded in every scenario. Edited only on the Goals page.
function renderScenGoals(){
  const host=$('#scn-goals'); if(!host) return;
  syncGridCols();
  const goals=(Array.isArray(plan.goals)?plan.goals:[]).filter(g=>(g.amount||0)>0);
  // Section header row: an accent "Goals" label in the gutter + a tinted header
  // cell per column so the section reads as a block under the levers.
  let h=`<div class="sg-head">Goals</div>`;
  scenarios.forEach(s=>{ h+=`<div class="sg-head sg-col ${s.base?'base':''}"></div>`; });
  if(!goals.length){
    h+=`<div class="sg-empty">No goals yet — add them on the Goals page to see them here.</div>`;
    host.innerHTML=h; return;
  }
  // One row per goal: name + age window in the gutter, the amount mirrored in
  // every scenario column (recurring → /yr, single-year window → one-time).
  let totRec=0, totOnce=0;
  goals.forEach((g,gi)=>{
    const rowCls = gi % 2 ? ' row-alt' : '';
    const once=(g.startAge===g.endAge);
    const win = once ? `at age ${g.startAge}` : `age ${g.startAge}–${g.endAge}`;
    const tag = once ? 'one-time' : '/yr';
    if(once) totOnce+=(g.amount||0); else totRec+=(g.amount||0);
    h+=`<div class="sg-name${rowCls}">${escHtml(g.name||'Goal')}<span class="sg-win">${win}</span></div>`;
    scenarios.forEach(s=>{
      h+=`<div class="sg-cell${rowCls} ${s.base?'base':''}">$${(g.amount||0).toLocaleString('en-US')}<span class="sg-tag">${tag}</span></div>`;
    });
  });
  // Total row: recurring annual goal spend (the steady draw), with any one-time
  // total noted alongside so a single spike isn't hidden inside the annual line.
  const totTxt = `$${totRec.toLocaleString('en-US')}`
    + (totOnce>0 ? ` <span class="sg-tag">+ $${totOnce.toLocaleString('en-US')} one-time</span>` : '');
  h+=`<div class="sg-total">Annual goal spend</div>`;
  scenarios.forEach(s=>{ h+=`<div class="sg-tcell ${s.base?'base':''}">${totTxt}</div>`; });
  host.innerHTML=h;
}

// Solver panel: Cancel (form), Clear (results), and per-lever "Load" actions.
document.addEventListener('click', e=>{

    solverFormOpen = false; renderSolvePanel(); return;
  }
  if(e.target.closest('#solve-clear-btn')){
    solverResults = null; solverSearching = false;
    comboResults = null; comboOpen = false; comboSearching = false;
    renderSolvePanel(); return;
  }
  // Fold-down: open runs the (heavy) combo search once and caches it; toggle off
  // just collapses. The cache is reused on re-open until the solo solve changes.
  if(e.target.closest('#combo-toggle')){
    comboOpen = !comboOpen;
    if(comboOpen && !comboResults && !comboSearching) runComboSolve();  // renders itself
    else renderSolvePanel();
    return;
  }
  const loadBtn = e.target.closest('.solve-load');
  if(loadBtn && solverResults && solverResults.rows){
    if(scenarios.length >= MAX_SCENARIOS) return;
    const idx = +loadBtn.dataset.soloIdx;
    const row = solverResults.rows[idx];
    if(!row) return;
    // Scenario = the pinned soloBase with this one lever set to its solo answer.
    const lev = JSON.parse(JSON.stringify(solverResults.soloBase));
    lev[row.key] = row.value;
    syncPension(lev);
    const cfg = LEVCFG.find(c=>c.key===row.key);
    scenarios.push({ name: `${cfg.name} solve`, base:false, lev, res:null });
    solverResults = null; solverSearching = false;
    comboResults = null; comboOpen = false;
    saveScenarios(); renderSolvePanel(); plansDirty=true; runAll();
  }
  // Load a COMBO: the held-fixed soloBase with both lever moves applied.
  const cLoadBtn = e.target.closest('.cc-load');
  if(cLoadBtn && comboResults && comboResults.combos){
    if(scenarios.length >= MAX_SCENARIOS) return;
    const c = comboResults.combos[+cLoadBtn.dataset.comboIdx];
    if(!c) return;
    const lev = JSON.parse(JSON.stringify(comboResults.soloBase));
    c.items.forEach(m => lev[m.key] = m.val);
    syncPension(lev);
    const nm = comboResults.goalType==='retire' ? `Retire ${comboResults.params.age}`
             : c.items.map(m=>COMBO_SHORT[m.key]).join(' + ');
    scenarios.push({ name: nm.slice(0,28), base:false, lev, res:null });
    solverResults = null; solverSearching = false;
    comboResults = null; comboOpen = false;
    saveScenarios(); renderSolvePanel(); plansDirty=true; runAll();
  }
});

// REMOVED old scenario-grid renderers: renderFoot (median-end row) and the
// Engine-tax-vs-Federal-tax diagnostic (renderTaxCell / renderTaxCompare /
// federalTaxByAge). The redesign shows median inline in Compare/Focus, and the

// layer — no engine-vs-federal diagnostic. The s.res.typicalPathFederalTax
// sidecar is untouched (still attached in runAll) and read directly by the view.

/* ── chart helpers ── */
// Chart axis colors, matched to the light-theme tokens (--rule-faint / --ink-faint).
const GRID='rgba(231,222,201,.10)', AXIS_INK='#878e96';
/* ── Cash-flow drawer ────────────────────────────────────────────────────
   Each scenario's res.paths.p50 is the "typical" coherent simulated path —
   the engine picks the sim that tracks the year-by-year median envelope
   most closely. Its .rows array carries year, age, socialSecurity, pension,
   otherIncome, withdrawal, expenses, goals, taxes, balance. We render those
   per scenario side by side. The numbers here are reality-of-one-path
   (coherent), not blended percentiles — that's why this view exists.
   Plumbing only; no engine changes. */
function simByIndex(res, idx){
  if(!res || !Array.isArray(res.sims)) return null;
  return res.sims.find(s => s.simIndex === idx) || res.sims[idx] || null;
}
function baselineResult(){
  return (scenarios.find(s=>s.base) || scenarios[0] || {}).res || null;
}
function findSimByTerminalBalance(res, targetBalance){
  if(!res || !Array.isArray(res.sims) || !res.sims.length) return 0;
  if(!Number.isFinite(targetBalance)) return 0;
  let closest = res.sims[0];
  let minDiff = Infinity;
  for(const sim of res.sims){
    if(!Number.isFinite(sim.terminalBalance)) continue;
    const diff = Math.abs(sim.terminalBalance - targetBalance);
    if(diff < minDiff){
      minDiff = diff;
      closest = sim;
    }
  }
  return closest?.simIndex ?? 0;
}
function selectedPathIndex(){
  const res = baselineResult();
  if(!res || !Array.isArray(res.sims) || !res.sims.length) return 0;
  if(pathReplay.mode === 'choose'){
    return Math.max(0, Math.min(res.sims.length - 1, pathReplay.index || 0));
  }
  if(pathReplay.mode === 'typical'){
    return (res.paths && res.paths.p50 && res.paths.p50.simIndex != null) ? res.paths.p50.simIndex : 0;
  }
  if(pathReplay.mode === 'stressed'){
    return res.terminal && Number.isFinite(res.terminal.p10) ? findSimByTerminalBalance(res, res.terminal.p10) : 0;
  }
  if(pathReplay.mode === 'favorable'){
    return res.terminal && Number.isFinite(res.terminal.p90) ? findSimByTerminalBalance(res, res.terminal.p90) : 0;
  }
  if(pathReplay.mode === 'sequence-stress'){
    return (res.paths && res.paths.p10 && res.paths.p10.simIndex != null) ? res.paths.p10.simIndex : 0;
  }
  return 0;
}
function pathModeLabel(){
  return ({
    typical:'Typical path',
    stressed:'Stressed path',
    favorable:'Favorable path',
    'sequence-stress':'Sequence Stress',
    choose:'Chosen path'
  })[pathReplay.mode] || 'Typical path';
}
function pathOutcomeText(sim){
  if(!sim) return '';
  return sim.failed
    ? `Ran dry at age ${sim.depletionAge || 'n/a'}`
    : `Survived with ${cfMoney(sim.terminalBalance || 0)}`;
}

/* ── Path Story ───────────────────────────────────────────────────────────
   The baseline run's selected coherent path, told as a statement. The same
   selected sim the cash-flow drawer replays (selectedPathIndex), digested by
   the engine (pathDigest) — the prose here and the table below are two views
   of one path. Pure formatting of engine fields; no UI math. */
const TAX_SOURCE_LABELS = {
  socialSecurity:'Social Security', otherIncome:'other income',
  traditional:'Traditional withdrawals', taxable:'capital gains'
};
function renderStory(){
  const el = $('#story-panel'); if(!el) return;
  const res = baselineResult();
  if(!res || !Array.isArray(res.sims) || !res.sims.length){ el.innerHTML=''; return; }
  const sim = simByIndex(res, selectedPathIndex());
  if(!sim){ el.innerHTML=''; return; }
  const d = pathDigest(sim);
  const pc = v => (v>=0?'+':'−') + Math.abs(v*100).toFixed(1) + '%';
  const endAge = sim.rows.length ? sim.rows[sim.rows.length-1].age : '';
  const endStat = d.failed
    ? `<b>${fmtM(0)}</b><i>depleted at age ${d.depletionAge}</i>`
    : `<b>${fmtM(d.endBalance)}</b><i>ends at age ${endAge}</i>`;
  const picks = [['stressed','Stressed'],['typical','Median'],['favorable','Favorable']]
    .map(([m,l]) => `<button class="${pathReplay.mode===m?'on':''}" data-story-mode="${m}">${l}</button>`).join('');
  const verb = d.first10Supports ? 'cooperate' : 'push back';
  const reads = [

/* ── Plan Assessment ──────────────────────────────────────────────────────
   assessPlan() ids + figures mapped to fixed, factual sentences in a
   two-column ledger. The engine decides what applies; the UI only words it. */
function renderAssess(){
  const el = $('#assess-panel'); if(!el) return;
  const res = baselineResult();
  if(!res || !res.paths){ el.innerHTML=''; return; }
  const a = assessPlan(res);
  const pct1 = v => (v*100).toFixed(1)+'%';
  const SENT = {
    'low-fixed-spending':       v => ['Low fixed spending — core spend vs starting assets', pct1(v)],
    'tax-diversified':          v => ['Tax-diversified mix — account types carrying weight', `${v} of 3`],
    'high-success':             v => ['High success rate — paths lasting the full horizon', Math.round(v)+'%'],
    'withdrawal-load':          v => [`Withdrawal load — average ${v.avg.toFixed(1)}%, peak at age ${v.age}`, v.peak.toFixed(1)+'%'],
    'portfolio-funded-spending':v => ['Portfolio-funded spending — guaranteed income covers', pct1(v)],
    'return-timing':            v => [`Return timing — stressed path depletes${v.stressedDepletionAge?` at age ${v.stressedDepletionAge}`:''}, median survives`, 'path-dependent']
  };
  const row = it => {
    const [label, val] = (SENT[it.id] || (x=>[it.id, '']))(it.value);
    return `<div class="led-row"><span>${label}</span><span class="dots"></span><b>${val}</b></div>`;
  };
  const left  = a.strengths.map(row).join('') || `<div class="led-none">Nothing clears the bar on this run.</div>`;
  const right = [...a.pressures, ...a.tossups].map(row).join('') || `<div class="led-none">No pressure points on this run.</div>`;
  el.innerHTML = `
    <div class="story-sec"><span>Plan Assessment · what the engine sees</span></div>
    <div class="ledger">
      <div><h5>Working for the plan</h5>${left}</div>
      <div><h5>Working against it</h5>${right}</div>
    </div>`;
}

/* ── SEQUENCING tab — same returns, different ORDER ──────────────────────────
   The tab's single job: isolate the ORDER of returns. We take one REAL
   historical return stream and run the SAME plan through it forward vs exactly
   reversed (identical returns, opposite sequence). Any difference is pure
   sequence-of-returns risk. Every number on this tab is a direct read of the
   engine's single-path result; the UI computes no balances or metrics. */
// The Sequencing tab holds ONE plan fixed and runs it through several REAL
// retirement markets — never a reversed/counterfactual timeline. The lesson is
// the truth a client actually faces: retire into a brutal market vs a kind one,
// same plan, and watch the spread. A LIBRARY of real markets the advisor can
// toggle on/off as lines (`on` = shown by default). Euphoric bulls (1982/85) are
// deliberately omitted — a 10-20x winner crushes the scale and hides the
// downside, which is the whole point of a sequence-risk view.
// Distinct but DEEP, desaturated editorial tones — each line identifiable, none
// candy-bright. Picked to be maximally distinct from each other on the ground.
const SEQ_YEARS=[
  {y:1929, tag:'Great Depression',  c:'#c6a662', on:false},
  {y:1966, tag:'the lost decade',   c:'#8b94a8', on:true },
  {y:1973, tag:'stagflation',       c:'#cd9a52', on:true },
  {y:1987, tag:'Black Monday',      c:'#b08f4e', on:false},
  {y:1995, tag:'the 90s boom',      c:'#8fa57e', on:true },
  {y:2000, tag:'dot-com crash',     c:'#c0795f', on:true },
  {y:2008, tag:'financial crisis',  c:'#9a8fb0', on:false},
  {y:2009, tag:'the recovery bull', c:'#d8c084', on:false},
];

// engine-vs-federal diagnostic tax columns. The single authoritative Cash Flow
// renderer now lives in the ScenariosUI view layer (one renderCashflow), with the

// engine row tax — no diagnostic comparison columns.

function buildSeqSelect(){
  const sel=$('#seq-select'), cur=sel.value;
  sel.innerHTML=scenarios.map(s=>`<option>${escHtml(s.name)}</option>`).join('');
  if(cur && scenarios.some(s=>s.name===cur)) sel.value=cur;
  sel.onchange=runSeq;
  buildSeqChips();
}
// Market chips double as the selector AND the legend: lit = shown as a line.
function buildSeqChips(){
  const box=$('#seq-chips'); if(!box) return;
  box.innerHTML=SEQ_YEARS.map((m,i)=>
    `<button class="seq-chip${m.on?' on':''}" data-i="${i}"><span class="cdot" style="background:${m.c}"></span>${m.y} · ${m.tag}</button>`).join('');
  box.querySelectorAll('.seq-chip').forEach(btn=>btn.onclick=()=>{
    const m=SEQ_YEARS[+btn.dataset.i];
    if(m.on && SEQ_YEARS.filter(x=>x.on).length<=1) return;   // keep at least one line
    m.on=!m.on; buildSeqChips(); runSeq();
  });
}
// Build a "retire-now" clone: the household standing at its retirement age with
// the plan's MEDIAN projected balance (read from the engine envelope, not
// invented). Every real market then runs from this ONE shared starting point, so
// the only thing differing between lines is the market — not the entry balance.
function retireNowClone(p, ov, curAge, retAge, accumYears, envelope){
  // `envelope` is the chosen scenario's already-computed envelope, passed in
  // from runSeq. Reusing it (a) keeps the sequencing entry balance IDENTICAL to
  // the Scenarios tab — both read the same shared-path run — and (b) avoids
  // re-running a full Monte Carlo on every chip toggle. Fall back to a
  // shared-path run only if the scenario hasn't been computed yet.
  const env = envelope || (runSimulation(p, ov, sharedPaths) || {}).envelope;
  const accs=p.portfolio.accounts;
  const tot=accs.taxable.balance+accs.traditional.balance+accs.roth.balance;
  const entry=(env && env[accumYears] && env[accumYears].p50!=null) ? env[accumYears].p50 : tot;
  const rp=JSON.parse(JSON.stringify(p));
  const ra=rp.portfolio.accounts;
  if(tot>0){ const f=entry/tot; ra.taxable.balance*=f; ra.traditional.balance*=f; ra.roth.balance*=f; }
  else { ra.taxable.balance=entry; }
  rp.household.primary.currentAge=retAge;          // standing at retirement → no accumulation phase
  rp.household.primary.retirementAge=retAge;
  if(rp.household.spouse && rp.household.spouse.currentAge!=null)
    rp.household.spouse.currentAge += (retAge-curAge);
  return rp;
}
function runSeq(){
  const sel=$('#seq-select'); const s=scenarios.find(x=>x.name===sel.value)||scenarios[0];
  // Sequence the chosen scenario FAITHFULLY: allocation via the plan clone, every
  // other lever via the same overrides mapping the Scenarios tab uses.
  const p=planForScenario(s.lev);
  const ov=leversToOverrides(s.lev);
  const strat=normalizePlaybackStrategy(p.portfolio.withdrawalStrategy);
  const curAge=plan.household.primary.currentAge;
  const retAge=(s.lev.retireAge!=null?s.lev.retireAge:p.household.primary.retirementAge);
  const accumYears=Math.max(0, retAge-curAge);
  const rp=retireNowClone(p, ov, curAge, retAge, accumYears, s.res && s.res.envelope);
  const ov2={...ov, retireDelay:0};                // retirement age is baked into the clone now
  const runs=SEQ_YEARS.filter(m=>m.on)
                      .map(m=>({m, res:runHistoricalPath(rp, m.y, strat, undefined, ov2)}))
                      .filter(r=>r.res && r.res.rows.length);
  if(!runs.length){ $('#seq-svg').innerHTML=''; $('#seq-prints').innerHTML=''; return; }
  drawSeqChart(runs, retAge);
  renderPrints(runs);
  seqContext={rp, strat, ov2};
  renderPlayback();
  const n=runs.length;
  $('#seq-sub').textContent='Same plan, real markets';
}
function drawSeqChart(runs, retAge){
  const svg=$('#seq-svg'),W=1000,H=320;
  svg.innerHTML=seqChartSvg(runs, retAge,{
    width:W,
    height:H,
    layout:CHART_LAYOUT.scenarioPath,
    fmtM,
    grid:GRID,
    axisInk:AXIS_INK
  });
}
// Path fingerprint — facts read straight off the engine result. One card per real
// market: the first-decade return (the sequence-risk cause), the lowest the
// portfolio fell, and the outcome. No invented composite "score".
function renderPrints(runs){
  // All three figures come straight from the engine's pathDigest: first-decade
  // CAGR, lowest balance, and the damage window (longest run of years the
  // cumulative return sat below its retirement-day level — a long '66/'73
  // grind hurts a withdrawing portfolio far more than a V-shaped '08 shock).
  const pct=v=>(v>=0?'+':'')+(v*100).toFixed(1)+'%';
  const outcome=r=> r.depletionAge!=null
    ? {t:`Ran dry @ ${r.depletionAge}`, c:'var(--negative-bright)'}
    : {t:`Survived · ${fmtM(r.terminalBalance)}`, c:'var(--status-positive-bright)'};
  const card=(m,res)=>{
    const o=outcome(res);
    const d=pathDigest(res);
    // Only when there IS a drawdown — a good market never goes underwater, so the
    // row would just read "—". Show it where it tells a story; omit it otherwise.
    const dwBlock = d.underwaterSpellMax ? `
      <div class="pr-row" style="border-bottom:none"><span class="pr-k">Duration</span><span class="pr-v">${d.underwaterSpellMax} yr${d.underwaterSpellMax>1?'s':''}</span></div>
      <div class="dw-bar"><div class="dw-fill" style="width:${Math.min(100,d.underwaterSpellMax/12*100).toFixed(0)}%;background:#c0795f"></div></div>` : '';
    return `<div class="seq-print">
      <h4><span class="dot" style="border-color:${m.c}"></span>${m.y} · ${m.tag}</h4>
      <div class="pr-row"><span class="pr-k">First decade</span><span class="pr-v">${pct(d.first10Cagr)}</span></div>
      <div class="pr-row"><span class="pr-k">Lowest</span><span class="pr-v">${fmtM(d.minBalance)}</span></div>
      ${dwBlock}
      <div class="pr-row"><span class="pr-k">Outcome</span><span class="pr-v" style="color:${o.c}">${o.t}</span></div>
    </div>`;
  };
  $('#seq-prints').innerHTML=runs.map(r=>card(r.m, r.res)).join('');
}

/* ── Playback ─────────────────────────────────────────────────────────────
   One retirement start year, replayed against the real record. The verdict
   is a sentence; the comparison runs the SAME return sequence through the
   three sourcing orders (only the order varies — an allowed comparison);
   the year-by-year table is the engine's rows, behind an advisor toggle.
   Era labels are a static lookup for context only — no math. */
const ERA_LABELS=[
  [1928,1932,'crash & depression'],[1933,1945,'depression & war'],
  [1946,1965,'postwar boom'],[1966,1972,'stagnation sets in'],
  [1973,1974,'oil shock'],[1975,1981,'stagflation'],
  [1982,1999,'the long bull'],[2000,2002,'dot-com bust'],
  [2003,2007,'mid-cycle expansion'],[2008,2009,'financial crisis'],
  [2010,2019,'recovery bull'],[2020,2020,'pandemic'],
  [2021,2021,'reopening'],[2022,2022,'rate shock'],[2023,2025,'late-cycle bull']
];
const eraFor=y=>{ const e=ERA_LABELS.find(([a,b])=>y>=a&&y<=b); return e?e[2]:''; };
const PB_STRATS=[['taxable-first','Taxable first'],['proportional','Proportional'],['traditional-first','Traditional first']];
function normalizePlaybackStrategy(strategy){
  return PB_STRATS.some(([k])=>k===strategy) ? strategy : 'taxable-first';
}
let playbackYear=1973, pbDetailOpen=false, seqContext=null;
function renderPlayback(){
  const el=$('#playback-panel'); if(!el) return;
  if(!seqContext){ el.innerHTML=''; return; }
  const {rp, ov2}=seqContext;
  const strat=normalizePlaybackStrategy(seqContext.strat);
  const years=SEQ_YEARS.map(m=>m.y);
  if(!years.includes(playbackYear)) playbackYear=years[0];
  const runs=PB_STRATS
    .map(([k,label])=>({k,label,res:runHistoricalPath(rp,playbackYear,k,undefined,ov2)}))
    .filter(r=>r.res && r.res.rows.length);
  if(!runs.length){ el.innerHTML=''; return; }
  const main=runs.find(r=>r.k===strat)||runs[0];
  const d=pathDigest(main.res);
  const verdict = d.failed
    ? `${playbackYear} breaks the plan at age ${d.depletionAge}.`
    : `The plan survives ${playbackYear}.`;
  const sub = d.failed
    ? `Retire ${playbackYear} and the portfolio is exhausted at age ${d.depletionAge} — the sequence, not the average, does the damage.`
    : `${main.res.actualYears} historical years — retire ${playbackYear}, plan through ${main.res.endYear} — end with <b>${fmtM(d.endBalance)}</b> in today's dollars.`;
  const picks=years.map(y=>`<button class="${y===playbackYear?'on':''}" data-pb-year="${y}">${y}</button>`).join('');
  const stratRows=runs.map(r=>{
    const rd=pathDigest(r.res);
    const isPlan=r.k===strat;
    const delta=isPlan?'baseline':cfGain(r.res.lifetimeTax-main.res.lifetimeTax);
    const out=rd.failed?`Depleted · age ${rd.depletionAge}`:'Survived';
    return `<tr class="${isPlan?'plan':''}">
      <td class="l">${r.label}${isPlan?' — the plan’s strategy':''}</td>
      <td class="l">${out}</td>
      <td class="end">${fmtM(rd.endBalance)}</td>
      <td>${(rd.realCagr*100).toFixed(1)}%</td>
      <td>${fmtM(r.res.lifetimeTax)}</td>
      <td>${delta}</td></tr>`;
  }).join('');
  const real=main.res.rows.filter(r=>r.source!=null);
  const yearRows=real.map(r=>{
    const neg=r.returnRate<0;
    return `<tr>
      <td class="l" style="width:34px">${r.year}</td>
      <td>${r.age}</td>
      <td class="era l">${r.source} · ${eraFor(r.source)}</td>
      <td class="${neg?'neg':''}">${cfRetPct(r.returnRate)}</td>
      <td>${fmtM(r.startBalance)}</td>
      <td class="${r.returnDollars<0?'neg':''}">${cfGain(r.returnDollars)}</td>
      <td>${cfMoney(r.withdrawal)}</td>
      <td class="${(r.balance-r.startBalance)<0?'neg':''}">${cfGain(r.balance-r.startBalance)}</td>
      <td class="end">${fmtM(r.balance)}</td></tr>`;
  }).join('');
  const detail = pbDetailOpen ? `
    <div class="story-chart-l" style="margin-top:26px">Year by year · retire ${playbackYear} · engine rows, era labels for context only</div>
    <table class="stmt" id="pb-table">
      <tr><th class="l">Yr</th><th>Age</th><th class="l">Era</th><th>Return</th><th>Start</th><th>Return $</th><th>Drawn</th><th>Net</th><th>End</th></tr>
      ${yearRows}
    </table>` : '';
  el.innerHTML=`
    <div class="story-sec"><span>Playback · same plan, real markets</span></div>
    <div class="story-pick"><span class="pk-l">Retire in:</span>${picks}</div>
    <div class="pb-verdict" id="pb-verdict">${verdict}</div>
    <div class="pb-sub">${sub}</div>
    <hr class="story-rule">
    <div class="story-chart-l">Same ${playbackYear} sequence, three sourcing orders</div>
    <table class="stmt" id="pb-strats">
      <tr><th class="l"></th><th class="l">Outcome</th><th>Terminal</th><th>Real CAGR</th><th>Lifetime taxes</th><th>vs plan</th></tr>
      ${stratRows}
    </table>
    <button class="pb-detail-btn" id="pb-detail-btn">${pbDetailOpen?'hide advisor detail ▴':'advisor detail · year by year ▾'}</button>
    ${detail}`;
  el.querySelectorAll('[data-pb-year]').forEach(b=>b.onclick=()=>{
    playbackYear=parseInt(b.dataset.pbYear,10); renderPlayback();
  });
  $('#pb-detail-btn').onclick=()=>{ pbDetailOpen=!pbDetailOpen; renderPlayback(); };
}
