// Live comma formatting for money inputs. Reformats on every keystroke and
// preserves the caret's LOGICAL position (after the same number of digits)
// so typing left-to-right feels natural — no caret-jumping-to-end weirdness.
function liveCommas(el){
  const old = el.value;
  const caret = el.selectionStart ?? old.length;
  const digitsBefore = (old.slice(0, caret).match(/\d/g) || []).length;
  const digits = old.replace(/[^0-9]/g, '');
  if(!digits){ el.value = ''; return; }
  const formatted = parseInt(digits, 10).toLocaleString('en-US');
  el.value = formatted;
  let pos = 0, seen = 0;
  while(pos < formatted.length && seen < digitsBefore){
    if(/\d/.test(formatted[pos])) seen++;
    pos++;
  }
  el.setSelectionRange(pos, pos);
}

// Re-seed scenarios from the current base, keeping each scenario's adjustment.
function reseedScenarios(){
  const nb=defaultLevers();
  const LINKED=['retireAge','ssAge','spend','savings','pensionAge'];   // base-linked levers
  scenarios.forEach(s=>{
    Object.keys(nb).forEach(k=>{
      if(s.base){ s.lev[k]=nb[k]; return; }   // baseline always mirrors the base
      if(!LINKED.includes(k)) return;         // allocation / one-time event stay as set
      const cfg=LEVCFG.find(c=>c.key===k);
      let v=nb[k]+(s.lev[k]-baseSnapshot[k]);  // new base + this scenario's delta
      if(cfg){ const r=levRange(cfg); v=Math.max(r.min,Math.min(r.max,v)); }
      s.lev[k]=v;
    });
    syncPension(s.lev);   // auto-linked pension follows the (possibly new) retire age
  });
  baseSnapshot=nb;
}

function realAssetsTotal(){ return (plan.properties||[]).reduce((s,a)=>s+(a.value||0),0); }
function liabilitiesPVTotal(){
  // Side-panel estimate of what's owed: generic recurring liabilities as a simple
  // PV (amount/yr × years remaining) + each property mortgage's outstanding
  // balance. Honest crude estimate — the engine still does the proper
  // time-erosion + amortization math during simulation.
  const p=plan.household.primary;
  const recurring = (plan.liabilities||[]).reduce((s,L)=>{
    const yrs = Math.max(0, (L.endAge||p.planEndAge) - Math.max(L.startAge||p.currentAge, p.currentAge));
    return s + (L.amount||0)*yrs;
  },0);
  const mortgages = (plan.properties||[]).reduce((s,pr)=>s+((pr.mortgage&&pr.mortgage.balance)||0),0);
  return recurring + mortgages;
}

// Column subtotals — sums every group in HYBRID[page].left / .right (a column may
// be one or more groups). Dynamic-pension items are included automatically.
function groupSum(g){
  let s = 0;
  (g.items||[]).forEach(it => { s += (getPath(plan, it.path)||0); });
  if(g.dynamic==='pension'){
    const m=(plan.income.pension&&plan.income.pension.benefitByAge)||{};
    const pStart=(plan.income.pension&&plan.income.pension.startAge);   // pays ONE amount
    s += (pStart && m[pStart]) || 0;
  }
  if(g.section){ (getPath(plan, g.section.arr)||[]).forEach(r => { s += (r.amount||0); }); }
  if(g.goals){
    const once = g.goals==='once';
    (plan.goals||[]).forEach(go => { if((once ? go.startAge===go.endAge : go.startAge!==go.endAge)) s += (go.amount||0); });
  }
  return s;
}

  const col = HYBRID[page] && HYBRID[page][side];
  if(!col) return 0;
  return (col.groups || [col]).reduce((s,g)=>s+groupSum(g), 0);

      <hr class="gut-rule"/>
      <div class="row"><span>Investable</span><b>${fmtMoney(investableTotal())}</b></div>
      <div class="row"><span>Real assets</span><b>${fmtMoney(realAssetsTotal())}</b></div>
      <div class="row"><span>Liabilities</span><b>${fmtMoney(liab)}</b></div>
    </div>`;
  }
  const def = HYBRID[pageKey];
  // Cash Flow: headline = annual income; breakdown = income composition + expenses.
  if(pageKey === 'cashflow'){
    const income   = colSum(pageKey,'left');
    const expenses = colSum(pageKey,'right');
    const groupRows = (def.left.groups||[]).map(g =>
      `<div class="row"><span>${g.head}</span><b>${fmtMoney(groupSum(g))}</b></div>`).join('');
    return `<div class="np-gutter">
      <div class="lbl">${sp.totLabel}</div>
      <div class="big-num teal">${fmtMoney(income)}</div>
      <div class="big-sub">per year · today's dollars</div>
      <hr class="gut-rule"/>
      ${groupRows}
      <div class="row"><span>Expenses</span><b>${fmtMoney(expenses)}</b></div>
    </div>`;
  }
  const total = hybridTotal(pageKey);
  return `<div class="np-gutter">
    <div class="lbl">${sp.totLabel}</div>
    <div class="big-num teal">${fmtMoney(total)}</div>
    <div class="big-sub">per year · today's dollars</div>
    <hr class="gut-rule"/>
    <div class="row"><span>${def.left.head}</span><b>${fmtMoney(colSum(pageKey,'left'))}</b></div>
    <div class="row"><span>${def.right.head}</span><b>${fmtMoney(colSum(pageKey,'right'))}</b></div>
  </div>`;
}

/* ── Field renderer — one input element, shared by both layouts ──── */
function renderField(f, klass){
  const v = getPath(plan, f.path);
  if(f.type==='risk'){
    const opts = Object.keys(RISK_NAMES).map(k =>
      `<option value="${k}" ${+k===+v?'selected':''}>${RISK_NAMES[k]} · ${RISK_LABELS[k]}</option>`).join('');
    return `<select data-path="${f.path}" data-type="risk">${opts}</select>`;
  }
  if(f.type==='text'){
    return `<input type="text" data-path="${f.path}" data-type="text" value="${escHtml(v||'')}" placeholder="${f.ph||''}">`;
  }
  if(f.type==='money'){
    const dv = (v||0).toLocaleString('en-US');
    return `<span class="pre">$</span><input type="text" inputmode="numeric" data-path="${f.path}" data-type="money" value="${dv}">`;
  }
  if(f.type==='pct'){
    const dv = Math.round((v||0)*100);
    return `<input type="number" data-path="${f.path}" data-type="pct" value="${dv}" step="1"><span class="pre">%</span>`;
  }
  // age
  return `<input type="number" data-path="${f.path}" data-type="${f.type}" value="${v}" step="1">`;
}

/* ── Add-row sections ─────────────────────────────────────────────
   Schema-driven editable rows backed by a plan array. The SAME data-path
   binding + change handler that drives every other input writes these, so
   "add a row" is just pushing a default object and re-rendering, and "remove"
   is an array splice. Each kind names its backing array + a factory for a new
   row's defaults. (Goals share one array; recurring vs one-time is decided by
   the window: a one-time goal is a single-year window, startAge===endAge.) */
const ROW_KINDS = {
  income:    { arr:'income.other',   mk:()=>({ label:'', amount:0, startAge:65, endAge:75, realGrowth:0, taxablePct:1 }) },
  expense:   { arr:'expenses.extra', mk:()=>({ label:'', amount:0, startAge:65, endAge:80 }) },
  liability: { arr:'liabilities',    mk:()=>({ label:'', amount:0, startAge:65, endAge:75, colaPct:0 }) },
  goalRec:   { arr:'goals',          mk:()=>({ name:'',  amount:0, startAge:plan.household.primary.retirementAge, endAge:plan.household.primary.planEndAge }) },
  goalOnce:  { arr:'goals',          mk:()=>({ name:'',  amount:0, startAge:70, endAge:70 }) },
  property:  { arr:'properties',     mk:()=>({ name:'',  value:0, purchasePrice:0, purchaseYear: new Date().getFullYear(), mortgage:{ balance:0, rate:0, termYears:0 } }) },
};
const money = (p,base,k)=>`<span class="er-amt"><span class="pre">$</span><input type="text" inputmode="numeric" data-path="${base}.${k}" data-type="money" value="${(getPath(plan,base+'.'+k)||0).toLocaleString('en-US')}"></span>`;
const num   = (p,base,k,step)=>`<input class="er-num" type="number" step="${step||1}" data-path="${base}.${k}" data-type="num" value="${getPath(plan,base+'.'+k)}">`;
const name  = (p,base,k,ph)=>`<input class="er-name" type="text" data-path="${base}.${k}" data-type="text" value="${escHtml(getPath(plan,base+'.'+k)||'')}" placeholder="${ph}">`;
const rmX   = base=>`<button class="row-x" data-rmpath="${base}" title="Remove this row">×</button>`;

// A flow row (income / expense / liability): name · amount · from–to ages.
function flowRow(arr, i, nameKey, ph){
  const base = `${arr}.${i}`;
  return `<div class="erow">${name(plan,base,nameKey,ph)}${money(plan,base,'amount')}
    <span class="er-ages">age ${num(plan,base,'startAge')}<span class="er-dash">–</span>${num(plan,base,'endAge')}</span>${rmX(base)}</div>`;
}
// An income row = the flow row PLUS a compact second line for the two per-stream
// controls: real growth/yr (signed — negative phases the stream down) and the
// share taxed at the ordinary rate. gpct stores a signed fraction; pct a 0–1 one.
function incomeRow(arr, i){
  const base = `${arr}.${i}`;
  const g = Math.round((getPath(plan, base+'.realGrowth')||0)*100);
  const tRaw = getPath(plan, base+'.taxablePct');
  const t = Math.round((tRaw==null?1:tRaw)*100);
  const main = `<div class="erow">${name(plan,base,'label','Source')}${money(plan,base,'amount')}
    <span class="er-ages">age ${num(plan,base,'startAge')}<span class="er-dash">–</span>${num(plan,base,'endAge')}</span>${rmX(base)}</div>`;
  const extra = `<div class="er-extra">
      <span class="er-xk">grows</span><input class="er-num er-gw" type="number" step="1" data-path="${base}.realGrowth" data-type="gpct" value="${g}"><span class="er-xs">%/yr real</span>
      <span class="er-xsep">·</span>
      <input class="er-num" type="number" step="1" data-path="${base}.taxablePct" data-type="pct" value="${t}"><span class="er-xs">% taxable</span>
    </div>`;
  return `<div class="erow-wrap">${main}${extra}</div>`;
}
// A recurring goal: name · amount · age window (from – to). Defaults to
// retirement → plan-end (the old "lifelong"), but the end is now editable so a
// goal can run for a finite span (e.g. tuition ages 70–78).
function recGoalRow(i){
  const base = `goals.${i}`;
  const ages = `<span class="er-ages">age ${num(plan,base,'startAge')}<span class="er-dash">–</span>${num(plan,base,'endAge')}</span>`;
  return `<div class="erow">${name(plan,base,'name','Goal')}${money(plan,base,'amount')}${ages}${rmX(base)}</div>`;
}
// A one-time goal: name · amount · single "at age" (mirrors into endAge).
function onceGoalRow(i){
  const base = `goals.${i}`;
  const at = `<span class="er-ages">at age <input class="er-num" type="number" step="1" data-path="${base}.startAge" data-sync="${base}.endAge" data-type="num" value="${getPath(plan,base+'.startAge')}"></span>`;
  return `<div class="erow">${name(plan,base,'name','One-time goal')}${money(plan,base,'amount')}${at}${rmX(base)}</div>`;
}
// A property card: name · value · purchase price · optional mortgage. The
// payment + payoff shown is the ENGINE's amortization (truth), not UI math.
function propRow(i){
  const base = `properties.${i}`, m = `${base}.mortgage`;
  const M = getPath(plan, m) || {};
  const pay = annualMortgagePayment(M.balance, M.rate, M.termYears);
  const start = plan.household.primary.currentAge;
  const meta = pay > 0
    ? `Engine: ${fmtMoney(Math.round(pay))}/yr · paid off at age ${start + (M.termYears||0)}`
    : `No mortgage — value & purchase price are captured for a future sale`;
  return `<div class="prop">
    <div class="prop-top">${name(plan,base,'name','Property')}${rmX(base)}</div>
    <div class="prop-grid">
      <label class="prop-f"><span class="er-k">Value</span>${money(plan,base,'value')}</label>
      <label class="prop-f"><span class="er-k">Purchase price</span>${money(plan,base,'purchasePrice')}</label>
      <label class="prop-f"><span class="er-k">Purchase year</span><input class="er-num" type="number" step="1" min="1900" max="2099" data-path="${base}.purchaseYear" data-type="num" value="${getPath(plan,base+'.purchaseYear')||''}" style="width:52px"></label>
    </div>
    <div class="prop-mort">
      <span class="er-k">Mortgage</span>
      <label class="prop-f"><span class="er-sub">Balance</span>${money(plan,m,'balance')}</label>
      <label class="prop-f narrow"><span class="er-sub">Rate</span>${num(plan,m,'rate',0.1)}<span class="er-suf">%</span></label>
      <label class="prop-f narrow"><span class="er-sub">Term</span>${num(plan,m,'termYears')}<span class="er-suf">yr</span></label>
    </div>
    <div class="prop-meta">${meta}</div>
  </div>`;
}
// Render every row of a flow kind backed by `arr`, with the trailing "+ add".
function flowSection(arr, nameKey, ph, kind, addLabel){
  const list = getPath(plan, arr) || [];
  const rowFn = (kind==='income') ? (i=>incomeRow(arr,i)) : (i=>flowRow(arr,i,nameKey,ph));
  let h = list.map((_,i)=>rowFn(i)).join('');
  h += `<div class="hp-add" data-add="${kind}">${addLabel}</div>`;
  return h;
}

/* ── Statement layout (Balance Sheet) ─────────────────────────────
   Section heads = small caps + thin gold underline. Rows = label, dotted
   leader, boxless input. Subtotal closes a money section in slate. */
function renderStatement(){
  const renderSecs = secs => {
    let h = '';
    secs.forEach(sec => {
      h += `<div class="bs-head">${sec.head}</div>`;
      if(sec.subtotal==='invest') h += renderAcctPicker();
      if(sec.subtotal==='invest') h += renderCoreAccounts();
      (sec.fields||[]).forEach(f => {
        const rowCls = f.sub ? 'bs-row sub' : 'bs-row';
        h += `<div class="${rowCls}"><label>${f.label}</label><span class="bs-dots"></span><span class="field">${renderField(f)}</span></div>`;
      });
      if(sec.subtotal==='invest'){
        h += renderExtraAccounts();
        h += `<div class="bs-sub"><span class="bs-sub-l">Investable total</span><span class="bs-sub-d"></span><span class="bs-sub-v">${fmtMoney(investableTotal())}</span></div>`;
      }
      // Editable array rows: property cards (Real assets) or flow rows (Liabilities).
      if(sec.kind==='property'){
        h += `<div class="erows">${(plan.properties||[]).map((_,i)=>propRow(i)).join('')}</div>`;
      } else if(sec.kind==='liability'){
        // Property mortgages mirror onto the Liabilities side as READ-ONLY lines so
        // the balance sheet ties out — the property card stays the source of truth.
        const linked = (plan.properties||[])
          .filter(pr => pr.mortgage && (pr.mortgage.balance > 0))
          .map(pr => `<div class="erow ro-row">
            <span class="ro-name">Mortgage · ${escHtml(pr.name||'Property')}</span>
            <span class="ro-amt">${fmtMoney(pr.mortgage.balance)}</span>
            <span class="ro-tag" title="Edit on the property in Real assets">linked</span>
          </div>`).join('');
        const editable = (plan.liabilities||[]).map((_,i)=>flowRow('liabilities',i,'label','Loan / obligation')).join('');
        h += `<div class="erows">${linked}${editable}</div>`;
      }
      if(sec.add) h += `<div class="bs-add" data-add="${sec.kind||''}">${sec.add}</div>`;
    });
    return h;
  };
  const assetSecs = BALANCE_SHEET.filter(s => !s.liab);
  const liabSecs  = BALANCE_SHEET.filter(s =>  s.liab);
  const hh = HH_FIELDS.map(f =>
    `<div class="hh-f"><label>${f.label}</label><span class="field">${renderField(f)}</span></div>`
  ).join('');
  return `<div class="np-page np-bal">
    <div class="hh-bar">${hh}</div>
    ${renderGutter('balance-sheet')}
    <div class="bs-sheet">
      <div class="bs-col"><div class="bs-title">Assets</div>${renderSecs(assetSecs)}</div>
      <div class="bs-divider"></div>
      <div class="bs-col"><div class="bs-title">Liabilities</div>${renderSecs(liabSecs)}</div>
    </div>
  </div>`;
}

/* ── Hybrid layout (Inflows / Outflows / Goals) ───────────────────
   200px gutter (title + description + running total) + two facing columns
   split by a single vertical hairline. Each item: name on the left, boxless
   input on the right, meta line below the name in ink-mute. */
function renderHybrid(pageKey){
  const def = HYBRID[pageKey];
  // A "group" = one labelled block (head + fixed items + optional pension +
  // optional editable section/goals). A column is one or more groups stacked, so
  // the combined Cash Flow page can show Fixed income + Variable under Income.
  const renderGroup = g => {
    let h = g.head ? `<h4>${g.head}</h4>` : '';
    const items = (g.items||[]).slice();
    if(g.dynamic==='pension'){
      // ONE summary row — the benefit at the chosen start age. The full
      // benefit-by-age schedule and which age to claim is decided at the
      // Scenario level (the pension slider), not here.
      const pen = plan.income.pension || {};
      const pstart = pen.startAge;
      const ages = Object.keys(pen.benefitByAge||{}).map(Number).sort((a,b)=>a-b);
      const age = (pstart!=null && (pen.benefitByAge||{})[pstart]!=null) ? pstart
                : (ages.length ? ages[0] : null);
      if(age!=null){
        items.push({ path:`income.pension.benefitByAge.${age}`, name:'Pension', type:'money', meta:()=>`Begins at age ${age}` });
      }
    }
    items.forEach(it => {
      const xBtn = it.removable ? `<button class="row-x" title="Remove this row" data-rmpath="${it.path}">×</button>` : '';
      h += `<div class="hp-item"><div class="ti"><span class="nm">${it.name}</span><span class="field">${renderField(it)}${xBtn}</span></div>`;
      const m = it.meta ? it.meta() : '';
      if(m) h += `<div class="meta">${m}</div>`;
      h += `</div>`;
    });
    // Array-backed editable rows: a flow section (variable income) …
    if(g.section){
      const s = g.section;
      h += `<div class="erows">${flowSection(s.arr, s.nameKey, s.ph, s.kind, s.add)}</div>`;
    }
    // … or the goals array, split by window into recurring vs one-time columns.
    if(g.goals){
      const once = g.goals==='once';
      const rows = (plan.goals||[]).map((gg,i)=>({gg,i}))
        .filter(({gg})=> once ? (gg.startAge===gg.endAge) : (gg.startAge!==gg.endAge))
        .map(({i})=> once ? onceGoalRow(i) : recGoalRow(i)).join('');
      h += `<div class="erows">${rows}<div class="hp-add" data-add="${once?'goalOnce':'goalRec'}">${g.add}</div></div>`;
    }
    if(g.add && !g.goals && !g.section) h += `<div class="hp-add">${g.add}</div>`;
    return h;
  };
  const colHtml = colDef => {
    const groups = colDef.groups || [colDef];   // ungrouped pages: the column IS one group
    return `<div class="hp-col">${groups.map(renderGroup).join('')}</div>`;
  };
  return `<div class="np-page">
    ${renderGutter(pageKey)}
    <div class="hp-body">
      ${colHtml(def.left)}
      <div class="hp-rule"></div>
      ${colHtml(def.right)}
    </div>
  </div>`;
}

/* ── Snapshot (the diagnosis) ──────────────────────────────────────
   Three diagnostic gauges, each a RELATIONSHIP between numbers already
   entered — not engine projections. These are static rules-of-thumb (like a
   balance-sheet ratio): the income floor, the year-one withdrawal rate, and
   the tax-location mix. The engine still owns the real probability (Scenarios);
   this page is the at-a-glance condition of the household TODAY. Neutrality:
   the same gauges read green when the news is good and red when it isn't —
   the tool has no thesis, it just shows what's there. */
function snapshotMetrics(){
  const a = plan.portfolio.accounts;
  const taxable = a.taxable.balance||0, trad = a.traditional.balance||0, roth = a.roth.balance||0;
  const invest = taxable + trad + roth;
  // Guaranteed-for-life income at retirement: both SS benefits + pension at its
  // chosen start age (today's-dollar values straight off the inputs).
  const ssP = plan.income.socialSecurity.primary.pia||0;
  const ssS = (plan.income.socialSecurity.spouse && plan.income.socialSecurity.spouse.pia)||0;
  const pen = plan.income.pension||{};
  const penAmt = (pen.benefitByAge && pen.startAge!=null) ? (pen.benefitByAge[pen.startAge]||0) : 0;
  const guaranteed = ssP + ssS + penAmt;
  const essentials = (plan.expenses.living||0) + (plan.expenses.healthcare||0);
  const goals = (Array.isArray(plan.goals) ? plan.goals : []).reduce((s,g)=>s+(g.amount||0),0);
  const totalSpend = essentials + goals;
  const floorPct = essentials>0 ? guaranteed/essentials : 0;
  const fromPortfolioEssential = Math.max(0, essentials - guaranteed);
  const gap = Math.max(0, totalSpend - guaranteed);
  const wr = invest>0 ? gap/invest : 0;
  // Replacement ratio: GUARANTEED retirement income (SS + pension) as a share of
  // gross working income. Portfolio withdrawals are NOT income — they're spending
  // the portfolio funds — so they're deliberately excluded here. (A "sustainable
  // withdrawal amount" would need a solve, and would be framed as exactly that.)
  const workingIncome = plan.income.workingIncome || 0;
  const replacement = workingIncome>0 ? guaranteed/workingIncome : null;
  return { taxable, trad, roth, invest, guaranteed, essentials, goals, totalSpend,
           floorPct, fromPortfolioEssential, gap, wr, workingIncome, replacement };
}
function renderSnapshot(){
  const m = snapshotMetrics();
  const pct = v => (v*100);
  const pct1 = v => (v*100).toFixed(1)+'%';
  const pct0 = v => Math.round(v*100)+'%';

  // 1 · Income floor — floating stats (no bar: bar implied a grade, this is a fact).
  const floorTone = m.floorPct>=0.9 ? 'teal' : m.floorPct>=0.6 ? 'gold' : 'clay';
  const incomeFloor = `
    <div class="metric">
      <div>
        <div class="m-eye">Income Floor</div>
        <div class="m-hero ${floorTone}">${pct0(m.floorPct)}</div>
        <div class="m-sub">of essential spending is covered for life by guaranteed income</div>
      </div>
      <div class="stat-row">
        <div class="stat-item"><div class="stat-lbl">Guaranteed for life</div><div class="stat-val">${fmtMoney(m.guaranteed)}</div></div>
        <div class="stat-item"><div class="stat-lbl">Drawn from portfolio</div><div class="stat-val">${fmtMoney(m.fromPortfolioEssential)}</div></div>
        <div class="stat-item"><div class="stat-lbl">Essential spending</div><div class="stat-val">${fmtMoney(m.essentials)}</div></div>
      </div>
    </div>`;

  // 2 · Withdrawal rate — neutral metric, no grading. Shown for reference and
  // as a starting point for advisor conversation, not a verdict.
  const withdrawal = `
    <div class="metric">
      <div>
        <div class="m-eye">Withdrawal Rate · Year One</div>
        <div class="m-hero">${pct1(m.wr)}</div>
        <div class="m-sub">of the portfolio drawn the first year of retirement</div>
      </div>
      <div class="stat-row">
        <div class="stat-item"><div class="stat-lbl">Portfolio draws / yr</div><div class="stat-val">${fmtMoney(m.gap)}</div></div>
        <div class="stat-item"><div class="stat-lbl">From invested</div><div class="stat-val">${fmtMoney(m.invest)}</div></div>
        <div class="stat-item"><div class="stat-lbl">Total retirement spend</div><div class="stat-val">${fmtMoney(m.totalSpend)}</div></div>
      </div>
    </div>`;

  // 3 · Tax location — segmented proportion bar. Hero = the tax-deferred share
  // (the future-tax exposure). Labels hidden on slivers too thin to hold text.
  const tP = m.invest>0 ? m.taxable/m.invest : 0;
  const dP = m.invest>0 ? m.trad/m.invest : 0;
  const rP = m.invest>0 ? m.roth/m.invest : 0;
  const segLbl = (p) => pct(p)>=8 ? pct0(p) : '';
  const taxLocation = `
    <div class="metric">
      <div>
        <div class="m-eye">Tax Location</div>
        <div class="m-hero">${pct0(dP)}</div>
        <div class="m-sub">sits in tax-deferred accounts — taxed as income when withdrawn</div>
      </div>
      <div>
        <div class="seg">
          <div class="s-tax" style="width:${(tP*100).toFixed(1)}%">${segLbl(tP)}</div>
          <div class="s-def" style="width:${(dP*100).toFixed(1)}%">${segLbl(dP)}</div>
          <div class="s-roth" style="width:${(rP*100).toFixed(1)}%">${segLbl(rP)}</div>
        </div>
        <div class="seg-legend">
          <span class="k"><span class="sw" style="background:var(--teal)"></span>Taxable<b>${fmtMoney(m.taxable)}</b></span>
          <span class="k"><span class="sw" style="background:var(--gold)"></span>Tax-deferred<b>${fmtMoney(m.trad)}</b></span>
          <span class="k"><span class="sw" style="background:#3c7d59"></span>Tax-free · Roth<b>${fmtMoney(m.roth)}</b></span>
        </div>
      </div>
    </div>`;

  // 4 · Replacement ratio — retirement income as a share of working income.
  // NEUTRAL by design: no safety zones, because a higher ratio isn't worse —
  // it's the upside (live as well or better than today). Reference ticks only:
  // a faint "typical ~75%" heuristic and a solid "100% = working income" line.
  // Scale runs 0–120% so over-100% (spending up in retirement) still shows.
  let replacement;
  if(m.replacement == null){
    replacement = `
      <div class="metric">
        <div>
          <div class="m-eye">Replacement Ratio</div>
          <div class="m-hero">—</div>
          <div class="m-sub">add working income on the Balance Sheet to compare retirement to life today</div>
        </div>
        <div></div>
      </div>`;
  } else {
    // Coverage bar — same language as the income floor. The full track = working
    // income; the teal fill = the share retirement income replaces. No vertical
    // ticks cutting through text. Caps at the track; over-100% (spending more in
    // retirement) shows full + the true % in the hero.
    const fillPct = Math.min(100, m.replacement*100);
    replacement = `
      <div class="metric">
        <div>
          <div class="m-eye">Replacement Ratio</div>
          <div class="m-hero teal">${pct0(m.replacement)}</div>
          <div class="m-sub">of working income, replaced by guaranteed retirement income</div>
        </div>
        <div>
          <div class="cov"><div class="fill" style="width:${fillPct.toFixed(1)}%">Guaranteed&nbsp;·&nbsp;${fmtMoney(m.guaranteed)}</div></div>
          <div class="cov-legend">
            <span class="k"><span class="sw" style="background:var(--teal)"></span>Guaranteed income<b>${fmtMoney(m.guaranteed)}</b></span>
            <span class="k"><span class="sw" style="background:#e3d9c5"></span>Working income<b>${fmtMoney(m.workingIncome)}</b></span>
          </div>
        </div>
      </div>`;
  }

  return `<div class="snap">${incomeFloor}${withdrawal}${taxLocation}${replacement}</div>`;
}

/* ── Goals board (the approved prioritisation surface) ─────────────
   The Goals sub-tab is NOT the ledger — it's a board. Each card is a VIEW of a
   plan.goals entry: recurring goals (startAge≠endAge) carry a /yr tag; one-time
   goals (startAge===endAge) get a copper card + ONE-TIME tag. The hero sums the
   recurring goals (annual goal spend) and notes any one-time total. Drag a card
   onto a ghost slot to rank it (absorb + copper flash; swap, not bounce). The
   ranking is a planning/conversation surface — it adds NO engine math. */
function goalsView(){
  const list = (Array.isArray(plan.goals)?plan.goals:[]).map((g,i)=>({
    i, name:g.name||'', amount:g.amount||0,
    once:g.startAge===g.endAge, startAge:g.startAge, endAge:g.endAge,
  }));
  return {
    list,
    recurring: list.filter(g=>!g.once).reduce((s,g)=>s+g.amount,0),
    oneTime:   list.filter(g=> g.once).reduce((s,g)=>s+g.amount,0),
  };
}
function goalsHeroHTML(){
  const {recurring, oneTime} = goalsView();
  const oneTimeMeta = oneTime>0 ? ` &nbsp;&middot;&nbsp; <b>${fmtMoney(oneTime)}</b> one-time planned` : '';
  return `<div class="g-eyebrow">Annual goal spend</div>
    <div class="g-big">${fmtMoney(recurring)}<span class="g-per">/ year</span></div>
    <div class="g-meta">today's dollars${oneTimeMeta}</div>`;
}
function renderGoalsBoard(){
  const {list} = goalsView();
  const empty = list.length ? '' : `<div class="g-empty">No goals yet — add one to start prioritising.</div>`;
  return `<div class="g-hero">
      <div class="g-lead" id="g-lead">${goalsHeroHTML()}</div>
      <div class="g-actions">
        <div class="g-addrow">
          <div class="g-add" data-add="goalRec"><span class="g-plus">+</span> Add a goal</div>
          <div class="g-add g-add-sec" data-add="goalOnce"><span class="g-plus">+</span> One-time</div>
        </div>
        <div class="g-legend"><span><i class="rec"></i>Recurring</span><span><i class="once"></i>One-time</span></div>
      </div>
    </div>
    <div class="g-board" id="g-board">
      <div class="g-axis"><div class="g-spine"></div><div class="g-cap top">Must<br>fund &#8593;</div><div class="g-cap bot">&#8595; If we<br>can</div></div>
      <div class="g-traylab" id="g-traylab">Goals to place</div>
      ${empty}
    </div>`;
}
// One editable goal card. Cards are the FULL editable surface (name, amount,
// age window / at-age) and the prioritisation handle — drag the body, edit the
// fields. Each field is a data-path-free input handled locally so value edits
// update in place (preserving the drag rank); add/remove route through the
// shared #np-content handlers (a structural change, so a rebuild is fine).
function goalCardHTML(g){
  const tag = g.once ? '<span class="g-tag">One-time</span>' : '';
  const per = g.once ? '' : '<span class="g-per2">/yr</span>';
  const amtStr = (g.amount||0).toLocaleString('en-US');
  const ages = g.once
    ? `Lands once · age <input class="g-age-in" data-f="startAge" data-sync="endAge" data-type="num" value="${g.startAge}">`
    : `Recurring · ages <input class="g-age-in" data-f="startAge" data-type="num" value="${g.startAge}">–<input class="g-age-in" data-f="endAge" data-type="num" value="${g.endAge}">`;
  return `<div class="g-main">
       <div class="g-name"><input class="g-name-in" data-f="name" data-type="text" value="${escHtml(g.name)}" placeholder="Goal name">${tag}</div>
       <div class="g-kind">${ages}</div>
     </div>
     <div class="g-amt"><span class="g-cur">$</span><input class="g-amt-in" data-f="amount" data-type="money" inputmode="numeric" value="${amtStr}">${per}</div>
     <button class="row-x g-del" data-rmpath="goals.${g.i}" title="Remove this goal">×</button>`;
}
// Build slots + editable, draggable cards into the rendered shell; wire pointer
// drag/snap/swap, inline editing, and rank persistence. Called after
// renderInputs() injects the board markup.
function initGoalsBoard(){
  const {list} = goalsView();
  const board = $('#g-board'), traylab = $('#g-traylab'), lead = $('#g-lead');
  if(!board) return;
  const RANK_KEY='parallax.goals.rank';
  const NSLOT=Math.max(6, list.length), CW=410, CH=72, GAP=14;
  const SNAP='left .2s cubic-bezier(.2,.7,.2,1),top .2s cubic-bezier(.2,.7,.2,1),box-shadow .16s,transform .12s';
  const slots=[], cards=[];
  for(let i=0;i<NSLOT;i++){
    const s=document.createElement('div'); s.className='g-slot';
    s.style.width=CW+'px'; s.style.height=CH+'px';
    s.innerHTML='<span class="g-rank">'+(i+1)+'</span>';
    board.appendChild(s); slots.push({el:s,x:0,y:0,card:null});
  }
  list.forEach((g)=>{
    const el=document.createElement('div'); el.className='g-card'+(g.once?' once':'');
    el.dataset.i=g.i; el.innerHTML=goalCardHTML(g);
    board.appendChild(el);
    const c={el,slot:null,fromSlot:null,homeX:0,homeY:0,idx:g.i}; el._c=c; cards.push(c);
  });
  // Restore a saved rank only if the goal COUNT is unchanged — add/remove shifts
  // indices, so a structural change cleanly resets the board to the tray.
  try{
    const saved=JSON.parse(localStorage.getItem(RANK_KEY)||'null');
    if(saved && saved.n===list.length && Array.isArray(saved.order)){
      saved.order.forEach((gi,si)=>{
        if(gi==null) return;
        const c=cards.find(c=>c.idx===gi), s=slots[si];
        if(c && s && !s.card && c.slot===null){ s.card=c; c.slot=s; s.el.classList.add('filled'); }
      });
    }
  }catch{}
  function saveRank(){
    try{ localStorage.setItem(RANK_KEY, JSON.stringify({n:list.length, order:slots.map(s=>s.card?s.card.idx:null)})); }catch{}
  }
  // Ladder column (the ranked priority list, left) vs the tray of goals still to
  // place. The tray sits just right of the ladder and fills a column top→bottom,
  // then wraps to a NEW column to the right when it runs out of vertical room —
  // so adding goals never overflows below the board (no scroll). Both column
  // origins are set by layout() and read by the drop logic (judged by region).
  const COLGAP=42;
  let ladderX=140, trayX=0, perCol=6;
  function layout(){
    const H=board.clientHeight;
    const startY=44;                                  // top-aligned so the column packs (room for labels above)
    perCol=Math.max(1, Math.floor((H-startY-CH)/(CH+GAP))+1);
    trayX=ladderX+CW+56;                              // first tray column, just right of the ladder
    slots.forEach((s,i)=>{ s.x=ladderX; s.y=startY+i*(CH+GAP); s.el.style.left=s.x+'px'; s.el.style.top=s.y+'px'; });
    traylab.style.left=trayX+'px'; traylab.style.top=(startY-28)+'px';
    cards.forEach((c,i)=>{
      const col=Math.floor(i/perCol), row=i%perCol;   // fill down, then wrap right
      c.homeX=trayX+col*(CW+COLGAP); c.homeY=startY+row*(CH+GAP);
      if(c.slot){ c.el.style.left=c.slot.x+'px'; c.el.style.top=c.slot.y+'px'; }
      else      { c.el.style.left=c.homeX+'px';  c.el.style.top=c.homeY+'px'; }
    });
  }
  layout();
  // Re-layout on board resize; one observer at a time (renderInputs disconnects).
  window.__gObs = new ResizeObserver(layout); window.__gObs.observe(board);

  // ── Inline editing (local; preserves the drag rank — no board rebuild) ──
  const refreshHero=()=>{ if(lead) lead.innerHTML=goalsHeroHTML(); };
  board.addEventListener('input', e=>{
    const inp=e.target.closest('[data-f]'); if(!inp) return;
    e.stopPropagation();                       // don't double-fire the global liveCommas
    if(inp.classList.contains('g-amt-in')) liveCommas(inp);
  });
  board.addEventListener('change', e=>{
    const inp=e.target.closest('[data-f]'); if(!inp) return;
    e.stopPropagation();                       // value edits stay local (rank intact)
    const i=+inp.closest('.g-card').dataset.i, f=inp.dataset.f, type=inp.dataset.type;
    let val;
    if(type==='money')    val=Math.round(parseFloat(String(inp.value).replace(/[^0-9.]/g,''))||0);
    else if(type==='num') val=parseInt(inp.value,10)||0;
    else                  val=inp.value;
    if(plan.goals[i]){ plan.goals[i][f]=val; if(inp.dataset.sync) plan.goals[i][inp.dataset.sync]=val; }
    refreshHero();
    reseedScenarios(); buildLevers(); sharedPaths=null; plansDirty=true;
    $('#status').textContent='Plan edited · open Scenarios';
  });

  // ── Drag / snap / swap (skip when the pointer lands on an editable control) ──
  let active=null,offX=0,offY=0;
  // Drop by REGION, not a radius: if the card's centre sits on the ladder side of
  // the midline between the two columns, it lands in the nearest slot by height
  // (so a near-miss still ranks, never bounces); on the tray side it un-ranks.
  const dropTarget=(cx,cy)=>{
    if(cx >= (ladderX+CW + trayX)/2) return null;        // tray side → unplaced
    let best=slots[0],bd=1e9;                             // ladder side → nearest by Y
    slots.forEach(s=>{ const d=Math.abs(cy-(s.y+CH/2)); if(d<bd){bd=d;best=s;} });
    return best;
  };
  const moveTo=(c,x,y)=>{ c.el.style.transition=SNAP; c.el.style.left=x+'px'; c.el.style.top=y+'px'; };
  const fillSlot=(c,s,flash)=>{ s.card=c; c.slot=s; s.el.classList.add('filled'); if(flash){ s.el.classList.add('flash'); setTimeout(()=>s.el.classList.remove('flash'),520); } };
  board.addEventListener('pointerdown',e=>{
    if(e.target.closest('input,button,select')) return;   // let edits/delete work
    const el=e.target.closest('.g-card'); if(!el) return;
    active=el._c; active.fromSlot=active.slot; el.classList.add('drag');
    el.style.transition='box-shadow .16s,transform .12s'; el.setPointerCapture(e.pointerId);
    offX=e.clientX-el.offsetLeft; offY=e.clientY-el.offsetTop;
    if(active.slot){ active.slot.card=null; active.slot.el.classList.remove('filled'); active.slot=null; }
  });
  board.addEventListener('pointermove',e=>{
    if(!active) return;
    const W=board.clientWidth,H=board.clientHeight;
    const nx=Math.max(8,Math.min(e.clientX-offX,W-CW-8)), ny=Math.max(8,Math.min(e.clientY-offY,H-CH-8));
    active.el.style.left=nx+'px'; active.el.style.top=ny+'px';
    const hit=dropTarget(nx+CW/2,ny+CH/2);
    slots.forEach(s=>s.el.classList.toggle('hot',s===hit));
  });
  board.addEventListener('pointerup',()=>{
    if(!active) return;
    const a=active,el=a.el,cx=el.offsetLeft+CW/2,cy=el.offsetTop+CH/2;
    const hit=dropTarget(cx,cy);
    if(hit){
      if(hit.card){ const other=hit.card;
        if(a.fromSlot){ moveTo(other,a.fromSlot.x,a.fromSlot.y); fillSlot(other,a.fromSlot,false); }
        else          { moveTo(other,other.homeX,other.homeY); other.slot=null; }
      }
      moveTo(a,hit.x,hit.y); fillSlot(a,hit,true);
    }else{
      // Dropped clear of every slot → return it to the tray (un-rank it). The
      // slot it came from was already cleared on pointerdown, so this both
      // re-homes the card and frees its old slot.
      moveTo(a,a.homeX,a.homeY); a.slot=null;
    }
    el.classList.remove('drag'); slots.forEach(s=>s.el.classList.remove('hot')); active=null;
    saveRank();
  });
}

/* ── Sub-page render + wiring ─────────────────────────────────────
   One renderInputs() drives whichever sub-page is active. Re-renders on
   sub-nav click, on field change, and on row delete — same wiring pattern
   as before so live-commas / scenario re-seeding / plansDirty all still
   work without per-layout duplication. */
function renderInputs(){
  // sub-nav active state
  $$('#np-subnav .stab').forEach(b => b.classList.toggle('on', b.dataset.sub===activeSub));
  // Drop any prior board resize-observer before the shell is replaced.
  if(window.__gObs){ window.__gObs.disconnect(); window.__gObs=null; }
  const layout = SUB_PAGES[activeSub].layout;
  const np = $('#np-content');
  np.classList.toggle('g-mode', layout==='board');
  // Snapshot is its own diagnostic page again — embedding it on the Net Worth
  // page made that page too busy to read.
  const html = layout==='statement' ? renderStatement()
             : layout==='snapshot'  ? `<div class="np-snapshot-page">${renderSnapshot()}</div>`
             : layout==='board'     ? renderGoalsBoard()
             :                        renderHybrid(activeSub);
  np.innerHTML = html;
  if(layout==='board') initGoalsBoard();
}
// ── Net Worth input bindings — delegated on the stable #np-content ────────────
// Input listeners are set once here so re-renders via renderInputs() (which
// replaces #np-content children) never accumulate orphaned listeners.

// ── All Net Worth interactions — delegated on the stable #np-content ─────────
$('#np-content').addEventListener('click', e => {
  // Row delete (×)
  const rx = e.target.closest('.row-x');
  if(rx){
    const path = rx.dataset.rmpath;
    const ks = path.split('.'); const last = ks.pop();
    let t = plan; for(const k of ks){ if(t==null) return; t=t[k]; }
    // Array rows splice (no holes); object keys delete.
    if(Array.isArray(t)) t.splice(+last, 1);
    else if(t!=null) delete t[last];
    reseedScenarios(); buildLevers();
    sharedPaths = null; plansDirty = true;
    renderInputs();
    $('#status').textContent='Plan edited · open Scenarios';
    return;
  }
  // "+ add …" — push a default row onto the backing array, then re-render.
  const adder = e.target.closest('[data-add]');
  if(adder){
    const kind = adder.dataset.add;
    const k = ROW_KINDS[kind];
    if(k){
      const arr = getPath(plan, k.arr);
      if(Array.isArray(arr)) arr.push(k.mk());
      else setPath(plan, k.arr, [k.mk()]);
      commitPlanEdit();
    }
    return;
  }
  // Account type chip
  const chip = e.target.closest('.acct-chip');
  if(chip){
    acctSel = { label: chip.dataset.label, bucket: chip.dataset.bucket };
    $$('#np-content .acct-chip').forEach(c => c.classList.toggle('sel', c === chip));
    const btn = $('#np-content .acct-add');
    if(btn){ btn.disabled = false; btn.textContent = 'Add ' + acctSel.label; }
    return;
  }
  if(e.target.closest('.acct-add')){
    if(!acctSel) return;
    const amtEl = $('#np-content .acct-amt');
    const bal = parseFloat(String(amtEl ? amtEl.value : '').replace(/[^0-9.]/g, ''));
    if(!isFinite(bal) || bal <= 0){
      if(amtEl){ amtEl.focus(); amtEl.style.outline='2px solid var(--negative)'; setTimeout(()=>amtEl.style.outline='',1500); }
      return;
    }
    if(!plan.portfolio.extraAccounts) plan.portfolio.extraAccounts = [];
    plan.portfolio.extraAccounts.push({ type: acctSel.label, bucket: acctSel.bucket, balance: Math.round(bal) });
    acctSel = null;
    commitPlanEdit();
    return;
  }
  const rm = e.target.closest('.acct-x');
  if(rm){
    // Core bucket: zero the balance (+ its basis) so the row drops off the sheet
    // but the engine bucket survives. Picker-added accounts: splice from the list.
    if(rm.dataset.zeropath){
      setPath(plan, rm.dataset.zeropath, 0);
      if(rm.dataset.zerobasis) setPath(plan, rm.dataset.zerobasis, 0);
      commitPlanEdit();
      return;
    }
    const i = +rm.dataset.acctidx;
    if(plan.portfolio.extraAccounts) plan.portfolio.extraAccounts.splice(i, 1);
    commitPlanEdit();
  }
});
// Live commas on money fields.
$('#np-content').addEventListener('input', e => {
  if(e.target.dataset.type === 'money') liveCommas(e.target);
});
$('#np-content').addEventListener('change', e => {
  // Field edits (data-path bindings)
  const path = e.target.dataset.path, type = e.target.dataset.type;
  if(path){
    const raw = e.target.value;
    if(type==='text'){            // free-text row labels (income/expense/goal/property names)
      setPath(plan, path, raw);
      reseedScenarios(); buildLevers(); sharedPaths=null; plansDirty=true; renderInputs();
      $('#status').textContent='Plan edited · open Scenarios';
      return;
    }
    let v;
    if(type==='money')      v = parseFloat(String(raw).replace(/[^0-9.]/g,''));
    else if(type==='risk')  v = +raw;
    else                    v = parseFloat(raw);
    if(!isFinite(v)) return;
    if(type==='pct')   v = Math.max(0, Math.min(100, v))/100;
    if(type==='gpct')  v = Math.max(-20, Math.min(20, v))/100;   // signed growth %/yr
    if(type==='money'){ v = Math.max(0, Math.round(v)); e.target.value = v.toLocaleString('en-US'); }
    setPath(plan, path, v);
    // A one-time goal edits a single "at age": mirror it into endAge so the
    // engine's window is exactly that year.
    if(e.target.dataset.sync) setPath(plan, e.target.dataset.sync, v);
    reseedScenarios();
    buildLevers();
    sharedPaths = null;
    plansDirty = true;
    renderInputs();
    $('#status').textContent='Plan edited · open Scenarios';
    return;
  }
  // Extra-account balance edit
  const bal = e.target.closest('.acct-bal');
  if(!bal) return;
  const i = +bal.dataset.acctidx;
  const v = Math.max(0, Math.round(parseFloat(String(bal.value).replace(/[^0-9.]/g, '')) || 0));
  if(plan.portfolio.extraAccounts && plan.portfolio.extraAccounts[i]){
    plan.portfolio.extraAccounts[i].balance = v;
    commitPlanEdit();
  }
});

// Pension slider range is PER-HOUSEHOLD: it spans only the ages the advisor has
// actually quoted a benefit for (the keys of benefitByAge). This means the
// slider can never wander onto an age with no number — so it can't silently pay
// $0. Enter a new quote (e.g. age 67) and the slider grows to include it on the
// next render. Falls back to a sane window if nothing is entered yet.
function pensionAges(){
  const m=(plan.income.pension && plan.income.pension.benefitByAge) || {};
  return Object.keys(m).map(Number).filter(n=>!isNaN(n)).sort((a,b)=>a-b);
}
// Effective slider range for a lever. Pension is dynamic; everything else is
// the static min/max declared in LEVCFG.
function levRange(cfg){
  if(cfg.key==='pensionAge'){
    const a=pensionAges();
    if(a.length) return { min:a[0], max:a[a.length-1], step:1 };
    return { min:62, max:65, step:1 };
  }
  return { min:cfg.min, max:cfg.max, step:cfg.step };
}

/* ── lever display config (label, formatter, slider range→value & back) ── */
const LEVCFG=[
  {key:'retireAge', name:'Retirement Age', min:55,max:72,step:1, fmt:v=>[v,'']},
  {key:'ssAge',     name:'SS Start Age',   min:62,max:70,step:1, fmt:v=>[v,'']},
  // All dollar levers render full digits with comma grouping — no abbreviations.
  // The advisor wants to see the exact number they're proposing, not a rounded
  // shorthand. Step values stay round so the slider snaps cleanly.
  // Spending is stored ANNUAL (the engine's unit) but shown/edited MONTHLY —
  // clients know their monthly number off-hand. edit:'monthly' wires the box.
  {key:'spend',     name:'Lifestyle Spending',min:80000,max:360000,step:1200, edit:'monthly', fmt:v=>['$'+Math.round(v/12).toLocaleString('en-US'),'/mo']},
  // One-time event carries BOTH an amount and an age; edit:'event' renders the
  // two type-in boxes (amount + age) alongside the amount slider.
  {key:'eventAmt',  name:'One-Time Event', min:0,max:500000,step:5000, edit:'event', fmt:(v,L)=>['$'+(v||0).toLocaleString('en-US'),'@ '+L.eventAge]},
  // Buy a property — a one-time purchase at a chosen age, with an optional
  // "fund by selling primary" toggle (shown only when the household owns one).
  // A common what-if (vacation/second home), so it lives on the lever surface,
  // not the base plan.
  {key:'buyAmt',    name:'Buy Property',   min:0,max:2000000,step:25000, edit:'buy', fmt:(v,L)=>['$'+(v||0).toLocaleString('en-US'),'@ '+L.buyAge]},
  {key:'risk',      name:'Allocation',     min:1,max:5,step:1, fmt:v=>[RISK_LABELS[v],'']},
  {key:'savings',   name:'Savings / yr',   min:0,max:200000,step:1000, edit:'money', fmt:v=>['$'+v.toLocaleString('en-US'),'/yr']},
  // Pension snaps between the ages that actually have entered amounts (62, 65).
  // Label shows the dollar value the engine will pay for that age — if no entry
  // exists for that age, it shows "—" (and the engine pays 0).
  // Pension claim age. Range spans the realistic window; the displayed dollar
  // amount comes from whatever the advisor has entered for that exact age.
  // No entry yet → the value spot becomes an inline input (handled in
  // renderLevValue, not here). This is the truth-source contract surfacing
  // naturally as a UI affordance: "we don't have a number for this age, give
  // us one." Not an error — just the next input.
  {key:'pensionAge', name:'Pension',       min:55,max:70,step:1, fmt:v=>{
    const m=(plan.income.pension && plan.income.pension.benefitByAge) || {};
    const amt=m[v]; return (amt && amt>0) ? ['$'+amt.toLocaleString('en-US'),'@ '+v] : ['__needs__', v];
  }},
];
let running=false;
// Cached market bundle. Generated once, reused across Runs so that hitting Run
// twice with no changes yields the EXACT same numbers (sampling noise was
// causing the % to drift between identical clicks). Invalidated to null
// whenever the plan changes in the Inputs tab.
let sharedPaths=null;

/* ── run the engine for all three columns (shared nothing; each its own MC) ── */
function runAll(){
  if(running) return; running=true;
  const btn=$('#run-btn'); btn.disabled=true; $('#status').textContent='Running…';
  setTimeout(()=>{
    try{
      // SHARED PATHS: one bundle of return paths, reused across scenarios AND
      // across Runs. Within a Run, every column sees the SAME markets (any
      // difference between columns is the DECISION). Across Runs, the bundle
      // is cached so identical inputs give an identical % — no noise drift.
      const horizon = plan.household.primary.planEndAge - plan.household.primary.currentAge;
      const iters = plan.simulation.iterations;
      // Degenerate plan guard: a non-positive horizon (plan-end age at/below
      // current age) can't be simulated. Surface a clear reason and bail
      // WITHOUT nuking the last good results, so the views don't go blank.
      if(!(horizon > 0)){
        $('#status').textContent='Check plan: end age must be after current age';
        btn.disabled=false; running=false; return;
      }
      if(!sharedPaths || sharedPaths.length !== iters || sharedPaths[0].length !== horizon){
        resetSeed();              // fixed seed → identical bundle every load, no % drift
        sharedPaths = [];
        for(let i=0;i<iters;i++) sharedPaths.push(generateReturnPath(horizon));
      }
      // Isolate each scenario: one bad column (e.g. an out-of-range saved lever)
      // must not abort the whole Run and blank every other column + the cash
      // flow drawer. Failed scenarios get res=null and are skipped downstream.
      let failed=0;
      scenarios.forEach(s=>{
        try{
          const p=planForScenario(s.lev);
          const ov=leversToOverrides(s.lev);
          s.res=runSimulation(p, ov, sharedPaths);
        }catch(err){ s.res=null; failed++; console.error('Scenario failed:', s.name, err); }
      });
      renderBand(); renderSolvePanel(); renderFoot(); renderCashflow(); buildSeqSelect(); runSeq();
      $('#status').textContent = failed ? `Complete · ${failed} scenario${failed>1?'s':''} could not run` : 'Complete';
    }catch(e){ $('#status').textContent='Error'; console.error(e); }
    btn.disabled=false; running=false;
  },20);
}

/* ── render: sticky band of circles ── */
// Success ring color band: steel-teal (strong) / brass (caution) /
// clay (at risk). No green — matches the Obsidian Brass result tokens.
// Ring band matches the % number: deep green / bronze gold / deep burgundy.
function ringColor(pct){ return pct>=80?'#7AA76C':pct>=71?'#D8B371':'#5E1916'; }
function ring(pct){
  // SVG fills its .circle-wrap via viewBox, so the ring size is controlled by
  // CSS (one place). Thin stroke near the edge leaves room for the % number.
  const r=45,c=2*Math.PI*r,off=c*(1-pct/100);
  const col=ringColor(pct);
  return `<svg viewBox="0 0 100 100" width="100%" height="100%">
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="rgba(255,255,255,.13)" stroke-width="4"/>
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="${col}" stroke-width="4" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 50 50)" style="transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)"/></svg>`;
}
// The band / levers / foot are CSS grids whose column count must match the
// number of scenarios. One place sets it (label gutter + N equal columns) so
// adding/removing a scenario reflows all three rows together.
function syncGridCols(){
  const tpl=`148px repeat(${scenarios.length},1fr)`;
  ['#scn-band','#scn-levers','#scn-goals','#scn-foot'].forEach(sel=>{
    const el=$(sel); if(el) el.style.gridTemplateColumns=tpl;
  });
}
function renderBand(){
  syncGridCols();
  let h=`<div class="band-cell label"><span>Scenario</span></div>`;
  scenarios.forEach((s,ci)=>{
    const sr=s.res?s.res.successRate:0;
    const col= sr>=80?'#7AA76C':sr>=71?'#D8B371':'#5E1916';
    // Header: a small identity dot (column color) + the name. Baseline's name is
    // locked (the anchor); other scenarios render an inline editable field so the
    // advisor can label them ("Retire at 62"). A ✕ removes non-baseline columns.
    const dot=`<span class="col-dot" style="background:${colorFor(ci)}"></span>`;
    const nameEl = s.base
      ? `<span class="col-name base-tag">${dot}${escHtml(s.name)}</span>`
      : `<span class="col-name">${dot}<input class="col-rename" data-col="${ci}" value="${escHtml(s.name)}" maxlength="28" aria-label="Scenario name"><button class="col-x" data-col="${ci}" title="Remove scenario">✕</button></span>`;
    h+=`<div class="band-cell ${s.base?'base':''}">
      ${nameEl}
      <div class="circle-wrap">${ring(sr)}
        <div class="circle-val"><span class="big" style="color:${col}">${sr.toFixed(1)}%</span><span class="lbl">Success</span></div></div>
    </div>`;
  });
  // Label gutter: just buttons. The solver FORM renders in the full-width
  // #solve-panel below the band (it needs room — the gutter is only ~148px).
  const addBtn = scenarios.length < MAX_SCENARIOS
    ? `<button class="add-scen" title="Add scenario">+ Add</button>` : '';
  const gut = `<span>Scenario</span>${addBtn}
    <button class="solve-btn" title="Find the least-disruptive path to a goal">✦ Solve…</button>`;
  h=h.replace('<span>Scenario</span>', gut);
  $('#scn-band').innerHTML=h;
}

/* ── render: lever grid (built once, values update in place) ── */
// Format a single lever value into the inner HTML for its display span.
// Special return ['__needs__', age] from a fmt() means "no entered amount for
// this age yet" — render an inline input so the advisor can type one in
// without leaving the lever. Plain numbers/strings render as before.
// Neutral delta-vs-baseline chip — the COMPARISON cue (Scenarios = compare
// choices). No good/bad coloring: later retirement isn't "better," it's a
// trade-off, so the chip stays a muted, opinion-free tone. Empty on the
// baseline column and wherever a lever matches baseline.
function levDelta(cfg, lev){
  const baseLev = scenarios.find(s=>s.base)?.lev;
  if(!baseLev || lev===baseLev) return '';
  const d = (lev[cfg.key]||0) - (baseLev[cfg.key]||0);
  if(!d) return '';
  const sign = d>0 ? '+' : '−', a = Math.abs(d);
  let txt;
  if(cfg.key==='spend')                 txt = `${sign}$${Math.round(a/12).toLocaleString('en-US')}/mo`;
  else if(cfg.key==='savings' || cfg.key==='eventAmt' || cfg.key==='buyAmt') txt = `${sign}$${a.toLocaleString('en-US')}`;
  else if(cfg.key==='risk')             txt = `${sign}${a} lvl`;
  else /* ages */                       txt = `${sign}${a} yr`;
  return `<span class="lev-delta">${txt}</span>`;
}
// Stepper buttons for the discrete levers (ages / allocation / pension). The
// click handler derives the column from the enclosing #lv-… span, so the
// buttons only carry key + direction. ml:auto pins them right when there's no
// delta chip to do it.
function stepper(cfg, pinRight){
  return `<span class="lev-step"${pinRight?' style="margin-left:auto"':''}>`
       + `<button class="step-btn" data-dir="-1" data-key="${cfg.key}" tabindex="-1">−</button>`
       + `<button class="step-btn" data-dir="1" data-key="${cfg.key}" tabindex="-1">+</button></span>`;
}
function renderLevValue(cfg, lev){
  const [val,unit]=cfg.fmt(lev[cfg.key], lev);
  if(val==='__needs__'){
    return `$<input class="pen-in" type="text" inputmode="numeric" data-pen-age="${unit}"> <span class="unit">@ ${unit}</span>${stepper(cfg,true)}`;
  }
  const d = levDelta(cfg, lev);
  // Type-in boxes for the dollar/age levers. The box edits the same value the
  // slider drives — both stay in sync. data-edit tells the input handler how to
  // interpret the typed number (monthly→annual, plain money, or event age).
  if(cfg.edit==='monthly'){
    const mo=Math.round(lev[cfg.key]/12);
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="monthly" data-key="${cfg.key}" value="${mo.toLocaleString('en-US')}"> <span class="unit">/mo</span>${d}`;
  }
  if(cfg.edit==='money'){
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="money" data-key="${cfg.key}" value="${(lev[cfg.key]||0).toLocaleString('en-US')}"> <span class="unit">${unit}</span>${d}`;
  }
  if(cfg.edit==='event'){
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="eventAmt" data-key="eventAmt" value="${(lev.eventAmt||0).toLocaleString('en-US')}">`
         + ` <span class="unit">@ age</span> `
         + `<input class="lev-in age-in" type="text" inputmode="numeric" data-edit="eventAge" data-key="eventAge" value="${lev.eventAge}">${d}`;
  }
  if(cfg.edit==='buy'){
    // Amount + age, then (only when the household owns a property) a toggle to
    // fund the purchase by selling the primary. The toggle is meaningful only
    // once an amount is set, so it shows when buyAmt > 0.
    let h = `$<input class="lev-in" type="text" inputmode="numeric" data-edit="buyAmt" data-key="buyAmt" value="${(lev.buyAmt||0).toLocaleString('en-US')}">`
          + ` <span class="unit">@ age</span> `
          + `<input class="lev-in age-in" type="text" inputmode="numeric" data-edit="buyAge" data-key="buyAge" value="${lev.buyAge}">${d}`;
    if((plan.properties||[]).length && (lev.buyAmt||0) > 0){
      h += `<button class="lev-fund${lev.buyFromPrimary?' on':''}" data-key="buyFromPrimary" title="Fund this purchase by selling the primary residence">↳ sell primary to fund</button>`;
    }
    return h;
  }
  // Discrete levers (ages / allocation): value + delta + stepper buttons.
  return `${val}${unit?` <span class="unit">${unit}</span>`:''}${d}${stepper(cfg, !d)}`;
}
// A lever is "dollar" (keeps a draggable slider) when it has an edit type;
// the discrete levers (ages / allocation / pension) use steppers + a static bar.
const isDollarLever = cfg => !!cfg.edit;
// Where the value sits inside its range, 0–100% — drives both the slider fill
// and the static bar fill/dot so every bar reads the same way down a row.
function barFillPct(cfg, L){
  const r=levRange(cfg), v=Math.max(r.min,Math.min(r.max,L[cfg.key]||r.min));
  return r.max>r.min ? ((v-r.min)/(r.max-r.min))*100 : 0;
}
// Refresh one cell in place after its value changed: value text + the bar
// (slider position+fill for dollar levers, fill+dot for discrete ones).
function updateCell(ci, cfg){
  const L=scenarios[ci].lev, span=$(`#lv-${ci}-${cfg.key}`); if(!span) return;
  span.innerHTML=renderLevValue(cfg, L);
  const pct=barFillPct(cfg,L), cell=span.parentElement;
  const sl=cell.querySelector('.lev-slider');
  if(sl){ const r=levRange(cfg); sl.value=Math.max(r.min,Math.min(r.max,L[cfg.key])); sl.style.setProperty('--fill',pct+'%'); }
}
// Commit a lever change: editing the baseline shifts every other column's
// delta, so rebuild the whole grid then; otherwise just refresh the one cell.
function commitLever(ci, cfg){
  if(scenarios[ci].base) buildLevers(); else updateCell(ci, cfg);
  $('#status').textContent='Adjusted · Run to update';
  saveScenarios();
}
function buildLevers(){
  syncGridCols();
  let h='';
  LEVCFG.forEach(cfg=>{
    h+=`<div class="lev-name">${cfg.name}</div>`;
    const r=levRange(cfg);
    scenarios.forEach((s,ci)=>{
      const last=ci===scenarios.length-1?'col-last':'';
      const pct=barFillPct(cfg,s.lev);
      const bar = isDollarLever(cfg)
        ? `<input class="lev-slider ${s.base?'base-lock':''}" type="range" min="${r.min}" max="${r.max}" step="${r.step}"
                 value="${Math.max(r.min,Math.min(r.max,s.lev[cfg.key]))}" data-col="${ci}" data-key="${cfg.key}" style="--fill:${pct}%">`
        : '';
      h+=`<div class="lev-cell ${s.base?'base':''} ${last}">
        <span class="lev-val ${s.base?'base':''}" id="lv-${ci}-${cfg.key}">${renderLevValue(cfg,s.lev)}</span>
        ${bar}
      </div>`;
    });
  });
  $('#scn-levers').innerHTML=h;
  renderScenGoals();
}
// Goals section — READ-ONLY mirror of the base-plan goals across every column.
// Goals live in the base plan (single source of truth); each scenario carries
// the same set, so the value is identical down each row. That sameness IS the
// truth — the goal is funded in every scenario. Edited only on the Goals page.
function renderScenGoals(){
  const host=$('#scn-goals'); if(!host) return;
  syncGridCols();
  const goals=(Array.isArray(plan.goals)?plan.goals:[]).filter(g=>(g.amount||0)>0);
  // Section header row: a gold "Goals" label in the gutter + a tinted header
  // cell per column so the section reads as a block under the levers.
  let h=`<div class="sg-head">Goals</div>`;
  scenarios.forEach(s=>{ h+=`<div class="sg-head sg-col ${s.base?'base':''}"></div>`; });
  if(!goals.length){
    h+=`<div class="sg-empty">No goals yet — add them on the Goals page to see them here.</div>`;
    host.innerHTML=h; return;
  }
  // One row per goal: name + age window in the gutter, the amount mirrored in
  // every scenario column (recurring → /yr, single-year window → one-time).
  let totRec=0, totOnce=0;
  goals.forEach(g=>{
    const once=(g.startAge===g.endAge);
    const win = once ? `at age ${g.startAge}` : `age ${g.startAge}–${g.endAge}`;
    const tag = once ? 'one-time' : '/yr';
    if(once) totOnce+=(g.amount||0); else totRec+=(g.amount||0);
    h+=`<div class="sg-name">${escHtml(g.name||'Goal')}<span class="sg-win">${win}</span></div>`;
    scenarios.forEach(s=>{
      h+=`<div class="sg-cell ${s.base?'base':''}">$${(g.amount||0).toLocaleString('en-US')}<span class="sg-tag">${tag}</span></div>`;
    });
  });
  // Total row: recurring annual goal spend (the steady draw), with any one-time
  // total noted alongside so a single spike isn't hidden inside the annual line.
  const totTxt = `$${totRec.toLocaleString('en-US')}`
    + (totOnce>0 ? ` <span class="sg-tag">+ $${totOnce.toLocaleString('en-US')} one-time</span>` : '');
  h+=`<div class="sg-total">Annual goal spend</div>`;
  scenarios.forEach(s=>{ h+=`<div class="sg-tcell ${s.base?'base':''}">${totTxt}</div>`; });
  host.innerHTML=h;
}
// Stepper buttons for the discrete levers (delegated — survives rebuilds).
$('#scn-levers').addEventListener('click', e=>{
  // "Sell primary to fund" toggle on the Buy Property lever.
  const fund=e.target.closest('.lev-fund');
  if(fund){
    const span=fund.closest('[id^="lv-"]'); if(!span) return;
    const ci=+span.id.split('-')[1], L=scenarios[ci].lev;
    L.buyFromPrimary=!L.buyFromPrimary;
    updateCell(ci, LEVCFG.find(c=>c.key==='buyAmt'));
    $('#status').textContent='Adjusted · Run to update'; saveScenarios();
    return;
  }
  const btn=e.target.closest('.step-btn'); if(!btn) return;
  const span=btn.closest('[id^="lv-"]'); if(!span) return;
  const ci=+span.id.split('-')[1], cfg=LEVCFG.find(c=>c.key===btn.dataset.key);
  const r=levRange(cfg), L=scenarios[ci].lev;
  L[cfg.key]=Math.max(r.min, Math.min(r.max, (L[cfg.key]||r.min) + (+btn.dataset.dir)*r.step));
  // Grabbing the pension age unlinks it; moving retirement age re-syncs an
  // auto-linked pension and refreshes that cell too.
  if(cfg.key==='pensionAge') L.pensionAuto=false;
  if(cfg.key==='retireAge' && L.pensionAuto){ syncPension(L); if(!scenarios[ci].base) updateCell(ci, LEVCFG.find(c=>c.key==='pensionAge')); }
  commitLever(ci, cfg);
});
// Inline pension-amount inputs are inserted dynamically when a slider lands on
// an age with no entered benefit, so a direct per-element listener (re-bound
// only at buildLevers time) would miss them. Delegate from #scn-levers once.
// Typed value writes into the plan's benefit-by-age map for that exact age,
// then every column refreshes (the amount is reference data shared across
// scenarios — the DECISION is the age, not the amount).
// ── Scenario header: rename / add / remove (delegated on #scn-band) ──
$('#scn-band').addEventListener('input', e=>{
  if(e.target.classList && e.target.classList.contains('col-rename')){
    const ci=+e.target.dataset.col;
    if(scenarios[ci]) scenarios[ci].name=e.target.value;   // live; persisted on change
  }
});
$('#scn-band').addEventListener('change', e=>{
  if(e.target.classList && e.target.classList.contains('col-rename')){
    const ci=+e.target.dataset.col;
    let nm=e.target.value.trim();
    if(!nm){ nm=`Scenario ${String.fromCharCode(65+ci)}`; e.target.value=nm; }  // never blank
    if(scenarios[ci]) scenarios[ci].name=nm;
    saveScenarios();
    // Cash-flow header + Sequencing selector read names — refresh those.
    renderCashflow(); buildSeqSelect();
  }
});
$('#scn-band').addEventListener('click', e=>{
  const x=e.target.closest('.col-x');
  if(x){ removeScenario(+x.dataset.col); return; }
  if(e.target.closest('.add-scen')){ addScenario(); return; }
  if(e.target.closest('.solve-btn')){ solverFormOpen = true; renderSolvePanel(); return; }
});
// Solver goal form lives in #solve-panel (full-width). Live commas on $ boxes;
// changing the pin dropdown re-renders its value input (age box vs $ box).
$('#solve-panel').addEventListener('input', e=>{
  if(e.target.classList?.contains('sf-money')) liveCommas(e.target);
});
$('#solve-panel').addEventListener('change', e=>{
  if(e.target.id === 'sf-goal'){
    const baseLev = scenarios.find(s=>s.base)?.lev || defaultLevers();
    const baseSucc = scenarios.find(s=>s.base)?.res?.successRate || 85;
    const defPct = Math.min(95, Math.ceil((baseSucc+1)/5)*5);
    const wrap = $('#sf-params');
    if(wrap) wrap.innerHTML = goalParamsHtml(e.target.value, baseLev, defPct);
  }
});
$('#solve-panel').addEventListener('submit', e=>{
  const f = e.target.closest('#solver-form');
  if(!f) return;
  e.preventDefault();
  const pct = parseFloat($('#sf-pct')?.value);
  if(!isFinite(pct) || pct<50 || pct>99) return;
  const goalType = $('#sf-goal')?.value || 'confidence';
  const num = id => parseInt(($(id)?.value||'').replace(/[^0-9]/g,''), 10);
  const params = { pct };
  const {currentAge, planEndAge} = plan.household.primary;
  const flashAge = id => { const el=$(id); if(el){ el.style.outline='2px solid var(--negative)'; el.focus(); setTimeout(()=>el.style.outline='',1500); } };
  if(goalType==='retire'){
    params.age = num('#sf-p-age');
    if(!isFinite(params.age)) return;
    if(params.age <= currentAge || params.age > planEndAge){ flashAge('#sf-p-age'); return; }
  } else if(goalType==='purchase'){
    params.amount = num('#sf-p-amount'); params.age = num('#sf-p-age');
    if(!isFinite(params.amount)||!isFinite(params.age)) return;
    if(params.age <= currentAge || params.age > planEndAge){ flashAge('#sf-p-age'); return; }
  } else if(goalType==='gift'){
    params.amount = num('#sf-p-amount'); params.toAge = num('#sf-p-toage');
    if(!isFinite(params.amount)||!isFinite(params.toAge)) return;
    if(params.toAge <= currentAge || params.toAge > planEndAge){ flashAge('#sf-p-toage'); return; }
  } else if(goalType==='legacy'){
    params.amount = num('#sf-p-amount'); if(!isFinite(params.amount)) return;
  }
  runSolve(goalType, params);
});
// Solver panel: Cancel (form), Clear (results), and per-lever "Load" actions.
document.addEventListener('click', e=>{
  if(e.target.closest('#sf-cancel')){
    solverFormOpen = false; renderSolvePanel(); return;
  }
  if(e.target.closest('#solve-clear-btn')){
    solverResults = null; solverSearching = false;
    comboResults = null; comboOpen = false; comboSearching = false;
    renderSolvePanel(); return;
  }
  // Fold-down: open runs the (heavy) combo search once and caches it; toggle off
  // just collapses. The cache is reused on re-open until the solo solve changes.
  if(e.target.closest('#combo-toggle')){
    comboOpen = !comboOpen;
    if(comboOpen && !comboResults && !comboSearching) runComboSolve();  // renders itself
    else renderSolvePanel();
    return;
  }
  const loadBtn = e.target.closest('.solve-load');
  if(loadBtn && solverResults && solverResults.rows){
    if(scenarios.length >= MAX_SCENARIOS) return;
    const idx = +loadBtn.dataset.soloIdx;
    const row = solverResults.rows[idx];
    if(!row) return;
    // Scenario = the pinned soloBase with this one lever set to its solo answer.
    const lev = JSON.parse(JSON.stringify(solverResults.soloBase));
    lev[row.key] = row.value;
    syncPension(lev);
    const cfg = LEVCFG.find(c=>c.key===row.key);
    scenarios.push({ name: `${cfg.name} solve`, base:false, lev, res:null });
    solverResults = null; solverSearching = false;
    comboResults = null; comboOpen = false;
    saveScenarios(); buildLevers(); renderBand(); renderSolvePanel(); plansDirty=true; runAll();
  }
  // Load a COMBO: the held-fixed soloBase with both lever moves applied.
  const cLoadBtn = e.target.closest('.cc-load');
  if(cLoadBtn && comboResults && comboResults.combos){
    if(scenarios.length >= MAX_SCENARIOS) return;
    const c = comboResults.combos[+cLoadBtn.dataset.comboIdx];
    if(!c) return;
    const lev = JSON.parse(JSON.stringify(comboResults.soloBase));
    c.items.forEach(m => lev[m.key] = m.val);
    syncPension(lev);
    const nm = comboResults.goalType==='retire' ? `Retire ${comboResults.params.age}`
             : c.items.map(m=>COMBO_SHORT[m.key]).join(' + ');
    scenarios.push({ name: nm.slice(0,28), base:false, lev, res:null });
    solverResults = null; solverSearching = false;
    comboResults = null; comboOpen = false;
    saveScenarios(); buildLevers(); renderBand(); renderSolvePanel(); plansDirty=true; runAll();
  }
});
// Live commas while typing into any inline numeric input (pension + lever boxes).
// Dollar-lever slider: live value update while dragging (delegated — survives buildLevers rebuilds).
$('#scn-levers').addEventListener('input', e=>{
  const t=e.target;
  if(!t.classList) return;
  if(t.classList.contains('pen-in')) liveCommas(t);
  // Age boxes are 2-digit, no commas; dollar boxes get comma grouping.
  else if(t.classList.contains('lev-in') && !t.classList.contains('age-in')) liveCommas(t);
  else if(t.classList.contains('lev-slider')){
    const ci=+t.dataset.col, cfg=LEVCFG.find(c=>c.key===t.dataset.key);
    scenarios[ci].lev[cfg.key]=+t.value;
    t.style.setProperty('--fill', barFillPct(cfg,scenarios[ci].lev)+'%');
    updateCell(ci, cfg);
    $('#status').textContent='Adjusted · Run to update';
  }
});
// Type-in lever boxes (monthly spend / savings / one-time event amount+age).
// Writes the value the slider also drives, then refreshes that cell + status.
// On change (blur/enter) we commit; the column re-runs on the next Run.
// Slider drag-end: persist + rebuild baseline if needed.
$('#scn-levers').addEventListener('change', e=>{
  const t=e.target;
  if(t.classList && t.classList.contains('lev-slider')){
    if(scenarios[+t.dataset.col].base) buildLevers();
    saveScenarios();
    return;
  }
  if(!t.classList || !t.classList.contains('lev-in')) return;
  const span=t.closest('[id^="lv-"]'); if(!span) return;
  const ci=+span.id.split('-')[1];
  const L=scenarios[ci].lev;
  const num=parseFloat(String(t.value).replace(/[^0-9.]/g,''));
  const edit=t.dataset.edit;
  const cfg=LEVCFG.find(c=>c.key===t.dataset.key) || LEVCFG.find(c=>c.edit==='event');
  if(edit==='monthly'){
    if(!isFinite(num)||num<0) return;
    L.spend=Math.round(num*12);                 // store annual; engine's unit
  } else if(edit==='money'){
    if(!isFinite(num)||num<0) return;
    L[t.dataset.key]=Math.round(num);
  } else if(edit==='eventAmt'){
    L.eventAmt=isFinite(num)&&num>0?Math.round(num):0;
  } else if(edit==='eventAge'){
    const a=Math.round(num);
    const lo=plan.household.primary.currentAge, hi=plan.household.primary.planEndAge;
    if(isFinite(a)) L.eventAge=Math.max(lo,Math.min(hi,a));
  } else if(edit==='buyAmt'){
    L.buyAmt=isFinite(num)&&num>0?Math.round(num):0;
    if(L.buyAmt===0) L.buyFromPrimary=false;     // no purchase → funding is moot
  } else if(edit==='buyAge'){
    const a=Math.round(num);
    const lo=plan.household.primary.currentAge, hi=plan.household.primary.planEndAge;
    if(isFinite(a)) L.buyAge=Math.max(lo,Math.min(hi,a));
  }
  // Refresh the cell (value + bar) — rebuilds the grid if the baseline moved.
  const dispCfg=LEVCFG.find(c=>c.key===span.id.split('-').slice(2).join('-'));
  commitLever(ci, dispCfg);
});
