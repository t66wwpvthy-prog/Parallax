  });
}

let running=false;
const PATH_KEY='parallax.pathReplay.v1';
const DEFAULT_PATH_SEED=20260609;
let pathReplay = (()=> {
  try{
    const saved = JSON.parse(localStorage.getItem(PATH_KEY)||'{}');
    return {
      mode: ['typical','stressed','favorable','failed','lowest-survivor','choose'].includes(saved.mode) ? saved.mode : 'typical',
      index: Math.max(0, parseInt(saved.index,10) || 0),
      seed: Math.max(1, parseInt(saved.seed,10) || DEFAULT_PATH_SEED)
    };
  }catch{
    return { mode:'typical', index:0, seed:DEFAULT_PATH_SEED };
  }
})();
function savePathReplay(){
  try{ localStorage.setItem(PATH_KEY, JSON.stringify(pathReplay)); }catch{}
}
// Cached market bundle. Generated once, reused across Runs so that hitting Run
// twice with no changes yields the EXACT same numbers (sampling noise was
// causing the % to drift between identical clicks). Invalidated to null
// whenever the plan changes in the Inputs tab.
let sharedPaths=null;

/* ── run the engine for all three columns (shared nothing; each its own MC) ── */
// ONE seeded bundle of return paths, shared by every surface that compares
// runs (scenario columns, the goals page's per-goal cost runs). Identical
// markets across runs make any difference a pure decision-effect, and the
// fixed seed keeps an unchanged plan at an identical % between Runs.
function ensureSharedPaths(){
  const horizon = plan.household.primary.planEndAge - plan.household.primary.currentAge;
  if(!(horizon > 0)) return null;
  const iters = plan.simulation.iterations;
  if(!sharedPaths || sharedPaths.length !== iters || sharedPaths[0].length !== horizon){
    resetSeed(pathReplay.seed);
    sharedPaths = [];
    for(let i=0;i<iters;i++) sharedPaths.push(generateReturnPath(horizon));
  }
  return sharedPaths;
}
function runAll(){
  if(running) return; running=true;
  const btn=$('#run-btn'); btn.disabled=true; $('#status').textContent='Running…';
  setTimeout(()=>{
    try{
      // SHARED PATHS: one bundle of return paths, reused across scenarios AND
      // across Runs. Within a Run, every column sees the SAME markets (any
      // difference between columns is the DECISION). Across Runs, the bundle
      // is cached so identical inputs give an identical % — no noise drift.
      const horizon = plan.household.primary.planEndAge - plan.household.primary.currentAge;
      const iters = plan.simulation.iterations;
      // Degenerate plan guard: a non-positive horizon (plan-end age at/below
      // current age) can't be simulated. Surface a clear reason and bail
      // WITHOUT nuking the last good results, so the views don't go blank.
      if(!(horizon > 0)){
        $('#status').textContent='Check plan: end age must be after current age';
        btn.disabled=false; running=false; return;
      }
      ensureSharedPaths();
      // Isolate each scenario: one bad column (e.g. an out-of-range saved lever)
      // must not abort the whole Run and blank every other column + the cash
      // flow drawer. Failed scenarios get res=null and are skipped downstream.
      let failed=0;
      scenarios.forEach(s=>{
        try{
          const p=planForScenario(s.lev);
          const ov=leversToOverrides(s.lev);
          s.res=runSimulation(p, ov, sharedPaths);
        }catch(err){ s.res=null; failed++; console.error('Scenario failed:', s.name, err); }
      });
      renderBand(); renderSolvePanel(); renderFoot(); renderCashflow(); renderStory(); renderAssess(); buildSeqSelect(); runSeq();
      $('#status').textContent = failed ? `Complete · ${failed} scenario${failed>1?'s':''} could not run` : 'Complete';
    }catch(e){ $('#status').textContent='Error'; console.error(e); }
    btn.disabled=false; running=false;
  },20);
}

/* ── render: sticky band of circles ── */
// Success-ring band, three status tiers keyed to the success rate:
// strong (positive status) / caution / at-risk (stress).
function ringColor(pct){ return pct>=80?'#7AA76C':pct>=71?'#D8B371':'#5E1916'; }
function ring(pct){
  // SVG fills its .circle-wrap via viewBox, so the ring size is controlled by
  // CSS (one place). Thin stroke near the edge leaves room for the % number.
  const r=45,c=2*Math.PI*r,off=c*(1-pct/100);
  const col=ringColor(pct);
  return `<svg viewBox="0 0 100 100" width="100%" height="100%">
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="rgba(255,255,255,.13)" stroke-width="4"/>
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="${col}" stroke-width="4" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 50 50)" style="transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)"/></svg>`;
}
// The band / levers / foot are CSS grids whose column count must match the
// number of scenarios. One place sets it (label gutter + N equal columns) so
// adding/removing a scenario reflows all three rows together.
function syncGridCols(){
  const tpl=`148px repeat(${scenarios.length},1fr)`;
  ['#scn-band','#scn-levers','#scn-goals','#scn-foot'].forEach(sel=>{
    const el=$(sel); if(el) el.style.gridTemplateColumns=tpl;
  });
}
function renderBand(){
  syncGridCols();
  let h=`<div class="band-cell label"><span>Scenario</span></div>`;
  scenarios.forEach((s,ci)=>{
    const sr=s.res?s.res.successRate:0;
    const col= sr>=80?'#7AA76C':sr>=71?'#D8B371':'#5E1916';
    // Header: a small identity dot (column color) + the name. Baseline's name is
    // locked (the anchor); other scenarios render an inline editable field so the
    // advisor can label them ("Retire at 62"). A ✕ removes non-baseline columns.
    const dot=`<span class="col-dot" style="background:${colorFor(ci)}"></span>`;
    const nameEl = s.base
      ? `<span class="col-name base-tag">${dot}${escHtml(s.name)}</span>`
      : `<span class="col-name">${dot}<input class="col-rename" data-col="${ci}" value="${escHtml(s.name)}" maxlength="28" aria-label="Scenario name"><button class="col-x" data-col="${ci}" title="Remove scenario">✕</button></span>`;
    h+=`<div class="band-cell ${s.base?'base':''}">
      ${nameEl}
      <div class="circle-wrap">${ring(sr)}
        <div class="circle-val"><span class="big" style="color:${col}">${sr.toFixed(1)}%</span><span class="lbl">Success</span></div></div>
    </div>`;
  });
  // Label gutter: just buttons. The solver FORM renders in the full-width
  // #solve-panel below the band (it needs room — the gutter is only ~148px).
  const addBtn = scenarios.length < MAX_SCENARIOS
    ? `<button class="add-scen" title="Add scenario">+ Add</button>` : '';
  const gut = `<span>Scenario</span>${addBtn}
    <button class="solve-btn" title="Find the least-disruptive path to a goal">✦ Solve…</button>`;
  h=h.replace('<span>Scenario</span>', gut);
  $('#scn-band').innerHTML=h;
}

/* ── render: lever grid (built once, values update in place) ── */
// Format a single lever value into the inner HTML for its display span.
// Special return ['__needs__', age] from a fmt() means "no entered amount for
// this age yet" — render an inline input so the advisor can type one in
// without leaving the lever. Plain numbers/strings render as before.
// Neutral delta-vs-baseline chip — the COMPARISON cue (Scenarios = compare
// choices). No good/bad coloring: later retirement isn't "better," it's a
// trade-off, so the chip stays a muted, opinion-free tone. Empty on the
// baseline column and wherever a lever matches baseline.
function levDelta(cfg, lev){
  const baseLev = scenarios.find(s=>s.base)?.lev;
  if(!baseLev || lev===baseLev) return '';
  // The sale lever's "delta" isn't a year count (Keep→age 72 isn't "+8 yr"); the
  // value text ("Keep" vs "age 72") already reads the difference. Skip the pill.
  if(cfg.key==='sellAge') return '';
  const d = (lev[cfg.key]||0) - (baseLev[cfg.key]||0);
  if(!d) return '';
  const sign = d>0 ? '+' : '−', a = Math.abs(d);
  let txt;
  if(cfg.key==='spend')                 txt = `${sign}$${Math.round(a/12).toLocaleString('en-US')}/mo`;
  else if(cfg.key==='savings' || cfg.key==='eventAmt') txt = `${sign}$${a.toLocaleString('en-US')}`;
  else if(cfg.key==='risk')             txt = `${sign}${a} lvl`;
  else /* ages */                       txt = `${sign}${a} yr`;
  return `<span class="lev-delta">${txt}</span>`;
}
// Stepper buttons for the discrete levers (ages / allocation / pension). The
// click handler derives the column from the enclosing #lv-… span, so the
// buttons only carry key + direction. ml:auto pins them right when there's no
// delta chip to do it.
function stepper(cfg, pinRight){
  return `<span class="lev-step"${pinRight?' style="margin-left:auto"':''}>`
       + `<button class="step-btn" data-dir="-1" data-key="${cfg.key}" tabindex="-1">−</button>`
       + `<button class="step-btn" data-dir="1" data-key="${cfg.key}" tabindex="-1">+</button></span>`;
}
function renderLevValue(cfg, lev){
  const [val,unit]=cfg.fmt(lev[cfg.key], lev);
  if(val==='__needs__'){
    return `$<input class="pen-in" type="text" inputmode="numeric" data-pen-age="${unit}"> <span class="unit">@ ${unit}</span>${stepper(cfg,true)}`;
  }
  const d = levDelta(cfg, lev);
  // Type-in boxes for the dollar/age levers. The box edits the same value the
  // slider drives — both stay in sync. data-edit tells the input handler how to
  // interpret the typed number (monthly→annual, plain money, or event age).
  if(cfg.edit==='monthly'){
    const mo=Math.round(lev[cfg.key]/12);
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="monthly" data-key="${cfg.key}" value="${mo.toLocaleString('en-US')}"> <span class="unit">/mo</span>${d}`;
  }
  if(cfg.edit==='money'){
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="money" data-key="${cfg.key}" value="${(lev[cfg.key]||0).toLocaleString('en-US')}"> <span class="unit">${unit}</span>${d}`;
  }
  if(cfg.edit==='event'){
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="eventAmt" data-key="eventAmt" value="${(lev.eventAmt||0).toLocaleString('en-US')}">`
         + ` <span class="unit">@ age</span> `
         + `<input class="lev-in age-in" type="text" inputmode="numeric" data-edit="eventAge" data-key="eventAge" value="${lev.eventAge}">${d}`;
  }
  // Discrete levers (ages / allocation): value + delta + stepper buttons.
  return `${val}${unit?` <span class="unit">${unit}</span>`:''}${d}${stepper(cfg, !d)}`;
}
// A lever is "dollar" (keeps a draggable slider) when it has an edit type;
// the discrete levers (ages / allocation / pension) use steppers + a static bar.
const isDollarLever = cfg => !!cfg.edit;
// Where the value sits inside its range, 0–100% — drives both the slider fill
// and the static bar fill/dot so every bar reads the same way down a row.
function barFillPct(cfg, L){
  const r=levRange(cfg), v=Math.max(r.min,Math.min(r.max,L[cfg.key]||r.min));
  return r.max>r.min ? ((v-r.min)/(r.max-r.min))*100 : 0;
}
// Refresh one cell in place after its value changed: value text + the bar
// (slider position+fill for dollar levers, fill+dot for discrete ones).
function updateCell(ci, cfg){
  const L=scenarios[ci].lev, span=$(`#lv-${ci}-${cfg.key}`); if(!span) return;
  span.innerHTML=renderLevValue(cfg, L);
  const pct=barFillPct(cfg,L), cell=span.parentElement;
  const sl=cell.querySelector('.lev-slider');
  if(sl){ const r=levRange(cfg); sl.value=Math.max(r.min,Math.min(r.max,L[cfg.key])); sl.style.setProperty('--fill',pct+'%'); }
}
// Commit a lever change: editing the baseline shifts every other column's
// delta, so rebuild the whole grid then; otherwise just refresh the one cell.
function commitLever(ci, cfg){
  if(scenarios[ci].base) buildLevers(); else updateCell(ci, cfg);
  $('#status').textContent='Adjusted · Run to update';
  saveScenarios();
}
function buildLevers(){
  syncGridCols();
  let h='';
  LEVCFG.forEach(cfg=>{
    h+=`<div class="lev-name">${escHtml(cfg.name)}</div>`;
    const r=levRange(cfg);
    scenarios.forEach((s,ci)=>{
      const last=ci===scenarios.length-1?'col-last':'';
      const pct=barFillPct(cfg,s.lev);
      const bar = isDollarLever(cfg)
        ? `<input class="lev-slider ${s.base?'base-lock':''}" type="range" min="${r.min}" max="${r.max}" step="${r.step}"
                 value="${Math.max(r.min,Math.min(r.max,s.lev[cfg.key]))}" data-col="${ci}" data-key="${cfg.key}" style="--fill:${pct}%">`
        : '';
      h+=`<div class="lev-cell ${s.base?'base':''} ${last}">
        <span class="lev-val ${s.base?'base':''}" id="lv-${ci}-${cfg.key}">${renderLevValue(cfg,s.lev)}</span>
        ${bar}
      </div>`;
    });
  });
  $('#scn-levers').innerHTML=h;
  renderScenGoals();
}
// Goals section — READ-ONLY mirror of the base-plan goals across every column.
// Goals live in the base plan (single source of truth); each scenario carries
// the same set, so the value is identical down each row. That sameness IS the
// truth — the goal is funded in every scenario. Edited only on the Goals page.
function renderScenGoals(){
  const host=$('#scn-goals'); if(!host) return;
  syncGridCols();
  const goals=(Array.isArray(plan.goals)?plan.goals:[]).filter(g=>(g.amount||0)>0);
  // Section header row: an accent "Goals" label in the gutter + a tinted header
  // cell per column so the section reads as a block under the levers.
  let h=`<div class="sg-head">Goals</div>`;
  scenarios.forEach(s=>{ h+=`<div class="sg-head sg-col ${s.base?'base':''}"></div>`; });
  if(!goals.length){
    h+=`<div class="sg-empty">No goals yet — add them on the Goals page to see them here.</div>`;
    host.innerHTML=h; return;
  }
  // One row per goal: name + age window in the gutter, the amount mirrored in
  // every scenario column (recurring → /yr, single-year window → one-time).
  let totRec=0, totOnce=0;
  goals.forEach(g=>{
    const once=(g.startAge===g.endAge);
    const win = once ? `at age ${g.startAge}` : `age ${g.startAge}–${g.endAge}`;
    const tag = once ? 'one-time' : '/yr';
    if(once) totOnce+=(g.amount||0); else totRec+=(g.amount||0);
    h+=`<div class="sg-name">${escHtml(g.name||'Goal')}<span class="sg-win">${win}</span></div>`;
    scenarios.forEach(s=>{
      h+=`<div class="sg-cell ${s.base?'base':''}">$${(g.amount||0).toLocaleString('en-US')}<span class="sg-tag">${tag}</span></div>`;
    });
  });
  // Total row: recurring annual goal spend (the steady draw), with any one-time
  // total noted alongside so a single spike isn't hidden inside the annual line.
  const totTxt = `$${totRec.toLocaleString('en-US')}`
    + (totOnce>0 ? ` <span class="sg-tag">+ $${totOnce.toLocaleString('en-US')} one-time</span>` : '');
  h+=`<div class="sg-total">Annual goal spend</div>`;
  scenarios.forEach(s=>{ h+=`<div class="sg-tcell ${s.base?'base':''}">${totTxt}</div>`; });
  host.innerHTML=h;
}
// Stepper buttons for the discrete levers (delegated — survives rebuilds).
$('#scn-levers').addEventListener('click', e=>{
  const btn=e.target.closest('.step-btn'); if(!btn) return;
  const span=btn.closest('[id^="lv-"]'); if(!span) return;
  const ci=+span.id.split('-')[1], cfg=LEVCFG.find(c=>c.key===btn.dataset.key);
  const r=levRange(cfg), L=scenarios[ci].lev;
  L[cfg.key]=Math.max(r.min, Math.min(r.max, (L[cfg.key]||r.min) + (+btn.dataset.dir)*r.step));
  // Grabbing the pension age unlinks it; moving retirement age re-syncs an
  // auto-linked pension and refreshes that cell too.
  if(cfg.key==='pensionAge') L.pensionAuto=false;
  if(cfg.key==='retireAge' && L.pensionAuto){ syncPension(L); if(!scenarios[ci].base) updateCell(ci, LEVCFG.find(c=>c.key==='pensionAge')); }
  commitLever(ci, cfg);
});
// Inline pension-amount inputs are inserted dynamically when a slider lands on
// an age with no entered benefit, so a direct per-element listener (re-bound
// only at buildLevers time) would miss them. Delegate from #scn-levers once.
// Typed value writes into the plan's benefit-by-age map for that exact age,
// then every column refreshes (the amount is reference data shared across
// scenarios — the DECISION is the age, not the amount).
// ── Scenario header: rename / add / remove (delegated on #scn-band) ──
$('#scn-band').addEventListener('input', e=>{
  if(e.target.classList && e.target.classList.contains('col-rename')){
    const ci=+e.target.dataset.col;
    if(scenarios[ci]) scenarios[ci].name=e.target.value;   // live; persisted on change
  }
});
$('#scn-band').addEventListener('change', e=>{
  if(e.target.classList && e.target.classList.contains('col-rename')){
    const ci=+e.target.dataset.col;
    let nm=e.target.value.trim();
    if(!nm){ nm=`Scenario ${String.fromCharCode(65+ci)}`; e.target.value=nm; }  // never blank
    if(scenarios[ci]) scenarios[ci].name=nm;
    saveScenarios();
    // Cash-flow header + Sequencing selector read names — refresh those.
    renderCashflow(); buildSeqSelect();
  }
});
$('#scn-band').addEventListener('click', e=>{
  const x=e.target.closest('.col-x');
  if(x){ removeScenario(+x.dataset.col); return; }
  if(e.target.closest('.add-scen')){ addScenario(); return; }
  if(e.target.closest('.solve-btn')){ solverFormOpen = true; renderSolvePanel(); return; }
});
// Solver goal form lives in #solve-panel (full-width). Live commas on $ boxes;
// changing the pin dropdown re-renders its value input (age box vs $ box).
$('#solve-panel').addEventListener('input', e=>{
  if(e.target.classList?.contains('sf-money')) liveCommas(e.target);
});
$('#solve-panel').addEventListener('change', e=>{
  if(e.target.id === 'sf-goal'){
    const baseLev = scenarios.find(s=>s.base)?.lev || defaultLevers();
    const baseSucc = scenarios.find(s=>s.base)?.res?.successRate || 85;
    const defPct = Math.min(95, Math.ceil((baseSucc+1)/5)*5);
    const wrap = $('#sf-params');
    if(wrap) wrap.innerHTML = goalParamsHtml(e.target.value, baseLev, defPct);
  }
});
$('#solve-panel').addEventListener('submit', e=>{
  const f = e.target.closest('#solver-form');
  if(!f) return;
  e.preventDefault();
  const pct = parseFloat($('#sf-pct')?.value);
  if(!isFinite(pct) || pct<50 || pct>99) return;
  const goalType = $('#sf-goal')?.value || 'confidence';
  const num = id => parseInt(($(id)?.value||'').replace(/[^0-9]/g,''), 10);
  const params = { pct };
  const {currentAge, planEndAge} = plan.household.primary;
  const flashAge = id => { const el=$(id); if(el){ el.style.outline='2px solid var(--negative)'; el.focus(); setTimeout(()=>el.style.outline='',1500); } };
  if(goalType==='retire'){
    params.age = num('#sf-p-age');
    if(!isFinite(params.age)) return;
    if(params.age <= currentAge || params.age > planEndAge){ flashAge('#sf-p-age'); return; }
  } else if(goalType==='purchase'){
    params.amount = num('#sf-p-amount'); params.age = num('#sf-p-age');
    if(!isFinite(params.amount)||!isFinite(params.age)) return;
    if(params.age <= currentAge || params.age > planEndAge){ flashAge('#sf-p-age'); return; }
  } else if(goalType==='gift'){
    params.amount = num('#sf-p-amount'); params.toAge = num('#sf-p-toage');
    if(!isFinite(params.amount)||!isFinite(params.toAge)) return;
    if(params.toAge <= currentAge || params.toAge > planEndAge){ flashAge('#sf-p-toage'); return; }
  } else if(goalType==='legacy'){
    params.amount = num('#sf-p-amount'); if(!isFinite(params.amount)) return;
  }
  runSolve(goalType, params);
});
// Solver panel: Cancel (form), Clear (results), and per-lever "Load" actions.
document.addEventListener('click', e=>{
  if(e.target.closest('#sf-cancel')){
    solverFormOpen = false; renderSolvePanel(); return;
  }
  if(e.target.closest('#solve-clear-btn')){
    solverResults = null; solverSearching = false;
    comboResults = null; comboOpen = false; comboSearching = false;
    renderSolvePanel(); return;
  }
  // Fold-down: open runs the (heavy) combo search once and caches it; toggle off
  // just collapses. The cache is reused on re-open until the solo solve changes.
  if(e.target.closest('#combo-toggle')){
    comboOpen = !comboOpen;
    if(comboOpen && !comboResults && !comboSearching) runComboSolve();  // renders itself
    else renderSolvePanel();
    return;
  }
  const loadBtn = e.target.closest('.solve-load');
  if(loadBtn && solverResults && solverResults.rows){
    if(scenarios.length >= MAX_SCENARIOS) return;
    const idx = +loadBtn.dataset.soloIdx;
    const row = solverResults.rows[idx];
    if(!row) return;
    // Scenario = the pinned soloBase with this one lever set to its solo answer.
    const lev = JSON.parse(JSON.stringify(solverResults.soloBase));
    lev[row.key] = row.value;
    syncPension(lev);
    const cfg = LEVCFG.find(c=>c.key===row.key);
    scenarios.push({ name: `${cfg.name} solve`, base:false, lev, res:null });
    solverResults = null; solverSearching = false;
    comboResults = null; comboOpen = false;
    saveScenarios(); buildLevers(); renderBand(); renderSolvePanel(); plansDirty=true; runAll();
  }
  // Load a COMBO: the held-fixed soloBase with both lever moves applied.
  const cLoadBtn = e.target.closest('.cc-load');
  if(cLoadBtn && comboResults && comboResults.combos){
    if(scenarios.length >= MAX_SCENARIOS) return;
    const c = comboResults.combos[+cLoadBtn.dataset.comboIdx];
    if(!c) return;
    const lev = JSON.parse(JSON.stringify(comboResults.soloBase));
    c.items.forEach(m => lev[m.key] = m.val);
    syncPension(lev);
    const nm = comboResults.goalType==='retire' ? `Retire ${comboResults.params.age}`
             : c.items.map(m=>COMBO_SHORT[m.key]).join(' + ');
    scenarios.push({ name: nm.slice(0,28), base:false, lev, res:null });
    solverResults = null; solverSearching = false;
    comboResults = null; comboOpen = false;
    saveScenarios(); buildLevers(); renderBand(); renderSolvePanel(); plansDirty=true; runAll();
  }
});
// Live commas while typing into any inline numeric input (pension + lever boxes).
// Dollar-lever slider: live value update while dragging (delegated — survives buildLevers rebuilds).
$('#scn-levers').addEventListener('input', e=>{
  const t=e.target;
  if(!t.classList) return;
  if(t.classList.contains('pen-in')) liveCommas(t);
  // Age boxes are 2-digit, no commas; dollar boxes get comma grouping.
  else if(t.classList.contains('lev-in') && !t.classList.contains('age-in')) liveCommas(t);
  else if(t.classList.contains('lev-slider')){
    const ci=+t.dataset.col, cfg=LEVCFG.find(c=>c.key===t.dataset.key);
    scenarios[ci].lev[cfg.key]=+t.value;
    t.style.setProperty('--fill', barFillPct(cfg,scenarios[ci].lev)+'%');
    updateCell(ci, cfg);
    $('#status').textContent='Adjusted · Run to update';
  }
});
// Type-in lever boxes (monthly spend / savings / one-time event amount+age).
// Writes the value the slider also drives, then refreshes that cell + status.
// On change (blur/enter) we commit; the column re-runs on the next Run.
// Slider drag-end: persist + rebuild baseline if needed.
$('#scn-levers').addEventListener('change', e=>{
  const t=e.target;
  if(t.classList && t.classList.contains('lev-slider')){
    if(scenarios[+t.dataset.col].base) buildLevers();
    saveScenarios();
    return;
  }
  if(!t.classList || !t.classList.contains('lev-in')) return;
  const span=t.closest('[id^="lv-"]'); if(!span) return;
  const ci=+span.id.split('-')[1];
  const L=scenarios[ci].lev;
  const num=parseFloat(String(t.value).replace(/[^0-9.]/g,''));
  const edit=t.dataset.edit;
  const cfg=LEVCFG.find(c=>c.key===t.dataset.key) || LEVCFG.find(c=>c.edit==='event');
  if(edit==='monthly'){
    if(!isFinite(num)||num<0) return;
    L.spend=Math.round(num*12);                 // store annual; engine's unit
  } else if(edit==='money'){
    if(!isFinite(num)||num<0) return;
    L[t.dataset.key]=Math.round(num);
  } else if(edit==='eventAmt'){
    L.eventAmt=isFinite(num)&&num>0?Math.round(num):0;
  } else if(edit==='eventAge'){
    const a=Math.round(num);
    const lo=plan.household.primary.currentAge, hi=plan.household.primary.planEndAge;
    if(isFinite(a)) L.eventAge=Math.max(lo,Math.min(hi,a));
  }
  // Refresh the cell (value + bar) — rebuilds the grid if the baseline moved.
  const dispCfg=LEVCFG.find(c=>c.key===span.id.split('-').slice(2).join('-'));
  commitLever(ci, dispCfg);
});
$('#scn-levers').addEventListener('change', e=>{
  if(!e.target.classList || !e.target.classList.contains('pen-in')) return;
  const age=+e.target.dataset.penAge;
  const amt=parseFloat(String(e.target.value).replace(/[^0-9.]/g,''));
  if(!isFinite(amt) || amt<0) return;
  if(!plan.income.pension) plan.income.pension={ benefitByAge:{}, startAge:65, colaPct:0 };
  if(!plan.income.pension.benefitByAge) plan.income.pension.benefitByAge={};
  plan.income.pension.benefitByAge[age]=Math.round(amt);
  buildLevers();
  $('#status').textContent='Adjusted · Run to update';
});
function renderFoot(){
  syncGridCols();
  let h=`<div class="foot-cell" style="color:var(--ink-faint)">Median end</div>`;
  scenarios.forEach(s=>{
    // Match the LINE: this is where the drawn median path actually ends.
    // Full digits w/ commas — no $1.5M shorthand. Whole dollars (no cents).
    const v=s.res?s.res.envelope[s.res.envelope.length-1].p50:null;
    const t=v!=null ? '$'+Math.max(0,Math.round(v)).toLocaleString('en-US') : '—';
    h+=`<div class="foot-cell ${s.base?'base':''}">&nbsp;<b>${t}</b></div>`;
  });
  $('#scn-foot').innerHTML=h;
}

/* ── chart helpers ── */
function fmtM(v){ if(!isFinite(v)||v<=0) return '$0'; if(v>=1e6) return '$'+(v/1e6).toFixed(1)+'M'; if(v>=1e3) return '$'+Math.round(v/1e3)+'K'; return '$'+Math.round(v); }
// Plot margins inside the viewBox (leaves room for axis labels).
const PADL=78, PADR=14, PADT=12, PADB=30;
// Chart axis colors, matched to the light-theme tokens (--rule-faint / --ink-faint).
const GRID='rgba(230,246,235,.18)', AXIS_INK='rgba(226,232,232,.78)';
// Smooth a series of [x,y] points into a path using Catmull-Rom -> bezier.
// Tension kept low so the line stays trackable, not wavy ("toddler-drawn").
// Monotone cubic interpolation (Fritsch–Carlson). Unlike Catmull-Rom it CANNOT
// overshoot the data, so the curve stays smooth without inventing humps/dips
// between points — the difference between a grown-up chart and a wobbly one.
function monoPath(pts){
  const n=pts.length;
  if(n<2) return '';
  if(n===2) return `M ${pts[0][0]} ${pts[0][1]} L ${pts[1][0]} ${pts[1][1]}`;
  const xs=pts.map(p=>p[0]), ys=pts.map(p=>p[1]);
  const dx=[], dy=[], m=[];
  for(let i=0;i<n-1;i++){ dx[i]=xs[i+1]-xs[i]; dy[i]=ys[i+1]-ys[i]; m[i]=dy[i]/(dx[i]||1e-9); }
  const t=new Array(n);
  t[0]=m[0]; t[n-1]=m[n-2];
  for(let i=1;i<n-1;i++) t[i] = (m[i-1]*m[i]<=0) ? 0 : (m[i-1]+m[i])/2;
  for(let i=0;i<n-1;i++){
    if(m[i]===0){ t[i]=0; t[i+1]=0; continue; }
    const a=t[i]/m[i], b=t[i+1]/m[i], s=a*a+b*b;
    if(s>9){ const tau=3/Math.sqrt(s); t[i]=tau*a*m[i]; t[i+1]=tau*b*m[i]; }
  }
  let d=`M ${xs[0].toFixed(1)} ${ys[0].toFixed(1)}`;
  for(let i=0;i<n-1;i++){
    const h=dx[i];
    d+=` C ${(xs[i]+h/3).toFixed(1)} ${(ys[i]+t[i]*h/3).toFixed(1)}, ${(xs[i+1]-h/3).toFixed(1)} ${(ys[i+1]-t[i+1]*h/3).toFixed(1)}, ${xs[i+1].toFixed(1)} ${ys[i+1].toFixed(1)}`;
  }
  return d;
}
// Round a raw max up to a clean axis ceiling whose quarter-steps are round
// numbers (so ticks read $2M/$4M/… not $3.4M/$5.1M…).
function niceCeil(v){
  if(!(v>0)) return 1;
  const step0=v/4, mag=Math.pow(10, Math.floor(Math.log10(step0))), n=step0/mag;
  const niceN = n<=1?1 : n<=2?2 : n<=2.5?2.5 : n<=5?5 : 10;
  return niceN*mag*4;
}
function smoothPath(pts){
  if(pts.length<2) return '';
  if(pts.length===2) return `M ${pts[0][0]} ${pts[0][1]} L ${pts[1][0]} ${pts[1][1]}`;
  let d=`M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||pts[i+1];
    const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
  }
  return d;
}
function axes(W,H,ageStart,ageEnd,maxBal){
  const x0=PADL, x1=W-PADR, y0=PADT, y1=H-PADB;
  let g='';
  // Horizontal gridlines — faint rule color so the grid is legible without
  // competing with the data lines. (Was a dark-theme near-black; fixed for the
  // light "paper" theme.)
  for(let i=0;i<=4;i++){const y=y0+(y1-y0)/4*i; g+=`<line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}" stroke="${GRID}"/>`;}
  // y labels (right-aligned in the left gutter)
  for(let i=0;i<=4;i++){const v=maxBal*(1-i/4); const y=y0+(y1-y0)/4*i;
    g+=`<text x="${x0-12}" y="${y+4}" fill="${AXIS_INK}" font-size="11" font-family="Inter" text-anchor="end">${fmtM(v)}</text>`;}
  // x age ticks
  const span=ageEnd-ageStart;
  for(let k=0;k<=5;k++){const a=Math.round(ageStart+span*k/5); const x=x0+(x1-x0)*k/5;
    g+=`<text x="${x}" y="${H-9}" fill="${AXIS_INK}" font-size="11" font-family="Inter" text-anchor="${k===0?'start':k===5?'end':'middle'}">Age ${a}</text>`;}
  return g;
}
/* ── Cash-flow drawer ────────────────────────────────────────────────────
   Each scenario's res.paths.p50 is the "typical" coherent simulated path —
   the engine picks the sim that tracks the year-by-year median envelope
   most closely. Its .rows array carries year, age, socialSecurity, pension,
   otherIncome, withdrawal, expenses, goals, taxes, balance. We render those
   per scenario side by side. The numbers here are reality-of-one-path
   (coherent), not blended percentiles — that's why this view exists.
   Plumbing only; no engine changes. */
function cfMoney(v){
  if(!isFinite(v)) return '—';
  const n = Math.round(v);
  if(n === 0) return '$0';
  return '$' + Math.abs(n).toLocaleString('en-US');
}
function cfRetPct(r){ if(!isFinite(r)) return '—'; const p = r*100; return (p>=0?'+':'−') + Math.abs(p).toFixed(1) + '%'; }
function cfGain(v){ if(!isFinite(v) || Math.round(v)===0) return '$0'; return (v<0?'−':'+') + '$' + Math.abs(Math.round(v)).toLocaleString('en-US'); }
function simByIndex(res, idx){
  if(!res || !Array.isArray(res.sims)) return null;
  return res.sims.find(s => s.simIndex === idx) || res.sims[idx] || null;
}
function baselineResult(){
  return (scenarios.find(s=>s.base) || scenarios[0] || {}).res || null;
}
function selectedPathIndex(){
  const res = baselineResult();
  if(!res || !Array.isArray(res.sims) || !res.sims.length) return 0;
  if(pathReplay.mode === 'choose'){
    return Math.max(0, Math.min(res.sims.length - 1, pathReplay.index || 0));
  }
  if(pathReplay.mode === 'typical'){
    return (res.paths && res.paths.p50 && res.paths.p50.simIndex != null) ? res.paths.p50.simIndex : 0;
  }
  if(pathReplay.mode === 'stressed'){
    return (res.paths && res.paths.p10 && res.paths.p10.simIndex != null) ? res.paths.p10.simIndex : 0;
  }
  if(pathReplay.mode === 'favorable'){
    return (res.paths && res.paths.p90 && res.paths.p90.simIndex != null) ? res.paths.p90.simIndex : 0;
  }
  if(pathReplay.mode === 'failed'){
    const failed = res.sims
      .filter(s => s.failed)
      .sort((a,b) => (a.depletionAge || 999) - (b.depletionAge || 999));
    return failed.length ? failed[0].simIndex : ((res.paths && res.paths.p10 && res.paths.p10.simIndex != null) ? res.paths.p10.simIndex : 0);
  }
  if(pathReplay.mode === 'lowest-survivor'){
    const survivors = res.sims
      .filter(s => !s.failed)
      .sort((a,b) => a.terminalBalance - b.terminalBalance);
    return survivors.length ? survivors[0].simIndex : ((res.paths && res.paths.p10 && res.paths.p10.simIndex != null) ? res.paths.p10.simIndex : 0);
  }
  return 0;
}
function pathModeLabel(){
  return ({
    typical:'Typical path',
    stressed:'Stressed path',
    favorable:'Favorable path',
    failed:'Failed path',
    'lowest-survivor':'Lowest survivor',
    choose:'Chosen path'
  })[pathReplay.mode] || 'Typical path';
}
function pathOutcomeText(sim){
  if(!sim) return '';
  return sim.failed
    ? `Ran dry at age ${sim.depletionAge || 'n/a'}`
    : `Survived with ${cfMoney(sim.terminalBalance || 0)}`;
}

/* ── Path Story ───────────────────────────────────────────────────────────
   The baseline run's selected coherent path, told as a statement. The same
   selected sim the cash-flow drawer replays (selectedPathIndex), digested by
   the engine (pathDigest) — the prose here and the table below are two views
   of one path. Pure formatting of engine fields; no UI math. */
const TAX_SOURCE_LABELS = {
  socialSecurity:'Social Security', otherIncome:'other income',
  traditional:'Traditional withdrawals', taxable:'capital gains'
};
function storyChart(rows){
  const W=1120, H=300, PADL=58, PADR=16, PADT=14, PADB=30;
  const real = rows.filter(r => r.source != null);
  if(real.length < 2) return '';
  const hi = Math.max(...real.map(r => Math.max(r.balance, r.startBalance))) * 1.05;
  if(!(hi > 0)) return '';
  const x = i => PADL + (W-PADL-PADR) * i / (real.length-1);
  const y = v => PADT + (H-PADT-PADB) * (1 - v/hi);
  const pts = real.map((r,i) => [x(i), y(r.balance)]);
  let g = '';
  for(const f of [0,.5,1]){
    const gy = PADT + (H-PADT-PADB)*f;
    g += `<line x1="${PADL}" y1="${gy}" x2="${W-PADR}" y2="${gy}" stroke="var(--rule-faint)"/>`;
    g += `<text x="${PADL-8}" y="${gy+4}" fill="var(--ink-faint)" font-size="10.5" font-family="Inter" text-anchor="end">${fmtM(hi*(1-f))}</text>`;
  }
  const y0 = y(real[0].startBalance);
  g += `<line x1="${PADL}" y1="${y0}" x2="${W-PADR}" y2="${y0}" stroke="var(--ink-faint)" stroke-dasharray="3 6"/>`;
  const a0 = real[0].age, a1 = real[real.length-1].age;
  for(let a = Math.ceil(a0/5)*5; a <= a1; a += 5){
    const ax = x(Math.round((a-a0)/(a1-a0)*(real.length-1)));
    g += `<text x="${ax}" y="${H-8}" fill="var(--ink-faint)" font-size="10.5" font-family="Inter" text-anchor="middle">${a===Math.ceil(a0/5)*5?'Age '+a:a}</text>`;
  }
  const d = smoothPath(pts);
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Balance path">
    ${g}
    <path d="${d} L ${pts[pts.length-1][0].toFixed(1)} ${H-PADB} L ${PADL} ${H-PADB} Z" fill="var(--ink-bright)" fill-opacity="0.05"/>
    <path d="${d}" fill="none" stroke="var(--accent-bright)" stroke-width="2.2"/>
    <circle cx="${pts[pts.length-1][0].toFixed(1)}" cy="${pts[pts.length-1][1].toFixed(1)}" r="4.5" fill="var(--accent-bright)"/>
  </svg>`;
}
function renderStory(){
  const el = $('#story-panel'); if(!el) return;
  const res = baselineResult();
  if(!res || !Array.isArray(res.sims) || !res.sims.length){ el.innerHTML=''; return; }
  const sim = simByIndex(res, selectedPathIndex());
  if(!sim){ el.innerHTML=''; return; }
  const d = pathDigest(sim);
  const pc = v => (v>=0?'+':'−') + Math.abs(v*100).toFixed(1) + '%';
  const endAge = sim.rows.length ? sim.rows[sim.rows.length-1].age : '';
  const endStat = d.failed
    ? `<b>${fmtM(0)}</b><i>depleted at age ${d.depletionAge}</i>`
    : `<b>${fmtM(d.endBalance)}</b><i>ends at age ${endAge}</i>`;
  const picks = [['stressed','Stressed'],['typical','Median'],['favorable','Favorable']]
    .map(([m,l]) => `<button class="${pathReplay.mode===m?'on':''}" data-story-mode="${m}">${l}</button>`).join('');
  const verb = d.first10Supports ? 'cooperate' : 'push back';
  const reads = [
    [pc(d.first10Cagr), 'Market sequence',
     `The first 10 years ${d.first10Supports?'support':'work against'} the plan. ${d.negEarlyYears} of the first ${d.earlyWindowYears} ${d.negEarlyYears===1?'year is':'years are'} negative.`],
    [d.avgWdRate.toFixed(1)+'%', 'Spending pressure',
     `Average withdrawal pressure is ${d.avgWdRate.toFixed(1)}% across ${d.withdrawalYears} withdrawal years${d.peakWdAge!=null?` — the peak year touches ${d.peakWdRate.toFixed(1)}% at age ${d.peakWdAge}`:''}.`],
    [fmtM(d.avgTax)+'/yr', 'Tax + sourcing',
     `${TAX_SOURCE_LABELS[d.dominantTaxSource]||'Withdrawals'} drive ${Math.round(d.dominantTaxShare*100)}% of the ${fmtM(d.lifetimeTax)} lifetime tax bill.`]
  ].map(([b,h,t]) => `<div class="story-read"><b>${b}</b><div><span class="rd-h">${h}</span><span class="rd-b">${t}</span></div></div>`).join('');
  el.innerHTML = `
    <div class="story-sec"><span>Path Story · ${escHtml((scenarios.find(s=>s.base)||scenarios[0]||{}).name||'Base plan')}</span></div>
    <div class="story-pick"><span class="pk-l">Path:</span>${picks}
      <span class="pk-note">selected from ${res.sims.length.toLocaleString('en-US')} simulated paths · not a forecast</span></div>
    <div class="story-head">${(d.realCagr*100).toFixed(1)}% real growth, year over year, along this path.</div>
    <div class="story-sub">Return timing matters most while withdrawals are active — and these first ten years ${verb}.</div>
    <div class="story-stats">
      <div class="story-stat"><b>${fmtM(d.startBalance)}</b><i>starts the plan</i></div>
      <div class="story-stat">${endStat}</div>
      <div class="story-stat"><b>${pc(d.first10Cagr)}</b><i>first decade, real</i></div>
      <div class="story-stat"><b>${d.avgWdRate.toFixed(1)}%</b><i>avg withdrawal · peak ${d.peakWdRate.toFixed(1)}%</i></div>
      <div class="story-stat"><b>${fmtM(d.avgTax)}</b><i>tax per year, avg</i></div>
    </div>
    <hr class="story-rule">
    <div class="story-chart-l">Balance path · ${pathModeLabel().toUpperCase()} · ages ${sim.rows.length?sim.rows[0].age:''}–${endAge}</div>
    <div class="story-chart">${storyChart(sim.rows)}</div>
    <div class="story-sec"><span>What shapes this outcome</span></div>
    ${reads}`;
  el.querySelectorAll('[data-story-mode]').forEach(b => b.onclick = () => {
    pathReplay.mode = b.dataset.storyMode;
    savePathReplay(); syncPathControls(); renderCashflow(); renderStory();
  });
}

/* ── Plan Assessment ──────────────────────────────────────────────────────
   assessPlan() ids + figures mapped to fixed, factual sentences in a
   two-column ledger. The engine decides what applies; the UI only words it. */
function renderAssess(){
  const el = $('#assess-panel'); if(!el) return;
  const res = baselineResult();
  if(!res || !res.paths){ el.innerHTML=''; return; }
  const a = assessPlan(res);
  const pct1 = v => (v*100).toFixed(1)+'%';
  const SENT = {
    'low-fixed-spending':       v => ['Low fixed spending — core spend vs starting assets', pct1(v)],
    'tax-diversified':          v => ['Tax-diversified mix — account types carrying weight', `${v} of 3`],
    'high-success':             v => ['High success rate — paths lasting the full horizon', Math.round(v)+'%'],
    'withdrawal-load':          v => [`Withdrawal load — average ${v.avg.toFixed(1)}%, peak at age ${v.age}`, v.peak.toFixed(1)+'%'],
    'portfolio-funded-spending':v => ['Portfolio-funded spending — guaranteed income covers', pct1(v)],
    'return-timing':            v => [`Return timing — stressed path depletes${v.stressedDepletionAge?` at age ${v.stressedDepletionAge}`:''}, median survives`, 'path-dependent']
  };
  const row = it => {
    const [label, val] = (SENT[it.id] || (x=>[it.id, '']))(it.value);
    return `<div class="led-row"><span>${label}</span><span class="dots"></span><b>${val}</b></div>`;
  };
  const left  = a.strengths.map(row).join('') || `<div class="led-none">Nothing clears the bar on this run.</div>`;
  const right = [...a.pressures, ...a.tossups].map(row).join('') || `<div class="led-none">No pressure points on this run.</div>`;
  el.innerHTML = `
    <div class="story-sec"><span>Plan Assessment · what the engine sees</span></div>
    <div class="ledger">
      <div><h5>Working for the plan</h5>${left}</div>
      <div><h5>Working against it</h5>${right}</div>
    </div>`;
}

function renderCashflow(){
  const drawer = $('#cf-drawer');
  if(drawer.style.display !== 'block') return;   // only render when open; runAll re-renders if so
  const pathIdx = selectedPathIndex();
  pathReplay.index = pathIdx;
  savePathReplay();
  const simsByScen = scenarios.map(s => simByIndex(s.res, pathIdx));
  const rowsByScen = simsByScen.map(sim => sim ? sim.rows : []);
  // No data anywhere (e.g. a failed/degenerate Run) → say so plainly instead of
  // rendering an empty headers-only table that looks like it "didn't load".
  if(!rowsByScen.some(r => r.length)){
    drawer.innerHTML =
      `<div class="cf-drawer-head"><span>Annual Cash Flow</span></div>` +
      `<div class="cf-empty">No cash-flow data yet. Press Run — or check the plan inputs if the status bar shows a warning.</div>`;
    return;
  }
  const gcls = scenarios.map((_,i)=>`cf-g${i%2}`);
  const cols = 6;
  let h = '<table class="cf-table"><thead><tr><th class="age" rowspan="2">Age</th><th class="source" rowspan="2">Source</th>';
  scenarios.forEach((s,i)=>{
    h += `<th class="scen ${gcls[i]}" colspan="${cols}" style="color:${colorFor(i)}">${escHtml(s.name)}</th>`;
  });
  h += '</tr><tr>';
  scenarios.forEach((s,i)=>{
    h += `<th class="${gcls[i]} cf-start">Starting value</th>`;
    h += `<th class="${gcls[i]}">Income</th>`;
    h += `<th class="${gcls[i]}">Outflows</th>`;
    h += `<th class="${gcls[i]}">Inflows</th>`;
    h += `<th class="${gcls[i]}">Annual return</th>`;
    h += `<th class="${gcls[i]} cf-end">Ending value</th>`;
  });
  h += '</tr></thead><tbody>';
  const len = Math.max(0, ...rowsByScen.map(r => r.length));
  const curAge = plan.household.primary.currentAge;
  for(let y = 0; y < len; y++){
    // Engine keys every event off age = currentAge + y (y=0 is the current age),
    // so the table must too — otherwise a goal/SS/retirement lands one row late.
    const age = curAge + y;
    const source = rowsByScen.map(rows => rows[y]).find(Boolean)?.source;
    h += `<tr><td class="age">${age}</td><td class="source">${source || '-'}</td>`;
    scenarios.forEach((s,i)=>{
      const r = rowsByScen[i][y];
      const prev = y > 0 ? rowsByScen[i][y-1] : null;
      const isRetire = r && r.phase !== 'accum' && (!prev || prev.phase === 'accum');
      const retireCls = isRetire ? ' retire' : '';
      const retireStartCls = isRetire ? ' retire retire-start' : '';
      if(!r){ h += `<td colspan="${cols}" class="dim ${gcls[i]}">—</td>`; return; }
      // Pre-retirement (still working) years: income/withdrawal aren't part of the
      // post-retirement story, so show a neutral dash — never a $0 that reads as a
      // value. The balance still matters (it's accumulating), so it stays.
      const acc = r.phase === 'accum';
      const dash = '<span style="color:var(--ink-faint)">—</span>';
      const inc = (r.socialSecurity || 0) + (r.pension || 0) + (r.otherIncome || 0);
      h += `<td class="${gcls[i]}${retireStartCls}">${acc ? dash : cfMoney(inc)}</td>`;
      h += `<td class="${gcls[i]}${retireCls}">${acc ? dash : cfMoney(r.withdrawal || 0)}</td>`;
      if(hasRmd)  h += `<td class="${gcls[i]}${retireCls}">${(!acc && r.rmd > 0) ? cfMoney(r.rmd) : dash}</td>`;
      // Goals show in EVERY phase (even accumulation) so a pre-retirement
      // one-time goal still appears in its year.
      if(hasGoals) h += `<td class="${gcls[i]}${retireCls}">${(r.goals > 0) ? cfMoney(r.goals) : dash}</td>`;
      // One-time event (Scenarios lever) — shows in whichever phase it lands.
      if(hasLump)  h += `<td class="${gcls[i]}${retireCls}">${(r.lumpSum > 0) ? cfMoney(r.lumpSum) : dash}</td>`;
      // Portfolio return (% and $) — shown in every phase; the market acts on the
      // balance whether you're still saving or drawing down. Real return that year
      // (realReturnUsed in retirement, returnRate while accumulating); $ gain is
      // that return on the year's starting balance. Pure view of engine fields.
      const rr = (r.realReturnUsed ?? r.returnRate);
      const gain = (r.startBalance || 0) * rr;
      const rc = rr >= 0 ? 'cf-pos' : 'cf-neg';
      h += `<td class="${gcls[i]}${retireCls} ${isFinite(rr)?rc:''}">${isFinite(rr) ? cfRetPct(rr) : dash}</td>`;
      h += `<td class="${gcls[i]}${retireCls} ${isFinite(rr)?rc:''}">${isFinite(rr) ? cfGain(gain) : dash}</td>`;
      h += `<td class="${gcls[i]}${retireCls}">${cfMoney(r.balance || 0)}</td>`;
    });
    h += '</tr>';
  }
  h += '</tbody></table>';
  const baselineSim = simsByScen[scenarios.findIndex(s=>s.base)] || simsByScen[0];
  const replayMeta = `${pathModeLabel()} · Seed ${pathReplay.seed} · Path ${String(pathIdx).padStart(3,'0')} · ${pathOutcomeText(baselineSim)}`;
  drawer.innerHTML =
    `<div class="cf-drawer-head"><span>Path Replay</span><span class="sub">${replayMeta}</span></div>` +
    `<div class="cf-scroll">${h}</div>`;
}

/* ── SEQUENCING tab — same returns, different ORDER ──────────────────────────
   The tab's single job: isolate the ORDER of returns. We take one REAL
   historical return stream and run the SAME plan through it forward vs exactly
   reversed (identical returns, opposite sequence). Any difference is pure
   sequence-of-returns risk. Every number on this tab is a direct read of the
   engine's single-path result; the UI computes no balances or metrics. */
// The Sequencing tab holds ONE plan fixed and runs it through several REAL
// retirement markets — never a reversed/counterfactual timeline. The lesson is
// the truth a client actually faces: retire into a brutal market vs a kind one,
// same plan, and watch the spread. A LIBRARY of real markets the advisor can
// toggle on/off as lines (`on` = shown by default). Euphoric bulls (1982/85) are
// deliberately omitted — a 10-20x winner crushes the scale and hides the
// downside, which is the whole point of a sequence-risk view.
// Distinct but DEEP, desaturated editorial tones — each line identifiable, none
// candy-bright. Picked to be maximally distinct from each other on the ground.
const SEQ_YEARS=[
  {y:1929, tag:'Great Depression',  c:'#b45991', on:false},
  {y:1966, tag:'the lost decade',   c:'#7a93b8', on:true },
  {y:1973, tag:'stagflation',       c:'#c59152', on:true },
  {y:1987, tag:'Black Monday',      c:'#d8b371', on:false},
  {y:1995, tag:'the 90s boom',      c:'#D9A07E', on:true },
  {y:2000, tag:'dot-com crash',     c:'#e68169', on:true },
  {y:2008, tag:'financial crisis',  c:'#9c6585', on:false},
  {y:2009, tag:'the recovery bull', c:'#93a9c4', on:false},
];

renderCashflow = function(){
  const drawer = $('#cf-drawer');
  if(drawer.style.display !== 'block') return;
  const pathIdx = selectedPathIndex();
  pathReplay.index = pathIdx;
  savePathReplay();
  const simsByScen = scenarios.map(s => simByIndex(s.res, pathIdx));
  const rowsByScen = simsByScen.map(sim => sim ? sim.rows : []);
  if(!rowsByScen.some(r => r.length)){
    drawer.innerHTML =
      `<div class="cf-drawer-head"><span>Path Replay</span></div>` +
      `<div class="cf-empty">No cash-flow data yet. Press Run, or check the plan inputs if the status bar shows a warning.</div>`;
    return;
  }
  const gcls = scenarios.map((_,i)=>`cf-g${i%2}`);
  const cols = 6;
  let h = '<table class="cf-table"><thead><tr><th class="age" rowspan="2">Age</th><th class="source" rowspan="2">Source</th>';
  scenarios.forEach((s,i)=>{
    h += `<th class="scen ${gcls[i]} cf-start cf-end" colspan="${cols}" style="color:${colorFor(i)}">${escHtml(s.name)}</th>`;
  });
  h += '</tr><tr>';
  scenarios.forEach((s,i)=>{
    h += `<th class="${gcls[i]} cf-start">Starting value</th>`;
    h += `<th class="${gcls[i]}">Income</th>`;
    h += `<th class="${gcls[i]}">Outflows</th>`;
    h += `<th class="${gcls[i]}">Inflows</th>`;
    h += `<th class="${gcls[i]}">Annual return</th>`;
    h += `<th class="${gcls[i]} cf-end">Ending value</th>`;
  });
  h += '</tr></thead><tbody>';
  const len = Math.max(0, ...rowsByScen.map(r => r.length));
  const curAge = plan.household.primary.currentAge;
  for(let y = 0; y < len; y++){
    const age = curAge + y;
    const source = rowsByScen.map(rows => rows[y]).find(Boolean)?.source;
    h += `<tr><td class="age">${age}</td><td class="source">${source || '-'}</td>`;
    scenarios.forEach((s,i)=>{
      const r = rowsByScen[i][y];
      const prev = y > 0 ? rowsByScen[i][y-1] : null;
      const isRetire = r && r.phase !== 'accum' && (!prev || prev.phase === 'accum');
      const retireCls = isRetire ? ' retire' : '';
      const retireStartCls = isRetire ? ' retire retire-start' : '';
      if(!r){
        h += `<td colspan="${cols}" class="dim ${gcls[i]} cf-start cf-end">-</td>`;
        return;
      }
      const dash = '<span style="color:var(--ink-faint)">-</span>';
      const inc = (r.socialSecurity || 0) + (r.pension || 0) + (r.otherIncome || 0);
      const outflows = (r.expenses || 0) + (r.goals || 0) + (r.liabilities || 0) + (r.taxes || 0) + (r.lumpSum || 0);
      const inflows = (r.savings || 0) + (r.assetSale || 0);
      const rr = (r.realReturnUsed ?? r.returnRate);
      const rc = rr >= 0 ? 'cf-pos' : 'cf-neg';
      h += `<td class="${gcls[i]}${retireStartCls} cf-start">${cfMoney(r.startBalance || 0)}</td>`;
      h += `<td class="${gcls[i]}${retireCls}">${inc > 0 ? cfMoney(inc) : dash}</td>`;
      h += `<td class="${gcls[i]}${retireCls}">${outflows > 0 ? cfMoney(outflows) : dash}</td>`;
      h += `<td class="${gcls[i]}${retireCls}">${inflows > 0 ? cfMoney(inflows) : dash}</td>`;
      h += `<td class="${gcls[i]}${retireCls} ${isFinite(rr)?rc:''}">${isFinite(rr) ? cfRetPct(rr) : dash}</td>`;
      h += `<td class="${gcls[i]}${retireCls} cf-end">${cfMoney(r.balance || 0)}</td>`;
    });
    h += '</tr>';
  }
  h += '</tbody></table>';
  const baselineSim = simsByScen[scenarios.findIndex(s=>s.base)] || simsByScen[0];
  const replayMeta = `${pathModeLabel()} · Seed ${pathReplay.seed} · Path ${String(pathIdx).padStart(3,'0')} · ${pathOutcomeText(baselineSim)}`;
  drawer.innerHTML =
    `<div class="cf-drawer-head"><span>Path Replay</span><span class="sub">${replayMeta}</span></div>` +
    `<div class="cf-scroll">${h}</div>`;
};

function buildSeqSelect(){
  const sel=$('#seq-select'), cur=sel.value;
  sel.innerHTML=scenarios.map(s=>`<option>${escHtml(s.name)}</option>`).join('');
  if(cur && scenarios.some(s=>s.name===cur)) sel.value=cur;
  sel.onchange=runSeq;
  buildSeqChips();
}
// Market chips double as the selector AND the legend: lit = shown as a line.
function buildSeqChips(){
  const box=$('#seq-chips'); if(!box) return;
  box.innerHTML=SEQ_YEARS.map((m,i)=>
    `<button class="seq-chip${m.on?' on':''}" data-i="${i}"><span class="cdot" style="background:${m.c}"></span>${m.y} · ${m.tag}</button>`).join('');
  box.querySelectorAll('.seq-chip').forEach(btn=>btn.onclick=()=>{
    const m=SEQ_YEARS[+btn.dataset.i];
    if(m.on && SEQ_YEARS.filter(x=>x.on).length<=1) return;   // keep at least one line
    m.on=!m.on; buildSeqChips(); runSeq();
  });
}
// Build a "retire-now" clone: the household standing at its retirement age with
// the plan's MEDIAN projected balance (read from the engine envelope, not
// invented). Every real market then runs from this ONE shared starting point, so
// the only thing differing between lines is the market — not the entry balance.
function retireNowClone(p, ov, curAge, retAge, accumYears, envelope){
  // `envelope` is the chosen scenario's already-computed envelope, passed in
  // from runSeq. Reusing it (a) keeps the sequencing entry balance IDENTICAL to
  // the Scenarios tab — both read the same shared-path run — and (b) avoids
  // re-running a full Monte Carlo on every chip toggle. Fall back to a
  // shared-path run only if the scenario hasn't been computed yet.
  const env = envelope || (runSimulation(p, ov, sharedPaths) || {}).envelope;
  const accs=p.portfolio.accounts;
  const tot=accs.taxable.balance+accs.traditional.balance+accs.roth.balance;
  const entry=(env && env[accumYears] && env[accumYears].p50!=null) ? env[accumYears].p50 : tot;
  const rp=JSON.parse(JSON.stringify(p));
  const ra=rp.portfolio.accounts;
  if(tot>0){ const f=entry/tot; ra.taxable.balance*=f; ra.traditional.balance*=f; ra.roth.balance*=f; }
  else { ra.taxable.balance=entry; }
  rp.household.primary.currentAge=retAge;          // standing at retirement → no accumulation phase
  rp.household.primary.retirementAge=retAge;
  if(rp.household.spouse && rp.household.spouse.currentAge!=null)
    rp.household.spouse.currentAge += (retAge-curAge);
  return rp;
}
function runSeq(){
  const sel=$('#seq-select'); const s=scenarios.find(x=>x.name===sel.value)||scenarios[0];
  // Sequence the chosen scenario FAITHFULLY: allocation via the plan clone, every
  // other lever via the same overrides mapping the Scenarios tab uses.
  const p=planForScenario(s.lev);
  const ov=leversToOverrides(s.lev);
  const strat=p.portfolio.withdrawalStrategy||'taxable-first';
  const curAge=plan.household.primary.currentAge;
  const retAge=(s.lev.retireAge!=null?s.lev.retireAge:p.household.primary.retirementAge);
  const accumYears=Math.max(0, retAge-curAge);
  const rp=retireNowClone(p, ov, curAge, retAge, accumYears, s.res && s.res.envelope);
  const ov2={...ov, retireDelay:0};                // retirement age is baked into the clone now
  const runs=SEQ_YEARS.filter(m=>m.on)
                      .map(m=>({m, res:runHistoricalPath(rp, m.y, strat, undefined, ov2)}))
                      .filter(r=>r.res && r.res.rows.length);
  if(!runs.length){ $('#seq-svg').innerHTML=''; $('#seq-prints').innerHTML=''; return; }
  drawSeqChart(runs, retAge);
  renderPrints(runs);
  seqContext={rp, strat, ov2};
  renderPlayback();
  const n=runs.length;
  $('#seq-sub').textContent='Same plan, real markets';
}
function drawSeqChart(runs, retAge){
  const svg=$('#seq-svg'),W=1000,H=320;
  // All lines share the retirement-entry balance (same plan), then diverge purely
  // by the market they retired into. Full width = the retirement years.
  const entry=runs[0].res.rows[0].startBalance||0;
  const series=res=>[entry, ...res.rows.map(x=>x.balance)];
  const all=runs.map(r=>series(r.res));
  const n=Math.max(...all.map(a=>a.length));
  const ageStart=retAge, ageEnd=retAge+n-1;
  // Decision-zone cap: for sequence risk the readable region is the entry balance
  // DOWN to zero (will the money last?). A kind market can compound well above
  // that and flatten the downside into an unreadable band. So cap the axis a bit
  // above the entry balance; any line that climbs past it rises off the top
  // (clipped) with its true ending still in its card. When nothing exceeds the
  // ceiling (e.g. all-stress markets) we use the real max, so no space is wasted.
  // Decision-zone ceiling (entry → 0 is the readable region for sequence risk).
  // Fit everything when it stays under ~2.2x entry; only a true runaway gets
  // capped — and then values are CLAMPED to the ceiling so the line rides the top
  // cleanly instead of fragmenting in and out of view. Axis rounded to nice ticks.
  const realMax=Math.max(...all.map(a=>Math.max(...a)));
  const ceiling=entry>0 ? entry*2.2 : realMax;
  const maxBal=niceCeil(Math.min(realMax, ceiling));
  const x0=PADL, x1=W-PADR, y0=PADT, y1=H-PADB;
  const X=idx=> x0+(x1-x0)*(idx/(Math.max(1,n-1)));
  const Y=v => y1-(Math.min(Math.max(0,v),maxBal)/maxBal)*(y1-y0);
  let h=axes(W,H,ageStart,ageEnd,maxBal);
  h+=`<defs><clipPath id="seqclip"><rect x="${x0}" y="${y0-2}" width="${x1-x0}" height="${y1-y0+2}"/></clipPath></defs><g clip-path="url(#seqclip)">`;
  // Per line: a paper-colored HALO underneath, then the colored line on top. The
  // halo knocks out the lines below at every crossing, so the crowded middle
  // reads cleanly and the top line is unambiguous. Monotone curve = no overshoot.
  // A depleted line STOPS at $0 (no crawl along the floor) — the ✕ marks the end.
  const ends=[];
  runs.forEach((r,i)=>{
    const full=all[i];
    const dep=r.res.depletionAge!=null;
    let ei=full.length-1;
    if(dep){ const k=full.findIndex((v,idx)=>idx>0 && v<=0.01); if(k>0) ei=k; }
    const col=r.m.c;
    const d=monoPath(full.slice(0,ei+1).map((v,k)=>[X(k),Y(v)]));
    h+=`<path d="${d}" fill="none" stroke="var(--surface)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>`;
    h+=`<path d="${d}" fill="none" stroke="${col}" stroke-width="0.9" stroke-linejoin="round" stroke-linecap="round"/>`;
    ends.push({c:col, y:r.m.y, dep, px:X(ei), py:Y(full[ei])});
  });
  // Shared launch node — one plan, all markets start here, then diverge.
  h+=`<circle cx="${X(0).toFixed(1)}" cy="${Y(entry).toFixed(1)}" r="2.2" fill="var(--surface)" stroke="${AXIS_INK}" stroke-width="1.1"/>`;
  h+=`</g>`;
  // Endpoint treatment (outside the clip so labels are never cut): a ✕ where a
  // line runs dry, a dot where it survives — each tagged with its market year so
  // the eye never has to leave the chart for the legend.
  // Markers first: ✕ where a line runs dry, a dot where it survives.
  ends.forEach(e=>{
    if(e.dep){
      const s=2.8;
      h+=`<path d="M ${(e.px-s).toFixed(1)} ${(e.py-s).toFixed(1)} L ${(e.px+s).toFixed(1)} ${(e.py+s).toFixed(1)} M ${(e.px-s).toFixed(1)} ${(e.py+s).toFixed(1)} L ${(e.px+s).toFixed(1)} ${(e.py-s).toFixed(1)}" stroke="${e.c}" stroke-width="1.4" stroke-linecap="round"/>`;
    } else {
      h+=`<circle cx="${e.px.toFixed(1)}" cy="${e.py.toFixed(1)}" r="2.2" fill="${e.c}" stroke="var(--surface)" stroke-width="1.1"/>`;
    }
  });
  // No year labels on the lines — the chip row above the chart and the fingerprint
  // cards below already say which color is which market. Adding a year on each
  // line just adds visual noise that has to be de-collided every redraw.
  svg.innerHTML=h;
}
// Path fingerprint — facts read straight off the engine result. One card per real
// market: the first-decade return (the sequence-risk cause), the lowest the
// portfolio fell, and the outcome. No invented composite "score".
function renderPrints(runs){
  // All three figures come straight from the engine's pathDigest: first-decade
  // CAGR, lowest balance, and the damage window (longest run of years the
  // cumulative return sat below its retirement-day level — a long '66/'73
  // grind hurts a withdrawing portfolio far more than a V-shaped '08 shock).
  const pct=v=>(v>=0?'+':'')+(v*100).toFixed(1)+'%';
  const outcome=r=> r.depletionAge!=null
    ? {t:`Ran dry @ ${r.depletionAge}`, c:'var(--negative-bright)'}
    : {t:`Survived · ${fmtM(r.terminalBalance)}`, c:'var(--status-positive-bright)'};
  const card=(m,res)=>{
    const o=outcome(res);
    const d=pathDigest(res);
    // Only when there IS a drawdown — a good market never goes underwater, so the
    // row would just read "—". Show it where it tells a story; omit it otherwise.
    const dwBlock = d.underwaterSpellMax ? `
      <div class="pr-row" style="border-bottom:none"><span class="pr-k">Duration</span><span class="pr-v">${d.underwaterSpellMax} yr${d.underwaterSpellMax>1?'s':''}</span></div>
      <div class="dw-bar"><div class="dw-fill" style="width:${Math.min(100,d.underwaterSpellMax/12*100).toFixed(0)}%;background:#34465c"></div></div>` : '';
    return `<div class="seq-print">
      <h4><span class="dot" style="border-color:${m.c}"></span>${m.y} · ${m.tag}</h4>
      <div class="pr-row"><span class="pr-k">First decade</span><span class="pr-v">${pct(d.first10Cagr)}</span></div>
      <div class="pr-row"><span class="pr-k">Lowest</span><span class="pr-v">${fmtM(d.minBalance)}</span></div>
      ${dwBlock}
      <div class="pr-row"><span class="pr-k">Outcome</span><span class="pr-v" style="color:${o.c}">${o.t}</span></div>
    </div>`;
  };
  $('#seq-prints').innerHTML=runs.map(r=>card(r.m, r.res)).join('');
}

/* ── Playback ─────────────────────────────────────────────────────────────
   One retirement start year, replayed against the real record. The verdict
   is a sentence; the comparison runs the SAME return sequence through the
   three sourcing orders (only the order varies — an allowed comparison);
   the year-by-year table is the engine's rows, behind an advisor toggle.
   Era labels are a static lookup for context only — no math. */
const ERA_LABELS=[
  [1928,1932,'crash & depression'],[1933,1945,'depression & war'],
  [1946,1965,'postwar boom'],[1966,1972,'stagnation sets in'],
  [1973,1974,'oil shock'],[1975,1981,'stagflation'],
  [1982,1999,'the long bull'],[2000,2002,'dot-com bust'],
  [2003,2007,'mid-cycle expansion'],[2008,2009,'financial crisis'],
  [2010,2019,'recovery bull'],[2020,2020,'pandemic'],
  [2021,2021,'reopening'],[2022,2022,'rate shock'],[2023,2025,'late-cycle bull']
];
const eraFor=y=>{ const e=ERA_LABELS.find(([a,b])=>y>=a&&y<=b); return e?e[2]:''; };
const PB_STRATS=[['taxable-first','Taxable first'],['proportional','Proportional'],['traditional-first','Traditional first']];
let playbackYear=1973, pbDetailOpen=false, seqContext=null;
function renderPlayback(){
  const el=$('#playback-panel'); if(!el) return;
  if(!seqContext){ el.innerHTML=''; return; }
  const {rp, strat, ov2}=seqContext;
  const years=SEQ_YEARS.map(m=>m.y);
  if(!years.includes(playbackYear)) playbackYear=years[0];
  const runs=PB_STRATS
    .map(([k,label])=>({k,label,res:runHistoricalPath(rp,playbackYear,k,undefined,ov2)}))
    .filter(r=>r.res && r.res.rows.length);
  if(!runs.length){ el.innerHTML=''; return; }
  const main=runs.find(r=>r.k===strat)||runs[0];
  const d=pathDigest(main.res);
  const verdict = d.failed
    ? `${playbackYear} breaks the plan at age ${d.depletionAge}.`
    : `The plan survives ${playbackYear}.`;
  const sub = d.failed
    ? `Retire ${playbackYear} and the portfolio is exhausted at age ${d.depletionAge} — the sequence, not the average, does the damage.`
    : `${main.res.actualYears} historical years — retire ${playbackYear}, plan through ${main.res.endYear} — end with <b>${fmtM(d.endBalance)}</b> in today's dollars.`;
  const picks=years.map(y=>`<button class="${y===playbackYear?'on':''}" data-pb-year="${y}">${y}</button>`).join('');
  const stratRows=runs.map(r=>{
    const rd=pathDigest(r.res);
    const isPlan=r.k===strat;
    const delta=isPlan?'baseline':cfGain(r.res.lifetimeTax-main.res.lifetimeTax);
    const out=rd.failed?`Depleted · age ${rd.depletionAge}`:'Survived';
    return `<tr class="${isPlan?'plan':''}">
      <td class="l">${r.label}${isPlan?' — the plan’s strategy':''}</td>
      <td class="l">${out}</td>
      <td class="end">${fmtM(rd.endBalance)}</td>
      <td>${(rd.realCagr*100).toFixed(1)}%</td>
      <td>${fmtM(r.res.lifetimeTax)}</td>
      <td>${delta}</td></tr>`;
  }).join('');
  const real=main.res.rows.filter(r=>r.source!=null);
  const yearRows=real.map(r=>{
    const neg=r.returnRate<0;
    return `<tr>
      <td class="l" style="width:34px">${r.year}</td>
      <td>${r.age}</td>
      <td class="era l">${r.source} · ${eraFor(r.source)}</td>
      <td class="${neg?'neg':''}">${cfRetPct(r.returnRate)}</td>
      <td>${fmtM(r.startBalance)}</td>
      <td class="${r.returnDollars<0?'neg':''}">${cfGain(r.returnDollars)}</td>
      <td>${cfMoney(r.withdrawal)}</td>
      <td class="${(r.balance-r.startBalance)<0?'neg':''}">${cfGain(r.balance-r.startBalance)}</td>
      <td class="end">${fmtM(r.balance)}</td></tr>`;
  }).join('');
  const detail = pbDetailOpen ? `
    <div class="story-chart-l" style="margin-top:26px">Year by year · retire ${playbackYear} · engine rows, era labels for context only</div>
    <table class="stmt" id="pb-table">
      <tr><th class="l">Yr</th><th>Age</th><th class="l">Era</th><th>Return</th><th>Start</th><th>Return $</th><th>Drawn</th><th>Net</th><th>End</th></tr>
      ${yearRows}
    </table>` : '';
  el.innerHTML=`
    <div class="story-sec"><span>Playback · same plan, real markets</span></div>
    <div class="story-pick"><span class="pk-l">Retire in:</span>${picks}</div>
    <div class="pb-verdict" id="pb-verdict">${verdict}</div>
    <div class="pb-sub">${sub}</div>
    <hr class="story-rule">
    <div class="story-chart-l">Same ${playbackYear} sequence, three sourcing orders</div>
    <table class="stmt" id="pb-strats">
      <tr><th class="l"></th><th class="l">Outcome</th><th>Terminal</th><th>Real CAGR</th><th>Lifetime taxes</th><th>vs plan</th></tr>
      ${stratRows}
    </table>
    <button class="pb-detail-btn" id="pb-detail-btn">${pbDetailOpen?'hide advisor detail ▴':'advisor detail · year by year ▾'}</button>
    ${detail}`;
  el.querySelectorAll('[data-pb-year]').forEach(b=>b.onclick=()=>{
    playbackYear=parseInt(b.dataset.pbYear,10); renderPlayback();
  });
  $('#pb-detail-btn').onclick=()=>{ pbDetailOpen=!pbDetailOpen; renderPlayback(); };
}

/* ── History — cross-era reference ────────────────────────────────────────
   Informational context only: the present three years against the closest
   historical blocks (same broad environment first), and what the record
   says happened next. Reads history.js, which composes engine exports;
   nothing here feeds simulations or scenarios. Facts only — periods,
   figures, the macro tags, and the record's own aftermath. */
let histSel=null;
const hPct=v=>(v>=0?'+':'−')+Math.abs(v*100).toFixed(1)+'%';
function renderHistory(){
  const el=$('#hist-body'); if(!el) return;
  const now=HC_BLOCKS[HC_BLOCKS.length-1];
  const refs=hcReferenceSet(now, 5);
  if(histSel==null || !refs.some(r=>r.block.start===histSel)) histSel=refs[0]?.block.start ?? null;
  const sel=refs.find(r=>r.block.start===histSel)?.block || null;
  const mixW=(RISK_PROFILES[plan.portfolio.riskProfile]||RISK_PROFILES[3]).weights;
  const mixLabel=(RISK_PROFILES[plan.portfolio.riskProfile]||RISK_PROFILES[3]).label;
  const mNow=MACRO_TAGS[now.start]||{};

  const nowMix=profileThroughWeights(now.start, mixW);
  let h=`
    <div class="story-sec"><span>The last three years · ${now.label}</span></div>
    <div class="story-stats">
      <div class="story-stat"><b>${hPct(now.gmr)}</b><i>real return/yr · equity lens</i></div>
      <div class="story-stat"><b>${nowMix!=null?hPct(nowMix):'—'}</b><i>through the ${escHtml(mixLabel)} mix</i></div>
      <div class="story-stat"><b>${(now.vol*100).toFixed(1)}%</b><i>volatility</i></div>
      <div class="story-stat"><b>${HC_ASSET_LABELS[now.winnerAsset]||now.winnerAsset}</b><i>top asset</i></div>
      <div class="story-stat"><b>${escHtml(hcEnvironmentLabel(now))}</b><i>${escHtml(mNow.phase||'')} · ${escHtml(mNow.inflation||'')} inflation · Fed ${escHtml(mNow.fed||'')}</i></div>
    </div>
    <div class="story-sec"><span>Closest reference periods · same broad environment first</span></div>
    <div class="hist-rows">`;
  for(const r of refs){
    const b=r.block, on=b.start===histSel;
    const next=hcNextReturn(b);
    h+=`<div class="led-row hist-row${on?' on':''}" data-hist="${b.start}">
      <span class="hist-period">${b.label}</span>
      <span class="hist-env">${escHtml(hcEnvironmentLabel(b))} · ${escHtml(HC_SHAPE_LABELS[b.shape]||b.shape)}</span>
      <span class="dots"></span>
      <b>during ${hPct(b.gmr)} · next 3 yrs ${next!=null?hPct(next):'—'}</b>
    </div>`;
  }
  h+=`</div>`;

  if(sel){
    const before=hcBlockGmr(sel.start-3), after=hcBlockGmr(sel.end+1);
    const mSel=MACRO_TAGS[sel.start]||{};
    const {checks}=hcSymmetry(now, sel);
    const dims=[
      ['Cycle phase',      checks.phase,     escHtml(mNow.phase||'—'),                          escHtml(mSel.phase||'—')],
      ['Inflation regime', checks.inflation, escHtml(mNow.inflation||'—'),                      escHtml(mSel.inflation||'—')],
      ['Fed posture',      checks.fed,       escHtml(mNow.fed||'—'),                            escHtml(mSel.fed||'—')],
      ['Path shape',       checks.shape,     escHtml(HC_SHAPE_LABELS[now.shape]),               escHtml(HC_SHAPE_LABELS[sel.shape])],
      ['Real return/yr',   checks.gmr,       hPct(now.gmr),                                     hPct(sel.gmr)],
      ['Volatility',       checks.vol,       (now.vol*100).toFixed(1)+'%',                      (sel.vol*100).toFixed(1)+'%'],
      ['Top asset',        checks.winner,    HC_ASSET_LABELS[now.winnerAsset]||now.winnerAsset, HC_ASSET_LABELS[sel.winnerAsset]||sel.winnerAsset]
    ];
    const row=d=>`<div class="led-row"><span>${d[0]} — ${d[2]} vs ${d[3]}</span><span class="dots"></span><b>${d[1]>=1?'shared':d[1]>=0.5?'close':'different'}</b></div>`;
    const selMixDuring=profileThroughWeights(sel.start, mixW);
    const selMixNext=profileThroughWeights(sel.end+1, mixW);
    const notes=[sel.start, sel.start+1, sel.start+2]
      .map(y=>MACRO_TAGS[y]?`<div class="hist-note"><b>${y}</b> ${escHtml(MACRO_TAGS[y].notes||'')}</div>`:'').join('');
    h+=`
    <div class="story-sec"><span>${sel.label} in sequence</span></div>
    <div class="story-stats">
      <div class="story-stat"><b>${before?hPct(before.gmr):'—'}</b><i>before · ${before?before.label:'no record'}</i></div>
      <div class="story-stat"><b>${hPct(sel.gmr)}</b><i>during · ${sel.label}</i></div>
      <div class="story-stat"><b>${after?hPct(after.gmr):'—'}</b><i>after · ${after?after.label:'no record'}</i></div>
      <div class="story-stat"><b>${selMixDuring!=null?hPct(selMixDuring):'—'} / ${selMixNext!=null?hPct(selMixNext):'—'}</b><i>during / after · ${escHtml(mixLabel)} mix</i></div>
    </div>
    <div class="ledger">
      <div><h5>${now.label} vs ${sel.label}</h5>${dims.map(row).join('')}</div>
      <div><h5>The record, year by year</h5>${notes}
        <div class="hist-note"><b>${sel.end+1}–${sel.end+3}</b> real return ${after?hPct(after.gmr):'—'}/yr</div></div>
    </div>`;
  }
  h+=`<div class="hist-foot">Three-year windows of the 1928–2025 real-return record · context, not a forecast · not used in planning</div>`;
  el.innerHTML=h;
  el.querySelectorAll('[data-hist]').forEach(r=>r.onclick=()=>{ histSel=+r.dataset.hist; renderHistory(); });
}

/* ── tab switch + boot ── */
$$('.htab').forEach(t=>t.onclick=()=>{
  $$('.htab').forEach(x=>x.classList.remove('on'));
  $$('.page').forEach(x=>x.classList.remove('on'));
  if(t.dataset.subTarget){
    activeSub = t.dataset.subTarget;
    try { localStorage.setItem(SUB_KEY, activeSub); } catch {}
  }
  t.classList.add('on'); $(`.page[data-page="${t.dataset.page}"]`).classList.add('on');
  // Returning to Scenarios after a base-plan edit re-runs the engine so the
  // columns reflect the new source; otherwise just redraw.
  if(t.dataset.page==='scenarios'){ if(plansDirty){ plansDirty=false; runAll(); } }
  if(t.dataset.page==='sequencing') runSeq();
  if(t.dataset.page==='net-worth') renderInputs();
  if(t.dataset.page==='history') renderHistory();
});
// Net Worth sub-nav: switch the active sub-page, persist, re-render.
$$('#np-subnav .stab').forEach(b => b.onclick = () => {
  activeSub = b.dataset.sub;
  try { localStorage.setItem(SUB_KEY, activeSub); } catch {}
  renderInputs();
});
$('#run-btn').onclick=runAll;
function syncPathControls(){
  const mode=$('#path-mode'), idx=$('#path-index'), seed=$('#path-seed');
  const choose=$('#path-choose'), seedWrap=$('#path-seed-wrap');
  if(mode) mode.value = pathReplay.mode;
  if(idx) idx.value = pathReplay.index;
  if(seed) seed.value = pathReplay.seed;
  const advanced = pathReplay.mode === 'choose';
  if(choose) choose.classList.toggle('on', advanced);
  if(seedWrap) seedWrap.classList.toggle('on', advanced);
}
$('#path-mode').onchange=e=>{
  pathReplay.mode=e.target.value;
  savePathReplay();
  syncPathControls();
  renderCashflow();
  renderStory();
};
$('#path-index').onchange=e=>{
  pathReplay.index=Math.max(0, parseInt(e.target.value,10)||0);
  savePathReplay();
  syncPathControls();
  renderCashflow();
  renderStory();
};
$('#path-seed').onchange=e=>{
  pathReplay.seed=Math.max(1, parseInt(e.target.value,10)||DEFAULT_PATH_SEED);
  savePathReplay();
  sharedPaths=null;
  syncPathControls();
  runAll();
};
// Cash-flow drawer toggle. We render on open (and every Run while open).
$('#cf-btn').onclick=()=>{
  const d=$('#cf-drawer');
  const open = d.style.display === 'block';
  d.style.display = open ? 'none' : 'block';
  $('#cf-btn').textContent = open ? 'View cash flow ▾' : 'Hide cash flow ▴';
  if(!open) renderCashflow();
};

buildLevers();
renderSolvePanel();
syncPathControls();
renderInputs();
runAll();   // first iteration runs immediately so the tool opens populated

// ── STICKY NOTES OVERLAY ─────────────────────────────────────────────────────
(function(){
  const STORE_KEY = 'px_sticky_notes_v1';
  let active = false;
  let notes = [];
  let dragging = null, dragOX = 0, dragOY = 0;

  function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(notes)); }catch{} }
  function load(){ try{ const d=localStorage.getItem(STORE_KEY); if(d) notes=JSON.parse(d); }catch{} }

  function makeNoteEl(note){
    const el = document.createElement('div');
    el.className = 'sn-note';
    el.dataset.id = note.id;
    el.style.cssText = `left:${note.x}px;top:${note.y}px`;
    el.innerHTML = `<div class="sn-handle"><span class="sn-num">${note.num}</span><button class="sn-del" title="Remove">×</button></div><textarea class="sn-text" placeholder="Type note…">${note.text}</textarea>`;
    // drag via handle
    const handle = el.querySelector('.sn-handle');
    handle.addEventListener('mousedown', e => {
      if(e.target.classList.contains('sn-del')) return;
      dragging = el;
      const r = el.getBoundingClientRect();
      dragOX = e.clientX - r.left;
      dragOY = e.clientY - r.top;
      el.style.zIndex = 10001;
      e.preventDefault();
    });
    // delete
    el.querySelector('.sn-del').addEventListener('click', () => {
      notes = notes.filter(n => n.id !== note.id);
      save();
      el.remove();
    });
    // text update
    el.querySelector('.sn-text').addEventListener('input', e => {
      const n = notes.find(n => n.id === note.id);
      if(n){ n.text = e.target.value; save(); }
    });
    return el;
  }

  function placeNote(x, y){
    const num = notes.length ? Math.max(...notes.map(n=>n.num)) + 1 : 1;
    const note = { id: Date.now(), num, x, y, text: '' };
    notes.push(note);
    save();
    const el = makeNoteEl(note);
    document.body.appendChild(el);
    el.querySelector('.sn-text').focus();
  }

  function setActive(on){
    active = on;
    document.body.classList.toggle('sn-mode', on);
    btn.classList.toggle('sn-btn-on', on);
    btn.title = on ? 'Exit notes mode (click anywhere to add a note)' : 'Add sticky notes';
    overlay.style.display = on ? 'block' : 'none';
  }

  // overlay intercepts clicks for note placement
  const overlay = document.createElement('div');
  overlay.className = 'sn-overlay';
  overlay.addEventListener('click', e => {
    placeNote(e.clientX - 12, e.clientY - 12);
  });
  document.body.appendChild(overlay);

  // drag on document
  document.addEventListener('mousemove', e => {
    if(!dragging) return;
    const n = notes.find(n => n.id === +dragging.dataset.id);
    const x = e.clientX - dragOX, y = e.clientY - dragOY;
    dragging.style.left = x + 'px';
    dragging.style.top  = y + 'px';
    if(n){ n.x = x; n.y = y; }
  });
  document.addEventListener('mouseup', () => {
    if(dragging){ save(); dragging.style.zIndex=''; dragging=null; }
  });

  // toggle button
  const btn = document.createElement('button');
  btn.className = 'sn-btn';
  btn.textContent = '✎';
  btn.title = 'Add sticky notes';
  btn.addEventListener('click', () => setActive(!active));
  document.body.appendChild(btn);

  // clear button (only visible in active mode)
  const clearBtn = document.createElement('button');
  clearBtn.className = 'sn-clear';
  clearBtn.textContent = 'Clear all';
  clearBtn.title = 'Remove all sticky notes';
  clearBtn.addEventListener('click', e => {
    e.stopPropagation();
    notes = [];
    save();
    document.querySelectorAll('.sn-note').forEach(el => el.remove());
  });
  document.body.appendChild(clearBtn);

  // restore persisted notes
  load();
  notes.forEach(n => document.body.appendChild(makeNoteEl(n)));
})();
</script>
