// Pension slider range is PER-HOUSEHOLD: it spans only the ages the advisor has
// actually quoted a benefit for (the keys of benefitByAge). This means the
// slider can never wander onto an age with no number — so it can't silently pay
// $0. Enter a new quote (e.g. age 67) and the slider grows to include it on the
// next render. Falls back to a sane window if nothing is entered yet.
function pensionAges(){
  const m=(plan.income.pension && plan.income.pension.benefitByAge) || {};
  return Object.keys(m).map(Number).filter(n=>!isNaN(n)).sort((a,b)=>a-b);
}
// Effective slider range for a lever. Pension is dynamic; everything else is
// the static min/max declared in LEVCFG.
function levRange(cfg){
  if(cfg.key==='pensionAge'){
    const a=pensionAges();
    if(a.length) return { min:a[0], max:a[a.length-1], step:1 };
    return { min:62, max:65, step:1 };
  }
  return { min:cfg.min, max:cfg.max, step:cfg.step };
}

/* ── lever display config (label, formatter, slider range→value & back) ── */
const LEVCFG=[
  {key:'retireAge', name:'Retirement Age', min:55,max:72,step:1, fmt:v=>[v,'']},
  {key:'ssAge',     name:'SS Start Age',   min:62,max:70,step:1, fmt:v=>[v,'']},
  // All dollar levers render full digits with comma grouping — no abbreviations.
  // The advisor wants to see the exact number they're proposing, not a rounded
  // shorthand. Step values stay round so the slider snaps cleanly.
  // Spending is stored ANNUAL (the engine's unit) but shown/edited MONTHLY —
  // clients know their monthly number off-hand. edit:'monthly' wires the box.
  {key:'spend',     name:'Lifestyle Spending',min:80000,max:360000,step:1200, edit:'monthly', fmt:v=>['$'+Math.round(v/12).toLocaleString('en-US'),'/mo']},
  // One-time event carries BOTH an amount and an age; edit:'event' renders the
  // two type-in boxes (amount + age) alongside the amount slider.
  {key:'eventAmt',  name:'One-Time Event', min:0,max:500000,step:5000, edit:'event', fmt:(v,L)=>['$'+(v||0).toLocaleString('en-US'),'@ '+L.eventAge]},
  {key:'risk',      name:'Allocation',     min:1,max:6,step:1, fmt:v=>[RISK_LABELS[v],'']},
  {key:'savings',   name:'Savings / yr',   min:0,max:200000,step:1000, edit:'money', fmt:v=>['$'+v.toLocaleString('en-US'),'/yr']},
  // Pension snaps between the ages that actually have entered amounts (62, 65).
  // Label shows the dollar value the engine will pay for that age — if no entry
  // exists for that age, it shows "—" (and the engine pays 0).
  // Pension claim age. Range spans the realistic window; the displayed dollar
  // amount comes from whatever the advisor has entered for that exact age.
  // No entry yet → the value spot becomes an inline input (handled in
  // renderLevValue, not here). This is the truth-source contract surfacing
  // naturally as a UI affordance: "we don't have a number for this age, give
  // us one." Not an error — just the next input.
  {key:'pensionAge', name:'Pension',       min:55,max:70,step:1, fmt:v=>{
    const m=(plan.income.pension && plan.income.pension.benefitByAge) || {};
    const amt=m[v]; return (amt && amt>0) ? ['$'+amt.toLocaleString('en-US'),'@ '+v] : ['__needs__', v];
  }},
];
let running=false;
// Cached market bundle. Generated once, reused across Runs so that hitting Run
// twice with no changes yields the EXACT same numbers (sampling noise was
// causing the % to drift between identical clicks). Invalidated to null
// whenever the plan changes in the Inputs tab.
let sharedPaths=null;
// Bundle index used for the cash-flow table. The bundle (sharedPaths) is seeded, so
// path i reconstructs the EXACT same real-block sequence every Run. The ENGINE picks
// which index is representative (res.representativePathIndex — median-volatility, a
// typical real life); the UI just reads the BASELINE's index and uses the SAME index
// for every scenario column, so all columns share one fixed market sequence and only
// the LEVERS differ (apples-to-apples, the Scenarios doctrine). The "which path is
// representative" math stays in the engine (truth source), not here.
let cfPathIndex=0;

/* ── run the engine for all three columns (shared nothing; each its own MC) ── */
function runAll(){
  if(running) return; running=true;
  const btn=$('#run-btn'); btn.disabled=true; $('#status').textContent='Running…';
  setTimeout(()=>{
    try{
      // SHARED PATHS: one bundle of return paths, reused across scenarios AND
      // across Runs. Within a Run, every column sees the SAME markets (any
      // difference between columns is the DECISION). Across Runs, the bundle
      // is cached so identical inputs give an identical % — no noise drift.
      const horizon = plan.household.primary.planEndAge - plan.household.primary.currentAge;
      const iters = plan.simulation.iterations;
      // Degenerate plan guard: a non-positive horizon (plan-end age at/below
      // current age) can't be simulated. Surface a clear reason and bail
      // WITHOUT nuking the last good results, so the views don't go blank.
      if(!(horizon > 0)){
        $('#status').textContent='Check plan: end age must be after current age';
        btn.disabled=false; running=false; return;
      }
      if(!sharedPaths || sharedPaths.length !== iters || sharedPaths[0].length !== horizon){
        resetSeed();              // fixed seed → identical bundle every load, no % drift
        sharedPaths = [];
        for(let i=0;i<iters;i++) sharedPaths.push(generateReturnPath(horizon));
      }
      // Isolate each scenario: one bad column (e.g. an out-of-range saved lever)
      // must not abort the whole Run and blank every other column + the cash
      // flow drawer. Failed scenarios get res=null and are skipped downstream.
      let failed=0;
      scenarios.forEach(s=>{
        try{
          const p=planForScenario(s.lev);
          const ov=leversToOverrides(s.lev);
          s.res=runSimulation(p, ov, sharedPaths);
        }catch(err){ s.res=null; failed++; if(window.PXDEBUG) console.error('Scenario failed:', s.name, err); }
      });
      // Read the engine's representative seeded-path index from the baseline, reused
      // for every column's cash-flow so all columns share the same market sequence.
      const baseRes = scenarios.find(s=>s.base)?.res || scenarios[0]?.res;
      cfPathIndex = (baseRes && baseRes.representativePathIndex) || 0;
      renderBand(); renderSolvePanel(); renderFoot(); renderCashflow(); buildSeqSelect(); runSeq();
      $('#status').textContent = failed ? `Complete · ${failed} scenario${failed>1?'s':''} could not run` : 'Complete';
    }catch(e){ $('#status').textContent='Error'; if(window.PXDEBUG) console.error(e); }
    btn.disabled=false; running=false;
  },20);
}

/* ── render: sticky band of circles ── */
// Success ring color band: steel-teal (strong) / brass (caution) /
// clay (at risk). No green — matches the Obsidian Brass result tokens.
// Ring band matches the % number: deep green / bronze gold / deep burgundy.
function ringColor(pct){ return pct>=80?'#7AA76C':pct>=71?'#D8B371':'#b83a28'; }
// Locked band hue at lower opacity for the ring glow (same hue, never a new color).
function ringGlow(pct){ return pct>=80?'rgba(122,167,108,.55)':pct>=71?'rgba(216,179,113,.55)':'rgba(184,58,40,.55)'; }
function ring(pct){
  // SVG fills its .circle-wrap via viewBox, so the ring size is controlled by
  // CSS (one place). Thin stroke near the edge leaves room for the % number.
  const r=45,c=2*Math.PI*r,off=c*(1-pct/100);
  const col=ringColor(pct), glow=ringGlow(pct);
  return `<svg viewBox="0 0 100 100" width="100%" height="100%">
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="rgba(255,220,130,.09)" stroke-width="4"/>
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="${col}" stroke-width="4" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 50 50)" style="transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 0 4px ${glow})"/></svg>`;
}
// The band / levers / foot are CSS grids whose column count must match the
// number of scenarios. One place sets it (label gutter + N equal columns) so
// adding/removing a scenario reflows all three rows together.
// On a phone the three columns can't sit side-by-side, so the band shows ALL
// circles (comparison stays on screen) while levers/foot/goals show only the
// ACTIVE column — tap a circle to switch. mobileCol holds that active index.
let mobileCol = 0;
function isMobileView(){ return window.matchMedia('(max-width:760px)').matches; }
function setMobileCol(ci){
  mobileCol = ci;
  const sc=$('.scn-scroll'); if(sc) sc.dataset.active=ci;
  $('#scn-band')?.querySelectorAll('.band-cell[data-col]')
    .forEach(c=>c.classList.toggle('msel', +c.dataset.col===ci));
}
function syncGridCols(){
  const n=scenarios.length, mob=isMobileView();
  if(mobileCol>=n) mobileCol=0;
  const sc=$('.scn-scroll'); if(sc) sc.dataset.active=mobileCol;
  const bandTpl = mob ? `repeat(${n},1fr)` : `218px repeat(${n},1fr)`;
  const tblTpl  = mob ? `112px minmax(0,1fr)` : `218px repeat(${n},1fr)`;
  const b=$('#scn-band'); if(b) b.style.gridTemplateColumns=bandTpl;
  // The circle band sticks just under the (wrapping) mobile header; measure it.
  if(b){
    if(mob){ const hdr=$('.hdr'); b.style.top=(hdr?hdr.offsetHeight:0)+'px'; }
    else b.style.top='';
  }
  ['#scn-levers','#scn-goals','#scn-foot'].forEach(sel=>{
    const el=$(sel); if(el) el.style.gridTemplateColumns=tblTpl;
  });
}
// Neutral ±pts-vs-baseline pill under each circle. Baseline shows "baseline";
// matching success shows "even"; otherwise a signed point delta. Data only.
function deltaPill(s, sr, baseSr){
  if(s.base) return `<div class="circle-delta base">baseline</div>`;
  if(!s.res || baseSr==null) return `<div class="circle-delta"></div>`;
  const d = sr - baseSr;
  const txt = Math.abs(d) < 0.05 ? 'even' : `${d>0?'+':'−'}${Math.abs(d).toFixed(1)} pts`;
  return `<div class="circle-delta">${txt}</div>`;
}
function renderBand(){
  syncGridCols();
  const baseSr = scenarios.find(s=>s.base)?.res?.successRate;
  let h=`<div class="band-cell label"><span>Scenario</span></div>`;
  scenarios.forEach((s,ci)=>{
    const sr=s.res?s.res.successRate:0;
    const col= ringColor(sr);   // %-number + dot share the exact ring band color
    // Header: a small identity dot (column color) + the name. Baseline's name is
    // locked (the anchor); other scenarios render an inline editable field so the
    // advisor can label them ("Retire at 62"). A ✕ removes non-baseline columns.
    // Dot carries the locked band color (same hue as the ring/% — a status cue,
    // not a per-column identity color).
    const dot=`<span class="col-dot" style="background:${col};box-shadow:0 0 8px ${ringGlow(sr)}"></span>`;
    const nameEl = s.base
      ? `<span class="col-name base-tag">${dot}${escHtml(s.name)}</span>`
      : `<span class="col-name">${dot}<input class="col-rename" data-col="${ci}" value="${escHtml(s.name)}" maxlength="28" aria-label="Scenario name"><button class="col-x" data-col="${ci}" title="Remove scenario">✕</button></span>`;
    h+=`<div class="band-cell ${s.base?'base':''} ${ci===mobileCol?'msel':''}" data-col="${ci}">
      ${nameEl}
      <div class="circle-wrap">${ring(sr)}
        <div class="circle-val"><span class="big" style="color:${col}">${sr.toFixed(1)}%</span><span class="lbl">Success</span></div></div>
      ${deltaPill(s, sr, baseSr)}
    </div>`;
  });
  // Label gutter: just buttons. The solver FORM renders in the full-width
  // #solve-panel below the band (it needs room — the gutter is only ~148px).
  const addBtn = scenarios.length < MAX_SCENARIOS
    ? `<button class="add-scen" title="Add scenario">+ Add</button>` : '';
  const resetBtn = scenarios.some(s=>!s.base)
    ? `<button class="solve-btn reset-scen" title="Reset every scenario back to match Baseline">↺ Reset</button>` : '';
  const gut = `<span>Scenario</span>${addBtn}
    <button class="solve-btn" title="Find the least-disruptive path to a goal">✦ Solve…</button>${resetBtn}`;
  h=h.replace('<span>Scenario</span>', gut);
  $('#scn-band').innerHTML=h;
}

/* ── render: lever grid (built once, values update in place) ── */
// Format a single lever value into the inner HTML for its display span.
// Special return ['__needs__', age] from a fmt() means "no entered amount for
// this age yet" — render an inline input so the advisor can type one in
// without leaving the lever. Plain numbers/strings render as before.
// Neutral delta-vs-baseline chip — the COMPARISON cue (Scenarios = compare
// choices). No good/bad coloring: later retirement isn't "better," it's a
// trade-off, so the chip stays a muted, opinion-free tone. Empty on the
// baseline column and wherever a lever matches baseline.
function levDelta(cfg, lev){
  const baseLev = scenarios.find(s=>s.base)?.lev;
  if(!baseLev || lev===baseLev) return '';
  const d = (lev[cfg.key]||0) - (baseLev[cfg.key]||0);
  if(!d) return '';
  const sign = d>0 ? '+' : '−', a = Math.abs(d);
  let txt;
  if(cfg.key==='spend')                 txt = `${sign}$${Math.round(a/12).toLocaleString('en-US')}/mo`;
  else if(cfg.key==='savings' || cfg.key==='eventAmt' || cfg.key==='buyAmt') txt = `${sign}$${a.toLocaleString('en-US')}`;
  else if(cfg.key==='risk')             txt = `${sign}${a} lvl`;
  else /* ages */                       txt = `${sign}${a} yr`;
  return `<span class="lev-delta">${txt}</span>`;
}
// Stepper buttons for the discrete levers (ages / allocation / pension). The
// click handler derives the column from the enclosing #lv-… span, so the
// buttons only carry key + direction. ml:auto pins them right when there's no
// delta chip to do it.
function stepper(cfg, pinRight){
  return `<span class="lev-step"${pinRight?' style="margin-left:auto"':''}>`
       + `<button class="step-btn" data-dir="-1" data-key="${cfg.key}" tabindex="-1">−</button>`
       + `<button class="step-btn" data-dir="1" data-key="${cfg.key}" tabindex="-1">+</button></span>`;
}
function renderLevValue(cfg, lev){
  const [val,unit]=cfg.fmt(lev[cfg.key], lev);
  if(val==='__needs__'){
    return `$<input class="pen-in" type="text" inputmode="numeric" data-pen-age="${unit}"> <span class="unit">@ ${unit}</span>${stepper(cfg,true)}`;
  }
  const d = levDelta(cfg, lev);
  // Type-in boxes for the dollar/age levers. The box edits the same value the
  // slider drives — both stay in sync. data-edit tells the input handler how to
  // interpret the typed number (monthly→annual, plain money, or event age).
  if(cfg.edit==='monthly'){
    const mo=Math.round(lev[cfg.key]/12);
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="monthly" data-key="${cfg.key}" value="${mo.toLocaleString('en-US')}"> <span class="unit">/mo</span>${d}`;
  }
  if(cfg.edit==='money'){
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="money" data-key="${cfg.key}" value="${(lev[cfg.key]||0).toLocaleString('en-US')}"> <span class="unit">${unit}</span>${d}`;
  }
  if(cfg.edit==='event'){
    return `$<input class="lev-in" type="text" inputmode="numeric" data-edit="eventAmt" data-key="eventAmt" value="${(lev.eventAmt||0).toLocaleString('en-US')}">`
         + ` <span class="unit">@ age</span> `
         + `<input class="lev-in age-in" type="text" inputmode="numeric" data-edit="eventAge" data-key="eventAge" value="${lev.eventAge}">${d}`;
  }
  if(cfg.edit==='buy'){
    // Amount + age, then (only when the household owns a property) a toggle to
    // fund the purchase by selling the primary. The toggle is meaningful only
    // once an amount is set, so it shows when buyAmt > 0.
    let h = `$<input class="lev-in" type="text" inputmode="numeric" data-edit="buyAmt" data-key="buyAmt" value="${(lev.buyAmt||0).toLocaleString('en-US')}">`
          + ` <span class="unit">@ age</span> `
          + `<input class="lev-in age-in" type="text" inputmode="numeric" data-edit="buyAge" data-key="buyAge" value="${lev.buyAge}">${d}`;
    if((plan.properties||[]).length && (lev.buyAmt||0) > 0){
      h += `<button class="lev-fund${lev.buyFromPrimary?' on':''}" data-key="buyFromPrimary" title="Fund this purchase by selling the primary residence">↳ sell primary to fund</button>`;
    }
    return h;
  }
  // Discrete levers (ages / allocation): value + delta + stepper buttons.
  return `${val}${unit?` <span class="unit">${unit}</span>`:''}${d}${stepper(cfg, !d)}`;
}
// A lever is "dollar" (keeps a draggable slider) when it has an edit type;
// the discrete levers (ages / allocation / pension) use steppers + a static bar.
const isDollarLever = cfg => !!cfg.edit;
// Where the value sits inside its range, 0–100% — drives both the slider fill
// and the static bar fill/dot so every bar reads the same way down a row.
function barFillPct(cfg, L){
  const r=levRange(cfg), v=Math.max(r.min,Math.min(r.max,L[cfg.key]||r.min));
  return r.max>r.min ? ((v-r.min)/(r.max-r.min))*100 : 0;
}
// Refresh one cell in place after its value changed: value text + the bar
// (slider position+fill for dollar levers, fill+dot for discrete ones).
function updateCell(ci, cfg){
  const L=scenarios[ci].lev, span=$(`#lv-${ci}-${cfg.key}`); if(!span) return;
  span.innerHTML=renderLevValue(cfg, L);
  const pct=barFillPct(cfg,L), cell=span.parentElement;
  const sl=cell.querySelector('.lev-slider');
  if(sl){ const r=levRange(cfg); sl.value=Math.max(r.min,Math.min(r.max,L[cfg.key])); sl.style.setProperty('--fill',pct+'%'); }
}
// Commit a lever change: editing the baseline shifts every other column's
// delta, so rebuild the whole grid then; otherwise just refresh the one cell.
function commitLever(ci, cfg){
  if(scenarios[ci].base) buildLevers(); else updateCell(ci, cfg);
  $('#status').textContent='Adjusted · Run to update';
  saveScenarios();
}
function buildLevers(){
  syncGridCols();
  let h='';
  LEVCFG.forEach(cfg=>{
    h+=`<div class="lev-name">${cfg.name}</div>`;
    const r=levRange(cfg);
    scenarios.forEach((s,ci)=>{
      const last=ci===scenarios.length-1?'col-last':'';
      const pct=barFillPct(cfg,s.lev);
      const bar = isDollarLever(cfg)
        ? `<input class="lev-slider ${s.base?'base-lock':''}" type="range" min="${r.min}" max="${r.max}" step="${r.step}"
                 value="${Math.max(r.min,Math.min(r.max,s.lev[cfg.key]))}" data-col="${ci}" data-key="${cfg.key}" style="--fill:${pct}%">`
        : '';
      h+=`<div class="lev-cell ${s.base?'base':''} ${last}" data-col="${ci}">
        <span class="lev-val ${s.base?'base':''}" id="lv-${ci}-${cfg.key}">${renderLevValue(cfg,s.lev)}</span>
        ${bar}
      </div>`;
    });
  });
  $('#scn-levers').innerHTML=h;
  renderScenGoals();
}
// Goals section — READ-ONLY mirror of the base-plan goals across every column.
// Goals live in the base plan (single source of truth); each scenario carries
// the same set, so the value is identical down each row. That sameness IS the
// truth — the goal is funded in every scenario. Edited only on the Goals page.
function renderScenGoals(){
  const host=$('#scn-goals'); if(!host) return;
  syncGridCols();
  // Keep each goal's ORIGINAL plan.goals index (gi) — that's the stable key the
  // per-scenario overrides (lev.goalAmts) and planForScenario use.
  const goals=(Array.isArray(plan.goals)?plan.goals:[]).map((g,gi)=>({g,gi})).filter(x=>(x.g.amount||0)>0);
  // Section header row: a gold "Goals" label in the gutter + a tinted header
  // cell per column so the section reads as a block under the levers.
  let h=`<div class="sg-head">Goals</div>`;
  scenarios.forEach((s,ci)=>{ h+=`<div class="sg-head sg-col ${s.base?'base':''}" data-col="${ci}"></div>`; });
  if(!goals.length){
    h+=`<div class="sg-empty">No goals yet — add them on the Goals page to see them here.</div>`;
    host.innerHTML=h; return;
  }
  // One row per goal: name + age window in the gutter, then an EDITABLE amount per
  // scenario column (recurring → /yr, single-year window → one-time). Each column's
  // amount is its override (lev.goalAmts) or the base goal amount.
  const colTot=scenarios.map(()=>({rec:0,once:0}));
  goals.forEach(({g,gi})=>{
    const once=(g.startAge===g.endAge);
    const win = once ? `at age ${g.startAge}` : `age ${g.startAge}–${g.endAge}`;
    const tag = once ? 'one-time' : '/yr';
    h+=`<div class="sg-name">${escHtml(g.name||'Goal')}<span class="sg-win">${win}</span></div>`;
    scenarios.forEach((s,ci)=>{
      const ov = s.lev.goalAmts && s.lev.goalAmts[gi];
      const amt = (ov!=null) ? ov : (g.amount||0);
      if(once) colTot[ci].once+=amt; else colTot[ci].rec+=amt;
      h+=`<div class="sg-cell ${s.base?'base':''} ${ov!=null?'edited':''}" data-col="${ci}"><span class="sg-cur">$</span><input class="sg-amt" data-col="${ci}" data-gi="${gi}" inputmode="numeric" value="${amt.toLocaleString('en-US')}"><span class="sg-tag">${tag}</span></div>`;
    });
  });
  // Total row: recurring annual goal spend per column (the steady draw), with any
  // one-time total noted alongside so a single spike isn't hidden in the annual line.
  h+=`<div class="sg-total">Annual goal spend</div>`;
  scenarios.forEach((s,ci)=>{
    const t=colTot[ci];
    const txt = `$${t.rec.toLocaleString('en-US')}`
      + (t.once>0 ? ` <span class="sg-tag">+ $${t.once.toLocaleString('en-US')} one-time</span>` : '');
    h+=`<div class="sg-tcell ${s.base?'base':''}" data-col="${ci}">${txt}</div>`;
  });
  host.innerHTML=h;
}

    solverFormOpen = false; renderSolvePanel(); return;
  }
  if(e.target.closest('#solve-clear-btn')){
    solverResults = null; solverSearching = false;
    comboResults = null; comboOpen = false; comboSearching = false;
    renderSolvePanel(); return;
  }
  // Fold-down: open runs the (heavy) combo search once and caches it; toggle off
  // just collapses. The cache is reused on re-open until the solo solve changes.
  if(e.target.closest('#combo-toggle')){
    comboOpen = !comboOpen;
    if(comboOpen && !comboResults && !comboSearching) runComboSolve();  // renders itself
    else renderSolvePanel();
    return;
  }
  const loadBtn = e.target.closest('.solve-load');
  if(loadBtn && solverResults && solverResults.rows){
    if(scenarios.length >= MAX_SCENARIOS) return;
    const idx = +loadBtn.dataset.soloIdx;
    const row = solverResults.rows[idx];
    if(!row) return;
    // Scenario = the pinned soloBase with this one lever set to its solo answer.
    const lev = JSON.parse(JSON.stringify(solverResults.soloBase));
    lev[row.key] = row.value;
    syncPension(lev);
    const cfg = LEVCFG.find(c=>c.key===row.key);
    scenarios.push({ name: `${cfg.name} solve`, base:false, lev, res:null });
    solverResults = null; solverSearching = false;
    comboResults = null; comboOpen = false;
    saveScenarios(); buildLevers(); renderBand(); renderSolvePanel(); plansDirty=true; runAll();
  }
  // Load a COMBO: the held-fixed soloBase with both lever moves applied.
  const cLoadBtn = e.target.closest('.cc-load');
  if(cLoadBtn && comboResults && comboResults.combos){
    if(scenarios.length >= MAX_SCENARIOS) return;
    const c = comboResults.combos[+cLoadBtn.dataset.comboIdx];
    if(!c) return;
    const lev = JSON.parse(JSON.stringify(comboResults.soloBase));
    c.items.forEach(m => lev[m.key] = m.val);

    const nm = comboResults.goalType==='retire' ? `Retire ${comboResults.params.age}`
             : c.items.map(m=>COMBO_SHORT[m.key]).join(' + ');
    scenarios.push({ name: nm.slice(0,28), base:false, lev, res:null });
    solverResults = null; solverSearching = false;
    comboResults = null; comboOpen = false;
    saveScenarios(); buildLevers(); renderBand(); renderSolvePanel(); plansDirty=true; runAll();
  }
});

/* ── chart helpers ── */
function fmtM(v){ if(!isFinite(v)||v<=0) return '$0'; if(v>=1e6) return '$'+(v/1e6).toFixed(1)+'M'; if(v>=1e3) return '$'+Math.round(v/1e3)+'K'; return '$'+Math.round(v); }
// Plot margins inside the viewBox (leaves room for axis labels).
const PADL=78, PADR=14, PADT=12, PADB=30;
// Chart axis colors, matched to the light-theme tokens (--rule-faint / --ink-faint).
const GRID='rgba(200,165,80,.14)', AXIS_INK='rgba(240,225,190,.72)';
// Smooth a series of [x,y] points into a path using Catmull-Rom -> bezier.
// Tension kept low so the line stays trackable, not wavy ("toddler-drawn").
// Monotone cubic interpolation (Fritsch–Carlson). Unlike Catmull-Rom it CANNOT
// overshoot the data, so the curve stays smooth without inventing humps/dips
// between points — the difference between a grown-up chart and a wobbly one.
function monoPath(pts){
  const n=pts.length;
  if(n<2) return '';
  if(n===2) return `M ${pts[0][0]} ${pts[0][1]} L ${pts[1][0]} ${pts[1][1]}`;
  const xs=pts.map(p=>p[0]), ys=pts.map(p=>p[1]);
  const dx=[], dy=[], m=[];
  for(let i=0;i<n-1;i++){ dx[i]=xs[i+1]-xs[i]; dy[i]=ys[i+1]-ys[i]; m[i]=dy[i]/(dx[i]||1e-9); }
  const t=new Array(n);
  t[0]=m[0]; t[n-1]=m[n-2];
  for(let i=1;i<n-1;i++) t[i] = (m[i-1]*m[i]<=0) ? 0 : (m[i-1]+m[i])/2;
  for(let i=0;i<n-1;i++){
    if(m[i]===0){ t[i]=0; t[i+1]=0; continue; }
    const a=t[i]/m[i], b=t[i+1]/m[i], s=a*a+b*b;
    if(s>9){ const tau=3/Math.sqrt(s); t[i]=tau*a*m[i]; t[i+1]=tau*b*m[i]; }
  }
  let d=`M ${xs[0].toFixed(1)} ${ys[0].toFixed(1)}`;
  for(let i=0;i<n-1;i++){
    const h=dx[i];
    d+=` C ${(xs[i]+h/3).toFixed(1)} ${(ys[i]+t[i]*h/3).toFixed(1)}, ${(xs[i+1]-h/3).toFixed(1)} ${(ys[i+1]-t[i+1]*h/3).toFixed(1)}, ${xs[i+1].toFixed(1)} ${ys[i+1].toFixed(1)}`;
  }
  return d;
}
// Round a raw max up to a clean axis ceiling whose quarter-steps are round
// numbers (so ticks read $2M/$4M/… not $3.4M/$5.1M…).
function niceCeil(v){
  if(!(v>0)) return 1;
  // Round up to a value with nice quarter-gridlines (4 ticks). Finer step options
  // (…3,4,6,8…) keep the overshoot small — e.g. $11.9M rounds to $12M, not $20M —
  // so the condensed sequencing cap actually stays condensed.
  const step0=v/4, mag=Math.pow(10, Math.floor(Math.log10(step0))), n=step0/mag;
  const niceN = n<=1?1 : n<=1.5?1.5 : n<=2?2 : n<=2.5?2.5 : n<=3?3 : n<=4?4 : n<=5?5 : n<=6?6 : n<=8?8 : n<=10?10 : n<=12?12 : n<=15?15 : 20;
  return niceN*mag*4;
}
function smoothPath(pts){
  if(pts.length<2) return '';
  if(pts.length===2) return `M ${pts[0][0]} ${pts[0][1]} L ${pts[1][0]} ${pts[1][1]}`;
  let d=`M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||pts[i+1];
    const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
  }
  return d;
}
function axes(W,H,ageStart,ageEnd,maxBal){
  const x0=PADL, x1=W-PADR, y0=PADT, y1=H-PADB;
  let g='';
  // Horizontal gridlines — faint rule color so the grid is legible without
  // competing with the data lines. (Was a dark-theme near-black; fixed for the
  // light "paper" theme.)
  for(let i=0;i<=4;i++){const y=y0+(y1-y0)/4*i; g+=`<line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}" stroke="${GRID}"/>`;}
  // y labels (right-aligned in the left gutter)
  for(let i=0;i<=4;i++){const v=maxBal*(1-i/4); const y=y0+(y1-y0)/4*i;
    g+=`<text x="${x0-12}" y="${y+4}" fill="${AXIS_INK}" font-size="9.5" font-family="Inter" text-anchor="end">${fmtM(v)}</text>`;}
  // x age ticks
  const span=ageEnd-ageStart;
  for(let k=0;k<=5;k++){const a=Math.round(ageStart+span*k/5); const x=x0+(x1-x0)*k/5;
    g+=`<text x="${x}" y="${H-9}" fill="${AXIS_INK}" font-size="9.5" font-family="Inter" text-anchor="${k===0?'start':k===5?'end':'middle'}">Age ${a}</text>`;}
  return g;
}
/* ── Cash-flow drawer ────────────────────────────────────────────────────
   Renders one SEEDED block-bootstrap life: res.sims[cfPathIndex] — a single real
   path drawn from the fixed-seed bundle, so it reconstructs the identical sequence
   of real historical blocks on every Run, and the SAME market sequence is used for
   every scenario column (only the levers differ → apples-to-apples). The path is
   the bundle's representative (median-volatility) draw, so it's a real life a
   client could live, not a wild outlier. Because the blocks are real, the table
   shows genuine sequence-of-returns risk — good years, crash years, recoveries —
   which is the whole point of Parallax: show the truth of reality. A flat
   constant-return "expected" path was tried here and rejected — it read as a static
   positive return, exactly what this tool exists to disprove. Each row carries
   year, age, socialSecurity, pension, otherIncome, withdrawal, expenses, goals,
   taxes, realReturnUsed, startBalance, balance. */
function cfMoney(v){
  if(!isFinite(v)) return '—';
  const n = Math.round(v);
  if(n === 0) return '$0';
  return '$' + Math.abs(n).toLocaleString('en-US');
}
// Annual portfolio return — the market's contribution that year. % is the real
// return used by the engine; $ is that return applied to the year's start balance
// (today's dollars), so good/bad sequencing reads straight off the table.
function cfRetPct(r){ if(!isFinite(r)) return '—'; const p = r*100; return (p>=0?'+':'−') + Math.abs(p).toFixed(1) + '%'; }
function cfGain(v){ if(!isFinite(v) || Math.round(v)===0) return '$0'; return (v<0?'−':'+') + '$' + Math.abs(Math.round(v)).toLocaleString('en-US'); }
let cfCompare = null;   // original index of the 2nd (comparison) scenario shown
let cfPreRet = false;   // off = inflows/outflows from retirement age (default). on = fill the
                        // working years too (wages in + savings out — display only, NOT modeled).
let cfShowAll = false;  // off = Baseline + one comparison (default). on = every scenario column.
function renderCashflow(){
  const drawer = $('#cf-drawer');
  if(drawer.style.display !== 'block') return;   // only render when open; runAll re-renders if so
  // Show at most TWO scenarios: the Baseline anchor + one selectable comparison.
  // Three columns of year-by-year cash flow is too busy to read (Nathan).
  const baseIdx = Math.max(0, scenarios.findIndex(s => s.base));
  const others  = scenarios.map((_,i)=>i).filter(i => i !== baseIdx);
  if(cfCompare == null || !others.includes(cfCompare)) cfCompare = others.length ? others[0] : null;
  // View option: All scenarios (every column) vs Baseline + one comparison.
  const shown = cfShowAll
    ? [baseIdx, ...others]
    : (cfCompare != null ? [baseIdx, cfCompare] : [baseIdx]);
  const rowsByScen = shown.map(i => {
    const res = scenarios[i].res;
    // ONE REAL SEEDED LIFE: the same fixed seeded block-bootstrap path (cfPathIndex)
    // for every column, so the cash-flow shows one real historical-block sequence and
    // only the LEVERS differ between columns (apples-to-apples). Seeded → it
    // reconstructs the identical sequence every Run; real blocks → genuine
    // sequence-of-returns (good years, crash years, recoveries), not a flat
    // projection. (The smooth "Expected end" on the Scenarios cards is the separate
    // planning headline.)
    const central = (res && res.sims && res.sims.length)
      ? res.sims[Math.min(cfPathIndex, res.sims.length-1)] : null;
    return central ? central.rows : [];
  });
  // No data anywhere (e.g. a failed/degenerate Run) → say so plainly instead of
  // rendering an empty headers-only table that looks like it "didn't load".
  if(!rowsByScen.some(r => r.length)){
    drawer.innerHTML =
      `<div class="cf-drawer-head"><span>Annual Cash Flow</span></div>` +
      `<div class="cf-empty">No cash-flow data yet. Press Run — or check the plan inputs if the status bar shows a warning.</div>`;
    return;
  }
  // RMD = the FULL required minimum each year (gross), its OWN category — not the
  // forced-excess (r.rmd) and not folded into Income/Withdraw. So it reads
  // consistently from age 73 in every scenario that holds a Traditional balance.
  const gcls = shown.map((_,pos)=>`cf-g${pos%2}`);
  const hasRmd = rowsByScen.some(rows => rows.some(r => r && r.rmdRequired > 0));
  // Show a Goals column whenever any year has goal spend — so a one-time goal
  // (a single-year spike) or a recurring goal feeds visibly through to the
  // cash flow instead of just inflating that year's withdrawal silently.
  const hasGoals = rowsByScen.some(rows => rows.some(r => r && r.goals > 0));
  const hasLump  = rowsByScen.some(rows => rows.some(r => r && r.lumpSum > 0));
  // Working-years view: pre-retirement wages (display only — engine ignores
  // income.workingIncome) and the annual savings contribution. Only surfaced
  // when the toggle is on, so the default post-retirement view is untouched.
  const wages = Math.max(0, plan.income.workingIncome || 0);
  const hasSavings = cfPreRet && rowsByScen.some(rows => rows.some(r => r && r.phase === 'accum' && r.savings > 0));
  const cols = 5 + (hasRmd?1:0) + (hasGoals?1:0) + (hasLump?1:0) + (hasSavings?1:0);   // +Return %, +Return $
  let h = '<table class="cf-table"><thead><tr><th class="age" rowspan="2">Age</th>';
  shown.forEach((si,pos)=>{
    h += `<th class="scen ${gcls[pos]}" colspan="${cols}" style="color:${colorFor(si)}">${escHtml(scenarios[si].name)}</th>`;
  });
  h += '</tr><tr>';
  shown.forEach((si,pos)=>{
    h += `<th class="${gcls[pos]}">Income</th><th class="${gcls[pos]}">Withdraw</th>`;
    if(hasSavings) h += `<th class="${gcls[pos]}" title="Annual savings contributed while working — display only, not modeled">Savings</th>`;
    if(hasRmd)  h += `<th class="${gcls[pos]} cf-rmd" title="Gross required minimum — already part of Withdraw, not additional">RMD</th>`;
    if(hasGoals) h += `<th class="${gcls[pos]}">Goals</th>`;
    if(hasLump)  h += `<th class="${gcls[pos]}">One-time</th>`;
    h += `<th class="${gcls[pos]}">Return %</th><th class="${gcls[pos]}">Return $</th>`;
    h += `<th class="${gcls[pos]}">End Balance</th>`;
  });
  h += '</tr></thead><tbody>';
  const len = Math.max(0, ...rowsByScen.map(r => r.length));
  const curAge = plan.household.primary.currentAge;
  const retireAge = plan.household.primary.retirementAge;
  for(let y = 0; y < len; y++){
    // Engine keys every event off age = currentAge + y (y=0 is the current age),
    // so the table must too — otherwise a goal/SS/retirement lands one row late.
    const age = curAge + y;
    h += `<tr class="${age===retireAge?'retire':''}"><td class="age">${age}</td>`;
    shown.forEach((si,pos)=>{
      const r = rowsByScen[pos][y];
      if(!r){ h += `<td colspan="${cols}" class="dim ${gcls[pos]}">—</td>`; return; }
      // Pre-retirement (still working) years: income/withdrawal aren't part of the
      // post-retirement story, so show a neutral dash — never a $0 that reads as a
      // value. The balance still matters (it's accumulating), so it stays.
      const acc = r.phase === 'accum';
      const dash = '<span style="color:var(--ink-faint)">—</span>';
      const inc = (r.socialSecurity || 0) + (r.pension || 0) + (r.otherIncome || 0);
      // Working years: Income = wages (display only) when the toggle is on, else a
      // dash — so the default view still "starts" the inflows at retirement age.
      const accInc = (cfPreRet && wages > 0) ? cfMoney(wages) : dash;
      h += `<td class="${gcls[pos]}">${acc ? accInc : cfMoney(inc)}</td>`;
      // Withdraw tooltip — answers "for what?": the gross draw funds the year's
      // spending gap (expenses + goals − income), grossed up for the tax on the
      // amount drawn. Descriptive, not an exact sum (the row's `taxes` also covers
      // tax on income that isn't portfolio-funded, so it wouldn't reconcile).
      const wdTip = acc ? '' : ` title="Gross portfolio withdrawal — funds this year's spending (${cfMoney(r.expenses||0)}) + goals (${cfMoney(r.goals||0)}) − income (${cfMoney(inc)}), grossed up for income tax on the amount drawn."`;
      h += `<td class="${gcls[pos]}"${wdTip}>${acc ? dash : cfMoney(r.withdrawal || 0)}</td>`;
      if(hasSavings) h += `<td class="${gcls[pos]}">${(acc && r.savings > 0) ? cfMoney(r.savings) : dash}</td>`;
      if(hasRmd)  h += `<td class="${gcls[pos]} cf-rmd">${(!acc && r.rmdRequired > 0) ? cfMoney(r.rmdRequired) : dash}</td>`;
      // Goals show in EVERY phase (even accumulation) so a pre-retirement
      // one-time goal still appears in its year.
      if(hasGoals) h += `<td class="${gcls[pos]}">${(r.goals > 0) ? cfMoney(r.goals) : dash}</td>`;
      // One-time event (Scenarios lever) — shows in whichever phase it lands.
      if(hasLump)  h += `<td class="${gcls[pos]}">${(r.lumpSum > 0) ? cfMoney(r.lumpSum) : dash}</td>`;
      // Portfolio return (% and $) — shown in every phase; the market acts on the
      // balance whether you're still saving or drawing down.
      const rr = r.realReturnUsed, gain = (r.startBalance || 0) * rr, rc = rr >= 0 ? 'cf-pos' : 'cf-neg';
      h += `<td class="${gcls[pos]} ${isFinite(rr)?rc:''}">${isFinite(rr) ? cfRetPct(rr) : dash}</td>`;
      h += `<td class="${gcls[pos]} ${isFinite(rr)?rc:''}">${isFinite(rr) ? cfGain(gain) : dash}</td>`;
      h += `<td class="${gcls[pos]}">${cfMoney(r.balance || 0)}</td>`;
    });
    h += '</tr>';
  }
  h += '</tbody></table>';
  // Comparison picker — only when there's a choice (3+ scenarios) AND we're not
  // already showing every column.
  let pills = '';
  if(!cfShowAll && others.length > 1){
    pills = `<span class="cf-pick">vs ` + others.map(i =>
      `<button class="cf-pill${i===cfCompare?' on':''}" data-cf="${i}"${i===cfCompare?` style="color:${colorFor(i)};border-color:${colorFor(i)}"`:''}>${escHtml(scenarios[i].name)}</button>`
    ).join('') + `</span>`;
  }
  // View option: show every scenario column at once (the table now spans the page).
  const allToggle = others.length >= 1
    ? `<button class="cf-yrs${cfShowAll?' on':''}" id="cf-all" title="Show every scenario column, or just Baseline + one comparison">${cfShowAll?'Compare two':'All scenarios'}</button>`
    : '';
  const yrsToggle = `<button class="cf-yrs${cfPreRet?' on':''}" id="cf-yrs" title="Show the working years — wages in + savings out (display only, not modeled)">${cfPreRet?'Hide working years':'Show working years'}</button>`;
  // Honest framing: this is ONE real central life (the simulated path that lands
  // nearest the median), shown in today's dollars. It carries real year-to-year
  // market swings — that's deliberate; the full range of outcomes lives in the
  // success % and the Sequencing tab.
  const subText = cfPreRet
    ? `Incl. working years · wages + savings shown, not modeled · today's $`
    : `One representative path (tracks the median) · today's $ · real year-to-year market swings — full range lives in the % and Sequencing`;
  drawer.innerHTML =
    `<div class="cf-drawer-head"><span>Annual Cash Flow</span>${pills}${allToggle}${yrsToggle}<span class="sub">${subText}</span></div>` +
    `<div class="cf-scroll">${h}</div>`;
  drawer.querySelectorAll('.cf-pill').forEach(b => b.onclick = () => { cfCompare = +b.dataset.cf; renderCashflow(); });
  const ab = $('#cf-all'); if(ab) ab.onclick = () => { cfShowAll = !cfShowAll; renderCashflow(); };
  const yb = $('#cf-yrs'); if(yb) yb.onclick = () => { cfPreRet = !cfPreRet; renderCashflow(); };
}

/* ── SEQUENCING tab — same returns, different ORDER ──────────────────────────
   The tab's single job: isolate the ORDER of returns. We take one REAL
   historical return stream and run the SAME plan through it forward vs exactly
   reversed (identical returns, opposite sequence). Any difference is pure
   sequence-of-returns risk. Every number on this tab is a direct read of the
   engine's single-path result; the UI computes no balances or metrics. */
// The Sequencing tab holds ONE plan fixed and runs it through several REAL
// retirement markets — never a reversed/counterfactual timeline. The lesson is
// the truth a client actually faces: retire into a brutal market vs a kind one,
// same plan, and watch the spread. A LIBRARY of real markets the advisor can
// toggle on/off as lines (`on` = shown by default). Euphoric bulls (1982/85) are
// deliberately omitted — a 10-20x winner crushes the scale and hides the
// downside, which is the whole point of a sequence-risk view.
// Distinct but DEEP, desaturated editorial tones — each line identifiable, none
// candy-bright. Default four (slate-blue / teal-green / brass / rust) are picked
// to be maximally distinct from each other on the cream paper.
const SEQ_YEARS=[
  {y:1929, tag:'Great Depression',  c:'#b07acc', on:false},
  {y:1966, tag:'the lost decade',   c:'#7ab0c8', on:true },
  {y:1973, tag:'stagflation',       c:'#52b48a', on:true },
  {y:1987, tag:'Black Monday',      c:'#8fb8a8', on:false},
  {y:1995, tag:'the 90s boom',      c:'#c9924a', on:true },
  {y:2000, tag:'dot-com crash',     c:'#c4685a', on:true },
  {y:2008, tag:'financial crisis',  c:'#6ec9a0', on:false},
  {y:2009, tag:'the recovery bull', c:'#a09882', on:false},
];

// Which scenario the Sequencing tab runs through the historical markets. Held
// in JS (not a native select) so the open list can be fully themed.
let seqPlanName=null;
function buildSeqSelect(){
  const menu=$('#seq-dd-menu'), label=$('#seq-dd-label'); if(!menu) return;
  // Keep the current pick if it still exists; otherwise default to the first.
  if(!seqPlanName || !scenarios.some(s=>s.name===seqPlanName)) seqPlanName=scenarios[0]?.name||'';
  menu.innerHTML=scenarios.map(s=>
    `<div class="seq-dd-opt${s.name===seqPlanName?' sel':''}" role="option" data-name="${escHtml(s.name)}">${escHtml(s.name)}</div>`).join('');
  if(label) label.textContent=seqPlanName;
  buildSeqChips();
}
// One-time wiring for the custom Plan dropdown (the section markup is static, so
// these elements exist at load — same as the old <select> did).
(function initSeqDD(){
  const btn=$('#seq-dd-btn'), menu=$('#seq-dd-menu'); if(!btn||!menu) return;
  const close=()=>{ menu.hidden=true; btn.setAttribute('aria-expanded','false'); };
  btn.addEventListener('click', e=>{
    e.stopPropagation();
    const open=menu.hidden; menu.hidden=!open; btn.setAttribute('aria-expanded', String(open));
  });
  menu.addEventListener('click', e=>{
    const o=e.target.closest('.seq-dd-opt'); if(!o) return;
    seqPlanName=o.dataset.name; close(); buildSeqSelect(); runSeq();
  });
  document.addEventListener('click', ()=>{ if(!menu.hidden) close(); });
})();
// Market chips double as the selector AND the legend: lit = shown as a line.
function buildSeqChips(){
  const box=$('#seq-chips'); if(!box) return;
  box.innerHTML=SEQ_YEARS.map((m,i)=>
    `<button class="seq-chip${m.on?' on':''}" data-i="${i}"><span class="cdot" style="background:${m.c}"></span>${m.y} · ${m.tag}</button>`).join('');
  box.querySelectorAll('.seq-chip').forEach(btn=>btn.onclick=()=>{
    const m=SEQ_YEARS[+btn.dataset.i];
    if(m.on && SEQ_YEARS.filter(x=>x.on).length<=1) return;   // keep at least one line
    m.on=!m.on; buildSeqChips(); runSeq();
  });
}
// Build a "retire-now" clone: the household standing at its retirement age with
// the plan's MEDIAN projected balance (read from the engine envelope, not
// invented). Every real market then runs from this ONE shared starting point, so
// the only thing differing between lines is the market — not the entry balance.
function retireNowClone(p, ov, curAge, retAge, accumYears, envelope){
  // `envelope` is the chosen scenario's already-computed envelope, passed in
  // from runSeq. Reusing it (a) keeps the sequencing entry balance IDENTICAL to
  // the Scenarios tab — both read the same shared-path run — and (b) avoids
  // re-running a full Monte Carlo on every chip toggle. Fall back to a
  // shared-path run only if the scenario hasn't been computed yet.
  const env = envelope || (runSimulation(p, ov, sharedPaths) || {}).envelope;
  const accs=p.portfolio.accounts;
  const tot=accs.taxable.balance+accs.traditional.balance+accs.roth.balance;
  const entry=(env && env[accumYears] && env[accumYears].p50!=null) ? env[accumYears].p50 : tot;
  const rp=JSON.parse(JSON.stringify(p));
  const ra=rp.portfolio.accounts;
  if(tot>0){ const f=entry/tot; ra.taxable.balance*=f; ra.traditional.balance*=f; ra.roth.balance*=f; }
  else { ra.taxable.balance=entry; }
  rp.household.primary.currentAge=retAge;          // standing at retirement → no accumulation phase
  rp.household.primary.retirementAge=retAge;
  if(rp.household.spouse && rp.household.spouse.currentAge!=null)
    rp.household.spouse.currentAge += (retAge-curAge);
  return rp;
}
function runSeq(){
  const s=scenarios.find(x=>x.name===seqPlanName)||scenarios[0];
  // Sequence the chosen scenario FAITHFULLY: allocation via the plan clone, every
  // other lever via the same overrides mapping the Scenarios tab uses.
  const p=planForScenario(s.lev);
  const ov=leversToOverrides(s.lev);
  const strat=p.portfolio.withdrawalStrategy||'taxable-first';
  const curAge=plan.household.primary.currentAge;
  const retAge=(s.lev.retireAge!=null?s.lev.retireAge:p.household.primary.retirementAge);
  const accumYears=Math.max(0, retAge-curAge);
  const rp=retireNowClone(p, ov, curAge, retAge, accumYears, s.res && s.res.envelope);
  const ov2={...ov, retireDelay:0};                // retirement age is baked into the clone now
  const runs=SEQ_YEARS.filter(m=>m.on)
                      .map(m=>({m, res:runHistoricalPath(rp, m.y, strat, undefined, ov2)}))
                      .filter(r=>r.res && r.res.rows.length);
  if(!runs.length){ $('#seq-svg').innerHTML=''; $('#seq-prints').innerHTML=''; return; }
  drawSeqChart(runs, retAge);
  renderPrints(runs);
  const n=runs.length;
  $('#seq-sub').textContent='Same plan, real markets';
}
function drawSeqChart(runs, retAge){
  const svg=$('#seq-svg'),W=1000,H=320;
  // All lines share the retirement-entry balance (same plan), then diverge purely
  // by the market they retired into. Full width = the retirement years.
  const entry=runs[0].res.rows[0].startBalance||0;
  const series=res=>[entry, ...res.rows.map(x=>x.balance)];
  const all=runs.map(r=>series(r.res));
  const n=Math.max(...all.map(a=>a.length));
  const ageStart=retAge, ageEnd=retAge+n-1;
  // Decision-zone cap: for sequence risk the readable region is the entry balance
  // DOWN to zero (will the money last?). Condense the axis to show entry safely above
  // zero and all path endings visible: entry gets ~30% of height, paths at 60–70%,
  // headroom above. A runaway boom line still rises OFF THE TOP (clipped by #seqclip)
  // with its true ending in its card — it does NOT ride flat. Axis rounded to nice ticks.
  const realMax=Math.max(...all.map(a=>Math.max(...a)));
  const ceiling=Math.max(entry*1.5, realMax*1.15);
  const maxBal=niceCeil(ceiling);
  const x0=PADL, x1=W-PADR, y0=PADT, y1=H-PADB;
  const X=idx=> x0+(x1-x0)*(idx/(Math.max(1,n-1)));
  // No clamp to maxBal: values above the ceiling map above y0 and are clipped, so a
  // boom line exits the top cleanly instead of flat-lining along it. (Floor stays 0.)
  const Y=v => y1-(Math.max(0,v)/maxBal)*(y1-y0);
  let h=axes(W,H,ageStart,ageEnd,maxBal);
  h+=`<defs><clipPath id="seqclip"><rect x="${x0}" y="${y0-2}" width="${x1-x0}" height="${y1-y0+2}"/></clipPath></defs><g clip-path="url(#seqclip)">`;
  // Per line: a paper-colored HALO underneath, then the colored line on top. The
  // halo knocks out the lines below at every crossing, so the crowded middle
  // reads cleanly and the top line is unambiguous. Monotone curve = no overshoot.
  // A depleted line STOPS at $0 (no crawl along the floor) — the ✕ marks the end.
  const ends=[];
  runs.forEach((r,i)=>{
    const full=all[i];
    const dep=r.res.depletionAge!=null;
    let ei=full.length-1;
    if(dep){ const k=full.findIndex((v,idx)=>idx>0 && v<=0.01); if(k>0) ei=k; }
    const col=r.m.c;
    const d=monoPath(full.slice(0,ei+1).map((v,k)=>[X(k),Y(v)]));
    h+=`<path d="${d}" fill="none" stroke="var(--surface)" stroke-width="1.3" stroke-linejoin="round" stroke-linecap="round"/>`;
    h+=`<path d="${d}" fill="none" stroke="${col}" stroke-width="0.65" stroke-linejoin="round" stroke-linecap="round"/>`;
    ends.push({c:col, year:r.m.y, dep, idx:ei, endV:full[ei], vals:full, px:X(ei), py:Y(full[ei])});
  });
  h+=`</g>`;
  // Endpoint/launch markers (✕ where a line ran dry, dots at start/end) removed —
  // Nathan: the lines alone read cleaner; the fingerprint cards below carry outcome.
  // No year labels on the lines — the chip row above the chart and the fingerprint
  // cards below already say which color is which market. Adding a year on each
  // line just adds visual noise that has to be de-collided every redraw.
  svg.innerHTML=h;
  seqHover={ x0,x1,y0,y1, W,H, n, ageStart, X, Y,
    lines: ends.map(e=>({c:e.c, year:e.year, dep:e.dep, idx:e.idx, endV:e.endV, vals:e.vals})) };
  drawSeqOverlay(); attachSeqHover();
}
// ── Sequencing chart: hover guide + end-of-path value labels ───────────────
// The SVG uses preserveAspectRatio="none" (lines stretch to fill), so text/dots
// drawn IN the SVG would distort. We keep the data lines in the SVG and draw the
// labels, crosshair, dots, and tooltip as a crisp HTML overlay, mapping the
// viewBox coords → container pixels live (so it tracks any resize).
let seqHover=null, seqHoverAttached=false;
function drawSeqOverlay(){
  const ov=document.getElementById('seq-overlay'); if(!ov||!seqHover) return;
  const body=ov.parentElement, rect=body.getBoundingClientRect();
  if(rect.width<2||rect.height<2){ ov.innerHTML='<div id="seq-live"></div>'; return; }
  const sx=rect.width/seqHover.W, sy=rect.height/seqHover.H;
  // Persistent end-of-path $ labels (survivors only; depleted lines are carried
  // by the fingerprint cards). De-collide vertically so stacked ends stay legible.
  // Clamp marker Y into the chart area: a boom line's value can map above the top
  // (the line itself clips), but its end label must stay pinned at the top edge.
  const clampY=v=>Math.max(seqHover.y0, Math.min(seqHover.y1, seqHover.Y(v)));
  const labs=seqHover.lines.filter(l=>!l.dep).map(l=>({
    px:seqHover.X(l.idx)*sx, py:clampY(l.endV)*sy, c:l.c, txt:fmtM(l.endV) }));
  labs.sort((a,b)=>a.py-b.py);
  for(let i=1;i<labs.length;i++){ if(labs[i].py-labs[i-1].py<15) labs[i].py=labs[i-1].py+15; }
  let html='<div id="seq-live"></div>';
  labs.forEach(l=>{ const left=Math.min(l.px+6, rect.width-50);
    html+=`<div class="seq-end" style="left:${left}px;top:${l.py}px;color:${l.c}">${l.txt}</div>`; });
  ov.innerHTML=html;
}
function renderSeqHoverAt(idx){
  const live=document.getElementById('seq-live'); if(!live||!seqHover) return;
  const body=live.parentElement.parentElement, rect=body.getBoundingClientRect();
  if(rect.width<2) return;
  const sx=rect.width/seqHover.W, sy=rect.height/seqHover.H;
  const gx=seqHover.X(idx)*sx, topPx=seqHover.y0*sy, botPx=seqHover.y1*sy;
  let html=`<div class="seq-guide" style="left:${gx}px;top:${topPx}px;height:${botPx-topPx}px"></div>`;
  const age=seqHover.ageStart+idx, rows=[];
  const clampY=v=>Math.max(seqHover.y0, Math.min(seqHover.y1, seqHover.Y(v)));
  seqHover.lines.forEach(l=>{ if(idx>l.idx) return; const v=l.vals[idx]; if(v==null) return;
    html+=`<div class="seq-dot" style="left:${gx}px;top:${clampY(v)*sy}px;background:${l.c}"></div>`;
    rows.push({c:l.c,year:l.year,v}); });
  if(!rows.length){ live.innerHTML=html; return; }
  rows.sort((a,b)=>b.v-a.v);
  let tip=`<div class="seq-tip-age">Age ${age}</div>`;
  rows.forEach(r=>{ tip+=`<div class="seq-tip-row"><i style="background:${r.c}"></i>${r.year}<b>${fmtM(r.v)}</b></div>`; });
  const tipLeft=(gx<rect.width-160)?gx+14:gx-156;
  html+=`<div class="seq-tip" style="left:${Math.max(4,tipLeft)}px;top:${topPx+6}px">${tip}</div>`;
  live.innerHTML=html;
}
function clearSeqHover(){ const live=document.getElementById('seq-live'); if(live) live.innerHTML=''; }
function attachSeqHover(){
  if(seqHoverAttached) return; const svg=document.getElementById('seq-svg'); if(!svg) return;
  const body=svg.parentElement; seqHoverAttached=true;
  body.addEventListener('pointermove',e=>{ if(!seqHover) return;
    const rect=body.getBoundingClientRect(); if(rect.width<2) return;
    const vbx=(e.clientX-rect.left)/(rect.width/seqHover.W);
    let frac=(vbx-seqHover.x0)/(seqHover.x1-seqHover.x0); frac=Math.max(0,Math.min(1,frac));
    renderSeqHoverAt(Math.round(frac*(seqHover.n-1))); });
  body.addEventListener('pointerleave',clearSeqHover);
}
addEventListener('resize',()=>{ if(seqHover) drawSeqOverlay(); });
// Path fingerprint — facts read straight off the engine result. One card per real
// market: the first-decade return (the sequence-risk cause), the lowest the
// portfolio fell, and the outcome. No invented composite "score".
function renderPrints(runs){
  const firstDecade=r=>{
    const rr=r.rows.filter(x=>x.source!=null).slice(0,10);
    if(!rr.length) return 0;
    const prod=rr.reduce((a,x)=>a*(1+x.returnRate),1);
    return Math.pow(prod,1/rr.length)-1;
  };
  const lowest=r=>{ const b=r.rows.map(x=>x.balance); return b.length?Math.min(...b):0; };
  // Damage window — the longest run of years the market's cumulative return sat
  // BELOW its retirement-day level (lost real ground). A short, V-shaped shock
  // ('08–09) recovers in a couple of years; a long grind ('66/'73 — a decade of
  // flat-real + inflation) stays underwater far longer and does more damage to a
  // withdrawing portfolio. Pure VIEW of the path's per-year returns, no new math.
  const damageWindow=r=>{
    const rr=r.rows.filter(x=>x.source!=null);
    let g=1, cur=0, max=0;
    for(const x of rr){ g*=(1+x.returnRate); if(g<1){ cur++; if(cur>max) max=cur; } else cur=0; }
    return max;
  };
  const pct=v=>(v>=0?'+':'')+(v*100).toFixed(1)+'%';
  const outcome=r=> r.depletionAge!=null
    ? {t:`Ran dry @ ${r.depletionAge}`, c:'var(--negative-bright)'}
    : {t:`Survived · ${fmtM(r.terminalBalance)}`, c:'var(--positive-bright)'};
  const card=(m,res)=>{
    const o=outcome(res);
    const dwYrs=damageWindow(res);
    // Only when there IS a drawdown — a good market never goes underwater, so the
    // row would just read "—". Show it where it tells a story; omit it otherwise.
    const dwBlock = dwYrs ? `
      <div class="pr-row" style="border-bottom:none"><span class="pr-k">Duration</span><span class="pr-v">${dwYrs} yr${dwYrs>1?'s':''}</span></div>
      <div class="dw-bar"><div class="dw-fill" style="width:${Math.min(100,dwYrs/12*100).toFixed(0)}%;background:#34465c"></div></div>` : '';
    return `<div class="seq-print">
      <h4><span class="dot" style="border-color:${m.c}"></span>${m.y} · ${m.tag}</h4>
      <div class="pr-row"><span class="pr-k">First decade</span><span class="pr-v">${pct(firstDecade(res))}</span></div>
      <div class="pr-row"><span class="pr-k">Lowest</span><span class="pr-v">${fmtM(lowest(res))}</span></div>
      ${dwBlock}
      <div class="pr-row"><span class="pr-k">Outcome</span><span class="pr-v" style="color:${o.c}">${o.t}</span></div>
    </div>`;
  };
  $('#seq-prints').innerHTML=runs.map(r=>card(r.m, r.res)).join('');
}

/* ── tab switch + boot ── */
$$('.htab').forEach(t=>t.onclick=()=>{
  $$('.htab').forEach(x=>x.classList.remove('on'));
  $$('.page').forEach(x=>x.classList.remove('on'));

  if(t.dataset.page==='scenarios'){ if(plansDirty){ plansDirty=false; runAll(); } }
  if(t.dataset.page==='sequencing'){ buildSeqSelect(); runSeq(); }

});
// Net Worth sub-nav: switch the active sub-page, persist, re-render.
$$('#np-subnav .stab').forEach(b => b.onclick = () => {

// Persistent Save (visible on every Net Worth sub-page). Edits already auto-save
// on commit; this is the explicit "it's stored" affordance the advisor asked for.
$('#np-save').onclick = () => {
  const b = $('#np-save');
  savePlan();
  b.textContent = 'Saved ✓';

};
// ── Clean input behavior, BUILD-WIDE (every input, one delegated handler) ──
// On focus/click of any value field, land the caret BEFORE the first digit
// (text/money) or select the value (numeric steppers) — so clicking a field is
// always ready to type, never dropping the cursor mid-number. caret-color (CSS)
// keeps the blinking cursor visible on the dark ground.
document.addEventListener('focusin', e => {
  const el = e.target;
  if(!el || el.tagName !== 'INPUT') return;
  const t = el.type;
  if(t === 'checkbox' || t === 'radio' || t === 'range') return;
  // setTimeout(0): run AFTER the browser places the click caret, then override it.
  setTimeout(() => { try { if(t === 'number') el.select(); else el.setSelectionRange(0, 0); } catch(_){} }, 0);
});
$('#run-btn').onclick=runAll;
// Cash-flow drawer toggle. We render on open (and every Run while open).
$('#cf-btn').onclick=()=>{
  const d=$('#cf-drawer');
  const open = d.style.display === 'block';
  d.style.display = open ? 'none' : 'block';
  $('#cf-btn').textContent = open ? 'Show year-by-year cash flow ▾' : 'Hide cash flow ▴';
  if(!open) renderCashflow();
};

// Sync the baseline anchor to the freshly-loaded plan before first render.
// loadScenarios() may restore lever values saved against an OLDER plan; without
// this, the baseline column would show stale levers that don't match the
// household's current inputs (field note 18). reseedScenarios mirrors the plan
// into the baseline and preserves each what-if scenario's delta.
reseedScenarios();
buildLevers();
renderSolvePanel();
renderInputs();
runAll();   // first iteration runs immediately so the tool opens populated
</script>

<button id="sg-fab" title="Suggest edits — tap things and leave notes">&#9998; Suggest</button>
<div id="sg-bar">

  <button class="sg-btn primary" id="sg-copy">Copy for Guppi</button>
  <button class="sg-btn" id="sg-dl">Download</button>
  <button class="sg-btn" id="sg-clear">Clear</button>
  <button class="sg-btn" id="sg-done">Done</button>
</div>
<div id="sg-pop"></div>
<div id="sg-toast"></div>
<script>
(function(){
  const KEY='parallax_suggest_v1';
  let notes=[]; try{ notes=JSON.parse(localStorage.getItem(KEY)||'[]')||[] }catch{}
  let on=false, seq=notes.reduce((m,n)=>Math.max(m,n.id),0), ivl=null;
  const q=s=>document.querySelector(s);
  const fab=q('#sg-fab'),bar=q('#sg-bar'),pop=q('#sg-pop'),toast=q('#sg-toast');
  const nice={'net-worth':'Household','scenarios':'Scenarios','sequencing':'Sequencing'};
  const save=()=>{ try{ localStorage.setItem(KEY,JSON.stringify(notes)) }catch(e){ if(window.PXDEBUG) console.error('notes save failed:',e); } };
  const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const activePage=()=>document.querySelector('.htab.on')?.dataset.page||'';
  function colName(el){ const c=el.closest('[data-col]'); if(!c)return''; const i=+c.dataset.col;
    const names=[...document.querySelectorAll('.col-name')].map(n=>n.textContent.replace(/[✕✎]/g,'').trim());
    return names[i]||('Column '+(i+1)); }
  function rowLabel(el){ const g=el.closest('.scn-levers,.scn-goals,.scn-foot'); if(!g)return'';
    let ch=el; while(ch&&ch.parentElement!==g) ch=ch.parentElement;
    let s=ch; while(s){ if(s.classList&&s.classList.contains('lev-name')) return s.textContent.trim(); s=s.previousElementSibling; } return''; }
  function nwHead(el){ if(activePage()!=='net-worth')return''; let node=el;
    while(node&&node!==document.body){ let s=node; while(s){ if(s.classList&&s.classList.contains('bs-head')) return s.textContent.trim(); s=s.previousElementSibling; } node=node.parentElement; } return''; }
  function curValue(el){ if(el.matches('input,textarea')) return (el.value||'').trim(); if(el.matches('select')) return el.value||''; return''; }
  function selfDesc(el){
    if(el.matches('input,textarea')){ const v=curValue(el); const ph=el.placeholder||el.getAttribute('aria-label')||''; return (ph?ph+' ':'field ')+(v?('= '+v):'(empty)'); }
    if(el.matches('select')) return 'dropdown = '+(el.value||'');
    let t=(el.getAttribute('aria-label')||el.title||el.textContent||'').replace(/\s+/g,' ').trim();
    if(t.length>46)t=t.slice(0,46)+'…'; return t||el.tagName.toLowerCase(); }
  function locator(el){ const parts=[nice[activePage()]||'App'];
    const c=colName(el); if(c)parts.push(c);
    const r=rowLabel(el); if(r)parts.push(r);
    const h=nwHead(el); if(h&&!r)parts.push(h);
    parts.push(selfDesc(el)); return parts.filter(Boolean).join(' ▸ '); }
  function cssPath(el){ const root=el.closest('.page')||document.body; const seg=[]; let n=el;
    while(n&&n!==root&&seg.length<7){ let i=1,s=n; while((s=s.previousElementSibling)){ if(s.tagName===n.tagName)i++; }
      seg.unshift(n.tagName.toLowerCase()+':nth-of-type('+i+')'); n=n.parentElement; }
    const pg=root.dataset?.page; return (pg?'.page[data-page="'+pg+'"] ':'')+seg.join(' > '); }
  let editingId=null;
  function openPop(el,cx,cy,existing){
    editingId=existing?existing.id:null;
    const loc=existing?existing.locator:locator(el);
    const cur=existing?existing.value:curValue(el);
    const isInput=existing?existing.isInput:el.matches('input,textarea,select');
    pop.innerHTML=`<div class="sg-loc">${esc(loc)}</div>`
      +(cur?`<div class="sg-cur">now: ${esc(cur)}</div>`:'')
      +(isInput?`<label>Change value to (optional)</label><input class="sg-newval" value="${esc(existing&&existing.newValue||'')}" placeholder="leave blank to keep">`:'')
      +`<label>Your note</label><textarea placeholder="what should change here?">${esc(existing&&existing.note||'')}</textarea>`
      +`<div class="sg-actions">`+(existing?`<button class="sg-btn" id="sg-del">Delete</button>`:'')
      +`<button class="sg-btn" id="sg-cancel">Cancel</button><button class="sg-btn primary" id="sg-savenote">Save</button></div>`;
    pop.classList.add('on');
    const w=pop.offsetWidth,h=pop.offsetHeight;
    pop.style.left=Math.min(Math.max(12,cx-w/2),innerWidth-w-12)+'px';
    pop.style.top=Math.min(Math.max(12,cy+14),innerHeight-h-12)+'px';
    const ta=pop.querySelector('textarea'); ta&&ta.focus();
    pop.querySelector('#sg-savenote').onclick=()=>{
      const note=pop.querySelector('textarea').value.trim();
      const nvEl=pop.querySelector('.sg-newval'); const newValue=nvEl?nvEl.value.trim():'';
      if(!note&&!newValue){ closePop(); return; }
      if(editingId){ const n=notes.find(x=>x.id===editingId); n.note=note; n.newValue=newValue; }
      else notes.push({id:++seq,page:activePage(),locator:loc,value:cur,newValue,note,isInput,path:cssPath(el),ts:Date.now()});
      save(); render(); closePop();
    };
    pop.querySelector('#sg-cancel').onclick=closePop;
    const del=pop.querySelector('#sg-del'); if(del) del.onclick=()=>{ notes=notes.filter(x=>x.id!==editingId); save(); render(); closePop(); };
  }
  function closePop(){ pop.classList.remove('on'); editingId=null; }
  function render(){
    bar.querySelector('.sg-count').textContent=notes.length;
    document.querySelectorAll('.sg-pin').forEach(p=>p.remove());
    if(!on)return;
    notes.forEach((n,idx)=>{
      let el=null; try{ el=n.path?document.querySelector(n.path):null }catch{}
      if(!el)return; const r=el.getBoundingClientRect();
      if((r.width===0&&r.height===0)||r.bottom<0||r.top>innerHeight)return;
      const pin=document.createElement('div'); pin.className='sg-pin'; pin.textContent=idx+1;
      pin.style.left=(r.right-4)+'px'; pin.style.top=(r.top+6)+'px';
      pin.onclick=e=>{ e.preventDefault(); e.stopPropagation(); openPop(el,r.right,r.top,n); };
      document.body.appendChild(pin);
    });
  }
  const isUI=t=>t.closest('#sg-bar,#sg-pop,#sg-fab,.sg-pin,#sg-toast');
  const isNav=t=>t.closest('.htab,.stab');
  document.addEventListener('click',e=>{ if(!on)return; if(isUI(e.target))return; if(isNav(e.target)){ setTimeout(render,60); return; }
    e.preventDefault(); e.stopPropagation(); openPop(e.target,e.clientX,e.clientY,null); },true);
  ['mousedown','pointerdown','touchstart'].forEach(ev=>document.addEventListener(ev,e=>{
    if(!on)return; if(isUI(e.target)||isNav(e.target))return; e.preventDefault(); e.stopPropagation(); },true));
  let rt; const reflow=()=>{ cancelAnimationFrame(rt); rt=requestAnimationFrame(render); };
  addEventListener('scroll',reflow,true); addEventListener('resize',reflow);
  function toastMsg(m){ toast.textContent=m; toast.classList.add('on'); clearTimeout(toast._t); toast._t=setTimeout(()=>toast.classList.remove('on'),1800); }
  function payload(){ const d=new Date().toLocaleString(); let o='PARALLAX — edit suggestions ('+notes.length+')  ·  '+d+'\n\n';
    notes.forEach((n,i)=>{ o+=(i+1)+'. ['+n.locator+']\n';
      if(n.newValue)o+='   value: '+(n.value||'—')+'  →  '+n.newValue+'\n';
      if(n.note)o+='   ▸ '+n.note+'\n'; o+='\n'; }); return o; }
  async function copyOut(){ if(!notes.length){ toastMsg('No notes yet'); return; } const t=payload();
    try{ await navigator.clipboard.writeText(t); toastMsg('Copied — paste to Guppi'); }
    catch{ const ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.focus(); ta.select();
      try{ document.execCommand('copy'); toastMsg('Copied — paste to Guppi'); }catch{ toastMsg('Copy failed — use Download'); } ta.remove(); } }
  q('#sg-copy').onclick=copyOut;
  q('#sg-dl').onclick=()=>{ if(!notes.length){ toastMsg('No notes yet'); return; }
    const b=new Blob([payload()],{type:'text/plain'}); const a=document.createElement('a');
    a.href=URL.createObjectURL(b); a.download='parallax-suggestions.txt'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),2000); };
  q('#sg-clear').onclick=()=>{ if(!notes.length)return; if(confirm('Clear all '+notes.length+' suggestions?')){ notes=[]; save(); render(); } };
  q('#sg-done').onclick=()=>setOn(false);
  function setOn(v){ on=v; document.body.classList.toggle('sg-on',v); if(!v)closePop(); render();
    if(v){ toastMsg('Suggest mode — tap anything to leave a note'); ivl=setInterval(render,700); }
    else { clearInterval(ivl); ivl=null; } }
  fab.onclick=()=>setOn(true);
  render();
})();
</script>
</body>
</html>
