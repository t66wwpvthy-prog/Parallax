// Cash Flow is now an explicit view inside the ScenariosUI view layer (the
// Compare/Focus/Cash-Flow renderer at the end of this script). The old
// cf-mode sidebar (cfMode / cfPrimary / cfCompare / renderCfSidebar / setCfMode
// + #cf-mode-btn) was removed with its markup; the toolbar's Cash Flow chip and
// the per-view scenario selector replace it.

/* ===========================================================================
   ScenariosUI — the single Scenarios view layer (Compare / Focus / Cash Flow).
   Presentation only: it formats and selects numbers PRODUCTION already produced
   (scenarios, s.res, s.lev, path replay, s.res.typicalPathFederalTax). It never
   computes a planning/projection/RMD/withdrawal/success-rate/tax number.
   The PROD object is the only coupling to production; it reads module symbols
   directly (this IIFE shares the module scope).
   =========================================================================== */
(function () {
  'use strict';

  function openSolver(){
    solverFormOpen = true;
    renderSolvePanel();
    const p = document.getElementById('solve-panel');
    if(p) p.scrollIntoView({ behavior:'smooth', block:'center' });
  }

  let _selectedId = null;

  const PROD = {
    scenarios:    () => scenarios,
    getSelectedId:() => _selectedId,
    setSelectedId:(id) => { _selectedId = id; },
    addScenario:  () => { addScenario(); },
    solve:        () => openSolver(),
    suggest:      () => openSolver(),
    afterEngineAction: () => {},      // addScenario already runs runAll()→sync; solver opens a form
    isTypicalPath:() => pathReplay.mode === 'typical',
    id:        (s) => String(scenarios.indexOf(s)),
    name:      (s) => s.name,
    prob:      (s) => s.res && s.res.successRate,
    median:    (s) => { const e = s.res && s.res.envelope; return (e && e.length) ? e[e.length - 1].p50 : null; },
    range:     (s) => {
      const t = s.res && s.res.terminal; if(!t) return null;
      const e = s.res.envelope, p50 = (e && e.length) ? e[e.length - 1].p50 : (t.p50 != null ? t.p50 : null);
      const lo = t.p10, hi = t.p90;
      const medianPct = (lo != null && hi != null && hi > lo && p50 != null)
        ? Math.max(0, Math.min(100, (p50 - lo) / (hi - lo) * 100)) : 50;
      return { lo, hi, medianPct };
    },
    viability: (s) => viabilityString(s),
    isBaseline:(s) => !!s.base,
    levers:    (s) => leversFor(s),
    goals:     (s) => goalsVM(s),
    stress:    (s) => (s.res && s.res.stress) || [],   // populated by computeHistoricalStress in runAll (engine-derived)
    pathRows:  (s) => buildPathRows(s),
    cashSummary: (s) => buildCashSummary(s),
    typicalPathFederalTax: (s) => s.res && s.res.typicalPathFederalTax,
    householdName: () => (plan.meta && (plan.meta.primaryName || plan.meta.household)) || '',
  };

  /* ---- presentation helpers (formatting + color only) --------------------- */
  const TONE = { green: '#8fa57e', amber: '#cd9a52', rust: '#c0795f' };
  const GLOW = { '#8fa57e': 'var(--tone-green-glow)', '#cd9a52': 'var(--tone-amber-glow)', '#c0795f': 'var(--tone-rust-glow)' };
  function toneForProb(prob) {
    if (prob == null) return TONE.green;
    if (prob >= 85) return TONE.green;
    if (prob >= 70) return TONE.amber;
    return TONE.rust;
  }
  function toneGlow(tone) { return GLOW[tone] || 'var(--tone-green-glow)'; }
  function fmtMoney(n) {
    if (n == null || n <= 0) return '—';
    if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return '$' + Math.round(n / 1e3) + 'K';
    return '$' + Math.round(n);
  }
  function num(n, d) { return (n == null) ? '—' : Number(n).toFixed(d == null ? 1 : d); }
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function wdColor(wd, shortfall) {
    if (shortfall) return 'var(--down-deep)';
    if (wd < 3) return 'var(--tone-green)';
    if (wd < 4.5) return 'var(--tone-amber)';
    if (wd < 6) return 'var(--down)';
    return 'var(--down-deep)';
  }
  function ring(size, r, sw, tone, pct, inner) {
    const circ = (2 * Math.PI * r);
    const off = (circ * (1 - (pct || 0) / 100)).toFixed(1);
    return (
      '<div class="ring" style="width:' + size + 'px;height:' + size + 'px;--tone:' + tone + ';">' +
        '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' +
          '<circle class="ring__track" cx="' + (size / 2) + '" cy="' + (size / 2) + '" r="' + r + '" stroke-width="' + sw + '"></circle>' +
          '<circle class="ring__arc" cx="' + (size / 2) + '" cy="' + (size / 2) + '" r="' + r + '" stroke-width="' + sw + '" ' +
            'stroke-dasharray="' + circ.toFixed(1) + '" stroke-dashoffset="' + off + '"></circle>' +
        '</svg>' +
        (inner ? '<div class="ring__label">' + inner + '</div>' : '') +
      '</div>'
    );
  }
  const CHECK = (sw, s) => '<svg width="' + s + '" height="' + s + '" viewBox="0 0 15 15" fill="none"><path d="M3 7.5 L6 10.5 L12 4" stroke="#8fa57e" stroke-width="' + sw + '" stroke-linecap="round" stroke-linejoin="round"></path></svg>';
  const DOWN_TRI = '<svg width="8" height="8" viewBox="0 0 9 9" fill="#c0795f"><path d="M4.5 8 L0.5 2 L8.5 2 Z"></path></svg>';

  // Age-specific viability string per the design spec:
  //   "Funds last to age X"     — plan survives the median path
  //   "Shortfall risk after age X" — median path depletes before plan end
  // Reads the typical (p50) path from the scenario's already-computed results.
  // Pure presentation: no engine math, no re-simulation.
  function viabilityString(s) {
    if (!s.res) return '';
    const planEnd = plan.household.primary.planEndAge;
    // Use the p50 (typical) path index from the scenario's own result set so
    // the viability string is consistent with the rest of the Focus panel.
    const p50Idx = (s.res.paths && s.res.paths.p50 && s.res.paths.p50.simIndex != null)
      ? s.res.paths.p50.simIndex : 0;
    const sim = (Array.isArray(s.res.sims) ? s.res.sims.find(x => x.simIndex === p50Idx) : null)
             || (Array.isArray(s.res.sims) ? s.res.sims[0] : null);
    if (!sim) return '';
    if (sim.failed && sim.depletionAge) {
      return 'Shortfall risk after age ' + sim.depletionAge;
    }
    return 'Funds last to age ' + planEnd;
  }

  /* ---- adapter helpers (production shapes → view-models) ------------------- */
  // Lever keys shown, in a stable order across all scenarios (so Compare aligns).
  function activeLeverKeys() {
    const anyEvent = (scenarios || []).some((s) => s.lev && s.lev.eventAmt > 0);
    // Pension is removed from the Scenarios lever rows (per product ruling). The
    // engine still honors pension data from the plan; it is just not an editable
    // Scenarios lever. The one-time event row only appears when an event is set.
    // Retirement age drops out once the household is already retired — it is no
    // longer a lever we can pull (the retirement decision is behind them).
    const retired = hhAlreadyRetired();
    return LEVCFG.map((c) => c.key).filter((k) =>
      k !== 'pensionAge'
      && (k !== 'eventAmt' || anyEvent)
      && (k !== 'retireAge' || !retired));
  }
  function leverDeltaText(cfg, lev, baseLev) {
    if (!baseLev || lev === baseLev || cfg.key === 'sellAge') return null;
    const d = (lev[cfg.key] || 0) - (baseLev[cfg.key] || 0);
    if (!d) return null;
    const sign = d > 0 ? '+' : '−', a = Math.abs(d);
    if (cfg.key === 'spend')   return sign + '$' + Math.round(a / 12).toLocaleString('en-US') + '/mo';
    if (cfg.key === 'savings' || cfg.key === 'eventAmt') return sign + '$' + a.toLocaleString('en-US');
    if (cfg.key === 'risk')    return sign + a + ' lvl';
    return sign + a + ' yr';
  }
  // Derive the prefilled input string for a dollar lever (no $ or unit).
  function editInputVal(cfg, lev) {
    if (cfg.edit === 'monthly') return Math.round((lev[cfg.key] || 0) / 12).toLocaleString('en-US');
    if (cfg.edit === 'event')   return (lev.eventAmt || 0).toLocaleString('en-US');
    if (cfg.edit === 'money')   return (lev[cfg.key] || 0).toLocaleString('en-US');
    return null;
  }
  function leversFor(s) {
    const base = (scenarios.find((x) => x.base) || {}).lev;
    return activeLeverKeys().map((k) => {
      const cfg = LEVCFG.find((c) => c.key === k); if (!cfg) return null;
      const fv = cfg.fmt(s.lev[k], s.lev), val = fv[0], unit = fv[1];
      const value = (val === '__needs__') ? ('— @ ' + unit) : (val + (unit ? (' ' + unit) : ''));
      return {
        key: k, label: cfg.name, value: value, delta: leverDeltaText(cfg, s.lev, base),
        editType: cfg.edit || null,
        inputVal: editInputVal(cfg, s.lev),
        unitStr: unit || '',
        eventAge: (cfg.edit === 'event') ? (s.lev.eventAge != null ? s.lev.eventAge : '') : null,
      };
    }).filter(Boolean);
  }
  // Effective goal (base value with this scenario's override applied) — the Goals
  // page defines the base inventory; each scenario carries amount/startAge/endAge
  // overrides only. `idx` is the goal's index in the base inventory (the override key).
  function effGoal(baseGoal, ov) {
    return {
      amount:   (ov && ov.amount   != null) ? ov.amount   : (baseGoal.amount || 0),
      startAge: (ov && ov.startAge != null) ? ov.startAge : baseGoal.startAge,
      endAge:   (ov && ov.endAge   != null) ? ov.endAge   : baseGoal.endAge,
    };
  }
  // Compare goal rows = base goals with a base amount > 0, keeping their original
  // index so overrides and engine goals stay aligned.
  function goalRowsBase() {
    return (Array.isArray(plan.goals) ? plan.goals : [])
      .map((g, i) => ({ g: g, i: i }))
      .filter((r) => (r.g.amount || 0) > 0);
  }
  // Per-scenario goals view-model: effective values + override/baseline-delta info.
  function goalsVM(s) {
    const ovMap = (s && s.lev && s.lev.goalOv) || {};
    const baseScn = scenarios.find((x) => x.base);
    const baseOvMap = (baseScn && baseScn.lev && baseScn.lev.goalOv) || {};
    return goalRowsBase().map(({ g, i }) => {
      const e = effGoal(g, ovMap[i]);
      const once = (e.startAge === e.endAge);
      const ov = ovMap[i];
      const overridden = !!(ov && (ov.amount != null || ov.startAge != null || ov.endAge != null));
      // Δ vs the baseline scenario's effective values for this goal.
      const be = effGoal(g, baseOvMap[i]);
      const aDelta = (e.amount || 0) - (be.amount || 0);
      const sameAsBase = (e.amount === be.amount && e.startAge === be.startAge && e.endAge === be.endAge);
      return {
        idx: i,
        name: g.name || 'Goal',
        meta: once ? ('at age ' + e.startAge) : ('age ' + e.startAge + '–' + e.endAge),
        amount: e.amount || 0, startAge: e.startAge, endAge: e.endAge,
        cadence: once ? 'one-time' : '/yr', once: once,
        on: (e.amount || 0) > 0, added: false,
        overridden: overridden,
        amountDelta: aDelta, sameAsBase: sameAsBase,
      };
    });
  }
  function lifeTagFor(age, lev) {
    if (!lev) return null;
    if (age === lev.retireAge) return 'Retirement begins';
    if (age === lev.ssAge)     return 'Social Security';
    if (age === 73)            return 'RMDs begin';
    return null;
  }
  function goalTagFor(r, age) {
    if (!(r.goals > 0)) return null;
    const g = (Array.isArray(plan.goals) ? plan.goals : [])
      .find((x) => (x.amount || 0) > 0 && x.startAge === x.endAge && x.startAge === age);
    return g ? g.name : null;
  }
  // Cash-flow rows = the selected path's engine rows (retirement phase), formatted.
  // r.wdRate is the engine's own per-row withdrawal rate (percent); r.taxes the
  // engine row tax — no UI-side math here.
  function buildPathRows(s) {
    if (!s.res) return [];
    const sim = simByIndex(s.res, selectedPathIndex());
    if (!sim || !Array.isArray(sim.rows)) return [];
    const curAge = plan.household.primary.currentAge;
    const baseYear = new Date().getFullYear();
    return sim.rows.filter((r) => r.phase !== 'accum').map((r) => {
      const age = (r.age != null) ? r.age : curAge;
      return {
        year: baseYear + (age - curAge),
        age: age,
        income: (r.socialSecurity || 0) + (r.pension || 0) + (r.otherIncome || 0),
        rmd: r.rmd || 0,
        essential: r.expenses || 0,
        goals: r.goals || 0,
        tax: r.taxes || 0,
        draw: r.withdrawal || 0,
        wdRate: (r.wdRate != null) ? r.wdRate : 0,
        ending: r.balance || 0,
        shortfall: (r.balance != null && r.balance <= 0),
        startPort: r.startBalance || 0,
        lifeTag: lifeTagFor(age, s.lev),
        goalTag: goalTagFor(r, age),
      };
    });
  }
  function buildCashSummary(s) {
    if (!s.res) return {};
    const sim = simByIndex(s.res, selectedPathIndex());
    if (!sim) return {};
    let d = {};
    try { d = (typeof pathDigest === 'function') ? pathDigest(sim) : {}; } catch (e) { d = {}; }
    const retRows = (sim.rows || []).filter((r) => r.phase !== 'accum');
    const lifetimeDraw = retRows.reduce((a, r) => a + (r.withdrawal || 0), 0);
    const planEnd = plan.household.primary.planEndAge;
    const fundsLast = sim.failed ? ('Age ' + (sim.depletionAge || d.depletionAge || '—')) : ('Through ' + planEnd);
    return { lifetimeDraw: lifetimeDraw, peakWdRate: d.peakWdRate, peakWdAge: d.peakWdAge, fundsLast: fundsLast };
  }

  // Lever step: reuses the EXISTING production mutation (LEVCFG/levRange/syncPension)
  // and the existing manual Run flow ("Adjusted · Run to update"). No auto-run.
  function stepFocusLever(ci, key, dir) {
    const cfg = LEVCFG.find((c) => c.key === key); if (!cfg) return;
    const sc = scenarios[ci]; if (!sc || !sc.lev) return;
    const r = levRange(cfg), L = sc.lev;
    L[key] = Math.max(r.min, Math.min(r.max, (L[key] != null ? L[key] : r.min) + dir * r.step));
    if (key === 'pensionAge') L.pensionAuto = false;
    if (key === 'retireAge' && L.pensionAuto) syncPension(L);
    saveScenarios();
    const st = document.getElementById('status'); if (st) st.textContent = 'Adjusted · Run to update';
  }
  // Commit a typed value from a .cmp-lev-in input in the Compare view.
  // Mirrors the parse/clamp logic from the #scn-levers change handler.
  function commitCmpInput(inp) {
    const ci = parseInt(inp.dataset.scnId, 10);
    const sc = scenarios[ci]; if (!sc || !sc.lev) return;
    const L = sc.lev;
    const edit = inp.dataset.edit;
    const raw = parseFloat(String(inp.value).replace(/[^0-9.]/g, ''));
    if (!isFinite(raw) || raw < 0) return;
    if (edit === 'monthly') {
      L.spend = Math.round(raw * 12);
    } else if (edit === 'money') {
      const cfg = LEVCFG.find((c) => c.key === inp.dataset.key);
      const r = cfg ? levRange(cfg) : null;
      const v = Math.round(raw);
      L[inp.dataset.key] = r ? Math.max(r.min, Math.min(r.max, v)) : v;
    } else if (edit === 'eventAmt') {
      L.eventAmt = raw > 0 ? Math.round(raw) : 0;
    } else if (edit === 'eventAge') {
      const lo = plan.household.primary.currentAge, hi = plan.household.primary.planEndAge;
      const a = Math.round(raw);
      if (isFinite(a)) L.eventAge = Math.max(lo, Math.min(hi, a));
    }
    if (sc.base) buildLevers();
    saveScenarios();
    const st = document.getElementById('status'); if (st) st.textContent = 'Adjusted · Run to update';
    syncScenariosView();
  }
  // Commit a typed per-scenario GOAL override (amount / startAge / endAge / onceAge).
  // Writes into scenarios[ci].lev.goalOv[idx] — the base plan and other scenarios are
  // never touched. Fields equal to the base value are dropped so overrides stay minimal
  // and "same as Baseline" stays accurate.
  function commitGoalInput(inp) {
    const ci = parseInt(inp.dataset.scnId, 10);
    const idx = parseInt(inp.dataset.goalIdx, 10);
    const field = inp.dataset.goalField;
    const sc = scenarios[ci]; if (!sc || !sc.lev) return;
    const base = (Array.isArray(plan.goals) ? plan.goals : [])[idx]; if (!base) return;
    const raw = parseFloat(String(inp.value).replace(/[^0-9.]/g, ''));
    if (!isFinite(raw) || raw < 0) return;
    const lo = plan.household.primary.currentAge, hi = plan.household.primary.planEndAge;
    if (!sc.lev.goalOv) sc.lev.goalOv = {};
    const ov = sc.lev.goalOv[idx] || (sc.lev.goalOv[idx] = {});
    if (field === 'amount') {
      ov.amount = Math.round(raw);
    } else if (field === 'onceAge') {
      const v = Math.max(lo, Math.min(hi, Math.round(raw)));
      ov.startAge = v; ov.endAge = v;
    } else if (field === 'startAge') {
      let v = Math.max(lo, Math.min(hi, Math.round(raw)));
      const curEnd = (ov.endAge != null) ? ov.endAge : base.endAge;
      if (v > curEnd) v = curEnd;
      ov.startAge = v;
    } else if (field === 'endAge') {
      let v = Math.max(lo, Math.min(hi, Math.round(raw)));
      const curStart = (ov.startAge != null) ? ov.startAge : base.startAge;
      if (v < curStart) v = curStart;
      ov.endAge = v;
    }
    // Minimize the override: drop any field that matches the base, and drop the
    // whole entry (and map) when nothing differs — keeps deltas/"same as base" honest.
    ['amount', 'startAge', 'endAge'].forEach((f) => { if (ov[f] != null && ov[f] === base[f]) delete ov[f]; });
    if (ov.amount == null && ov.startAge == null && ov.endAge == null) delete sc.lev.goalOv[idx];
    if (sc.lev.goalOv && Object.keys(sc.lev.goalOv).length === 0) delete sc.lev.goalOv;
    saveScenarios();
    const st = document.getElementById('status'); if (st) st.textContent = 'Adjusted · Run to update';
    syncScenariosView();
  }

  /* ---- TAX MAPPING (selection over existing production data, not a tax engine) */
  function taxSidecarFor(scn) {
    const raw = PROD.isTypicalPath() ? PROD.typicalPathFederalTax(scn) : (scn.res && scn.res.pathFederalTax);
    if (!raw) return null;
    const byAge = new Map(), byYear = new Map();
    const list = Array.isArray(raw) ? raw : (raw.years || raw.rows || []);
    list.forEach((e) => {
      if (e == null) return;
      const t = (e.federalTaxLiability != null) ? e.federalTaxLiability
              : (e.tax != null) ? e.tax : (e.federalTax != null ? e.federalTax : e.value);
      if (e.age != null)  byAge.set(e.age, t);
      if (e.year != null) byYear.set(e.year, t);
    });
    return { byAge: byAge, byYear: byYear };
  }
  function resolveRowTax(row, sidecar) {
    if (sidecar) {
      if (row.age != null && sidecar.byAge.has(row.age))   return sidecar.byAge.get(row.age);
      if (row.year != null && sidecar.byYear.has(row.year)) return sidecar.byYear.get(row.year);
    }
    return row.tax;                       // engine row tax (always present)
  }

  /* ---- adapter: production scenario → view-model -------------------------- */
  function vmScenario(s) {
    const prob = PROD.prob(s);
    return {
      id: PROD.id(s), name: PROD.name(s), prob: prob,
      probStr: (prob == null ? '—' : num(prob, 1)),
      tone: toneForProb(prob), median: fmtMoney(PROD.median(s)),
      isBaseline: PROD.isBaseline(s), levers: PROD.levers(s), goals: PROD.goals(s),
      range: PROD.range(s), viability: PROD.viability(s), stress: PROD.stress(s), raw: s,
    };
  }
  function deltaVsBaseline(scn, baseline) {
    if (!baseline || scn.id === baseline.id || scn.prob == null || baseline.prob == null) return null;
    return (scn.prob - baseline.prob);   // presentation subtraction, not a re-simulation
  }

  /* ---- COMPARE ----------------------------------------------------------- */
  function renderCompare(scns, baseline) {
    const heads = scns.map((s, i) => {
      const d = deltaVsBaseline(s, baseline);
      const tag = s.isBaseline
        ? '<div class="scol__tag"><span class="tag-ref">Reference</span></div>'
        : (d != null
            ? '<div class="scol__tag"><span class="tag-delta">' + DOWN_TRI + Math.abs(d).toFixed(1) + ' pts</span></div>'
            : '');
      return (
        '<div class="scol">' +
          '<div class="scol__head ' + (i ? 'scol__head--menu' : '') + '" style="--tone:' + s.tone + ';--tone-glow:' + toneGlow(s.tone) + ';">' +
            '<div class="scol__head"><span class="scol__dot"></span><span class="scol__name">' + esc(s.name) + '</span></div>' +
            (i ? '<button class="scol__menu" type="button" data-scn-id="' + esc(s.id) + '" aria-label="Options for ' + esc(s.name) + '" aria-haspopup="true">⋯</button>' : '') +
          '</div>' +
          '<div class="scol__metric" style="--tone:' + s.tone + ';">' +
            ring(46, 19, 4, s.tone, s.prob, '') +
            '<div>' +
              '<div class="scol__prob">' + s.probStr + '<span class="pct">%</span></div>' +
              '<div class="scol__median">Median <b>' + s.median + '</b></div>' +
            '</div>' +
          '</div>' + tag +
        '</div>'
      );
    }).join('');

    // Compare cells: always-visible, stable edit controls in EVERY column including
    // Baseline. No hidden overlays, no click-to-reveal, no pop-out steppers. Dollar
    // levers get a direct type-in input; discrete levers (ages, allocation) get
    // always-visible −/value/+ buttons. The baseline simply carries no delta chip
    // (it is the reference) but is fully editable like the others.
    const baseLevers = (baseline ? baseline.levers : scns[0].levers);
    const leverRows = baseLevers.map((bl, li) => {
      const cells = scns.map((s) => {
        const lev = s.levers[li] || {};
        const value = esc(lev.value);
        const delta = lev.delta ? '<span class="cell__delta">' + esc(lev.delta) + '</span>' : '';

        // No lever key for this row → plain read-only value.
        if (!lev.key) {
          return '<div class="cell cell--lev"><div class="cell__val"><span class="cell__num">' + value + '</span></div></div>';
        }

        // Dollar lever: always-visible type-in input
        if (lev.editType) {
          let inputHtml;
          if (lev.editType === 'event') {
            inputHtml =
              '$<input class="cmp-lev-in" type="text" inputmode="numeric" data-edit="eventAmt" data-key="eventAmt" data-scn-id="' + esc(s.id) + '" value="' + esc(lev.inputVal) + '">' +
              '<span class="cmp-unit"> @ age </span>' +
              '<input class="cmp-lev-in cmp-lev-in--age" type="text" inputmode="numeric" data-edit="eventAge" data-key="eventAge" data-scn-id="' + esc(s.id) + '" value="' + esc(String(lev.eventAge != null ? lev.eventAge : '')) + '">';
          } else {
            const unitSpan = lev.unitStr ? '<span class="cmp-unit">' + esc(lev.unitStr) + '</span>' : '';
            inputHtml = '$<input class="cmp-lev-in" type="text" inputmode="numeric" data-edit="' + esc(lev.editType) + '" data-key="' + esc(lev.key) + '" data-scn-id="' + esc(s.id) + '" value="' + esc(lev.inputVal) + '">' + unitSpan;
          }
          return (
            '<div class="cell cell--lev cell--lev-edit">' +
              '<div class="cmp-lev-row">' + inputHtml + '</div>' +
              (delta ? '<div class="cmp-delta-row">' + delta + '</div>' : '') +
            '</div>'
          );
        }

        // Discrete lever: always-visible − / value / + controls
        const decBtn = '<button class="cmp-step-btn" type="button" data-scn-id="' + esc(s.id) + '" data-lever-key="' + esc(lev.key) + '" data-dir="-1" aria-label="Decrease ' + esc(lev.label) + '">−</button>';
        const incBtn = '<button class="cmp-step-btn" type="button" data-scn-id="' + esc(s.id) + '" data-lever-key="' + esc(lev.key) + '" data-dir="1" aria-label="Increase ' + esc(lev.label) + '">+</button>';
        return (
          '<div class="cell cell--lev cell--lev-step">' +
            '<div class="cmp-lev-row">' + decBtn + '<span class="cmp-lev-val">' + value + '</span>' + incBtn + (delta ? delta : '') + '</div>' +
          '</div>'
        );
      }).join('');
      return '<div class="lever"><span class="lever__name">' + esc(bl.label) + '</span></div>' + cells;
    }).join('<div class="compare__rule" style="margin:0;"></div>');

    const baseGoals = (baseline ? baseline.goals : scns[0].goals);
    // Per-column summary (collapsed state). "active" = goals funded (effective
    // amount > 0). Non-baseline columns that differ from the baseline scenario's
    // effective goals are flagged "edited"; identical ones read "same as Baseline".
    const goalCells = scns.map((s) => {
      const active = s.goals.filter((g) => g.on).length;
      if (s.isBaseline) {
        return '<div class="cell--goal"><span class="goal-pill" style="--tone:var(--tone-green);"><span class="goal-pill__dot"></span>' + active + ' active</span></div>';
      }
      const changed = s.goals.some((g) => !g.sameAsBase);
      if (!changed) {
        return '<div class="cell--goal"><span class="goal-note">' + active + ' active · same as Baseline</span></div>';
      }
      return '<div class="cell--goal"><span class="goal-pill" style="--tone:var(--gold);"><span class="goal-pill__dot"></span>' + active + ' active · edited</span></div>';
    }).join('');

    // Goals section: collapsible. The header row carries a visible chevron toggle
    // (stable, discoverable — not a hover/pop-out). Collapsed shows the per-column
    // summary; expanded reveals one editable row per goal — every column (Baseline
    // included) can type amount / start age / end age. Edits are per-scenario
    // overrides only (never mutate the base plan or other scenarios).
    const hasGoals = baseGoals.length > 0;
    const goalsExpanded = !!state.goalsExpanded && hasGoals;
    const goalsChevron = '<svg class="goals-chev" width="13" height="13" viewBox="0 0 12 12" aria-hidden="true"><path d="M3 4.5 L6 7.5 L9 4.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>';
    const goalsHeadCell = hasGoals
      ? '<div class="cell--goal lever goals-head" data-goals-toggle role="button" tabindex="0" aria-expanded="' + (goalsExpanded ? 'true' : 'false') + '"><span class="lever__name">Goals</span>' + goalsChevron + '<span class="lever__hint" style="margin:0 0 0 4px;">· edit per plan</span></div>'
      : '<div class="cell--goal lever"><span class="lever__name">Goals</span></div>';
    const rawGoals = (Array.isArray(plan.goals) ? plan.goals : []);
    const goalDetailRows = goalsExpanded ? baseGoals.map((bg, gi) => {
      const baseG = rawGoals[bg.idx] || {};
      const baseOnce = baseG.startAge === baseG.endAge;
      const baseWin = baseOnce ? ('at age ' + baseG.startAge) : ('age ' + baseG.startAge + '–' + baseG.endAge);
      const gut = '<div class="lever goal-detail"><span class="goal-detail__name">' + esc(bg.name) + '</span><span class="goal-detail__meta">base: ' + esc(baseWin) + '</span></div>';
      const cells = scns.map((s) => {
        const g = s.goals[gi];
        if (!g) return '<div class="cell cell--goal-detail"></div>';
        const amtIn = '$<input class="cmp-goal-in" type="text" inputmode="numeric" data-scn-id="' + esc(s.id) + '" data-goal-idx="' + g.idx + '" data-goal-field="amount" value="' + esc((g.amount || 0).toLocaleString('en-US')) + '">';
        let ageIn;
        if (g.once) {
          ageIn = '<span class="cmp-unit">one-time · age </span>' +
            '<input class="cmp-goal-in cmp-goal-in--age" type="text" inputmode="numeric" data-scn-id="' + esc(s.id) + '" data-goal-idx="' + g.idx + '" data-goal-field="onceAge" value="' + esc(String(g.startAge)) + '">';
        } else {
          ageIn = '<span class="cmp-unit">/yr · age </span>' +
            '<input class="cmp-goal-in cmp-goal-in--age" type="text" inputmode="numeric" data-scn-id="' + esc(s.id) + '" data-goal-idx="' + g.idx + '" data-goal-field="startAge" value="' + esc(String(g.startAge)) + '">' +
            '<span class="cmp-unit">–</span>' +
            '<input class="cmp-goal-in cmp-goal-in--age" type="text" inputmode="numeric" data-scn-id="' + esc(s.id) + '" data-goal-idx="' + g.idx + '" data-goal-field="endAge" value="' + esc(String(g.endAge)) + '">';
        }
        const editedDot = g.overridden ? '<span class="cmp-goal-edited" title="Edited in this plan" aria-label="Edited in this plan"></span>' : '';
        const deltaChip = (!s.isBaseline && g.amountDelta) ? '<span class="cell__delta">' + (g.amountDelta > 0 ? '+' : '−') + '$' + Math.abs(g.amountDelta).toLocaleString('en-US') + '</span>' : '';
        return (
          '<div class="cell cell--goal-detail' + (g.overridden ? ' is-overridden' : '') + '">' +
            '<div class="cmp-goal-row">' + editedDot + amtIn + ageIn + '</div>' +
            (deltaChip ? '<div class="cmp-delta-row">' + deltaChip + '</div>' : '') +
          '</div>'
        );
      }).join('');
      return gut + cells;
    }).join('') : '';

    return (
      '<div class="compare">' +
        '<div class="compare__grid" style="grid-template-columns:212px repeat(' + scns.length + ',minmax(0,1fr));">' +
          '<div class="lever lever--head"><div class="lever__name">Plan Levers</div><div class="lever__hint">columns show Δ vs Baseline</div></div>' +
          heads +
          '<div class="compare__rule" style="margin:4px 0 6px;"></div>' +
          leverRows +
          '<div class="compare__rule" style="margin:8px 0 0;"></div>' +
          goalsHeadCell +
          goalCells +
          goalDetailRows +
        '</div>' +
      '</div>'
    );
  }

  /* ---- FOCUS ------------------------------------------------------------- */
  function stressVerdict(stress) {
    const passed = stress.filter((r) => r.pass).length, total = stress.length;
    const all = total > 0 && passed === total;
    return { text: total === 0 ? '' : (all ? 'Survives all ' + total + ' eras' : 'Survives ' + passed + ' of ' + total + ' eras'),
      color: all ? 'var(--pass)' : 'var(--marginal)' };
  }
  function renderFocus(scns, baseline, focusedId, showRange) {
    const f = scns.find((s) => s.id === focusedId) || scns[0];
    const v = stressVerdict(f.stress);
    const heroRing = ring(152, 67, 9, f.tone, f.prob, '<span class="hero__numeral">' + f.probStr + '<span class="pct">%</span></span>');

    const assum = f.levers.map((l) => (
      '<div>' +
        '<div class="assum__label">' + esc(l.label) + '</div>' +
        '<div class="assum__stepper">' +
          '<button class="stepper-btn" type="button" data-lever-key="' + esc(l.key) + '" data-dir="-1" aria-label="Decrease ' + esc(l.label) + '">−</button>' +
          '<span class="assum__value">' + esc(l.value) + '</span>' +
          '<button class="stepper-btn" type="button" data-lever-key="' + esc(l.key) + '" data-dir="1" aria-label="Increase ' + esc(l.label) + '">+</button>' +
          (l.delta ? '<span class="assum__delta">' + esc(l.delta) + '</span>' : '') +
        '</div>' +
      '</div>'
    )).join('');

    const activeGoals = f.goals.filter((g) => g.on).length;
    const offGoals = f.goals.filter((g) => !g.on).length;
    const goals = f.goals.map((g) => {
      const amt = (typeof g.amount === 'number') ? fmtMoney(g.amount) : esc(g.amount);
      const sub = (g.cadence && g.cadence !== 'disabled') ? esc(g.cadence) : '';
      return (
        '<div class="goal-row ' + (g.on ? 'is-on' : 'is-off') + '">' +
          '<div class="goal-row__left">' +
            '<button class="goal-toggle" type="button" role="switch" aria-checked="' + (g.on ? 'true' : 'false') + '" aria-label="Toggle ' + esc(g.name) + '"><span class="goal-toggle__knob"></span></button>' +
            '<div class="goal-row__body"><div><div class="goal-row__name">' + esc(g.name) + '</div><div class="goal-row__meta">' + esc(g.meta) + '</div></div></div>' +
          '</div>' +
          '<div class="goal-row__amt"><b>' + amt + '</b><div class="goal-row__sub">' + sub + '</div></div>' +
        '</div>'
      );
    }).join('');

    const cards = scns.map((s) => {
      const active = s.id === focusedId;
      const d = deltaVsBaseline(s, baseline);
      const tag = active
        ? '<span class="rail-card__tag rail-card__tag--focus">In focus</span>'
        : (s.isBaseline ? '<span class="rail-card__tag">Reference</span>'
            : '<span class="rail-card__tag rail-card__tag--delta">' + (d != null ? '−' + Math.abs(d).toFixed(1) + ' pts' : '') + '</span>');
      return (
        '<button class="rail-card ' + (active ? 'is-active' : '') + '" type="button" data-pick="' + esc(s.id) + '" aria-pressed="' + (active ? 'true' : 'false') + '" style="--tone:' + s.tone + ';">' +
          '<div class="rail-card__head"><div class="rail-card__title"><span class="rail-card__dot"></span><span class="rail-card__name">' + esc(s.name) + '</span></div>' + tag + '</div>' +
          '<div class="rail-card__metric">' + ring(40, 16, 3.5, s.tone, s.prob, '') +
            '<div style="flex:1;"><div class="rail-card__prob">' + s.probStr + '<span class="pct">%</span></div></div>' +
            '<div style="text-align:right;"><div class="rail-card__median-l">Median</div><div class="rail-card__median">' + s.median + '</div></div>' +
          '</div>' +
        '</button>'
      );
    }).join('');

    const stressRows = f.stress.map((st) => (
      '<div class="stress-rail__row">' +
        '<span class="stress-rail__icon ' + (st.pass ? 'stress-rail__icon--pass' : 'stress-rail__icon--marginal') + '">' + (st.pass ? CHECK(1.9, 11) : '!') + '</span>' +
        '<div class="stress-rail__body"><span class="stress-rail__year">' + esc(st.year) + '</span><span class="stress-rail__name">' + esc(st.name) + '</span></div>' +
        '<span class="stress-rail__result" style="color:' + (st.pass ? 'var(--pass)' : 'var(--marginal)') + ';">' + (st.pass ? 'Pass' : 'Marginal') + '</span>' +
      '</div>'
    )).join('');
    // Render the Historical Stress card from engine-derived per-scenario eras.
    // Gate: all 5 eras must be present. If computeHistoricalStress produced fewer
    // than STRESS_ERAS.length results (even after the riskProfile guard), surface a
    // diagnostic row instead of a silent partial card — never fabricate outcomes.
    const stressEraCount = typeof STRESS_ERAS !== 'undefined' ? STRESS_ERAS.length : 5;
    let stressBlock = '';
    if (f.stress.length === stressEraCount) {
      stressBlock = (
        '<div class="stress-rail">' +
          '<div class="stress-rail__head"><span class="eyebrow" style="letter-spacing:0.16em;">Historical Stress</span><span class="stress-rail__verdict" style="color:' + v.color + ';">' + v.text + '</span></div>' +
          stressRows +
        '</div>'
      );
    } else if (f.stress.length > 0) {
      // Partial: some eras failed after the riskProfile guard — report, don't show incomplete card.
      console.warn('Historical Stress incomplete: got ' + f.stress.length + ' of ' + stressEraCount + ' eras for scenario "' + f.name + '". Check browser console for per-era errors.');
      stressBlock = (
        '<div class="stress-rail">' +
          '<div class="stress-rail__head"><span class="eyebrow" style="letter-spacing:0.16em;">Historical Stress</span></div>' +
          '<div class="stress-rail__row" style="color:var(--marginal);font-size:11px;padding:8px 0;">Stress data incomplete (' + f.stress.length + '/' + stressEraCount + ' eras) — re-run the plan to resolve.</div>' +
        '</div>'
      );
    }

    const rangeBlock = (showRange && f.range) ? (
      '<div class="range">' +
        '<div class="range__head"><span class="range__label">Likely range · 10th–90th pct</span><span class="range__bounds">' + fmtMoney(f.range.lo) + ' – ' + fmtMoney(f.range.hi) + '</span></div>' +
        '<div class="range__bar"><div class="range__marker" style="left:' + (f.range.medianPct != null ? f.range.medianPct : 50) + '%;"></div></div>' +
      '</div>'
    ) : '';

    return (
      '<div class="focus">' +
        '<div class="focus__panel glass-panel" style="--tone:' + f.tone + ';">' +
          '<div class="focus__head">' +
            '<div class="focus__title"><span class="focus__dot"></span><span class="focus__name">' + esc(f.name) + '</span><span class="badge-editing">Editing</span></div>' +
          '</div>' +
          '<div class="hero">' +
            '<div class="hero__ringwrap"><span class="hero__ringlabel">Probability of Success</span>' + heroRing + '</div>' +
            '<div class="hero__right">' +
              '<div class="kicker">Median Ending Value</div>' +
              '<div class="hero__median">' + f.median + '</div>' + rangeBlock +
              '<div class="divider" style="margin:18px 0;"></div>' +
              '<div class="viability"><span class="viability__dot"></span><span class="viability__text">' + esc(f.viability || '') + '</span></div>' +
            '</div>' +
          '</div>' +
          '<div class="divider" style="margin:24px 0 20px;"></div>' +
          '<div class="eyebrow" style="margin-bottom:18px;">Core Assumptions</div>' +
          '<div class="assum-grid">' + assum + '</div>' +
          '<div class="divider" style="margin:24px 0 18px;"></div>' +
          '<div class="goals__head"><div class="goals__title"><span class="eyebrow">Goals</span><span class="goals__count">' + activeGoals + ' active · ' + offGoals + ' off</span></div></div>' +
          goals +
        '</div>' +
        '<div class="focus__rail">' +
          '<div class="rail__head"><span class="rail__head-label">Scenarios</span><span class="rail__head-hint">tap to focus</span></div>' +
          cards + stressBlock +
        '</div>' +
      '</div>'
    );
  }

  /* ---- CASH FLOW --------------------------------------------------------- */
  // Visible columns, exactly and in order. No Engine-tax / Federal-tax columns.
  const CF_COLS = ['Year', 'Age', 'Income', 'RMD', 'Essential', 'Goals', 'Tax', 'Portfolio Draw', 'WD Rate', 'Ending'];

  function renderCashflow(scn, allScns) {
    const rows = PROD.pathRows(scn.raw);
    const summary = PROD.cashSummary(scn.raw);
    const sidecar = taxSidecarFor(scn.raw);

    const pills = allScns.map((s) => (
      '<button class="cf-pill ' + (s.id === scn.id ? 'is-active' : '') + '" type="button" data-cash-pick="' + esc(s.id) + '" aria-pressed="' + (s.id === scn.id ? 'true' : 'false') + '" style="--tone:' + s.tone + ';">' +
        '<span class="cf-pill__dot"></span>' + esc(s.name) +
      '</button>'
    )).join('');

    const summaryStrip = (
      '<div class="cf-summary" style="--tone:' + scn.tone + ';--tone-glow:' + toneGlow(scn.tone) + ';">' +
        '<div class="cf-summary__id">' +
          ring(52, 21, 4.5, scn.tone, scn.prob, '<span class="numeral" style="font-size:19px;">' + scn.probStr + '</span>') +
          '<div><div class="cf-summary__name-row"><span class="cf-summary__dot"></span><span class="cf-summary__name">' + esc(scn.name) + '</span></div>' +
            '<div class="cf-summary__sub">Probability of success</div></div>' +
        '</div>' +
        '<div class="cf-summary__stats">' +
          '<div class="cf-stat"><div class="cf-stat__label">Median Ending</div><div class="cf-stat__value">' + scn.median + '</div></div>' +
          '<div class="cf-stat"><div class="cf-stat__label">Lifetime Draw</div><div class="cf-stat__value">' + fmtMoney(summary.lifetimeDraw) + '</div></div>' +
          '<div class="cf-stat"><div class="cf-stat__label">Funds Last</div><div class="cf-stat__value">' + esc(summary.fundsLast || '—') + '</div></div>' +
          '<div class="cf-stat"><div class="cf-stat__label">Peak Withdrawal</div>' +
            '<div class="cf-stat__peak"><span class="cf-stat__value" style="color:' + wdColor(summary.peakWdRate, false) + ';">' + (summary.peakWdRate ? num(summary.peakWdRate, 1) + '%' : '—') + '</span><span class="cf-stat__peak-age">' + (summary.peakWdAge ? 'age ' + summary.peakWdAge : '') + '</span></div>' +
          '</div>' +
        '</div>' +
      '</div>'
    );

    const rowHtml = (r) => {
      const tax = resolveRowTax(r, sidecar);
      const ending = (r.shortfall || r.ending <= 0) ? '$0' : fmtMoney(r.ending);
      const endColor = (r.shortfall || r.ending <= 0) ? 'var(--down-deep)' : 'var(--text-2)';
      const goalsColor = r.goals > 0 ? (r.goalTag ? '#d8c084' : '#c6a662') : 'var(--text-mute)';
      const lifeTag = r.lifeTag || null;
      return (
        '<div class="cf-row cf-grid">' +
          '<div class="cf-row__year-wrap">' +
            '<span class="cf-row__year" style="color:' + (lifeTag ? 'var(--text-1)' : 'var(--text-3)') + ';"><span class="cf-row__year-dot" style="background:' + (lifeTag ? 'var(--gold)' : 'transparent') + ';"></span>' + esc(r.year) + '</span>' +
            (lifeTag ? '<span class="cf-row__lifetag" style="color:var(--gold-soft);">' + esc(lifeTag) + '</span>' : '') +
          '</div>' +
          '<span class="cf-cell cf-cell--age">' + esc(r.age) + '</span>' +
          '<span class="cf-cell" style="color:' + (r.income > 0 ? 'var(--text-2b)' : 'var(--text-mute)') + ';">' + (r.income > 0 ? fmtMoney(r.income) : '—') + '</span>' +
          '<span class="cf-cell" style="color:' + (r.rmd > 0 ? 'var(--text-2b)' : 'var(--text-mute)') + ';">' + (r.rmd > 0 ? fmtMoney(r.rmd) : '—') + '</span>' +
          '<span class="cf-cell cf-cell--essential">' + fmtMoney(r.essential) + '</span>' +
          '<div class="cf-row__goals-wrap">' +
            '<span class="cf-cell" style="color:' + goalsColor + ';">' + (r.goals > 0 ? fmtMoney(r.goals) : '—') + '</span>' +
            (r.goalTag ? '<span class="cf-row__goaltag">' + esc(r.goalTag) + '</span>' : '') +
          '</div>' +
          '<span class="cf-cell cf-cell--tax">' + fmtMoney(tax) + '</span>' +
          '<span class="cf-cell cf-cell--draw">' + fmtMoney(r.draw) + '</span>' +
          '<span class="cf-cell cf-cell--wd" style="color:' + wdColor(r.wdRate, r.shortfall) + ';">' + (r.startPort > 0 ? num(r.wdRate, 1) + '%' : '—') + '</span>' +
          '<span class="cf-cell cf-cell--ending" style="color:' + endColor + ';">' + ending + '</span>' +
        '</div>'
      );
    };

    const phases = groupPhases(rows).map((p, idx) => {
      const di = p.rows.reduce((s, r) => s + (r.draw || 0), 0);
      const ii = p.rows.reduce((s, r) => s + (r.income || 0), 0);
      const range = p.lo === p.hi ? 'Age ' + p.lo : 'Ages ' + p.lo + '–' + p.hi;
      return (
        '<div class="cf-phase">' +
          '<div class="cf-phase__left"><span class="cf-phase__name">' + esc(p.name) + '</span><span class="cf-phase__meta">' + range + (p.note ? ' · ' + esc(p.note) : '') + '</span></div>' +
          '<div class="cf-phase__stats"><span>Income <b class="inc">' + (ii > 0 ? fmtMoney(ii) : '—') + '</b></span><span>Draw <b class="draw">' + fmtMoney(di) + '</b></span></div>' +
        '</div>' +
        '<div class="cf-band ' + (idx % 2 === 1 ? 'is-shaded' : '') + '">' + p.rows.map(rowHtml).join('') + '</div>'
      );
    }).join('');

    const headCells = CF_COLS.map((h, i) => '<span class="cf-th ' + (i >= 2 ? 'cf-th--r' : '') + '">' + h + '</span>').join('');
    const empty = rows.length ? '' : '<div class="cf-band"><div style="padding:26px 18px;color:var(--text-5);">No cash-flow data yet. Press Run — or check the plan inputs if the status bar shows a warning.</div></div>';

    return (
      '<div class="cf">' +
        '<div class="cf__head">' +
          '<div class="cf__head-left">' +
            '<span class="eyebrow" style="letter-spacing:0.16em;">Cash Flow</span>' +
            '<div class="cf__pills">' + pills + '</div>' +
            '<div class="cf__path-controls" id="scn-cf-path-controls"></div>' +
          '</div>' +
          '<span class="cf__caption">Projected to age ' + plan.household.primary.planEndAge + ' · nominal $</span>' +
        '</div>' +
        summaryStrip +
        '<div class="cf-table">' +
          '<div class="cf-table__head cf-grid">' + headCells + '</div>' +
          (empty || phases) +
        '</div>' +
      '</div>'
    );
  }

  // Group rows into age-band phases (presentation grouping only — no math).
  function groupPhases(rows) {
    if (!rows.length) return [];
    const defs = [
      { name: 'Bridge years', lo: -Infinity, hi: 66, note: 'before Social Security' },
      { name: 'Social Security on', lo: 67, hi: 72, note: 'benefits begin' },
      { name: 'RMD years', lo: 73, hi: 84, note: 'required distributions' },
      { name: 'Later retirement', lo: 85, hi: Infinity, note: 'longevity tail' },
    ];
    return defs.map((d) => {
      const rs = rows.filter((r) => r.age >= d.lo && r.age <= d.hi);
      if (!rs.length) return null;
      return { name: d.name, note: d.note, lo: rs[0].age, hi: rs[rs.length - 1].age, rows: rs };
    }).filter(Boolean);
  }

  /* ---- STATE + ONE AUTHORITATIVE SYNC ------------------------------------ */
  const state = { view: 'compare', cashActive: false, focusedId: null, showRange: true, goalsExpanded: false };
  const $id = (id) => document.getElementById(id);

  function buildScenarios() {
    const list = (PROD.scenarios() || []).map(vmScenario);
    const baseline = list.find((s) => s.isBaseline) || list[0] || null;
    if (state.focusedId == null || !list.some((s) => s.id === state.focusedId)) {
      state.focusedId = (PROD.getSelectedId() || (list[0] && list[0].id) || null);
    }
    return { list: list, baseline: baseline };
  }

  function syncScenariosView() {
    const view = $id('scn-view');
    if (!view) return;
    const built = buildScenarios(), list = built.list, baseline = built.baseline;

    const sub = $id('scn-subtitle');
    if (sub) {
      const hh = PROD.householdName();
      sub.textContent = (hh ? hh + ' · ' : '') + list.length + ' plan' + (list.length === 1 ? '' : 's');
    }

    if (state.cashActive) {
      const scn = list.find((s) => s.id === state.focusedId) || baseline || list[0];
      view.innerHTML = scn ? renderCashflow(scn, list) : '';
      mountPathControls();
    } else if (state.view === 'focus') {
      view.innerHTML = renderFocus(list, baseline, state.focusedId, state.showRange);
    } else {
      view.innerHTML = renderCompare(list, baseline);
    }
    syncToolbar();
    bindViewEvents();
  }

  function syncToolbar() {
    const inCash = state.cashActive;
    const segC = $id('scn-seg-compare'), segF = $id('scn-seg-focus'), chip = $id('scn-cash-toggle');
    if (segC) { const on = !inCash && state.view === 'compare'; segC.classList.toggle('is-active', on); segC.setAttribute('aria-selected', on ? 'true' : 'false'); }
    if (segF) { const on = !inCash && state.view === 'focus';   segF.classList.toggle('is-active', on); segF.setAttribute('aria-selected', on ? 'true' : 'false'); }
    if (chip) { chip.classList.toggle('is-on', inCash); chip.setAttribute('aria-checked', inCash ? 'true' : 'false'); }
  }

  // Relocate production's existing path-replay controls into the Cash Flow slot.
  // We move the node — never recreate it — so its bindings/state survive.
  function mountPathControls() {
    const slot = $id('scn-cf-path-controls');
    if (slot && window.scnPathControlsEl) slot.appendChild(window.scnPathControlsEl);
  }

  function bindViewEvents() {
    const view = $id('scn-view'); if (!view) return;
    view.querySelectorAll('[data-pick]').forEach((el) => {
      el.addEventListener('click', () => { state.focusedId = el.dataset.pick; PROD.setSelectedId(state.focusedId); syncScenariosView(); });
    });
    view.querySelectorAll('[data-cash-pick]').forEach((el) => {
      el.addEventListener('click', () => { state.focusedId = el.dataset.cashPick; PROD.setSelectedId(state.focusedId); syncScenariosView(); });
    });
    // Always-visible +/- buttons in Compare (discrete levers) and Focus (all levers).
    // data-lever-key + data-dir + optional data-scn-id → stepFocusLever.
    view.querySelectorAll('[data-lever-key]').forEach((el) => {
      el.addEventListener('click', () => {
        const ci = (el.dataset.scnId != null && el.dataset.scnId !== '')
          ? parseInt(el.dataset.scnId, 10) : parseInt(state.focusedId, 10);
        stepFocusLever(ci, el.dataset.leverKey, +el.dataset.dir);
        syncScenariosView();
      });
    });
    // Type-in inputs for dollar levers in Compare view.
    view.querySelectorAll('.cmp-lev-in').forEach((inp) => {
      inp.addEventListener('change', () => commitCmpInput(inp));
      inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') inp.blur(); });
      if (!inp.classList.contains('cmp-lev-in--age')) {
        inp.addEventListener('input', () => liveCommas(inp));
      }
    });
    // Per-scenario goal override inputs (amount / start / end) in expanded Compare.
    view.querySelectorAll('.cmp-goal-in').forEach((inp) => {
      inp.addEventListener('change', () => commitGoalInput(inp));
      inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') inp.blur(); });
      if (!inp.classList.contains('cmp-goal-in--age')) {
        inp.addEventListener('input', () => liveCommas(inp));
      }
    });
    // Goals section expand/collapse toggle (visible, stable chevron control).
    const goalsToggle = view.querySelector('[data-goals-toggle]');
    if (goalsToggle) {
      goalsToggle.addEventListener('click', () => { state.goalsExpanded = !state.goalsExpanded; syncScenariosView(); });
      goalsToggle.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); state.goalsExpanded = !state.goalsExpanded; syncScenariosView(); }
      });
    }
    // Per-scenario ⋯ menu in Compare heads: Rename (inline input) / Delete.
    // This is the "later pass" wiring promised when the old #scn-band grid was
    // retired — it drives the kept removeScenario() seam and saveScenarios().
    view.querySelectorAll('.scol__menu').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const head = btn.closest('.scol__head--menu'); if (!head) return;
        const wasOpen = !!head.querySelector('.scol__pop');
        closeScnMenus();
        if (wasOpen) return;                       // second click toggles closed
        const ci = parseInt(btn.dataset.scnId, 10);
        const s = scenarios[ci]; if (!s || s.base) return;
        const pop = document.createElement('div');
        pop.className = 'scol__pop';
        pop.innerHTML =
          '<button class="scol__pop-item" type="button" data-act="rename">Rename</button>' +
          '<button class="scol__pop-item scol__pop-item--danger" type="button" data-act="delete">Delete plan</button>';
        head.appendChild(pop);
        pop.addEventListener('pointerdown', (pe) => pe.stopPropagation());
        pop.querySelector('[data-act="rename"]').addEventListener('click', (pe) => {
          pe.stopPropagation();
          closeScnMenus();
          startScnRename(head, ci);
        });
        pop.querySelector('[data-act="delete"]').addEventListener('click', (pe) => {
          pe.stopPropagation();
          const cur = scenarios[ci]; if (!cur || cur.base) { closeScnMenus(); return; }
          if (!confirm('Delete "' + cur.name + '"? Its levers and per-plan edits are removed.')) { closeScnMenus(); return; }
          closeScnMenus();
          removeScenario(ci);   // splice + saveScenarios + buildLevers + runAll → sync re-renders
        });
      });
    });
  }

  function closeScnMenus() {
    document.querySelectorAll('.scol__pop').forEach((p) => p.remove());
  }

  // Inline rename: the name span becomes an input in place. Enter/blur commit
  // (trimmed, non-empty), Escape cancels; either way the view re-syncs.
  function startScnRename(head, ci) {
    const nameEl = head.querySelector('.scol__name');
    const s = scenarios[ci];
    if (!nameEl || !s) return;
    const inp = document.createElement('input');
    inp.className = 'scol__rename';
    inp.type = 'text';
    inp.maxLength = 40;
    inp.value = s.name;
    inp.setAttribute('aria-label', 'Rename ' + s.name);
    nameEl.replaceWith(inp);
    let done = false;
    const commit = () => {
      if (done) return; done = true;
      const v = inp.value.trim();
      if (v && v !== s.name) { s.name = v; saveScenarios(); }
      syncScenariosView();
    };
    inp.addEventListener('pointerdown', (e) => e.stopPropagation());
    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', (e) => {
      // Commit directly (not via blur() — blur is inert in unfocused tabs).
      if (e.key === 'Enter') { e.preventDefault(); commit(); }
      if (e.key === 'Escape') { e.preventDefault(); done = true; syncScenariosView(); }
    });
    inp.focus();
    inp.select();
  }

  function bindToolbarOnce() {
    const segC = $id('scn-seg-compare'), segF = $id('scn-seg-focus'), chip = $id('scn-cash-toggle');
    if (segC) segC.addEventListener('click', () => { state.cashActive = false; state.view = 'compare'; syncScenariosView(); });
    if (segF) segF.addEventListener('click', () => { state.cashActive = false; state.view = 'focus'; syncScenariosView(); });
    if (chip) chip.addEventListener('click', () => { state.cashActive = !state.cashActive; syncScenariosView(); });
    const add = $id('scn-add'), solve = $id('scn-solve'), suggest = $id('scn-suggest');
    if (add)     add.addEventListener('click',     () => { PROD.addScenario(); PROD.afterEngineAction(); });
    if (solve)   solve.addEventListener('click',   () => { PROD.solve();       PROD.afterEngineAction(); });
    if (suggest) suggest.addEventListener('click', () => { PROD.suggest();      PROD.afterEngineAction(); });
  }

  function init() {
    if (!document.getElementById('scn-view')) return;
    const src = document.querySelector('#scn-path-src .cf-toggle');
    if (src) window.scnPathControlsEl = src;
    bindToolbarOnce();
    // One document-level closer for the ⋯ menus (bound once — init runs once).
    document.addEventListener('pointerdown', (e) => {
      if (e.target.closest && (e.target.closest('.scol__pop') || e.target.closest('.scol__menu'))) return;
      closeScnMenus();
    });
    syncScenariosView();
  }

  window.ScenariosUI = { sync: syncScenariosView, renderCompare: renderCompare, renderFocus: renderFocus, renderCashflow: renderCashflow };
  init();
})();

renderSolvePanel();
syncPathControls();
renderInputs();
bindHouseholdRailOnce();   // chapter rail (Demographics / Net Worth / Cash Flow) view switch
syncHousehold();           // render the editable landing Household page from `plan`
document.body.classList.toggle('scn-active', document.querySelector('.page.on')?.dataset.page==='scenarios');
runAll();   // first iteration runs immediately so the tool opens populated

// ── STICKY NOTES OVERLAY ─────────────────────────────────────────────────────
(function(){
  const STORE_KEY = 'px_sticky_notes_v1';
  let active = false;
  let notes = [];
  let dragging = null, dragOX = 0, dragOY = 0;

  function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(notes)); }catch{} }
  function load(){ try{ const d=localStorage.getItem(STORE_KEY); if(d) notes=JSON.parse(d); }catch{} }

  function makeNoteEl(note){
    const el = document.createElement('div');
    el.className = 'sn-note';
    el.dataset.id = note.id;
    el.style.cssText = `left:${note.x}px;top:${note.y}px`;
    el.innerHTML = `<div class="sn-handle"><span class="sn-num">${note.num}</span><button class="sn-del" title="Remove">×</button></div><textarea class="sn-text" placeholder="Type note…">${note.text}</textarea>`;
    // drag via handle
    const handle = el.querySelector('.sn-handle');
    handle.addEventListener('mousedown', e => {
      if(e.target.classList.contains('sn-del')) return;
      dragging = el;
      const r = el.getBoundingClientRect();
      dragOX = e.clientX - r.left;
      dragOY = e.clientY - r.top;
      el.style.zIndex = 10001;
      e.preventDefault();
    });
    // delete
    el.querySelector('.sn-del').addEventListener('click', () => {
      notes = notes.filter(n => n.id !== note.id);
      save();
      el.remove();
    });
    // text update
    el.querySelector('.sn-text').addEventListener('input', e => {
      const n = notes.find(n => n.id === note.id);
      if(n){ n.text = e.target.value; save(); }
    });
    return el;
  }

  function placeNote(x, y){
    // keep the (now wider) note fully on screen wherever it's dropped
    const W = 360;
    x = Math.max(8, Math.min(x, window.innerWidth - W - 8));
    y = Math.max(8, Math.min(y, window.innerHeight - 120));
    const num = notes.length ? Math.max(...notes.map(n=>n.num)) + 1 : 1;
    const note = { id: Date.now(), num, x, y, text: '' };
    notes.push(note);
    save();
    const el = makeNoteEl(note);
    document.body.appendChild(el);
    el.querySelector('.sn-text').focus();
  }

  function setActive(on){
    active = on;
    document.body.classList.toggle('sn-mode', on);
    btn.classList.toggle('sn-btn-on', on);
    btn.title = on ? 'Exit notes mode (click anywhere to add a note)' : 'Add sticky notes';
    overlay.style.display = on ? 'block' : 'none';
  }

  // overlay intercepts clicks for note placement
  const overlay = document.createElement('div');
  overlay.className = 'sn-overlay';
  overlay.addEventListener('click', e => {
    placeNote(e.clientX - 12, e.clientY - 12);
  });
  document.body.appendChild(overlay);

  // drag on document
  document.addEventListener('mousemove', e => {
    if(!dragging) return;
    const n = notes.find(n => n.id === +dragging.dataset.id);
    const x = e.clientX - dragOX, y = e.clientY - dragOY;
    dragging.style.left = x + 'px';
    dragging.style.top  = y + 'px';
    if(n){ n.x = x; n.y = y; }
  });
  document.addEventListener('mouseup', () => {
    if(dragging){ save(); dragging.style.zIndex=''; dragging=null; }
  });

  // toggle button
  const btn = document.createElement('button');
  btn.className = 'sn-btn';
  btn.textContent = '✎';
  btn.title = 'Add sticky notes';
  btn.addEventListener('click', () => setActive(!active));
  document.body.appendChild(btn);

  // clear button (only visible in active mode)
  const clearBtn = document.createElement('button');
  clearBtn.className = 'sn-clear';
  clearBtn.textContent = 'Clear all';
  clearBtn.title = 'Remove all sticky notes';
  clearBtn.addEventListener('click', e => {
    e.stopPropagation();
    notes = [];
    save();
    document.querySelectorAll('.sn-note').forEach(el => el.remove());
  });
  document.body.appendChild(clearBtn);

  // copy button — the "send to you" path: gathers every note into clean,
  // numbered text and drops it on the clipboard so it can be pasted straight
  // into chat. Static site, no backend — clipboard is the handoff.
  const copyBtn = document.createElement('button');
  copyBtn.className = 'sn-copy';
  copyBtn.textContent = 'Copy notes';
  copyBtn.title = 'Copy all notes to clipboard (paste them to send)';
  copyBtn.addEventListener('click', async e => {
    e.stopPropagation();
    const filled = [...notes].sort((a,b)=>a.num-b.num).filter(n => n.text.trim());
    if(!filled.length){
      copyBtn.textContent = 'No notes yet';
      setTimeout(() => { copyBtn.textContent = 'Copy notes'; }, 1400);
      return;
    }
    const text = filled.map(n => `${n.num}. ${n.text.trim()}`).join('\n\n');
    try{
      await navigator.clipboard.writeText(text);
    }catch{
      // fallback for older / non-secure contexts
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select();
      try{ document.execCommand('copy'); }catch{}
      ta.remove();
    }
    copyBtn.textContent = `Copied ${filled.length} note${filled.length>1?'s':''}!`;
    copyBtn.classList.add('sn-copied');
    setTimeout(() => { copyBtn.textContent = 'Copy notes'; copyBtn.classList.remove('sn-copied'); }, 1600);
  });
  document.body.appendChild(copyBtn);

  // restore persisted notes
  load();
  notes.forEach(n => document.body.appendChild(makeNoteEl(n)));
})();
</script>
