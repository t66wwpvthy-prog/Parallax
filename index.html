// ── Solver ──────────────────────────────────────────────────────────────
// Run the engine for one trial set of levers and return the success %.
// Reuses sharedPaths (the cached return-path bundle) so every trial sees the
// same markets — apples-to-apples, deterministic with our seeded RNG.
function trySuccess(L){
  const p = planForScenario(L);
  const ov = leversToOverrides(L);
  return runSimulation(p, ov, sharedPaths).successRate;
}
// Probability (0–100) of ending with at least `goal` dollars — the legacy score.
function tryLegacyProb(L, goal){
  const p = planForScenario(L);
  const ov = leversToOverrides(L);
  const res = runSimulation(p, ov, sharedPaths);
  const n = res.sims.length || 1;
  return 100 * res.sims.filter(s => s.terminalBalance >= goal).length / n;
}
// Solve ONE lever: holding all others at `baseLev`, find the value of `key`
// closest to its baseline that achieves >= targetPct. Returns { value,
// reachedPct, capped }. capped=true means even the lever's most-aggressive
// extreme can't reach the target — we return that extreme + the % it hit.
//
// Two strategies by range size:
//  • SMALL range (≤12 steps, e.g. Allocation's 5 risk levels, SS age's 9): scan
//    EVERY value. Allocation is NOT monotonic — more equity lifts expected
//    return but adds volatility drag, so success can rise then fall. Bisection
//    (which assumes monotonicity) would silently return a wrong level. An
//    exhaustive scan is correct for any shape and cheap at this count.
//  • LARGE range (spending, savings): bisect. These ARE monotonic in success
//    and have hundreds of steps, so a full scan would be needlessly slow.
// `score(L)` returns the metric to clear (0–100); defaults to plan success %,
// but legacy goals pass a "% chance of leaving ≥ $X" scorer. Everything else
// (closest-to-baseline, scan vs bisection, capped handling) is unchanged.
function solveLeverFor(baseLev, key, targetPct, score = trySuccess, band = null){
  const cfg = LEVCFG.find(c=>c.key===key);
  if(!cfg) return null;
  const r = band || levRange(cfg);
  const lo = r.min, hi = r.max, step = r.step;
  if(lo === hi) return { value: lo, reachedPct: score({...baseLev,[key]:lo}), capped:false };
  const pctAt = v => score({...baseLev, [key]: v});
  const nSteps = Math.round((hi - lo) / step);

  if(nSteps <= 12){
    // Exhaustive scan. Pick the value closest to the lever's current (baseline)
    // setting that meets target; if none meet, return the best-achievable value
    // (capped). Direction-agnostic — works for non-monotonic levers.
    const baseV = baseLev[key];
    let passVal = null, passPct = -1, bestVal = lo, bestPct = -Infinity;
    for(let i = 0; i <= nSteps; i++){
      const v = lo + i * step;
      const pct = pctAt(v);
      if(pct > bestPct){ bestPct = pct; bestVal = v; }
      if(pct >= targetPct &&
         (passVal === null || Math.abs(v - baseV) < Math.abs(passVal - baseV))){
        passVal = v; passPct = pct;
      }
    }
    return passVal !== null
      ? { value: passVal, reachedPct: passPct, capped: false }
      : { value: bestVal, reachedPct: bestPct, capped: true };
  }

  // Large monotonic range → bisection (detect direction from the endpoints).
  const pctLo = pctAt(lo), pctHi = pctAt(hi);
  const increases = pctHi >= pctLo;                  // success rises with higher value?
  const best      = Math.max(pctLo, pctHi);
  const bestVal   = (pctHi >= pctLo) ? hi : lo;
  if(best < targetPct){ return { value: bestVal, reachedPct: best, capped: true }; }
  // Bisect for the value closest to baseline that meets target. We track the
  // smallest "passing" value on the side of monotonicity.
  let a = lo, b = hi;
  for(let i = 0; i < 9; i++){
    const mid = Math.max(lo, Math.min(hi, Math.round(((a+b)/2) / step) * step));
    if(mid === a || mid === b) break;
    const pct = pctAt(mid);
    const meets = pct >= targetPct;
    // For positive direction (success rises with value): we want SMALLEST value
    // that meets. For inverse: we want LARGEST value that meets.
    if(increases){ if(meets) b = mid; else a = mid; }
    else         { if(meets) a = mid; else b = mid; }
  }
  const value = increases ? b : a;
  return { value, reachedPct: pctAt(value), capped: false };
}
// ── Solver (selectable goal · solo per-lever answers) ───────────────────────
// The advisor picks a GOAL the client actually wants (retire early, afford a big
// purchase, gift to family, leave a legacy, or just hit a confidence bar), then
// for every controllable lever we show what it ALONE would need to be to reach
// that goal — holding all else at today's plan. Neutral: no weighting, no
// bundling. The advisor reads each contribution and surmises any blend.
let solverResults = null;  // null=no run yet, else {goal, params, targetPct, soloBase, rows}
let solverSearching = false;
// Combo solver state. The fold-down is opened on demand (the search is heavy),
// so comboResults stays null until the advisor opens it for a given solve; it's
// cleared whenever the underlying solo solve changes.
let comboResults = null, comboOpen = false, comboSearching = false;

// Levers that get a solo answer. Some goals PIN one (excluded from the list).
// Allocation/risk is intentionally OUT — "take more risk to hit a goal" isn't a
// clean planning recommendation (parked in the idea bank). SS stays, though it's
// a weak % mover for high-spend households (its value is lifetime dollars).
const SOLVE_KEYS = ['retireAge','spend','savings','ssAge','pensionAge'];

// ── Combo solver tuning (all adjustable — refine with use) ──────────────────
// "Least disruptive" blends the three rules Nathan approved:
//   1. minimize the BIGGEST single lever stretch (each move normalized to its
//      own realistic band), so no one lever carries the whole load;
//   2. weight spending CUTS heavier — protect lifestyle, so combos lean to
//      save-more / claim-SS-later before they cut spend;
//   3. break ties by the smallest TOTAL move.
const COMBO_SPEND_CUT_W = 1.6;                 // penalty multiplier on a spend cut
const COMBO_A_FRACTIONS = [0.3, 0.55, 0.8];    // PARTIAL pushes of lever A (never the full solo move) so B genuinely shares the load
const COMBO_MAX_CARDS   = 3;                    // cards shown
const COMBO_MAX_LEVERS  = 3;                    // candidate levers searched (caps cost)
// Short labels for the combo pills (the lever names are too long for a pill).
const COMBO_SHORT = { retireAge:'Retire', ssAge:'SS at', spend:'Spend', savings:'Save', pensionAge:'Pension' };

// Realistic search band per lever (relative to baseline) so a solo answer can't
// suggest something absurd ($73k/yr savings off a $30k base). Not limiting: if a
// lever can't reach the goal within its band it truthfully reports "best hits X%".
function solveBand(key, baseLev){
  const cfg = LEVCFG.find(c=>c.key===key);
  const r   = levRange(cfg);
  const cur = plan.household.primary.currentAge;
  let min = r.min, max = r.max;
  if(key==='spend'){        min = Math.round(baseLev.spend*0.70/100)*100; max = Math.round(baseLev.spend*1.30/100)*100; }
  else if(key==='savings'){ min = 0; max = Math.max(baseLev.savings*2, baseLev.savings+25000); }
  else if(key==='retireAge'){ min = Math.max(cur+1, baseLev.retireAge-5); max = baseLev.retireAge+5; }
  // ssAge (62–70) and pensionAge (quoted range) are already tight — leave full.
  return { min: Math.max(r.min, min), max: Math.min(r.max, max), step: r.step };
}

// Goal registry. Each goal: how it reads, the param fields it needs, which lever
// (if any) it pins, and (legacy) a custom scorer. `bar` = label for the % box.
const GOALS = {
  confidence: { label:'Reach a confidence level',          bar:'confidence', params:[] },
  retire:     { label:'Retire by an age',                  bar:'confidence', params:['age'],          pin:'retireAge' },
  purchase:   { label:'Afford a big one-time goal',        bar:'confidence', params:['amount','age'] },
  gift:       { label:'Gift / fund education yearly',      bar:'confidence', params:['amount','toAge'] },
  legacy:     { label:'Leave a legacy',                    bar:'chance',     params:['amount'] },
};

// One solved lever → a clean "was → needs to be (delta)" descriptor.
function soloRowText(key, baseV, newV){
  const cfg = LEVCFG.find(c=>c.key===key);
  const fmt = v => { const [a,u]=cfg.fmt(v, {...defaultLevers(), [key]:v, eventAge:70}); return u && u!=='growth / defensive' ? `${a} ${u}` : a; };
  const from = fmt(baseV), to = fmt(newV);
  let delta = '';
  if(newV === baseV)                 delta = 'no change needed';
  else if(key==='spend')             delta = `${newV<baseV?'−':'+'}${Math.abs(Math.round((newV-baseV)/baseV*100))}%`;
  else if(key==='savings')           delta = `${newV>baseV?'+':'−'}$${Math.abs(Math.round((newV-baseV)/1000))}k/yr`;
  else if(key==='risk')              delta = `${newV>baseV?'+':''}${newV-baseV} level${Math.abs(newV-baseV)>1?'s':''}`;
  else /* ages */                    delta = `${newV>baseV?'+':''}${newV-baseV} yr${Math.abs(newV-baseV)>1?'s':''}`;
  return { name: cfg.name, from, to, delta, unchanged: newV===baseV };
}

// The goal-dependent parameter fields + the % bar, rendered together so the
// whole strip swaps when the goal dropdown changes.
function goalParamsHtml(goalType, baseLev, defPct){
  const g = GOALS[goalType];
  const cur = plan.household.primary.currentAge;
  const money = (id,lbl,val,suf='') => `<label class="sf-field"><span class="sf-lbl">${lbl}</span><span class="sf-box-wrap"><span class="sf-prefix">$</span><input class="sf-box sf-money" id="${id}" type="text" inputmode="numeric" value="${val.toLocaleString('en-US')}">${suf?`<span class="sf-suffix">${suf}</span>`:''}</span></label>`;
  const age = (id,lbl,val,min=55,max=99) => `<label class="sf-field"><span class="sf-lbl">${lbl}</span><span class="sf-box-wrap"><input class="sf-box" id="${id}" type="number" min="${min}" max="${max}" value="${val}"></span></label>`;
  let h = '';
  if(goalType==='retire')    h += age('sf-p-age','By age', baseLev.retireAge, cur, 72);
  if(goalType==='purchase'){ h += money('sf-p-amount','Amount', 300000); h += age('sf-p-age','At age', Math.min(72, baseLev.retireAge+2), cur, 95); }
  if(goalType==='gift'){     h += money('sf-p-amount','Each year', 25000, '/yr'); h += age('sf-p-toage','Through age', 85, cur, 99); }
  if(goalType==='legacy')    h += money('sf-p-amount','At least', 1000000);
  const barLbl = g.bar==='chance' ? 'Chance' : 'Confidence';
  const barDef = g.bar==='chance' ? 85 : defPct;
  h += `<label class="sf-field"><span class="sf-lbl">${barLbl}</span><span class="sf-box-wrap"><input class="sf-box" id="sf-pct" type="number" min="50" max="99" value="${barDef}"><span class="sf-suffix">%</span></span></label>`;
  return h;
}

function renderSolvePanel(){
  const el = $('#solve-panel');
  if(!el) return;
  // The goal-entry FORM takes priority — full-width card so it has room to breathe.
  if(solverFormOpen){
    const baseLev = scenarios.find(s=>s.base)?.lev || defaultLevers();
    const baseSucc = scenarios.find(s=>s.base)?.res?.successRate || 85;
    const defPct = Math.min(95, Math.ceil((baseSucc+1)/5)*5);
    const goalOpts = Object.entries(GOALS).map(([k,g])=>`<option value="${k}"${k==='retire'?' selected':''}>${g.label}</option>`).join('');
    el.innerHTML = `
      <div class="solve-panel solve-form-panel">
        <div class="solve-panel-head">
          <span class="solve-panel-title">What would it take? — solve each lever to a goal</span>
          <button class="solve-clear" id="sf-cancel">✕ Cancel</button>
        </div>
        <form class="sf-form" id="solver-form">
          <label class="sf-field"><span class="sf-lbl">Goal</span>
            <select class="sf-select" id="sf-goal">${goalOpts}</select></label>
          <span id="sf-params" class="sf-params">${goalParamsHtml('retire', baseLev, defPct)}</span>
          <button type="submit" class="sf-go">Solve →</button>
        </form>
      </div>`;
    return;
  }
  if(!solverResults && !solverSearching){ el.innerHTML = ''; return; }
  if(solverSearching){
    el.innerHTML = `<div class="solve-panel"><div class="solve-searching">Solving each lever</div></div>`;
    return;
  }
  const R = solverResults;
  const P = R.params;
  const money = v => '$' + Math.round(v).toLocaleString('en-US');
  // Goal sentence reads the client's wish back, then the bar.
  let goal;
  if(R.goalType==='legacy'){
    goal = `For a <b>${R.targetPct}%</b> chance of leaving at least <b>${money(P.amount)}</b>`;
  } else if(R.goalType==='retire'){
    goal = `To retire by <b>${P.age}</b> at <b>${R.targetPct}%</b> confidence`;
  } else if(R.goalType==='purchase'){
    goal = `To afford <b>${money(P.amount)}</b> at age <b>${P.age}</b> and stay at <b>${R.targetPct}%</b> confidence`;
  } else if(R.goalType==='gift'){
    goal = `To gift <b>${money(P.amount)}/yr</b> through age <b>${P.toAge}</b> and stay at <b>${R.targetPct}%</b> confidence`;
  } else {
    goal = `To reach <b>${R.targetPct}%</b> confidence`;
  }
  goal += `, here's what each lever would need to be on its own:`;
  const allCapped = R.rows.length > 0 && R.rows.every(r => r.capped);
  const rows = R.rows.map((row,i) => {
    const t = soloRowText(row.key, R.soloBase[row.key], row.value);
    const capped = row.capped;
    // "Already meets it" only when NOT capped and no move needed. When capped,
    // the lever can't get there at all — show the best it can do, never "meets it".
    const justMeets = t.unchanged && !capped;
    const move = justMeets
      ? `<span class="solo-to">${t.to}</span><span class="solo-delta">already meets it</span>`
      : t.unchanged   // capped but no useful move exists
        ? `<span class="solo-to">${t.to}</span><span class="solo-delta">no setting reaches it</span>`
        : `<span class="solo-from">${t.from}</span><span class="solo-arrow">→</span><span class="solo-to">${t.to}</span><span class="solo-delta">${t.delta}</span>`;
    return `<div class="solo-row ${capped?'capped':''} ${justMeets?'unchanged':''}">
      <div class="solo-name">${t.name}</div>
      <div class="solo-move">${move}</div>
      <div class="solo-pct ${capped?'capped':''}">${capped ? `best hits ${row.reachedPct.toFixed(0)}%` : `${row.reachedPct.toFixed(0)}% ✓`}</div>
      <button class="solve-load" data-solo-idx="${i}" ${capped||justMeets||!R.canLoad?'disabled':''}>Load</button>
    </div>`;
  }).join('');
  const allCappedNote = allCapped
    ? `<div class="solo-allcapped">No single lever reaches ${R.targetPct}% — combine moves, or ease the goal.</div>` : '';
  // The small solo widget folds DOWN into the combo field. The tab is always
  // offered once we have solo results; the heavy search only runs when opened.
  let comboHtml = `<div class="fold-cta"><button class="fold-tab" id="combo-toggle">${comboOpen?'↑ Hide combinations':'↓ Balanced combinations'}</button></div>`;
  if(comboOpen){
    comboHtml += comboSearching
      ? `<div class="combo-field"><div class="combo-searching">Searching balanced combinations</div></div>`
      : (comboResults ? renderComboField(comboResults) : '');
  }
  el.innerHTML = `
    <div class="solve-panel">
      <div class="solve-panel-head">
        <span class="solve-panel-title">${goal}</span>
        <button class="solve-clear" id="solve-clear-btn">✕ Clear</button>
      </div>
      <div class="solo-list">${rows}</div>
      ${allCappedNote}
    </div>
    ${comboHtml}`;
}

// Solve toward a chosen GOAL. Build soloBase = today's plan + the wish applied,
// pick the scorer (success %, or legacy "% chance of ≥ $X"), then for each
// controllable lever find what it ALONE would need within a realistic band —
// holding all else at soloBase. Neutral: no weighting, no bundling. The advisor
// reads each lever's required move and surmises any blend.
async function runSolve(goalType, params){
  if(solving) return;
  solving = true; solverFormOpen = false; solverSearching = true; solverResults = null;
  renderSolvePanel();

  if(!sharedPaths){
    resetSeed();
    const horizon = plan.household.primary.planEndAge - plan.household.primary.currentAge;
    sharedPaths = [];
    for(let i=0; i<plan.simulation.iterations; i++) sharedPaths.push(generateReturnPath(horizon));
  }

  const baseLev  = JSON.parse(JSON.stringify(scenarios.find(s=>s.base)?.lev || defaultLevers()));
  const soloBase = JSON.parse(JSON.stringify(baseLev));
  let pinned = null, score = trySuccess;
  if(goalType==='retire'){        soloBase.retireAge = params.age; pinned = 'retireAge'; }
  else if(goalType==='purchase'){ soloBase.eventAmt = params.amount; soloBase.eventAge = params.age; }
  else if(goalType==='gift'){     soloBase.giftAmt = params.amount; soloBase.giftEndAge = params.toAge; }
  else if(goalType==='legacy'){   score = (L)=>tryLegacyProb(L, params.amount); }
  syncPension(soloBase);

  const keys = SOLVE_KEYS.filter(k => k !== pinned);
  const rows = [];
  for(const k of keys){
    await new Promise(r => setTimeout(r, 0));      // yield so the spinner paints
    const band = solveBand(k, soloBase);
    const res  = solveLeverFor(soloBase, k, params.pct, score, band);
    if(res) rows.push({ key:k, value:res.value, reachedPct:res.reachedPct, capped:res.capped });
  }

  // Gift injects a liability with no column/lever to display, so its solos
  // can't be loaded as a scenario faithfully — read-only. Everything else loads.
  solverResults  = { goalType, params, targetPct: params.pct, soloBase, rows, canLoad: goalType!=='gift' };
  solverSearching = false;
  solving = false;
  // A fresh solo solve invalidates any combos computed for the previous one.
  comboResults = null; comboOpen = false; comboSearching = false;
  renderSolvePanel();
}

// ── Combo solver ────────────────────────────────────────────────────────────
// When no SINGLE lever reaches the goal, the advisor opens the fold-down and we
// search PAIRS of the remaining levers (the goal's pinned lever is held fixed).
// For each pair we push lever A partway toward its helpful end, then solve B to
// the gentlest value that still clears the target — tracing the trade-off line.
// Every % is the real engine on the shared market paths (apples-to-apples). We
// then rank the passing combos by the blended "least-disruptive" score and show
// the gentlest one per distinct lever-pair. No new math in the engine — this is
// pure search over engine outputs.

// One combo pill's value text: deltas for the dollar levers (reads like "spend
// $850/mo less"), absolute for the age levers ("SS at 70").
function comboPillValue(key, baseV, val){
  if(key==='spend'){   const d=Math.round((val-baseV)/12); return (d<0?'−$':'+$')+Math.abs(d).toLocaleString('en-US')+'/mo'; }
  if(key==='savings'){ const d=Math.round((val-baseV)/1000); return (d<0?'−$':'+$')+Math.abs(d)+'k/yr'; }
  return String(val);  // ages: the claim/retire age itself
}
// The anchor pill describing the (held-fixed) goal, shown first on every card.
function comboGoalPill(goalType, params){
  if(goalType==='retire')   return { k:'Retire', v:String(params.age) };
  if(goalType==='purchase') return { k:'Buy',    v:'$'+Math.round(params.amount/1000)+'k @'+params.age };
  if(goalType==='gift')     return { k:'Gift',   v:'$'+Math.round(params.amount/1000)+'k/yr→'+params.toAge };
  if(goalType==='legacy')   return { k:'Leave',  v:'≥$'+Math.round(params.amount/1000)+'k' };
  return null;  // plain confidence goal has no extra anchor
}
// Build a combo record from a set of [key,value] moves: pill text + the blended
// disruption score (rule 1 = biggest weighted stretch; rule 3 = total move).
function makeCombo(soloBase, moves, pct, basePct, meta){
  const items = moves.map(([k,v])=>{
    const span = (meta[k].band.max - meta[k].band.min) || 1;
    const norm = Math.abs(v - soloBase[k]) / span;
    const cut  = (k==='spend' && v < soloBase[k]);     // the one move that hurts lifestyle
    return { key:k, val:v, pv:comboPillValue(k, soloBase[k], v), cut,
             wnorm: norm*(cut?COMBO_SPEND_CUT_W:1), norm };
  });
  return {
    items, pct, deltaPts: pct - basePct,
    disruption: Math.max(...items.map(m=>m.wnorm)),    // minimize the biggest stretch
    spread:     items.reduce((s,m)=>s+m.norm,0),       // tie-break: least total move
    pairKey:    moves.map(m=>m[0]).sort().join('+'),
    pillKey:    items.map(m=>m.key+'='+m.pv).sort().join('|'),   // identity by what the card SHOWS
  };
}

async function runComboSolve(){
  if(!solverResults || comboSearching) return;
  comboSearching = true; comboResults = null; renderSolvePanel();
  await new Promise(r=>setTimeout(r,0));     // let the spinner paint

  // sharedPaths is already built by the solo solve, but guard anyway.
  if(!sharedPaths){
    resetSeed();
    const horizon = plan.household.primary.planEndAge - plan.household.primary.currentAge;
    sharedPaths = [];
    for(let i=0;i<plan.simulation.iterations;i++) sharedPaths.push(generateReturnPath(horizon));
  }

  const R = solverResults;
  const target   = R.targetPct;
  const soloBase = JSON.parse(JSON.stringify(R.soloBase));
  const score    = R.goalType==='legacy' ? (L)=>tryLegacyProb(L, R.params.amount) : trySuccess;
  const pinned   = R.goalType==='retire' ? 'retireAge' : null;
  const basePct  = score(soloBase);

  // Candidate levers = solvable set minus the pinned one, pruned to those whose
  // solo move actually helped, then capped to the most-promising few (cost).
  let cand = SOLVE_KEYS.filter(k => k!==pinned);
  const helpful = cand.filter(k=>{
    const row = R.rows.find(r=>r.key===k);
    return row && row.reachedPct > basePct + 0.3;
  });
  if(helpful.length >= 2) cand = helpful;
  if(cand.length > COMBO_MAX_LEVERS){
    cand = cand.slice().sort((a,b)=>
      (R.rows.find(r=>r.key===b)?.reachedPct ?? 0) - (R.rows.find(r=>r.key===a)?.reachedPct ?? 0)
    ).slice(0, COMBO_MAX_LEVERS);
  }

  // Per-candidate band + helpful direction (one pair of evals each).
  const meta = {};
  for(const k of cand){
    await new Promise(r=>setTimeout(r,0));
    const band  = solveBand(k, soloBase);
    const baseV = soloBase[k];
    const pLo = score({...soloBase,[k]:band.min});
    const pHi = score({...soloBase,[k]:band.max});
    meta[k] = { band, baseV, end: (pHi>=pLo) ? band.max : band.min };
  }

  // Sweep A toward its helpful end; at each step solve B to the gentlest value
  // that clears target. Keep combos where BOTH levers actually moved.
  // Ordered pairs: sweeping A→solve-B and B→solve-A trace different points on the
  // same trade-off line, so we try both and keep the gentlest per unordered pair.
  const combos = [];
  for(let i=0;i<cand.length;i++){
    for(let j=0;j<cand.length;j++){
      if(i===j) continue;
      const A=cand[i], B=cand[j], ma=meta[A], mb=meta[B], step=ma.band.step;
      // Restrict B to its HELPFUL half (baseline → helpful end) so a solve can
      // never push B backward to "make room" for A — both levers only ever help.
      const bBand = mb.end >= mb.baseV
        ? { min: mb.baseV, max: mb.band.max, step: mb.band.step }
        : { min: mb.band.min, max: mb.baseV, step: mb.band.step };
      for(const f of COMBO_A_FRACTIONS){
        await new Promise(r=>setTimeout(r,0));
        let aVal = Math.round((ma.baseV + f*(ma.end - ma.baseV))/step)*step;
        aVal = Math.max(ma.band.min, Math.min(ma.band.max, aVal));
        if(aVal === ma.baseV) continue;                         // A didn't move
        if(score({...soloBase,[A]:aVal}) >= target) continue;   // A alone already clears it → not a real pairing
        const res = solveLeverFor({...soloBase,[A]:aVal}, B, target, score, bBand);
        if(!res || res.capped) continue;                        // pair can't reach target
        if(res.value === mb.baseV) continue;                    // B didn't move → solo-A
        combos.push(makeCombo(soloBase, [[A,aVal],[B,res.value]], res.reachedPct, basePct, meta));
      }
    }
  }
  // Gentlest first, then pick for VARIETY. Pass 1 takes the gentlest of each
  // distinct lever-pair (so different pairs show when they exist). Pass 2 fills
  // any remaining slots with additional distinct balance-points along those
  // trade-offs (e.g. retire-a-bit-more+save-less vs retire-less+save-more), so a
  // single viable pair — common when the goal pins a lever — still surfaces
  // several real choices instead of just one. Exact-duplicate move sets dedup'd.
  combos.sort((x,y)=> x.disruption - y.disruption || x.spread - y.spread);
  const top = [], seenPair = new Set(), seenPill = new Set();
  for(const c of combos){                                   // pass 1 — pair variety
    if(top.length >= COMBO_MAX_CARDS) break;
    if(seenPair.has(c.pairKey)) continue;
    seenPair.add(c.pairKey); seenPill.add(c.pillKey); top.push(c);
  }
  // A candidate is redundant if a kept combo on the SAME pair is gentler on every
  // axis (disruption AND total move) and at least as effective — that's a strictly
  // worse plan, not a real alternative. Dedup also by what the card SHOWS (pillKey)
  // so two combos that round to identical pills never both appear.
  const dominated = c => top.some(k => k.pairKey===c.pairKey
    && k.pct >= c.pct - 0.3
    && k.disruption <= c.disruption + 1e-9
    && k.spread     <= c.spread + 1e-9);
  for(const c of combos){                                   // pass 2 — extra balance points
    if(top.length >= COMBO_MAX_CARDS) break;
    if(seenPill.has(c.pillKey) || dominated(c)) continue;
    seenPill.add(c.pillKey); top.push(c);
  }
  top.sort((x,y)=> x.disruption - y.disruption || x.spread - y.spread);
  comboResults = { goalType:R.goalType, params:R.params, target, basePct, soloBase,
                   canLoad: R.canLoad, combos: top };
  comboSearching = false;
  renderSolvePanel();
}

function renderComboField(C){
  if(!C.combos.length){
    return `<div class="combo-field">
      <div class="combo-head">No balanced pair reaches ${C.target}%.</div>

/* Map a scenario's levers -> engine override object. */
function leversToOverrides(L){
  const ov={};
  const baseRetire = plan.household.primary.retirementAge;
  const baseSs     = plan.income.socialSecurity.primary.claimAge;
  if(L.retireAge !== baseRetire) ov.retireDelay = L.retireAge - baseRetire;
  if(L.ssAge !== baseSs)         ov.ssDelayYears = L.ssAge - baseSs;
  // spend vs plan.expenses.living. The engine takes INCREASES via spendBump and
  // CUTS via spendCut — a negative spendBump is ignored (engine clamps it to 0).
  // So we MUST split by direction or lowering the spend lever silently no-ops.
  const baseSpend = plan.expenses.living;
  const spendFrac = (L.spend - baseSpend)/baseSpend;
  if(spendFrac > 0)      ov.spendBump = spendFrac;
  else if(spendFrac < 0) ov.spendCut  = -spendFrac;   // engine caps the cut at 50%
  if(L.eventAmt>0){ ov.lumpSum = L.eventAmt; ov.lumpSumYear = Math.max(0, L.eventAge - plan.household.primary.currentAge); }
  // Buy-property what-if: when "fund by selling primary" is on AND the household
  // owns a property, sell the primary (properties[0]) at the purchase age so the
  // net proceeds offset the cost. The purchase outflow itself is injected as a
  // one-time goal in planForScenario. Reuses the engine's assetSale override —
  // no new engine math.
  if(L.buyFromPrimary && L.buyAmt>0 && plan.properties && plan.properties.length){
    ov.assetSale = { asset: 0, age: L.buyAge };
  }
  if(L.savings !== plan.savings.annual) ov.savingsBump = (L.savings - plan.savings.annual)/Math.max(1,plan.savings.annual);
  // Pension: always pass the chosen age as an absolute override so the engine
  // looks up the entered benefit for THAT exact age (or pays 0 if no entry).
  ov.pensionStartAge = L.pensionAge;
  return ov;
}
/* Risk lever changes the profile -> needs a plan clone, not an override.
   A gift/education goal injects a time-limited recurring outflow (a liability
   with start/end age). colaPct = inflation so it stays real-constant — the
   advisor enters today's dollars. No-op for normal scenarios (no giftAmt). */
function planForScenario(L){
  const p=JSON.parse(JSON.stringify(plan));
  p.portfolio.riskProfile = L.risk;
  // Per-scenario goal-amount overrides: swap in this column's amount for any goal
  // the advisor edited here (keyed by plan.goals index). Untouched goals keep base.
  if(L.goalAmts && Array.isArray(p.goals)){
    p.goals = p.goals.map((g,gi)=> (L.goalAmts[gi]!=null) ? {...g, amount:L.goalAmts[gi]} : g);
  }
  if(L.giftAmt > 0 && L.giftEndAge){
    p.liabilities = (p.liabilities || []).concat([{
      amount: L.giftAmt,
      startAge: plan.household.primary.currentAge,
      endAge: L.giftEndAge,
      colaPct: LONGRUN_INFLATION * 100
    }]);
  }
  // Buy-property what-if: the purchase is a one-time outflow at buyAge, injected
  // as a single-year goal (startAge===endAge). The engine applies goals in both
  // the accumulation and retirement phases, so buying before OR after retirement
  // works. The optional sale of the primary that funds it is an assetSale
  // override (leversToOverrides). Both reuse existing engine paths.
  if(L.buyAmt > 0 && L.buyAge != null){
    p.goals = (p.goals || []).concat([{
      name: 'Property purchase', amount: L.buyAmt, startAge: L.buyAge, endAge: L.buyAge
    }]);
  }
  return p;
}

// Live comma formatting for money inputs. Reformats on every keystroke and
// preserves the caret's LOGICAL position (after the same number of digits)
// so typing left-to-right feels natural — no caret-jumping-to-end weirdness.
function liveCommas(el){
  const old = el.value;
  const caret = el.selectionStart ?? old.length;
  const digitsBefore = (old.slice(0, caret).match(/\d/g) || []).length;
  const digits = old.replace(/[^0-9]/g, '');
  if(!digits){ el.value = ''; return; }
  const formatted = parseInt(digits, 10).toLocaleString('en-US');
  el.value = formatted;
  let pos = 0, seen = 0;
  while(pos < formatted.length && seen < digitsBefore){
    if(/\d/.test(formatted[pos])) seen++;
    pos++;
  }
  el.setSelectionRange(pos, pos);
}

// Re-seed scenarios from the current base, keeping each scenario's adjustment.
function reseedScenarios(){
  const nb=defaultLevers();
  const LINKED=['retireAge','ssAge','spend','savings','pensionAge'];   // base-linked levers
  scenarios.forEach(s=>{
    Object.keys(nb).forEach(k=>{
      if(s.base){ s.lev[k]=nb[k]; return; }   // baseline always mirrors the base
      if(!LINKED.includes(k)) return;         // allocation / one-time event stay as set
      const cfg=LEVCFG.find(c=>c.key===k);
      let v=nb[k]+(s.lev[k]-baseSnapshot[k]);  // new base + this scenario's delta
      if(cfg){ const r=levRange(cfg); v=Math.max(r.min,Math.min(r.max,v)); }
      s.lev[k]=v;
    });
    syncPension(s.lev);   // auto-linked pension follows the (possibly new) retire age
  });
  baseSnapshot=nb;
}

  renderInputs();
  $('#status').textContent = 'Household cleared · enter the new household';
}
// Post-edit refresh (mirrors the balance-sheet field commit, minus setPath).
// Persists the plan on every commit so household edits survive a reload.
function commitPlanEdit(){
  ensureMedicarePreload(plan);   // re-sync end age + auto amount on spouse/plan-end edits
  reseedScenarios(); buildLevers(); sharedPaths=null; plansDirty=true; savePlan(); renderInputs();
  $('#status').textContent='Plan edited · open Scenarios';
}
// Net worth = assets - liabilities. Real-asset and recurring-liability UI
// surfaces ship empty for now (stubs), so until those are filled the gutter
// shows investable as net worth and zeroes for the empty buckets — never
// invents numbers. When real assets and liabilities land, this fn picks
// them up automatically from the plan.
function realAssetsTotal(){ return (plan.properties||[]).reduce((s,a)=>s+(a.value||0),0); }
function liabilitiesPVTotal(){
  // Side-panel estimate of what's owed: generic recurring liabilities as a simple
  // PV (amount/yr × years remaining) + each property mortgage's outstanding
  // balance. Honest crude estimate — the engine still does the proper
  // time-erosion + amortization math during simulation.
  const p=plan.household.primary;
  const recurring = (plan.liabilities||[]).reduce((s,L)=>{
    const yrs = Math.max(0, (L.endAge||p.planEndAge) - Math.max(L.startAge||p.currentAge, p.currentAge));
    return s + (L.amount||0)*yrs;
  },0);
  const mortgages = (plan.properties||[]).reduce((s,pr)=>s+((pr.mortgage&&pr.mortgage.balance)||0),0);
  return recurring + mortgages;
}
function netWorthTotal(){ return investableTotal() + realAssetsTotal() - liabilitiesPVTotal(); }

// Column subtotals — sums every group in HYBRID[page].left / .right (a column may
// be one or more groups). Dynamic-pension items are included automatically.
function groupSum(g){
  let s = 0;
  // Only sum DOLLAR items — a rate item (e.g. healthcare inflation %) is not a
  // cash flow and must not land in the column total (it was adding 0.02).
  (g.items||[]).forEach(it => { if(it.type && it.type!=='money') return; s += (getPath(plan, it.path)||0); });
  if(g.dynamic==='pension'){
    const m=(plan.income.pension&&plan.income.pension.benefitByAge)||{};
    const pStart=(plan.income.pension&&plan.income.pension.startAge);   // pays ONE amount
    s += (pStart && m[pStart]) || 0;
  }
  if(g.section){ (getPath(plan, g.section.arr)||[]).forEach(r => { s += (r.amount||0); }); }
  if(g.goals){
    const once = g.goals==='once';
    (plan.goals||[]).forEach(go => { if((once ? go.startAge===go.endAge : go.startAge!==go.endAge)) s += (go.amount||0); });
  }
  return s;
}
function colSum(page, side){
  const col = HYBRID[page] && HYBRID[page][side];
  if(!col) return 0;
  return (col.groups || [col]).reduce((s,g)=>s+groupSum(g), 0);
}
function hybridTotal(page){ return colSum(page,'left') + colSum(page,'right'); }

const fmtMoney = v => '$'+(v||0).toLocaleString('en-US');

// Page-specific gutter HTML. Same shape on every page — title row + big
// number + a breakdown of the parts. No descriptions; the structure IS the
// description. Net Worth shows assets / liabilities / net; the three hybrid
// pages show the left-column total / right-column total / overall.
function renderGutter(pageKey){
  const sp = SUB_PAGES[pageKey];
  if(pageKey === 'balance-sheet'){
    const assets = investableTotal() + realAssetsTotal();
    const liab   = liabilitiesPVTotal();
    const nw     = assets - liab;
    return `<div class="np-gutter">
      <div class="lbl">Net Worth</div>
      <div class="big-num teal">${fmtMoney(nw)}</div>
      <hr class="gut-rule"/>
      <div class="row"><span>Investable</span><b>${fmtMoney(investableTotal())}</b></div>
      <div class="row"><span>Real assets</span><b>${fmtMoney(realAssetsTotal())}</b></div>
      <div class="row"><span>Liabilities</span><b>${fmtMoney(liab)}</b></div>
    </div>`;
  }
  const def = HYBRID[pageKey];
  // Income page: headline = annual income; breakdown by income group.
  if(pageKey === 'income'){
    const income = colSum(pageKey,'left');
    const groupRows = (def.left.groups||[]).map(g =>
      `<div class="row"><span>${g.head||'Variable'}</span><b>${fmtMoney(groupSum(g))}</b></div>`).join('');
    return `<div class="np-gutter">
      <div class="lbl">${sp.totLabel}</div>
      <div class="big-num teal">${fmtMoney(income)}</div>
      <div class="big-sub">per year · today's dollars</div>
      <hr class="gut-rule"/>
      ${groupRows}
    </div>`;
  }
  // Expenses & Goals page: headline = total expenses; breakdown = essential + goals.
  if(pageKey === 'expenses'){
    const essential = colSum(pageKey,'left');
    const goals = colSum(pageKey,'right');
    return `<div class="np-gutter">
      <div class="lbl">${sp.totLabel}</div>
      <div class="big-num teal">${fmtMoney(essential + goals)}</div>
      <div class="big-sub">per year · today's dollars</div>
      <hr class="gut-rule"/>
      <div class="row"><span>Expenses</span><b>${fmtMoney(essential)}</b></div>
      <div class="row"><span>Goals</span><b>${fmtMoney(goals)}</b></div>
    </div>`;
  }
  const total = hybridTotal(pageKey);
  return `<div class="np-gutter">
    <div class="lbl">${sp.totLabel}</div>
    <div class="big-num teal">${fmtMoney(total)}</div>
    <div class="big-sub">per year · today's dollars</div>
    <hr class="gut-rule"/>
    <div class="row"><span>${def.left.head}</span><b>${fmtMoney(colSum(pageKey,'left'))}</b></div>
    <div class="row"><span>${def.right.head||''}</span><b>${fmtMoney(colSum(pageKey,'right'))}</b></div>
  </div>`;
}

/* ── Field renderer — one input element, shared by both layouts ──── */
function renderField(f, klass){
  const v = getPath(plan, f.path);
  if(f.type==='risk'){
    const opts = Object.keys(RISK_NAMES).map(k =>
      `<option value="${k}" ${+k===+v?'selected':''}>${RISK_NAMES[k]} · ${RISK_LABELS[k]}</option>`).join('');
    return `<select data-path="${f.path}" data-type="risk">${opts}</select>`;
  }
  if(f.type==='text'){
    return `<input type="text" data-path="${f.path}" data-type="text" value="${escHtml(v||'')}" placeholder="${f.ph||''}">`;
  }
  if(f.type==='monthly'){
    const dv = Math.round((v||0)/12).toLocaleString('en-US');
    return `<span class="pre">$</span><input type="text" inputmode="numeric" data-path="${f.path}" data-type="monthly" value="${dv}"><span style="font-size:11px;color:var(--ink-faint);margin-left:4px">/mo</span>`;
  }
  if(f.type==='money'){
    const dv = (v||0).toLocaleString('en-US');
    return `<span class="pre">$</span><input type="text" inputmode="numeric" data-path="${f.path}" data-type="money" value="${dv}">`;
  }
  if(f.type==='pct'){
    const dv = Math.round((v||0)*100);
    return `<input type="number" data-path="${f.path}" data-type="pct" value="${dv}" step="1"><span class="pre">%</span>`;
  }
  if(f.type==='taxpct'){                 // whole-number percent stored as-is (engine divides /100)
    const dv = Math.round(v||0);
    return `<input type="number" data-path="${f.path}" data-type="taxpct" value="${dv}" step="1" min="0" max="60"><span class="pre">%</span>`;
  }
  // age
  return `<input type="number" data-path="${f.path}" data-type="${f.type}" value="${v}" step="1">`;
}

/* ── Add-row sections ─────────────────────────────────────────────
   Schema-driven editable rows backed by a plan array. The SAME data-path
   binding + change handler that drives every other input writes these, so
   "add a row" is just pushing a default object and re-rendering, and "remove"
   is an array splice. Each kind names its backing array + a factory for a new
   row's defaults. (Goals share one array; recurring vs one-time is decided by
   the window: a one-time goal is a single-year window, startAge===endAge.) */
const ROW_KINDS = {
  income:    { arr:'income.other',   mk:()=>({ label:'', amount:0, startAge:65, endAge:75, realGrowth:0, taxablePct:1 }) },
  expense:   { arr:'expenses.extra', mk:()=>({ label:'', amount:0, startAge:65, endAge:80 }) },
  liability: { arr:'liabilities',    mk:()=>({ label:'', amount:0, startAge:65, endAge:75, colaPct:0 }) },
  goalRec:   { arr:'goals',          mk:()=>({ name:'',  amount:0, startAge:plan.household.primary.retirementAge, endAge:plan.household.primary.planEndAge }) },
  goalOnce:  { arr:'goals',          mk:()=>({ name:'',  amount:0, startAge:70, endAge:70 }) },
  property:  { arr:'properties',     mk:()=>({ name:'',  value:0, purchasePrice:0, purchaseYear: new Date().getFullYear(), mortgage:{ balance:0, rate:0, termYears:0 } }) },
};
const money = (p,base,k)=>`<span class="er-amt"><span class="pre">$</span><input type="text" inputmode="numeric" data-path="${base}.${k}" data-type="money" value="${(getPath(plan,base+'.'+k)||0).toLocaleString('en-US')}"></span>`;
const num   = (p,base,k,step)=>`<input class="er-num" type="number" step="${step||1}" data-path="${base}.${k}" data-type="num" value="${getPath(plan,base+'.'+k)}">`;
const name  = (p,base,k,ph)=>`<input class="er-name" type="text" data-path="${base}.${k}" data-type="text" value="${escHtml(getPath(plan,base+'.'+k)||'')}" placeholder="${ph}">`;
const rmX   = base=>`<button class="row-x" data-rmpath="${base}" title="Remove this row">×</button>`;

// A flow row (income / expense / liability): name · amount · from–to ages.
function flowRow(arr, i, nameKey, ph){
  const base = `${arr}.${i}`;
  return `<div class="erow">${name(plan,base,nameKey,ph)}${money(plan,base,'amount')}
    <span class="er-ages">age ${num(plan,base,'startAge')}<span class="er-dash">–</span>${num(plan,base,'endAge')}</span>${rmX(base)}</div>`;
}
// An income row = the flow row PLUS a compact second line for the two per-stream
// controls: real growth/yr (signed — negative phases the stream down) and the
// share taxed at the ordinary rate. gpct stores a signed fraction; pct a 0–1 one.
function incomeRow(arr, i){
  const base = `${arr}.${i}`;
  const g = Math.round((getPath(plan, base+'.realGrowth')||0)*100);
  const tRaw = getPath(plan, base+'.taxablePct');
  const t = Math.round((tRaw==null?1:tRaw)*100);
  const main = `<div class="erow">${name(plan,base,'label','Source')}${money(plan,base,'amount')}
    <span class="er-ages">age ${num(plan,base,'startAge')}<span class="er-dash">–</span>${num(plan,base,'endAge')}</span>${rmX(base)}</div>`;
  const extra = `<div class="er-extra">
      <span class="er-xk">grows</span><input class="er-num er-gw" type="number" step="1" data-path="${base}.realGrowth" data-type="gpct" value="${g}"><span class="er-xs">%/yr real</span>
      <span class="er-xsep">·</span>
      <input class="er-num" type="number" step="1" data-path="${base}.taxablePct" data-type="pct" value="${t}"><span class="er-xs">% taxable</span>
    </div>`;
  return `<div class="erow-wrap">${main}${extra}</div>`;
}
// A recurring goal: name · amount · age window (from – to). Defaults to
// retirement → plan-end (the old "lifelong"), but the end is now editable so a
// goal can run for a finite span (e.g. tuition ages 70–78).
function recGoalRow(i){
  const base = `goals.${i}`;
  const ages = `<span class="er-ages">age ${num(plan,base,'startAge')}<span class="er-dash">–</span>${num(plan,base,'endAge')}</span>`;

// A one-time goal: name · amount · single "at age" (mirrors into endAge).
function onceGoalRow(i){

// A property card: name · value · purchase price · optional mortgage. The
// payment + payoff shown is the ENGINE's amortization (truth), not UI math.
function propRow(i){
  const base = `properties.${i}`, m = `${base}.mortgage`;
  const M = getPath(plan, m) || {};
  const pay = annualMortgagePayment(M.balance, M.rate, M.termYears);

  const meta = pay > 0
    ? `Engine: ${fmtMoney(Math.round(pay))}/yr · paid off at age ${start + (M.termYears||0)}`
    : `No mortgage — value & purchase price are captured for a future sale`;
  return `<div class="prop">
    <div class="prop-top">${name(plan,base,'name','Property name — e.g. Castlebridge Rd')}${ownerSelect(`${base}.owner`, (getPath(plan,base)||{}).owner)}${rmX(base)}</div>
    <div class="prop-grid">
      <label class="prop-f"><span class="er-k">Value</span>${money(plan,base,'value')}</label>
      <label class="prop-f"><span class="er-k">Purchase price</span>${money(plan,base,'purchasePrice')}</label>
      <label class="prop-f"><span class="er-k">Purchase year</span><input class="er-num" type="number" step="1" min="1900" max="2099" data-path="${base}.purchaseYear" data-type="num" value="${getPath(plan,base+'.purchaseYear')||''}" style="width:52px"></label>
    </div>
    <div class="prop-mort">
      <span class="er-k">Mortgage</span>

// Render every row of a flow kind backed by `arr`, with the trailing "+ add".
function flowSection(arr, nameKey, ph, kind, addLabel){
  const list = getPath(plan, arr) || [];
  const rowFn = (kind==='income') ? (i=>incomeRow(arr,i)) : (i=>flowRow(arr,i,nameKey,ph));
  let h = list.map((_,i)=>rowFn(i)).join('');
  h += `<div class="hp-add" data-add="${kind}">${addLabel}</div>`;

}

/* ── Statement layout (Balance Sheet) ─────────────────────────────

      });

      }

      } else if(sec.kind==='liability'){

        // the balance sheet ties out — the property card stays the source of truth.
        const linked = (plan.properties||[])
          .filter(pr => pr.mortgage && (pr.mortgage.balance > 0))

            <span class="ro-amt">${fmtMoney(pr.mortgage.balance)}</span>

  const rightSecs  = BALANCE_SHEET.filter(s => s.kind==='property' || s.liab);

/* ── Hybrid layout (Inflows / Outflows / Goals) ───────────────────
   200px gutter (title + description + running total) + two facing columns
   split by a single vertical hairline. Each item: name on the left, boxless
   input on the right, meta line below the name in ink-mute. */
function renderHybrid(pageKey){
  const def = HYBRID[pageKey];
  // A "group" = one labelled block (head + fixed items + optional pension +
  // optional editable section/goals). A column is one or more groups stacked, so
  // the combined Cash Flow page can show Fixed income + Variable under Income.
  const renderGroup = g => {
    let h = g.head ? `<h4>${g.head}</h4>` : '';
    const items = (g.items||[]).slice();
    if(g.dynamic==='pension'){
      // ONE summary row — the benefit at the chosen start age. The full
      // benefit-by-age schedule and which age to claim is decided at the
      // Scenario level (the pension slider), not here.
      const pen = plan.income.pension || {};
      const pstart = pen.startAge;
      const ages = Object.keys(pen.benefitByAge||{}).map(Number).sort((a,b)=>a-b);
      const age = (pstart!=null && (pen.benefitByAge||{})[pstart]!=null) ? pstart
                : (ages.length ? ages[0] : null);
      if(age!=null){
        items.push({ path:`income.pension.benefitByAge.${age}`, name:'Pension', type:'money', meta:()=>`Begins at age ${age}` });
      }
    }
    items.forEach(it => {
      const xBtn = it.removable ? `<button class="row-x" title="Remove this row" data-rmpath="${it.path}">×</button>` : '';
      h += `<div class="hp-item"><div class="ti"><span class="nm">${it.name}</span><span class="field">${renderField(it)}${xBtn}</span></div>`;
      const m = it.meta ? it.meta() : '';
      if(m) h += `<div class="meta">${m}</div>`;
      h += `</div>`;
    });
    // Array-backed editable rows: a flow section (variable income) …
    if(g.section){
      const s = g.section;
      h += `<div class="erows">${flowSection(s.arr, s.nameKey, s.ph, s.kind, s.add)}</div>`;
    }
    // … or the goals array, split by window into recurring vs one-time columns.
    if(g.goals){
      const once = g.goals==='once';
      const rows = (plan.goals||[]).map((gg,i)=>({gg,i}))
        .filter(({gg})=> once ? (gg.startAge===gg.endAge) : (gg.startAge!==gg.endAge))
        .map(({i})=> once ? onceGoalRow(i) : recGoalRow(i)).join('');
      h += `<div class="erows">${rows}<div class="hp-add" data-add="${once?'goalOnce':'goalRec'}">${g.add}</div></div>`;
    }
    if(g.add && !g.goals && !g.section) h += `<div class="hp-add">${g.add}</div>`;
    return h;
  };
  const colHtml = colDef => {
    const groups = colDef.groups || [colDef];   // ungrouped pages: the column IS one group
    return `<div class="hp-col">${groups.map(renderGroup).join('')}</div>`;
  };
  const hasRight = def.right && (def.right.groups ? def.right.groups.length > 0 : (def.right.head || def.right.goals || def.right.section || def.right.items));
  return `<div class="np-page">
    ${renderGutter(pageKey)}
    <div class="hp-body">
      ${colHtml(def.left)}
      ${hasRight ? `<div class="hp-rule"></div>${colHtml(def.right)}` : ''}
    </div>
  </div>`;
}

/* ── Snapshot (the diagnosis) ──────────────────────────────────────
   Three diagnostic gauges, each a RELATIONSHIP between numbers already
   entered — not engine projections. These are static rules-of-thumb (like a
   balance-sheet ratio): the income floor, the year-one withdrawal rate, and
   the tax-location mix. The engine still owns the real probability (Scenarios);
   this page is the at-a-glance condition of the household TODAY. Neutrality:
   the same gauges read green when the news is good and red when it isn't —
   the tool has no thesis, it just shows what's there. */
function snapshotMetrics(){
  const a = plan.portfolio.accounts;
  const taxable = a.taxable.balance||0, trad = a.traditional.balance||0, roth = a.roth.balance||0;
  const invest = taxable + trad + roth;
  // Guaranteed-for-life income at retirement: both SS benefits + pension at its
  // chosen start age (today's-dollar values straight off the inputs).
  const ssP = plan.income.socialSecurity.primary.pia||0;
  const ssS = (plan.income.socialSecurity.spouse && plan.income.socialSecurity.spouse.pia)||0;
  const pen = plan.income.pension||{};
  const penAmt = (pen.benefitByAge && pen.startAge!=null) ? (pen.benefitByAge[pen.startAge]||0) : 0;
  const guaranteed = ssP + ssS + penAmt;
  const essentials = (plan.expenses.living||0) + (plan.expenses.healthcare||0);
  const goals = (Array.isArray(plan.goals) ? plan.goals : []).reduce((s,g)=>s+(g.amount||0),0);
  const totalSpend = essentials + goals;
  const floorPct = essentials>0 ? guaranteed/essentials : 0;
  const fromPortfolioEssential = Math.max(0, essentials - guaranteed);
  const gap = Math.max(0, totalSpend - guaranteed);
  const wr = invest>0 ? gap/invest : 0;
  // Replacement ratio: GUARANTEED retirement income (SS + pension) as a share of
  // gross working income. Portfolio withdrawals are NOT income — they're spending
  // the portfolio funds — so they're deliberately excluded here. (A "sustainable
  // withdrawal amount" would need a solve, and would be framed as exactly that.)
  const workingIncome = plan.income.workingIncome || 0;
  const replacement = workingIncome>0 ? guaranteed/workingIncome : null;
  return { taxable, trad, roth, invest, guaranteed, essentials, goals, totalSpend,
           floorPct, fromPortfolioEssential, gap, wr, workingIncome, replacement };
}
function renderSnapshot(){
  const m = snapshotMetrics();
  const pct = v => (v*100);
  const pct1 = v => (v*100).toFixed(1)+'%';
  const pct0 = v => Math.round(v*100)+'%';

  // 1 · Income floor — floating stats (no bar: bar implied a grade, this is a fact).
  const floorTone = m.floorPct>=0.9 ? 'teal' : m.floorPct>=0.6 ? 'gold' : 'clay';
  const incomeFloor = `
    <div class="metric">
      <div>
        <div class="m-eye">Income Floor</div>
        <div class="m-hero ${floorTone}">${pct0(m.floorPct)}</div>
        <div class="m-sub">of essential spending is covered for life by guaranteed income</div>
      </div>
      <div class="stat-row">
        <div class="stat-item"><div class="stat-lbl">Guaranteed for life</div><div class="stat-val">${fmtMoney(m.guaranteed)}</div></div>
        <div class="stat-item"><div class="stat-lbl">Drawn from portfolio</div><div class="stat-val">${fmtMoney(m.fromPortfolioEssential)}</div></div>
        <div class="stat-item"><div class="stat-lbl">Essential spending</div><div class="stat-val">${fmtMoney(m.essentials)}</div></div>
      </div>
    </div>`;

  // 2 · Withdrawal rate — neutral metric, no grading. Shown for reference and
  // as a starting point for advisor conversation, not a verdict.
  const withdrawal = `
    <div class="metric">
      <div>
        <div class="m-eye">Withdrawal Rate · Year One</div>
        <div class="m-hero">${pct1(m.wr)}</div>
        <div class="m-sub">of the portfolio drawn the first year of retirement</div>
      </div>
      <div class="stat-row">
        <div class="stat-item"><div class="stat-lbl">Portfolio draws / yr</div><div class="stat-val">${fmtMoney(m.gap)}</div></div>
        <div class="stat-item"><div class="stat-lbl">From invested</div><div class="stat-val">${fmtMoney(m.invest)}</div></div>
        <div class="stat-item"><div class="stat-lbl">Total retirement spend</div><div class="stat-val">${fmtMoney(m.totalSpend)}</div></div>
      </div>
    </div>`;

  // 3 · Tax location — segmented proportion bar. Hero = the tax-deferred share
  // (the future-tax exposure). Labels hidden on slivers too thin to hold text.
  const tP = m.invest>0 ? m.taxable/m.invest : 0;
  const dP = m.invest>0 ? m.trad/m.invest : 0;
  const rP = m.invest>0 ? m.roth/m.invest : 0;
  const segLbl = (p) => pct(p)>=8 ? pct0(p) : '';
  const taxLocation = `
    <div class="metric">
      <div>
        <div class="m-eye">Tax Location</div>
        <div class="m-hero">${pct0(dP)}</div>
        <div class="m-sub">sits in tax-deferred accounts — taxed as income when withdrawn</div>
      </div>
      <div>
        <div class="seg">
          <div class="s-tax" style="width:${(tP*100).toFixed(1)}%">${segLbl(tP)}</div>
          <div class="s-def" style="width:${(dP*100).toFixed(1)}%">${segLbl(dP)}</div>
          <div class="s-roth" style="width:${(rP*100).toFixed(1)}%">${segLbl(rP)}</div>
        </div>
        <div class="seg-legend">
          <span class="k"><span class="sw" style="background:var(--teal)"></span>Taxable<b>${fmtMoney(m.taxable)}</b></span>
          <span class="k"><span class="sw" style="background:var(--gold)"></span>Tax-deferred<b>${fmtMoney(m.trad)}</b></span>
          <span class="k"><span class="sw" style="background:#3c7d59"></span>Tax-free · Roth<b>${fmtMoney(m.roth)}</b></span>
        </div>
      </div>
    </div>`;

  // 4 · Replacement ratio — retirement income as a share of working income.
  // NEUTRAL by design: no safety zones, because a higher ratio isn't worse —
  // it's the upside (live as well or better than today). Reference ticks only:
  // a faint "typical ~75%" heuristic and a solid "100% = working income" line.
  // Scale runs 0–120% so over-100% (spending up in retirement) still shows.
  let replacement;
  if(m.replacement == null){
    replacement = `
      <div class="metric">
        <div>
          <div class="m-eye">Replacement Ratio</div>
          <div class="m-hero">—</div>
          <div class="m-sub">add working income on the Balance Sheet to compare retirement to life today</div>
        </div>
        <div></div>
      </div>`;
  } else {
    // Coverage bar — same language as the income floor. The full track = working
    // income; the teal fill = the share retirement income replaces. No vertical
    // ticks cutting through text. Caps at the track; over-100% (spending more in
    // retirement) shows full + the true % in the hero.
    const fillPct = Math.min(100, m.replacement*100);
    replacement = `
      <div class="metric">
        <div>
          <div class="m-eye">Replacement Ratio</div>
          <div class="m-hero teal">${pct0(m.replacement)}</div>
          <div class="m-sub">of working income, replaced by guaranteed retirement income</div>
        </div>
        <div>
          <div class="cov"><div class="fill" style="width:${fillPct.toFixed(1)}%">Guaranteed&nbsp;·&nbsp;${fmtMoney(m.guaranteed)}</div></div>
          <div class="cov-legend">
            <span class="k"><span class="sw" style="background:var(--teal)"></span>Guaranteed income<b>${fmtMoney(m.guaranteed)}</b></span>
            <span class="k"><span class="sw" style="background:#e3d9c5"></span>Working income<b>${fmtMoney(m.workingIncome)}</b></span>
          </div>
        </div>
      </div>`;
  }

  return `<div class="snap">${incomeFloor}${withdrawal}${taxLocation}${replacement}</div>`;
}

/* ── Goals board (the approved prioritisation surface) ─────────────
   The Goals sub-tab is NOT the ledger — it's a board. Each card is a VIEW of a
   plan.goals entry: recurring goals (startAge≠endAge) carry a /yr tag; one-time
   goals (startAge===endAge) get a copper card + ONE-TIME tag. The hero sums the
   recurring goals (annual goal spend) and notes any one-time total. Drag a card
   onto a ghost slot to rank it (absorb + copper flash; swap, not bounce). The
   ranking is a planning/conversation surface — it adds NO engine math. */
let _gidSeq = 1;   // stable per-goal id, so the priority board survives add/delete
function goalsView(){
  const src = Array.isArray(plan.goals)?plan.goals:[];
  const list = src.map((g,i)=>{
    if(g._gid==null) g._gid = _gidSeq++;            // assign once, persists in-memory
    return {
      i, gid:g._gid, name:g.name||'', amount:g.amount||0,
      once:g.startAge===g.endAge, startAge:g.startAge, endAge:g.endAge,
    };
  });
  return {
    list,
    recurring: list.filter(g=>!g.once).reduce((s,g)=>s+g.amount,0),
    oneTime:   list.filter(g=> g.once).reduce((s,g)=>s+g.amount,0),
  };
}
function goalsHeroHTML(){
  const {recurring, oneTime} = goalsView();
  const oneTimeMeta = oneTime>0 ? ` &nbsp;&middot;&nbsp; <b>${fmtMoney(oneTime)}</b> one-time planned` : '';
  return `<div class="g-eyebrow">Annual goal spend</div>
    <div class="g-big">${fmtMoney(recurring)}<span class="g-per">/ year</span></div>
    <div class="g-meta">today's dollars${oneTimeMeta}</div>`;
}
function renderGoalsBoard(){
  const {list} = goalsView();
  return `<div class="g-hero g-hero-min">
      <div class="g-actions">
        <div class="g-addrow">
          <div class="g-add" data-add="goalRec"><span class="g-plus">+</span> Add a goal</div>
          <div class="g-add g-add-sec" data-add="goalOnce"><span class="g-plus">+</span> One-time</div>
        </div>
        <div class="g-legend"><span><i class="rec"></i>Recurring</span><span><i class="once"></i>One-time</span></div>
      </div>
    </div>
    <div class="g-board" id="g-board">
      <div class="g-axis"><div class="g-spine"></div></div>
      <div class="g-traylab" id="g-traylab"></div>
    </div>`;
}
// One editable goal card. Cards are the FULL editable surface (name, amount,
// age window / at-age) and the prioritisation handle — drag the body, edit the
// fields. Each field is a data-path-free input handled locally so value edits
// update in place (preserving the drag rank); add/remove route through the
// shared #np-content handlers (a structural change, so a rebuild is fine).
function goalCardHTML(g){
  const tag = g.once ? '<span class="g-tag">One-time</span>' : '';
  const per = g.once ? '' : '<span class="g-per2">/yr</span>';
  const amtStr = (g.amount||0).toLocaleString('en-US');
  const ages = g.once
    ? `Lands once · age <input class="g-age-in" data-f="startAge" data-sync="endAge" data-type="num" value="${Number(g.startAge)||0}">`
    : `Recurring · ages <input class="g-age-in" data-f="startAge" data-type="num" value="${Number(g.startAge)||0}">–<input class="g-age-in" data-f="endAge" data-type="num" value="${Number(g.endAge)||0}">`;
  return `<div class="g-main">
       <div class="g-name"><input class="g-name-in" data-f="name" data-type="text" value="${escHtml(g.name)}" placeholder="Goal name">${tag}</div>
       <div class="g-kind">${ages}</div>
     </div>
     <div class="g-amt"><span class="g-cur">$</span><input class="g-amt-in" data-f="amount" data-type="money" inputmode="numeric" value="${amtStr}">${per}</div>
     <button class="row-x g-del" data-rmpath="goals.${g.i}" title="Remove this goal">×</button>`;
}
// A foundation card (e.g. base spending). Pinned to the top of the ladder, not
// draggable, not deletable. Its amount edits write straight to plan.expenses
// (data-exp) so the value stays the engine's single source of truth — it flows
// into the cash-flow table and every scenario, never double-counted.
function foundationCardHTML(f){
  const amtStr = (f.amount||0).toLocaleString('en-US');
  // Binding: scalar foundations write to plan.expenses[exp] (data-exp); preload
  // foundations write to their age-gated expenses.extra entry (data-extra=preset).
  const binding = f.extra ? `data-extra="${f.extra}"` : `data-exp="${f.exp}"`;
  return `<div class="g-main">
       <div class="g-name">${escHtml(f.name)}<span class="g-tag pin">Foundation</span></div>
       <div class="g-kind">${f.kind}</div>
     </div>
     <div class="g-amt"><span class="g-cur">$</span><input class="g-amt-in" ${binding} data-type="money" inputmode="numeric" value="${amtStr}"><span class="g-per2">/yr</span></div>`;
}
// Build slots + editable, draggable cards into the rendered shell; wire pointer
// drag/snap/swap, inline editing, and rank persistence. Called after
// renderInputs() injects the board markup.
function initGoalsBoard(){
  const {list} = goalsView();
  const board = $('#g-board'), traylab = $('#g-traylab'), lead = $('#g-lead');
  if(!board) return;
  const RANK_KEY='parallax.goals.rank';
  // Foundation cards: pinned to the TOP slots, read/write plan.expenses (the engine's
  // single source of truth — no double count). Base spending now; healthcare later.
  const medExtra=(plan.expenses&&plan.expenses.extra||[]).find(e=>e&&e.preset==='medicare');
  const foundations=[
    {name:'Base spending', kind:'Retirement living · funded first', exp:'living', amount:Math.round((plan.expenses&&plan.expenses.living)||0)},
  ];
  if(medExtra) foundations.push({name:'Medicare + out-of-pocket', kind:'Healthcare · age 65 → plan end', extra:'medicare', amount:Math.round(medExtra.amount||0)});
  // Room for 6 goal slots PLUS the pinned foundations, so every goal can still rank.
  const NSLOT=Math.max(6, list.length)+foundations.length, CH=72, GAP=14;
  // On a phone the ladder + tray can't sit side-by-side; stack them in one full-
  // width column (slots on top, tray below) and size cards to the board.
  const mobBoard=isMobileView();
  const CW = mobBoard ? Math.max(240, (board.clientWidth||360)-24) : 410;
  const SNAP='left .2s cubic-bezier(.2,.7,.2,1),top .2s cubic-bezier(.2,.7,.2,1),box-shadow .16s,transform .12s';
  const slots=[], cards=[];
  for(let i=0;i<NSLOT;i++){
    const s=document.createElement('div'); s.className='g-slot';
    s.style.width=CW+'px'; s.style.height=CH+'px';
    s.innerHTML='<span class="g-rank">'+(i+1)+'</span>';
    board.appendChild(s); slots.push({el:s,x:0,y:0,card:null});
  }
  list.forEach((g)=>{
    const el=document.createElement('div'); el.className='g-card'+(g.once?' once':'');
    el.dataset.i=g.i; el.innerHTML=goalCardHTML(g);
    if(mobBoard) el.style.width=CW+'px';
    board.appendChild(el);
    const c={el,slot:null,fromSlot:null,homeX:0,homeY:0,idx:g.i,gid:g.gid}; el._c=c; cards.push(c);
  });
  // Pin each foundation card into a top slot (rank 1, 2, …) before goal ranks
  // restore — those slots read as occupied, so goals fill below them.
  const fcards=[];
  foundations.forEach((f,fi)=>{
    const el=document.createElement('div'); el.className='g-card pin';
    if(mobBoard) el.style.width=CW+'px';
    el.innerHTML=foundationCardHTML(f);
    board.appendChild(el);
    const c={el,slot:null,pinned:true}; el._c=c; fcards.push(c);
    const s=slots[fi]; if(s){ s.card=c; c.slot=s; s.el.classList.add('filled'); }
  });
  // Restore the saved rank by STABLE goal id, so adding or deleting a goal keeps
  // every other goal exactly where it was placed: surviving ids snap back to
  // their slots, a newly added goal stays in the tray, a deleted id just vanishes.
  try{
    const saved=JSON.parse(localStorage.getItem(RANK_KEY)||'null');
    if(saved && Array.isArray(saved.order)){
      saved.order.forEach((gid,si)=>{
        if(gid==null) return;
        const c=cards.find(c=>c.gid===gid), s=slots[si];
        if(c && s && !s.card && c.slot===null){ s.card=c; c.slot=s; s.el.classList.add('filled'); }
      });
    }
  }catch{}
  function saveRank(){
    try{ localStorage.setItem(RANK_KEY, JSON.stringify({order:slots.map(s=>s.card?s.card.gid:null)})); }catch(e){ if(window.PXDEBUG) console.error('saveRank failed:', e); }
  }
  // Ladder column (the ranked priority list, left) vs the tray of goals still to
  // place. The tray sits just right of the ladder and fills a column top→bottom,
  // then wraps to a NEW column to the right when it runs out of vertical room —
  // so adding goals never overflows below the board (no scroll). Both column
  // origins are set by layout() and read by the drop logic (judged by region).
  const COLGAP=42;
  let ladderX=140, trayX=0, perCol=6, trayTop=0;
  function layout(){
    if(mobBoard){
      // Single column: ranked slots first, the tray of unplaced goals below.
      const startY=38, lx=12; ladderX=lx;
      slots.forEach((s,i)=>{ s.x=lx; s.y=startY+i*(CH+GAP); s.el.style.left=lx+'px'; s.el.style.top=s.y+'px'; });
      trayTop = startY + NSLOT*(CH+GAP) + 34;
      traylab.style.left=lx+'px'; traylab.style.top=(trayTop-26)+'px';
      cards.forEach((c,i)=>{
        c.homeX=lx; c.homeY=trayTop+i*(CH+GAP);
        if(c.slot){ c.el.style.left=c.slot.x+'px'; c.el.style.top=c.slot.y+'px'; }
        else      { c.el.style.left=c.homeX+'px';  c.el.style.top=c.homeY+'px'; }
      });
      fcards.forEach(c=>{ if(c.slot){ c.el.style.left=c.slot.x+'px'; c.el.style.top=c.slot.y+'px'; } });
      const nh=trayTop + cards.length*(CH+GAP) + 24;
      if(Math.abs(board.offsetHeight-nh)>1) board.style.height=nh+'px';
      return;
    }
    const H=board.clientHeight;
    const startY=44;                                  // top-aligned so the column packs (room for labels above)
    perCol=Math.max(1, Math.floor((H-startY-CH)/(CH+GAP))+1);
    trayX=ladderX+CW+56;                              // first tray column, just right of the ladder
    slots.forEach((s,i)=>{ s.x=ladderX; s.y=startY+i*(CH+GAP); s.el.style.left=s.x+'px'; s.el.style.top=s.y+'px'; });
    traylab.style.left=trayX+'px'; traylab.style.top=(startY-28)+'px';
    cards.forEach((c,i)=>{
      const col=Math.floor(i/perCol), row=i%perCol;   // fill down, then wrap right
      c.homeX=trayX+col*(CW+COLGAP); c.homeY=startY+row*(CH+GAP);
      if(c.slot){ c.el.style.left=c.slot.x+'px'; c.el.style.top=c.slot.y+'px'; }
      else      { c.el.style.left=c.homeX+'px';  c.el.style.top=c.homeY+'px'; }
    });
    fcards.forEach(c=>{ if(c.slot){ c.el.style.left=c.slot.x+'px'; c.el.style.top=c.slot.y+'px'; } });
  }
  layout();
  // Re-layout on board resize; one observer at a time (renderInputs disconnects).
  window.__gObs = new ResizeObserver(layout); window.__gObs.observe(board);

  // ── Inline editing (local; preserves the drag rank — no board rebuild) ──
  const refreshHero=()=>{ if(lead) lead.innerHTML=goalsHeroHTML(); };
  board.addEventListener('input', e=>{
    const inp=e.target.closest('[data-f],[data-exp],[data-extra]'); if(!inp) return;
    e.stopPropagation();                       // don't double-fire the global liveCommas
    if(inp.classList.contains('g-amt-in')) liveCommas(inp);
  });
  board.addEventListener('change', e=>{
    const inp=e.target.closest('[data-f],[data-exp],[data-extra]'); if(!inp) return;
    e.stopPropagation();                       // value edits stay local (rank intact)
    // Foundation card → write back to plan.expenses (the engine's source of truth),
    // so base spending flows into cash flow + every scenario, never double-counted.
    if(inp.dataset.exp){
      const v=Math.round(parseFloat(String(inp.value).replace(/[^0-9.]/g,''))||0);
      if(plan.expenses) plan.expenses[inp.dataset.exp]=v;
      reseedScenarios(); buildLevers(); sharedPaths=null; plansDirty=true; savePlan();
      $('#status').textContent='Plan edited · open Scenarios';
      return;
    }
    // Preload foundation (Medicare) → write to its age-gated expenses.extra entry and
    // mark it userSet so it stops auto-scaling with household size.
    if(inp.dataset.extra){
      const v=Math.round(parseFloat(String(inp.value).replace(/[^0-9.]/g,''))||0);
      const m=(plan.expenses&&plan.expenses.extra||[]).find(x=>x&&x.preset===inp.dataset.extra);
      if(m){ m.amount=v; m.userSet=true; }
      reseedScenarios(); buildLevers(); sharedPaths=null; plansDirty=true; savePlan();
      $('#status').textContent='Plan edited · open Scenarios';
      return;
    }
    const i=+inp.closest('.g-card').dataset.i, f=inp.dataset.f, type=inp.dataset.type;
    let val;
    if(type==='money')    val=Math.round(parseFloat(String(inp.value).replace(/[^0-9.]/g,''))||0);
    else if(type==='num') val=parseInt(inp.value,10)||0;
    else                  val=inp.value;
    if(plan.goals[i]){ plan.goals[i][f]=val; if(inp.dataset.sync) plan.goals[i][inp.dataset.sync]=val; }
    refreshHero();
    reseedScenarios(); buildLevers(); sharedPaths=null; plansDirty=true; savePlan();
    $('#status').textContent='Plan edited · open Scenarios';
  });

  // ── Drag / snap / swap (skip when the pointer lands on an editable control) ──
  let active=null,offX=0,offY=0,downX=0,downY=0,moved=false;
  // Drop by REGION, not a radius: if the card's centre sits on the ladder side of
  // the midline between the two columns, it lands in the nearest slot by height
  // (so a near-miss still ranks, never bounces); on the tray side it un-ranks.
  // Pinned foundation slots are never a target (they can't be displaced).
  const dropTarget=(cx,cy)=>{
    const open=slots.filter(s=>!(s.card&&s.card.pinned));
    if(mobBoard){                                         // stacked: judge by Y
      if(cy >= trayTop-8) return null;                   // below ladder → unplaced
      let best=open[0],bd=1e9;
      open.forEach(s=>{ const d=Math.abs(cy-(s.y+CH/2)); if(d<bd){bd=d;best=s;} });
      return best;
    }
    if(cx >= (ladderX+CW + trayX)/2) return null;        // tray side → unplaced
    let best=open[0],bd=1e9;                              // ladder side → nearest by Y
    open.forEach(s=>{ const d=Math.abs(cy-(s.y+CH/2)); if(d<bd){bd=d;best=s;} });
    return best;
  };
  const moveTo=(c,x,y)=>{ c.el.style.transition=SNAP; c.el.style.left=x+'px'; c.el.style.top=y+'px'; };
  const fillSlot=(c,s,flash)=>{ s.card=c; c.slot=s; s.el.classList.add('filled'); if(flash){ s.el.classList.add('flash'); setTimeout(()=>s.el.classList.remove('flash'),520); } };
  board.addEventListener('pointerdown',e=>{
    if(e.target.closest('input,button,select')) return;   // let edits/delete work
    const el=e.target.closest('.g-card'); if(!el) return;
    if(el._c.pinned) return;                               // foundation: pinned, not draggable
    active=el._c; active.fromSlot=active.slot; downX=e.clientX; downY=e.clientY; moved=false;
    el.style.transition='box-shadow .16s,transform .12s'; el.setPointerCapture(e.pointerId);
    offX=e.clientX-el.offsetLeft; offY=e.clientY-el.offsetTop;
    if(active.slot){ active.slot.card=null; active.slot.el.classList.remove('filled'); active.slot=null; }
  });
  board.addEventListener('pointermove',e=>{
    if(!active) return;
    if(!moved && Math.abs(e.clientX-downX)+Math.abs(e.clientY-downY)>6){ moved=true; active.el.classList.add('drag'); }
    if(!moved) return;                                     // a click, not a drag — leave the card put
    const W=board.clientWidth,H=board.clientHeight;
    const nx=Math.max(8,Math.min(e.clientX-offX,W-CW-8)), ny=Math.max(8,Math.min(e.clientY-offY,H-CH-8));
    active.el.style.left=nx+'px'; active.el.style.top=ny+'px';
    const hit=dropTarget(nx+CW/2,ny+CH/2);
    slots.forEach(s=>s.el.classList.toggle('hot',s===hit));
  });
  board.addEventListener('pointerup',()=>{
    if(!active) return;
    const a=active,el=a.el;
    if(!moved){
      // CLICK (no drag): toggle placement. A ranked card returns to the tray; a
      // tray card drops into the next open slot (pinned slots are skipped).
      if(a.fromSlot){ moveTo(a,a.homeX,a.homeY); a.slot=null; }
      else { const s=slots.find(s=>!s.card); if(s){ moveTo(a,s.x,s.y); fillSlot(a,s,true); } else { moveTo(a,a.homeX,a.homeY); a.slot=null; } }
      slots.forEach(s=>s.el.classList.remove('hot')); active=null; saveRank(); return;
    }
    const cx=el.offsetLeft+CW/2,cy=el.offsetTop+CH/2;
    const hit=dropTarget(cx,cy);
    if(hit){
      if(hit.card){ const other=hit.card;
        if(a.fromSlot){ moveTo(other,a.fromSlot.x,a.fromSlot.y); fillSlot(other,a.fromSlot,false); }
        else          { moveTo(other,other.homeX,other.homeY); other.slot=null; }
      }
      moveTo(a,hit.x,hit.y); fillSlot(a,hit,true);
    }else{
      // Dropped clear of every slot → return it to the tray (un-rank it). The
      // slot it came from was already cleared on pointerdown, so this both
      // re-homes the card and frees its old slot.
      moveTo(a,a.homeX,a.homeY); a.slot=null;
    }
    el.classList.remove('drag'); slots.forEach(s=>s.el.classList.remove('hot')); active=null;
    saveRank();
  });
}

/* ── Sub-page render + wiring ─────────────────────────────────────
   One renderInputs() drives whichever sub-page is active. Re-renders on
   sub-nav click, on field change, and on row delete — same wiring pattern
   as before so live-commas / scenario re-seeding / plansDirty all still
   work without per-layout duplication. */
function renderInputs(){
  // sub-nav active state
  $$('#np-subnav .stab').forEach(b => b.classList.toggle('on', b.dataset.sub===activeSub));
  // Drop any prior board resize-observer before the shell is replaced.
  if(window.__gObs){ window.__gObs.disconnect(); window.__gObs=null; }
  const layout = SUB_PAGES[activeSub].layout;
  const np = $('#np-content');
  np.classList.toggle('g-mode', layout==='board');
  // Snapshot is its own diagnostic page again — embedding it on the Net Worth
  // page made that page too busy to read.
  const html = layout==='statement' ? renderStatement()
             : layout==='snapshot'  ? `<div class="np-snapshot-page">${renderSnapshot()}</div>`
             : layout==='board'     ? renderGoalsBoard()
             :                        renderHybrid(activeSub);
  np.innerHTML = html;
  if(layout==='board') initGoalsBoard();
  // Blinking cursor on the FIRST field the first time the statement page opens
  // (note: once only, so re-renders after an edit never steal focus mid-entry).
  if(layout==='statement' && !window.__stmtAutofocused){
    window.__stmtAutofocused = true;
    setTimeout(()=>{ const f = np.querySelector('input'); if(f){ f.focus(); try{ f.setSelectionRange(0,0); }catch{} } }, 30);
  }
}

$('#np-content').addEventListener('click', e => {
  // Clear household → blank template
  if(e.target.closest('.hh-clear')){ clearHousehold(); return; }
  const saveB=e.target.closest('.hh-save');
  if(saveB){ savePlan(); saveB.textContent='Saved ✓'; $('#status').textContent='Household saved to this browser';
    setTimeout(()=>{ saveB.textContent='Save'; }, 1600); return; }
  const demoB=e.target.closest('.hh-demo');
  if(demoB){
    if(!confirm('Load the Aman & Awoman demo household? This will replace the current household.')) return;
    seedDemoHousehold(); ensureMedicarePreload(plan); savePlan();
    scenarios = demoScenarios(); baseSnapshot = defaultLevers();
    try{ localStorage.removeItem(SCEN_KEY); localStorage.removeItem('parallax.goals.rank'); }catch(e2){}
    // Rebuild the Scenarios lever DOM too — otherwise the columns keep showing the
    // PREVIOUS household's lever values while the cash-flow/inputs show the demo.
    reseedScenarios(); buildLevers(); sharedPaths=null; plansDirty=true;
    renderInputs(); runAll();
    $('#status').textContent='Demo household loaded';
    return;
  }
  // People controls — add/remove spouse, add/remove child.
  const ppl = e.target.closest('[data-ppl]');
  if(ppl){
    const act = ppl.dataset.ppl;
    if(act==='addspouse'){
      plan.household.spouse = { currentAge: Math.max(1, (plan.household.primary.currentAge||50)-2), retirementAge: plan.household.primary.retirementAge };
      if(!plan.income.socialSecurity.spouse) plan.income.socialSecurity.spouse = { pia: 0, claimAge: 67 };
    } else if(act==='rmspouse'){
      plan.household.spouse = null;
      plan.income.socialSecurity.spouse = null;
    } else if(act==='addchild'){
      if(!plan.household.children) plan.household.children = [];
      plan.household.children.push({ name:'', age:0 });
    }
    commitPlanEdit();
    return;
  }
  const kidX = e.target.closest('.kid-x');
  if(kidX){
    const ci = +kidX.dataset.childidx;
    if(plan.household.children) plan.household.children.splice(ci, 1);
    commitPlanEdit();
    return;
  }
  // Row delete (×)
  const rx = e.target.closest('.row-x');
  if(rx){
    const path = rx.dataset.rmpath;
    const ks = path.split('.'); const last = ks.pop();
    let t = plan; for(const k of ks){ if(t==null) return; t=t[k]; }
    // Array rows splice (no holes); object keys delete.
    if(Array.isArray(t)) t.splice(+last, 1);
    else if(t!=null) delete t[last];
    reseedScenarios(); buildLevers();
    sharedPaths = null; plansDirty = true;
    renderInputs();
    $('#status').textContent='Plan edited · open Scenarios';
    return;
  }
  // "+ add …" — push a default row onto the backing array, then re-render.
  const adder = e.target.closest('[data-add]');
  if(adder){
    const kind = adder.dataset.add;
    const k = ROW_KINDS[kind];
    if(k){
      const arr = getPath(plan, k.arr);
      if(Array.isArray(arr)) arr.push(k.mk());
      else setPath(plan, k.arr, [k.mk()]);
      commitPlanEdit();
    }
    return;
  }
  // Account type chip
  const chip = e.target.closest('.acct-chip');
  if(chip){
    acctSel = { label: chip.dataset.label, bucket: chip.dataset.bucket };
    $$('#np-content .acct-chip').forEach(c => c.classList.toggle('sel', c === chip));
    const btn = $('#np-content .acct-add');
    if(btn){ btn.disabled = false; btn.textContent = 'Add ' + acctSel.label; }
    return;
  }
  if(e.target.closest('.acct-add')){
    if(!acctSel) return;
    const amtEl = $('#np-content .acct-amt');
    const bal = parseFloat(String(amtEl ? amtEl.value : '').replace(/[^0-9.]/g, ''));
    if(!isFinite(bal) || bal <= 0){
      if(amtEl){ amtEl.focus(); amtEl.style.outline='2px solid var(--negative)'; setTimeout(()=>amtEl.style.outline='',1500); }
      return;
    }
    if(!plan.portfolio.extraAccounts) plan.portfolio.extraAccounts = [];
    plan.portfolio.extraAccounts.push({ type: acctSel.label, bucket: acctSel.bucket, balance: Math.round(bal) });
    acctSel = null;
    commitPlanEdit();
    return;
  }
  const rm = e.target.closest('.acct-x');
  if(rm){
    // Core bucket: zero the balance (+ its basis) so the row drops off the sheet
    // but the engine bucket survives. Picker-added accounts: splice from the list.
    if(rm.dataset.zeropath){
      setPath(plan, rm.dataset.zeropath, 0);
      if(rm.dataset.zerobasis) setPath(plan, rm.dataset.zerobasis, 0);
      commitPlanEdit();
      return;
    }
    const i = +rm.dataset.acctidx;
    if(plan.portfolio.extraAccounts) plan.portfolio.extraAccounts.splice(i, 1);
    commitPlanEdit();
  }
});

    if(!isFinite(v)) return;

    if(type==='taxpct')v = Math.max(0, Math.min(60, Math.round(v)));
    if(type==='gpct')  v = Math.max(-20, Math.min(20, v))/100;
    if(type==='age')   v = Math.max(1, Math.min(120, Math.round(v)));

    if(type==='monthly'){ v = Math.max(0, Math.round(v*12)); e.target.value = Math.round(v/12).toLocaleString('en-US'); }
    setPath(plan, path, v);

    if(e.target.dataset.sync) setPath(plan, e.target.dataset.sync, v);
