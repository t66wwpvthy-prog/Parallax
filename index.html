<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Parallax V2</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  /* SAGE GLASS — luminous sage ground, sage green glass, copper accent.
     The mock's "light sage" comes from a big bright sage card filling the view;
     Parallax has no such card, so we carry that light into the body ground + lift
     the panels to a translucent sage tint that lets the bright ground through. */
  --bg-deep:#1a3526; --bg:#1e3d2b;
  --surface:rgba(170,210,180,.18); --surface-2:rgba(183,221,195,.13); --surface-3:rgba(160,200,175,.12);
  --rule:rgba(189,205,192,.22); --rule-bright:rgba(189,205,192,.38); --rule-faint:rgba(189,205,192,.12);
  --ink:#F4F6F0; --ink-bright:#FBFCF7; --ink-mute:#BDCDC0; --ink-faint:rgba(244,246,240,.55); --ink-ghost:rgba(244,246,240,.26);
  /* Accent system (refined sage). The historic --gold tokens now carry "Soft
     Desert Clay" / "Muted Warm Bronze" so every existing accent rule re-themes
     in place — NO saturated orange anywhere. Clay is for small emphasis only. */
  --gold:#D9A07E; --gold-bright:#E3B194; --gold-deep:#BFA78F; --gold-glow:rgba(217,160,126,.22);
  --teal:#8cc69e; --teal-bright:#b3ded7; --teal-deep:#6aa882; --teal-glow:rgba(140,198,158,.16);
  --positive:#8ad39e; --positive-bright:#a6e0b8;
  --clay:#D9A07E;
  --negative:#d4706a; --negative-bright:#e08a7a;
  --s1:#D9A07E; --s2:#82daa1; --s3:#b3ded7;
  /* Hero financial values — Muted Champagne (never orange). */
  --champagne:#E5D9C4;
  /* Named aliases from Nathan's spec (point at the same refined roles). */
  --sage-text-primary:#F4F6F0; --sage-text-value:#E5D9C4; --sage-accent-clay:#D9A07E;
  --sage-border-muted:#BDCDC0; --sage-accent-bronze-muted:#BFA78F;
  /* Probability band colors — applied ONLY to ring stroke/arc/dot/%text/glow */
  --sangria:#5E1916; --sangria-rgb:94,25,22;
  --bronze-band:#D8B371; --bronze-band-rgb:216,179,113;
  --deep-green:#7AA76C; --deep-green-rgb:122,167,108;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:'Sora',sans-serif;color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;overflow:hidden}
body{background-color:#1e3d2b;background-image:
  radial-gradient(circle at 54% 20%, rgba(190,230,202,.68), transparent 48%),
  radial-gradient(circle at 80% 38%, rgba(155,200,170,.48), transparent 40%),
  radial-gradient(circle at 20% 75%, rgba(145,190,162,.34), transparent 44%),
  linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px),
  linear-gradient(180deg, rgba(255,255,255,.018) 1px, transparent 1px),
  linear-gradient(135deg,#1a3828 0%,#2a4a38 48%,#1e3d2b 100%);
background-size:auto,auto,auto,64px 64px,64px 64px,auto;}
.wrap{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ─── GLASS LAYER ───────────────────────────────────────────────────
   Every floating panel is frosted glass: translucent sage fill (--surface)
   + backdrop blur so the gradient bleeds through + a faint top inner-rim
   highlight and a soft drop shadow for lift. One rule covers all cards. */
.solve-panel,.acct-picker,.metric,.cf-drawer,.seq-pick,.seq-chart,.seq-print,.prop{
  backdrop-filter:blur(16px) saturate(1.15);
  -webkit-backdrop-filter:blur(16px) saturate(1.15);
  background-image:linear-gradient(155deg,rgba(183,221,195,.10),rgba(183,221,195,0) 52%);
  /* No hard border — the glass edge is a whisper-faint full inset ring + a
     brighter top rim-light, with a soft drop shadow for lift. */
  box-shadow:0 22px 48px -24px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.14), inset 0 0 0 1px rgba(255,255,255,.05);
}

.hdr{display:flex;align-items:center;gap:18px;padding:13px 28px;border-bottom:1px solid var(--rule);background:rgba(28,56,40,.42);backdrop-filter:blur(20px) saturate(1.1);-webkit-backdrop-filter:blur(20px) saturate(1.1);flex:0 0 auto;position:relative;z-index:50}
.wordmark{font-size:15px;font-weight:600;letter-spacing:.30em;text-transform:uppercase;color:var(--ink-bright)}
.hdr-tabs{display:flex;margin-left:24px}
.htab{background:none;border:none;border-bottom:2px solid transparent;color:var(--ink-mute);cursor:pointer;font-family:'Sora';font-size:12px;letter-spacing:.2em;text-transform:uppercase;padding:6px 20px;font-weight:500;transition:color .2s,border-color .2s}
.htab:hover{color:var(--ink)} .htab.on{color:var(--ink-bright);font-weight:600;border-bottom-color:var(--gold)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.status{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute)}
.run-btn{padding:9px 22px;background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#06121a;border:none;border-radius:3px;font-family:'Sora';font-weight:700;font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;cursor:pointer;box-shadow:0 6px 18px -8px rgba(217,160,126,.45)}
.run-btn:active{transform:translateY(1px)} .run-btn:disabled{filter:saturate(.3) brightness(.7);cursor:wait}

.page{flex:1 1 auto;min-height:0;display:none;flex-direction:column;padding:0 28px 22px}
.page.on{display:flex}
.eyebrow{font-size:11.5px;color:var(--ink-mute);letter-spacing:.26em;text-transform:uppercase;font-weight:500;display:flex;align-items:center;gap:12px}
.eyebrow::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--rule-bright),transparent);max-width:320px}

/* SCENARIOS */
.page[data-page="scenarios"]{overflow-y:auto;overflow-x:hidden}
/* Cap the scenarios block so columns don't stretch across a wide monitor.
   ~210px per scenario + the 148px label gutter; centered. */
.scn-scroll,.page[data-page="scenarios"] .cf-toggle,.page[data-page="scenarios"] .cf-drawer{max-width:1180px;width:100%;margin-left:auto;margin-right:auto}
.page[data-page="scenarios"] .eyebrow{position:sticky;top:0;z-index:25;background:rgba(30,61,43,.55);backdrop-filter:blur(18px) saturate(1.1);-webkit-backdrop-filter:blur(18px) saturate(1.1);padding:20px 0 16px}
.scn-band{position:sticky;top:53px;z-index:20;display:grid;grid-template-columns:148px repeat(3,1fr);column-gap:14px}
/* Opaque backdrop behind the WHOLE sticky band (not just a 10px lip) so scrolling
   lever rows can't bleed through the translucent glass column-cards. */
.scn-band::before{content:'';position:absolute;left:0;right:0;top:-10px;bottom:0;background:rgba(30,61,43,.55);backdrop-filter:blur(18px) saturate(1.1);-webkit-backdrop-filter:blur(18px) saturate(1.1);z-index:-1}
.band-cell{padding:14px 14px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;min-height:172px}
/* Each scenario is a floating glass column-card: circle (rounded top) → levers →
   median (rounded bottom). The label gutter stays transparent. Column-gap channels
   let the gradient show between cards so they read as separate, not one welded grid. */
.band-cell:not(.label){background:var(--surface);border-radius:14px 14px 0 0}
.band-cell.label{align-items:flex-start;justify-content:flex-end}
.band-cell.label span{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mute);font-weight:500}
.col-name{font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-bright);font-weight:600;text-align:center;display:flex;align-items:center;justify-content:center;gap:7px}
.col-name.base-tag{color:var(--gold-bright)}
.col-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
/* Inline rename field — looks like the label until focused, then shows it's
   editable. Sized to content via a generous max so longer names fit. */
.col-rename{font-family:'Sora';font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;color:var(--ink-bright);background:transparent;border:none;border-bottom:1px dashed transparent;text-align:center;width:128px;padding:1px 2px;outline:none}
.col-rename:hover{border-bottom-color:var(--rule-bright)}
.col-rename:focus{border-bottom-color:var(--gold)}
.col-x{background:none;border:none;color:var(--ink-faint);font-size:11px;cursor:pointer;padding:0 2px;line-height:1;opacity:0;transition:opacity .15s,color .15s}
.band-cell:hover .col-x{opacity:1}
.col-x:hover{color:var(--negative-bright)}
.add-scen,.solve-btn{margin-top:8px;background:none;border:1px dashed var(--rule-bright);color:var(--ink-mute);font-family:'Sora';font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;padding:5px 10px;border-radius:4px;cursor:pointer;display:block}
.add-scen:hover,.solve-btn:hover{border-color:var(--gold);color:var(--gold)}
/* Solver goal form — full-width card in #solve-panel (NOT the cramped gutter).
   A row of labeled fields + the Find button, each field with room to breathe. */
.sf-form{display:flex;flex-wrap:wrap;align-items:flex-end;gap:22px}
.sf-field{display:flex;flex-direction:column;gap:7px}
.sf-lbl{font-family:'Sora';font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.sf-box-wrap{display:flex;align-items:baseline;gap:4px}
.sf-prefix,.sf-suffix{font-family:'Inter';font-size:17px;font-weight:600;color:var(--ink-mute)}
/* Same idiom as every other input in the app: dashed underline, transparent,
   gold on focus. Just bigger. */
.sf-box{font-family:'Inter';font-size:19px;font-weight:500;color:var(--ink);background:rgba(255,255,255,.05);border:none;border-radius:6px;padding:3px 6px;outline:none;width:64px;text-align:right;-moz-appearance:textfield;transition:background .15s}
.sf-box:focus{background:rgba(196,123,49,.13)}
.sf-box::-webkit-outer-spin-button,.sf-box::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.sf-box:hover{border-bottom-color:var(--gold)}
.sf-box:focus{border-bottom:1px solid var(--gold)}
.sf-money{width:150px}
.sf-go{font-family:'Sora';font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;padding:11px 20px;border-radius:6px;cursor:pointer;border:1px solid var(--gold);background:var(--gold);color:#1a130a;margin-left:auto}
.sf-go:hover{background:var(--gold-bright);border-color:var(--gold-bright)}
/* Per-row loading spinner during a solve. Sits in place of the lever value
   until that row resolves; tiny pulse so it reads as work in progress. */
.lev-val.solving{color:var(--ink-faint);font-style:italic;opacity:.7}
.lev-val.solving::after{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);margin-left:6px;animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
/* When a lever value was set by the solver, mark it subtly so the advisor knows
   it came from a solve (not their drag). Underline in brass; removed on edit. */
.lev-val.solved{color:var(--gold)}
.lev-val.solved-capped{color:var(--negative-bright)}
/* Solver panel (form + solo-answer results) */
.solve-panel{margin:0 0 20px;padding:18px 22px;background:var(--surface);border-radius:14px}
.solve-panel-head{display:flex;align-items:baseline;justify-content:space-between;gap:18px;margin-bottom:14px}
.solve-panel-title{font-family:'Sora';font-size:12.5px;letter-spacing:.02em;color:var(--ink-mute);font-weight:500;line-height:1.5}
.solve-panel-title b{font-family:'Inter';color:var(--ink-bright);font-weight:700}
.solve-clear{font-family:'Sora';font-size:10px;color:var(--ink-faint);background:none;border:none;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:0;white-space:nowrap}
.solve-clear:hover{color:var(--negative)}
.sf-select{font-family:'Inter';font-size:18px;font-weight:500;color:var(--ink);background:transparent;border:none;padding:2px 18px 2px 3px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--ink-mute) 50%),linear-gradient(135deg,var(--ink-mute) 50%,transparent 50%);background-position:calc(100% - 9px) 11px,calc(100% - 4px) 11px;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
.sf-select:hover,.sf-select:focus{border-bottom-color:var(--gold)}
.sf-hint{font-family:'Sora';font-size:12px;color:var(--ink-faint);font-style:italic;padding-bottom:3px}
.sf-params{display:contents}
/* Solo-answer rows: one lever per row — name · was→needs · reached% · load */
.solo-list{display:flex;flex-direction:column}
.solo-row{display:grid;grid-template-columns:140px 1fr 150px 64px;align-items:center;gap:18px;padding:13px 0;border-top:1px solid var(--rule-faint)}
.solo-row:first-child{border-top:none}
.solo-name{font-family:'Sora';font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);font-weight:600}
.solo-move{display:flex;align-items:baseline;gap:10px;font-family:'Inter';font-variant-numeric:tabular-nums}
.solo-from{font-size:14px;color:var(--ink-faint)}
.solo-arrow{color:var(--ink-faint);font-size:13px}
.solo-to{font-size:18px;font-weight:700;color:var(--ink-bright)}
.solo-delta{font-family:'Sora';font-size:11px;font-weight:600;color:var(--gold-bright);letter-spacing:.02em}
.solo-row.unchanged .solo-delta{color:var(--positive)}
.solo-pct{font-family:'Sora';font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--positive)}
.solo-pct.capped{color:var(--negative)}
.solo-row.capped .solo-to{color:var(--ink-mute)}
.solve-load{font-family:'Sora';font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:6px 0;border-radius:4px;cursor:pointer;background:none;border:1px solid var(--rule-bright);color:var(--ink-faint)}
.solve-load:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.solve-load:disabled{opacity:.3;cursor:default}
.solo-allcapped{margin-top:14px;font-family:'Sora';font-size:12px;color:var(--negative);font-weight:600;letter-spacing:.02em}
.solve-searching,.solve-empty{font-family:'Sora';font-size:12px;color:var(--ink-mute);font-weight:500}
.solve-searching::after{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);margin-left:8px;animation:pulse 1.1s infinite}
/* ── Combo solver: the small solo widget folds DOWN into this bigger field.
   Same engine, same markets — the % on each card is the real Monte Carlo for
   that exact lever set. The cards are the gentlest PAIRS that clear the goal. */
.fold-cta{display:flex;justify-content:center;margin:0}
.fold-tab{margin-top:-1px;background:var(--surface-3);border:1px solid var(--rule-faint);border-top:none;border-radius:0 0 12px 12px;padding:7px 22px;font-family:'Sora';font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--gold);cursor:pointer;display:flex;align-items:center;gap:8px}
.fold-tab:hover{color:var(--gold-bright);border-color:var(--rule)}
.combo-field{margin:14px 0 20px;padding:22px 24px;border-radius:16px;background:linear-gradient(180deg,rgba(60,44,28,.5),rgba(36,26,17,.5));backdrop-filter:blur(20px);box-shadow:inset 0 1px 0 var(--rule-faint),inset 0 0 0 1px var(--rule-faint),0 24px 50px -34px #000}
.combo-head{font-family:'Sora';font-size:14px;color:var(--ink-bright);font-weight:600;margin-bottom:3px}
.combo-sub{font-size:12px;color:var(--ink-faint);margin-bottom:18px}
.combo-sub b{color:var(--gold);font-family:'Inter';font-weight:700}
.combo-card{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:20px;padding:15px 18px;margin-bottom:11px;border-radius:13px;background:var(--surface);box-shadow:inset 0 0 0 1px var(--rule-faint)}
.combo-card:last-child{margin-bottom:0}
.combo-card.lead{box-shadow:inset 0 0 0 1px rgba(190,140,70,.22)}
.cc-moves{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.cpill{display:inline-flex;align-items:baseline;gap:7px;padding:7px 12px;border-radius:9px;font-family:'Inter';white-space:nowrap}
.cpill .pk{font-family:'Sora';font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;opacity:.7}
.cpill .pv{font-size:15px;font-weight:700}
.cpill.pin{background:rgba(255,255,255,.04);color:var(--ink-mute)}
.cpill.pin .pk{color:var(--ink-faint)}
.cpill.move{background:rgba(190,140,70,.10);color:var(--gold)}
.cpill.move .pk{color:var(--gold-deep)}
.cpill.cut{background:rgba(190,130,116,.10);color:#BE8475}
.cpill.cut .pk{color:#A86F62}
.cc-plus{color:var(--ink-faint);font-size:15px;font-weight:300}
.cc-conf{text-align:right;font-family:'Inter'}
.cc-conf .cv{font-size:23px;font-weight:600;color:var(--positive);line-height:1}
.cc-conf .ck{font-family:'Sora';font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.cc-conf .cd{font-family:'Sora';font-size:10px;font-weight:600;color:var(--positive);opacity:.85;margin-top:2px}
.cc-load{font-family:'Sora';font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:9px 16px;border-radius:7px;cursor:pointer;background:none;border:1px solid var(--rule-faint);color:var(--ink-mute)}
.cc-load:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.cc-load:disabled{opacity:.3;cursor:default}
.combo-foot{margin-top:16px;font-size:11.5px;color:var(--ink-faint);font-style:italic;line-height:1.5}
.combo-empty,.combo-searching{font-family:'Sora';font-size:12.5px;color:var(--ink-mute);font-weight:500;padding:4px 0}
.combo-searching::after{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);margin-left:8px;animation:pulse 1.1s infinite}
.circle-wrap{position:relative;width:118px;height:118px}
.circle-val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.circle-val .big{font-size:28px;font-weight:400;line-height:1;font-family:'Inter';letter-spacing:-.01em}
.circle-val .lbl{font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-mute);margin-top:3px}

.scn-levers{display:grid;grid-template-columns:148px repeat(3,1fr);column-gap:14px}
.lev-name{display:flex;align-items:center;padding:0 14px;min-height:62px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mute);font-weight:500;line-height:1.3}
.lev-cell{display:flex;flex-direction:column;justify-content:center;gap:7px;border-bottom:1px solid var(--rule-faint);padding:0 16px;min-height:62px;background:var(--surface)}
.lev-val{font-family:'Inter';font-size:16.5px;font-weight:500;color:var(--ink-mute);display:flex;align-items:center;gap:6px}
.lev-val.base{color:var(--ink-mute)}
.lev-val .unit{font-size:10px;color:var(--ink-faint);font-weight:500;letter-spacing:.04em}
/* Baseline-delta chip — right-aligned so the deltas form a clean comparison
   column down the right edge of each scenario. Muted/neutral (no good-bad hue). */
.lev-delta{margin-left:auto;font-family:'Sora';font-size:10.5px;font-weight:600;letter-spacing:.02em;color:var(--ink-faint);font-variant-numeric:tabular-nums}
/* Inline pension-amount input: appears when the lever lands on an age that has
   no entered benefit yet. Looks like part of the value display (not an error).
   The "$" prefix sits in the normal value color; the input is borderless and
   inherits the typography so it reads as a natural prompt for a number. */
.lev-val .pen-in{font-family:'Inter';font-size:15px;font-weight:500;color:inherit;background:transparent;border:none;border-radius:5px;width:84px;padding:1px 3px;outline:none;text-align:right;transition:background .15s}
.lev-val .pen-in::placeholder{color:var(--ink-faint);font-weight:500}
/* No spreadsheet underlines — editability shows as a soft glassy fill on
   hover/focus instead, keeping the levers in the glass language. */
.lev-val .pen-in:hover,.lev-val .lev-in:hover{background:rgba(255,255,255,.05)}
.lev-val .pen-in:focus,.lev-val .lev-in:focus{background:rgba(196,123,49,.13)}
/* Inline type-in boxes for the dollar/age levers; width tuned per content. */
.lev-val .lev-in{font-family:'Inter';font-size:16.5px;font-weight:500;color:inherit;background:transparent;border:none;border-radius:5px;width:78px;padding:1px 3px;outline:none;text-align:right;transition:background .15s}
.lev-val .lev-in.age-in{width:34px;text-align:center}
/* "Sell primary to fund" toggle on the Buy Property lever — its own line so it
   doesn't crowd the amount/age boxes. Off = outline chip; on = gold fill. */
.lev-fund{display:block;margin:5px 0 0;font-family:'Sora',sans-serif;font-size:9px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;padding:3px 8px;border-radius:6px;border:1px solid var(--rule-bright);background:transparent;color:var(--ink-faint);cursor:pointer;transition:border-color .15s,color .15s,background .15s}
.lev-fund:hover{border-color:var(--gold-bright);color:var(--gold-bright)}
.lev-fund.on{background:rgba(251,141,38,.18);border-color:transparent;color:var(--gold-bright)}
/* Resting state = clean numbers + deltas (no bar clutter). The slider fades in
   when you hover/focus the cell, so drag-to-explore stays for live demos but the
   grid reads as a comparison table at a glance. Touch (no hover) keeps it shown. */
/* Dollar levers (spend / savings / one-time event): discreet. Hidden at rest so
   the grid reads as clean numbers; a thin neutral line + gold dot fades in only
   when you hover/focus the cell. No always-on fill-bar clutter. */
.lev-slider{-webkit-appearance:none;width:100%;height:12px;background:transparent;cursor:pointer;margin:3px 0;opacity:0;transition:opacity .15s}
.lev-cell:hover .lev-slider,.lev-slider:focus{opacity:1}
.lev-slider::-webkit-slider-runnable-track{height:2px;border-radius:2px;background:var(--rule)}
.lev-slider::-webkit-slider-thumb{-webkit-appearance:none;height:9px;width:9px;border-radius:50%;background:var(--gold);margin-top:-3.5px;border:2px solid var(--surface);box-shadow:0 1px 2px rgba(0,0,0,.15)}
.lev-slider:disabled{opacity:.5;cursor:default}

.lev-step{display:inline-flex;align-items:center;gap:7px;margin-left:auto}
.step-btn{width:20px;height:20px;border-radius:5px;border:1px solid var(--rule-bright);background:var(--surface);color:var(--ink-mute);font-family:'Inter';font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.step-btn:hover{border-color:var(--gold);color:var(--gold)}
.scn-foot{display:grid;grid-template-columns:148px repeat(3,1fr);column-gap:14px}
.foot-cell{padding:12px 14px;font-family:'Inter';font-size:12.5px;color:var(--ink-mute)}
.foot-cell:not(:first-child){background:var(--surface);border-radius:0 0 14px 14px}
.foot-cell b{color:var(--ink);font-weight:500}

/* Goals section on the Scenarios tab — a read-only mirror of the base-plan
   goals. Same 148px + N-column grid as the levers so rows stay registered.
   Quiet (no inputs, no sliders): it's a reflection of the plan, not a lever. */
.scn-goals{display:grid;grid-template-columns:148px repeat(3,1fr);column-gap:14px}
.sg-head{display:flex;align-items:center;padding:14px 14px 8px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600}
.sg-head.sg-col{background:var(--surface)}
.sg-name{display:flex;flex-direction:column;justify-content:center;padding:0 14px;min-height:46px;font-size:12px;color:var(--ink-mute);line-height:1.25}
.sg-name .sg-win{font-size:10px;letter-spacing:.04em;color:var(--ink-faint);margin-top:2px}
.sg-cell{display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--rule-faint);padding:0 16px;min-height:46px;background:var(--surface);font-family:'Inter';font-size:15px;font-weight:500;color:var(--ink-mute)}
.sg-cell .sg-tag{font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);font-weight:500}
.sg-total{display:flex;align-items:center;padding:0 14px;min-height:42px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:500}
.sg-tcell{display:flex;align-items:center;gap:6px;padding:0 16px;min-height:42px;background:var(--surface);font-family:'Inter';font-size:13.5px;font-weight:500;color:var(--ink)}
.sg-empty{grid-column:1 / -1;padding:10px 14px;font-size:11.5px;color:var(--ink-faint);font-style:italic}

/* Shared chart chrome (used by the Sequencing chart). */
.chart-head{display:flex;align-items:baseline;gap:16px;margin-bottom:6px;flex:0 0 auto}
.chart-title{font-size:15px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-bright);font-weight:600}
.chart-sub{font-size:11px;color:var(--ink-mute);letter-spacing:.06em;text-transform:uppercase}
.lg{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-mute);letter-spacing:.04em}
.lg .sw{width:16px;height:3px;border-radius:2px}
.chart-body{flex:1 1 auto;min-height:0;position:relative}
.chart-body svg{width:100%;height:100%;display:block}

/* SEQUENCING */
.page[data-page="sequencing"]{padding-top:20px;overflow-y:auto}
.seq-bar{flex:0 0 auto;display:flex;align-items:center;gap:14px;margin:14px 0}
.seq-pick{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:10px;padding:8px 14px}
.seq-pick .k{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);font-weight:500}
.seq-pick select{background:var(--surface-2);border:1px solid var(--rule-bright);color:var(--ink-bright);font-family:'Sora';font-size:12px;font-weight:500;letter-spacing:.04em;padding:6px 30px 6px 12px;border-radius:3px;outline:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0 L5 6 L10 0' fill='%239aa6b9'/></svg>");background-repeat:no-repeat;background-position:right 11px center;cursor:pointer}
.seq-legend{margin-left:auto;display:flex;gap:16px;flex-wrap:wrap}
.seq-legend .lg{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-mute);font-family:'Sora';letter-spacing:.03em}
.seq-legend .sw{display:inline-block;width:22px;border-top:3px solid;border-radius:2px}
.seq-legend .sw.dash{border-top-style:dashed}
.seq-chips{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-left:6px}
.seq-chip{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--rule);color:var(--ink-mute);font-family:'Sora';font-size:11px;letter-spacing:.03em;padding:6px 11px;border-radius:14px;cursor:pointer;transition:opacity .12s,border-color .12s;opacity:.45}
.seq-chip .cdot{width:9px;height:9px;border-radius:50%;flex:none}
.seq-chip.on{opacity:1;border-color:var(--rule-bright);color:var(--ink-bright)}
.seq-chip:hover{opacity:.85}
.seq-chart{flex:0 0 auto;border-radius:16px;background:var(--surface);padding:16px 22px 12px;display:flex;flex-direction:column}
.seq-chart .chart-body{flex:1 1 auto;min-height:300px}
/* Two path FINGERPRINTS, side by side: forward vs reversed. Each line is a
   direct read of the engine's single-path result — no UI-computed metrics. */
.seq-prints{flex:0 0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;margin-top:16px}
.seq-print{border-radius:12px;background:var(--surface);padding:13px 15px 6px}
.seq-print h4{display:flex;align-items:center;gap:9px;margin:0 0 8px;font-family:'Sora';font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;color:var(--ink-bright)}
.seq-print h4 .dot{display:inline-block;width:20px;border-top:3px solid;border-radius:2px}
.seq-print h4 .dot.dash{border-top-style:dashed}
.seq-print .pr-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--rule-faint);font-size:13px}
.seq-print .pr-row:last-child{border-bottom:none}
.seq-print .pr-k{color:var(--ink-mute);font-family:'Sora'}
.seq-print .pr-v{font-family:'Inter';font-weight:600;color:var(--ink-bright);font-variant-numeric:tabular-nums}
/* Damage window: how LONG the bad stretch lasts (short shock vs long grind). */
.seq-print .dw-bar{height:4px;border-radius:3px;background:var(--rule-faint);margin:5px 0 9px;overflow:hidden}
.seq-print .dw-fill{height:100%;border-radius:3px;min-width:2px}
/* Net Worth — the household sheet, split into four sub-pages by a sub-nav
   beneath the main tabs. Balance Sheet uses the STATEMENT layout (leader-dotted
   rows under thin-gold section heads, like a printed financial statement).
   Inflows / Outflows / Goals use the HYBRID layout: a left-gutter identity
   block (title + description + running total) and a two-column facing body
   split by a single vertical hairline. One visual family across the four. */
.page[data-page="net-worth"]{padding-top:24px;overflow-y:auto}

/* Sub-nav under the main tabs. NET WORTH sits left, bold and offset, separated
   from the four sub-tabs by a fine vertical rule. Same gold-underline language
   as the main tabs but smaller and quieter — the sub-nav is subordinate. */
.subnav{display:flex;align-items:stretch;border-bottom:1px solid var(--rule);margin:-6px 0 28px;max-width:1100px}
.subnav-title{font-family:'Sora';font-size:14px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-bright);font-weight:700;padding:14px 32px 14px 0;display:flex;align-items:center;border-right:1px solid var(--rule-bright);margin-right:28px}
.stab{background:none;border:none;border-bottom:1px solid transparent;color:var(--ink-faint);font-family:'Sora';font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;padding:14px 4px 13px 0;margin-right:30px;font-weight:500;cursor:pointer;margin-bottom:-1px;transition:color .15s,border-color .15s}
.stab:hover{color:var(--ink-mute)}
.stab.on{color:var(--ink-bright);font-weight:600;border-bottom-color:var(--gold)}

/* ─── Net Worth page wrapper (shared by all four sub-pages) ───────
   200px left gutter carries the page's summary (big number, breakdowns,
   live totals) — the eye lands in the same place every time. Body to the
   right holds the Statement ledger or the two-column Hybrid body. */
.np-page{display:grid;grid-template-columns:200px 1fr;gap:20px 54px;max-width:1100px;align-items:start}
/* Balance sheet is the widest page (gutter + two ledgers): give it more width so
   Assets and Liabilities breathe and the account setup is easy to follow. */
.np-page.np-bal{grid-template-columns:220px 1fr;max-width:1340px}
.np-bal .bs-sheet{gap:0 72px}
.np-bal .bs-col{padding:0 8px}
/* Snapshot is its own diagnostic page: the four gauges read as ONE compact glass
   panel — hairline-separated rows, smaller heroes, slim bars — not four forced
   boxes. Constrained width so it reads as a focused report card, not a sprawl. */
.np-snapshot-page{padding-top:4px}
.np-snapshot-page .snap{display:flex;flex-direction:column;gap:0;max-width:560px;
  background:var(--surface);border-radius:14px;padding:2px 24px;
  backdrop-filter:blur(16px) saturate(1.15);-webkit-backdrop-filter:blur(16px) saturate(1.15);
  background-image:linear-gradient(155deg,rgba(183,221,195,.10),rgba(183,221,195,0) 52%);
  box-shadow:0 22px 48px -24px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.14),inset 0 0 0 1px rgba(255,255,255,.05)}
.np-snapshot-page .metric{background:none;background-image:none;backdrop-filter:none;-webkit-backdrop-filter:none;
  box-shadow:none;border-radius:0;padding:16px 0;gap:8px;border-top:1px solid var(--rule-faint)}
.np-snapshot-page .metric:first-child{border-top:none}
.np-snapshot-page .m-hero{font-size:28px}
.np-snapshot-page .m-eye{margin-bottom:5px}
.np-snapshot-page .m-sub{font-size:11.5px;margin-top:5px;line-height:1.4}
.np-snapshot-page .stat-row{gap:6px 18px;margin-top:8px}
.np-snapshot-page .stat-val{font-size:13.5px}
.np-snapshot-page .stat-lbl{font-size:9px}
.np-snapshot-page .cov,.np-snapshot-page .seg{height:28px}
.np-snapshot-page .cov .fill{font-size:10px}
.np-snapshot-page .cov-legend,.np-snapshot-page .seg-legend{font-size:10px;margin-top:6px}
.np-gutter{position:sticky;top:0}
.np-gutter .lbl{font-family:'Sora';font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:4px}
.np-gutter .big-num{font-family:'Inter';font-size:30px;line-height:1.05;font-weight:600;color:var(--champagne);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.np-gutter .big-num.teal{color:var(--champagne)}
.np-gutter .big-sub{font-family:'Sora';font-size:11px;color:var(--ink-mute);margin-top:5px;font-weight:500;line-height:1.4}
.np-gutter .gut-rule{border:none;border-top:1px solid var(--rule-faint);margin:20px 0 14px}
.np-gutter .row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;font-size:12.5px;color:var(--ink-mute);font-family:'Sora';font-weight:500}
.np-gutter .row b{font-family:'Inter';font-weight:500;color:var(--ink);font-variant-numeric:tabular-nums}

/* ─── Statement layout (Balance Sheet body) ────────────────────────
   Each section is a small caps header with a gold underline; rows are
   "label … dotted leader … value", values are boxless inputs that go gold
   on focus (same edit language as the Scenarios levers). Subtotals close
   each money section in slate, the statement's running truth. */
/* Two-column ledger: Assets left | Liabilities right */
.bs-sheet{display:grid;grid-template-columns:1fr 1px 1fr;gap:0 36px;max-width:none}
.bs-col{min-width:0}
.bs-divider{background:var(--rule-faint);align-self:stretch}
/* Column title ("Assets" / "Liabilities") */
.bs-title{font-family:'Sora';font-size:17px;font-weight:500;color:var(--ink);letter-spacing:-.01em;margin:0 0 4px}
.bs-head{font-family:'Sora';font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-mute);font-weight:600;margin:26px 0 8px;padding-bottom:8px;border-bottom:1px solid var(--gold)}
.bs-head:first-of-type{margin-top:16px}
/* Household stat bar — a connected full-width header band (bottom hairline) so it
   grounds the page instead of floating; tight vertical rhythm. */
.hh-bar{grid-column:1 / -1;display:flex;align-items:stretch;border-bottom:1px solid var(--rule-faint);padding-bottom:6px;margin-bottom:2px}
.hh-f{display:flex;flex-direction:column;gap:2px;padding:2px 30px 6px 0;margin-right:30px;border-right:1px solid var(--rule-faint)}
.hh-f:last-child{border-right:none;padding-right:0;margin-right:0}
.hh-f label{font-family:'Sora';font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.hh-f .field{display:flex;align-items:baseline;gap:3px}
.hh-f .pre{color:var(--ink-faint);font-size:13px;font-family:'Inter'}
.hh-f input{font-family:'Inter';font-size:16px;font-weight:500;color:var(--ink);background:transparent;border:none;border-bottom:1px dashed transparent;padding:1px;width:90px;text-align:left;outline:none;font-variant-numeric:tabular-nums;transition:border-color .15s,background .15s}
.hh-f input:hover{border-bottom-color:var(--rule-bright)}
.hh-f input:focus{border-bottom:1px solid var(--gold);background:rgba(154,115,34,.05)}
.bs-row{display:flex;align-items:baseline;padding:7px 0;font-size:14px}
.bs-row label{color:var(--ink-mute);font-weight:500;font-family:'Sora'}
.bs-row.sub label{color:var(--ink-faint);font-size:13px;padding-left:18px;font-weight:400}
.bs-dots{flex:1;border-bottom:1px dotted var(--rule-faint);margin:0 10px;transform:translateY(-3px)}
.bs-row .field{display:flex;align-items:baseline;gap:3px}
.bs-row .pre{color:var(--ink-faint);font-size:13px;font-family:'Inter'}
.bs-row input{font-family:'Inter';font-size:14.5px;font-weight:500;color:var(--ink);background:transparent;border:none;border-bottom:1px dashed var(--rule-faint);padding:1px 1px;width:110px;text-align:right;outline:none;font-variant-numeric:tabular-nums;transition:border-color .15s,background .15s}
.bs-row input:hover{border-bottom-color:var(--gold)}
.bs-row input:focus{border-bottom:1px solid var(--gold);background:rgba(154,115,34,.05)}
.bs-row select{font-family:'Sora';font-size:13.5px;font-weight:500;color:var(--ink);background:transparent;border:none;border-bottom:1px dashed var(--rule-faint);padding:1px 18px 1px 1px;outline:none;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0 L5 6 L10 0' fill='%238a93a0'/></svg>");background-repeat:no-repeat;background-position:right 2px center}
.bs-row select:hover,.bs-row select:focus{border-bottom-color:var(--gold)}
.bs-row.sub input{font-size:13px;font-weight:400;color:var(--ink-mute);width:90px}
.bs-sub{display:flex;align-items:baseline;padding:10px 0 4px;border-top:1px solid var(--rule-faint);margin-top:6px}
.bs-sub-l{font-family:'Sora';font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.bs-sub-d{flex:1;border-bottom:1px dotted var(--rule-faint);margin:0 10px;transform:translateY(-3px)}
.bs-sub-v{font-family:'Inter';font-size:14px;color:var(--teal-deep);font-weight:600;font-variant-numeric:tabular-nums}
.bs-add{padding:12px 0 4px;font-size:12.5px;color:var(--gold);font-weight:500;font-style:italic;cursor:pointer}
.bs-row .row-x{margin-left:8px;width:20px;height:20px;border:none;background:transparent;color:var(--ink-faint);font-size:16px;line-height:1;cursor:pointer;border-radius:4px;padding:0}
/* Typed-account picker (Option A — bucket rows) + added-account rows + tags */
.bs-row .acct-tag{font-family:'Sora';font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;padding:2px 6px;border-radius:20px;margin-left:9px}
.acct-tag.traditional{color:var(--teal-deep);background:rgba(63,107,120,.10)}
.acct-tag.roth{color:#6aa882;background:rgba(106,168,130,.12)}
.acct-tag.taxable{color:var(--gold-deep);background:rgba(154,115,34,.10)}
.acct-picker{margin:12px 0 4px;background:var(--surface);border-radius:14px;padding:14px 16px}
.acct-picker h5{font-family:'Sora';font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);font-weight:600;margin-bottom:11px}
.acct-brow{display:flex;align-items:flex-start;gap:14px;padding:5px 0;border-bottom:1px solid var(--rule-faint)}
.acct-brow:last-of-type{border-bottom:none}
.acct-blabel{width:60px;font-family:'Sora';font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;padding-top:6px;flex:none}
.acct-blabel.traditional{color:var(--teal-deep)} .acct-blabel.roth{color:#6aa882} .acct-blabel.taxable{color:var(--gold-deep)}
.acct-chips{display:flex;flex-wrap:wrap;gap:6px}
.acct-chip{border:1px solid var(--rule-faint);border-radius:8px;padding:4px 9px;font-family:'Sora';font-size:11.5px;background:var(--surface-2);cursor:pointer;color:var(--ink)}
.acct-chip:hover{border-color:var(--gold-bright)}
.acct-chip.sel{border-color:var(--gold);background:rgba(154,115,34,.12);font-weight:600;color:var(--gold-deep)}
.acct-foot{display:flex;align-items:flex-end;gap:11px;margin-top:11px;padding-top:11px;border-top:1px solid var(--rule-faint)}
.acct-foot .lbl{font-size:10.5px;color:var(--ink-faint);display:block;margin-bottom:4px}
.acct-amt{font-family:'Inter';font-size:14px;font-weight:500;color:var(--ink);background:var(--surface-2);border:1px solid var(--rule-faint);border-radius:7px;padding:7px 10px;width:130px;text-align:right;outline:none}
.acct-amt:focus{border-color:var(--gold)}
.acct-add{font-family:'Sora';font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:8px 15px;border-radius:7px;border:none;background:var(--gold);color:#1a130a;cursor:pointer;margin-left:auto}
.acct-add:disabled{opacity:.45;cursor:default}
.bs-row .acct-x{margin-left:8px;width:20px;height:20px;border:none;background:transparent;color:var(--ink-faint);font-size:16px;line-height:1;cursor:pointer;border-radius:4px;padding:0}
.bs-row .acct-x:hover{color:var(--negative-bright)}
.bs-row .row-x:hover{color:var(--negative-bright);background:rgba(240,145,141,.08)}

/* ─── Hybrid body (Inflows / Outflows / Goals) ─────────────────────
   Two facing columns split by a single vertical hairline. The gutter
   (containing the page summary + column subtotals) is the shared np-gutter
   one level up. */
.hp-body{display:grid;grid-template-columns:1fr 1px 1fr;gap:0 36px}
.hp-rule{background:var(--rule-bright);width:1px;align-self:stretch}
.hp-col h4{font-family:'Sora';font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-mute);font-weight:600;margin-bottom:18px;padding-bottom:8px;border-bottom:1px solid var(--rule-faint)}
.hp-item{padding:11px 0;border-bottom:1px solid var(--rule-faint)}
.hp-item:last-of-type{border-bottom:none}
.hp-item .ti{display:flex;align-items:baseline;justify-content:space-between;gap:14px}
.hp-item .nm{font-size:14px;color:var(--ink-bright);font-weight:500;flex:1;font-family:'Sora'}
.hp-item .field{display:flex;align-items:baseline;gap:3px}
.hp-item .pre{color:var(--ink-faint);font-size:13px;font-family:'Inter'}
.hp-item input{font-family:'Inter';font-size:14.5px;font-weight:500;color:var(--ink);background:transparent;border:none;border-bottom:1px dashed var(--rule-faint);padding:1px 1px;width:96px;text-align:right;outline:none;font-variant-numeric:tabular-nums;transition:border-color .15s,background .15s}
.hp-item input:hover{border-bottom-color:var(--gold)}
.hp-item input:focus{border-bottom:1px solid var(--gold);background:rgba(154,115,34,.05)}
.hp-item .row-x{margin-left:6px;width:18px;height:18px;border:none;background:transparent;color:var(--ink-faint);font-size:15px;line-height:1;cursor:pointer;border-radius:4px;padding:0}
.hp-item .row-x:hover{color:var(--negative-bright);background:rgba(240,145,141,.08)}
.hp-item .meta{margin-top:3px;font-size:11.5px;color:var(--ink-mute)}
.hp-item .meta b{color:var(--ink);font-weight:500}
.hp-add{margin-top:14px;font-size:12.5px;color:var(--gold);font-weight:500;font-style:italic;cursor:pointer}

/* ─── Editable add-rows (income / expense / liability / goal) ──────────────
   A quiet ledger row: free-text name on the left, right-aligned amount, then a
   small age window. Boxless, dashed-underline inputs in the same language as
   every other field, so added rows read as data, not widgets. */
.erows{margin-top:6px}
.erow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--rule-faint)}
.erow:last-of-type{border-bottom:none}
.erow input{font-family:'Inter';background:transparent;border:none;border-bottom:1px dashed var(--rule-faint);padding:1px 1px;outline:none;color:var(--ink);transition:border-color .15s,background .15s}
.erow input:hover{border-bottom-color:var(--gold)}
.erow input:focus{border-bottom:1px solid var(--gold);background:rgba(154,115,34,.05)}
.er-name{flex:1 1 auto;min-width:60px;font-size:13.5px;font-weight:500;text-align:left;font-family:'Sora'!important;background:transparent;border:none;border-bottom:1px dashed var(--rule-faint);color:var(--ink);outline:none;padding:1px}
.er-name:hover{border-bottom-color:var(--gold)}
.er-name:focus{border-bottom:1px solid var(--gold);background:rgba(154,115,34,.05)}
.prop-top .er-name{font-size:14px;font-weight:600}
.er-name::placeholder{color:var(--ink-faint);font-style:italic}
.er-amt{display:inline-flex;align-items:baseline;gap:2px;flex:0 0 auto}
.er-amt .pre{color:var(--ink-faint);font-size:13px;font-family:'Inter'}
.er-amt input{width:88px;text-align:right;font-size:14px;font-weight:500;font-variant-numeric:tabular-nums}
.er-ages{flex:0 0 auto;display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--ink-mute);white-space:nowrap}
/* Read-only liability line mirrored from a property's mortgage (no inputs). */
.ro-name{flex:1 1 auto;min-width:0;font-family:'Sora';font-size:13.5px;font-weight:500;color:var(--ink-mute);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ro-amt{flex:0 0 auto;font-family:'Inter';font-size:14px;font-weight:500;color:var(--ink);font-variant-numeric:tabular-nums}
.ro-tag{flex:0 0 auto;font-family:'Sora';font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;border:1px solid var(--rule-faint);border-radius:4px;padding:2px 5px}
.er-num{width:34px;text-align:center;font-size:13px;font-weight:500;color:var(--ink);font-variant-numeric:tabular-nums}
/* Kill the browser's native number spinners — their default bright-white
   inc/dec windows clash with the paper/sage theme. Fields are type-in. */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
.er-dash{color:var(--ink-faint)}
.erow .row-x{flex:0 0 auto;width:18px;height:18px;border:none;background:transparent;color:var(--ink-faint);font-size:15px;line-height:1;cursor:pointer;border-radius:4px;padding:0}
.erow .row-x:hover{color:var(--negative-bright);background:rgba(240,145,141,.08)}
/* Income rows carry a second line (growth + taxable share); wrap so the divider
   sits below the whole pair, not between the two lines. */
.erow-wrap{border-bottom:1px solid var(--rule-faint)}
.erow-wrap:last-of-type{border-bottom:none}
.erow-wrap .erow{border-bottom:none}
.er-extra{display:flex;align-items:center;gap:5px;padding:0 0 8px 2px;font-size:11px;color:var(--ink-mute)}
.er-xk,.er-xs{font-size:11px;color:var(--ink-mute);white-space:nowrap}
.er-xsep{color:var(--ink-faint);margin:0 3px}
.er-extra .er-num{width:32px}
.er-extra .er-gw{width:40px}

/* Property card — name + value/basis + an optional mortgage sub-block. */
.prop{margin:10px 0;padding:14px 16px;border-radius:14px;background:var(--surface)}
.prop-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.prop-name{flex:1 1 auto;background:transparent;border:none;border-bottom:1px dashed var(--rule-faint);font-family:'Sora';font-size:14px;font-weight:600;color:var(--ink);outline:none;padding:1px}
.prop-name:focus{border-bottom:1px solid var(--gold)}
.prop .row-x{width:18px;height:18px;border:none;background:transparent;color:var(--ink-faint);font-size:15px;cursor:pointer;border-radius:4px;padding:0}
.prop .row-x:hover{color:var(--negative-bright);background:rgba(240,145,141,.08)}
.prop-grid,.prop-mort{display:flex;flex-wrap:wrap;align-items:center;gap:6px 18px}
.prop-mort{margin-top:9px;padding-top:9px;border-top:1px solid var(--rule-faint)}
.prop-f{display:inline-flex;align-items:baseline;gap:5px;font-size:11.5px}
.prop-f.narrow input{width:42px}
.prop-f input{font-family:'Inter';background:transparent;border:none;border-bottom:1px dashed var(--rule-faint);outline:none;color:var(--ink);font-size:14px;font-weight:500;width:96px;text-align:right;font-variant-numeric:tabular-nums;padding:1px}
.prop-f input:focus{border-bottom:1px solid var(--gold)}
.prop-f .pre{color:var(--ink-faint);font-size:12px;font-family:'Inter'}
.er-k{font-family:'Sora';font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
.er-sub{font-size:11px;color:var(--ink-mute)}
.er-suf{color:var(--ink-faint);font-size:12px}
.prop-meta{margin-top:9px;font-size:11.5px;color:var(--gold);font-style:italic}

/* ─── Snapshot (the diagnosis) ─────────────────────────────────────
   Not ledger rows — a small set of diagnostic GAUGES, each a relationship
   between numbers the client already entered (income floor, withdrawal rate,
   tax location). The visual tells the truth; no advisor-sentence narration.
   Each metric is a band: name + hero number on the left, the picture right. */
.snap{max-width:1100px;display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:start}
.metric{display:flex;flex-direction:column;gap:20px;padding:26px 28px 30px;border-radius:14px;background:var(--surface)}
.m-eye{font-family:'Sora';font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:10px}
.m-hero{font-family:'Inter';font-size:46px;line-height:1;font-weight:700;color:var(--champagne);letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.m-hero.teal{color:var(--champagne)} .m-hero.gold{color:var(--champagne)} .m-hero.clay{color:var(--champagne)}
.m-sub{font-family:'Sora';font-size:12.5px;color:var(--ink-mute);margin-top:8px;font-weight:500;line-height:1.45}
/* Floating stat rows — labels above Inter numbers, no bar */
.stat-row{display:flex;gap:22px;flex-wrap:wrap;margin-top:2px}
.stat-item{display:flex;flex-direction:column;gap:5px}
.stat-lbl{font-family:'Sora';font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.stat-val{font-family:'Inter';font-size:16px;font-weight:600;color:var(--ink-bright);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
/* coverage bar (income floor): teal fill = guaranteed, hatched = portfolio-drawn */
.cov{height:40px;border-radius:6px;overflow:hidden;display:flex;background:repeating-linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.05) 7px,rgba(255,255,255,.09) 7px,rgba(255,255,255,.09) 14px);box-shadow:inset 0 0 0 1px var(--rule)}
.cov .fill{background:linear-gradient(180deg,#6E8E8A,#52706E);display:flex;align-items:center;padding-left:14px;color:#fff;font-family:'Inter';font-size:13px;font-weight:600;white-space:nowrap;min-width:0;overflow:hidden}
.cov-legend,.seg-legend{display:flex;flex-wrap:wrap;gap:14px 26px;margin-top:14px;font-family:'Sora';font-size:12px;color:var(--ink-mute);font-weight:500}
.cov-legend .k,.seg-legend .k{display:flex;align-items:center;gap:8px}
.cov-legend .sw,.seg-legend .sw{width:11px;height:11px;border-radius:2px;flex:none}
.cov-legend b,.seg-legend b{font-family:'Inter';color:var(--ink-bright);font-weight:600;margin-left:3px}
/* withdrawal rate zone badge — three labeled zones, active one highlighted.
   No linear bar: a bar implies "how close to danger" which is the wrong frame.
   The coloured hero number already carries the meaning; this just names the zone. */
.wr-zones{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--rule-faint)}
.wr-zone{flex:1;padding:9px 0;text-align:center;font-family:'Sora';font-size:10.5px;letter-spacing:.1em;font-weight:700;text-transform:uppercase;color:var(--ink-faint);background:transparent;transition:background .15s}
.wr-zone.active-teal{background:rgba(42,100,72,.55);color:#82daa1}
.wr-zone.active-gold{background:rgba(110,90,60,.45);color:#E5D9C4}
.wr-zone.active-clay{background:rgba(100,45,40,.55);color:#e08a7a}
.g-note{margin-top:30px;font-family:'Sora';font-size:12.5px;color:var(--ink-mute);font-weight:500;line-height:1.5}
.g-note b{font-family:'Inter';color:var(--ink-bright);font-weight:600}
/* segmented proportion bar (tax location) */
.seg{height:40px;border-radius:6px;overflow:hidden;display:flex;box-shadow:inset 0 0 0 1px var(--rule)}
.seg div{display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Inter';font-size:13px;font-weight:600;min-width:0;overflow:hidden}
.seg .s-tax{background:linear-gradient(180deg,#4a7a8a,#345c6a)}
.seg .s-def{background:linear-gradient(180deg,#BFA78F,#8f7a5f)}
.seg .s-roth{background:linear-gradient(180deg,#3d7a5a,#2c5c42)}

/* Year-by-year cash-flow drawer on the Scenarios page. Three scenarios side
   by side; each scenario's columns are softly tinted in its line color so the
   eye groups them without needing dividers. The Age column is sticky so the
   advisor can scroll into late years and still know which row they're reading. */
.cf-toggle{margin:18px 0 12px;display:flex;justify-content:flex-end;flex-shrink:0}
.cf-toggle button{background:transparent;border:1px solid var(--rule);color:var(--ink-mute);font-family:'Sora';font-size:11px;letter-spacing:.16em;text-transform:uppercase;padding:8px 16px;border-radius:5px;cursor:pointer}
.cf-toggle button:hover{color:var(--gold);border-color:var(--gold)}
.cf-drawer{border-radius:14px;background:var(--surface);overflow:hidden;margin-bottom:18px;flex-shrink:0}
.cf-drawer-head{padding:12px 18px;border-bottom:1px solid var(--rule);font-family:'Sora';font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);display:flex;justify-content:space-between;align-items:center}
.cf-drawer-head .sub{color:var(--ink-faint);font-family:'Sora';font-weight:400;letter-spacing:.04em;text-transform:none;font-size:11px}
.cf-scroll{max-height:460px;overflow:auto}
.cf-empty{padding:26px 18px;color:var(--ink-mute);font-family:'Sora';font-size:13px;text-align:center}
.cf-table{width:100%;border-collapse:collapse;font-family:'Inter';font-size:12px;font-variant-numeric:tabular-nums}
.cf-table thead{position:sticky;top:0;background:var(--bg-deep);z-index:5}
.cf-table th,.cf-table td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--rule-faint);white-space:nowrap}
.cf-table th{font-weight:500;color:var(--ink-mute);font-size:10px;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--rule)}
.cf-table th.scen{text-align:center;font-weight:600;letter-spacing:.12em}
.cf-table th.age, .cf-table td.age{position:sticky;left:0;background:var(--surface);text-align:left;color:var(--ink);font-weight:600;z-index:1}
.cf-table thead th.age{background:var(--bg-deep);z-index:6}
.cf-table td.dim{color:var(--ink-faint)}
/* Alternating per-scenario column tint in the cash-flow table — two faint
   washes that cycle regardless of how many scenarios there are. */
.cf-g0{background:rgba(90,160,120,.04)} .cf-g1{background:rgba(196,123,49,.04)}
.cf-table tr.retire td{border-top:1px dashed var(--gold);}
.cf-table tr.retire td.age::after{content:'  retire';color:var(--gold);font-size:10px;font-weight:500;letter-spacing:.1em}

/* ──────────────────────────────────────────────────────────────────────────
   PHONE / TOUCH (iOS-first). The desktop layout is a fixed 100vh, no-scroll,
   multi-column grid — unusable on a phone. Below 760px we: let the whole app
   scroll vertically; stack the header; enlarge sliders and tap targets; and
   keep the three scenario columns column-aligned by letting that block scroll
   horizontally as a unit (band + levers + foot share one min-width so their
   columns stay registered). Charts already scale via SVG viewBox.
   ────────────────────────────────────────────────────────────────────────── */
@media (max-width:760px){
  html,body{overflow:auto;font-size:15px;-webkit-text-size-adjust:100%}
  .wrap{height:auto;min-height:100vh;overflow:visible}

  /* Header wraps; tabs become a scrollable row; Run stays reachable. */
  .hdr{flex-wrap:wrap;gap:10px 14px;padding:12px 16px;position:sticky;top:0;z-index:60}
  .hdr-tabs{margin-left:0;order:3;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .htab{padding:8px 16px;font-size:13px;white-space:nowrap}
  .hdr-right{gap:12px}
  .run-btn{padding:11px 20px;font-size:12px}

  .page{padding:0 14px 28px}
  .page[data-page="scenarios"]{overflow-x:visible}
  .page[data-page="scenarios"] .eyebrow{position:static;padding:16px 0 12px}

  /* Scenario comparison: scroll the band+levers+foot together horizontally so
     the % circles, sliders, and totals stay in the same three columns. */
  .scn-band,.scn-levers,.scn-goals,.scn-foot{min-width:620px}
  .scn-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:4px}
  .scn-band{position:static;box-shadow:none}
  .scn-band::before{display:none}

  /* Bigger touch targets on the sliders; touch has no hover so keep them shown. */
  .lev-slider{height:30px;opacity:1}
  .lev-slider::-webkit-slider-thumb{height:22px;width:22px;margin-top:-10px;border-width:3px}
  .lev-slider::-webkit-slider-runnable-track{height:3px}
  .lev-val{font-size:18px}

  .chart-head{flex-wrap:wrap;gap:6px 14px}

  /* Inputs: single column. */
  .np-page{grid-template-columns:1fr;gap:18px}
  .np-gutter{position:static}
  .hp-body{grid-template-columns:1fr;gap:18px}
  .hp-rule{display:none}
  .snap{grid-template-columns:1fr}
  .metric{gap:14px;padding:20px 18px 22px}
  .subnav{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
  .stab,.subnav-title{white-space:nowrap}
  .subnav-title{border-right:none;padding-right:12px;margin-right:12px}
  .inp-row input,.inp-row select{font-size:16px;width:120px} /* 16px avoids iOS zoom-on-focus */

  /* Sequencing: selector + stats stack. */
  .seq-bar{flex-wrap:wrap}
  .seq-legend{margin-left:0;width:100%;flex-wrap:wrap;gap:10px 16px}
  .seq-chart{min-height:340px}
  .seq-stats{grid-template-columns:repeat(2,1fr)}

  /* Cash-flow drawer scrolls both axes on a phone. */
  .cf-scroll{max-height:none}
  .cf-toggle{justify-content:stretch}
  .cf-toggle button{width:100%}

  /* Goals board on a phone: ladder + tray stack into one scrolling column,
     so the absolute-positioned canvas becomes a simple flow of cards. */
  #np-content.g-mode{min-height:0}
  .g-board{min-height:520px}
}
/* ===== Goals priority board — ghost slots + tray (approved design) =========
   The Goals sub-page is NOT the ledger; it's a prioritisation board. Cards read
   straight from plan.goals (recurring → /yr, one-time → tag). Drag a card onto a
   ghost slot to rank it; it absorbs with a copper flash. Swap, not bounce. The
   board only renders when the Goals sub-tab is active, so the flex-fill rule is
   scoped to #np-content.g-mode and never disturbs the other Net Worth pages. */
#np-content.g-mode{flex:1 1 auto;min-height:0;display:flex;flex-direction:column}
.g-hero{flex:0 0 auto;display:flex;align-items:flex-end;justify-content:space-between;padding:8px 4px 18px;max-width:1240px}
.g-eyebrow{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-mute);font-weight:600}
.g-big{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:56px;font-weight:700;color:var(--gold-bright);line-height:.94;margin-top:9px}
.g-big .g-per{font-family:'Sora',sans-serif;font-size:19px;font-weight:500;color:var(--ink-faint);margin-left:11px}
.g-meta{margin-top:12px;font-size:13.5px;color:var(--ink-faint)}
.g-meta b{color:var(--ink);font-weight:600}
.g-actions{display:flex;flex-direction:column;align-items:flex-end;gap:13px;padding-bottom:4px}
.g-add{display:inline-flex;align-items:center;gap:9px;font-family:'Sora';font-size:13.5px;color:var(--ink);cursor:pointer;padding:11px 21px;border-radius:12px;border:1px dashed rgba(251,141,38,.45);background:rgba(255,255,255,.03);transition:.18s}
.g-add:hover{border-color:var(--gold-bright);color:var(--gold-bright);background:rgba(251,141,38,.08)}
.g-plus{font-size:18px;line-height:1}
.g-legend{display:flex;gap:18px;font-size:12.5px;color:var(--ink-faint)}
.g-legend span{display:inline-flex;align-items:center;gap:7px}
.g-legend i{width:9px;height:9px;border-radius:50%}
.g-legend i.rec{background:var(--teal-bright)} .g-legend i.once{background:var(--gold-bright)}
.g-board{flex:1 1 auto;min-height:0;position:relative;border-radius:18px;overflow:hidden;box-shadow:inset 0 0 0 1px var(--rule-faint);background:linear-gradient(180deg,rgba(255,255,255,.016),transparent 38%)}
.g-board::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;border-radius:inherit;background-image:linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(180deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:64px 64px}
.g-axis{position:absolute;left:14px;top:14px;bottom:14px;width:104px;z-index:1;pointer-events:none}
.g-axis .g-spine{position:absolute;left:30px;top:30px;bottom:30px;width:3px;border-radius:3px;background:linear-gradient(180deg,var(--gold-bright),rgba(196,123,49,.5) 50%,rgba(196,123,49,.08))}
.g-axis .g-cap{position:absolute;left:2px;width:112px;font-size:10px;letter-spacing:.13em;text-transform:uppercase;font-weight:700;line-height:1.35}
.g-axis .top{top:8px;color:var(--gold-bright)} .g-axis .bot{bottom:8px;color:var(--ink-faint)}
.g-traylab{position:absolute;z-index:1;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.g-empty{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:1;text-align:center;color:var(--ink-faint);font-size:13.5px;max-width:320px;line-height:1.5}
.g-slot{position:absolute;z-index:1;border-radius:14px;border:1.5px dashed rgba(230,238,234,.13);background:rgba(255,255,255,.01);transition:border-color .16s,background .16s,box-shadow .16s}
.g-slot .g-rank{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:var(--ink-ghost)}
.g-slot.hot{border-color:rgba(251,141,38,.75);background:rgba(251,141,38,.07);box-shadow:inset 0 0 0 1px rgba(251,141,38,.35),0 0 28px -8px rgba(251,141,38,.5)}
.g-slot.filled{border-color:transparent;background:transparent}
.g-slot.filled .g-rank{opacity:0}
@keyframes absorb{0%{box-shadow:inset 0 0 0 2px rgba(251,141,38,.85),0 0 44px -6px rgba(251,141,38,.7)}100%{box-shadow:none}}
.g-slot.flash{animation:absorb .5s ease-out}
.g-card{position:absolute;z-index:2;cursor:grab;user-select:none;width:410px;height:72px;border-radius:14px;overflow:hidden;display:flex;align-items:center;gap:14px;padding:0 22px 0 28px;background:linear-gradient(152deg,rgba(96,134,108,.42),rgba(54,90,68,.42) 52%,rgba(36,64,48,.48));backdrop-filter:blur(20px) saturate(1.3);-webkit-backdrop-filter:blur(20px) saturate(1.3);box-shadow:inset 0 1px 0 rgba(255,255,255,.32),inset 0 0 0 1px rgba(255,255,255,.10),0 22px 40px -22px rgba(14,30,20,.6);transition:box-shadow .16s,transform .12s}
.g-card>*{position:relative;z-index:2}
.g-card::before{content:'';position:absolute;inset:0;z-index:0;border-radius:inherit;pointer-events:none;background:linear-gradient(133deg,rgba(255,255,255,.2),rgba(255,255,255,.03) 32%,rgba(255,255,255,0) 58%)}
.g-card::after{content:'';position:absolute;left:0;top:13px;bottom:13px;width:3px;z-index:1;border-radius:3px;background:linear-gradient(180deg,var(--gold-bright),rgba(196,123,49,.06))}
.g-card:hover{transform:translateY(-2px);box-shadow:inset 0 1px 0 rgba(255,255,255,.4),inset 0 0 0 1px rgba(255,255,255,.14),0 28px 50px -20px rgba(14,30,20,.7)}
.g-card.drag{cursor:grabbing;z-index:99;transform:scale(1.03);box-shadow:inset 0 1px 0 rgba(255,255,255,.46),inset 0 0 0 1px rgba(251,141,38,.4),0 40px 64px -18px rgba(14,30,20,.75),0 0 42px -12px rgba(251,141,38,.34)}
.g-card.once{background:linear-gradient(152deg,rgba(150,110,60,.36),rgba(96,72,40,.36) 52%,rgba(60,48,30,.44));box-shadow:inset 0 1px 0 rgba(255,228,190,.34),inset 0 0 0 1px rgba(251,141,38,.3),0 22px 40px -22px rgba(40,24,8,.6)}
.g-main{display:flex;flex-direction:column;gap:5px;min-width:0;flex:1 1 auto}
.g-name{font-size:15px;font-weight:500;color:var(--ink-mute);white-space:nowrap;display:flex;align-items:center;gap:9px;min-width:0}
.g-name .g-tag{font-size:9px;letter-spacing:.11em;text-transform:uppercase;font-weight:700;padding:3px 7px;border-radius:6px;background:rgba(251,141,38,.18);color:var(--gold-bright)}
.g-kind{font-size:11px;color:var(--ink-faint);white-space:nowrap}
.g-card.once .g-kind{color:rgba(251,141,38,.85)}
.g-amt{margin-left:auto;flex:0 0 auto;display:flex;align-items:baseline;gap:1px;font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:22px;font-weight:700;color:var(--ink-bright);white-space:nowrap}

<script type="module">
/* ── engine.js inlined for single-file use ── */
/* ============================================================================
   PARALLAX ENGINE  —  the heart of the model. Treat as SACRED.
   Block-bootstrap Monte Carlo on real (inflation-adjusted) returns, 1928–2025.
   Accounts: taxable / traditional / Roth. Accumulation + pension + LTC.
   Path-consistent: all scenarios can share one return-path bundle.

   RULE: Do not "improve" this casually. It is verified. If you change it,
   the tests in engine.test.js must still pass. Terminal wealth is NOT the
   objective — it is only a ranking/sorting device. The engine reports
   success, depletion, balances over time; the UI decides what to show.
   ============================================================================ */

function fundGap(accounts, gap, taxRates, strategy = 'taxable-first'){
  let remainingNeed = gap;
  const breakdown = { taxable: 0, traditional: 0, roth: 0 };
  const taxBySource = { taxable: 0, traditional: 0 };
  let totalTax = 0;

  const workingBal = {
    taxable:     accounts.taxable.balance,
    traditional: accounts.traditional.balance,
    roth:        accounts.roth.balance
  };
  let workingBasis = accounts.taxable.basis;

  const effRateFor = (type) => {
    if(type === 'taxable'){
      const gainPct = workingBal.taxable > 0
        ? Math.max(0, (workingBal.taxable - workingBasis) / workingBal.taxable)
        : 0;
      return gainPct * taxRates.capitalGains;
    }
    if(type === 'traditional') return taxRates.ordinary;
    return 0;
  };

  const drawFrom = (type, netNeeded) => {
    if(workingBal[type] <= 0.01 || netNeeded <= 0.01) return;
    const rate = effRateFor(type);
    const grossNeeded = rate < 0.999 ? netNeeded / (1 - rate) : netNeeded;
    const withdrawn   = Math.min(grossNeeded, workingBal[type]);
    const tax         = withdrawn * rate;
    breakdown[type]  += withdrawn;
    totalTax         += tax;
    if(type === 'taxable' || type === 'traditional') taxBySource[type] += tax;
    workingBal[type] -= withdrawn;
    remainingNeed    -= (withdrawn - tax);
    if(type === 'taxable' && accounts.taxable.balance > 0){
      const basisPortion = workingBasis / accounts.taxable.balance;
      workingBasis = Math.max(0, workingBasis - withdrawn * basisPortion);
    }
  };

  if(strategy === 'proportional'){
    // Draw from all three proportionally to their current balances.
    // Compute each account's share of total, then draw that share of the need.
    // Overflow from depleted accounts falls through to sequential fallback.
    const total = workingBal.taxable + workingBal.traditional + workingBal.roth;
    if(total > 0.01){
      // For proportional we solve: each account nets its share of the gap.
      // Since each account has a different effective rate, we iterate once:
      // target net from each = gap × (balance / total), gross up by that acct's rate.
      const types = ['taxable', 'traditional', 'roth'];
      types.forEach(type => {
        if(workingBal[type] <= 0.01) return;
        const share = gap * (workingBal[type] / total);
        drawFrom(type, share);
      });
    }
    // Proportional may leave a small residual if accounts were insufficient;
    // fall through to taxable-first for any remainder.
    if(remainingNeed > 0.01){
      for(const type of ['taxable', 'traditional', 'roth']){
        if(remainingNeed <= 0.01) break;
        drawFrom(type, remainingNeed);
      }
    }
  } else {
    // Sequential strategies: taxable-first or traditional-first
    const order = strategy === 'traditional-first'
      ? ['traditional', 'taxable', 'roth']
      : ['taxable', 'traditional', 'roth'];
    for(const type of order){
      if(remainingNeed <= 0.01) break;
      drawFrom(type, remainingNeed);
    }
  }

  return {
    totalWithdrawn: breakdown.taxable + breakdown.traditional + breakdown.roth,
    totalTax,
    breakdown,
    taxBySource,
    shortfall: Math.max(0, remainingNeed)
  };
}

function historicalProxyComponents(row, riskProfile){
  const alloc = HISTORICAL_PROXY_ALLOC[riskProfile] || HISTORICAL_PROXY_ALLOC[3];
  const n = HISTORICAL_NOMINAL_RETURNS[row.y];
  if(!n){
    const fallbackReal = weightedAssetReturn(row, RISK_PROFILES[riskProfile || 3].weights);
    return { nominal:null, inflation:null, real:fallbackReal, source:'fallback' };
  }

  const nominal = alloc.stock * n.stock + alloc.bond * n.bond;
  // Derive inflation/deflation from the same nominal S&P series and the file's
  // real U.S. large-cap series. This keeps the bridge internally reconcilable:
  // real = (1 + nominal) / (1 + inflation) - 1.
  const inflation = (row.usLarge != null && (1 + row.usLarge) !== 0)
    ? ((1 + n.stock) / (1 + row.usLarge)) - 1
    : null;
  const real = inflation != null
    ? ((1 + nominal) / (1 + inflation)) - 1
    : ((row.usLarge != null && row.usBonds != null) ? (alloc.stock * row.usLarge + alloc.bond * row.usBonds) : weightedAssetReturn(row, RISK_PROFILES[riskProfile || 3].weights));
  return { nominal, inflation, real, stockNominal:n.stock, bondNominal:n.bond, source:'Damodaran nominal + derived CPI bridge' };
}

/* hoisted module constants the engine depends on */
const LONGRUN_INFLATION = 0.025;

// Social Security claim-age math (modern Full Retirement Age = 67, born 1960+).
// pia = Primary Insurance Amount = the benefit at FRA. The actual benefit is the
// pia adjusted for when you actually file (the real SSA schedule):
//   • file LATE  → delayed retirement credits, +8%/yr, capped at age 70.
//   • file EARLY → permanent reduction: 5/9 of 1% per month for the first 36
//     months before FRA, then 5/12 of 1% per month beyond that. (62 = 30% cut.)
const SS_FRA = 67;
function ssAdjust(pia, claimAge){
  const c = Math.max(62, Math.min(70, claimAge));
  if(c >= SS_FRA) return pia * (1 + 0.08 * (c - SS_FRA));
  const monthsEarly = (SS_FRA - c) * 12;
  const first36 = Math.min(monthsEarly, 36);
  const beyond  = Math.max(0, monthsEarly - 36);
  return pia * (1 - (first36 * (5/900) + beyond * (5/1200)));
}

// ─── Per-asset stats (computed across each asset's available years) ─────
function computeAssetStats(data){
  const out = {};
  ASSET_KEYS.forEach(k => {
    const vals = data.map(r => r[k]).filter(v => v !== null && v !== undefined);
    const n = vals.length;
    if(n === 0){ out[k] = {mean:0, stdev:0, cagr:0, n:0, min:0, max:0}; return; }
    const mean = vals.reduce((a,b)=>a+b,0) / n;
    const variance = vals.reduce((a,b)=>a + Math.pow(b-mean,2),0) / Math.max(n-1,1);
    const cagr = Math.pow(vals.reduce((p,v)=>p*(1+v),1), 1/n) - 1;
    out[k] = {
      mean, stdev: Math.sqrt(variance), cagr, n,
      min: Math.min(...vals), max: Math.max(...vals)
    };
  });
  return out;
}
