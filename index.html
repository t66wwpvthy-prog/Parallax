<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Parallax V2</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<!-- Scenarios redesign type: Spectral (serif numerals/headlines) + Hanken Grotesk (UI). -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Spectral:wght@200;300;400;500&display=swap"/>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20rx='12'%20fill='%231e3d2b'/%3E%3Cpath%20d='M16%2038c8-20%2024-20%2032%200'%20fill='none'%20stroke='%23d9a07e'%20stroke-width='6'%20stroke-linecap='round'/%3E%3Ccircle%20cx='32'%20cy='32'%20r='7'%20fill='%23e5d9c4'/%3E%3C/svg%3E"/>
<!-- ?v= cache-buster: bump on any CSS change so browsers fetch the new file
     instead of serving a stale cached copy (GitHub Pages caches CSS hard). -->
<link rel="stylesheet" href="styles/main.css?v=14"/>
<link rel="stylesheet" href="styles/household.css?v=25"/>
<link rel="stylesheet" href="styles/scenarios.css?v=13"/>
<link rel="stylesheet" href="styles/goals.css?v=6"/>
</head>
<body>
<div class="wrap">
  <header class="hdr">
    <svg class="brand-logo" viewBox="0 0 140 96" role="img" aria-label="Parallax" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="pxRim" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#f6fbff"/>
          <stop offset="0.52" stop-color="#bfd0df"/>
          <stop offset="1" stop-color="#70879a"/>
        </linearGradient>
        <linearGradient id="pxWord" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#f7fbff"/>
          <stop offset="0.46" stop-color="#c6d8e6"/>
          <stop offset="1" stop-color="#7f98ab"/>
        </linearGradient>
        <radialGradient id="pxGlow" cx="0.36" cy="0.45" r="0.72">
          <stop offset="0" stop-color="#f7fbff" stop-opacity="0.42"/>
          <stop offset="0.36" stop-color="#bdd0df" stop-opacity="0.15"/>
          <stop offset="1" stop-color="#07121d" stop-opacity="0.30"/>
        </radialGradient>
        <radialGradient id="pxFlare" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#ffffff"/>
          <stop offset="0.35" stop-color="#dbe9f4" stop-opacity="0.88"/>
          <stop offset="1" stop-color="#8aa3b7" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="pxLine" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#7890a3" stop-opacity="0"/>
          <stop offset="0.38" stop-color="#f9fdff" stop-opacity="0.92"/>
          <stop offset="0.62" stop-color="#c3d5e4" stop-opacity="0.74"/>
          <stop offset="1" stop-color="#7890a3" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <!-- etched brand lockup: offset phase rings, sight-line glint, small rim markers -->
      <circle cx="78" cy="25" r="19.5" fill="url(#pxGlow)" stroke="url(#pxRim)" stroke-width="0.72" opacity="0.72"/>
      <circle cx="71" cy="25" r="20.7" fill="url(#pxGlow)" stroke="url(#pxRim)" stroke-width="0.82" opacity="0.84"/>
      <circle cx="63" cy="25" r="21.8" fill="url(#pxGlow)" stroke="url(#pxRim)" stroke-width="0.92"/>
      <path d="M63 3.2a21.8 21.8 0 0 1 21.3 17.2" fill="none" stroke="#f9fdff" stroke-width="0.7" opacity="0.78" stroke-linecap="round"/>
      <path d="M71 4.3a20.7 20.7 0 0 1 19.7 14.2" fill="none" stroke="#d9e6ef" stroke-width="0.58" opacity="0.56" stroke-linecap="round"/>
      <line x1="13" y1="25" x2="128" y2="25" stroke="url(#pxLine)" stroke-width="0.62" opacity="0.76"/>
      <circle cx="55" cy="25" r="7.6" fill="url(#pxFlare)"/>
      <circle cx="55" cy="25" r="1.45" fill="#ffffff"/>
      <ellipse cx="55" cy="25" rx="16.5" ry="1" fill="url(#pxFlare)" opacity="0.92"/>
      <circle cx="84.5" cy="25" r="0.95" fill="#edf6fc" opacity="0.95"/>
      <circle cx="91" cy="25" r="0.84" fill="#c6d8e6" opacity="0.74"/>
      <circle cx="97.5" cy="25" r="0.74" fill="#8da5b8" opacity="0.56"/>
      <!-- wordmark: wide, etched geometric letterforms to match the reference lockup -->
      <g fill="none" stroke="url(#pxWord)" stroke-width="0.84" stroke-linecap="square" stroke-linejoin="miter" opacity="0.96" transform="translate(6,57.2) scale(0.82)">
        <path d="M0,16 V0 h8.2 c3.6,0 5.7,1.9 5.7,4.9 c0,3.1 -2.1,5 -5.7,5 H0"/>
        <path d="M21.5,16 L27.4,0 L33.3,16"/>
        <path d="M42,16 V0 h8.1 c3.6,0 5.7,1.9 5.7,4.9 c0,3.1 -2.1,5 -5.7,5 H42 M49.2,9.9 L56.1,16"/>
        <path d="M64.1,16 L70,0 L75.9,16"/>
        <path d="M84.4,0 V16 h12.4"/>
        <path d="M105.1,0 V16 h12.4"/>
        <path d="M125.6,16 L131.5,0 L137.4,16"/>
        <path d="M145.8,0 L158,16 M158,0 L145.8,16"/>
      </g>
    </svg>
    <div class="hdr-tabs">
      <button class="htab on" data-page="household">Household</button>
      <button class="htab htab-secondary" data-page="net-worth" data-sub-target="goals">Goals</button>
      <button class="htab" data-page="scenarios">Scenarios</button>
      <button class="htab" data-page="sequencing">Sequencing</button>
    </div>
    <div class="hdr-right">
      <button class="save-btn" id="save-btn" disabled>Saved</button>
      <span class="status" id="status">Ready</span>
      <button class="run-btn" id="run-btn">Run</button>
    </div>
  </header>

  <!-- =====================================================================
       Household ΓÇö the EDITABLE plan-input console (canonical "Folio + Equilibrium"
       design). syncHousehold() renders the Demographics / Net Worth / Cash Flow
       chapters into #hh-view from the live `plan`; every value slot is an inline
       renderField() input and the #hh-view delegate writes edits back to `plan`
       and reseeds/dirties scenarios. One primary glass surface (the Folio app-frame);
       the chapter rail + equilibrium pillars are regions inside it. No logo/orb/global
       header here ΓÇö production already owns those.
       ===================================================================== -->
  <section class="page on" data-page="household">
    <div class="hh-stage">
      <!-- Household controls sit above the card shell (spec: card = stepper + workspace + footer). -->
      <div class="hh-wiz-top">
        <div class="hh-wiz-id">
          <div class="hh-avatars">
            <div class="hh-avatar hh-avatar--c" id="hh-avatar-c" aria-hidden="true">C</div>
            <div class="hh-avatar hh-avatar--s" id="hh-avatar-s" aria-hidden="true">S</div>
          </div>
          <div class="hh-wiz-id__text">
            <div class="hh-wiz-id__eyebrow">Household</div>
            <div class="hh-wiz-id__name" id="hh-rail-name" data-hh-name></div>
            <div class="hh-wiz-id__filing" id="hh-rail-filing" data-hh-filing></div>
          </div>
        </div>
        <div class="hh-menu">
          <button class="hh-menu__btn" id="hh-menu-btn" type="button"
                  aria-haspopup="true" aria-expanded="false" title="Household options">⋯</button>
          <div class="hh-menu__pop" id="hh-menu-pop" hidden>
            <label class="hh-rail__switch-lbl" for="hh-switch">Household</label>
            <select class="hh-rail__switch-sel" id="hh-switch" title="Switch household"></select>
            <button class="hh-rail-act hh-rail-act--new" id="hh-new" type="button" title="Create a new blank household">New Household</button>
            <div class="hh-menu__row">
              <button class="hh-rail-act" id="hh-act-demo" type="button" title="Reset this demo household to its original values">Demo</button>
              <button class="hh-rail-act hh-rail-act--clear" id="hh-act-clear" type="button" title="Clear all plan data and start fresh">Clear</button>
            </div>
          </div>
        </div>
      </div>

      <div class="hh-wizard">

        <!-- Gold progress stepper = the view switch. The view layer toggles
             .is-current / .is-done and renders the matching step into #hh-view. -->
        <nav class="hh-stepper" role="tablist" aria-label="Household setup steps">
          <button class="hh-step" id="hh-step-1" data-step="1" type="button" role="tab" aria-controls="hh-view"><span class="hh-step__num">1</span><span class="hh-step__label">People &amp; Timeline</span></button>
          <span class="hh-step__conn" aria-hidden="true"></span>
          <button class="hh-step" id="hh-step-2" data-step="2" type="button" role="tab" aria-controls="hh-view"><span class="hh-step__num">2</span><span class="hh-step__label">Balance Sheet</span></button>
          <span class="hh-step__conn" aria-hidden="true"></span>
          <button class="hh-step" id="hh-step-3" data-step="3" type="button" role="tab" aria-controls="hh-view"><span class="hh-step__num">3</span><span class="hh-step__label">Cash Flow</span></button>
          <span class="hh-step__conn" aria-hidden="true"></span>
          <button class="hh-step" id="hh-step-4" data-step="4" type="button" role="tab" aria-controls="hh-view"><span class="hh-step__num">4</span><span class="hh-step__label">Blueprint</span></button>
        </nav>

        <div class="hh-wiz-workspace">
          <div class="hh-content" id="hh-view" aria-live="polite"></div>
        </div>
        <div id="hh-wiz-footer"></div>

      </div>
    </div>
  </section>

  <section class="page" data-page="net-worth">
    <div id="np-content"></div>
  </section>

  <section class="page" data-page="scenarios">
    <!-- =====================================================================
         Scenarios redesign (production port of the canonical handoff).
         Presentation only: the ScenariosUI view layer renders Compare / Focus /
         Cash Flow into #scn-view from PRODUCTION engine state. The old band /
         levers / tax / cash-flow grids and their renderers were replaced.
         No logo/orb, no global header, no outer glass shell here ΓÇö production
         already owns those; each view paints its own single glass surface.
         ===================================================================== -->
    <div class="scn-stage">

      <!-- Toolbar: title + segmented Compare/Focus + Cash Flow toggle + actions -->
      <header class="toolbar">
        <div class="toolbar__left">
          <div>
            <h1 class="page-title">Scenarios</h1>
            <p class="page-sub" id="scn-subtitle" data-scn-subtitle></p>
          </div>
          <div class="seg" role="tablist" aria-label="Scenario view">
            <button class="seg__btn is-active" id="scn-seg-compare" type="button"
                    role="tab" aria-selected="true" aria-controls="scn-view">Compare</button>
            <button class="seg__btn" id="scn-seg-focus" type="button"
                    role="tab" aria-selected="false" aria-controls="scn-view">Focus</button>
          </div>
        </div>
        <div class="toolbar__actions">
          <button class="cash-chip" id="scn-cash-toggle" type="button"
                  role="switch" aria-checked="false">
            <span class="cash-chip__label">Cash Flow</span>
            <span class="switch" aria-hidden="true"><span class="switch__knob"></span></span>
          </button>
          <button class="btn" id="scn-add" type="button"><span class="btn__plus" aria-hidden="true">+</span> Add</button>
          <button class="btn" id="scn-solve" type="button">Solve</button>
        </div>
      </header>

      <!-- View mount ΓÇö exactly one authoritative renderer writes here per sync. -->
      <div id="scn-view" aria-live="polite"></div>

      <!-- Engine-backed solver (Solve). renderSolvePanel() fills this. -->
      <div id="solve-panel"></div>
    </div>

    <!-- Path-replay controls. PRODUCTION owns these; the Cash Flow view relocates
         this node into its header (window.scnPathControlsEl) ΓÇö never recreated.
         Detached/hidden when Cash Flow is not the active view. -->
    <div id="scn-path-src" hidden>
      <label class="scn-path" id="scn-path-replay">Path
        <select id="path-mode">
            <option value="typical">Typical path</option>
            <option value="stressed">Stressed path</option>
            <option value="favorable">Favorable path</option>
            <option value="sequence-stress">Sequence Stress</option>
          </select>
        </label>
    </div>
  </section>

  <section class="page" data-page="sequencing">
    <div class="eyebrow"><span>Sequencing</span></div>
    <div class="seq-bar">
      <div class="seq-pick">
        <span class="k">Plan</span>
        <select id="seq-select"></select>
      </div>
      <div class="seq-chips" id="seq-chips"></div>
    </div>
    <div class="seq-chart">
      <div class="chart-head">
        <span class="chart-title">Resilience</span>
        <span class="chart-sub" id="seq-sub">Same plan, real markets</span>
      </div>
      <div class="chart-body"><svg id="seq-svg" viewBox="0 0 1000 320" preserveAspectRatio="none"></svg></div>
    </div>
    <div class="seq-prints" id="seq-prints"></div>
    <!-- Playback: one retirement start year replayed against the real record.
         Verdict sentence + terminal balance, a statement table comparing the
         three sourcing orders on the SAME return sequence, and the engine's
         year-by-year rows behind an advisor-detail toggle. All figures are
         runHistoricalPath / pathDigest output; era labels are static context. -->
    <div class="story-wrap" id="playback-panel"></div>
  </section>

</div>



<script type="module" src="src/main.js"></script>


</body>
</html>
