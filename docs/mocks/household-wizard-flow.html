<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parallax · Household wizard flow mock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Spectral:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0d11;
      --bg-deep: #080a0d;
      --ink: #ddd5c4;
      --ink-bright: #e7dec9;
      --ink-body: #9097a0;
      --ink-mute: #878e96;
      --ink-faint: #7d848c;
      --gold: #c6a662;
      --gold-bright: #d8c084;
      --gold-ink: #15181d;
      --line: rgba(231,222,201,0.10);
      --line-strong: rgba(231,222,201,0.16);
      --card: rgba(255,255,255,0.025);
      --font-sans: "Hanken Grotesk", system-ui, sans-serif;
      --font-serif: "Spectral", Georgia, serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-sans);
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(198,166,98,0.08), transparent 55%),
        radial-gradient(900px 500px at 90% 0%, rgba(120,140,180,0.06), transparent 50%),
        linear-gradient(180deg, #0c0f14, var(--bg-deep));
    }
    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 22px 48px;
    }
    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0 0 8px;
    }
    h1 {
      font-family: var(--font-serif);
      font-weight: 300;
      font-size: 32px;
      color: var(--ink-bright);
      margin: 0 0 8px;
    }
    .lede {
      color: var(--ink-body);
      font-size: 14px;
      line-height: 1.5;
      margin: 0 0 20px;
      max-width: 62ch;
    }
    .controls, .shell {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      backdrop-filter: blur(14px);
    }
    .controls {
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px 28px;
      align-items: center;
    }
    .ctrl {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--ink-body);
    }
    .ctrl strong { color: var(--ink-bright); font-weight: 500; }
    .seg {
      display: inline-flex;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      overflow: hidden;
    }
    .seg button {
      background: transparent;
      border: 0;
      color: var(--ink-mute);
      font: inherit;
      font-size: 12px;
      letter-spacing: 0.04em;
      padding: 7px 12px;
      cursor: pointer;
    }
    .seg button.is-on {
      background: rgba(198,166,98,0.18);
      color: var(--ink-bright);
    }
    .toggle {
      width: 36px; height: 20px; border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,0.04);
      position: relative; cursor: pointer; padding: 0;
    }
    .toggle::after {
      content: "";
      position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--ink-mute);
      transition: transform .15s ease, background .15s ease;
    }
    .toggle.is-on { border-color: rgba(198,166,98,0.45); }
    .toggle.is-on::after {
      transform: translateX(16px);
      background: var(--gold);
    }
    .shell { overflow: hidden; }
    .shell-top {
      padding: 14px 20px 0;
    }
    .shell-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .shell-meta .k {
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--ink-faint);
    }
    .shell-meta .pill {
      font-size: 11px; color: var(--ink-body);
      border: 1px solid var(--line); border-radius: 999px;
      padding: 3px 10px;
    }
    .stepper {
      display: grid;
      align-items: center;
      width: 100%;
      padding: 4px 0 14px;
    }
    .step {
      display: inline-flex; align-items: center; gap: 7px;
      background: transparent; border: 0; padding: 4px 2px;
      cursor: pointer; min-width: 0; color: inherit; font: inherit;
    }
    .step__num {
      width: 22px; height: 22px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      flex: none;
      font-family: var(--font-serif); font-size: 14px;
      border: 1px solid var(--line-strong); color: var(--ink-faint);
    }
    .step__label {
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-faint); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; min-width: 0;
    }
    .step.is-current .step__num {
      background: var(--gold); border-color: transparent; color: var(--gold-ink);
      font-weight: 500;
    }
    .step.is-current .step__label { color: var(--ink-bright); }
    .step.is-done .step__num {
      background: rgba(198,166,98,0.10);
      border-color: rgba(198,166,98,0.45);
      color: var(--gold);
      font-family: var(--font-sans); font-size: 12px;
    }
    .step.is-done .step__label { color: var(--ink); }
    .conn {
      height: 1px; min-width: 12px; margin: 0 10px;
      background: var(--line);
    }
    .conn.is-done { background: rgba(195,165,106,0.4); }
    .pane {
      padding: 18px 20px 8px;
      border-top: 1px solid var(--line);
      min-height: 360px;
    }
    .pane h2 {
      font-family: var(--font-serif);
      font-weight: 300;
      font-size: 28px;
      color: var(--ink-bright);
      margin: 0 0 6px;
    }
    .pane .note {
      color: var(--ink-body);
      font-size: 13px;
      margin: 0 0 18px;
      max-width: 58ch;
      line-height: 1.45;
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 720px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .step__label { display: none; }
    }
    .card {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
    }
    .card__head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--gold);
    }
    .card__title {
      font-family: var(--font-serif);
      font-size: 20px; font-weight: 400; color: var(--ink-bright);
      margin: 0 0 10px;
    }
    .kv {
      display: flex; justify-content: space-between; gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .kv:last-child { border-bottom: 0; }
    .kv span:first-child { color: var(--ink-mute); }
    .kv span:last-child { color: var(--ink-bright); font-variant-numeric: tabular-nums; }
    .stat-row { display: flex; flex-wrap: wrap; gap: 22px; }
    .stat .v {
      font-family: var(--font-serif);
      font-size: 26px; font-weight: 300; color: var(--ink-bright);
    }
    .stat .k {
      font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--ink-faint); margin-top: 2px;
    }
    .nw-hero .v {
      font-family: var(--font-serif);
      font-size: 38px; font-weight: 300; color: var(--gold);
      line-height: 1.1;
    }
    .nw-hero .k {
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--ink-faint); margin-bottom: 4px;
    }
    .footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px 16px;
      border-top: 1px solid var(--line);
    }
    .btn {
      font: inherit; font-size: 12px; letter-spacing: 0.14em;
      text-transform: uppercase; cursor: pointer; border-radius: 8px;
      padding: 10px 18px;
    }
    .btn-outline {
      background: transparent; color: var(--ink);
      border: 1px solid var(--line-strong);
    }
    .btn-primary {
      background: linear-gradient(180deg, var(--gold-bright), var(--gold));
      color: var(--gold-ink); border: 0; font-weight: 600;
    }
    .ghost { color: var(--ink-faint); font-size: 12px; letter-spacing: 0.06em; }
    .map {
      margin-top: 18px;
      color: var(--ink-mute);
      font-size: 12px;
      line-height: 1.55;
    }
    .map strong { color: var(--ink-body); font-weight: 500; }
    [hidden] { display: none !important; }

    /* Full Income & Tax mock (mirrors live hh-it surface) */
    .it__intro { color: var(--ink-body); font-size: 13px; margin: 0 0 18px; max-width: 62ch; line-height: 1.45; }
    .it-section-head {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px; padding-bottom: 8px; margin: 18px 0 6px;
      border-bottom: 1px solid var(--line);
    }
    .it-section-head > span {
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold);
    }
    .it-section-head > strong {
      font-family: var(--font-serif); font-weight: 400; font-size: 18px; color: var(--ink-bright);
    }
    .it-section-head > strong small { font-family: var(--font-sans); font-size: 11px; color: var(--ink-faint); margin-left: 6px; }
    .it-grid { display: flex; gap: 36px; }
    .it-grid > section { flex: 1; min-width: 0; }
    .it-grid--lower { margin-top: 8px; }
    .it-subhead {
      display: flex; justify-content: space-between; align-items: baseline;
      margin: 8px 0 4px; font-size: 12px; color: var(--ink-body);
    }
    .it-subhead small { color: var(--ink-faint); }
    .it-row {
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
      padding: 9px 6px; border-radius: 6px;
      border-bottom: 1px solid var(--line);
    }
    .it-row__copy { min-width: 0; flex: 1; }
    .it-row__title { display: block; font-size: 14px; color: var(--ink-bright); }
    .it-row__meta {
      display: block;
      margin-top: 2px; font-size: 11.5px; color: var(--ink-faint);
    }
    .it-row__amount {
      font-family: var(--font-serif); font-size: 16px; color: var(--ink-bright);
      font-variant-numeric: tabular-nums; white-space: nowrap;
    }
    .it-add-line {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      margin: 10px 0 4px; font-size: 12px; color: var(--ink-faint);
    }
    .it-add-line--secondary { margin-top: 2px; }
    .it-add {
      background: transparent; border: 1px dashed rgba(198,166,98,0.35);
      color: var(--gold-bright); border-radius: 8px; padding: 8px 12px;
      font: inherit; font-size: 12px; cursor: default;
    }
    .it-auto-row {
      display: flex; justify-content: space-between; gap: 12px;
      padding: 10px 6px; font-size: 12px; color: var(--ink-mute);
      border-bottom: 1px solid var(--line);
    }
    .it-auto-row b { letter-spacing: 0.08em; color: var(--ink-faint); }
    .it-auto-row strong { color: #9a968d; font: 400 16px/1 var(--font-serif); }
    .it-deduction-footer {
      margin-top: 10px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      font-size: 12px; color: var(--ink-faint);
    }
    .it-deduction-footer em { color: #96a394; font-style: normal; }
    .it-position {
      margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--line);
    }
    .it-equation {
      display: flex; align-items: stretch; gap: 6px; flex-wrap: wrap;
      padding: 14px 12px; border: 1px solid var(--line); border-radius: 12px;
      background: rgba(255,255,255,0.02);
    }
    .it-equation__cell {
      flex: 1 1 120px; min-width: 110px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .it-equation__cell > span {
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint);
    }
    .it-equation__cell > strong {
      font-family: var(--font-serif); font-weight: 400; font-size: 22px; color: var(--ink-bright);
    }
    .it-equation__cell > small { font-size: 11px; color: var(--ink-faint); min-height: 1em; }
    .it-equation__cell--result > strong { color: #c3a56a; }
    .it-equation__op {
      align-self: center; padding: 0 4px; color: var(--ink-mute); font-size: 18px;
    }
    .it-equation__op--eq { color: #8a8880; }
    .it-position__note {
      margin: 10px 0 14px; font-size: 12px; color: var(--ink-faint);
    }
    .it-tax-grid {
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px 28px;
    }
    .it-stat { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .it-stat > span {
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint);
    }
    .it-stat > strong {
      font-family: var(--font-serif); font-weight: 400; font-size: 22px; color: var(--ink-bright);
    }
    .it-stat--pending > strong { color: #c99a6a; }
    .it-stat > small { font-size: 11px; color: var(--ink-faint); line-height: 1.35; }
    @media (max-width: 900px) {
      .it-grid { flex-direction: column; gap: 18px; }
      .it-tax-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="page">
    <p class="eyebrow">Exploration mock</p>
    <h1>Household wizard · flow</h1>
    <p class="lede">
      Six-step IA in Parallax chrome. Step 2 shows the <strong style="color:var(--ink-bright);font-weight:500">full live Income &amp; Tax surface</strong> (not a stripped mock) so you can review before wiring.
    </p>

    <div class="controls">
      <div class="ctrl">
        <strong>Step labels</strong>
        <button type="button" class="toggle is-on" id="lblToggle" aria-pressed="true" title="Toggle labels"></button>
      </div>
      <div class="ctrl">
        <strong>Step 6 finish</strong>
        <div class="seg" role="group" aria-label="Goals finish variant">
          <button type="button" class="is-on" data-finish="summary">Summary</button>
          <button type="button" data-finish="goals">Goals-lite</button>
        </div>
      </div>
    </div>

    <div class="shell">
      <div class="shell-top">
        <div class="shell-meta">
          <span class="k">Household setup</span>
          <span class="pill" id="stepPill">Step 1 of 6 · Family</span>
        </div>
        <nav class="stepper" id="stepper" aria-label="Wizard steps"></nav>
      </div>

      <div class="pane" id="pane"></div>

      <div class="footer">
        <button type="button" class="btn btn-outline" id="backBtn" hidden>← Back</button>
        <span id="backSpacer"></span>
        <button type="button" class="btn btn-primary" id="nextBtn">Continue →</button>
        <span class="ghost" id="doneNote" hidden>Step 6 of 6</span>
      </div>
    </div>
  </div>

  <script>
    const STEPS = [
      { id: 1, label: "Family" },
      { id: 2, label: "Income & Tax" },
      { id: 3, label: "Savings" },
      { id: 4, label: "Net Worth" },
      { id: 5, label: "Expenses" },
      { id: 6, label: "Summary" },
    ];

    let step = 2;
    let showLabels = true;
    let finish = "summary";

    const panes = {
      1: () => `
        <h2>Family</h2>
        <p class="note">Household identity — who is in the plan, when they retire, filing posture.</p>
        <div class="grid-2">
          <div class="card">
            <div class="card__head"><span>Client</span></div>
            <div class="card__title">Alex Rivera</div>
            <div class="kv"><span>Age</span><span>56</span></div>
            <div class="kv"><span>Retires at</span><span>65</span></div>
            <div class="kv"><span>Plan to age</span><span>95</span></div>
          </div>
          <div class="card">
            <div class="card__head"><span>Co-client</span></div>
            <div class="card__title">Jordan Rivera</div>
            <div class="kv"><span>Age</span><span>54</span></div>
            <div class="kv"><span>Retires at</span><span>65</span></div>
            <div class="kv"><span>Plan to age</span><span>95</span></div>
          </div>
        </div>
        <div class="card" style="margin-top:12px">
          <div class="card__head"><span>Household meta</span></div>
          <div class="kv"><span>Filing</span><span>Married filing jointly</span></div>
          <div class="kv"><span>State</span><span>Virginia</span></div>
          <div class="kv"><span>Children</span><span>Sam · born 2008</span></div>
        </div>`,
      2: () => `
        <h2>Income &amp; Tax</h2>
        <p class="it__intro">All known income, pre-tax contributions and deductions — the base year the tax engine works from.</p>

        <div class="it-section-head"><span>Income sources</span><strong>$327,000 <small>this year</small></strong></div>
        <div class="it-grid">
          <section>
            <div class="it-subhead"><span>Working years</span><small>$327,000 /yr</small></div>
            <div class="it-row">
              <span class="it-row__copy"><span class="it-row__title">Wages</span><span class="it-row__meta">Alex</span></span>
              <span class="it-row__amount">$185,000</span>
            </div>
            <div class="it-row">
              <span class="it-row__copy"><span class="it-row__title">Wages</span><span class="it-row__meta">Jordan</span></span>
              <span class="it-row__amount">$142,000</span>
            </div>
            <div class="it-row">
              <span class="it-row__copy"><span class="it-row__title">Interest</span><span class="it-row__meta">Joint</span></span>
              <span class="it-row__amount">$0</span>
            </div>
            <div class="it-row">
              <span class="it-row__copy"><span class="it-row__title">Dividends</span><span class="it-row__meta">Joint</span></span>
              <span class="it-row__amount">$0</span>
            </div>
          </section>
          <section>
            <div class="it-subhead"><span>Retirement years</span><small>$62,000 /yr</small></div>
            <div class="it-row">
              <span class="it-row__copy">
                <span class="it-row__title">Social Security</span>
                <span class="it-row__meta">Alex</span>
              </span>
              <span class="it-row__amount">$36,000</span>
            </div>
            <div class="it-row">
              <span class="it-row__copy">
                <span class="it-row__title">Social Security</span>
                <span class="it-row__meta">Jordan</span>
              </span>
              <span class="it-row__amount">$26,000</span>
            </div>
          </section>
        </div>
        <div class="it-add-line">
          <button type="button" class="it-add">+ Add income source</button>
        </div>

        <div class="it-grid it-grid--lower">
          <section>
            <div class="it-section-head"><span>Pre-tax &amp; adjustments</span><strong>$46,000</strong></div>
            <div class="it-row">
              <span><span class="it-row__title">401(k)</span><span class="it-row__meta">Alex</span></span>
              <span class="it-row__amount">$23,000</span>
            </div>
            <div class="it-row">
              <span><span class="it-row__title">401(k)</span><span class="it-row__meta">Jordan</span></span>
              <span class="it-row__amount">$23,000</span>
            </div>
            <div class="it-row">
              <span><span class="it-row__title">HSA</span><span class="it-row__meta">Joint</span></span>
              <span class="it-row__amount">$0</span>
            </div>
            <div class="it-add-line"><button type="button" class="it-add">+ Add adjustment</button></div>
          </section>
          <section>
            <div class="it-section-head"><span>Deductions</span><strong>$12,000</strong></div>
            <div class="it-row">
              <span><span class="it-row__title">Medical</span></span>
              <span class="it-row__amount">$0</span>
            </div>
            <div class="it-row">
              <span><span class="it-row__title">Charitable</span></span>
              <span class="it-row__amount">$12,000</span>
            </div>
            <div class="it-row">
              <span><span class="it-row__title">Mortgage interest</span></span>
              <span class="it-row__amount">$0</span>
            </div>
            <div class="it-row">
              <span><span class="it-row__title">SALT</span></span>
              <span class="it-row__amount">$0</span>
            </div>
            <div class="it-auto-row"><span>Standard · MFJ + senior 65+</span><strong>$33,200</strong></div>
            <div class="it-deduction-footer">
              <button type="button" class="it-add">+ Add deduction</button>
              <span>Standard applied</span>
            </div>
          </section>
        </div>

        <div class="it-position">
          <div class="it-equation" role="group" aria-label="Taxable income equation">
            <div class="it-equation__cell">
              <span>Total income</span>
              <strong>$327,000</strong>
            </div>
            <div class="it-equation__op" aria-hidden="true">−</div>
            <div class="it-equation__cell">
              <span>AGI</span>
              <strong>$281,000</strong>
            </div>
            <div class="it-equation__op" aria-hidden="true">−</div>
            <div class="it-equation__cell">
              <span>Deduction</span>
              <strong>$33,200</strong>
            </div>
            <div class="it-equation__op it-equation__op--eq" aria-hidden="true">=</div>
            <div class="it-equation__cell it-equation__cell--result">
              <span>Taxable income</span>
              <strong>$247,800</strong>
            </div>
          </div>
          <div class="it-tax-grid" style="margin-top:16px">
            <div class="it-stat">
              <span>Federal marginal bracket</span>
              <strong>24%</strong>
            </div>
            <div class="it-stat">
              <span>Capital gains rate</span>
              <strong>15%</strong>
            </div>
            <div class="it-stat">

    function renderStepper() {
      const nav = document.getElementById("stepper");
      const cols = STEPS.map((_, i) =>
        i === STEPS.length - 1 ? "minmax(0, auto)" : "minmax(0, auto) minmax(12px, 1fr)"
      ).join(" ");
      nav.style.gridTemplateColumns = cols;
      nav.innerHTML = STEPS.map((s, i) => {
        const cls = s.id === step ? "is-current" : s.id < step ? "is-done" : "";
        const num = s.id < step ? "✓" : String(s.id);
        const label = showLabels ? `<span class="step__label">${s.label}</span>` : "";
        const btn = `<button type="button" class="step ${cls}" data-step="${s.id}"><span class="step__num">${num}</span>${label}</button>`;
        const conn = i < STEPS.length - 1
          ? `<span class="conn ${s.id < step ? "is-done" : ""}" aria-hidden="true"></span>`
          : "";
        return btn + conn;
      }).join("");
      nav.querySelectorAll("[data-step]").forEach((el) => {
        el.addEventListener("click", () => {
          step = Number(el.getAttribute("data-step"));
          render();
        });
      });
    }

    function render() {
      const label = STEPS.find((s) => s.id === step).label;
      document.getElementById("stepPill").textContent = `Step ${step} of 6 · ${label}`;
      document.getElementById("pane").innerHTML = panes[step]();
      renderStepper();

      const back = document.getElementById("backBtn");
      const next = document.getElementById("nextBtn");
      const done = document.getElementById("doneNote");
      const spacer = document.getElementById("backSpacer");
      const isLast = step >= 6;
      back.hidden = step <= 1;
      spacer.hidden = step > 1;
      next.hidden = isLast;
      done.hidden = !isLast;
      done.textContent = `Step 6 of 6 · ${finish === "summary" ? "Summary" : "Goals-lite"}`;
      next.textContent = step === 5 ? "Review →" : "Continue →";
    }

    document.getElementById("backBtn").addEventListener("click", () => {
      step = Math.max(1, step - 1);
      render();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      step = Math.min(6, step + 1);
      render();
    });
    document.getElementById("lblToggle").addEventListener("click", (e) => {
      showLabels = !showLabels;
      e.currentTarget.classList.toggle("is-on", showLabels);
      e.currentTarget.setAttribute("aria-pressed", String(showLabels));
      render();
    });
    document.querySelectorAll("[data-finish]").forEach((btn) => {
      btn.addEventListener("click", () => {
        finish = btn.getAttribute("data-finish");
        document.querySelectorAll("[data-finish]").forEach((b) =>
          b.classList.toggle("is-on", b === btn)
        );
        if (step === 6) render();
      });
    });

    render();
  </script>
</body>
