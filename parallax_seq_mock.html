<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Parallax · Sequencing (mock)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* cool near-white ground (Hospity) */
  --bg:#eaeef3; --bg-hi:#f6f8fb;
  --card:#ffffff; --card-2:#fbfcfe;
  /* ink */
  --ink:#16263f; --ink-2:#27405f; --mute:#8a97a8; --faint:#b3bcca;
  /* accents (Parallax teal + Hospity navy/mint/periwinkle, clay for pressure) */
  --navy:#1b2d4e; --teal:#3f7d8a; --mint:#3f9d77; --mint-soft:#8fccb1;
  --peri:#9fb0e0; --slate:#5b7aa8; --brass:#b08a3e;
  --clay:#c06a53; --rust:#a44c3c;
  --line:#e6eaf0; --line-2:#eef1f6;
  --good:#3f9d77; --bad:#c06a53;
  --shadow-sm:0 1px 2px rgba(24,46,80,.05);
  --shadow:0 2px 6px rgba(24,46,80,.04), 0 20px 44px rgba(24,46,80,.08);
  --shadow-lg:0 2px 8px rgba(24,46,80,.05), 0 30px 60px rgba(24,46,80,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Sora',system-ui,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1200px 700px at 62% 8%, var(--bg-hi), transparent 60%),
    radial-gradient(900px 600px at 18% 90%, #f0f3f8, transparent 55%),
    var(--bg);
  -webkit-font-smoothing:antialiased;
}
.num{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums}

/* ── shell ─────────────────────────────────────────────── */
.app{display:grid;grid-template-columns:74px 1fr;min-height:100vh}

/* left rail (echoes Hospity's body-system rail) */
.rail{display:flex;flex-direction:column;align-items:center;gap:18px;padding:22px 0;
      position:sticky;top:0;height:100vh}
.brand{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;
       background:linear-gradient(150deg,#22365c,#16263f);box-shadow:var(--shadow-sm);margin-bottom:10px}
.brand svg{display:block}
.nav-i{width:46px;height:46px;border-radius:14px;background:var(--card);box-shadow:var(--shadow-sm);
       display:grid;place-items:center;color:var(--faint);position:relative;cursor:pointer;transition:.18s}
.nav-i:hover{color:var(--teal)}
.nav-i.on{background:linear-gradient(150deg,#22365c,#16263f);color:#fff;box-shadow:0 8px 18px rgba(24,46,80,.22)}
.nav-i.on::after{content:"";position:absolute;right:-12px;width:5px;height:5px;border-radius:50%;background:var(--navy)}

/* main */
.main{padding:30px 40px 40px 26px;max-width:1380px}
.head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px}
.title{font-size:34px;font-weight:800;letter-spacing:-.018em;line-height:1;color:var(--ink)}
.title .dot{color:var(--mint)}
.sub{font-size:13px;color:var(--mute);font-weight:500;margin-top:9px;letter-spacing:.01em}
.head-r{display:flex;align-items:center;gap:12px}
.seler{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:13px;padding:10px 14px;
       box-shadow:var(--shadow-sm);font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer}
.seler .k{color:var(--mute);font-weight:500;font-size:11px;letter-spacing:.04em}
.seler .cv{width:7px;height:7px;border-right:2px solid var(--faint);border-bottom:2px solid var(--faint);
           transform:rotate(45deg);margin-left:2px;margin-top:-3px}
.iconbtn{width:42px;height:42px;border-radius:13px;background:var(--card);box-shadow:var(--shadow-sm);
         display:grid;place-items:center;color:var(--mute);cursor:pointer}

/* ── bento ─────────────────────────────────────────────── */
.bento{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
.card{background:var(--card);border-radius:22px;box-shadow:var(--shadow);padding:22px}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.eyebrow{font-size:10.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--mute)}

/* hero chart */
.hero{padding:22px 22px 18px}
.hero .big{font-size:19px;font-weight:700;color:var(--ink);letter-spacing:-.01em;margin-top:2px}
.chartwrap{position:relative;margin-top:6px}
#chart{display:block;width:100%;height:auto}
.scan{position:absolute;left:50%;bottom:6px;transform:translateX(-50%);
      background:var(--navy);color:#fff;font-size:10.5px;font-weight:600;letter-spacing:.08em;
      padding:6px 13px;border-radius:20px;box-shadow:0 6px 16px rgba(24,46,80,.22)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.chip{display:flex;align-items:center;gap:7px;background:var(--card-2);border:1px solid var(--line);
      border-radius:11px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:.15s}
.chip .sw{width:9px;height:9px;border-radius:3px}
.chip.off{opacity:.42;filter:grayscale(.4)}
.chip .yr{font-family:'Inter';font-weight:700}
.chip .tg{color:var(--mute);font-weight:500;font-size:11px}

/* right column */
.col{display:flex;flex-direction:column;gap:20px}
/* resilience orb */
.orbcard{text-align:center;padding:24px 22px 22px}
.orb{position:relative;width:188px;height:188px;margin:6px auto 4px}
.orb svg{position:absolute;inset:0}
.orb .ball{position:absolute;inset:24px;border-radius:50%;
  background:
   radial-gradient(60px 50px at 38% 32%, rgba(255,255,255,.95), rgba(255,255,255,0) 60%),
   radial-gradient(120% 120% at 50% 38%, #c7d2f2 0%, #8fb6c4 48%, #5f93a0 100%);
  box-shadow:inset 0 -10px 22px rgba(31,74,95,.35), inset 0 8px 16px rgba(255,255,255,.5),
             0 12px 26px rgba(31,74,95,.22)}
.orb .pct{position:absolute;inset:0;display:grid;place-items:center;flex-direction:column}
.orb .pct b{font-family:'Inter';font-size:42px;font-weight:700;color:#16324a;line-height:1;
            text-shadow:0 1px 1px rgba(255,255,255,.45)}
.orbcap{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);margin-top:8px}
.orbsub{font-size:13px;color:var(--ink-2);font-weight:500;margin-top:5px}
.orbsub b{font-family:'Inter';color:var(--ink);font-weight:700}

/* best/worst pair */
.pair{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mini{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:16px 16px 15px}
.mini .lab{font-size:10px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--mute)}
.mini .v{font-family:'Inter';font-size:22px;font-weight:700;margin-top:9px;letter-spacing:-.01em}
.mini .v.good{color:var(--good)} .mini .v.bad{color:var(--bad)}
.mini .m{font-size:11.5px;color:var(--mute);font-weight:500;margin-top:3px}
.mini .m b{color:var(--ink-2);font-weight:600}

/* market list (echoes "recommended doctors") */
.list .row{display:flex;align-items:center;gap:13px;padding:13px 4px;border-top:1px solid var(--line-2)}
.list .row:first-of-type{border-top:none;padding-top:4px}
.list .led{width:11px;height:11px;border-radius:4px;flex:0 0 auto;box-shadow:0 1px 2px rgba(0,0,0,.12)}
.list .nm{flex:1;min-width:0}
.list .nm .y{font-family:'Inter';font-size:15px;font-weight:700;color:var(--ink)}
.list .nm .t{font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);margin-top:2px}
.res{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600}
.res .sd{width:7px;height:7px;border-radius:50%}
.res.good{color:var(--good)} .res.bad{color:var(--bad)}
.res .amt{font-family:'Inter';font-weight:700;color:var(--ink-2)}
.chev{color:var(--faint);margin-left:4px}

/* chart annotation pills */
.lbl{font-family:'Inter';font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:9px;white-space:nowrap}
.lbl.mint{background:rgba(63,157,119,.14);color:#2c7a59}
.lbl.teal{background:rgba(63,125,138,.14);color:#2f5e68}
.lbl.clay{background:var(--rust);color:#fff;box-shadow:0 4px 10px rgba(164,76,60,.3)}
.tip{position:absolute;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
     border-radius:12px;box-shadow:var(--shadow);padding:10px 12px;font-size:11px;pointer-events:none}
.tip .ta{font-weight:700;color:var(--ink);font-family:'Inter';font-size:12px;margin-bottom:5px}
.tip .tr{display:flex;align-items:center;gap:6px;color:var(--ink-2);font-weight:500;margin-top:3px;font-size:11px}
.tip .tr .sw{width:8px;height:8px;border-radius:2px}
.tip .tr b{font-family:'Inter';margin-left:auto;padding-left:14px}
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="brand">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M4 15 L10 4 L16 15" stroke="#8fccb1" stroke-width="2" stroke-linecap="round"/>
        <path d="M4 15 L10 7" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity=".85"/>
      </svg>
    </div>
    <div class="nav-i" title="Household"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg></div>
    <div class="nav-i" title="Scenarios"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="6" height="16" rx="1"/><rect x="15" y="4" width="6" height="16" rx="1"/></svg></div>
    <div class="nav-i on" title="Sequencing"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17c4 0 4-10 8-10s4 10 8 10"/></svg></div>
  </aside>

  <main class="main">
    <div class="head">
      <div>
        <div class="title">Resilience<span class="dot">.</span></div>
        <div class="sub">Same plan, lived through real market history — 1929 to 2008.</div>
      </div>
      <div class="head-r">
        <div class="seler"><span class="k">Scenario</span> Baseline <span class="cv"></span></div>
        <div class="iconbtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5h18M6 12h12M10 19h4"/></svg></div>
      </div>
    </div>

    <div class="bento">
      <!-- HERO chart -->
      <section class="card hero">
        <div class="card-h">
          <div>
            <div class="eyebrow">Wealth through real market history</div>
            <div class="big">One plan · six retirements · today's dollars</div>
          </div>
        </div>
        <div class="chartwrap" id="chartwrap">
          <svg id="chart" viewBox="0 0 760 430" preserveAspectRatio="none"></svg>
        </div>
        <div class="chips" id="chips"></div>
      </section>

      <!-- RIGHT column -->
      <div class="col">
        <section class="card orbcard">
          <div class="orb">
            <svg width="188" height="188" viewBox="0 0 188 188">
              <circle cx="94" cy="94" r="86" fill="none" stroke="#e9edf3" stroke-width="6"/>
              <circle id="ring" cx="94" cy="94" r="86" fill="none" stroke="url(#rg)" stroke-width="6"
                      stroke-linecap="round" transform="rotate(-90 94 94)"/>
              <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#3f9d77"/><stop offset="1" stop-color="#3f7d8a"/>
              </linearGradient></defs>
            </svg>
            <div class="ball"></div>
            <div class="pct"><b id="resPct">67%</b></div>
          </div>
          <div class="orbcap">Resilience</div>
          <div class="orbsub"><b id="resN">4</b> of <b>6</b> real markets survived to 95</div>
        </section>

        <div class="pair">
          <div class="mini">
            <div class="lab">Best case</div>
            <div class="v good num">$12.6M</div>
            <div class="m">retire into <b>1995</b></div>
          </div>
          <div class="mini">
            <div class="lab">Worst case</div>
            <div class="v bad num">Age 85</div>
            <div class="m">ran dry · <b>1966</b></div>
          </div>
        </div>

        <section class="card list" id="list"></section>
      </div>
    </div>
  </main>
</div>

<script src="seq-data.js"></script>
<script>
(function(){
  const D = window.SEQ;
  const MK = D.markets;
  // visual identity per market (deep, desaturated editorial tones)
  const STYLE = {
    1929:{c:'#5b7aa8', tag:'Great Depression'},
    1966:{c:'#c06a53', tag:'The lost decade'},
    1973:{c:'#a44c3c', tag:'Stagflation'},
    1995:{c:'#3f9d77', tag:'The 90s boom'},
    2000:{c:'#b08a3e', tag:'Dot-com bust'},
    2008:{c:'#3f7d8a', tag:'Financial crisis'},
  };
  const fmtM = v => '$'+(v/1e6).toFixed(v>=1e7?1:2)+'M';

  // ---- chart geometry ----
  const W=760,H=430, m={l:52,r:64,t:18,b:34};
  const x0=m.l, x1=W-m.r, y0=H-m.b, y1=m.t;
  const ages = MK[0].series.map(s=>s.age);
  const ageMin=ages[0], ageMax=ages[ages.length-1];
  const maxBal = Math.max(...MK.flatMap(m=>m.series.map(s=>s.bal)));
  const yMax = Math.ceil(maxBal/5e6)*5e6;            // round to a clean $5M
  const sx = a => x0 + (a-ageMin)/(ageMax-ageMin)*(x1-x0);
  const sy = v => y0 - (v/yMax)*(y0-y1);

  // truncate a ran-dry series at first zero (line plunges to baseline and ends)
  function clip(series){
    const out=[]; for(const s of series){ out.push(s); if(s.bal<=0) break; } return out;
  }
  // catmull-rom → smooth bezier path through [x,y] points
  function smooth(pts){
    if(pts.length<2) return '';
    let d='M'+pts[0][0]+','+pts[0][1];
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||p2;
      const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
      const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
      d+='C'+c1x+','+c1y+' '+c2x+','+c2y+' '+p2[0]+','+p2[1];
    }
    return d;
  }

  let svg='';
  // defs: soft glow + area gradient under the anchor (1995)
  svg+='<defs>'+
    '<linearGradient id="area" x1="0" y1="0" x2="0" y2="1">'+
      '<stop offset="0" stop-color="#3f9d77" stop-opacity=".14"/>'+
      '<stop offset="1" stop-color="#3f9d77" stop-opacity="0"/>'+
    '</linearGradient>'+
    '<radialGradient id="glow" cx="50%" cy="40%" r="60%">'+
      '<stop offset="0" stop-color="#dfeeff" stop-opacity=".7"/>'+
      '<stop offset="1" stop-color="#dfeeff" stop-opacity="0"/>'+
    '</radialGradient>'+
  '</defs>';
  // ambient glow behind plot (echoes the brain's luminosity)
  svg+='<ellipse cx="'+((x0+x1)/2)+'" cy="'+(y1+120)+'" rx="300" ry="150" fill="url(#glow)"/>';

  // y gridlines + $ labels (clean $5M steps)
  const steps = yMax/5e6;
  for(let i=0;i<=steps;i++){
    const v=i*5e6, y=sy(v);
    svg+='<line x1="'+x0+'" y1="'+y+'" x2="'+x1+'" y2="'+y+'" stroke="#eef1f6" stroke-width="1"/>';
    svg+='<text x="'+(x0-10)+'" y="'+(y+4)+'" text-anchor="end" font-family="Inter" font-size="11" fill="#b3bcca">'+
         (v===0?'$0':'$'+(v/1e6)+'M')+'</text>';
  }
  // x ticks
  [65,75,85,94].forEach(a=>{
    svg+='<text x="'+sx(a)+'" y="'+(y0+22)+'" text-anchor="middle" font-family="Inter" font-size="11" fill="#b3bcca">'+a+'</text>';
  });
  svg+='<text x="'+sx(65)+'" y="'+(y1-2)+'" text-anchor="middle" font-family="Sora" font-size="9.5" font-weight="600" letter-spacing=".1em" fill="#aab4c2">RETIRE</text>';
  svg+='<line x1="'+sx(65)+'" y1="'+y1+'" x2="'+sx(65)+'" y2="'+y0+'" stroke="#e6eaf0" stroke-width="1" stroke-dasharray="3 4"/>';

  // area under the anchor (1995)
  const anchor = MK.find(k=>k.year===1995);
  if(anchor){
    const pts=anchor.series.map(s=>[sx(s.age),sy(s.bal)]);
    const ap='M'+pts[0][0]+','+y0+' '+smooth(pts).slice(1)+' L'+pts[pts.length-1][0]+','+y0+' Z';
    svg+='<path d="'+ap+'" fill="url(#area)"/>';
  }

  // draw ran-dry first (under), survivors on top
  const order = MK.slice().sort((a,b)=> (a.survived?1:0)-(b.survived?1:0));
  const endLabels=[];
  order.forEach(k=>{
    const st=STYLE[k.year]; const cl=clip(k.series);
    const pts=cl.map(s=>[sx(s.age),sy(Math.max(0,s.bal))]);
    const surv=k.survived;
    svg+='<path d="'+smooth(pts)+'" fill="none" stroke="'+st.c+'" stroke-width="'+(surv?2.4:2)+'" '+
         'stroke-linecap="round" stroke-linejoin="round" opacity="'+(surv?1:.9)+'" '+
         (surv?'':'stroke-dasharray="1 0"')+'/>';
    const last=pts[pts.length-1];
    if(surv){
      svg+='<circle cx="'+last[0]+'" cy="'+last[1]+'" r="3.5" fill="'+st.c+'"/>';
      endLabels.push({x:last[0],y:last[1],year:k.year,txt:fmtM(k.terminal),surv:true,c:st.c});
    } else {
      // depletion marker
      svg+='<circle cx="'+last[0]+'" cy="'+last[1]+'" r="3.5" fill="'+st.c+'"/>';
      endLabels.push({x:last[0],y:last[1],year:k.year,dep:k.depletionAge,surv:false,c:st.c});
    }
  });

  document.getElementById('chart').innerHTML=svg;

  // HTML end-of-path labels (annotation pills, positioned over the svg)
  const wrap=document.getElementById('chartwrap');
  const box=()=>document.getElementById('chart').getBoundingClientRect();
  function place(){
    document.querySelectorAll('.epl').forEach(e=>e.remove());
    const b=box(); const sxr=b.width/W, syr=b.height/H;
    // only label the headline ones to stay clean: 1995, 2008, and the 1966 ran-dry
    const show={1995:'mint',2008:'teal'};
    endLabels.forEach(L=>{
      if(L.surv && show[L.year]){
        const el=document.createElement('div');
        el.className='epl lbl '+show[L.year];
        el.style.position='absolute';
        el.textContent=L.txt;
        el.style.left=(L.x*sxr+6)+'px'; el.style.top=(L.y*syr-10)+'px';
        wrap.appendChild(el);
      }
    });
    // clay annotation anchored at the earliest failure's plunge point (1966 @85)
    const fail=endLabels.find(L=>L.year===1966);
    if(fail){
      const el=document.createElement('div');
      el.className='epl lbl clay'; el.style.position='absolute';
      el.textContent='Broke at '+fail.dep;
      el.style.left=(fail.x*sxr-22)+'px'; el.style.top=(fail.y*syr-32)+'px';
      wrap.appendChild(el);
    }
  }
  requestAnimationFrame(place); window.addEventListener('resize',place);

  // ---- resilience ring ----
  const C=2*Math.PI*86, frac=D.meta.resilience/100;
  const ring=document.getElementById('ring');
  ring.setAttribute('stroke-dasharray', (C*frac)+' '+C);
  document.getElementById('resPct').textContent=D.meta.resilience+'%';
  document.getElementById('resN').textContent=D.meta.survivedCount;

  // ---- chips ----
  document.getElementById('chips').innerHTML = MK.map(k=>{
    const st=STYLE[k.year];
    return '<div class="chip"><span class="sw" style="background:'+st.c+'"></span>'+
           '<span class="yr">'+k.year+'</span><span class="tg">'+st.tag+'</span></div>';
  }).join('');

  // ---- market list (sorted best→worst) ----
  const sorted = MK.slice().sort((a,b)=>{
    const av=a.survived?a.terminal:-1e9+(a.depletionAge||0);
    const bv=b.survived?b.terminal:-1e9+(b.depletionAge||0);
    return bv-av;
  });
  document.getElementById('list').innerHTML = sorted.map(k=>{
    const st=STYLE[k.year];
    const res = k.survived
      ? '<div class="res good"><span class="sd" style="background:var(--good)"></span>Survived <span class="amt">'+fmtM(k.terminal)+'</span></div>'
      : '<div class="res bad"><span class="sd" style="background:var(--bad)"></span>Ran dry <span class="amt">@ '+k.depletionAge+'</span></div>';
    return '<div class="row"><span class="led" style="background:'+st.c+'"></span>'+
      '<div class="nm"><div class="y">'+k.year+'</div><div class="t">'+st.tag+'</div></div>'+
      res+'<span class="chev"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></span></div>';
  }).join('');
})();
</script>
</body>
</html>
