# Publish Parallax to GitHub Pages. The standalone index.html is fully self-
# contained (engine inlined), so we build it fresh and deploy just the two
# standalone files. `enablement: true` turns Pages on the first time so no one
# has to flip a settings toggle by hand.
name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build standalone
        run: |
          node build-standalone.mjs
          mkdir -p _site
          cp index.html parallax.html _site/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
