name: T9 browser verify

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Run full browser verification
        id: browser-verify
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          CHROME="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium || true)"
          if [ -n "$CHROME" ]; then
            export PUPPETEER_EXECUTABLE_PATH="$CHROME"
          fi
          node scripts/verify.mjs 2>&1 | tee verify.log
      - name: Upload verification diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: t9-verify-diagnostics
          path: |
            verify.log
            verify-out
          if-no-files-found: warn
      - name: Enforce verifier result
        if: steps.browser-verify.outcome == 'failure'
        run: exit 1
