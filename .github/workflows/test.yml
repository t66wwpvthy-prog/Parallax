name: engine tests

# The engine is sacred. This guard runs engine.test.js on every push and PR,
# so the math can never silently break while the UI is rebuilt.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test
