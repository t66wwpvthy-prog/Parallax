name: T9 final browser verify

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Align verifier with approved GPC compact type scale
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/verify.mjs')
          source = path.read_text()
          needle = """          const denseLedger = el.closest('.hh-it, .hh-sg');
          if(denseLedger){
            const fs = parseFloat(getComputedStyle(el).fontSize);
            const interactive = el.matches('input, select, button');
            if(interactive) return fs >= 10.4;
            return fs >= 8;
          }
"""
          replacement = """          const guidedCanvas = el.closest('.gpc-wizard');
          if(guidedCanvas){
            const fs = parseFloat(getComputedStyle(el).fontSize);
            const interactive = el.matches('input, select, button');
            if(interactive) return fs >= 12;
            return fs >= 10;
          }
          const denseLedger = el.closest('.hh-it, .hh-sg');
          if(denseLedger){
            const fs = parseFloat(getComputedStyle(el).fontSize);
            const interactive = el.matches('input, select, button');
            if(interactive) return fs >= 10.4;
            return fs >= 8;
          }
"""
          if needle not in source:
              raise SystemExit('Verifier type-floor seam changed')
          path.write_text(source.replace(needle, replacement, 1))
          PY
      - name: Run full browser verification
        shell: bash
        run: |
          CHROME="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium || true)"
          if [ -n "$CHROME" ]; then
            export PUPPETEER_EXECUTABLE_PATH="$CHROME"
          fi
          node scripts/verify.mjs
