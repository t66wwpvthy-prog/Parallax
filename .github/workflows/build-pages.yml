# Manual standalone rebuild.
# Run this only when you intentionally want GitHub Actions to rebuild
# index.html and parallax.html from the source files.

name: build-standalone

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node build-standalone.mjs
      - name: Commit rebuilt standalone
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain index.html parallax.html)" ]; then
            git add index.html parallax.html
            git commit -m "Manual standalone rebuild [skip ci]"
            git push
          else
            echo "no changes to commit"
          fi
